body:
  text: 庫務職局部第三十四冰井務周禮有凌人掌斬冰三其凌注云凌冰室也其事始見於此鄴城舊事有冰井臺魏志云建安十九年魏王曹操造此臺以藏冰為凌室故號冰井唐上林令掌藏冰職在司農宋朝會要曰建隆三年置冰井務隸皇城司也圖畫局宋朝會要曰雍熙元年置翰林圖畫院在內中池東門裏咸平元年移在右掖門外紹聖二年改院為局國信所又曰國信所掌契丹使介交聘之事景德初遣內臣排辦禮信四年改初雄州用兵之際每密事擇吏主之號機宜司及契丹請和改曰國信司又景德四年八月帝謂近臣曰契丹使副到闕見辭及館接伴支賜例物并朝廷遣使合行之事並有規制行之以二年已成定例可特置管句往來國信所一司舊止云排辦禮信所至是立局置印也燒朱所又曰燒朱所太平興國三年置寺務司又曰寺務司淳化四年置騏驥院周官有十二間蓋國馬之所也漢有未央廄唐有飛龍院宋朝會要曰舊左右飛龍院太平興國五年正月改曰天廄院雍熙二年十月改為騏驥院估馬司宋朝會要曰估馬司咸平元年置掌納諸州所市馬估直驗記置牧養今廢陝西猶存其局也糧料院國初承舊制有糧料院使會要曰太平興國五年正月分糧料諸司馬步軍為三院雍熙四年四月改用使臣句當端拱二年改以京朝官主之神宗元豐末併馬軍步軍為諸軍與諸司為二院專句司又會要云專句司淳化三年戶部使樊知古奏置以分三司句院文案之繁務馬步各一司五年合為一也北排岸又曰北排岸司建隆三年置也朝服庫又曰朝服法物庫太平興國二年置分三庫也裁造院又曰乾德四年始置裁造院雜買務唐德宗置宮市以中官主之國初有市賈司太平興國四年改為雜買務至道中廢咸平時復置也雜賣務又會要云雜賣務景德四年置懷遠驛又曰懷遠驛景德三年置以待海南諸國進貢使介也文思院唐有文思院蓋天子內殿之比也其事見畫斷然非工作之所而宋朝太平興國三年始置文思院掌工巧之事非唐制矣會要云青箱雜記曰考工記栗氏掌攻金其量銘曰時文思索故今世工作之所號文思院二八作會要又云舊八作分兩使止一司太平興國二年分兩司景德四年又併為一司監官通掌天聖元年始分置官局也箔場又曰建隆元年置箔場二窯務後漢有甄官至歷代皆有之掌磚瓦之事即今窯務之掌也宋朝會要曰舊有東西二務景德四年廢於河陰置受納場大中祥符二年復置東窯務受納場為西窯務或云太祖建隆中始置二窯務云弓弩院周官有司弓矢隋弓弩署唐為弩坊即今弓弩院也宋朝會要曰開寶九年置弓弩院皮剝所宋朝會要曰皮剝所開寶二年置店宅務又曰店宅務國初為樓店務太平興國初改今名淳化五年分四廂至道三年復為店宅務咸平元年為都大店宅務大中祥符六年復今名外物料庫舊曰麩麵庫大中祥符七年改為外物料庫水磨務又曰水磨東西二務開寶三年置今廢又有大通門務淳化元年置金耀門書庫景德三年置以貯三司文案俗曰故紙倉東京記曰二年置掌三司積年文案舊曰三司文書倉綾錦院又曰乾德二年以平蜀所得錦置內綾錦院太平興國二年分為東西二院端拱元年合為一布庫又曰諸州所納布舊係左藏庫建隆元年移置布庫在常樂坊也二染院唐有染署職在少府後為染坊宋朝會要曰舊染坊太平興國二年分為東西二染院咸平六年有司上言西染院水宜於染練乃併之路唐正觀十三年天下州府三百五十八始分為十道一云在元年併省州縣始因關河近便分置也唐會要云正觀元年三月十日也開元中又為十五道宋朝曰路又分為二十四路矣府漢制三公開府故稱三府魏晉以後諸王又稱府唐高祖武德初邊鎮襟帶之地置總管府七年改曰都督府唐會要云二月十二日也開元三年始改京兆河南曰府此蓋府之始也注蘇氏演義曰府聚也聚所在圖籍簿書之處風俗通云公卿牧守通德之所聚也州項峻始學篇曰人皇九頭依山川土地之勢財度為九州又治書曰人皇始出於提地之國以長九州為九囿人皇乃有中州此名州之始也周公職録圖曰黃帝受命風后受圖割地布九州沿革曰黃帝分州畫野或曰高陽創九州亦云高辛通典曰唐有九州舜肇十有二州禹又別九州漢以州部郡唐武德元年乃罷郡置州也注代宗時楊綰為相定上中下州文宗相韋處厚乃置六雄十望十緊等州也縣周禮四甸為縣史記秦本紀曰孝公十二年并諸小鄉聚為縣商君傳曰鞅令邑聚為縣則名縣之始自秦孝公也陸法言切韻曰楚莊王滅陳以為縣縣之名自此始秦并天下以郡領縣隋文帝開皇二年罷郡以縣隸州也注説文曰天子百縣縣四郡周禮小司徒之職方二十里之地也郡秦始皇二十六年初并天下罷侯置守始分三十六郡也注史記曰秦滅東周始置三川郡按説文天子地方千里分為百縣縣四郡左傳曰上大夫受郡秦始以郡監領縣鎮通典曰鎮將後周之通班也隋亦曰鎮唐分上中下三等歷代未聞疑鎮始於宇文周代也宋朝之制地要不成州而當津會者則為軍以縣兼軍使民聚不成縣而有稅課者則為鎮或以官監之鄉周禮六鄉以為軍政謂比閭族黨州鄉也蓋周制矣秦制大率十里一亭十亭一鄉漢以屬縣也關周官司徒之屬有司關又有下士二人注云關界上之門則關蓋周制也驛又地官遺人之職凡國野之道十里有廬廬有飲食二十里有宿宿有路室路室有委五十里有市市有候館候館有積宋二十里馬鋪有歇馬亭即路室之遺事也六十里有驛驛有餼給即候館之遺事也漢自鄭莊置驛以迎送賓客故後世亭傳有驛名通典曰唐三十里置一驛其非通途大路則曰館由是通謂之館驛雖事起於周名出於漢然實始于公劉于時廬旅之義左傳有楚子乘馹馹驛馬也則馬遞之制已見於周矣漢文帝乃詔太僕見馬餘皆給傳置也急遞筆談曰驛傳舊有步馬急遞三等急遞最遽日行四百里唯軍興用之熙寧中又有金字牌急腳遞如古羽檄也以朱漆木牌金字日行五百里軍前機速處分則自御前發下三省樞密莫得興也貧子院事始曰開元二十二年斷京城乞兒官置病坊給廩食亦為悲田院或曰養病院記之為其所始按唐會要曰開元五年宋璟蘇頲奏悲田院養病從長安以來置使專知所稱悲田乃關釋教此是僧尼職掌至二十三年乃分置於諸寺推長安中初置使之文則知其前有矣而事始所記乃給廩食所始謂茲事之起於此者非也宋朝又因之以僧院名福田今亦曰悲田也鼓樓北使李崇為兗州牧州多盜崇乃村置一樓樓一鼓以警盜賊唐張説始設於京城之內阡陌史記秦紀曰孝公十二年開阡陌東地渡洛又商君傳曰商鞅相秦孝公壞井田開阡陌又始皇紀太史公曰昭襄已立四年初為田開阡陌地里春秋命歷序曰神農度地形甄度四海東西九十萬里南北八十一萬里然則炎帝始有里數矣淮南子則曰萬民喜置堯為天子於是天下廣狹險易遠近始有道里之起自陶唐氏始也按黃帝內傳有記里車則里始於炎帝明矣里路山海經曰帝令豎亥步天地之東西二萬八千里南北二萬六千里淮南子曰禹使大章步自東極至西極二億三千五百里七十五步又八極之廣東西二億三萬三千里南北二億三萬一千里而黃帝有記里之車按黃帝遊幸天下而車以記里疑道路之紀以里堠起軒轅時也封堠拾遺録曰禹治水所穿鑿處皆青泥封記使玄龜印其上今人聚土為界乃遺事也此封堠之始矣儀制令談苑曰太平興國中孔承恭為大理正上言儀制令賤避貴少避長輕避重去避來望令於兩京諸州要害處刻榜以揭之所以興禮遜厚風俗從之今京師諸門關亭皆有之而所在道途雙堠處皆刻之蓋自本朝孔承恭始也地名項峻治書曰人皇出於提地之國則提地疑國名也於是國有名則土地國邑之名此為之始也山川名人皇以來土地國邑始各有名則山川之號疑亦從此起故神農興於厲山共工之觸不周炎帝以薑水黃帝以姬水此山川之名之始也書呂刑曰禹平水土主名山川注云無名者主名之於是凡山川皆名之矣山海經洎爾雅所載者是也地圖春秋元命包曰神農世怪義生白阜圖地形脈水道注曰怪義白阜母名圖畫地形通水道之脈也今有地圖疑始於此弓手營宋朝會要曰咸平五年八月置縣尉司弓手營舍浮橋春秋後傳曰周赧王五十八年秦始作浮橋於河上按詩大明云造舟為梁孫炎曰造舟比舟為梁也比舟於水加板於上今浮橋也故杜預云造舟為梁則浮橋之謂矣爾雅釋水曰天子造舟諸侯維舟大夫方舟士特舟夏商尚質等制之文未備故鄭康成以為周制後傳以為秦始疑周有事則造舟而秦乃繫之也溫湯辛氏三秦記曰秦始皇與神女遊忤其旨唾之生瘡始皇怖謝乃為出溫湯洗除後人因以為驗漢武故事曰秦皇砌而起宇武帝加修飾焉道觀周穆王尚神仙召尹軌杜沖居終南山尹真人草樓之所因號樓觀蓋道觀之初也黃帝內傳西王母授帝白玉元始真容置於高觀之上時人謂之道觀名觀之義疑取諸此隋煬帝改為玄壇後復曰觀注續事始云宋廢國學置總明觀疑自是以來道家者流疑之以名其所居也景靈宮宋朝會要曰大中祥符五年十一月詔以聖祖臨降令擇地建宮遂以錫慶院建約唐太清宮制度仍上新宮名曰景靈神宗元豐中又廣其制盡奉諸帝后御容也上清宮宋敏求東京記曰端拱元年二月太宗詔取晉邸時太祖所賜金帛建宮至道元年八月宮成帝御書額金填其字賜之仁宗慶歷三年十一月遭焚毀熙寧元豐間靈惠法師王太初再營之元祐初年宣仁太皇太后為出妝粉錢重建置也東太一宋朝會要曰太平興國初楚芝蘭言五福太一所在無兵疫人民豐樂凡行五宮四十五年一移自雍熙元年入黃室巽宮在吳分蘇州請築宮以祀六年十月芝蘭又言都城東南地名蘇村可徙宮以應蘇名遂詔營建注紀年通載則謂興國八年正月作也西太一又曰天聖六年三月司歷言五福太一自雍熙元年甲申及今四十五年太一行綦當入蜀郡之坤宮曰黃庭可於國城西南別建祈宮於是詔擇八角鎮地建西太一宮注紀年通載曰天聖六年三月建太一宮於西郊中太一神宗熙寧初即五嶽觀舊址營中太一宮蓋自仁宗天聖六年至熙寧五年壬子四十五年五福太一行綦自黃庭宮移入貢室之中下臨京都之中故也建隆觀錢易洞微志曰周顯德中營道宮於皇城之西梁門外賜為太清觀太祖有天下始重飾之改為建隆注東京記內侍洪惟一人道建三宮院集禧觀宋朝會要曰大中祥符五年九月詔下謂就南薰門內奉節致遠三營地及填乾池之西偏建觀以奉五嶽帝七年九月詔名觀曰會靈仁宗時觀火既重建改曰集禧池園又曰大中祥符八年五月詔會靈觀池以凝祥為名園以奉靈為名池觀醮殿蓋太祖所建池殿舊址也醴泉觀東京記曰本拱聖營天禧元年營卒有見龜蛇者軍士因建真武堂二年閏四月泉湧堂側汲不竭民疾疫者飲之多愈乃詔就其地建觀十月觀成名祥源宋朝會要曰天禧二年閏四月詔拱聖營醴泉所宜立觀以祥源為名仁宗時觀災既重立易今名曰醴泉萬壽觀本玉清昭應宮東偏別殿也宋朝會要昭應宮篇云天禧三年十一月皇后皇太子於宮東偏長生殿置經藏以祝聖壽詔賜殿名長生崇壽五年七月作皇帝本命殿於宮中名萬壽仁宗朝玉清昭應宮災所存止此殿重加營葺後以為萬壽觀也注林希兩朝寶訓曰天聖七年七月玉清昭應宮災上以所存長生崇壽殿為萬壽紀年通載云六月也天慶觀又曰大中祥符二年十月詔天下州府軍監關縣建道觀一所以天慶為名僧寺漢明帝於東都城門外立精舍以處攝摩騰竺法蘭即白馬寺也騰始自西域以白馬馱經來初止鴻臚寺遂取寺名創置白馬寺即僧寺之始也隋煬帝改曰道場後復曰寺尼寺僧史略曰東晉何充始捨宅安尼此蓋尼寺之起也寺額漢取鴻臚寺名置白馬寺以處僧當是以白馬為額耳就則僧寺名額自漢顯宗始也相國寺唐房僚石幢記曰相國寺肇自中宗叶夢始置於茲宋敏求東京記曰本北齊大建國寺後廢唐為鄭審宅因病捨為招提坊神龍二年僧惠雲建為寺延和元年睿宗以舊封相王因改為相國寺宋朝會要曰至道中太宗御題額易曰大相國寺東塔曰普滿唐至德二載建開寶六年太祖修西塔曰廣願元祐元年僧中慜立會要又云咸平五年名後閣曰資聖東京記則云景德五年賜名也神宗熙寧間重修飭之併諸院為八東曰寶嚴寶梵寶覺惠林西曰定慈廣慈普慈智海東京記又曰仁濟殿天聖八年建後與寶奎殿同賜名也景德寺宋朝會要曰本相國寺蔬圃周顯德中以僧居隘於此別建下院賜額天壽淳化二年別建寺門景德二年改今額天禧四年建寺廊經樓注東京記曰周世宗顯德五年以相國寺僧衆居隘就寺蔬圃別建置院分居之俗號東相國寺六年賜額曰天壽恭帝誕節名也又有觀音院峨眉僧茂正所建興國寺談苑曰太平興國寺舊龍興寺也周世宗廢為龍興倉國初寺主僧屢擊登聞鼓求復為寺上遣中使持劍以謂之曰此寺前朝所廢為倉敖以貯軍糧汝何故煩瀆帝庭朝命斷取汝首仍戒之曰儻偃蹇怖畏即斬之或臨刑無懼即未可既訊神色自若引頸就戮上大感歎復以為寺宋朝會要曰唐龍興寺也開寶二年詔重修太平興國元年賜今額傳法院又會要曰太平興國五年詔於太平興國寺大殿西度地作譯經院中設譯經堂東序為潤文堂西序為正義堂自是每誕節即獻經也八年改為傳法院按隋有翻經館唐初亦有翻譯之事元和後廢然則大宗之置茲院亦隋翻經館也四大寺五代會要曰周顯德四年九月賜京城內新修四大寺額以天清顯靜顯寧聖壽為名聖壽後又改曰顯聖是則四寺之始也建隆寺在揚州州城西北宋朝會要曰太祖征李重進於此置寨賊平建隆二年正月詔建寺焉有御榻在寺太祖忌日寺僧奉榻修供大中祥符五年始於寺建聖容殿元豐中神宗修景靈列聖神御殿故聖容復歸京師崇聖寺在并州舊州城外又會要曰舊名平晉寺太祖親征劉繼元行宮也興國中詔建寺賜名後於中設太宗御容大中祥符二年改名崇聖慈孝寺又曰慈孝寺故駙馬都御吳元扆宅也天聖二年十二月十二日詔建寺奉真宗神御初議名慈聖時太后號有此二字改賜今名東京記曰戒壇院本寺園寶元初僧文旦營創戒壇慶歷五年賜額也開寶寺東京記曰北齊天保十年置號獨居寺唐開元十七年明皇東封改曰封禪寺宋朝會要曰開寶三年三月改今名福聖院會要云初吳越王錢俶在杭州建阿育王塔藏佛舍利歸朝於此建塔云端拱二年成加建塔院咸平二年賜今額東京記云本新羅僧智照所居舍利塔錢俶興國中令俞皓造慶曆四年六月火焚之後即其舊址建閣焉成於神宗元豐之初慈聖太皇太后以妝錢助成之賜名慶壽崇因或曰仁宗時已為此名其額亦帝所書但藏之禁中未以賜之洎閣成遂出以榜也永安院東京記曰本號普慶太宗在晉邸重建以賜僧普潤仍奏今額崇夏寺東京記曰唐大中三年置建隆中石守信以寺門窄狹重造二年八月門成車駕臨幸宋朝會要守信重修三門詔治宮材也應天寺後唐夾馬營也即太祖誕生之地景德二年真宗每幸二月詔建院奉太祖神御如啓聖制度大中祥符二年賜名應天在西京之水北民間謂之琉璃寺也啓聖院即太宗誕生之地晉護聖營也太平興國六年建院雍熙二年成賜名啓聖東京記曰本晉護聖營天福四年宣祖典禁兵太宗誕聖其地興國中建院也普安院又曰普安院周顯德中建建隆初賜今額奉先寺又曰奉先資福禪院即安陵卜定乾德二年改卜五月詔就陵域置院也資聖院在新井州會要又曰天禧五年真宗置嘗親征為陳亡將士追福德神虎三部落營地造天聖初成賜名資聖太祖太宗忌日皆就建道場崇真院又曰崇真院初太宗陳國長公主出家大中祥符二年八月進封吳國號報慈正覺大師賜名清裕九日出居是院初在建初坊後以迫隘徙城西隆安坊即今俗謂七公主院者是也印經院又曰太平興國八年置印經院神宗熙寧末廢其院以所印板賜顯聖寺靈顯王廟在鄭州城東僕射陂側陂本後魏孝文賜僕射李沖里俗因呼僕射陂唐末建廟因陂為名俗誤傳為李靖後唐明宗天成二年贈靖太保晉天福二年八月敕唐衛國公李靖宜封靈顯王顯聖王廟在寧州真寧縣即要册湫也漢祠官所領唐乾符中封神為應聖侯光化二年封普濟王宋朝太宗在晉邸有神告之應太平興國二年七月四日封顯聖王按張緒續錦里耆舊傳曰太宗尹天府登極前有邠州客打軍巡引見問爭由曰爭説要册大王上曰有侵傷不均吾為平之若爭要册大王外邊商量此蓋神告之事耳廣濟王在永康軍導江縣李冰廟也秦孝文王時冰為蜀郡守自汶山壅江灌溉三郡開稻田歷代以來蜀人德之饗祀不絶偽蜀封大安王孟昶又號應聖靈感王開寶七年改號廣濟王英顯王廟在梓州梓潼縣本梓潼神也舊記曰神本張惡子仕晉戰死而廟存唐明皇狩蜀神迎於萬里橋追命左丞相僖宗播遷亦有助封濟順王咸平中益卒為亂王師討之忽有人呼曰梓潼神遣我來九月二十日城陷果克四年州以狀聞故命追封英顯王新息王辰州新息王廟後漢伏波將軍馬援祠也咸平元年三月本州上言水旱祈禱有應請加封號即今號是也廣惠王宣州敬亭山神也宋元嘉二年有錢塘神梓華友人雙霞識之為神同住廟中縣令盛疑焚之來託此山景福中封昭威侯偽唐保大中封昭威王景德元年知州裴莊請加朝命故追號廣惠王顯應王在泉州是廟舊封昭德王天禧三年五月本州言歲旱禱之有應故加封號今顯應王是也順濟王筆談曰彭蠡小龍顯異人人能道之熙寧中王師南征有軍仗數十船泛江而南龍即伏其中乘風日數百里有司以狀聞詔封神為順濟王遣禮官林希致詔祠下英烈王大中祥符五年詔杭州吳山廟神宜特封英烈王神即伍子胥時葺廟故也德安公即夷門山神也景德四年十二月加封號德安公顯應公在京城北即崔府君祠也相傳唐滏陽令沒為神主幽冥本廟在磁州淳化中民於此置廟至道二年晉國公主石氏祈有應以事聞詔賜名護國景祐二年七月封護國顯應公炳靈公五代會要曰後唐長興四年七月封泰山三郎為威雄大將軍時上不豫泰山僧進藥小康僧請封之宋朝會要曰廟在兗州泰山下即泰山神三郎也後唐詔封威雄將軍大中祥符七年十月十五日詔封威雄將軍為炳靈公明應公在潤州即焦山大聖祠也大中祥符七年四月詔特封明應公靈惠公在歙州烏聊山即唐越國公華神也郡人立祠大中祥符二年詔加靈惠公封靈濟公在梓州射洪縣即瀘州刺史陸弼神也弼貶瀘州有善政卒土人為立廟水旱請禱偽蜀封洪濟王大中祥符六年九月詔封號靈濟公也昭應公在河南府永安縣至道二年十月太宗山陵乏水牛山下忽有泉湧山陵使元份以聞詔立廟泉側賜名昭聖景德四年特封昭應公嘉應侯熙寧間百姓共立東嶽張太尉祠於國城之外東南隅俗傳神姓張氏淮陰人死隸嶽神主陰府要職京東州郡往往有祠世謂張舍人者是也至此號太尉元豐中光獻太皇太后祈有感始封嘉應侯號靈惠侯元豐時國城之西民立灌口二郎神祠云神永康導江縣廣濟王子王即秦李冰也會要所謂冰次子郎君神也宋後敕封靈惠侯東嶽諸祠大中祥符元年十月十五日詔封泰山上通泉廟為靈派侯亭亭山為廣禪侯嶧山神為靈巖侯普濟廟在京城西南隅景福坊即九龍堂也大中祥符四年六月十九日詔令完葺因賜名普濟廟也靈澤廟在鎮戎軍朝郍湫即龍廟秦漢所祠湫淵也天禧二年四月八日賜廟名靈澤顯靈廟在河南府永安縣安陵東北即蛇王祠也景德四年二月賜廟名顯靈靈惠廟在永安門徘徊泉上即泉神也大中祥符五年派守訓立廟遂賜靈惠名焉靈源廟在衛州共城縣即百門水所出也唐長安中置廟咸平元年春祈雨有應四月詔賜廟額曰靈源豐寶廟景德三年九月解州上言兩池左右祠廟請易題額詔取圖經所載者賜額遂改解縣池龍廟額曰豐寶安邑曰資寶分雲廟曰廣惠注自此以上除嘉應靈惠二侯外其不原所出者皆出宋朝會要生祠漢平公為縣吏曹決獄平郡中為立生祠自三代而來無生為立祠者至此始見茲事則生而立祠始於漢世也道釋漢自桓帝考濯龍之宮設華蓋以祀浮圖老子由此釋道二教稍稍興矣逮晉室其道始盛東遷之後二教峙立此釋道之所起也符録龍魚河圖曰天遣玄女下授黃帝兵信神符制伏蚩尤黃帝出軍決曰蚩尤無道帝討之夢西王母遣人以符授之帝悟立壇而請有玄龜銜符從水中出置之壇中蓋自是始傳符籙也金寶牌宋朝會要曰天禧元年四月詔內出聖祖神化金寶牌分給在京宮觀及外州名山聖迹之處面文曰玉清昭應宮成天尊萬壽背文曰永鎮福地帝自封之命中使送諸路天慶觀今諸郡道正副所掌者是道士黃帝內傳有道士行禮之文此疑謂有道之士也樓觀本記曰周穆王因尹真人草樓之觀召幽逸人居之謂之道士平王東遷置七人漢明帝永平七年置三十人晉惠度四十九人審此即是自周而有也司馬遷班固敘秦漢甚詳洎春秋以來殊無一人以一言倣佛道茲事者亦為可疑矣然范曄後漢書於光武紀論始有言道士西門君惠李守等云劉秀為天子蓋前漢末事則道士之初當此矣注列仙傳又有道士浮丘公接周靈王太子晉上嵩高山者道録續事始引仙傳拾遺曰隋文帝始以玄都觀主王延為威儀唐置左右兩街宋朝會要曰唐有左右街威儀周避諱改為道録宋朝因之都監又曰太平興國中增置副道録都監首座通舊為八員已上總知教門公事首座又曰首座亦太平興國中增置鑒義又曰天禧五年置首座鑒義分領本街事道官唐高宗時葉靜能入直翰林為國子祭酒姪孫法善玄宗時授銀青光祿大夫鴻臚卿又尹愔亦拜諫議大夫道士之命以官自高宗始也宋朝會要曰開寶五年十二月賜道士玄祕大師馬志通議大夫階道封後周武帝時衛元嵩封蜀郡公蓋道士授封之始也葉法善玄宗時亦封越國公道贈唐王知遠贈升玄先生葉法善贈金紫光祿大夫越州都督道士之褒贈蓋自王知遠始也道諡梁代陶洪景死賜諡正白先生則道之諡自梁陶隱居始也道號元魏世祖時賜寇謙之天師之號後漢張道陵亦有天師之稱蓋自列子言黃帝之稱牧馬童子曰天師始也唐玄宗賜李含光曰玄靜先生此賜號先生之始也宋朝緣唐事亦有賜號先生處士者真宗陳搏賜號希夷先生神宗時張噩賜號沖靖處士是也道紫唐中宗神龍初葉靜能雖加金紫之階而未頒紫衣至代宗時李泌立大功李輔國將不利之泌乞為道士許之又賜紫衣其後道士賜紫自李泌始也朝野僉載曰史崇玄附太平公主授鴻臚卿衣紫羅裙帔蓋雖衣之而未賜也佛像漢書霍去病過焉耆山得休屠王祭天金人顏師古注云作金人為天神之主今佛像是其遺法後漢明帝夢金人長大頂有日光傅毅曰天竺有其道者號曰佛於是遣使天竺圖其形像此中國有佛像之始也宋書云漢世始有佛像也佛塔高僧傳曰康僧會吳赤烏十年至建業孫權使求舍利既得之權即為造塔晉帝過江更修飾之此蓋中國造塔之始也佛經漢明帝永平中摩騰竺法蘭以白馬馱經至東都即四十二章經中國之有佛經此蓋其始也鄴城舊事云永平十年經像初來也譯經漢自永平後摩騰首譯四十二章經歷魏晉南北朝皆有翻經館唐置譯經潤文之官元和後廢宋朝太宗興國中復興其事置譯經院也談禪寶林曰佛涅槃時告迦葉曰吾清淨法服以付汝迦葉傳阿難二十八代至達摩梁普通中自南天竺泛海至廣州後止崇山住少林寺傳惠可中國談禪自此始也讚唄僧史略曰讚唄原始按十誦律中俱胝耳作三契聲以讚佛後趙石勒時建中神降安邑諷詠經音七日方絶僧有摹寫為梵唄焉此讚梵之始也續搜神記曰晉太元中竺曇遂死作清溪廟神諸道人詣廟便靈語云久不聞唄聲其伴惠範為作之即是自晉已有讚唄非始於石勒是也戒律又曰漢靈帝建寧三年安世高首出義決律二卷次有比丘諸禁律魏世天竺三藏曇磨迦羅到許州至洛慨魏境僧無律範遂於嘉平中與曇諦譯四分羯磨及僧祗戒心圖此蓋中國戒律之始也戒壇又曰漢魏之僧雖剃染而戒法未備唯受三歸嘉平正元中既傳戒律立大僧羯磨法斯蓋比丘立戒壇之始也又曰起於南朝求那跋磨為宋國比丘於蔡州岸受戒為始自爾南北相次為壇受戒中國之人受戒自魏朱士行為之首也尼壇又曰受戒初本僧尼同壇宋朝太祖不許尼往僧中自是始別為壇宋朝會要曰開寶五年二月詔自今尼有合度者只許於本寺起壇受戒蓋自此始別立尼受戒壇也尼戒薩婆多師資傳曰宋元嘉十一年師子國尼鐵索羅等於建康南林寺壇上為景福寺尼惠果淨音等受戒法事此方尼受戒自惠果等始也僧後漢明帝遣蔡惜等往天竺訪僧法於彼見摩騰乃要還漢地此中國有僧之始也僧史略曰漢明聽陽城侯劉峻等出家此又中國之人為僧之始也注新唐書傅奕上疏曰浮圖法漢明始立胡祠然惟西域桑門自傳其教西晉已上不許中國削髮事胡石符亂華乃弛厥禁此疑中國為僧之始尼僧史略又曰漢明帝既聽劉峻等出家又聽洛陽婦女阿潘等出家此蓋中國尼之始稱釋高僧傳曰出家從師命氏晉道安受業佛圖澄澄姓帛氏安以師莫過佛遂以釋為姓僧之稱釋自道安始也度牒僧史略曰度牒自南北朝有之見高僧傳名籍限局必有憑由憑由即今祠部牒也唐會要曰天寶六年五月制僧尼令祠部給牒則僧尼之給牒自唐明皇始也空名唐食貨志曰肅宗至鳳翔明年鄭叔清議以天下用度不充諸道得召人納錢給空名度僧道則是空名度牒自唐肅宗始也僧隸唐會要曰武后延載元年五月十一日敕天下僧尼隸祠部此祠部轄僧之始也唐志亦云僧帳又曰舊制僧尼簿三年一造其籍一本送祠部一本留州縣又開元十七年八月十日敕僧尼宜依十六年舊籍則僧尼供帳始於此耳僧史略曰唐文宗太和四年正月祠部請天下僧尼具名申省以憑入籍入籍造帳自太和始也二文不同以會要為正本朝用周顯德事三年一造帳定著於令僧講僧史略曰僧講自朱士行魏代講道行經始也尼講又曰東晉廢帝太和三年洛陽東寺尼道馨通法華維摩研窮理味一方宗師此則尼講説之始也僧諡洪明集曰後魏太祖時法果卒諡趙胡靈公此僧賜諡之始也宋朝會要曰咸平三月八日梵僧法賢卒諡慧辨四年法天卒諡元覺其後施護卒亦諡明悟也道林諡真宗實録曰大中祥符六年六月甲申詔諡志公真覺大師宜加為遁林真覺大師注宋敏求東京記曰祥符五年諡真覺大師明覺諡又曰大中祥符六年六月戊子詔泗州僧伽大師宜加號普照明覺大師僧封洪明集曰元魏封法果輔國宜城子果加忠信侯安城公唐封不空肅國公僧之得封自後魏太祖始也僧贈元魏法果卒贈老壽將軍趙胡靈公此其始也唐亦贈不空司空僧官自隋文帝以沙門彥琮為翻經館學士後始命僧以官及唐又以不空為開府儀同三司試鴻臚卿宋朝會要曰太宗時法賢雍熙四年加試光祿卿階朝散大夫其後法天纍試鴻臚卿亦加朝散大夫及惟淨已故吳王燬弟從鑑之於為梵學筆受大中祥符後同譯經為試光祿卿也注太祖朝僧元靄亦加朝散大夫階也僧録廣洪明集曰後魏太祖皇始中以沙門法果為統管攝僧徒文帝以師賢為僧統參玄語録曰後秦姚萇立道䂮音略為僧正秩同侍郎法欽慧斌掌僧録給事同吏人此僧立正録之始也又元魏以沙門僧顯為京師統隋天下分置十統呼上統或曰大統唐罷統立兩録司於京邑謂之僧録僧號後秦鳩摩羅什始號法師其後中國名僧亦稱之晉朝講經草堂寺有廟臣大德沙門千餘人此始有大德之呼後趙石虎號佛圖澄曰大和尚此稱和尚之始也晉初鳩摩羅炎東渡龜茲王請為國師姚興迎羅什待以國師之初也梁敕慧約云允膺闍梨之尊屬當智者之號此師號之起也唐中宗神龍二年號萬回曰法靈公姚秦又號羅什為大師則大師之名蓋起於此唐僖宗廣明中賜僧知玄號悟達國師僧徹淨光大師可符法智大師德宣演暢大師自此始為朝廷寵渥之命見事始云僧紫事始云代宗實録曰大歷三年僧惠崇內賜紫袈裟記以為僧賜紫衣之始按贊寧僧史略曰則天朝僧法朗譯大雲經陳符命言法朗等皆賜紫袈裟則僧之賜紫自武后始也不然唐會要安得開元二十年波斯王遣僧及烈至唐敕賜紫袈裟還國之事也蓋僧賜紫不起於代宗明矣僧褐僧史略曰漢魏之世出家者多著赤布僧伽梨又秣陵諸僧衣色倣西竺後周忌聞黑衣之讖悉屏黑色著黃色衣謂今僧衣褐起於宇文周制注按北齊忌黑文宣殺弟煥以七近漆屬黑後果敗於宇文黑獺然則非後周也筆受宋朝會要曰太平興國七年六月譯經院成譯經詔梵學僧筆受綴文七月詔左右街義學僧詳定十二月選梵學沙門一人為筆受義學沙門十人為證義其後以惟淨為梵學筆受自此其始也談苑曰譯經常以梵僧後令惟淨同譯經梵學筆受二人譯經綴文二人證義八人唐世翻譯有筆受官以朝臣為之佛陀多羅之譯圓覺經也房融為筆受是矣宋廟太宗始用梵學僧也伎術黃帝內傳曰帝既升為天子命句芒等司五行於是針經脈訣天文地里卜法算術吉凶喪葬無不備也凡伎術皆自軒轅始醫帝王世記曰黃帝使岐伯主典醫藥以療衆疾説文曰巫彭初作醫呂氏春秋亦曰巫彭作醫醫書皇甫謐帝王世紀曰黃帝命雷公岐伯教制九針著內外經素問之書咸出焉黃帝內傳曰帝升為天子針經脈訣無不備也故金匱甲乙之類皆祖黃帝方書世諸方書藥法雖損益隨時大抵祖述黃帝如脈訣之出於晉王叔和病源之出於隋巢元方湯液經之出於商伊尹傷寒論之出於漢張機千金備急出於孫思邈外臺祕要出於唐王圭宋太宗求天下名方集太平聖惠其餘紛紛無代無之高氏小史曰炎帝作藥方以救時疾小兒方孫思邈千金方曰小兒六歲以下黃帝無説中古有巫妨始撰顱囟經以占壽夭自茲始有小兒方則小兒方藥始於巫妨也難經帝王世紀曰黃帝命雷公岐伯論經脈旁通問難八十一章為難經楊元操難經序曰黃帝八十一難經者秦越人扁鵲所作按黃帝內難二秩秩九卷其義難究越人乃採精要八十一章為難經本草帝王世紀曰炎帝嘗味草木置藥療疾著本草四卷至梁陶洪景唐李世績等注敘為二十卷宋朝開寶中重校定仁宗嘉佑中命劉禹錫等集類諸家敘藥之説為補注本草唐書于志寧傳云漢班固惟紀黃帝內外經不載本草齊七録乃稱之世謂神農嘗藥黃帝以前文字不傳以識相付至桐雷乃載篇册然所載郡縣多漢時事疑張仲景華他輩記其語陶洪景本草序云此書應與素問同類其餘多與志寧之説同也百藥淮南子曰神農始嘗百草之滋味當此之時一日而七十毒世本曰神農和藥濟人則百藥蓋自神農始也世紀或云伏羲嘗味百藥非也梁陶洪景本草序曰神農氏王天下宣藥療疾以拯夭傷高氏小史曰炎帝嘗百藥以治病嘗藥之時百死百生九針帝王世紀曰太昊畫八卦以類萬物之情六氣六腑五臟五行陰陽四時水火升降得以有象百病之理得以有類乃制九針又曰黃帝命雷公岐伯教制九針蓋針灸之始也明堂金醫家記針灸之穴為偶人點志其處名明堂按銅人腧穴圖序曰黃帝問岐伯以人之經絡窮妙於血脈參變乎陰陽盡書其言藏於金蘭之室洎雷公請問乃坐明堂以授之後世之言明堂者以此醫獸續事始曰黃帝時有馬師皇者善醫馬通神明故周禮天官有獸醫夏官有巫馬之職也日者史記日者傳注云古人通卜筮則謂之日者其事則周太卜之職也墨子將北之齊過日者注謂當是周末語然也卜龜曰卜事始曰包犧氏時始有卜春秋元命包曰古者司經主卜也筮蓍曰筮世本曰巫咸作筮古史考曰商時巫咸善筮也呂氏春秋亦云巫作筮歸藏曰女媧作筮張雲幕而枚占書舜曰龜筮協從蓋筮誠巫咸所作則歸藏與書安得言筮也古史考曰庖犧氏作卦始有筮此蓋其初也三式風后演河圖為一千八百局曰遁甲周太公約為七十二漢張良定為一十八以六甲相遁而起故名遁甲并太一六壬是為三式黃帝內傳曰王母使玄女授帝法有九天九地八門六甲之術即今遁甲也蓋自黃帝始占歲世本曰后益作占歲呂氏春秋亦云爾師曠占乃有黃帝欲知歲苦歲樂歲善而占有蓬薺艾先生之説即占歲為起於黃帝雜占晉律歷志曰黃帝使羲和占日常儀占月車區占風鬼臾蓲占星呂氏春秋曰羲和作占日常儀作占月靈碁異苑曰十二碁卜出自張文成受法於黃石公蓋今靈碁也法以十二子分上中下擲之據所得按法驗之以考吉凶注文成留侯張子房諡也唐事遠棊經序曰靈經不知其所起或云東方朔漢武帝使之占兆無不中朔之術蓋如此又云張子房所師黃石公以之授良又云客以術干淮南王王祕其事亦此書也畫易通卦驗曰伏犧方牙倉精作易無書以畫事注云作易以為政而不書但畫其形此畫之起也世本曰史皇作圖宋衷云黃帝臣圖謂畫物象也或曰史皇即倉頡呂氏春秋亦曰史皇作畫射御易繫九事稱黃帝作弧矢以威天下又曰服牛乘馬引重致遠則射御皆始於黃帝也世本曰臣胲作服牛相土作乘馬𣎅作駕宋衷云皆黃帝臣又曰韓哀作御謂加精巧逢蒙作射謂改制也呂氏春秋作韓哀作御也規矩尸子曰古者倕為規矩準繩使天下效焉倕黃帝時巧人也百巧山海經曰帝俊生身身生義均義均是始為巧倕始作百巧也
