body:
  text: 事物紀原卷七宋髙承撰庫務職局部三十四氷井務周禮有凌人掌斬氷三其凌注云凌氷室也其事始見於此鄴城舊事有氷井臺魏志云建安十九年魏王曹操造此臺以藏氷為凌室故號氷井唐上林令掌藏氷職在司農宋朝㑹要曰建隆三年置氷井務隸皇城司也圖畫局宋朝㑹要曰雍熈元年置翰林圖畫院在内中池東門裏咸平元年移在右掖門外紹聖二年改院為局國信所又曰國信所掌契丹使介交聘之事景徳初遣内臣排辦禮信四年改初雄州用兵之際每宻事擇吏主之號機宜司及契丹請和改曰國信司又景徳四年八月帝謂近臣曰契丹使副到闕見辭及館接伴支賜例物并朝廷遣使合行之事並有規制行之以二年已成定例可特置管勾徃來國信所一司舊止云排辦禮信所至是立局置印也燒朱所又曰燒朱所太平興國三年置寺務司又曰寺務司淳化四年置騏驥院周官有十二閑盖國馬之所也漢有未央廏唐有飛龍院宋朝㑹要曰舊左右飛龍院太平興國五年正月改曰天廏院雍熈二年十月改為騏驥院估馬司宋朝㑹要曰估馬司咸平元年置掌納諸州所市馬估值驗記置牧養今廢陜西猶存其局也糧料院國初承舊制有糧料院使會要曰太平興國五年正月分糧料諸司馬歩軍為三院雍熈四年四月改用使臣勾當端拱二年改以京朝官主之神宗元豐末併馬軍歩軍為諸軍與諸司為三院專勾司又會要云專勾司淳化三年户部使樊知古奏置以分三司勾院文案之繁務馬歩各一司五年合為一也北排岸又曰北排岸司建隆三年置也朝服庫又曰朝服法物庫太平興國二年置分三庫也裁造院又曰乾徳四年始置裁造院雜買務唐徳宗置宫市以中官主之國初有市買司太平興國四年改為雜買務至道中廢咸平時復置也雜賣務又㑹要云雜賣務景徳四年置懐逺驛又曰懐逺驛景徳三年置以待海南諸國進貢使介也文思院唐有文思院盖天子内殿之比也其事見畫斷然非工作之所而宋朝太平興國三年始置文思院掌工巧之事非唐制矣㑹要云青箱雜記曰考工記㮚氏掌攻金其量銘曰時文思索故今世工作之所號文思院二八作㑹要又云舊八作分兩使止一司太平興國二年分兩司景徳四年又併為一司監官通掌天聖元年始分置官局也箔場又曰建隆元年置箔場二窰務後漢有甄官至歴代皆有之掌塼瓦之事即今窰務之掌也宋朝㑹要曰舊有東西二務景徳四年廢於河隂置受納場大中祥符二年復置東窰務受納場為西窰務或云太祖建隆中始置二窰務云弓弩院周官有司弓矢隋弓弩署唐為弩坊即今弓弩院也宋朝㑹要曰開寳九年置弓弩院皮剥所宋朝㑹要曰皮剥所開寳二年置店宅務又曰店宅務國初為樓店務太平興國初改今名淳化三年分四廂至道三年復為店宅務咸平元年為都大店宅務大中祥符六年復今名外物料庫舊曰麩麪庫大中祥符七年改為外物料庫水磨務又曰水磨東西二務開寳三年置今廢又有大通門務淳化元年置金耀門書庫景徳三年置以貯三司文案俗曰故紙倉東京記曰二年置掌三司積年文案舊曰三司文書倉綾錦院又曰乾徳年以平蜀所得錦一置内綾錦院太平興國二年分東西二院端拱元年合為一布庫又曰諸州所納布舊係左藏庫建隆元年移置布庫在常樂坊也二染院唐有染署職在少府後為染坊宋朝㑹要曰舊染坊太平興國二年分為東西二染院咸平六年有司上言西染院水宜於染練乃併之州郡方域部三十五路唐貞觀十二年天下州府三百五十八始分為十道一云在元年併省郡縣始因關河近便分置也唐會要云正觀元年三月十日也開元中又為十五道宋朝曰路又分為二十四路矣府漢制三公開府故稱三府魏晉以後諸王又稱府唐高祖武徳初邊鎮襟帶之地置總管府七年改曰都督府唐㑹要云二月十二日也開元三年始改京兆河南曰府此蓋府之始也注蘇氏演義曰府聚也聚所在圖籍簿書之處風俗通云公卿牧守通徳之所聚也州項峻始學篇曰人皇九頭依山川土地之勢財度為九州又治書曰人皇始出於提地之國以長九州為九囿人皇乃有中州此名州之始也周公職録圖曰黄帝受命風后受圖割地布九州㳂革曰黄帝分州畫野或曰髙陽創九州亦云髙辛通典曰唐有九州舜肇十有二州禹又别九州漢以州部郡唐武徳元年迺罷郡置州也注代宗時楊綰為相定上中下州文宗相韋處厚乃置六雄十望十緊等州也縣周禮四甸為縣史記秦本紀曰孝公十二年并諸小郷聚為縣商君傳曰鞅令邑聚為縣則名縣之始自秦孝公也陸法言切韻曰楚莊王滅陳以為縣縣之名自此始秦并天下以郡領縣隋文帝開皇二年罷郡以縣隸州也注說文曰天子百縣縣四郡周禮小司徒之職方二十里之地也郡秦始皇二十六年初并天下罷侯置守始分三十六郡也注史記曰秦滅東周始置三川郡按說文天子地方千里分為百縣縣四郡左傳曰上大夫受郡秦始以郡監領縣鎮通典曰鎮將後周之通班也隋亦曰鎮唐分上中下三等歴代未聞疑鎮始于宇文周代也宋朝之制地要不成州而當津㑹者則為軍以縣兼軍使民聚不成縣而有稅課者則為鎮或以官監之鄉周禮六鄉以為軍政謂比閭族黨州鄉也盖周制矣秦制大率十里一亭十亭一鄉漢以屬縣也關周官司徒之屬有司關又有下士二人注云關界上之門則關盖周制也驛又地官遺人之職凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積今二十里馬舖有歇馬亭即路室之遺事也六十里有驛驛有餼給即候館之遺事也漢自鄭莊置驛以召賔客注故後世亭傳有驛名通典曰唐三十里置一驛其非通途大路則曰館由是通謂之館驛雖事起於周名出於漢左傳有楚子乗馹馹驛馬也則馬遞之制已見於周矣漢文帝乃詔太僕見馬餘皆給傳置也急遞筆談曰驛傳舊有步馬急遞三等急遞最遽日行四百里惟軍興用之熈寧中又有金字牌急脚遞如古羽檄也以朱漆木牌金字日行五百里軍前機速處分則自御前發下三省樞宻莫得與也貧子院事始曰開元二十二年斷京城乞兒官置病坊給廩食亦為悲田院或曰養病院記之為其所始按唐會要曰開元五年宋璟蘇頲奏悲田院養病從長安以來置使專知所稱悲田乃關釋教此是僧尼職掌至二十三年乃分置於諸寺推長安中初置使之文則知其前有矣而事始所記乃給廩食所始謂兹事之起于此者非也宋朝又因之以僧院名福田今亦曰悲田也鼓樓北史李崇為兖州牧州多盜崇乃村置一樓樓一鼓以警盜賊唐張說始設於京城之内阡陌史記秦紀曰孝公十二年開阡陌東地渡洛又商君傳曰商鞅相秦孝公壊井田開阡陌又始皇紀太史公曰昭襄已立四年初為田開阡陌地里春秋命厯序曰神農度地形甄度四海東西九十萬里南北八十一萬里然則炎帝始有里數矣淮南子則曰萬民喜置堯為天子於是天下廣狹險易逺近始有道里之起自陶唐氏始也按黄帝内傳有記里車則里始於炎帝明矣里路山海經曰帝令豎亥歩天地之東西二萬八千里南北二萬六千里淮南子曰禹使大章步自東極至西極二億三千五百里七十五步又八極之廣東西二億三萬三千里南北二億三萬一千里而黄帝有記里之車按黄帝遊幸天下而車以記里疑道路之紀以里堠起軒轅時也封堠拾遺録曰禹治水所穿鑿處皆青泥封記使𤣥龜印其上今人聚土為界乃遺事也此封堠之始矣儀制令談苑曰太平興國中孔承恭為大理正上言儀制令賤避貴少避長輕避重去避來望令於兩京諸州要害處刻牓以掲之所以興禮遜厚風俗從之今京師諸門關亭皆有之而所在道途雙堠處皆刻之盖自本朝孔承恭始也地名項峻治書曰人皇出於提地之國則提地疑國名也於是國有名則土地國邑之名此為之始也山川名人皇以來土地國邑始各有名則山川之號疑亦從此起故神農興於厲山共工之觸不周炎帝以姜水黄帝以姬水此山川之名之始也書吕刑曰禹平水土主名山川注云無名者主名之於是凡山川皆名之矣山海經洎爾雅所載者是也地圖春秋元命包曰神農世怪義生白阜圖地形脈水道注曰怪義白阜母名圖畫地形通水道之脈也今有地圖疑始於此弓手營宋朝㑹要曰咸平五年八月置縣尉司弓手營舍浮橋春秋後傳曰周赧王五十八年秦始作浮橋於河上按詩大明云造舟為梁孫炎曰造舟比舟為梁也比舟於水加板於上今浮橋也故杜預云造舟為梁則浮橋之謂矣爾雅釋水曰天子造舟諸侯維舟大夫方舟士特舟夏商尚質等制之文未備故鄭康成以為周制後傳以為秦始疑周有事則造舟而秦乃繫之也溫湯辛氏三秦記曰秦始皇與神女遊忤其㫖唾之生瘡始皇怖謝乃為出溫湯洗除後人因以為驗漢武故事曰秦皇砌而起宇武帝加修飾焉真壇淨社部三十六道觀周穆王尚神仙召尹軌杜冲居終南山尹真人草樓之所因號樓觀盖道觀之初也黄帝内傳西王母授帝白玉元始真容置於髙觀之上時人謂之道觀名觀之義疑取諸此隋煬帝改為𤣥壇後復曰觀注續事始云宋廢國學置總明觀疑自是以來道家者流擬之以名其所居也景靈宫宋朝㑹要曰大中祥符五年十一月詔以聖祖臨降令擇地建宫遂以錫慶院建約唐太清宫制度仍上新宫名曰景靈神宗元豐中又廣其制盡奉諸帝后御容也上清宫宋敏求東京記曰端拱元年二月太宗詔取晉邸時太祖所賜金帛建宫至道元年八月宫成帝御書額金填其字賜之仁宗慶厯三年十一月遭焚毁熈寧元豐間靈恵法師王太初再營之元祐初年宣仁太皇太后重建置也東太一宋朝㑹要曰太平興國初楚芝蘭言五福太一所在無兵疫人民豐樂凡行五宫四十五年一移自雍熈元年入黄室巽宫在吳分蘇州請築宫以祀六年十月芝蘭又宫都城東南地名蘇村可徙宫以應蘇名遂詔營建注紀年通載則謂興國八年正月作也西太一又曰天聖六年三月司厯言五福太一自雍熈元年甲申及今四十五年太一行綦當入蜀郡之坤宫曰黄庭可於國城西南别建祈宫於是詔擇八角鎖池建西太一宫注紀年通載曰天聖六年三月建太一宫於西郊中太一神宗熈寧初即五嶽觀舊址營中太一宫盖自仁宗天聖六年至熈寧五年壬子四十五年五福太一行綦自黄庭宫移入真室之中下臨京都之中故也建隆觀錢易洞㣲志曰周顯徳中營道宫於皇城之西梁門外賜為太清觀太祖有天下始重飾之因改爲建隆觀集禧觀宋朝㑹要曰大中祥符五年九月詔下謂就南薰門内奉節致逺三營地及墳乾池之西偏建觀以奉五嶽帝七年九月詔名觀曰㑹靈仁宗時觀大既重建改曰集禧池園又曰大中祥符八年五月詔會靈觀池以凝祥為名園以奉靈為名池觀醮殿盖太祖所建池殿舊址也醴泉觀東京記曰本拱聖營天禧元年營卒有見龜蛇者軍士因建真武堂二年閏四月泉湧堂側汲不竭民􅍚疫者飲之多愈乃詔就其地建觀十月觀成名祥源宋朝㑹要曰天禧二年閏四月詔拱聖營醴泉所宜立觀以祥源為名仁宗時觀灾既重立易今名曰醴泉萬夀觀本玉清昭應宫東偏别殿也宋朝㑹要昭應宫篇云天禧三年十一月皇后皇太子於東宫偏長生殿置經藏以祝聖夀詔賜殿名長生崇夀五年七月作皇帝本命殿於宫中名萬夀仁宗朝玉清昭應宫灾所存止此殿重加營葺後以為萬夀觀也注林希兩朝寳訓曰天聖七年七月玉清昭應宫灾上以所存長生崇夀殿為萬夀紀年通載云六月也天慶觀又曰大中祥符二年十月詔天下州府軍監關縣建道觀一皆以天慶為名白馬寺漢明帝於東都城門外立精舍以處攝摩騰竺法蘭即白馬寺也騰始自西域以白馬䭾經來初上鴻臚寺遂取寺名創置白馬寺即僧寺之始也隋煬帝改曰道場後復曰寺尼寺僧史畧曰東晉何充始捨宅安尼此盖尼寺之起也寺額漢取鴻臚寺名置白馬寺以處僧當是以白馬為額耳然則僧寺名額自漢顯宗始也相國寺唐房僚石幢記曰相國寺肇自中宗叶夢始置于兹宋敏求東京記以本北齊大建國寺後廢唐為鄭審宅因病捨為招提坊神龍二年僧恵雲建為寺延和元年睿宗以舊封相王因改為相國寺宋朝㑹要曰至道中太宗御題額易曰大相國寺東塔曰晉滿唐至徳二載建開寳六年太祖修西塔曰廣願元祐元年僧中恵立㑹要又云咸平五年名後閤曰資聖東京記則云景徳五年賜名也神宗熈寧間重修飭之併諸院為八東曰寳嚴寳梵寳覺恵林西曰定慈廣慈普慈智海東京記又曰仁濟殿天聖八年建後與寳奎殿同賜名也景徳寺宋朝㑹要曰本相國寺蔬圃周顯徳中以僧居隘於此别建下院賜額天夀淳化二年别建寺門景徳二年改今額天禧四年建寺廊經樓注東京記曰周世宗顯徳五年以相國寺僧衆居隘就寺蔬圃别建置院分居之俗號東相國寺六年賜額曰天夀恭帝誕節名也又有觀音院峨眉僧茂正所建興國寺談苑曰太平興國寺舊龍興寺也周世宗廢為龍興倉國初寺主僧屢撃登聞鼓求復為寺上遣中使持劍以謂之曰此寺前朝所廢為倉厫以貯寧糧汝何故煩瀆帝庭朝命斷取汝首仍戒之曰儻偃蹇怖畏即斬之或臨刑無懼即未可既訊神色自若引頸就戮上大感嘆復以為寺宋朝㑹要曰唐龍興寺也開寳二年詔重修太平興國元年賜今額傳法院又㑹要曰太平興國五年詔於太平興國寺大殿西度地作譯經院中設譯經堂東序為潤文堂西序為正義堂自是每誕節即獻經也八年改為傳法院按隋有翻經館唐初亦有翻譯之事元和後廢然則太宗之置兹院亦隋翻經館也四大寺五代㑹要曰周顯徳四年九月賜京城内新修四大寺額以天清顯靜顯寧聖夀為名聖夀後又改曰顯聖是則四寺之始也建隆寺在揚州州城西北宋朝㑹要曰太祖征李重進於此置砦賊平建隆二年正月詔建寺焉有御榻在寺太祖忌日寺僧奉榻修供大中祥符五年始於寺建聖容殿元豐中神宗修景靈列聖神御殿故聖容復歸京師崇聖寺在并州舊州城外又㑹要曰舊名平晉寺太祖親征劉繼元行宫也興國中詔建寺賜名後於中設太宗御容大中祥符二年改名崇聖慈孝寺又曰慈孝寺故駙馬都尉吳元扆宅也天聖二年十二月十二日詔建寺奉真宗神御初議名慈聖時太后號有此二字改賜今名東京記曰戒壇院本寺園寳元初僧文旦營創戒壇慶厯五年賜額也開寳寺東京記曰北齊天保十年置號獨居寺唐開元十七年明皇東封改曰封禪寺宋朝㑹要曰開寳三年三月改今名福聖院㑹要云初吳越王錢俶在杭州建阿育王塔藏佛舍利歸朝於此建塔云端拱二年成加建塔院咸平二年賜今額東京記云本新羅僧智照所居舍利塔錢俶興國中令俞皓造慶厯四年六月火焚之後即其舊址建閣焉成於神宗元豐之初慈聖太皇太后以粧錢助成之賜名慶夀崇因或曰仁宗時已為此名其額亦帝所書但藏之禁中未以賜之洎閤成遂出以牓也永安院東京記曰本號普慶太宗在晉邸重建以賜僧普潤仍奏今額崇夏寺東京記曰唐大中三年置建隆中石守信以寺門窄狹重造二年八月門成車駕臨幸宋朝㑹要守信重修二門詔治宫材也應天寺後唐夾馬營也即太祖誕生之地景徳二年真宗每幸二月詔建院奉太祖神御如啟聖制度大中祥符二年賜名應天在西京之水北民間謂之瑠璃寺也啟聖院即太宗誕生之地晉護聖營也太平興國六年建院雍熈二年成賜名啟聖東京記曰本晉䕶聖營天福四年宣祖典禁兵太宗誕聖其地興國中建院也普安院又曰普安院周顯徳中建建隆初賜今額奉先寺又曰奉先資福禪院即安陵卜定乾徳二年改卜五月詔就陵域置院也資聖院在新并州㑹要又曰天禧五年真宗置嘗親征為陣亡將士追福徳神虎三部落營地造天聖初成賜名資聖太祖太宗忌日皆就建道場崇真院又曰崇真院初太宗陳國長公主出家大中祥符二年八月進封吳國號報慈正覺大師賜名清裕九月出居是院初在建初坊後以迫隘徙城西隆安坊即今俗謂七公主院者是也印經院又曰太平興國八年置印經院神宗熈寧末廢其院以所印板賜顯聖寺靈宇廟貌部三十七靈顯王在鄭州城東僕射陂側陂本後魏孝文賜僕射李沖里俗因呼僕射陂唐末建廟因陂為名俗誤傳為李靖後唐明宗天成二年贈靖太保晉天福二年八月勅唐衛國公李靖宜封靈顯王顯聖王廟在寧州真寧縣即要冊湫也漢祠官所領唐乾符中封神為應聖侯光化二年封普濟王宋朝太宗在晉邸有神告之應太平興國二年七月四日封顯聖王按張緒續錦里耆舊傳曰太宗尹天府登極前有邠州客打軍巡引見問爭由曰爭說要冊大王上曰有侵傷不均吾為平之若爭要冊大王外邊商量此盖神告之事耳廣濟王在永康軍導江縣李氷廟也秦孝文王時氷為蜀郡守自汶山壅江灌溉二郡開稻田歴代以來蜀人徳之饗祀不絶偽蜀封大安王孟昶又號應聖靈感王開寳七年改號廣濟王英顯王廟在梓州梓潼縣本梓潼神也舊記曰神本張惡子仕晉戰死而廟存唐明皇狩蜀神迎於萬里橋追命左丞相僖宗播遷亦有助封濟順王咸平中益卒為亂王師討之忽有人呼曰梓潼神遣我來九月二十日城陷果克四年州以狀聞故命追封英顯王新息王辰州新息王廟後漢伏波將軍馬援祠也咸平元年三月本州上言水旱祈禱有應請加封號即今號是也廣濟王宣州敬亭山神也宋元嘉二年有錢塘神梓華友人雙霞識之為神同在廟中縣令盛疑焚之來託此山景福中封昭威侯偽唐保大中封昭威王景徳元年知州裴莊請加朝命故追號廣恵王顯應王在泉州是廟舊封昭徳王天禧三年五月本州言歲旱禱之有應故加封號今顯應王是也順濟王筆談曰彭蠡小龍顯異人人能道之熈寧中王師南征有軍仗數十船泛江而南龍即伏其中乗風日數百里有司以狀聞詔封神為順濟王遣禮官林希致詔祠下英烈王大中祥符五年詔杭州吳山廟神宜特封英烈王神即伍子胥時新葺廟故也徳安公即夷門山神也景徳四年十二月加封號徳安公顯應公在京城北即崔府君祠也相傳唐滏陽令沒為神主幽㝠本廟在磁州淳化中民於此置廟至道二年晉國公主石氏祈有應以事聞詔賜名䕶國景祐二年七月封䕶國顯應公炳靈公五代㑹要曰後唐長興四年七月封泰山三郎為威雄大將軍時上不豫泰山僧進藥小康僧請封之宋朝㑹要曰廟在兖州泰山炳靈泰山神三郎也後唐詔封威雄將軍大中祥符七年十月十五日詔封威雄將軍為炳靈公明應公在潤州即焦山大聖祠也大中祥符七年四月詔特封明應公靈恵公在􅀈州烏聊山即唐越國公華神也郡人立祠大中祥符二年詔封靈恵公靈濟公在梓州射洪縣即瀘州刺史陸弼神也弼貶瀘州有善政卒土人為立廟水旱請禱偽蜀封洪濟王大中祥符六年九月詔封號靈濟公也昭應公在河南府永安縣至道二年十月太宗山陵乏水半山下忽有泉湧山陵使元份以聞詔立廟泉側賜名昭聖景徳四年特封昭應公嘉應侯熈寧間百姓共立東嶽張太尉祠於國城之外東南隅俗傳神姓張氏淮隂人死隸嶽神主隂府要職京東州郡徃徃有祠世謂張舍人者是也至此號太尉元豐中光獻太皇太后祈有感始封嘉應侯號靈恵侯元豐時國城之西民立灌口二郎神祠云神永康導江縣廣濟王子王即秦李氷也㑹要所謂氷次子郎君神也今上即位勅封靈恵侯東嶽諸祠大中祥符元年十月十五日詔封泰山上通泉廟為靈泒侯亭亭山為廣禪侯嶧山神為靈巖侯普濟廟在京城西南隅景福坊即九龍堂也大中祥符四年六月十九日詔令完葺因賜名普濟廟也靈澤廟在鎮戎軍朝那湫即龍廟秦漢所祠湫淵也天禧二年四月八日賜廟名靈澤顯靈廟在河南府永安縣安陵東北即蛇王祠也景徳四年二月賜廟名顯靈靈恵廟在永安門徘徊泉上即泉神也大中祥符五年江守訓立廟遂賜靈恵名焉靈源廟在衛州共城縣即百門水所出也唐長安中置廟咸平元年春祈雨有應四月詔賜廟額曰靈源豐寳廟景徳三年九月解州上言兩池左右祠廟請易題額詔取圖經所載者賜額遂改解縣池龍廟額曰豐寳安邑曰資寳分雲廟曰廣恵注自此以上除嘉應靈恵二侯外其不原所出者皆出宋朝㑹要生祠漢于公為縣吏曹決獄平郡中為立生祠自三代而來無生為立祠者至此始見兹事則生而立祠始於漢世也道釋科教部三十八道釋漢自桓帝考濯龍之宫設華盖以祀浮圖老子由此釋道二教稍稍興矣逮晉室其道始盛東遷之後三教峙立此釋道之所起也符籙龍魚河圖曰天遣𤣥女下授黄帝其信神符制伏蚩尤黄帝出軍決曰蚩尤無道帝討之夢西王母遣人以符授之帝悟立壇而請有𤣥龜銜符從水中出置之壇中盖自是始傳符籙也金寳牌宋朝㑹要曰天禧元年四月詔内出聖祖神化金寳牌分給在京宫觀及外州名山聖跡之處面文曰玉清昭應宫成天尊萬夀背文曰永鎮福地帝自封之命中使送諸路天慶觀今諸郡道正副所掌者是道士黄帝内傳有道士行禮之文此疑謂有道之士也樓觀本記曰周穆王因尹真人草樓之觀召幽逸人居之謂之道士平王東遷置七人漢明帝永平七年置三七人晉恵度四十九人審此即是自周而有也司馬遷班固叙秦漢甚詳洎春秋以來殊無一人以一言彷彿道兹事者亦為可疑矣然范曄後漢書於光武紀論始有言道士西門君恵李守等云劉秀為天子盖前漢末事則道士之初當此矣注列仙傳又有道士浮丘公接周靈王太子晉上嵩髙山者道録續事始引仙傳拾遺曰隋文帝始以𤣥都觀主王延為威儀唐置左右兩街宋朝㑹要曰唐有左右街威儀周避諱改為道録宋朝因之都監又曰太平興國中増置副道録都監首座通舊為八員已上總知教門公事首座又曰首座亦太平興國中増置鑒義又曰天禧五年置首座鑒義分領本街事道官唐髙宗時葉静能入直翰林為國子祭酒姪孫法善𤣥宗時授銀青光禄大夫鴻臚卿又尹愔亦拜諫議大夫道士之命以官自髙宗始也宋朝㑹要曰開寳五年十二月賜道士𤣥秘大師馬志通議大夫階道封後周武帝時衛元嵩封蜀郡公盖道士受封之始也葉法善𤣥宗時亦封越國公道贈唐王知逺贈昇𤣥先生葉法善贈金紫光禄大夫越州都督道士之褒贈盖自王知逺始也道諡梁代陶洪景死賜諡貞白先生則道之諡自梁陶隠居始也道號元魏世祖時賜冦謙之天師之號後漢張道陵亦有天師之稱盖自列子言黄帝之稱牧馬童子曰天師始也唐𤣥宗賜李含光曰𤣥静先生此賜號先生之始也宋朝縁唐事亦有賜號先生處士者真宗陳摶賜號希夷先生神宗時張噩賜號沖靖處士是也道紫唐中宗神龍初葉静能雖加金紫之階而未頒紫衣至代宗時李泌立大功李輔國將不利之泌乞為道士許之又賜紫衣其後道士賜紫自李泌始也朝野僉載曰史崇𤣥附太平公主授鴻臚卿衣紫羅裙帔蓋雖衣之而未賜也佛像漢書霍去病過焉耆山得休屠王祭天金人顔師古注云作金人為天神之主今佛像是其遺法後漢明帝夢金人長大頂有日光傅毅曰天竺有得道者號曰佛於是遣使天竺圖其形像此中國有佛像之始也宋書云漢世始有佛像也佛塔髙僧傳曰康僧㑹吳赤烏十年至建業孫權使求舍利既得之權即為造塔晉帝過江更修飾之此蓋中國造塔之始也佛經漢明帝永平中摩騰竺法蘭以白馬䭾經至東都即四十二章經中國之有佛經此蓋其始也鄴城舊事云永平十年經像初來也譯經漢自永平後摩騰首譯四十二章經歴魏晉南北朝皆有翻經館唐置譯經潤文之官元和後廢宋朝太宗興國中復興其事置譯經院也談禪寳林曰佛涅槃時告迦葉曰吾清淨法服以付汝迦葉傳阿難二十八代至達摩梁普通中自南天竺泛海至廣州後止崇山住少林寺傳恵可中國談禪自此始也讚唄僧史畧曰讚唄原始按十誦律中俱胝耳作三契聲以讚佛後趙石勒時建中神降安邑諷詠經音七日方絕僧有摹寫為梵唄焉此讚梵之始也續搜神記曰晉太元中竺曇遂死作清溪廟神諸道人詣廟便靈語云久不聞唄聲其伴恵範為作之即是自晉已有讚唄非始於石勒時也戒律又曰漢靈帝建寧三年安世髙首出義決律二卷次有比丘諸禁律魏世天竺三藏曇摩迦羅到許洛慨魏境僧無律範遂於嘉平中興曇諦譯四分羯磨及僧秖戒心圖此蓋中國戒律之始也戒壇又曰漢魏之僧雖剃染而戒法未備唯受三歸嘉平正元中既傳戒律立大僧羯磨法斯蓋比丘立戒壇之始也又曰起于南朝求那䟦磨為宋國比丘於蔡州岸受戒為始自爾南北相次為壇受戒又曰北方受戒自魏朱士行為之首也尼壇又曰受戒初本僧尼同壇本朝太祖不許尼徃僧中自是始别為壇宋朝㑹要曰開寳五年二月詔自今尼有合度者只許於本寺起壇受戒蓋自此始别立尼受戒壇也尼戒薩婆多師資傳曰宋元嘉十一年師子國尼鐵索羅等於建康南林寺壇上為景福寺尼恵果淨音等受戒法事北方尼受戒自恵果等始也僧後漢明帝遣蔡愔等徃天竺訪僧法於彼見摩騰乃要還漢地此中國有僧之始也僧史畧曰漢明聽陽城侯劉峻等出家此又中國之人為僧之始也注新唐書傅奕上疏曰浮圖法漢明始立胡祠然惟西域桑門自傳其教西晉已上不許中國削髮事胡石苻亂華乃㢮厥禁此宜中國為僧之始尼僧史畧又曰漢明帝既聽劉峻等出家又聽洛陽婦女阿潘等出家此蓋中國尼之始稱釋髙僧傳曰出家從師命氏晉道安受業佛圖澄澄姓帛氏安以師莫過佛遂以釋為姓僧之稱釋自道安始也度牒僧史畧曰度牒自南北朝有之見髙僧傳名籍限局必有憑由憑由即今祠部牒也唐㑹要曰天寳六年五月制僧尼令祠部給牒則僧尼之給牒自唐明皇始也空名唐食貨志曰肅宗至鳯翔明年鄭叔清議以天下用度不充諸道得召人納錢給空名度僧道則是空名度牒自唐肅宗始也僧隸唐㑹要曰武后延載元年五月十一日勅天下僧尼隸祠部此祠部轄僧之始也唐志亦云僧帳又曰舊制僧尼簿三年一造其籍一本送祠部一本留州縣又開元十七年八月十日勅僧尼宜依十六年舊籍則僧尼供帳始於此耳僧史畧曰唐文宗太和四年正月祠部請天下僧尼具名申省以憑入籍入籍造帳自太和始也二文不同以㑹要為正本朝用周顯徳事三年一造帳定著于令僧講僧史畧曰僧講自朱士行魏代講道行經始也尼講又曰東晉廢帝大和三年洛陽東寺尼道馨通法華維摩硏窮理味一方宗師此則尼講說之始也僧諡洪明集曰後魏太祖時法果卒諡趙胡靈公此僧賜諡之始也宋朝㑹要曰咸平三月八日梵僧法賢卒諡慧辨四年法天卒諡元覺其後施䕶卒亦諡明悟也道林諡真宗寳録曰大中祥符六年六月甲申詔諡誌公真覺大師宜加為道林真覺大師注宋敏求東京記曰祥符五年諡真覺大師明覺諡又曰大中祥符六年六月戊子詔泗州僧伽大師宜加號普照明覺大師僧封洪明集曰元魏封法果輔國宜城子又加忠信侯安城公唐封不空肅國公僧之得封自後魏太祖始也僧贈元魏法果卒贈老夀將軍趙胡靈公此其始也唐亦贈不空司空僧官自隋文帝以沙門彦琮為翻經館學士後始命僧以官及唐又以不空為開府儀同三司試鴻臚卿宋朝㑹要曰太宗時法賢雍熙四年加試光禄卿階朝散大夫其後法天累試鴻臚卿亦加朝散大夫及惟淨以故吳王煜弟從鑑之子為梵學筆受大中祥符後同譯經為試光禄卿也注太祖朝僧元靄亦加朝散大夫階也僧録廣洪明集曰後魏太祖皇始中以沙門法果為統管攝僧徒文帝以師賢為僧統參𤣥語録曰後秦姚萇立道䂮音畧為僧正秩同侍郎法欽慧斌掌僧録給事同吏人此僧立正録之始也又元魏以沙門僧顯為京師統隋天下分置十統呼上統或曰大統唐罷統立兩録司於京邑謂之僧録僧號後秦鳩摩羅什始號法師其後中國名僧亦稱之晉朝講經草堂寺有廟臣大徳沙門千餘人此始有大徳之呼後趙石虎號佛圖澄曰大和尚此稱和尚之始也晉初鳩摩羅炎東渡龜兹王請為國師姚興迎羅什待以國師之初也梁勅慧約云允膺闍梨之尊屬當智者之號此師號之起也唐中宗神龍二年號萬迴曰法靈公姚秦又號羅什為大師則大師之名蓋起於此唐僖宗廣明中賜僧知𤣥號悟達國師僧徹淨光大師可符法智大師徳宣演暢大師自此始為朝廷寵渥之命見事始云僧紫事始云代宗實録曰大厯三年僧恵崇内賜紫袈裟記以為僧賜紫衣之始按贊寧僧史畧曰則天朝僧法明譯大雲經陳符命言法朗等皆賜紫袈裟則僧之賜紫自天后始也不然唐㑹要安得開元二十年波斯王遣僧及烈至唐勅賜紫袈裟還國之事也盖僧賜紫不起於代宗明矣僧褐僧史畧曰漢魏之世出家者多著赤布僧伽梨又秣陵諸僧衣色倣西竺後周忌聞黑衣之䜟悉屏黑色著黄色衣謂今僧衣褐起於宇文周制注按北齊忌黑文宣煞弟煥以七近漆屬黑後果敗於宇文黑獺然則非後周也筆受宋朝㑹要曰太平興國七年六月譯經院成譯經詔梵學僧筆受綴文七月詔左右街義學僧詳定十二月選梵學沙門一人為筆受義學沙門十人為證義其後以惟淨為梵學筆受自此其始也談苑曰譯經常以梵僧後令惟淨同譯經梵學筆受二人譯經綴文二人證義八人唐世翻譯有筆受官以朝臣為之佛陀多羅之譯圓覺經也房融為筆受是矣宋朝太宗始用梵學僧也伎術醫卜部三十九伎術黄帝内傳曰帝既昇為天子命勾芒等司五行於是針經脈訣天文地里卜法筭術吉凶喪葬無不備也凡伎術皆自軒轅始醫帝王世記曰黄帝使岐伯主典醫疾以療衆疾說文曰巫彭初作醫吕氏春秋亦曰巫彭作醫醫書皇甫謐帝王世紀曰黄帝命雷公岐伯教制九鍼著内外經素問之書咸出焉黄帝内傳曰帝昇為天子鍼經脈訣無不備也故金匱甲乙之類皆祖黄帝方書世諸方書藥法雖損益隨時大抵祖述黄帝如脈訣之出於晉王叔和病源之出於隋巢元方湯液經之出於商伊尹傷寒論之出於漢張機千金備急出於孫思邈外臺祕要出於唐王珪宋朝太宗求天下名方集太平聖恵其餘紛紛無代無之髙氏小史曰炎帝作藥方以救時疾小方孫思邈千金方曰小兒六歳以上黄帝無說中古有巫妨始撰顱𩕄經以占夀夭自兹始有小方則小兒方藥始於巫妨也難經帝王世紀曰黄帝命雷公岐伯論經脈旁通問難八十一為難經楊元操難經序曰黄帝八十一難經者秦越人所作按黄帝内難二帙帙九卷其義難究越人乃採精要八十一章為難經本草帝王世紀曰炎帝嘗味草木宣藥療疾著本草四卷至梁陶洪景唐李世勣等注叙為二十卷宋朝開寳中重校定仁宗嘉祐中命掌禹錫等集類諸家叙藥之說為補注本草唐書于志寧傳志寧云班固惟記黄帝内外經不載本草齊七録乃稱之世謂神農嘗藥黄帝以前文字不傳以識相付至桐雷乃載篇册然所載郡縣多漢時疑張仲景華佗竄記其語梁陶洪景本草序云此書應與素問同類其餘多與志寧之說同也百藥淮南子曰神農始嘗百草之滋味當此之時一日而七十毒世本曰神農和藥濟人則百藥蓋自神農始也世紀或云伏犧嘗味百藥非也梁陶洪景本草序曰神農氏王天下宣藥療疾以拯夭傷髙氏小史曰炎帝嘗百藥以治病嘗藥之時百死百生九鍼帝王世紀曰太昊畫八卦以類萬物之情六氣六府五藏五行隂陽四時水火升降得以有象百物之理得以有類乃制九鍼又曰黄帝命雷公岐伯教制九鍼蓋鍼灸之始也明堂今醫家記鍼灸之穴為偶人㸃誌其處名明堂按銅人腧穴圖序曰黄帝問岐伯以人之經絡窮妙于血脈參變乎隂陽盡書其言藏於金蘭之室洎雷公請問乃坐明堂以授之後世之言明堂者以此醫獸續事始曰黄帝時有馬師皇者善醫馬通神明故周禮天官有獸醫夏官有巫馬之職也日者史記日者傳注云古人通卜筮則謂之日者其事則周太卜之職也墨子將北之齊過日者注謂當是周末語然也卜龜曰卜事始曰包犧氏時始有卜春秋元命包曰古司惟主卜也筮蓍曰筮世本曰巫咸作筮古史考曰商時巫咸善筮也吕氏春秋亦云巫作筮歸藏曰女媧筮張雲幕而校占書舜曰龜筮恊從茍筮誠巫咸所作則歸藏與書安得言筮也古史考曰庖犧氏作卦始有筮此蓋其初也三式風后演河圖為一千八百局曰遁甲周太公約為七十二漢張良定為一十八以六甲相遁而起故名遁甲并太一六壬是為三式黄帝内傳曰王母使𤣥女授帝法有九天九地八門六甲之術即今遁甲也蓋自黄帝始占歲世本曰后益作占歲吕氏春秋亦云爾師曠占乃有黄帝欲知歲苦歲樂歲善而占有蓬薺艾先生之說即占歲為起於黄帝雜占晉律厯志曰黄帝使羲和占日常儀占月申區占星氣吕氏春秋曰羲和作占日常儀作占月靈碁異苑曰十二碁卜出自張文成受法於黄石公蓋今靈碁也法以十二子分上中下擲之據所得按法驗之以考吉凶文成留侯張子房之諡也唐事逺碁經序曰靈經不知其所起或云漢武帝東方朔使之占兆无不中朔之術蓋用此又云張子房所師黄石公以之授良又云客以術干淮南王王秘其事亦此書也畫易通封驗曰宓犧方牙倉精作易無書以畫事注云作易以為政而不書但畫其形此畫之起也世本曰史皇作圖宋衷云黄帝臣圖謂畫物象也或曰史皇即蒼頡吕氏春秋亦曰史皇作畫射御易繫九事稱黄帝作弧矢以威天下又曰服牛乗馬引重致逺則射御皆始於黄帝也世本曰臣胲作服牛相土作乗馬􅠽作駕宋衷云皆黄帝臣又曰韓哀作御謂加精巧逄蒙作射謂改制也吕氏春秋作韓哀作御也規矩尸子曰古者倕為規矩凖繩使天下傚焉倕黄帝時巧人百巧山海經曰帝俊生身身生義均義均是始為巧倕始作百巧也事物紀原卷七
