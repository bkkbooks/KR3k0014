  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0014_WYG_005-1a, image: WYG0920/WYG0920-0125a.png}
body:
  text: 事物紀原卷五宋髙承撰三省綱轄部二十二侍中環濟要略曰古官也風后為黄帝侍中周有常伯見尚書立政秦漢為侍中徐堅初學記曰秦取古官置本丞相史也丞相使史五人來徃殿中奏事故謂之侍中後魏始為樞宻之任梁文以為宰相職事唐侍中與中書尚書二令並為真宰相矣門下門下侍郎秦官秦有黄門侍郎歴代不改與侍中俱管門下衆事凡禁門黄闥故號黄門其官給事于黄闥内故云唐天寳元年改曰門下唐百官志云二年也散騎秦置散騎又置中常侍本二官魏文帝黄初初合散騎常侍為一官唐顯慶中分左右左隸門下右中書也給事秦置通典曰加官也初秦漢别有給事黄門之職後漢有給事黄門侍郎左右給事中以有事殿中故曰給事中獻帝時去給事黄門侍郎後周有給事中士别置給事中在六官外隋初開皇六年始于吏部置給事郎煬帝移為門下職唐武徳三年改給事郎為給事中夕拜漢給事中故事每日暮時入對青𤨏門拜故謂之夕拜亦為夕郎諫議秦置諫大夫後漢光武增為諫議大夫歴代不改唐龍朔中屬中書開元後歸門下貞元四年五月分左右以右隸中書二起居周有左右史王言則左史書之動則右史書之盖起居之本也漢武有禁中起居後漢馬后自撰明帝起居注則其事似在宫中古女史之職也此始有起居之名魏晋以降著作掌之後魏有置起居令史别置修起居注隋煬帝置起居舍人唐貞觀二年于門下省置起居郎顯慶中復于中書置起居舍人以郎為左史以舍人為右史諫正唐武后垂拱中置拾遺補闕掌諷諫中宗以來有左右開元時左屬門下右中書會要云垂拱元年二月二十九日也宋朝㑹要曰雍熈五年二月詔改補闕為左右司諫拾遺為左右正言盖太宗欲令諫官修其職業故改其官號也然周禮地官之屬有司諫則周已名官矣唐書朱滔傳建中三年滔僭稱王後二年䀻張遂王道為司諫則滔又以此名立官也中書令舜納言周内史皆中書之任也漢武游宴後庭始宦者典事尚書謂之中書謁者置令不言謁者省文也通典云唐百官志則曰秦始置中書謁者漢元帝去謁者字漢魏品卑而任重隋文帝廢三公府寮令中書令與侍中知政事遂有為宰相職林以謂漢成帝建始四年改中書謁者令曰中謁者令以士人為之魏文帝黄初初改秘書令為中書令也中書侍郎漢武帝置中書領尚書事有令丞郎魏黄初初置通事郎後改曰中書侍郎唐志曰晉加侍字中書舍人初學記曰魏世中書始置通事一人明帝時有通事劉泰是也髙貴鄉公改曰通事都尉尋為通事侍郎晉初置舍人通事各一人東晉各為一職梁始掌詔誥其後除通事直曰中書舍人舍人本周官掌平宫中之政尚書令三代冡宰之職也秦漢置尚書令于百官無所不主漢武元鼎二年始以張安世為之初學記曰秦官也漢因之僕射秦官史記始皇本紀有僕射周青臣是也古者重武以善射者掌事故曰僕射僕射者僕役于射也一云僕主也古有主射以督課漢因秦事自侍中謁者博士郎軍屯永巷洎尚書皆有之成帝建始元年初置尚書五人一人為僕射此盖其始也獻帝建安四年以邵榮為左僕射衛臻為右僕射置左右之始也左右丞秦置尚書丞一人漢成帝建始四年置四人光武始减其二分左右佐令僕之事唐以來在尚書之下宋朝官制改陞在上又為執政官六尚書尚書秦官秦時少府遣吏四人在殿中主發書故謂之尚書劉向新序曰齊宣王為太室香居諫王召尚書尚書之名則七國時已有其官矣晉志曰漢光武始分尚書為六曹通典曰漢初尚書雖有曹名不以為號及靈帝以梁鵠為選部尚書于是始見曹名漢百官表曰成帝建始四年始置尚書四人續事始云尚主也出納王命敷奏萬機政令所由宣選舉所由定罪賞所由正李固曰尚書猶天之北斗斟酌元氣運平四時分行唐會要曰武徳令吏禮兵民刑工貞觀即吏禮民兵刑工光宅元年九月五日改為六官凖周禮通典曰周禮天官冡宰掌邦六典以佐王理邦國漢成置四尚書因事設員非擬于古光武分六曹稍以周禮唐武后遂以吏部為天官户部為地官禮部為春官兵部為夏官刑部為秋官工部為冬官以承六官之制國初以吏兵户刑工禮為次神宗行官制復唐故事又以吏户禮兵刑工為次也子司又曰故事以兵吏及左右司為前行刑户為中行工禮為後行每行各管四司以本行為頭司餘為子司自唐制始也二十四司自秦始置尚書而歴郎曹多寡不等少或十二亦至三十六隋有天下尚書有六曹二十四郎即今都省列曹是也其制自隋始也子司印唐㑹要曰故事凡尚書省除吏部兵部外共用都司印至聖厯二年二月九日初備文昌臺二十四司印本司郎官主之八座後漢以六曹尚書并令僕為八座梁齊亦有稱隋唐至今令僕為宰相故六尚書及左右丞為八座盖其事自漢東京始也六侍郎漢制尚書郎三嵗稱侍郎隋煬帝即位于尚書六曹各置侍郎一人按漢百官表有侍郎秩比四百石也郎中漢制尚書郎初上稱守郎中晉武帝始置諸曹郎中唐以來號正郎武徳三年尚書郎改為郎中按秦有郎中令臣瓚以為主郎内諸官則郎中秦官也員外隋開皇三年尚書二十四司各置員外郎一人以司其曹帳籍則郎置員外自隋文帝始也按漢書恵帝即位賜爵外郎滿六嵗一級則隋置員外郎亦取漢事云爾韋述唐兩京記曰晉宋以來始置員外郎左右司隋煬帝即位尚書都司初置左右司郎一人副左右丞唐又置員外郎諸司號為都公唐書百官志云天后永昌元年置左右司員外郎各一人也吏部漢初曰常侍曹後漢為選部魏始曰吏部按周官司馬之屬有士司為下大夫通典則以為吏部之始疑出于此也司封左傳晉文公為執秩以正其官杜預云謂主爵秩之官盖今司封職也漢尚書有封爵之任後漢馮勤是也北齊有主爵職林曰唐龍朔二年改為司封通典以為光宅元年司勲周禮夏官司馬之屬有司勲掌賞地之法後周始置其官于尚書省通典云後周吏部有司勲上士考功漢京房作考課之法而其職不在尚書光武改尚書三公曹主嵗考課至此始為尚書職魏初置考功亦唐虞考績之事也而周禮亦有考功記云户部周禮地官之掌也漢置尚書四人一主財帛委輸即今户部任矣吳始有户部名通典曰吳孫休即位户部尚書讀奏是也周禮司民掌登萬民之數即户部任也度支通典曰漢張蒼善筭以列侯主計領郡國上計者殆今度支之任也魏文帝始置度支尚書唐以為子司金部周官職金掌錫石丹青之令則金部之職也魏世始置尚書金部郎倉部周官倉人主藏九榖廩人主其數賙賜稍食則倉部之職也魏時尚書始置倉部郎禮部唐虞秩宗周官宗伯皆今禮部之任也後周有禮部不言職事隋以典儀曹其名命自宇文周始也祠部魏代始于尚書置祠部曹盖其官自魏始也歴代因之不改主客漢成帝初置尚書客曹光武分置南北客主于此遂以名曹膳部即周官膳夫也晉有左右士曹北齊曰膳部兵部周禮夏官司馬之職也魏有五兵尚書晉宋為七兵後周始曰兵部職方周官有職方氏掌天下九州之圖隋初有職方侍郎通典曰後周依周官有職方也駕部周官輿司馬校人牧師巾車之職皆駕部之事也魏晉之代尚書始置駕部郎庫部周官司甲掌戈盾弓矢則今庫部也魏尚書始有庫部郎也刑部唐虞之士周禮司冦皆刑部之任也光武謂之賊曹為尚書職後周始有刑部大夫則刑部自宇文周始也都官漢司隸屬有都官從事掌中都官不法事此名官之初也光武改成帝二千石曹掌中都官水火盗賊魏青龍二年始置尚書都官郎佐督軍事比部魏尚書有比部曹通典曰北齊比部掌檢勾事唐天寳十一年改掌諸司公廨公私欠負及勾用度物也司門周禮有司門通典曰後周依周官有司門隋初為司門侍郎煬帝除侍字也工部唐虞共工在周禮為冬官之職漢置民曹光武改主繕修工作池苑魏為左民晉尚書為起部郎後周始曰工部也屯田漢昭帝始置屯田而成帝置尚書郎一人主户口墾田此盖尚書屯田之始也魏代為農部晉始有屯田尚書則屯田名曹在晉世也虞部舜命益作虞周禮有虞衡之官盖虞部設官之本魏始置虞曹郎後周改曰虞部水部周禮夏官有司險掌溝塗盖水部之職也魏尚書始有水部郎符憲儲闈部二十三御史大夫周禮春官宗伯之屬有御史掌贊書戰國時秦趙會澠池各命御史書鼓瑟擊缶之事淳于髠謂齊王曰御史在前則上世皆為記事之官也秦漢以來始糾察風憲然則御史盖周官也秦置御史大夫以為御史之率故曰大夫中丞漢初御史大夫有兩丞一曰御史丞一曰中丞初學記曰秦官漢因之謂之中丞以其别在殿中掌蘭臺秘書外督部刺史内領侍御史故云成哀間更名御史長史光武復曰中丞獨坐後漢宣秉傳曰光武建武元年秉拜御史中丞特詔與司隸校尉尚書令並專席而坐故京師號曰三獨坐今中丞亦循其制始自漢東京迄今為故事也侍御周為柱下史秦時張蒼為御史主柱下方書是也亦為侍御史是則侍御之官始于柱下也漢始有侍御史又有繡衣侍御史盖自武帝置也後漢亦有之隋直曰侍御史漢書朝議以范丹為侍御史是也韓朗以侍御史與三府掾治楚獄是也端公唐侍御史之職有四謂推彈公廨事臺内之事悉主之號為臺端他人稱之曰端公其語自唐始也南床唐制御史故事食坐之南設横榻謂之南床殿中監察不得坐也唯侍御坐焉凡侍御例不出累月而遷南省者故號為南床今猶有是循唐故事也殿中魏蘭臺遣御史居殿中察非法即殿中侍御史之始也監察初秦以御史監理諸郡謂之監察御史盖監察名官之始也隋文帝開皇三年始曰監察御史宋朝㑹要曰太平興國三年以張巽為監察御史先是三院多外任風憲之職用他官領之遂詔正名舉職自此始也宋朝之制凡職事官皆他官領之惟三院御史自是始正其名也裏行唐太宗初置此官自馬周始也初馬周以布衣任事詔令于監察御史裏行遂以名官舊唐書志云貞觀初也龍朔元年八月以王本立為監察裏行唐㑹要以謂裏行之名始于此非也六典亦云始于馬周宋朝行官制始省之續事始曰太宗時疑未以名官自髙宗始以命官云三院唐憲府故事侍御殿中監察呼三院故今亦斥殿中曰殿院監察曰察院自唐室始也六察唐百官志曰監察御史分察尚書省六司興元元年一人察吏禮部一人察兵工部一人察户刑部嵗終議殿最元和中以新人不出使無以觀能否乃命專察尚書省號六察唐㑹要云元和四年五月御史臺奏舊監察御史從下第六人各察尚書省一司是也宋朝㑹要曰國家每入閤國忌臨昧差六察吏察兵察户察刑察禮察工察元豐中神宗始置六察司于御史臺知雜唐武后以來呼侍御曰端公侍御之職四自雜侍臺侍悉總判之故知雜事者曰雜端後又有以郎中員外兼侍御而知雜事者亦呼雜端官制行省之左右廵唐㑹要曰貞元十年四月勑準六典殿中侍御史分知左右廵察其不法之事按六典自明皇時作則左右廵之置亦其時事也通典曰殿中侍御史自開元初知左右廵百僚班序有雜立失言頑而不肅者則以禮罰之是則此制自開元始也李肇國史補曰𤣥宗開元初至天寳末年置御史左右廵使也臺簿漢有此官張忠為御史大夫署孫寳為主簿是也疑漢官云宋朝㑹要曰淳化四年六月始置二人後止一員也檢法唐置御史臺推直官而無檢法宋朝元豐中神宗正官制除推直始置檢法之官六傅夏商雖世嗣而太子之名亦畧矣其師傅之官亦無文至周始見文王世子故禮之所記班班僅可推攷文王世子曰凡三王教世子立太傅少傅以養之太傅在後入則有保出則有師則太傅之原槩舉于此矣武王又稱太子也漢止有太傅少傅至晉有天下愍懐建官乃置太子太師太傅太保有三少為六傅也漢賈誼上疏云保保其身體傅傅其徳義師道之教訓此三公之職也又于是為置三少皆選天下之端士故太子聞正言行正道習與正人居不能無正則六傅之說似漢有之然諸傅無其說亦可疑焉賔客漢髙祖欲易太子吕后用留侯計迎四皓以定太子故賔客之名始起于此孝文為太子立思賢苑以招賔客孝武為太子立博望苑使通賔客洎晉愍懐建宫恵帝使衛庭司馬畧等五人更徃來備賔友雖非官而謂之東宫賔客唐顯慶元年正月以于志寧等為太子賔客遂以名官定置四人盖取法于四皓詹事秦官掌太子家歴代因之通典曰東宫官序秦漢加置詹事庶子及諸府率官也應劭曰詹省也給也漢官儀曰秦官竇嬰景帝即位為詹事孔霸宣帝時為太子詹事庶子禮記燕義曰古者周天子之官有庶子周禮夏官司馬之屬謂之諸子秦置中庶子詹事員漢因之晉以為東宫官晉書鄭黙為中庶子朝官以為太子官是也隋分左右通典曰品官命數篇漢有太子庶子魏有太子中庶子則非晉以為東宫官也少詹唐始于詹事府置少詹事一人以貳詹事諭徳唐龍朔二年初置太子左右諭徳盖取文王世子教之以事而諭諸徳之義太子侍讀漢宣帝詔王褒等皆之太子宫娛侍太子朝夕誦讀此盖其始也宋有諸王侍讀唐貞觀中許叔牙為王侍讀髙宗升春宫仍兼侍讀職林云開成元年十一月宰相李石奏置太子諸王侍讀太子侍講後漢張酺以尚書講論授皇太子其事始見于此魏官品始有太子侍講此置官之始也中舍人晉咸寧中初置大子中舍人官宋朝神宗又置之唐以來有太子中舍而無中舍人舍人秦官唐龍朔二年改為太子右司議郎咸亨元年復為太子舍人宋朝初亦不置神宗正官制復置之翊善宋朝王府之官多省不置别置翊善曰某王府翊善盖古上傅之任而輕其名位也宋朝㑹要曰太平興國中始置也又云八年三月以戴元為衛王府閻象為廣平王府楊可法等為皇太子翊善盖自此始也王侍讀宋武帝初以徐受為晉安王子勛侍讀此王府侍讀之初也唐志曰開元初十王宅引辭學工書者入教亦為侍讀王侍講宋朝省王府餘官而别置侍講一員記室魏置太祖以陳琳阮瑀為記室掾其官始見于魏武之世矣宋用晉制自明帝後皇子弟雖非都督亦置記室參軍則記室而為參軍晉官也宋朝亦置于諸王府曰某王府記室也宫教宋朝會要曰至道元年以孫蠙充皇姪皇孫教授從新號也時中書言唐文宗朝李石奏太子有侍讀諸王亦有無隆殺今皇姪皇孫官是環衛請以教授為名此盖王宫教授設官之初也九寺卿少部二十四九卿禮記曰夏后氏百官始置九卿漢九卿俱不以卿名官梁武天監七年始加卿字少卿後魏官氏志云大和十五年初置少卿以卿為大卿太常亦周禮春官職也秦有奉常漢初改曰太常盖秦官也初學記曰髙祖改漢百官表曰景帝中六年更太常丞秦置官漢為太常亦曰太常丞太常簿漢有之疑漢官太常博士魏官也魏文帝初置之顔師古注漢書曰太常王者旌旗畫日月大事則建以行禮官主奉持之故曰奉常後改曰太常尊大之義也協律郎漢武之置協律都尉以李延年始為之晉改為校尉後魏曰協律祝盖漢武以延年善新聲故特為置協律奉禮郎漢大鴻臚有治禮郎盖設官之始也按通典歴代皆為治禮郎唐初亦有掌設板位執儀行事永徽二年以諱改為奉禮杜佑云奉禮本名治禮國家撰五代史志至永徽七年乃成于時此官已改故北齊及隋治禮皆為奉禮奉禮之名雖見于史其改始自永徽太祝商官六太其一曰太祝在周禮為禮官宗伯之屬掌六祝之詞秦漢有丞隋除令丞止存太祝齋郎魏始有太常齋郎唐有太廟郊社之别唐洎國家其久次者太廟又補室長郊社即補掌坐掌次謂之黄衣選人祖宗以來又以為朝臣子弟起家之官郊社令梁始有太社令後周為司社上士隋于太常寺置郊社署名為郊社令宋朝避英宗嫌名改曰局籍田令周為甸師漢文帝初立籍田乃置令也太醫令周禮天官冡宰之屬有醫師上士下士掌醫之政令聚毒藥以供醫事秦為太醫令丞漢因之宗正周官也在周禮實小宗伯之職宋百官春秋曰周封兄弟之國十有五同姓之國三十有五選其宗中之長而董正之謂之宗正秦因其說置宗正兩漢晉授皇族不雜姓晉始兼庶姓也舊唐志曰星經有宗正在帝座東南漢髙紀七年二月置宗正官以序九族宗正寺丞漢置官亦用公族宗正簿梁置官也宗正司林希兩朝寳訓曰景祐三年仁宗謂輔臣曰宗室子孫衆多聚居必以尊賢者糾合之詔置大宗正司擇祖宗後各一人命之首以濮安懿王與守節任其事後又有同姓庶官知丞事神宗時乃參用光禄漢書曰秦郎中令掌宫殿掖門武帝太初元年更名光禄勲通典云梁除勲字曰光禄卿續事始曰秦掌宫殿門户郊祀主諸郎將在殿中侍衛北齊兼掌膳隋全掌諸殽膳不掌宮殿光禄丞簿皆漢所置應劭曰光明也禄爵也太官令周官膳夫庖人外饔皆其任也秦置太官令屬少府漢不改晉屬光禄後魏分太官為尚食知御膳太官掌百官之饌衛尉秦官也掌宫門衛屯兵之職尉罻也古兵獄之官皆以尉言所以罻羅奸邪也衛尉丞簿皆秦漢所置也太僕周禮夏官司馬之屬有太僕下大夫尚書冏命穆王命伯冏為周太僕正則太僕周官也應劭曰盖大卿衆僕之長太僕寺丞秦漢有此官也太僕簿梁始于太僕置主簿大理齊職儀曰古官也管子曰黄帝得后土辨于四方使為理春秋元命包曰堯為天子得臯陶為大理舜時為士官韓詩外傳有晉文公使李離為大理春秋左氏傳衛侯與元咺訟士榮為大理寺序楚昭王石奢為理則大理之名自古有矣秦為廷尉漢景帝中元中更名大理盖漢復古號也舊唐書志曰取天官貴人之牢曰大理之義即周禮士師之職孟詵錦帶前書載三代法官之名周曰士夏曰大理也大理寺丞晉武帝咸寧中曹志請廷尉置丞北齊曰大理也大理簿通典所載自魏晉以來歴代皆有之是疑魏置官大理正秦置廷尉正禮記曰獄成告于職之正注云正周禮鄉師之屬則秦之置官亦法周也其名亦隋改云司直後魏永安二年御史中尉髙穆奏置大理司直漢武初置司直之官屬丞相府謂之丞相司直疑大理之置司直亦取漢丞相司直為名爾淮南子曰湯有司直之人許慎注云司直官名詩鄭風曰邦之司直然則漢之令官亦法古爾評事漢宣帝地節三年初置廷尉左右評魏晉無左右直曰評隋煬帝始曰評事鴻臚周官大行人也干寳曰亦周禮象胥之職漢書曰秦為典客掌諸侯四方歸義蠻夷漢改曰大鴻臚徐堅云漢改之漢百官表曰太初元年更也梁除大字應劭曰鴻聲臚傳之也傳聲贊道也劉熈曰鴻大也臚陳也欲大以禮序陳賔客也馮鑑續事始曰楚云連敖漢為典屬國按漢世典屬國自為一職非鴻臚之任也鴻臚簿唐因陳隋之舊有鴻臚主簿一人鴻臚寺丞秦典丞也其名盖隋所改司農少昊九農正也舜為后稷秦為治粟内史漢景更為大農令武帝太初元年改曰大司農魏文帝黄初中止曰司農司農寺丞秦治粟丞也漢置丞十三人為勸農官後改司農亦曰司農丞司農簿晉太康中始置司農主簿太府周禮天官冡宰之屬有太府下大夫梁武帝天監七年始置太府卿續事始則云梁天監中置少府卿後魏大和中改太府丞簿周禮太府上士即丞職也下士即簿職也梁置太府卿則丞簿二官亦梁置也續事始曰魏也秘殿掌貳部二十五秘書監漢桓帝延熈二年始置秘書監一人秘書少監隋煬帝始置秘書少監一人秘書丞齊職儀曰漢獻帝置秘書令丞二人魏文帝分秘書别掌文籍自置丞一人此盖置官之始也或曰魏武帝置也秘書郎通典曰後漢馬融為秘書郎當是其官自漢置也職林曰魏官也初漢置秘書郎盖中書之任魏分秘書掌文籍為秘書郎中宋除中字校書郎又曰西漢蘭臺後漢東觀皆藏書之室當時文士讎校于中故有校書之職而未為官後以郎居其任故謂之校書郎元魏始命以為官續事始曰續漢書云成帝置以傅毅馬融為校書郎掌審定讎校圖書正字漢桓初置秘書監掌圖書古今文字考合同異今正字之官盖其遺意也齊集書省有正書官北齊始為正字著作郎漢東京使名儒碩學入直東觀譔述國史謂之著作以他官領之未以為官也魏明帝太和中始署著作郎晉元康二年又謂之大著著作佐郎魏氏又置佐著作郎宋齊已來遷佐于下曰著作佐郎太史令少昊鳯鳥氏為厯正夏后曰太史周禮為春官宗伯之屬秦為太史令唐乾元元年改曰司天監宋朝神宗正官名復為太史令太史正唐長安二年置太史令二人開元以後以令為監改令一員為少監國家亦曰司天監少監官制改除少監置太史正太史丞司馬彪續漢書曰太史有丞一人歴代同之疑漢官也直長後漢有太史長隋城門御府殿内皆有直長而太史無之宋朝正官神宗始置太史直長五官正通典曰唐乾元元年改太史局為司天置五官正謂春夏秋冬中五官也靈臺郎唐改太史為司天監掌天文厯數風雲氣色吳小史有靈臺郎時乾元元年也保章正周禮春官宗伯之屬有保章氏掌天文以志星辰日月之變動辨其吉凶此盖其官之始也唐乾元元年改監其小吏有保章正則是唐改周官保章氏為正也挈壺正又夏官司馬之屬有挈壺氏掌挈壺以令軍井然則亦周置官也唐乾元元年始改太史為司天其小吏有靈臺郎保章正也殿中監魏始置殿中監盖分門下太僕二局以為其職也殿中少監隋煬帝大業中初置殿内少監唐復殿中之名亦曰殿中少監殿中丞此官盖與少監同隋大業三年所置也其名改易同少監云奉御北齊門下省初置典御之官隋改曰奉御以隸殿中省尚食如淳曰掌天子之物曰尚秦置六尚乃有尚食則尚食秦官也尚藥梁陳以來皆為太醫兼職亦秦所置六尚之一也尚醖唐已前有尚乗無尚醖宋朝元豐中官制行則置此官也尚衣周有司服為禮官之屬戰國始有尚衣尚冠之職北齊制主衣隋復曰尚衣也左氏曰昔虞閼父為周陶正注云陶復陶也陶正主君上之衣服此尚衣之始也尚舍周禮天官有掌舍凡舍事則掌之漢官有守宫舍于魏則殿中職也隋煬帝别置殿内監改舊殿中局曰尚舍尚輦周官有巾車秦漢為車府令隋煬帝初置殿内省置尚輦也五監總率部二十六國子祭酒孫卿在齊為三老稱祭酒漢吳王濞為劉氏祭酒又漢博士内聰明有威重者一人為博士祭酒胡廣曰凡官名祭酒皆一位之元長古者得主人饌則老者一人舉酒以祭地故以祭酒為稱晉咸寧中初立國子學始置國子祭酒六帖曰堯典克明峻徳以親九族九族既睦平章百姓周封兄弟同姓成王時彤伯為祭酒主親屬秦漢因之又曰髙祖七年自櫟陽從長安置祭酒官續漢書有祭酒一人掌録叙王國嫡庻及宗親逺近郡國嵗所上宗室名通典云國子司業隋煬帝大業三年始于國子監置司業官取禮記樂正司業之義國子監丞亦隋官置與司業之官同置也國子主簿北齊初置國子主簿國子博士班固云六國時徃徃有博士漢多至數十人晉武初立國子學始置國子博士之官漢百官表曰博士秦官通古今太學博士通典曰漢武建元五年初置五經博士按趙岐孟子題辭云漢興孝文欲廣㳺學之路論語孝經孟子爾雅皆置博士後罷傳記愽士獨立五經而已此今太學博士之職也自江左増置國子博士十六人始謂之太學博士品服同國博神宗元豐中官制行改舊直講之官復置太學博士職如經博士也武學博士宋朝神宗熈寧中即武成王廟建武學置教授如國子監置講官制行亦改為武學博士律學博士晉初置律學博士屬廷尉衛覲奏請置律學博士輔相教授唐移屬國子監唐志曰武徳初也太學正録宋朝仁宗時胡瑗掌太學其正録第補諸生以為學校職掌然不以命有官者神宗熈寧末興三舍始勅授命官亦為學官之例少府監秦置少府漢以來為九卿後魏孝文太和中易官品改少府曰太府隋煬帝大業五年又分太府監盖少府之名本起于秦而為監自隋始也秦掌山海池澤之稅其屬官有尚方典工作事今少府所職乃漢尚方之事云少府少監隋始以少府為監又置少監以貳監事少府監丞漢所置官少府主簿晉初置之將作監少昊五雉為五工正與唐虞之共工周官考工之所記皆將作之任也秦始置將作少府漢景帝更為大匠隋開皇中改將作寺曰監故大匠之名亦更為監將作少監隋開皇二十年改將作大匠為大監初加置副監煬帝大業五年改曰少監將作監丞漢置將作丞隋改監亦曰監丞將作主簿晉將作置主簿員軍器監後周武帝初置軍器監則其官自宇文周始也軍器少監唐開元三年始于軍器監置少監及丞簿都水使者舜命益作虞盖掌山澤之官周禮地官司徒之屬川衡澤虞即都水之任也秦始有都水長丞漢武元鼎二年初置水衡都尉又以都水官多復置左右使者此盖設官之始也晉武省水衡置都水使者自此官名乃定都水監丞秦有都水丞漢又有水衡丞盖武帝置水衡即置之也晉除水衡有都水丞亦先秦之舊云都水主簿晉初于水衡有其官後隨府改也環衛中貴部二十七上將軍史記曰義帝以宋義為上將軍漢以吕禄為上將軍魏黄初中有上大將軍唐貞元二年九月諸衛上將軍也老子曰君子用兵則貴右是以偏將軍處左上將軍處右說苑田忌奔楚王問齊楚相并柰何對曰齊使申孺將則楚發五萬人使上將軍將之則是春秋逮戰國始有上將軍之官也大將軍戰國時始有大將軍之號隨事即置亦不主官劉劭爵制以謂秦十八爵大庶長即大將軍也左右庶長即左右偏裨將軍也楚懐王與秦戰秦虜其大將軍屈丐是也項羽時范増稱大將軍漢遂置大將軍開府如三公至煬帝于諸衛悉置將軍周禮天子六軍軍萬二千五百人其將皆命卿盖在國稱大夫在軍稱將軍自晉獻公作二軍而公將上軍故將軍之名特出于此左傳閻沒女寛皆謂魏獻子為將軍後漢百官志云初漢武將軍始自秦晉以為卿號七國皆有其事漢以來其命官之名極多謂之雜號也諸衛左傳楚潘崇掌環列之尹謂宫衛之官列兵而環王宫漢京師有南北軍掌理禁衛武帝初置衛將軍此名衛之始也秦有衛尉掌門衛則衛亦先秦之舊制爾晉武重兵官選清重之士置中軍以統諸宿衛此諸衛之始也金吾衛秦有中尉漢武帝太初元年更名執金吾盖取執金革以禦非常也周隋為武侯之職唐龍朔二年改左右金吾采古名也左右衛漢有衛將軍魏末晉文王又置中衛武帝受禪分中衛為左右衛㑹要云唐武徳元年因隋舊制有左右翊衛五年去翊字但曰左右衛矣驍衛漢有驍衛將軍謂之雜號武帝始以李廣為之梁武帝天監六年分左右武衛後漢末曹公為丞相有分營魏武帝置武衛將軍隋始分左右續事始曰魏許褚從太祖破馬超遷武衛中郎將武衛之號自褚始也屯衛隋初為領軍府煬帝改為左右屯衛唐為威衛五代周太祖時避名復曰屯衛也六帖曰漢宣帝即位初置屯衛領軍衛魏武為漢丞相相府自置領軍非漢官也建安十二年改中領軍文帝受禪始置領軍將軍晉武初有左右監門衛舊唐志曰漢魏曰丞門校尉隋初有監門府將軍唐龍朔二年改府為衛千牛衛宋謝綽拾遺千牛刀人主防身刀也義取莊子庖丁解割千牛而刀刃若新發硎之義故後魏有千牛備身掌執御刀唐顯慶五年始置左右千牛府龍朔二年改府曰衛諸率自秦漢始有諸率以為東宫禁衛晉始置五率歴代因革不常遂分左右也府率秦官也晉武建東宫始置率此其始也副率隋制諸率府各置副率掌貳率事衛率秦置衛率府後漢主門衛晉武太始五年分左右司禦率隋文帝制左右宗衛其官如左右衛煬帝改曰率唐龍朔二年改為左右司禦衛後復曰率清道率隋文帝置左右虞侯各置開府一人唐龍朔二年改為清道衛開元初為率府監門率隋有左右監門率掌門禁唐志曰武徳五年改左右宫門率也内率隋置左右率掌禁内侍衛唐為左右内率舊唐志曰隋初置左右内率府擬上臺千牛衛也南班筆談曰宗子授南班官世傳王曽為相日始開此議不然也故事宗子無遷官法唯遇稀曠大慶則遷一官景祐中初定祖宗並配南郊宗子縁大禮乞推恩自此遂有南班之授近屬自初除小將軍七遷為節度使遂為定制熈寧元豐間袒免之外例授小使臣同庶官也内常侍秦置中常侍官叅用士人給事殿省隋避諱改内常侍内給事周禮内小臣之職也後魏有中給事中後為中給事煬帝改曰内丞直唐曰内給事神龍元年内侍省屬有内給事八人是也宋朝不置臨事或攝都知宋朝㑹要曰國初有内中髙品都知押班今置都都知副都知並在景徳三年五月云爾然則其官自國家始也押班國初有内中髙品班院有押班後隨省改易其名號宋朝㑹要曰初押班無他職或加檢校官淳化後始以崇班以上充此押班之始也内供奉宋朝㑹要曰雍熈三年置入内供奉官大中祥符二年二月宣入内内侍省供奉官改為入内内侍省内東西頭供奉官内侍省供奉官亦同此例殿頭又曰大平興國八年始有入内殿頭髙品大中祥符三年二月宣入内内侍省殿頭髙品為内侍殿頭髙品宋朝太宗興國八年又置髙品至真宗祥符二年始為内侍髙品云髙班又曰雍熈三年置入内髙班内品大中祥符二年二月宣改髙班内品曰髙班黄門漢明帝永平中始置小黄門宋朝會要曰國初黄門初補止曰小黄門經恩遷即為黄門黄門盖漢官也歴代有黄門侍郎今門下侍郎是也内品宋朝㑹要曰雍熈三年置入内髙班内品祥符二年改定有衹候髙班内品衹候内品小内品雲韶部内品小内品入内内品掌門内品後苑内品散内品等神宗正官止存内品之名餘皆省也事物紀原卷五
