seq: 1
front:
  text: 事物紀原序事物紀原序盈天地之閒唯萬物亙古今有事變焉物有萬殊事有萬變而一事一物莫不有理亦莫不有原不窮其理則無以盡吾心之知不究其原又曷從而窮其理哉故聖門之學以格物致知為先文學之士以博問洽識為貴而一物不知又儒者之所恥也夫以有限之見聞而究無窮之事物況載籍之繁汗牛充棟雖矻矻窮年而欲其知無不盡亦難矣此事物紀原之所由作也敬少遊郡庠時國子祭酒頤庵胡先生致政來歸居城南別墅敬以鄉子弟摳衣門牆考德問業啟益良多先生嘗以是書授敬曰子詳觀而識之亦格物窮理之一助也敬拜受而伏讀之不啻溯黃河之流於崑崙而知其源之所自也大而天地山川小而鳥獸草木微而陰陽之妙顯而禮樂制度古今事物之變靡不原其始推其自而詳其實也初學之士得而閱之則事事物物之原悉瞭然於心目之閒亦可以知其概矣其為益也不既博哉正統甲子敬以偕計上京師既而卒業太學得與交天下之士因相校讎而考訂之今年以省親歸家君命敬曰文章公器也盍與同志之士共之毋如蔡邕祕論衡於帳中而見譏於君子也遂鋟梓以傳俾四方學者皆得以廣其見聞是亦先生之教之所及抑固家君之志也書凡十卷紀事一千八百四十有一作者逸其姓氏不可考正統十二年歲在戊辰秋八月望日南昌閻敬書正統甲子歲余忝試京闈獲覩事物紀原一帙於書舍中乃今祭酒江右頤庵胡先生之所傳南平趙弼先生之所刪訂者也余忯而易之以金以歸不啻懷瑾握瑜檢閱殆徧三復而歎曰天地之閒廣輪之內亙古及今其事軫轉其物轇轕何者非事何者非物事事物物皆有本原不求其原譬猶覩黃河而不知其出於崑崙也觀天地而不明其由於渾沌也欲知其原或一事載於數書或一物見於群議雖談叟不能徧觀而盡識總龜不能一覽而無餘果智不如蛛以為一事一物既皆散見於傳記自非裒集成書雖皓首有不能涯涘者矣紀原之作端在於斯余於世故未究源委有所懠疑輒以質之實多裨益尚慮天下古今事變不一鄉言俚語亦皆有由是書囊括殆有未盡景泰改元叨與鄉舉亦於書坊得此全集乃頤庵所傳之舊本南昌貢士閻敬之所校正者也觀其所載自天地生植以至蟲魚禽獸幾二千事蒐獵經史考古驗今分門析類校之刪本事倍而詳然趙則固多刪正其閒或舉其中而不求其本或原其始而不要其終雖虛幻難信者可刪然皆有所考據既不繫乎彝典又非排抵之書其於陰陽造化禮樂名物亦多有助矧易紀龍戰於野詩紀玄鳥生商春秋紀變故事之出於古而流於今者皆所當紀也於以參裨得失於以廣其聰明非徒無益於事而已矣若紫姑之驗來事麻胡之恐小兒見於他書今俗猶行而趙則削之天書降於宋之真宗乃詭誕之事遂有天慶天祺之節趙則存之宮室之下本四合雒紀始教人穴居舊本以為合雒紀四始今則正之進賢冠鍾馗華表之類彼此俱有闕文今則足之余非辯捷敢以滑稽亂文第以所載之事猶有遺珠之歎特識見疏淺瑣事蝟紛未能裒多益寡其於金根金銀之謬考究未詳惟似是似非而疑似者不敢不辨也且又率意批點以便初學遂質諸寅長太守長垣胡公二守扶風李公通府開州程公眾以為可受梓於余刻木以廣其傳俾余序其始終予惟醉經飫史士子恆業多聞多見儒家所尚然非格物致知以窮其理廣求博採以資其學將見聞見孤寡遇事執迷接談有及未免左右言他束手忸怩不能為世之有無也是書誠多聞多見之捷徑格致窮理之蓍龜學者茍能熟讀潛玩溯流尋源則涉獵酬對泛應曲當無所不可矣此頤庵所以珍重而後學所當為至寶博雅君子再加增益而是正之固所望也成化八年歲次壬辰秋七月望日平陽府通判成安李果書
