body:
  text: 旗旐采章部第十三幰弩幰音顯古今注云漢京兆河南尹執金吾司隸校尉皆使馬前導引傳呼使行者止坐者起四人持角弓箭走及乘高窺瞰者皆射之魏設而不用今鹵簿又以幰弩而不以弓亦弛而不用行則居前由魏始也幰者車上張繒也車輻古今注曰棒也漢朝執金吾金吾亦棒以銅為之黃金塗兩頭謂之金吾御史大夫司隸校尉亦得執焉御史校尉郡守都尉縣長之屬例皆木為吾用以夾故謂之車輻一曰形如車輻故云也宋朝會要曰形如車輻今剡木漆八稜勘箭筆談曰大駕鹵簿中有勘箭如古之契勘也其牡謂之雄牡箭牝謂之闢仗箭本胡法也熙寧中罷之警蹕周禮夏官隸僕掌蹕宮中之事注謂止行者自漢以來天子出稱警入稱蹕古今註曰所以戒行徒也周禮蹕而不警秦制出軍者皆警戒入國者皆蹕止故云出警入蹕一曰蹕路也謂行者皆警於塗路也蓋始于周制皁纛六典曰後魏有纛頭宋朝會要曰皁纛本後魏纛頭之制唐衛尉纛居其一蓋旄頭之遺像犦矟宋朝會要曰犦擊聲也一云象犦牛善鬭字從犦唐金吾將軍執之今制如節加碧油殳古今註曰殳戟之遺象也詩所謂伯也執殳為王前驅殳前驅之器也以木為之後世澆偽無復典刑以赤油韜之亦謂之油戟亦曰棨戟王公已下通用為前驅蓋周制周官考工記曰廬人為殳此其始也餘見五兵牙門宋朝會要曰古者天子出建大牙今制錯綵為神人象中道前後各一左右道五門門二旗蓋取周制立旌表門及天子五門之制玉兔旗又曰乾德六年太祖親郊有司請以國初以來祥異著旗章遂作金鸚鵡玉兔馴象三旗注云建隆二年隴州楊勳獻鸚鵡鄆州姚光輔獻白兔及馴象自來為三旗也攝提旗又曰建隆四年將郊祀禮儀使陶穀建議取天文北角攝提之象作攝提旗及北斗二十八宿十二辰五嶽五方神五鳳四瀆等旗也龍旗開寶通禮新加然則蓋自宋朝新制也謂風伯雨師雷公電母各一五星五左右攝提二北斗一也鈒史記趙良謂衛鞅曰君之出也操闒戟者旁車而趨續漢書輿服志曰漢大駕前驅有鳳凰闒戟鈒闒字同然則疑秦制也罕罼通典曰武王剋紂百夫荷罕旗以先驅後漢有九游雲罕西京雜記曰漢大駕有罕罼在左右則是漢始制此二物晉輿服志五時車後次華蓋中道左罼右罕宋朝會要曰象罼為天街故為前引皆赤質金銅飾朱藤結網金獸面罕方上有二螭首銜紅絲拂罼如圓扇黃麾通典曰黃帝振兵設五旗五麾則黃麾制自有熊始也宋朝會要曰麾古有黃朱纁三色所以指麾也漢鹵簿有前後黃麾今制絳帛為之如幡采成黃麾字古今註曰麾所以指麾武王執白旄以麾是也乘輿以黃諸王以朱刺史二千石以纁氅宋朝會要曰氅本緝鳥毛為之唐有六色孔雀大小鵝毛鷄毛之制隋書禮儀志曰梁武受禪於齊多循其儀物御仗其赤氅青氅於此已有氅制矣儀鍠宋朝會要曰鉞屬也秦漢有之唐用為儀仗古今註曰秦改鐵鉞作鍠秦製也白幹槍又宋朝會要曰矟也唐羽林所執制同矟而鐵刃上綴朱絲拂隋志記齊梁四代儀中亦有此物疑晉宋以後以為仗衛也班劍又曰本漢朝服帶劍取五色班闌之義開元禮義纂曰漢制朝服帶劍晉代之以木謂之班劍宋齊謂之象劍儀刀二儀實錄曰儀刀自東晉多虞遂以木代之以備威儀即衙刀也宋朝會要曰銀飾王公亦給御刀宋朝會要曰晉宋以來有之黑鞘金花銀飾靶厄紫絲絛引駕旗皇祐大饗明堂記曰引駕旗唐禮令無文開寶通禮新加謂十二辰天王二等旗也龍墀旗又曰龍墀旗唐禮令亦無文開寶通禮新加謂天下太平一五方各一君王萬歲一日月各一合璧旗漢書律歷志曰武帝選治歷者造太初歷復使淳于渠陵覆歷晦望弦朔最密太初元年十一月甲子朔旦冬至七政周起牽牛初度日月如合璧五星如連珠大饗明堂記曰宋朝取此義制二旗并以禮物謂日月合璧一苣文二夾之五星連珠一祥雲二夾之五嶽旗大饗明堂記曰五嶽五方神五龍五鳳四瀆神等旗宋朝新制方繖宋朝會要曰方繖古張帛避雨之制今有方繖大繖則是繖之制始於古張帛也雉扇古今註曰起於商高宗有雊雉之祥服章多用翟羽周以為王后夫人之服飾車之有翣織雉羽為扇以翳風塵漢乘輿服之後以賜梁孝王魏晉以來為常雖諸王皆得用之毬杖宋朝會要曰毬杖非古蓋唐世尚之以資玩樂鳴鞭又曰唐及五代有之周官條狼氏執鞭趨辟之遺法也然則鳴鞭雖始於唐亦本周事也旂常周禮巾車玉輅建太常疏曰按司馬法云章夏以日月上明商以虎上威周以龍上文釋名曰日月為常畫日月於旗端言常明也云自夏后始奚仲為夏車正加以旂常於是斿就有差用明尊卑之別朱團扇宋朝會要曰本漢世長柄扇宋孝武時詔王侯鄣扇不得用雉尾故王公以下有朱團扇疑自此其始也金節又宋朝會要曰金節隋制也八層黃繡龍袋籠之周禮六節山國用虎土國用人澤國用龍三節皆金為之則防別金節取茲義爾節周禮地官之屬掌節有玉角虎人龍符璽旌等節漢文有旄節之制西京雜記曰漢大駕鹵簿有節十六在左右則漢始用為儀仗也筆談曰古節如今虎符其用則有珪璋龍虎之別皆櫝將之英蕩是也漢人有持節乃古旄也然則節自周始而旄節則起於漢也果按掌節掌守邦節而辨其用以輔王命華蓋古今註曰華蓋黃帝與蚩尤戰常有五色雲氣金枝玉葉止于帝上有花蘤之象故作華蓋筆談輦後曲蓋謂之筤兩旁夾扇通謂之扇筤皆繡亦有銷金者即古華蓋也今殿上寶蓋是也旌管子曰舜有進善之旌則旌為起於虞帝旃世本曰黃帝作旃俾倪宋朝會要曰漢乘輿用之如花蓋而小疑漢始制之也負圖旗宋朝會要曰建隆中將郊祀太祖又詔別造大黃龍負圖旗一大神旗六日旗一月旗一君王萬歲一天下太平一獅子二金鸞金鳳各一玉龍五凡二十一旗皆有架南郊用之大黃龍負圖旗陳于端門前餘二十旗悉立於宿頓宮前朝會冊禮亦陳于殿庭也曲蓋古今註曰曲蓋太公所作武王伐紂大風折蓋太公因折蓋之形而制曲蓋雞竿楊文公談苑曰杜鎬言金雞肆赦不知起於何代關東風俗傳曰宋孝王問司馬膺之後魏北齊赦日立金雞事膺之曰按海中星占云天雞星動為有赦蓋王者以天雞為度隋書刑法志北齊赦日令武庫設金雞及鼓於𨵗門右撾鼓千聲宣赦建金雞或云起于西涼呂光未知孰是究其旨蓋西方主兌兌為澤雞者巽神巽主號令故合二物置其形楬于長竿使眾覩之唐百官志曰中尚令赦日立金雞於仗南有雞黃金飾首銜絳幡承以采盤維以絳繩教坊小兒得雞首者官以錢購或取絳幡而已蓋此禮起於有唐也旌節呂氏春秋曰墨者田鳩見楚王王悅之得將軍之節將軍賜節戰國已然周禮六節道路用旌節孟詵錦帶前書云以竹為之使人執導之又周使節四旌節其一也隋書禮儀志曰後周制有旌節畫白獸而析羽於其上唐車服志曰高祖初大將出賜旌以顓賞賜節以顓殺旌以絳帛五丈粉畫虎銅龍一首纏緋旛紫縑為袋油囊為表節懸畫木盤三相云數寸隅垂赤麻餘與旌同此蓋唐制也冠三禮圖曰緇布冠始冠之冠也太古冠布然則冠之興其始自太古乎通典曰上古衣毛帽皮後代聖人見鳥獸冠角乃作冠纓黃帝始用布帛或曰黃帝已前用皮羽也六帖曰孔子作緇布冠誤矣冕說文曰黃帝初作冕世本曰黃帝作旃冕宋衷云冠之垂旒者通典曰黃帝作冕垂旒目不邪視也充纊耳不聽讒言也應劭曰周始垂旒杜佑云宋更名平天冕故今人亦以為稱也弁世本曰魯昭公作弁而禮記稱三王共皮弁素積然則弁蓋三代之制非魯昭公所能作也宋均謂作素弁是則始以素為弁矣孔子麻冕禮也今也純儉吾從眾孔子之時冕已用純則冕弁之以絲自魯昭公始也簪桓寬鹽鐵論曰禹治水墮簪不顧簪始見此古今注曰女蝸為簪以貫髮亦簪之始矣其與冠纓同興乎纓董巴輿服志曰上古衣毛而帽皮後代聖人易之見鳥獸冠角髯胡遂作冠冕纓緌淮南子亦云沿革曰唐虞已上布冠無緌謂纓其始於堯舜乎幘隋禮儀志曰幘按董巴云起於秦人施於武將初為絳帕以表貴賤漢文時加以高頂孝元額有壯髮不欲人見乃始進幘又董偃綠幘東觀記云賜段熲赤幘故知自上下通服之皆烏也廚人綠馭人赤輿輦人黃駕五輅人逐車色其承遠遊進賢者施以掌導謂之介幘承武弁者施以笄導謂之平巾通天蔡邕獨斷曰通天冠漢制之秦禮無文貂蟬一曰武弁大冕侍中冠之金璫左貂昔趙武靈王胡服也秦始皇滅趙以賜侍中故為侍中之服長冠漢書高祖紀曰帝為亭長乃以竹皮為冠令求盜之薛治之及貴常冠所謂劉氏冠漢以來曰長冠通典曰漢高帝採楚制制長冠形如板以竹為裏亦名齊冠以高帝所制曰劉氏冠果按長冠以竹始生皮為冠今鵲尾冠是高山後漢志胡廣曰齊王冠秦滅齊以賜謁者服之董巴志曰一曰側注傅子曰魏明帝以似通天乃毀變其形除去卷筩今如介幘幘上加物以象山峰法冠後漢輿服志曰法冠一名柱後惠文或謂之獬豸冠獬豸神羊能別曲直楚王嘗獲之故以為冠楚執法者服之御史是也淮南子曰楚文王好服獬冠楚國效之注云獬豸冠也當是楚文王所制進賢古緇布冠之遺象也董巴以為文儒之服漢官曰平帝元始五年令公卿列侯冠三梁二千石兩梁千石以下一梁梁別貴賤自漢始也幞頭二儀實錄曰古以皁羅三尺裹頭號頭巾三代皆冠列品黔首以皁絹裹髮亦為軍戎之服後周武帝依周三尺裁為幞頭此得名之始也至唐馬周交解為之用一尺八寸左右三攝法三才重繫前腳法二儀唐會要曰故事全幅皁向後幞髮俗謂之幞頭周武帝建德中裁為四腳正觀中太宗謂侍臣曰幞頭起於周武蓋取便於軍容其巾子則自武德中始用按穆宗朝帝好擊鞠而宣喚不以時諸司供奉人急於應召始為硬裹裝於木圍之上以侍倉卒五代末梁高祖始布漆於紗施鐵為腳作今樣也筆談曰唐惟人主用硬腳晚唐方鎮擅命始僭用之宋朝有直腳等五等惟直腳貴賤通服也續事始云隋大業十年牛弘請著巾二以桐木為之武帝中初置平巾小樣又云武后內宴賜百寮絲葛巾子帽通典曰上古衣毛帽皮則帽名之始也周成王問周公曰舜之冠何始曰古之人上有帽而句頟或云義取覆其首本纚也古者冠下有纚以繒為之後世施幘於冠因裁纚為帽上下通服之玄中記曰旬始作帽漢櫂船者著黃帽晉王濛破帽入市則歷代皆有之五代梁始漆為今樣吳處厚青箱雜記梁仁宗天聖前烏帽惟用光紗自後始用南紗迨熙寧中復稍稍用光紗矣蓆帽實錄曰本羌人首服以羊毛為之謂之氈帽即今氈笠也秦漢競服之後故以蓆為骨而鞔之謂之蓆帽女人戴者四緣垂下網子以之蔽今世俗或然吳處厚青箱雜記曰王衍在蜀好私行恐人識之令民戴大帽則世俗之戴蓆帽始於王衍也大帽又曰大帽野老之服也今重戴是本野夫嵒叟之服唐以皁縠為之以隔風塵李氏資暇曰大裁帽也談苑曰後魏孝文帝自雲中徙代以賜百寮五代以來唯御史服之宋朝淳化初宰相學士御史北省官尚書省五品已上皆令服之今唯郎中臺諫服之自後魏始帷帽唐車服志曰帷帽創于隋代永徽中始用之施裙及頸今世士人往往用皁紗若青全幅連綴于油帽或氈笠之前以障風塵為遠行之服蓋本此又有面衣前後全用紫羅為幅下垂雜他色為四帶垂於背為女子遠行乘馬之用亦曰面帽按西京雜記趙飛鷰為皇后女弟昭儀上襚三十五條有金花紫羅面衣則漢已有面衣也頭巾古以皁羅裹頭號頭巾蔡邕獨斷曰古幘無巾王莽頭禿乃始施巾之始也筆談曰今庶人所戴頭巾唐亦謂之四腳二繫腦後二繫頷二取服勞不脫反繫于頂上今人不復繫頷下兩帶遂為虛設後又有兩帶四帶之異蓋自宋朝始幅巾古庶人服巾士則冠矣傅子曰漢末王公多委士服以幅巾為雅素則幅巾古賤者服也漢末始為士人之服袁紹戰敗幅巾渡河是也頭𢄼二儀實錄曰燧人時為髻但以髮相纏而無物繫縛至女媧之女以羊毛為繩向後繫之後世易之以絲及綵絹名頭𢄼繩之遺狀也曲領隋禮儀志云曲領按釋名在單衣內襟領上橫以雍項檢自歷代衣服之制其物無文隋志于梁陳已來始戴之又據釋名為制按釋名後漢劉熙所作當是曲領之起亦漢儀也蓋頭唐初宮人著羃䍦雖發自戎夷而金身障蔽王公之家亦用之永徽之後用幃帽後又戴皁羅方五尺亦謂之幞頭今曰蓋頭凶服者亦以三幅布為之或曰白碧絹若羅也冠子二儀實錄曰爰自黃帝制為冠冕而婦人者之首飾服無文至周始有不過副笄而已漢宮掖承恩者始賜碧或緋芙蓉冠子則其物自漢始矣古今註曰魏文帝有絕寵四人莫瓊樹制蟬鬢縹緲如蟬翼段巧笑始錦衣絲履作紫粉拂面陳尚衣能歌舞薛夜來善為衣裳一時冠絕一云冠起當世特髻燧人始為髻至周王后首服為副編鄭云三輔謂之假髻今特髻其遺事也二儀實錄曰燧人氏婦人束髮為髻髻繼也言女子必有繼於人也但以髮相纏而無物繫縛髲髢周禮王后夫人之服有以髲髢為首飾者故詩鬒髮如雲不屑髢也蓋周制云馮鑑後事云晉永嘉中以髮為步搖之狀名曰鬢以為禮容即今纏髮特髻乃其遺象也釵實錄曰燧人始為髻女媧之女以荊杖及竹為笄以貫髮至堯以銅為之且橫貫焉舜雜以象牙玳瑁此釵之始也玉釵郭憲洞冥記曰漢武帝元鼎元年有神女留玉釵與帝故宮人作玉釵梳實錄曰赫胥氏造梳以木為之二十四齒取疏通之義篦說文曰櫛梳枇總名也釋名曰梳言其齒疏也枇言其細相比也禮男女不同巾櫛是枇因梳而制也今作篦妝周文王時女人始傅鉛粉秦始皇宮中悉紅妝翠眉此妝之始也宋武宮女效壽陽落梅之異作梅花妝隋文宮中紅妝謂之桃花面首飾實錄曰自燧人之始婦人束髻舜加首飾文王又加翠翹步搖也畫眉秦始皇宮中悉紅妝翠眉此婦人畫眉之初也實錄曰漢武帝令宮人掃八字眉西京雜記曰司馬相如妻卓文君眉如遠山時人效之畫遠山眉魏武令宮人埽青黛眉妝靨遠世婦人妝喜作粉靨如月形如錢樣又或以朱若燕脂點者唐人亦尚之段成式酉陽雜俎曰如射月者謂之黃星靨靨鈿之名蓋自吳孫和誤傷鄧夫人頰醫以白獺髓合膏琥珀太多痕不滅有赤點更益其妍諸嬖欲要寵者皆以丹青點頰此其始也又云大歷已前士大夫妻多妬者婢妾少不如意則印面故有月點錢茍如此則固非嘉事也宋武宮中斅壽陽落梅妝此其遺意也花鈿酉陽雜俎曰今婦人面飾用花子起自唐上官昭容所制以掩點迹也按隋文宮貼五色花子則前此已有其制矣似不起於上官氏也雜五行書曰宋武帝女壽陽公主人日臥於含章殿檐下梅花落額上成五出花拂之不去經三日洗之乃落宮女奇其異競效之花子之作疑起於此鉛粉墨子曰禹作粉張華博物志曰紂燒鉛作粉謂之胡粉續事始曰鉛粉即紂所造也輕粉實錄曰蕭史與秦穆公鍊飛雲丹第一轉與弄玉塗之名曰粉即輕粉也此蓋其始也燕脂古今註曰燕脂草出西方葉似薊花似莤土人以染粉為婦人面色故名燕脂後人效之以紅花染絳為之非彼草染者也秦宮中悉紅妝當是其物自秦始也一曰燕支續事始云面脂廣志曰面脂自魏興已來始有之刷陸雲與兄機書曰按行曹公舊物有刷泥處尚識又別有剔齒纖疑自秦漢已來也衣裳通典曰上古衣毛後代以麻易之先知為上以制衣後知為下以制裳易曰黃帝垂衣裳而天下治世本曰胡曹作衣宋衷曰黃帝臣呂氏春秋亦云淮南子曰伯余初作衣許慎注云黃帝臣也一云伯余黃帝也世本又云伯余制衣裳孟詵錦帶前書曰十紀合雒紀四始教人食鳥獸衣其皮毛家語五帝德孔子曰黃帝始垂衣裳袞衣事始曰黃帝作畫象日月星辰于衣上以似天故有袞龍之頌黃帝內傳曰帝伐蚩尤乃服袞冕至舜始備十二章書稱予欲觀古人之象日月星辰山龍華蟲作會宗彝藻火粉米黼黻絺繡以五采彰施于五色作服是也周登日月於太常九章而已餘五服俱周制也裘黃帝出軍決曰帝伐蚩尤未克夢西王母遣道人披玄狐之裘以符授帝然則彼時已有裘之名說文曰裘皮衣蓋上古衣毛冒皮之遺象也袴褶唐書歸崇敬傅曰德宗時百官朝朔望皆服袴褶崇敬非之建言三代逮漢無其制隋已來始有服者干寶搜神記亦或言其物蓋晉以來有其制也通典晉衣服制有之云袴褶之制未詳所起近代服之無定色朝服晉書輿服志曰漢制五郊天子與執事服各如方色百官不執事者服常服絳衣以從魏秦靜曰漢氏承秦改六冕之制但無冠絳衣而已魏以來名朝服公服筆談曰中國衣冠自北齊已來乃全用胡服窄袖緋綠唐武德正觀時猶爾開元之後稍裒博矣通典曰字文護始袍加下襴遂為後制即今公服之制也此蓋原矣襴衫唐志曰馬周以三代布深衣因于其下著襴及裾名襴衫以為上士之服今舉子所衣者襴衫之始也衫輿服志曰馬周上議禮無服衫之文三代有深衣請襴袖褾襈為士人上服開骻者名缺骻衫庶人服之即今四袴衫也蓋自馬周始云續事始曰後周以枲紵為衫貴女功始也汗衫實錄曰古者朝燕之服有中單郊饗之服又有明衣漢祖與項羽戰爭之際汗透中單遂有汗衫之名也半臂實錄又曰隋大業中內官多服半臂除即長袖也唐高祖減其袖謂之半臂今背子也江淮之閒或曰綽子士人競服隋始制之也今俗名搭護襖子舊唐書輿服志曰讌服古褻服也亦謂之常服江南以巾褐裙襦北朝雜以戎夷之制至北齊有長帽短靴合袴襖子朱紫玄黃各任所好若非元正大會一切通用蓋取于便事則今代襖子之始自北齊起也涼衫筆談曰近歲京師士人朝服乘馬以黲衣蒙之謂之涼衫亦古遺法也儀禮曰朝服加景但不知古人制度何如耳大衣商周之代內外命婦服諸翟唐則裙襦大袖為禮衣開元中婦見舅姑戴步搖插翠釵今大衣之制蓋起于此實錄大袖在背子下身與衫子齊而袖大以為禮服疑即此也長裙實錄曰隋煬帝作長裙十二破名仙裙今大衣中有之隋制也帔又實錄曰三代無帔說秦有披帛以縑帛為之漢即以羅晉永嘉中制絳暈帔子開元中令三妃以下通服之是披帛始于秦帔始于晉矣今代帔有二等霞帔非恩賜不得服為婦人之命服而直帔通用於民閒也唐制士庶女子在室搭帔帛出適披帔子以別出處之義今仕族亦有循用者背子又曰秦二世詔衫子上朝服加背子其制袖短于衫身與衫齊而大袖今又長與裙齊而袖纔寬於衫蓋自秦始也裙又曰古所貴衣裳連下有裙隨衣色而有緣堯舜已降有六破及直縫皆去緣商周以其太質加花繡上綴五色蓋自垂衣裳則有之後世加文飾耳衫子又曰女子之衣與裳連如披衫短長與裙相似秦始皇方令短作衫子長袖猶至於膝宜衫裙之分自秦始也又云陳宮中尚窄衫子纔用八尺當是今制也偏衫僧尼之上服也僧史略曰後魏宮中見僧自恣偏袒右肩乃施一邊衣號偏衫全其兩肩衿袖失祇支之體此疑其始也腰帶實錄曰自古皆有革帶皮插垂頭至秦二世始名腰帶唐高祖令向下插垂頭取順下之義名鉈尾上元元年自三品官至庶人各有等制以金玉犀銀鍮鉐銅鐵為飾自十三銙至六銙筆談曰自北齊全用胡服蹀躞帶所垂蓋欲以佩帶弓劍帉悅算囊刀礪之類後去蹀躞猶存其環環所銜以蹀躞如馬鞦根即今帶銙也天子必以十二環為節唐開元之後帶鉤尚穿帶本為孔宋朝加順折也金帶穆天子傳曰天子北征舍於珠澤珠澤之人獻白玉石天子賜黃金六鐶三五朱帶此即金帶之起也至唐定令為四品服宋朝太祖又以玉不離石犀不離角可貴者金也作金裘紋方團帶賜政府御仙花帶賜侍臣今世謂笏頭荔枝者此始也環瑞應圖曰黃帝時西王母獻白環舜時又獻之則環當出於此指環春秋繁露曰紂刑鬼侯取其指環五經要義曰古者后妃群妾御於君所當御者以銀環進之娠則以金環退之進者著右手退者著左手今有指環此之遺事也本三代之制者也釧通俗文曰環臂謂之釧後漢孫程十九人立順帝有功各賜金釧指環則釧之起漢已有之也訶子本自唐明皇楊貴妃作之以為飾物貴妃私安祿山以後頗無禮因狂悖指爪傷貴妃胸乳閒遂作訶子之飾以蔽之事見唐宋遺史珮董巴輿服志曰古者君臣皆佩玉三代同之蓋起于夏后氏至周始制其等禮玉藻所記天子佩白玉公侯山玄大夫水蒼世子瑜玉士瓀玫是也璽春秋運斗樞曰舜為天子黃龍負圖封兩瑞有璽文曰天皇符璽後漢祭祀志曰三王彫文詐偽漸興始有璽符以檢姦萌是印璽之起肇於三代也應劭曰璽信也古者尊卑共之月令云固封璽左傳襄公在楚季武子使公冶問璽書而與之是也衛宏曰秦已前民亦以金玉為印龍虎鈕秦始天子稱璽又以玉群臣莫敢用也唐武后改曰寶章衡編年通載曰開元六年十一月乙巳改傳國璽曰寶也印七雄之時臣下璽始稱曰印史記蘇秦佩六國相印是也又人臣賜印之始云漢自三公而下有金銀銅三等今惟節度觀察防禦等使賜之事始曰州縣之有印始于秦按商鞅書定分篇曰法令之長印以封石券以法令之長有印以封券則有司之賜印自秦孝公之變法始爾筆談曰宋舊制中書樞密三司使印塗金後制三省樞密院用銀蓋自神宗元豐中行官制初也條印通典曰北齊有督攝萬機之印一鈕以木為之長尺二寸廣二寸五分背上為鼻鈕長九寸厚一寸廣七分腹下隱起篆文曰督攝萬機凡四字唯以印縫合齪合縫條印蓋原於此綬禮玉藻曰天子佩白玉而玄組綬公侯山玄玉而朱組綬則綬蓋貫佩玉而相承受者也董巴輿服志曰戰國解去紱佩留其絲襚以采紺相連結於襚轉相綬今之帶綬蓋起於七國而名之自三代也韍五經要義曰韍舜所製禮明堂位曰有虞氏服韍夏后山商火周龍章鄭康成注曰韍舜所作之以尊祭服三代增以畫文蓋冕服之𩏂也周諸臣所服又有縕赤之別蘇氏演義曰昔先王食鳥獸之肉衣其羽皮韍字遂從韋韋皮也春秋正義云戰國以韍非兵飾去之漢明復制用赤皮魏晉以還易以絳紗字遂有從系者也蓋太古蔽膝之法象冕服謂之韍朝服謂之𩏂也袴史記屠岸賈滅趙氏趙朔之妻有遺腹生男賈索之夫人置其袴中其稱始見諸此實錄曰上古食肉衣皮遂以為袴名袴褶今武士大口袴褶是魏文上馬袴也褌實錄曰西戎以皮為之夏后氏以來用絹長至於膝漢晉名犢鼻北齊則與袴長短相似而省犢鼻之名魚袋實錄曰三代以韋為之謂之算袋魏易之為龜唐高祖給隨身魚三品以上其飾金五品以上其飾銀故名魚袋天后改為龜後復曰魚神龍初賜紫則給金魚賜緋則給銀魚不限品也唐會要曰永徽二年四月二十九日給隨身魚袋咸亨三年五月三日始令京宮四品五品職事佩銀魚久視元年十月十三日職事三品以上用金飾四品銀五品銅景雲二年四月二十四日赦文魚袋著紫者金裝緋者銀裝宋朝神宗元豐末親王又賜玉魚以副金帶金魚以副玉帶以唐禮也韓文公之詩曰不知官高卑玉帶懸金魚是也笏唐會要曰笏周制也周禮諸侯象大夫魚鬚士以竹晉宋以來謂之手板西魏以後五品以上通用象牙武德四年七月六日詔五品以上象笏六品以下竹木笏舊制三品以上前挫後直五品以上前挫後屈武德以來一例上圓下方也淮南子曰武王問太公曰寡人伐紂恐後世鬭爭不已太公曰王欲久持則塞民於兌於是解其劍而帶之笏此蓋周人制笏之始也樂記曰武王克商袒冕搢笏而虎賁之士說劍也笏袋唐明皇雜錄曰故事皆搢笏於帶然後乘馬張九齡體羸不勝因設笏囊使人持之馬前遂以為常制梁職儀曰八座尚書以紫紗裹手板垂白絲於手如筆通志曰今僕射尚書手板以紫皮裹之名曰笏袋梁中世以來執笏者皆白筆綴頭以紫囊之此又似笏之設囊之始也笏帛酉陽雜俎曰陳希烈不便搢笏騎馬以帛囊之令左右持之笏之設帛自此始也韤文子曰文王伐崇韤係解則其物已見於商代實錄曰自三代以來有之謂之角韤前後兩相承中心繫之以帶洎魏文帝吳妃乃始裁縫為之即今樣也以綾為之洛神賦羅韤生塵是也履舄世本曰于則作扉履宋衷曰黃帝臣草曰扉麻皮曰履實錄曰三代皆以皮為之單底曰履復底曰舄古今注曰舄以木置履下乾臘不畏泥溼履乃屨之不帶者蓋祭服謂之舄朝服謂之履燕服謂之屨也周禮屨人有赤黑二舄素葛命功等四屨亦通名耳續事始曰宋元嘉元年始有鳳頭履故今人亦有鳳頭鞋也靴釋名曰本胡服趙武靈王所作實錄曰胡屨也趙武靈王好胡服常短靿以黃皮為之後漸以長靿軍戎通服之唐馬周以麻為之殺其靿加以靴氈開元中裴叔通以羊皮為之隱麖加以帶子裝束筆談曰北齊全用胡服長靿靴也續事始曰故事胡虜之服不許著入殿省至馬周加飾乃許也屨草履也詩糾糾葛屨是也唐韻曰扉草屨黃帝臣于則所造世本亦曰于則作扉屨宋衷云草屨為扉實錄謂始皇二年始以蒲為履馮鑑續事引古今注云屨亦履也以謂有帶者此說非也鞋古者草謂之屨皮謂之履實錄曰鞵夏商皆以草為之周以麻晉永嘉中以絲或云馬周始以麻為之名鞋也古今注曰魏文帝絕寵段巧笑始製絲履則非晉永嘉中始以絲為鞋矣按禮少儀云國雖靡敝君子不履絲屨則周人已用絲為屨也屐異苑曰介之推抱木燒死晉文公伐以製屐蕭子顯齊書曰襄陽有發楚王冢獲王屐論語隱義曰孔子至蔡有取孔子屐者按晉文公之時已有製屐之事而孔子亦有其物則是屐之為物春秋之閒已見於世矣至司馬晉遂為常服也古今注曰屐即舄之制而木匠曰齒也雨衣事始曰凡雨具周已有左傳云陳成子衣製仗戈杜預注曰製雨衣也是矣炙轂子曰帷絹油制之及油帽陳始有之也馮鑑又引左傳楚子次於乾谿雨雪王皮冠秦復陶以證雨衣按虞開父為周陶正注曰陶復陶白氏取為尚衣之職杜預又以復陶為油衣蓋若晉武所焚雉頭裘唐太平公主所服百鳥毛裙今世駝褐之類也不得為雨衣云學禮有虞氏養國老於上庠又曰古之教者家有塾黨有庠遂有序國有學孟子曰夏曰校商曰序周曰庠學則三代共之沿革曰有虞氏大學為上庠然則學自有虞氏始也通典曰漢文翁為蜀郡修起學宮天下皆立學自文翁始也孔子廟後漢鍾離意傳曰意為魯相身入孔子廟堂蓋孔氏家廟也唐禮樂志曰武德二年始詔國學立孔子廟會要云六月一日也正觀四年又詔州縣皆作會要又曰高宗總章二年敕天下皆置宋朝因之配坐通典曰魏齊王芳正始二年二月講論通使太常釋奠以太牢祀孔子于辟雍以顏回配此蓋其始也唐會要曰正觀二年以顏子配享孔子宋朝神宗熙寧中大興學校又兼以孟子配也先賢配唐會要曰正觀二十一年二月十五日詔以左丘明等二十一人並令配享尼父廟堂此蓋其始也蘇氏曰正觀顯慶稱二十一賢太極開元即稱二十二賢將前敕并學令比類於服虔下有賈逵不知何年月附入武學宋朝神宗熙寧中興學以上舍養士始就武成王廟側建武學如太學儀章衡編年通載曰仁宗慶歷三年五月置武學於武成王廟八月罷太公廟唐書明皇本紀曰開元十九年四月丙申始立太公廟十八日也武成廟唐會要曰開元十九年四月十八日置太公廟以張良配享仍簡取自古名將準十哲上元元年閏四月十九日赦文太公望追封武成王委中書門下擇古名將準文宣王例置亞聖十哲建中三年七月十一日史館奏奉今年五月十五日敕武成王廟配享人宜令史館參詳定名以張良田穰苴已下十人為十哲孫臏范蠡以下七十二人為弟子賢良漢唐逮宋取士之制有賢良方正茂才異等六科謂之制舉亦曰大科通謂之賢良其制蓋自漢文帝始史記文紀二年十二月日食令舉賢良方正能直言極諫以輔不逮至十五年九月策平陽侯窋等所選晁錯曰興自朕躬是也亦見班固前漢晁錯本傳云事始則謂自孝武策仲舒始非也秀才漢世取士又有孝廉秀才二等齊宋以來州有秀才之舉隋唐之代其科最上正觀中有舉而不第者坐其州長由是其科廢故自唐及宋雖進士猶以秀才為號自唐漢之舊也蘇氏演義曰漢武有策秀才文也李肇國史補曰進士為時所尚久矣俊乂實在其中由此出者終身為文人其通稱謂之秀才投刺謂之鄉貢肇元和中人蓋自憲宗時已為進士之稱也進士摭言曰周諸侯貢賢於天子升之太學曰造士大樂正論造士之秀者以告於王而升諸司馬曰進士其事見於禮王制及周官樂正之職此蓋進士之始也摭言又云隋大業中始置進士之科此蓋設科之始也明經漢始以明經射策取人以通經多寡補文學長故唐乃置明經之科開元中崔元瓘上言問大義十道時務策三道宋朝定業三經義三十道也學究唐選舉志取士之科有明經有進士有明法有九經有五經有三經有二經有學究為舉之常選學究設科自唐始也宋朝神宗熙寧中以經術興三舍始除之三禮唐會要曰德宗正元五年五月五日置三禮科唐百官志則云二月敕置三禮開元禮科三傳又會要曰穆宗長慶二年二月商侑奏置三傳及三史科宋朝神宗始以經義取士獨立進士明法二科餘並廢也明法漢新有國詔明法者遣詣相府此明法之始也唐始設明法科處士史記伊尹於湯致於王道曰伊尹處士湯迎之五反然後往此名處士之始也宋朝有沖晦處士李退夫在慶歷皇祐之閒也林希兩朝寶訓曰康定中賜興化徐復號沖晦處士終南高懌號安素處士武舉唐選舉志曰武舉蓋起於武后之時其始置在長安二年也唐會要曰長安三年正月十七日詔天下諸州宜教武藝每年準明經進士貢舉例送此武舉之始也宋朝其科雖不廢亦不常舉自神宗立武學始詔三歲一次隨進士明法發解也事訓云天聖中置皇祐初詔罷治平元年樞密院言不可廢英宗復置之鄉貫唐會要曰開元十九年六月六日敕諸州貢舉皆於本貫不得於所在附貫然則貢舉之用鄉貫自明皇始也貢士周禮大司徒邦國舉賢者於王則貢舉之始也唐武德初諸州號明經俊秀州縣試取合格者每年十月隨方物入貢摭言曰武德辛巳歲四月一日敕也按辛巳武德四年云群見唐高祖始詔舉人隨物入貢會要曰長壽二年十月十日劉承慶疏伏見比來天下所貢物至元日皆陳在御前唯貢人獨於朝堂拜恐所謂重物輕人請貢人列方物之前從之此貢人群見之始也筆談曰舊制貢舉人到闕悉入對謂之群見遠方士不知朝廷儀班列紛錯見之日至有更相抱持以望黼座有司患之近歲止令解頭入見蓋自仁宗時也辭賦唐書薛登傳登天授中上疏曰漢世求士必先其行魏取放達晉先門閥陳梁薦士特尚辭賦辭賦取人始於梁陳也唐天寶十三載始試詩賦蓋用梁陳之意云科舉之以辭賦此其初也國家自神宗專以經術取士辭賦遂罷三場貢士前漢唯射策唐初并試雜文天寶十三載舉人問策外更詩賦并雜文貼經為三場試也通典云摭言曰進士與俊秀同源異派兩漢有射策對策唐高宗垂拱元年吳師道等及第敕批云略觀其策並未盡善調露二年劉思玄請加試雜文神龍元年方行三場試云雜文唐正觀八年劉思玄始令貢士試雜文今論是也摭言云調露二年見上條印卷五代會要曰清泰二年九月貢院奏奉天成四年敕舉人試前五日納試祇用中書省印印訖付貢院院司緣所試場數極多旋旋印紙鏁宿內中在往來不便請祇用當司印從之則試卷之用印自唐明宗始也混牓宋朝會要曰大中祥符四年五月晁逈等奏引試進士預令於貢院納案子試前一日貢院出牓曉示逐人排坐位處所則引試之有坐位牓自此為始今亦為之混牓印題又宋朝會要曰大中祥符五年三月二十二日真宗親試進士於崇政殿內出三題摹印以賜印題自茲始也封彌即糊名也唐初以試有官人按選舉志唐初擇人以身言書判六品以下集試初試選人皆糊名令學士考判又張說傳曰永昌中武后策賢良詔李景諶糊名考覆國史異纂曰武后以吏部選人多不實乃令試日自糊其名暗考以定其等第蓋糊名考校自唐始也今貢舉發解皆用其事曰封彌宋朝會要曰咸平二年正月命董龜正等封印卷首蓋試日就院置局始命官曹主之也話錄亦謂糊名自唐武后始也巡鋪宋朝會要曰雍熙二年正月詔禮部引試分差官廊下察視勿容私相教授此巡鋪之始也初以檢視九經諸科至景德四年十二月十三日命喬希顏等始為巡試鋪又天聖二年正月始有巡鋪官孔延魯自此巡鋪遂為定制也監門又曰雍熙二年正月詔禮部試九經諸科輪番差官二人在省門監守此試院監門之始也洎真宗景德四年十二月十三日乃命嚴類等專監門也知舉唐選舉志曰隋唐之代貢士皆考功主試開元二十四年考功員外郎李昂為舉人詆訶玄宗以員外郎望輕遂移貢舉於禮部以侍郎主之禮部選士自茲始也對拜筆談曰禮部貢院試進士曰設香案於階下主司與舉人對拜此唐禮也設為供帳有司具茶湯至試學究則悉徹帳幕氈席之類亦無茶湯防氈幕及供應人私傳所試經義蓋嘗有敗者故也別試又唐選舉志曰開元二十四年以禮部侍郎主選其親故移考功謂之別頭正元十六年高郢奏罷之元和十三年又復之宋朝謂之別試所試有別頭自唐開元始也放牓摭言曰進士牓頭立粘黃紙四張以氈筆淡墨哀轉書禮部貢院四字或曰文皇親以飛帛書之又云象陰注陽受之狀蓋亦自唐室始也張泊賈郎中談錄曰賈君嘗問放舉人牓貢院字用淡墨氈書何也對曰聞諸祖父說李紓侍郎將放舉人命筆吏書吏暴卒令史王昶終其事昶被酒揮染不能加墨逮明張牓始覺無及矣一牓之內字有二體反致其妍自後因模法之遂成故事後用氈書蓋益增其奇麗殿試茲禮起於漢武帝其策賢良文曰興自朕躬是也通典曰唐武后載初元年二月十四日策問貢人於洛城殿殿前試人自此始也宋朝會要曰開寶六年三月太祖御講武殿覆試宋準以下先是禮部放準等下第徐士廉撾登聞鼓上言知舉官取捨非當即詔禮部籍入策進士并終場經學準等並覆試於殿廷自是為常制編年通載云三月庚午也御試舉人自此始也唱名宋朝會要曰雍熙二年三月十五日太宗御崇政殿試進士梁顥首以程試上進帝嘉其敏速以首科處焉十六日帝按名一一呼之面賜及第唱名賜第蓋自是為始五甲又曰淳化三年三月四日帝御崇政殿試進士詔糊名考校定其優劣為五等第一至第二等賜及第第三第四賜出身第五賜同出身五等之分自此為始也天聖五年始曰甲及第漢之取士其射策中者謂之高第隋唐以來進士諸科遂有及第之目釋褐宋朝會要曰太平興國二年正月十二日賜新及第進士諸科呂蒙正以下綠袍靴笏非常例也御前釋褐蓋自是始吳處厚青箱雜記曰世傳潘閬安鴻漸八才子圖皆策蹇重戴又王禹偁贈崔遵度及第未脫白詩曰且留重戴士風多則國初舉子猶重戴矣此唐風也英宗在諒陰於及第後用其禮云賜宴又曰開寶八年賜新及第進士王嗣宗等錢百千令宴樂太平興國二年正月七日太宗親試呂蒙正以下並賜及第仍賜宴開寶寺兼降御製詩二首賜之此賜宴及詩之始也唐制禮部放牓後敕下之日醵錢於曲江為開嘉宴近代多於名園佛廟至是官為供帳為盛集焉景德二年始賜宴於瓊林苑自此為定制按李肇國史補云曲江大會此為下第舉人其筵席簡率比之幕天席地爾來漸加侈靡皆為上列所據向之下第舉人不復預矣摭言曰曲江遊賞雖云自神龍已來然盛於開元之末今瓊林賜宴亦唐曲江杏園之事爾題名宋朝之制進士中第必賜名於桂籍堂其事以唐人題名慈恩寺為始劉禹錫嘉話錄曰慈恩題名起自張莒本於寺中閑游而題其同年人因為故事摭言云神龍已來杏園宴後皆於慈恩寺塔下題名又曰進士題名自神龍之後遇開宴率皆期集慈恩塔下題名賜儒行宋朝會要曰淳化三年三月詔以新印儒行賜近臣先是御試進士日以儒行篇為論題帝欲激勸士流敦儒行故特令雕印至是首賜新及第舉人孫何聖旨諭令依此修身為治天聖五年四月賜新及第進士王堯臣以下禮記中庸各一本八年四月王拱辰以下又賜大學篇也謁先師唐書劉伯芻傳伯芻子允章咸通中為禮部侍郎請諸生及進士第並謁先師則茲禮起於唐懿宗之世劉允章請也又選舉志曰開元五年始令鄉貢明經進士見訖國子監謁先師是則開元之禮第施於貢士而咸通時允章所請糾開元貢士之禮而為之制也唐會要云開元五年五月八日也摭言又以為九月詔登科記唐會要曰大中十年四月禮部侍郎鄭顥進進士諸家科目記十三卷敕自今後放牓訖仰寫及第人姓名仍付所司逐年編次摭言曰永徽已前俊士秀才二科猶與進士並列咸亨後由文學舉於有司者競集於進士繇是趙傪刪去俊秀故自之曰進士登科記其事之始疑自唐初而獨以進士登科名記當起於高宗時趙傪云曳白唐天寶元年冬選六十四人判入等時御史中丞張倚男奭判入高等有下第者當為薊令以其事白安祿山祿山奏之來年正月玄宗御勤政樓親重試唯十二人比類稍優張奭不措一辭時人謂之曳白即拖白是也
