body:
  text: 經籍藝文部第十七文字淮南子曰倉頡之初作書以辨治百官領理萬事愚者得以不忘智者得以志遠又曰昔者倉頡作書而天雨粟又曰見鳥跡而知著書呂氏春秋曰倉頡作書注云倉頡生而知書寫倣鳥跡以造文字黃帝內傳曰帝殺蚩尤因命倉頡造文字以變質帝王世紀曰倉頡取像鳥跡始作文字李瀚蒙求曰倉頡黃帝下臣觀鳥跡以作文字鬼夜哭龍潛藏晉衛恆曰昔在黃帝創制造物有沮誦倉頡始作書蓋觀鳥跡以興思世本亦曰沮誦倉頡造書宋衷云皆黃帝史也字源曰太昊時始有文字或云篆黃帝變古為文字又曰庖犧氏獲景龍作龍書炎帝因嘉禾作穗書倉頡變古文寫鳥跡作鳥跡篆少昊作鸞鳳書取似古文高陽作科斗書堯因軒轅龜圖作龜書夏后氏作形似篆商務光作倒薤篆今曰薤葉周瑞赤雀丹烏作鳥書又媒氏作填書今曰勒字書斷曰古文黃帝史倉頡作大篆周宣王史史籀作小篆秦丞相李斯作八分秦羽人上谷王次仲作隸書秦獄吏下邽程邈作飛白漢左中郎將蔡邕作章草漢黃門令史史游作行書後漢潁川劉德升作草書王右軍云其先出杜氏名伯度趙壹云興於秦末或云漢時杜伯度授草所作因章帝所好名章草韋誕謂之草聖漢興有之不知誰作書斷謂如淳之作起草為稾草書蓋起於此一說李斯又作刻符書雲頭烏腳斯及趙高俱善之逮章帝時曹喜作垂露懸針二體晉王羲之作龍爪篆山胤作花篆魏鍾繇作正書散隸漢蔡邕見門吏帛飛因成字故名飛帛劉公嘉話曰飛帛始於蔡邕在鴻都學見匠人施堊帚遂刱意焉唐會要曰正觀十八年五月太宗為飛白書作鸞鳳蝶龍等字蓋自是始改舊體又李陽冰論篆云秦始皇時王次仲作八分蕭子良云漢靈帝時人與秦人同姓名鍾繇謂之章程繇善隸書始為楷法鶴頭偃波二書繇又善八分有隼尾行書亦繇作謂之行押或曰秦程邈變篆作隸李瀚云邈字元岑始皇用為獄吏得罪雲陽獄中幽囚十年改篆為隸今楷字是也酈道元水經曰臨淄有人發古冢棺前隱起為隸字言齊太公六代孫胡公之棺唯三字是古餘同今字元則謂證知隸字出於古非始於秦也其餘諸家體法更有百餘種各記所作見太平御覽也孟詵錦帶前書載周處云小篆秦徐邈造刻符扶風曹喜造籀謬書周柱下史所造圖書易曰河出圖洛出書聖人則之張晏曰庖犧氏將興神龍負圖而至帝王世紀曰黃帝游於洛水上見大魚煞五牲祭之雨七日夜魚流始得圖書春緯云河以通乾出天苞洛以流坤出地符河龍圖發洛龜書發孔安國以為河圖八卦是也洛書九疇是也書契尚書序曰古者伏犧氏之王天下也始畫八卦造書契以代結繩之政帝王世紀曰伏犧氏仰觀象於天俯察理於地觀鳥獸之文與地之宜近取諸身遠取諸物於是造書契五經太昊始畫八卦則易之始也又能網罟之歌則詩之始也伏犧神農黃帝之書謂之三墳則書之始也易始八卦而文王六十四故謂之周易蓋夏曰連山商曰歸藏周曰周易故也濟南伏生以其上古之書故曰尚書毛公傳詩以名家而鄭康成箋之故曰毛詩然則五經或因或作而成於仲尼秦焚六籍班班僅存書亡其半詩亡者六篇春秋偶完而禮樂之書無復遺文易以卜筮故得全今禮記又雜出於漢儒如月令之出於呂不韋蔡邕王肅則以為周公作漢文帝令諸儒博士作王制子思作中庸劉瓛云公孫尼子作緇衣而樂記一篇司馬遷以為公孫洪所記著以為樂書在八書之一他皆錯雜出自漢世也四部今崇文所錄書目經史子集為甲乙丙丁四部者蓋始於晉李充按晉書李充傳充為著作郎時典籍混雜充以類相從分為四部此蓋其始也續事始曰魏武置四庫圖書分甲乙丙丁為部目藏之錄云晉祕書荀勗因魏中經更以四部別之惠懷之亂及李充始加刪正荀勗四部之法總以甲乙為次也巾箱南史齊衡陽王鈞嘗親手細書五經部為一卷置巾箱中侍讀賀玠曰殿下家有墳索復何細書別藏巾箱鈞曰巾箱中檢閱既易且更手寫則永不忘矣諸王聞之爭效為巾箱今謂籍之細書小本者為巾箱始於此也石經漢靈帝詔諸儒校定五經鐫石以刊其文命蔡邕等書為古篆隸三體立於太學門謂之石經印板筆談曰板印書籍唐人尚未盛為之自馮道始印五經之後典籍皆為板本即唐始為板印矣五代會要曰後唐長興三年二月中書門下奏請依石經文字刻九經印板也八卦易繫辭曰兩儀生四象四象生八卦又曰庖犧氏之王天下也始作八卦以通神明之德以類萬物之情孔安國序尚書曰伏犧始畫八卦史記太史公自敘曰伏犧至純厚作易八卦董巴議曰昔伏犧始造八卦作三畫以象二十四氣禮緯含文嘉曰伏犧德合上下天應以鳥獸文章地應以河圖洛書伏犧則而象之始作八卦王子年拾遺記曰伏犧坐於方壇之上聽八風之氣乃畫八卦六十四帝王世紀曰炎帝重八卦之數究八八之體為六十四卦史記周本紀曰西伯囚羑里蓋益易之八卦為六十四揚子法言易始八卦而文王六十四孔穎達周易正義曰重卦之人王弼以為伏犧鄭玄以為神農孫盛以為夏禹史遷以為文王說卦云昔者聖人之作易也幽贊於神明而生蓍謂伏犧也又繫辭之論用蓍云四營而成易十有八變而成卦明用蓍在六爻之後非三畫之時太昊始有蓍筮則伏犧重卦明矣穎達以謂王弼以伏犧既畫八卦即自重為六十四卦為得淮南子亦曰八卦可以識吉兇知禍福矣而伏犧為之六十四變不然周官太卜三易二曰歸藏杜子春以為黃帝書而其卦六十四安得與周同也繇爻繫辭曰易之興也當商之末世周之盛德耶當文王與紂之事耶司馬遷曰文王囚而演易揚子法言曰文王重易六爻漢書揚雄傳曰文王附六爻藝文志曰文王重易六爻作上下篇按升之六四曰王用享于岐山謂文王也文王之追王在克商之後明夷之六五曰箕子之明夷箕子之囚在觀兵之時二者非文王所及也乾鑿度曰垂皇者犧卦道演德者文通卦驗曰蒼牙通靈昌之盛蓋言卦繇辭文王作也春秋左氏傳曰韓宣子適魯見易象云吾乃知周公之德蓋言卦爻辭周公作也易更三聖不言周公穎達謂父統子業故也十翼漢書藝文志重易作上下篇孔氏為之彖象繫辭序卦之屬凡十篇孔穎達周易正義曰彖象十翼以為孔子所作謂上彖一下彖二上象三下象四上繫五下繫六文言七說卦八序卦九雜卦十也二禮通典曰周公攝政六年致太平述文武之德制周官及儀禮孔子詩已不能具秦平天下收儀禮歸之咸陽故得不亡也春秋杜預春秋序曰春秋者魯史記之名也孟子曰晉謂之乘楚謂之檮杌而魯謂之春秋事始據此云起自周公旦尚書序亦曰孔子約史記而修春秋論語孔子沒七十子之儔會集夫子之言以為論語蓋其書成於曾參有若故其文每至二子所記多曰曾子有子他則皆字也唐柳宗元亦謂成於曾子子思之徒宋朝翰林鄭學士獬亦謂論語成於曾子不然曾子弟子所記也愚按成於有子曾子為是鄭言非也孝經史記仲尼弟子傳曰曾參字子輿孔子以為能通孝道故授之業作孝經蓋孝經以曾子故作也爾雅郭璞爾雅序曰興於中古隆於漢代豹鼠既辨其業亦富大抵解詁詩人之旨或曰周公作以其文考之如瑟兮僩兮衛武公之詩也猗嗟名兮齊人刺魯莊公也而文皆及之則周公安得述也承謂當是出於孔子刪詩書之後爾西京雜記曰郭偉謂爾雅有張仲孝友張仲宣王時人則非周公之制明矣劉子駿以問揚子雲曰孔子門徒游夏之儔所記以所詁六藝者也劉向以為外戚傳稱史佚教其子以爾雅小學又記言孔子教魯哀公學爾雅爾雅之出遠矣舊傳學者皆云周公所記也張仲孝友之類後人所足耳御製家語舜作南風之詩此則御製之始也子文心雕龍曰鬻熊作書題曰鬻子蓋周初人此名子之始也史呂氏春秋曰倉頡造史帝王世紀曰黃帝時造史倉頡始作文字史官之作蓋自此始記其言行策而藏之則史之原起于黃帝實錄三代之王有左右史記其言動漢武有禁中起居明帝有起居注而無名實錄者唐藝文志所載實錄自周興嗣梁皇帝實錄為始則其事自茲以為始也著書史記太史公自敘曰昔西伯拘於羑里演周易則著書之始也類事證古類事其始本出於梁沈約之徒屬辭比事往往成編故唐白居易傚之為六帖山海經其文所記皆山川草木鳥獸之奇疑禹治水所過所見而識之莊子所謂齊諧者志怪也禹知而名之益見而記之當是此也其書盛行於漢氏自劉向辨貳負之屍始也音韻筆談曰音韻之學自沈約為四聲及天竺梵學入中國其學漸密也切字又曰切字本出於西域漢人訓字止曰讀如某字未用反切然古語已有二聲合為一字如不可為叵如是為爾而已為耳之乎為諸之類以西國二合音蓋切字之原也如耎字從而犬亦切音殆與聲俱生莫知從來也切韻陸法言切韻序曰隋開皇初劉臻等八人論法言論及音韻法言記之後取諸家字書所記定為切韻五卷其書成於仁壽元年唐天寶十三載孫愐增修目曰唐韻押韻張孟押韻後序曰押韻肇自顏魯公迄于聖宋蓋孟在天聖中準宋韻重編集也玉篇梁大同九年三月顧野王撰也唐上元元年甲戌九月孫強又增加字云詩樂書曰伏羲之樂曰立基神農之樂曰下謀夫樂必有章樂章之謂詩始於太昊之世五言李瀚蒙求曰李陵初詩始變其禮作五言格也其始亦本於詩佌佌彼有屋蔌蔌方有穀之類六帖曰谷永始作六言亦詩公尸來燕來寧之類也七言劉義慶世說曰王子猷詣謝公云詩何七言子猷曰昂昂若千里之駒泛泛若水中之鳧此語出離騷東方朔傳曰漢武在柏梁臺上使群臣作七言七言之作始起於此也律格本事詩載李白歌詩云梁陳以來豔藻斯極沈休文又尚以聲律唐宋之問傳曰建安江左詩律屢變至沈約庾信以音律相婉附屬對精密及之問沈佺期又回忌聲病約句準篇則律格之始原于約信而成於沈宋也聯句自漢武為柏梁詩使群臣作七言始有聯句體梁何遜集多有其格唐文士為之者亦眾凡聯一句或二句亦有對一句出一句者五子之歌有其一其二之文則又聯句之體也其事見于夏書五子之歌始於漢武柏梁之作而成於何遜也唱和帝舜與皋陶乃賡載歌則唱和之初也亦本於詩之籜兮倡予和女之義其事新見於齊梁時顏延年謝元暉始之也次韻顏延年謝元暉作詩相倡和皆不次韻至唐元稹作春深二十首並用家花車斜四字為韻白居易劉禹錫和之亦用其韻及令狐楚和詩多次其韻宋朝真宗時楊內翰億謂次韻於此也見談苑賦詩序六義次二曰賦蓋謂直陳其事爾左傳言鄭莊公入而賦大隧之中是後荀卿宋玉之徒演為別體因謂之賦故昔人謂賦者古詩之流以荀宋為始漢書曰不歌而頌曰賦釋名曰敷布其義曰賦論文心曰昔仲尼微言門人追記目為論語蓋群論立名始於茲矣莊周之書有嘗試論之荀卿有正論賈誼有過秦論論以荀賈為始策事始云起自漢武帝策董仲舒始以其文曰興自朕躬故也按前漢書有晁錯賢良策蓋文帝策之曰興自朕躬則策始於漢文帝之策晁錯也議管子曰軒轅有明堂之議此蓋疑為議之始也贊文心曰昔虞舜重贊及益贊於禹伊陟贊於巫咸並揚言以明事嗟歎以助辭故漢置鴻臚唱拜為贊如相如之贊荊軻班固之襃貶以贊皆取益贊於禹之義要之自司馬相如贊荊軻始頌詩序六義其六曰頌蓋頌者美盛德之形容以其成功告于神明者也詩有商周魯三頌文心曰昔帝嚳之世咸墨為頌以歌九韶則頌起于帝嚳也箴文心曰軒轅輿幾以弼不逮即為箴又曰斯文之興盛於三代夏商二箴餘句尚存及周辛甲百官箴闕虞人之箴體義備焉連珠傅玄曰連珠興於漢章帝班固賈逵傅毅皆受詔作之體則假喻達旨賢者微悟欲使歷歷如貫珠易覩而可悅故曰連珠梁沈約云連珠之作始自揚子雲歐陽詢作藝文類中亦有揚雄連珠則為斯文之興不自漢章明矣爵公侯伯子男謂之爵唐虞輯五瑞修五玉是五等自堯舜始也禮制文嘉曰殷爵三等周五等或謂黃帝立五等也封建沿革曰黃帝分州畫野得百里之國萬區唐虞列為五等此封建之始也帝王世紀曰炎帝之世有諸侯風沙氏史記曰神農氏世衰諸侯相侵則炎帝時已有諸侯至黃帝始大封也陸士衡五等諸侯論略曰五等之制始於黃唐謂黃帝唐堯也實封通典曰唐封公侯無國土其加實封者則食其所封之戶分食諸郡以租庸調給沿革曰魏黃初閒爵自關內侯不食邑但虛封而已故唐因之加實封宋朝會要曰唐制食實封者戶給縑帛每賜爵遞加一級唐末及五代始有特加邑戶而罷實封之給今位為虛名也戶封晉書地理志曰古者有分土無分民若乃以戶口為差降略封疆之遠近所謂分民自漢始也蓋漢艾亡秦大侯不過萬家小者五六百戶則封國之以戶漢其始也諸侯帝王世紀曰女媧未有諸侯有共工氏任智刑以強霸而不王炎帝世乃有諸侯風沙氏叛炎帝修德風沙之民自攻其君則建侯分土自炎帝始也諸王古者天子稱王周失其道春秋之時吳楚之君始僭稱之楚世家曰周夷王時楚熊渠曰我蠻夷也乃立長子康為句亶王紅為鄂王執疵為越章王厲王暴虐復去之至於熊通始僭號是為楚武王此諸侯號王之始也七雄爭強亦各稱之秦至惠王始稱之四年齊魏為王十三年韓亦為王秦并天下號皇帝除王之名漢滅楚始謂之諸侯王蓋諸侯封王自楚漢之際也郡王事始云後魏始封功臣為郡王以為王封郡之始按晉書宗室傳太康九年益封子邁為隋郡王則其事自晉始矣然庶姓功臣之封而稱某郡王當自元魏始也國公事始曰隋文帝始封功臣為國公郡公後漢光武建武十三年以土無二王爵不過公於是以太原王章為齊公魯王興為魯公功臣悉為公晉始曰開國郡公也開國由二代至漢魏諸侯無以國為號第曰某侯耳晉令始有開國之稱故五等皆郡縣開國陳亦有開國郡公縣侯伯子男侯已降無郡封由唐迄今因而不改蓋開國之號自晉始也官崔寔正論曰太昊之世設九庖之官後有龍瑞則以龍紀官左傳郯子之論是也蓋設官之初原於伏犧氏也至唐虞建官惟百故歷代稱百官焉守官漢有守令守郡尉以秩未當得而越授之故曰守猶今權也則官之有守自漢始也宋朝神宗改官制始正其名故有行試守三等通典曰試未正命也階高官卑稱行階卑官高稱守試官職林曰唐武后天授二年凡舉人無賢不肖咸加擢拜大置試官則官之有試自唐始也謂之試取尚書明試以功之意唐會要曰天授二年二月十五日十道使舉人王山輝並授試官試官自此始也又曰檢校試官皆神龍已後有之檢校唐書高祖紀武德六年四月癸酉楊恭仁檢校梁州諸軍事疑檢校之官自此始也至太宗紀正觀中又有杜淹檢校吏部尚書杜如晦檢校侍中唐會要曰檢校官神龍後有之非也譚賓錄曰唐陳少遊檢校職方員外郎充迴紇使云郎官之有檢校自此始也知判職林曰唐中宗神龍二年既置員外官同正員又有檢校試攝知判等官知者云知某官判者云判某官宋朝皆循用之府寺監省州縣城寨各以官知判蓋自唐中宗始也流內通典曰隋制九品自太師始焉謂之流內則是流內之目自隋始也流外又曰凡府寺胥吏守局既久積月累勞故得齒於下品文中子曰吏而登位非古也推此疑周隋之制唐有流外勳品自諸錄事及五省令史始焉謂之流外自茲始也功臣筆談曰賜功臣號始於唐德宗奉天之役自後藩鎮下至從軍資深者例賜之本朝唯以賜將相熙寧中因上尊號上不允曰正如卿等功臣何補名實時昊充為相請止從之自是罷不賜按今宿衛諸班直自押班而下各有兩字功臣則宋朝不獨以賜將相也會要曰興國元年正月一日赦文諸軍諸使諸道應奉天及進收京城將士等並賜名奉天定難功臣唐兵志曰德宗幸梁神策兵有勞皆號興元元年從奉天定難功臣又曰代宗即位以射生軍清難賜名寶應功臣此蓋其始矣筆談誤也勳臣沿革曰勳臣自齊梁有之今柱國而下是也周禮王功曰勳蓋取諸此舊唐書百官志曰勳官出於周齊交戰之際本以酬戰士其後漸及朝流也品秩自太昊以龍紀官唐虞建官惟百未分品秩周官以九儀正邦國自一命至九命漢自中二千碩止二百碩皆有北魏文帝延康元年陳群立九品官人之法後魏文有從品孝武自四品已下每品為階北齊九品各分正從則品秩之原肇於魏陳群也世廕尚書大禹謨皋陶稱舜之德曰賞延於世則世廕之始蓋起於有虞氏也章服唐車服志曰高祖初入長安罷隋竹使符班銀菟符後改銅魚貴賤應召命隨身盛以袋三品已上飾以金五品已上飾以銀開元時中書令張嘉正奏致仕官佩魚終身自是賞緋紫者必以魚謂之章服服色隋禮儀志曰大業元年煬帝詔牛洪宇文愷等創造章服差等五品已上通著紫袍六品已下兼用緋綠胥吏以青庶人以白屠商以皁士卒以黃二儀寶錄曰隋煬帝詔牛洪等衣冠皆有等差三四品通著紫五品朱六品已下綠官吏青庶人白商皁服色之分疑自此始而唐書馬周傳云品官舊止黃紫周於是建白三品服紫四五品朱六七品綠八九品青則又其別為自馬周始矣筆談曰中國衣冠自北齊全用胡服窄袖緋綠此蓋其始也堂除續事始曰舊制內外皆吏部授自隋以來五品以上官中書門下訪擇聞奏然後下制肅宗復令中書以功除官今謂堂除也考績起于虞舜三載考績之文故今官以考定勞一歲為考四考而遷謂磨勘也循資唐選舉志開元十八年裴光庭始作循資格而賢愚一概必與格合乃得銓授限年躡級不得踰越於今以為制也致仕尚書咸有一德曰伊尹既復政厥辟告歸疏云告老致政事于君此臣下致仕之初也至周乃有大夫七十致仕之禮其事自伊尹始折俸宋朝會要曰唐正元四年定百官月俸僖昭之亂國用窄闕天祐中止給其半後唐同光初孔謙以軍儲不充百官俸錢數多而折之非實請減半數而支實錢是後所支半實俸復從虛折宋朝約後唐所定其非兼職者皆一分實錢二分折支景德罷兵之後始詔俸當給他物者京師每一千給實錢六百在外四百則今折俸之始也祥符五年十一月詔又定加文武官月俸開府漢文帝元年用宋昌為衛將軍位亞三司後漢章帝建初三年使車騎將軍馬防班同三司同三司自此始也殤帝延平元年郭騭為車騎將軍儀同三司儀同之號自此始也魏黃權以車騎將軍開府儀同三司蓋漢制唯三公開府至魏以餘官其儀同三公故以為號由此歷代以名官唐武德七年以為散官特進漢氏諸侯有功德優盛朝廷所敬異者賜位特進在三公下隋文帝以為散官金紫魏晉以來有左右光祿及光祿大夫皆銀印青綬重者詔加金章紫綬因稱金紫光祿大夫後周以為散官銀青漢有光祿大夫皆銀印青綬魏晉之代亦有金紫之別故號銀青光祿大夫後周時為散官光祿秦置光祿勳屬官有中大夫漢武太初元年更名光祿大夫歷代不改後周始以為散官正議隋置正議大夫為散官取秦大夫掌議論之義宋朝會要曰太平興國元年詔改為正奉神宗正官名復曰正議通議亦隋所置散官其命名之義同正議宋朝太宗太平興國元年始詔改為通奉神宗復曰通議太中秦官也掌議論而劉向說苑有晉太中屠餘見晉平公之驕則晉亦有其官矣當是晚周列國之官秦以太中為大夫也中大中大夫亦秦置為光祿勳屬官前漢文紀後元五年有中大夫令免漢書載趙中大夫白公引涇為渠中散王莽所置官也或云漢有中散大夫朝議隋置散官取諸大夫以上得奉朝議以為名朝請通典曰漢竇嬰為朝請竇太后憎嬰門籍不得入朝請此其始也漢律諸侯春朝天子曰朝秋曰請又曰奉朝請無員本不為官漢東京罷省三公外戚皇室諸侯多奉朝請奉朝請者奉朝會請召而已隋開皇中罷奉朝請置朝請大夫為散官取漢公卿年高德重者以列侯奉朝請之義也朝散亦隋所置為散官也朝奉宋朝會要曰太平興國元年詔改唐朝議大夫為朝奉大夫朝請郎通典曰朝請郎亦隋官蓋採晉宋齊梁奉朝請之名也朝散郎亦隋散官也朝奉郎宋朝太平興國初改唐朝議郎為朝奉郎承議通典曰隋所置舊唐書百官志曰唐武德七年改隋文騎尉為承議郎奉議隋散官有通議郎舊唐書志曰正觀十一年定令唯改通議郎為奉議郎通典作奉議郎神宗正官制亦曰奉議通直通典曰隋所置蓋採晉宋以來諸官皆有通直之名官品高下通為宿直也舊唐志曰武德七年改隋屯騎尉為通直郎宣德亦隋置散官也宣義唐改隋游騎尉為宣義郎取梁宣義將軍之名承事漢昭帝時任宮為丞相徵事捕斬上官桀注云徵事丞相屬官隋置徵事郎蓋取諸此宋朝避仁宗嫌名改曰承事宋朝會要曰乾興元年詔改也承奉隋文帝置唐因之宋朝元豐新制改太常寺太祝奉禮部為承奉郎承務唐置因隋尚書省二十四司承務郎之名也古二十五階宋朝元豐中神宗改正官制所定以為寄祿格元祐初各分左右紹聖二年復舊也二柱國楚寵官也懷王使柱國昭陽攻齊陳軫問曰楚國何貴昭陽曰上柱國是也後魏孝莊始立柱國大將軍後將軍官廢有八柱國後周建德四年又增置上柱國大將軍隋置上柱國柱國以酬勳勞實不理事故唐以為勳官二護軍秦有護軍都尉漢以陳平為護軍中尉盡統諸將歷代為將領之任舊唐書志曰武德七年定今改秦齊王下統軍為護軍副為副護軍蓋未為勳官也又有上大將軍大將軍正觀十一年改上大將軍為上護軍大將軍為護軍也按漢百官表護軍都尉哀帝更為司寇平帝元始元年更為護軍也二輕車漢武帝初置輕車將軍始以公孫賀為之又有輕車校尉唐採其名置上輕車都尉及輕車都尉舊唐志曰武德七年改上開府儀同三司為上輕車都尉開府儀同三司為輕車都尉二騎漢武帝元鼎二年置騎都尉初以李陵為之唐採故事置上騎都尉與騎都尉舊唐志曰武德定令改隋儀同三司曰騎都尉四尉謂驍飛雲武四騎尉也並隋置為文散官舊唐書百官志曰武德定令改隋上大都督為驍騎尉大都督為飛騎尉師都督為雲騎尉都督為武騎尉也右十二轉唐以為勳官宋朝因之三師尚書周官曰乃立太師太傅太保茲惟三公晉以為上公後魏始號三師太師虞官商時箕子為之漢官儀曰紂時胥餘為之或云胥餘箕子字也書微子作誥父師少師是也史記曰周成王為太子以太公望為太師續事始曰史記周文王得呂尚於磻溪以為師謂之太師太傅周官或曰古官通典曰成王時畢公為之大戴禮曰周公始為之太保虞官杜佑云商太甲時伊尹為之文王世子曰虞有師保是也三公周始有三公坐而論道後漢始以太尉司徒司空為三公或曰王莽時也太尉秦官河圖錄運法曰堯坐舟中與太尉舜觀鳳凰應劭以為周官皆非也按禮記月令曰孟夏太尉贊傑月令本出於呂不韋不韋秦相故知其秦官耳漢百官表曰太尉秦官掌武事者司徒古官也管子曰黃帝得祝融南方使為司徒少昊以祝鳩氏為司徒舜之命契曰汝作司徒敬敷五教在寬司空亦古官管子曰黃帝得奢龍辨于東方使為士師即司空也少昊鳲鳩氏為司空舜典曰伯禹作司空三臺傅子曰黃帝以風后配上臺后土配中臺五聖配下臺故後世由此以三公為三臺將相軒轅本紀曰帝舉風后為相力牧為將此蓋將相之始也管子曰黃帝得六相而天下治虞舜舉元愷而謂之十六相重事唐會要曰神龍元年五月制盧欽望加平章軍國重事是也景雲三年七月詔竇懷正軍國重事宜共平章又太和四年六月制以裴度為司徒平章軍國重事是時度勳望高以疾上相印又惜之故有此詔唐書裴度傳曰文宗太和四年加度司徒平章軍國重事則是此名自唐中宗命盧欽望始也宋朝元祐初今上新即位以文潞公始為之用前志也平章唐有中書門下平章事為宰相之任蓋行丞相事之類漢韓安國為御史大夫行丞相事後漢周澤行司徒事是也唐百官志曰李靖以疾辭位詔三兩日一至中書門下平章政事名官自此始也會要曰正觀八年十一月也又正觀十七年六月高士廉同中書門下平章政事高宗永淳四年四月郭待舉等並同中書門下同承受進止平章事上謂參知政事崔知溫曰待舉歷任尚淺且令預聞政事未可與卿同受名稱自此四品已下知政事者以平章事為名唐志以為永淳元年也參政唐宰相有參知政事宋朝以為執政官唐會要曰武德元年六月裴寂知政事正觀元年九月杜淹參議朝政三年二月魏徵參預朝政十三年劉洎始為參知政事唐太宗本紀云十一月戊辰也蓋其命官自劉洎始云宋朝會要曰乾德二年四月以薛居正呂餘慶參知政事先是已命趙普為相將用居正等為副太祖召陶穀問下丞相一等有何官對曰唐有參知政事故以命之蓋帝意未欲令居正等名位與普齊也錢若水曰按唐故事劉洎為參知政事宰相任也高宗用郭待舉謂崔知溫曰待舉歷任尚淺未可與卿等同名稱遂令同平章事以此言之平章事亞參知政事矣穀不能遠引漢御史大夫亞丞相故事失之也神宗元豐中行官制除之左右相通典曰成湯初置二相以伊尹仲虺為之伊尹號阿衡仲虺為左相是也又武丁得傅說爰立作相王置諸其左右書亦稱召公為保周公為師相成王為左右故秦悼武王置左右相漢高后亦置二相自此以後多非尋常人臣之職唐龍朔元年改侍中為左相中書令為右相武后又改尚書僕射為文昌左右相開元元年又為左右丞相天寶元年復為僕射又以侍中中書令為左右相至德初復舊故今亦以左右丞相呼二揆者此其始矣宰相昔周公位冢宰正百工以相成王故有宰相之稱其事自秦漢始陳平言宰相上佐天子是也通典曰春秋之義尊上公謂之宰言海內無不統也故亦謂上相陸賈謂陳平曰足下位為上相是也丞相史記秦本紀悼武王二年初置丞相蓋三代三公之任也今侍中令僕射皆其職爾故今亦以為稱應劭曰丞者承也相助也商鞅書定分篇云秦孝公問法令於鞅鞅有丞相置一法官之語則丞相之置已見於孝公時非悼武王始特置之也大抵秦所建官云相國亦秦置官始皇帝立尊呂不韋為相國漢初蕭何亦為之今人以呼宰輔也使相唐睿宗景雲元年始置節度使首以賀拔延嗣領河西至開元中朔方節度牛仙客同中書門下三品節度如故此蓋使相之始也肅宗時郭元振李光弼號使相也相銜唐百官志敘曰永淳元年郭待舉岑長倩同平章事始以入銜後循之以為故事當筆通典曰肅宗至德二年三月宰相分直政事筆人知十日德宗正元五年五月八日又分日一人執筆迄今為故事曰當筆中堂唐制宰相常於門下省議事謂之政事堂永淳中中書令裴炎移在中書省開元十一年張說奏改曰中書門下宋朝行官制除其名也監國史唐百官志曰正觀以後多以宰相監修國史遂成故事也樞密西晉泰始中王景文為中書令兼管內樞密此其名之始也君臣政要曰唐代宗永泰中敕中官董廷秀管樞密因置內樞密使後唐莊宗始用郭崇韜分中書兵房置樞密院與宰相分秉朝政自此始用士人凡文事出中書武事出樞密謂之二府宋朝會要曰開寶九年二月以曹彬為樞密使領忠武軍節度樞密帶節度自此始也太平興國六年九月以石熙載為戶部尚書充樞密使文資正官充使自此始也樞相宋朝會要曰唐以中官為樞密使後唐始有帶相印者則樞相之始自後唐也又至道三年八月以曹彬為兼侍中充使大中祥符五年九月以吏部尚書王欽若戶部尚書陳堯叟並守本官同平章事充使儒臣為樞密而兼使相自欽若始也知樞宋朝會要曰周顯德六年宰相范質王溥並參知樞密院事又淳化二年九月以副使宣徽北院使張士遜知樞密院事知院之名自此始也樞副五代會要曰梁開平元年五月改樞密院為崇政院始命敬翔為院使仍置判官一人自後不置判官置副使一人後唐同光元年十月依舊為樞密亦為樞密副使宋朝會要曰建隆元年八月以趙普為樞密副使周末闕副使至是始置同知樞宋朝會要曰淳化二年九月樞密使王顯出鎮以副使溫仲舒寇準同知院事同知之名自此始也神宗元豐中正官名不置使但以寄祿官一人知院事一人同知為副而已簽樞又宋朝會要曰太平興國四年正月以石熙載為樞密直學士簽署樞密院事簽書之名自此始也治平中避英宗嫌名改曰簽書宣徽唐書裴度傳有宣徽五坊小使則宣徽官名已見於元和之時矣唐末洎五代又有南北兩院使晉天福四年以樞密副使張從恩為宣徽使權罷樞密故也蓋唐官云宋朝會要曰唐置宣徽南北院使有副使後唐省副使開寶九年以潘美依前山南東道節度充宣量徽北院使節度之領宣徽自茲始也按北史后妃傳敘北齊文宣河清中下嬪有宣徽為婦官之名也大學士唐書李泌加集賢殿大學士泌言學士加大始中宗時張說為之按說傳玄宗欲授說大學士辭曰學士本無大稱中宗崇寵大臣乃有之唐百官志曰景龍二年置也蓋其名自中宗時始今惟觀文資政端明有之學士漢孔安國序尚書言秦焚書坑儒天下學士逃難解散蓋以斥承學之士爾晉陶淵明集有學士祖企謝景夷而晉志不言其官然前亦未聞南史宋謝超宗傳曰齊受禪高帝令撰郊廟歌有聰明學士劉融等陳有德教殿學士北齊有文林館學士後周亦有麟趾殿學士當是其稱始自漢晉而命官起於宋齊也唐初有東宮王府等學士齊王元吉亦有文學館學士此從集賢昭文崇賢翰林等雜置不一貞觀初開文學館以房玄齡等十八人為學士宋朝皆為侍從之臣直學士職林曰唐憲宗朝裴垍奏集賢御書院請五品已上為學士六品已下為直學士非登朝者為校理按唐書百官志儀鳳中弘文置詳正學士又曰武德後五品已上曰學士六品已上曰直學士然則唐祖有國之初始有此官觀文歐公歸田錄曰唐至五代相承有文明殿大學士為宰相兼職又有學士為諸學士之首後以文明真宗諡也更曰紫宸議者又以紫宸非人臣宜稱遂更曰觀文資政又曰王欽若罷參政真宗特置資政殿學士以寵之時寇準在中書定其官在翰林下欽若訴於上曰臣自學士拜參政今無罪而罷班反在下是貶也帝為特置大學士班在翰林之上宋朝會要曰景德二年四月以參政王欽若為資政殿學士先是欽若求罷繼以面請故特置是職十二月又以為大學士翰林唐太宗時名儒時時召以草制待詔常於北門候進止號北門學士明皇改曰翰林待詔已而改為供俸開元二十六年乃為翰林學士此蓋其始也職林云至德後天子召集賢學士於禁中草書詔因在翰林待進止遂以為名承旨職林曰至德以後翰林置學士六人內年深德重者一人為承旨所以獨承密命故也此疑承旨之始也而唐百官志曰元和中翰林學士以院長一人別承敕旨或密受顧命為學士承旨職林又謂德宗正元已後承旨多至宰相疑唐志為誤內翰唐百官志曰開元二十六年改翰林供奉為學士別置學士院其後選用益重號為內相又陸贄傳贄入翰林雖外有宰相主大議而贄常居中參裁可否時號內相則是其稱自陸贄始也由此今亦呼翰林學士為內相亦曰內翰敕設筆談曰京師百官上日惟翰林學士敕設用樂雖宰相無此禮優伶並開封府點集陳繹除學士時繹知府遂不用女優學士院敕設之不用女優自繹始也其事在熙寧中端明職林曰五代唐明宗初置端明殿學士如三館之例初入洛謂安重誨曰先帝時馮道何在曰近除翰林學士帝曰此人朕素諳委俄拜端明宋朝會要曰後唐明宗不知書每四方章奏令安重誨讀之多不曉文義宰相孔循獻議置端明殿學士二員在翰林之上以馮道為之太平興國中緣殿名改文明仁宗明道初改承明殿為端明殿明年置端明殿學士又云明道二年八月詔特置端明殿學士始以宋綬充之也二侍通典曰開元中馬懷素等侍讀禁中十三年集賢院置侍讀學士其後康子元為侍講學士宋朝真宗始置此二職於翰林蓋自楊徽之邢昺始也宋朝會要曰咸平二年七月以楊徽之夏侯嶠並為翰林侍讀學士邢昺為翰林侍講學士景德四年八月以翰林侍講學士邢昺知曹州此又侍講學士之外使自昺始也天禧二年十二月以參政張知白為翰林侍讀學士知天雄軍此又侍讀之外使自知白始也唐宋申錫敬宗寶歷二年充翰林侍講學士文宗時鄭覃亦為之龍圖宋朝會要曰大中祥符三年七月以杜鎬充龍圖閣學士在樞直之上此其置官之始也又曰六年九月詔龍圖閣學士直學士結銜在本官之上初杜鎬之為是職職在官下至是陳堯咨上言故更之此結銜在上之始也小龍又曰景德四年八月以待制杜鎬為龍圖閣直學士詔班在樞直之下少退待制在知誥之下並赴內殿起居由此為內制此其始也待制唐永徽五年十二月五日詔許敬宗每日待制於武德殿此始有待制之名永泰元年三月一日敕裴冕等並集賢待制此始有待制之所然則蓋唐設官也龍制宋朝會要曰景德元年十月以杜鎬戚綸充龍圖閣待制此其命官之初也或作咸平四年直龍又曰大中祥符九年十月以馮元為太子中允直龍圖閣直閣之始也天制又曰天聖八年十月詔特置天章閣待制始用范諷為之龍圖天章寶文皆置學士直學士而天章學士罕以命人迄仁宗世纔王贄一人而已自後無聞也天章侍講又曰景祐四年三月詔以賈昌朝等為天章閣侍講比直龍圖閣此蓋設官之初也寶文英宗治平初以寶文閣藏仁宗御書御製即置寶文閣學士直學士及待制之官蓋始用邵必為學士也樞直職林曰五代朱梁太祖開平二年改樞密院為崇政院始置直學士後唐復為樞密院亦曰樞密院學士宋朝會要曰後唐同光中置樞密直學士同光蓋莊宗時年號也蓋朱梁崇政院判官之職也制誥唐百官志曰中書舍人六人以久次者一人為閣老判本省雜事一人知制誥領進畫開元初以他官掌詔敕冊命謂之知制誥宣宗時選用尚書郎蓋先是率用前行正郎宋朝自司諫正言以上參用之官制改其事歸中書舍人又宋朝會要曰雍熙四年以知制誥范杲知京兆府以知制誥領外藩自杲始也續事始曰開元元年蘇頲王琚為紫微侍郎知制誥自後以他官為翰林學士中書舍人皆稱制誥直學士院宋朝會要曰開寶元年中書李昉知制誥盧多遜並直學士院蓋其始也又作二年十一月直舍人院又曰開寶九年十一月以張洎王克正直舍人院此其置職之始也集賢學士唐玄宗開元五年始置修書院於集仙殿即置學士員後改集賢亦曰集賢學士通典曰開元五年十一月於乾元殿東廊寫四部書令馬懷素褚元量總其事於麗正殿安置為修書使十六年宴張說等於集仙殿改殿名集賢改修書使為集賢殿書院學士宋朝曰集賢院學士修國史唐會要曰自正觀中始置史館而著作罷史任至顯慶四年三月始詔劉仁軌等修史長安二年劉允濟又稱修國史天祐二年五月二十九日敕史館修撰張策職名稍卑不稱內庭密重宜稱兼修國史蓋太宗始置館雖有修史之官尚未以修國史為名也高宗乃以命仁軌等云鄴城舊事曰北齊神武時魏收自散騎常侍兼中書侍郎修國史修撰唐明皇開元八年始置修撰於集賢殿天寶後他官兼史職者亦曰史館修撰吳處厚青箱雜記曰太平興國中趙鄰幾等直史館掌修撰楊文舉為史館編修是時修撰未列於職至道中始以李若拙為史館修撰也侍講後漢張酺顯宗時數講於御前每侍講有救正之辭帝常言酺侍講屢諫正及他傳往往有侍講禁內之文名蓋起於此也侍讀唐明皇開元三年七月敕每讀史籍中有闕宜選耆儒博碩一人每日侍讀故馬懷素褚元量更日入直此侍讀之始也直史館唐會要曰正觀三年閏十二月移史館於門下省其修撰史事以他官兼領或品卑而有才者亦直焉此直史館之始也直昭文宋朝會要曰淳化元年八月二十五日以品祐之等直昭文館先是但有直史館至是始命祐之等分直備三館職也談苑曰淳化中復置直史館疑唐有是職也直集賢唐明皇開元十二年改麗正修書院為集賢院增置校理及直院宋朝會要曰淳化元年八月二十六日以和濛直集賢院集賢舊無直院惟江南李氏嘗以朝士任之至是始置從新置也談苑曰淳化中始置直祕閣宋朝會要曰端拱元年五月詔就崇文院中堂建祕閣是月以宋泌直祕閣此蓋置官之始也校理唐開元十二年增置集賢校理宋朝太宗端拱元年建祕閣即以杜鎬為祕閣校理此二官之始也青箱雜記曰端拱初以李宗諤為集賢校理則宋朝集賢校理自宗諤始也說書宋朝會要曰景祐元年二月詔以賈昌朝等為崇政殿說書明道元年翰林侍講孫奭年老乞外郡上問誰可代充講官奭舉昌朝等至是始特置此職四年改為天章閣侍講慶歷二年以趙師民預講復為崇政殿說書稱謂筆談曰集賢院記云開元故事校書官許稱學士今三館貼職皆稱學士循唐典也宋朝神宗行官制祕書省官亦以學士為稱謂也駙馬駙馬都尉漢武帝元鼎二年初置掌駙馬駙馬非正駕車者皆為副馬一曰附近也疾也通典袁樞議曰駙馬都尉置由漢武帝以假功臣戚屬齊職儀曰凡尚公主必拜駙馬都尉者自魏晉已來因為瞻準蓋以王姬之重庶姓之輕若不加等級寧可合巹所以假之皇女也漢制以列侯尚公主而魏何晏始以主壻拜故後代循用為常制蓋自晏為始也唐韻曰晉尚公主者並加之也
