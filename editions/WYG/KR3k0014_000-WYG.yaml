body:
  text: 事物紀原目録類書類卷一天地生植部一正朔厯數部二帝王后妃部三嬪御命婦部四朝廷注措部五治理政體部六利源調度部七卷二公式姓諱部八禮祭郊祀部九崇奉褒册部十樂舞聲歌部十一輿駕羽衞部十二卷三旗旐采章部十三冠冕首飾部十四衣裘帶服部十五學校貢舉部十六卷四經籍藝文部十七官爵封建部十八勲階寄禄部十九師保輔相部二十法從清望部二十一卷五三省綱轄部二十二持憲儲闈部二十三九寺卿少部二十四祕殿掌貳部二十五五監總率部二十六環衞中貴部二十七卷六横行武列部二十八東西使班部二十九節鉞帥漕部三十撫字長民部三十一京邑館閣部三十二會府臺司部三十三卷七庫務職局部三十四州郡方域部三十五真壇淨社部三十六靈宇廟貌部三十七道釋科教部三十八伎術醫卜部三十九卷八舟車帷幄部四十什物器用部四十一嵗時風俗部四十二宫室居處部四十三城市藩禦部四十四卷九農業陶漁部四十五酒醴飲食部四十六吉凶典制部四十七博奕嬉戲部四十八戎容兵械部四十九戰陣攻守部五十卷十軍伍名額部五十一律令刑罰部五十二布帛雜事部五十三草木花果部五十四蟲魚禽獸部五十五臣等謹案事物紀原十卷宋髙承撰考趙希弁讀書附志云承開封人自博奕嬉戲之微蟲魚飛走之類無不考其所自来雙溪項彬為之序陳振孫書録解題亦云中興書目作十卷髙承撰元豐中人凡二百十七事今此書多十卷且數百事當是後人廣之云云今檢此本所載凡一千七百六十五事較振孫所見更倍之而仍作十卷又無項彬原序與陳趙兩家之言俱不合葢後来又已有所增併非復宋本之舊矣其書向惟抄帙明正統間南昌貢生簡敬始以付梓印行無㡬而板燬于火故世間頗為難得然敬所作序乃云作者佚其姓氏亦考之殊未審也書中凡分五十五部名目頗為冗碎其所攷論事始亦間有未確如引秦本紀謂名縣始自秦孝公而不知左傳宣公十一年楚子縣陳杜注巳明言滅陳以為縣並不起于秦時又謂諸葛亮始造木牛即今小車之有前轅者流馬即今獨推者是民間謂之江州車子不知三國志注引亮文集載所作木牛流馬之法甚詳與今之小車制度絶不相類承所言殊為臆説又如祓禊一條不引晉書束晳傳所云周公洛邑秦昭王河曲之事亦屬漏畧然其他類多排比詳贍足資核證在宋代類書中固為猶有體要者焉乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
