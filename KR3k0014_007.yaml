body:
  text: 橫行武列部第二十八內客省使唐初諸功臣傳往往有內客省之語而今有內客省使蓋唐所置也客省使漢有公車司馬令掌天下上章四方貢獻闕下蓋唐客省之職也唐會要曰永泰以後多事四方奏計或連歲不遣乃於右臺門置客省以居之上書言事蕃戎將吏蓋於此待報唐書李師道使崔承慶入奏待命客省是也會要曰昭宗天祐元年四月敕有客省使疑自代宗以來始命其官也引進使五代會要曰梁雜使有引進使宋朝會要曰五代有內外馬步軍都頭蕃漢都引進使疑梁官也四方館使通典曰魏改漢大行令為客館令宋初置南北客館令周署東西南北四掌客後為四方館宋朝會要曰唐四方館以通事舍人判隸中書省宋朝初以檢校官判館事淳化四年改置使名則四方館使自宋朝太宗始也閣門使唐會要昭宗天祐元年四月敕有閣門使五代會要梁諸使亦有東西二上閣門使疑亦唐官也帶御器械宋朝會要曰國初以來選三班以上武幹親信者佩櫜鞬御劍或以內臣為之咸平元年四月以石知顒綦政敏並帶御器械云初止名御帶至是改焉通事舍人堯之試舜賓於四門秦置謁者漢以掌贊喝蓋通事之職也魏置中書通事舍人後除通事為中書舍人掌詔命而通事別為一職隋有通事謁者唐武德四年改曰通事舍人唐志曰東晉有通事舍人唐隸四方館屬中書省也今以為武臣閣門職事官隸閣門也閣門祗候宋朝會要曰故事閣門無通事舍人通事舍人隸中書省其長一人判四方館謂之館老如抽赴閣門祗應者則兼稱閣門祗候按唐武德中改隋通事謁者為通事舍人則閣門祗候之名疑亦武德以來始有其稱也宋朝遂別以命官為通事之次樞密承旨宋朝會要曰五代樞密有承旨以諸衛將軍充宋朝始有樞密都承旨副承旨又別置諸房副承旨也廷福官使又曰明道元年置延福宮使蓋仁宗之初年置也景福宮使又曰大中祥符五年宣政使劉承圭以久疾辭職特置是名在客省使之上又曰大中祥符五年十二月以宣政使劉承圭為景福宮使初承圭乞退宰臣請別加美名真宗曰可特置景福宮使自此始也宣慶使又曰舊諸司使止於宣政大中祥符元年東封禮畢宣政使李神福當遷職特置宣慶使名授之也宣正使又曰淳化五年以王繼恩有平賊功特置此名授之談苑曰太宗時內侍王繼恩平蜀李順之亂中書議以為宣徽使上不欲宦者預政召張洎錢若水議置宣正使在昭宣使之上會要又云五年八月也昭宣使又曰淳化四年置昭宣使初以皇城使王延德王繼恩莊宅使杜彥鈞為之又曰諸司使舊無此額詔旨特置在此年二月也內殿承制又曰大中祥符二年正月詔置內殿承制班在內殿崇班上秩比殿中丞內殿崇班又曰淳化二年正月詔置內殿崇班在供奉官之上餘見侍禁條供奉官唐則天實録曰如意元年置內供奉玄宗時有翰林供奉唐百官志云兩省自侍中中書令已下盡名供奉官此名供奉官之初也筆談曰供奉官本唐從官永徽已後人主多居大明宮別置官謂之東頭供奉官西內具員不廢則謂西頭供奉官宋朝太宗淳化中以供奉有四十年不遷者升授崇班則是五代以來為武臣之職也左右侍禁談苑曰本朝太宗雍熙四年增置左右侍禁宋朝會要曰淳化二年正月置左右侍禁在殿直之上先是供奉官殿直有四十年不遷者故特置崇班侍禁之目左右殿直梁開平二年七月敕有殿直之文又元年宣下宣徽院收管殿前受旨官左右內直等後唐清泰元年七月有殿直都知趙處願晉天福六年七月敕亦有殿直文則殿直之官梁已有之也三班奉職談苑曰宋朝建國之初承舊制有殿前承旨雍熙四年改為三班奉職宋朝會要則其事在淳化二年正月改也三班借職談苑云舊制有借職承旨太宗雍熙中改曰三班借職會要以謂淳化二年正月也談苑又云自供奉至借職其員無數亦漢三署郎比也按今自崇班以上曰大使臣供奉以下至借職為小使臣也諸使宋朝會要曰唐制百職皆九寺三監分典開元中始置諸使朝廷有詔則云諸司諸使以該之皇城唐書朱泚傳曰泚以李忠正為皇城使蓋名官之事始見於此太平興國六年十一月改武德司為皇城司故宋朝諸使有皇城使翰林宋朝會要曰唐有翰林使掌技術之待詔者五代有翰林茶酒使宋朝初有茶床使後止云翰林使尚食秦置尚食歷代為奉御屬殿中省今有尚食奉御是也唐別置尚食使故五代會要梁諸司使有尚食使也御廚唐會要昭宗天祐元年四月敕有御廚使軍器唐會要曰乾元元年六月敕軍器監改為軍器使以內官為之又曰六月十二日廢置使也宋朝會要曰開寶四年五月以軍器使楚昭輔為左驍衛將軍則是國家緣唐制有其官也儀鸞宋朝會要曰唐置營幕使後置同和院梁開平初改儀鸞院使宋朝置儀鸞使弓箭又曰唐有內弓箭庫使宋朝因之後去內字而五代會要梁諸使有弓箭庫使高彥休闕史中亦載莊宅內弓箭之名蓋唐官云續事始曰唐明皇開元初年天寶末置內諸庫使尚衣又曰宋朝初置內衣庫使後省內字又云大中祥符二年七月改內衣物曰尚衣疑取此義也綾錦唐書百官志少府所隸武后垂拱元年有綾錦坊宋朝會要曰乾德年以平蜀所得錦工置綾錦院疑自此始置使也太平興國二年分東西八作續事始曰唐玄宗置內八作使宋朝會要曰舊八作太平興國二年分東西馮鑑又引李肇國史補云玄宗開元初年天寶末所置使有內八作使牛羊通典曰太僕之屬北齊有牛羊置令宋朝會要諸司使副有牛羊使諸司庫務有牛羊司開寶二年六月詔文已有大祀所供犢自今委牛羊司豢養之語疑國初官也香藥宋朝會要曰太平興國中以克平嶺南及交趾海南諸國連歲入貢通關市市人歲乘舶販易外物自三佛齊勃泥占城犀象香藥之物充牣府庫始議於京師置香藥榷易院增香藥之直聽商人市之命張遜為香藥庫使以主之此蓋置官之初也榷易又曰舊有香藥榷易院因置使此其本也又曰大中祥符二年二月撥併榷易院入榷貨務而使名不除也氈毯又曰唐有氈坊毯坊使五代合為一使宋朝因之鞍轡又曰唐神策軍有鞍轡庫五代置使宋朝因之酒坊又曰唐有酒坊使宋朝初加內字後去之法酒通典曰梁有酒庫丞宋朝會要曰周太祖平河中得酒工王思善造法麴因法酒庫置使蓋亦梁酒庫丞比也自皇城至法酒庫已上為東班醫官宋朝會要曰淳化五年八月以翰林醫官趙自化為少府監丞充醫官副使按唐會要正元八年八月令侍御醫尚藥直長藥藏郎並留授翰林醫官然則醫官之置使當是唐官也宮苑通典曰宮苑總監自隋置掌苑內宮館園池之事蓋宮苑之職也唐會要曰開元十九年湯崇慶為五坊宮苑使本一使也唐末始分之唐書方鎮表曰開元二十年置宮苑使朔方節度兼之又會要曰太和九年十一月又有間廄宮苑使然則宮苑唐官也五代會要梁諸司使亦有宮苑使李肇國史補曰開元之前有事於外則命使自置節度始有坐而為使者後又有宮苑使騏驥宋朝會要曰唐有飛龍使及小馬坊使後唐長興元年改飛龍院為左飛龍院小馬坊為右飛龍院太平興國三年改左右天廄坊雍熙二年始曰左右騏驥院使名從之此左右騏驥使副之始也內藏又曰太平興國三年十月初置內藏庫及使名也左藏唐百官志曰開元十九年以監察御史一人監左藏庫後以殿中侍御史一人為左藏使此蓋設官之本也宋朝會要曰唐以太府卿知左藏庫出納五代有使宋朝因之作坊唐百官志曰少府之屬有金銀作坊院宋朝會要曰唐有作坊五代置使宋朝因之莊宅李吉甫百司舉要曰則天分置莊宅使又曰司農別有園苑莊宅使馮鑑續事始則云玄宗置唐會要曰昭宗天祐元年正月敕亦有莊宅使也李肇國史補曰玄宗開元止天寶末置使有莊宅使六宅宋朝會要曰唐置十宅六宅使以諸王所屬為名或總云十六宅後止云六宅宋朝因之文思五代會要曰梁諸使有文思使又云開平元年五月改為乾文院使三年十月以乾文院為文思院後乾文卻置院文思自為一使宋朝會要曰太平興國三年置文思院亦有文思使內園李吉甫百司舉要曰則天分置園苑使後改曰內園又曰司農別有園苑使唐會要正元十四年夏旱吳奉奏有內園使又五代會要梁諸使有內園栽接使也洛苑唐會要曰武德九年七月十九日置洛陽宮苑監永淳元年五月十一日置東西監管諸園苑至開成五年四月敕總監宣令內司管仍別置使此疑其洛苑置使之本唐書馮鑑傳有洛苑使姚文壽縱部曲奪民田則其官始見於此會要梁諸司使亦有洛苑使也如京唐主倉官也唐會要曰文明元年準吏部式監太倉本是察院職務第一人監倉近移入殿院太和九年六月李固言奏殿中侍御史充監太倉使唐志云開元十九年以監察御史充太倉出納使五代梁諸使始有如京使當是梁改太倉使曰如京也蓋取詩曾孫之庾如坻如京之義張緒續錦里耆舊傳王蜀亦有如京副使黃筌也崇儀宋朝會要曰唐有間廄使大平興國五年改名崇儀也西京左藏又曰真宗咸平三年五月八日以贊善石熙政為西京左藏庫副使前此無見疑國初所置官也蓋唐都京兆為西京不得以別都直稱左藏也五代殘缺別都因不言具故事耳西京作坊又曰太祖開寶六年七月録遺以尹崇珂子昭言為西京作坊使餘如西京左藏説也染院周官有染人掌染帛秦為平準令隋有司染署唐又有染坊宋朝會要曰唐有染坊使太平興國三年分置東西染院使名亦改也禮賓唐會要曰天寶十三年三月二十七日敕鴻臚屬司有禮賓院又元和九年六月置禮賓院於長興里其使名疑自此有也五代會要曰後唐天成元年太常禮院奏本朝故事諸蕃客並於內殿引對事在禮賓使由此證知其官始自先唐也又長興三年三月有禮賓使梁進德自契丹報聘回也供備五代會要曰梁諸司使有武備庫使按其職非供備之掌也宋朝會要曰太平興國三年改供備庫為內物料庫而使名不改疑亦國初官也右自宮苑至供備庫使以上為西班教坊唐百官志曰開元二年置教坊於蓬萊宮側京都置左右教坊掌俳優雜劇以中官為教坊使此其始也又曰武德後置內教坊武后改曰雲韶府以中官為使開元後始不隸太常也續事始曰玄宗立教坊以新聲散樂之曲優倡曼衍之戲因其諧謔以金帛章綬賞之因置使以教習之國家乃以伶人之久次者為使云節度後漢公孫瓚討烏桓詔令受劉虞節度唐室名使蓋取此義唐制緣邊戎寇之地則加以旌節謂之節度使始自睿宗景雲二年四月以賀拔延嗣為河西節度使也肅宗至德以後天下用兵中原刺史一例受號也唐書方鎮表云開元二十二年朔方節度始兼處置使兵志曰高宗永徽以後都督帶使持節者始謂之節度使然猶未以名官也留後宋武起義以孟昶總攝後事其伐荊州也以劉道鄰監留府事此留後之始也唐開元之後凡節度入朝或遙領不臨鎮則置留後以董軍事唐會要曰開元十五年十一月蕭嵩領河西二十六年正月李林甫領隴右楊國忠領劍南嵩以牛仙客林甫以杜希望國忠以李察崔圓並為留後此蓋置官之始也德宗正元二年程懷直又自稱觀察留後故聖朝兼二使以名官觀察唐明皇開元二年置十道按察採訪處置使肅宗改曰觀察處置新唐書方鎮表曰至德元載置觀察使百官志曰肅宗乾元元年改也防禦武后聖歷元年以夏州領防禦使祿山犯順當衝諸郡皆置之則是防禦使自則天始也職林云至德後置舊唐書志曰至德後中原大郡要害之地置防禦使以治軍事不賜旌節也團練肅宗乾元元年置防禦團練使馮鑑曰至德中觀風使并領都團練其後上州亦有其號唐百官志曰元載秉政恩結人心刺史皆得兼團練使元載傳曰載用事授刺史者悉帶團練使以悅人心宣撫宋朝會要曰咸平三年六月詔遣參政向敏中充河北東緣邊宣撫大使馮拯陳堯叟充副大使存問官吏自後隨事即置事已乃省蓋自此始也宣撫唐官新書德宗詔蕭復充山南江湖等道宣撫安慰使是也見後傳安撫唐正觀初遣大使巡天下諸州水旱則有安撫之名高宗時命裴行儉册波斯王始為安撫大使天后時聖歷元年狄仁傑為河北道安撫此蓋其始也德宗正元元年又置副使宋朝會要曰咸平三年十月以王欽若為西川梁皓為峽路安撫使但以觀省風俗耳四年八月以張齊賢充涇源等十五軍州安撫經略使帝以邊將玩寇始改命齊賢等使自此始為邊帥也又景德元年五月以知永興軍向敏中充峽路緣邊安撫使先是賊遷死延州鈐轄張崇貴乞朝廷遣使弔問仍望遣大臣至邊上召賊所親信張浦定議故命敏中經度之十月以知青州張齊賢兼青淄維等州安撫使并兵馬巡檢賊盜公事自此又為內地帥座之任經略唐太宗正觀中邊州別置經略使此蓋使名之起也高宗儀鳳二年以黑齒常之為河源軍經略大使宋朝會要曰舊不常置皆因事命使寶元以來陝西緣邊大將皆兼經略也初自咸平四年八月張齊賢為涇源安撫又始以安撫使兼經略云招討唐百官志曰招討使掌征伐兵罷則省云天寶末置招討都統之名始於此事始云開元十七年宰相奏置招討使天寶十五載以來瑱為潁川太守兼招討使職林曰正元時置注又云德宗建中年以馬燧為魏博招討使舊唐志曰正元末置用兵權兵罷則停也總管晉有都督諸軍事後周改為總管唐武德初邊要之地亦置總管以統軍正觀三年李靖除定襄道大總管是也宋朝初有兵馬都部署治平初避英宗嫌名改為總管亦法古號也續事始載周武帝建德六年以王謙為益州總管記為命官之始幕府漢書李廣傳注晉灼曰衛青征胸奴大克就拜大將軍於幕中故曰幕府幕府之名始於此也顏師古曰幕府者以軍幕為義軍旅無常居止故以帳幕遮之廉頗李牧市租皆入幕府此則非因衛青始有號矣又漢文帝問馮唐唐對有上功幕府之説則上將之稱幕府其來久矣今人以稱元帥義取諸此館接伴宋朝會要曰景德二年五月詔將來契丹使至令諸司緣路供帳十一月命翰林學士李宗諤東上閣門使曹利用在京館伴契丹賀承天節使此疑館伴之始有又曰特已命樂簧自康宗元詣雄州接伴回日充送伴使此疑接伴之始也發運五代會要曰晉天福三年韓延嗣配華州發運務此始見發運之名宋朝會要曰乾德二年二月以何幼沖充京畿東西水陸發運使此始有發運使之官也至道元年始命王子輿等為江淮兩浙發運使兼制置茶鹽事就淮南置局咸平二年仍領荊湖四年又加都大字景德三年二月以馮亮為淮南江浙荊湖制置茶鹽兼都大發運使自是使名始定也又有三門白波發運使太平興國五年正月命姚沆為陝府三門發運此疑其初云唐書李傑傳進陝州刺史水陸發運使置自傑始發副至道元年七月以楊允恭為江淮兩浙發運副使兼捉賊制置茶鹽公事景德後亦有副使也轉運秦攻胸奴使天下飛芻挽粟漢蕭何漕運關中又漢漕運山東粟以給中都即轉運之起也唐會要曰先天二年李傑為陝州刺史充水陸發運使開元十八年裴耀卿始為江淮轉運使此其命官之始也宋朝會要曰唐置江淮處置轉運使後置諸道鹽鐵轉運使多以重臣兼領而諸道各置巡院皆統於使五代罷巡院置轉運司國初但曰句當某路水陸計度轉運事官高即曰使也運副開元中裴耀卿為江淮轉運使以崔希逢等為副此蓋運副之始也宋朝會要轉運篇云太平興國初又置副使也運判宋朝會要曰開寶五年八月九日以潘美尹崇珂並兼領嶺南轉運使以轉運使王明為副使許允言為判官則轉運之有判自此其始也太平興國三年四月十日置諸道轉運判官始以戴允誠等分為之唐會要云景龍二年七月置十道按察使分察天下今轉運之兼按察者蓋始於此府提點又曰景德三年三月敕置開封府界提點司即置提點之官呂夷簡三朝寶訓曰真宗謂近臣曰諸道刑獄皆遣官提振唯京師無之去夏開封府訊進士蹇符暴於日中裂其背而鞫之無狀炎暑之際罪未見情枉罹虐毒令置司命京師刑獄處悉糾之提刑又曰淳化二年五月詔諸路轉運司各命常參官一人專知糾察刑獄公事始以司門董循等為之至三年四月詔始稱提點刑獄景德四年六月真宗筆記六事一曰提點刑獄七月詔擇官提點諸路刑獄公事始命屯田李拱等為之將領宋朝神宗初置將官於諸路曰東南或西北等某將有副掌春秋訓練有警則部所將兵以策應於是又有提舉將兵之官部監唐書白居易傳曰王承宗叛帝以吐突承璀率師出討居易諫曰唐家制度每征伐專委將率比年始以中人為都監韓全義討淮西賈良國監之高崇文討蜀劉正亮監之此疑其初也宋朝會要曰國初諸州都監或雜文臣其後遂罷止以武臣為之乾德三年五月敕差起居舍人劉兼通判泗州兼兵馬都監是也太平興國三年五月以客省使翟守素為兩浙諸州兵馬都監此又國家命官之始也監押唐中宗始以中官監押兵馬宋朝諸州亦有兵馬監押小使臣以下即為監押大使臣已上曰都監張緒續錦里耆舊傳曰端拱元年春供奉官宿翰充成都府兵馬監押宋朝之置監押自此始陵臺令唐百官志有陵臺令初曰諸陵署令天寶十載改獻昭等王陵署曰陵臺此蓋命名之初也漢有長陵及文園令歷代皆有令丞宋朝會要曰乾德二年以河南府鞏縣令孔美兼安陵令雍熙二年五月詔今後注鞏縣令使令兼陵臺令公事景德四年正月詔永安鎮特建縣其縣令兼陵臺令也蓋本周官冢人之職掌公墓之比留守成王命君陳分正東郊成周通典記以李晦為西京留守開元十一年太原府置尹以尹為留守謂之三都留守唐志云車駕不在京則置留守此蓋命官之始也宋朝則曰兼某京留守司事也州牧黃帝立四監以治萬國舜外有州牧侯伯則州牧之始蓋自有虞氏也府尹周成王之命君陳東郊曰尹茲東土春秋之時縣邑之長或曰尹楚有令尹此尹之始也漢京兆河南曰尹唐以州郡建府者皆曰尹按漢百官表曰右內史武帝太初元年更名京兆尹此名官之始也都督漢光武建武初權置督軍御史事竟輒罷魏文黃初三年初置都督諸軍事然魏初受漢禪時已有持節都督則非三年初置也大抵魏所建官耳明帝太和四年秋始加大都督以命司馬懿唐太極初并益荊揚開元中兼潞為五大都督也漢建安中魏武為相始遣大將軍督之二十一年征孫權還使夏侯惇都督二十六軍於是始有都督之官矣刺史先秦以御史監郡漢初省之惠帝復建監三輔郡文帝十三年九月遣丞相史出刺并督察御史武帝元封五年又置部刺史察州晉以來任輕者加持節後周又加諸軍事唐武德後加號使持節某州諸軍事某州刺史宋朝以他官知州事而刺史下臨州以為武臣加官而已舊唐志云初漢奉使者皆持節故刺史臨部持節晉任重者為使持節部督後魏北齊加諸軍事也知州唐李師道之阻兵也謂其弟師古曰是不更民疾苦要令知衣食所從乃署知密州唐會要曰太和四年八月御史臺奏按大歷十二年五月一日敕刺史有故乃闕但令上佐依次知州事則知州之名自代宗始也宋朝之制自大都督府至下州親王為大都督庶姓為長史餘使及刺史有故及闕但令上佐依次知州事太祖始削外權止令文臣權蒞後為知軍州事二品以上及帶兩府宣徽者稱判國老間談曰太祖嘗語趙普以唐室亂源在諸侯難制何術以革之普曰諸列郡以京官知三年一替則無虞迄今行之也通判國家初置諸州通判楊文公談苑云太宗始置即古監郡也宋朝會要曰建隆四年四月命賈玭等充荊南諸州通判又乾德四年十月詔書已有通判又建隆乾德皆太祖年號則是此官之設自太祖始也按唐室上州置長史一人掌通判州事則通判之名亦取唐制州長史之職為稱耳勸農漢承秦置大農丞十三人人部一州以勸農桑力田者此勸農官之始也唐中睿之世州郡牧守皆以勸農名其官宋朝會要曰至道二年七月直史館陳靖言天下多曠士流民請置使招集八月以靖為勸農使按行陳許等八州勸民墾田其副皇甫選何亮以為功難成願罷至景德三年二月詔諸路轉運開封知府諸知州少卿監以上並兼勸農使其餘知州軍通判並兼勸農事令自今除授依此河隄宋朝會要曰乾德五年正月詔開封大名鄆澶等十七州長吏並兼河隄使此蓋其始也晉東都省都水置河隄使者簽判宋朝之制諸州府幕官大藩鎮以京朝官簽署節度觀察判官者曰簽判治平中避英宗嫌名改署曰書宋朝會要曰景德元年十月以大理評事祕閣校理劉筠等分知天雄軍節度觀察判官事此蓋簽判之始也判官秦漢以來郡府之幕有掾史從事逮於梁齊亦無判官續事始曰隋元藏機始為過海使判官此使府判官之始也唐景雲之後有節察防團等使亦各隨使置之五代留府軍監皆置焉監皆曰幕職或呼幕客舊唐志云皆天寶後置也馮鑑乃云開元後始有之尚為諸使官屬五代多故始領郡事以為州府職也推官唐百官志曰節察防團使皆有推官舊唐書云天寶續事也書記漢書百官志曰王公及大將軍幕府皆有記室掌章表書記續事始引魏志太祖以陳琳阮瑀為記室文帝與吳質書稱孔璋章表殊健元瑜書記翩翩宋江夏王乃以丘源為掌書記而未為職名唐開元元年敕節度置掌書記自後藩侯得自奏請也又魏志建安中曹洪欲使阮瑀掌書記支使唐置觀察使亦置觀察支使則支使唐置官也續事始曰唐至德初改採訪使為觀風始置判官二人支使二人推官一人也軍判五代會要曰後唐天成二年九月十九日敕刺史州不合有防禦判官今後改為軍判官此蓋置官之本也軍巡又曰梁開平三年十月置左右軍巡使各置巡院宋朝會要云唐末始置後唐分左右也舊開封府以牙校為之開寶六年六月改用士人李萼趙中衡太祖以刑禁之重始任士流也呂夷簡三朝寶訓曰開寶六年上謂近臣曰開封府左右軍巡諸州馬步判官比來所在止選牙校為之刑獄事重人命所繫自今當選士流任之也參軍杜佑云參軍後漢末置參諸軍府事若今節度判官漢書曰靈帝以幽州刺史陶謙參司空張溫軍事此其始也本公府官晉始置其官於州齊唐諸曹皆稱之續事始以謂後漢置在州曰司録事漢司隸屬有功曹從事史兼録衆事在州為治中漢又有督郵主簿皆録事之任也晉始置録事參軍刺史有軍而開府者並置之本為公府官非州職也續事始曰後漢有郡主簿亦曰督郵隋以録事參軍代之掌句稽文簿舉彈善惡監牌印給紙筆之事開元初京兆河南曰司録管六曹宋朝京邑大府以京朝官領其事曰知其非京官而資考久次者亦曰知也三輔決録韋康成為郡主簿是也功曹秦漢有功曹史蕭何為書史掾功曹是也後漢有功曹史主選功勞北齊為功曹參軍今止開封府置餘州皆省也倉曹漢有倉曹史北齊以為參軍今亦獨開封府置也戶曹漢公府有戶曹掾主民戶祀農桑州郡為史北齊與功倉曹同為參軍唐諸府曰戶曹餘州曰司戶兵曹漢公府掾史有兵曹主兵事司隸屬官有兵曹從事史郡國為使北齊同諸曹為參軍今又獨置於開封府也法曹漢公府掾史有賊曹掾主刑法曹之任也歷代皆有或為法曹隋以後與功曹同陳孝意為東郡司法書佐是也唐為參軍事士曹北齊始有士曹參軍今獨開封府置餘州雖有司士又以為散官也司理漢公府有決曹掾主罪法事通典以為法曹之職白氏六帖則云魏置理曹掾蓋法曹也即今司理之任舊制諸州有馬步院及子城院主禁繫訊獄張緒續錦里耆舊傳曰開寶六年秋敕改馬步院為司理院廢馬步都虞候除文資為司理參軍成都雄藩一十六處置左右焉子城院不得禁繫公事呂夷簡三朝寶訓曰太祖開寶六年謂近臣曰諸州馬步判官比來止選牙校為之刑獄人命所繫當選士流任之蓋自是始置司理之官也餘見軍巡條唐諸州有馬步使文學漢郡國皆有文學掾則文學漢官也唐會要曰大歷十四年十二月五日諸州府學博士改為文學品秩同參軍唐志曰文學州授於吏部然無職事衣冠恥之故朝以為散官炙轂子曰隋開皇中潞州刺史柳昴表勸學帝令州置博士俾其教授唐肅宗時顏真卿曰文學蓋復漢舊號也教授隋有州博士潘徽嘗為之唐武德初府郡亦置經學博士掌以五經教授德宗即位改為文學元和中廢宋朝神宗元豐中興太學三舍以經術養天下之才又於諸大郡府始各置教授一人掌教導諸生如太學博士亦隋州博士之職也縣令周官有縣正下大夫春秋之時縣邑之長曰大夫秦本紀曰孝公十二年并諸小鄉聚為大縣縣一令商君列傳曰鞅令邑聚為縣置令丞則縣令及丞自秦孝公始也漢百官表曰縣令長皆秦官萬戶以上為令減萬戶為長宋朝會要曰周衰六國置縣邑其長齊晉曰大夫魯衛曰宰楚曰公曰尹秦曰令曰長也知縣唐會要曰大中五年十二月景陵有賊斫損神門戟架六年四月裴讓權知縣事蓋知縣之名始起於此矣宋朝會要曰建隆四年六月詔河朔右地魏為大名分治劇邑當用能吏思慎釐於縣務特選士於朝行斷自朕心以重其任大理正奚嶼知大名府館陶縣事監察御史王祐知魏縣楊應夢知永齊縣屯田于繼徽知臨清朝臣知縣自嶼等始也縣丞史記商君傳曰鞅令邑聚為縣置令丞縣丞秦官也宋朝會要曰天聖四年七月詔開封兩縣各置丞一人在簿尉之上先兩赤簿尉多差出至是蘇耆上言乃命增置此國家置丞之初也應邵漢官曰大縣丞左右尉所謂命卿三人也今以京朝官領其任者曰知縣丞自神宗朝增置也主簿漢有之後漢繆彤仕縣為主簿是也續事始則云後漢始有主簿之號諸郡置之即今録事參軍也至隋大業中諸縣始置主簿掌句稽簿籍糾正縣內非違縣尉漢百官表曰縣有丞尉長安有四尉分左右是也蓋亦漢官都廂國初以來以四廂都指揮使巡轄提舉京城裹諸巡警時謂之廂主凡煙火盜賊即部所轄以赴之諸公事自笞以下皆得區分神宗熙寧中置句當左右廂公事所以文臣一員主之自鬭訟賊盜杖六十而下皆決之以分天府之劇也民間謂之都廂別駕唐六典曰後漢州置別駕歷代皆有之杜佑云別駕本因漢置隨刺史巡察若今觀察之有副使也宋朝與長史司馬並為散官云通典曰從刺史行部別乘一乘傳車故謂之別駕漢制也長史漢百官表曰秦置郡丞其郡當邊戍者丞為長史則長史宜秦所置官也通典曰唐五府長史理府事餘府州通判而已司馬曲禮天子之五官有司馬周禮以為政官之率漢為三公之任周政官之屬又有大小軍輿行都家等職本任武之官古者軍行則有之左傳晉悼公以魏絳為中軍司馬是也魏晉以後刺史帶將軍開府者則置之自此始為州郡官唐高宗即位改治中為司馬節度亦有行軍司馬今與節度團練副使並以為貶責之官醫學唐會要曰正觀三年九月十六日諸州府置醫藥博士開元十一年五月七日始置醫學博士唐志曰開元元年改醫藥博士為醫學也助教晉咸寧四年初立國子學置助教以教生徒魏始於太醫置之唐國子四門俱有其官開元元年諸州始置醫學助教宋朝神宗元豐中除之初宋朝唯以四門國子助教命醫者故官制行唯置太醫及州助教也京師釋名曰國君所居曰都帝王世紀曰太昊都陳此稱都之初也三代而來夏曰夏邑商周曰京師京大也師衆也大衆所居故以名天子之都京城宋朝會要曰自朱梁建都以汴州為東京皆因藩鎮舊制但改名額而周顯德五年始廣新城周回四十八里二百三十步宋敏求東京記曰周世宗顯德二年四月詔京城四面別築羅城三年正月發京畿滑鄭曹之民命薛可言等四面督之韓通總其事王朴經度凡通衢委巷廣袤之間皆朴定其制踰年而成宋朝神宗熙寧中始四面築為敵樓作甕城及濬治壕塹也門名又曰太平興國四年九月詔改京城內外門名三十有二即今名南薰宣化是也東京記曰外城諸門大抵俱周顯德中築外城立也保康門又曰大中祥符五年七月詔曰重城陽位通門肇開宜以京城新開門為保康門初建會靈觀於奉節致遠二營仍作此門於朱雀門之東南闢街與觀北門相直也坊名又曰至道元年十一月詔改京城內外坊名即今太平義和等一百三十六是也太宗以舊名多涉俚俗之言至是始命以美名易之惟寶積安業樂臺利仁四坊仍舊東京記曰太宗命張洎改撰其名也新城外坊至道中定後祥符元年始分置九廂及諸坊也大內又曰今大內即宣武軍節度治所朱梁建都遂以衙第為建昌宮晉天福初又為大寧宮第改名號而已周世宗雖加營繕猶未合古制建隆三年發開封浚儀民廣皇城四年五月太祖遣有司畫洛陽宮殿按圖修之自是皇居始壯麗矣西京內又曰唐蔡賊孫儒諸葛爽之犯洛陽宮闕燔燒殆盡其後張全義為河南尹始加繕治纍年方集宋朝開寶八年十月遣使修也西京殿又曰太平興國三年二月詔改西京新修諸殿名今太極天興等名是也南京殿又曰大中祥符七年二月真宗幸應天府詔升為南京正殿以歸德為名又以南門為崇禮雙門為祥輝三月又賜南京諸門名龍圖閣又曰咸平四年十月以杜鎬為龍圖待制即建閣在是年前矣又云真宗於會慶殿西偏藏太宗御製咸平又真宗登極年號即建閣當在初年矣東京記則云大中祥符初建以奉太宗御集而國老間談乃有太宗幸龍圖閣觀書之語天章閣又曰天禧五年二月於龍圖閣北起天章閣奉安真宗御製既成令兩街僧道俱威儀教坊作樂奉真宗御集御書自玉清昭應宮安於閣上也此其始云東京記曰天章閣天禧五年三月建以藏真宗御集寶文閣東京記曰本名壽昌閣與天章並建慶歷初改日寶文仁宗聖文神翰祕於此也資善堂仁宗肄學之所也宋朝會要曰在元符觀南大中祥符八年置天禧四年徙御廚北也又曰祥符九年二月詔元符皇子就學之所宜以資善堂為名繼聖堂東京記曰太宗尹京命署東建堂習射大中祥符二年閏二月真宗臨幸宰臣請以繼聖為名許之今人呼曰繼聖堂學士院唐武德正觀時溫大雅等以文辭召待詔常於北門候進止玄宗開元二十六年始置學士院始改待詔為翰林學士故也史館史職肇自黃帝而倉頡沮誦掌之周及列國亦有史名漢武置太史公漢以後職在祕書唐太宗始置史館以修國史唐百官志曰歷代史官隸祕書省著作局正觀三年閏十二月始移史館於禁中蓋自是始別局也昭文館唐會要曰武德四年正月置修文館九年三月改為弘文九月太宗即位弘文殿聚書殿側置弘文館神龍元年十月十九日改曰昭文後復曰弘文宋朝避廟諱復曰昭文與集賢史館同為三館也神宗行官制皆隸祕書省青箱雜記曰本前世弘文館建隆中以犯宣祖諱改焉集賢院唐開元五年乾元殿寫四部書置麗正修書院於集仙殿十三年明皇召張説等宴集仙殿謂説曰今與卿等賢才同宴於此宜改名集賢由是修書院亦曰集賢院祕閣宋朝會要曰端拱元年五月詔就崇文院中堂建祕閣淳化元年八月二十一日李至書言漢桓置祕書監掌禁中圖書祕記魏以屬少府王肅表論不應屬少府曰魏之祕書即漢東觀因是不屬而蘭臺亦藏書故薛夏云蘭臺為外臺祕書為內閣然則祕閣之名始於此矣晉孝武敕徐廣料祕閣四部三萬餘卷是也起居院北齊有起居省宋朝會要曰淳化五年四月五日張泌奏復左右史之職記録以為起居注太宗從之置院於禁中此其始也四方館沈約宋書曰高祖永初中置南北客館令主四方賓客後為四方館此其始也待漏院唐元和中方置待漏院於朝門外令百官朝以避風霜國史補云皇城司宋朝會要曰本名武德司太平興國六年十一月改為皇城司東京記曰掌皇城管鑰木契及命婦朝參顯承殿內取索事內東門又曰舊名內門取索司景德三年二月改為內東門司三月鑄內東門司印給之東京記曰掌宣索庫務寶貨及貢獻納於內中修造宴設事興國中置內庫門取索司景德中改也合同司又曰天禧二年正月三司言使臣傳宣取物承前止是口傳詔旨別無憑驗致因緣盜取錢物請下入內內侍省傳宣合同司如有須索以合同憑由一本給付逐處五年十一月鑄合同憑由印給之東京記曰掌禁中宣索之物天禧中置傳宣合同司尋改今名御藥院唐尚藥局有內藥院宋朝太宗至道三年又置御藥院於禁中也東京記曰掌合和御藥至道三年置在崇政殿後祥符八年徙外廊南寶元二年復移殿後東廊內藏庫宋朝會要曰太平與國三年十月宣置在銀臺門外又曰景德四年十月陳彭年撰內藏庫記真宗曰太祖以來有景福內庫太宗改名內藏庫所貯金帛備軍國之用非自奉也呂夷簡三朝寶訓曰乾德初太祖顧左右曰軍興須豫備臨事厚斂非計也於講武殿後別為庫貯金帛此蓋置庫之始也沂國文正公筆録曰太祖平諸僭偽收金帛歸京師貯別庫號封椿庫歲儲國用羡餘皆入焉諭近臣曰石晉割幽燕郡縣賂契丹一方人限外境朕甚憫之俟此庫所蓄滿三五百萬以為贖直會上仙事寢太宗改右藏庫今曰內藏庫東京記曰國初置景福內庫太平興國三年改曰內藏其説小異也左藏庫通典曰漢有中藏晉有左右藏晉江東置御史掌庫曹後分庫曹曰外藏庫內左庫後省外左庫直曰左庫唐有左藏庫百官志曰左藏晉始有之也東京記曰國初止一庫興國二年分三庫曰錢幣金銀匹帛淳化三年分置左右右納左給凡六庫四年廢右分左藏庫為四庫曰錢金銀曰絲綿曰生白匹帛曰雜色匹帛祥符二年併金銀絲綿為一七年併生白雜色為生熟匹帛奉宸庫宋朝會要曰舊五庫一宣聖殿二穆清殿三崇聖殿四受納真珠五樂器康定元年九月合為一庫改名奉宸庫也御殿素廚又曰大中祥符九年置在玉清昭應宮後徙御廚也金水河又曰東京水源曰祝龍泉過中牟曰金水建隆二年春命陳承昭引抵都城西架其水橫絶經汴入浚溝乾德三年引貫皇城歷後苑內庭池沼皆至開寶九年太祖親按引注王第及公主第也五丈河談苑曰京水自滎陽至於汴陳承昭本江南人習知水利國初上言導京水踰汴東北注河通山東之漕其廣五丈以號河其事在太祖時也門下省先秦有黃門郎而無寺府後漢嘉平六年始有之曰侍中寺晉志曰給事黃門侍郎與侍中俱管門下衆事故謂之門下省然則晉始名之也唐志曰晉始置門下省也中書省中書之官雖起自漢武而所治之府魏晉始有之謂之中書省通典曰中書之官舊矣謂之中書省自魏晉始焉鳳池世謂中書曰鳳池者按晉荀勗為中書監遷尚書令勗久在中書失之甚恚有賀之者怒曰奪我鳳皇池何賀故今以為稱也尚書省通典曰堯試舜於大麓領録天下事似其任也周之司會又其職焉鄭康成云司會若今尚書也漢有尚書臺宋始曰尚書省也都省漢以僕射總理六尚書謂之都省至唐垂拱中改尚書省曰都省是則都省之號始自漢也南省晉以門下名省號北省故以尚書為南省是則南省之稱始自晉也蘇鶚演義曰省省也謂省察天下簿書之所御史臺秦漢有御史府亦曰寺亦曰憲臺後漢始曰御史臺亦為蘭臺寺舊唐志則曰後漢改為憲臺魏晉宋曰蘭臺梁陳北朝曰御史臺也臺門御史臺記曰臺門北開取肅殺就陰之義韋述唐兩京記曰臺門北開以糾劾之司主意於殺故門北啓以象陰殺或曰俗傳開南門不利大夫談賓録曰或云隋初移都兵部尚書李圜通兼御史大夫欲向省便故開北門唐因循不改迄今遂為故事唐會要載裴冕語云此説若取冬殺之義本置臺司以糾正冤濫是有好生之德豈創冬殺之義以入人罪乎馮鑑以冕説為當柏臺漢成帝時御史府列柏樹故人由是號柏臺烏府漢御史府植柏常有野烏數千棲宿其上晨去暮來號朝夕烏一旦烏不至及朱博為大夫烏復至因號烏府亦曰烏臺九寺漢以來九卿所治之府謂之九寺後魏始有三府九寺之稱然通其名不連官號其以官名寺自北齊始也蘇氏演義曰寺司也官有所司存釋名曰寺嗣也官曹相嗣續其中非也許慎曰寺從叉從寸寺者掌法度之所叉者手象如手持尺寸以度其典章耳祕書省漢藝文志曰武帝建藏書之府置寫書之官天下文籍悉在天祿石渠圖廣內祕室之書故曰祕書後漢有蘭臺東觀雖孝桓始置祕書監而不以名其省至梁始曰祕書省也唐六典曰祕書省中外三閣掌圖書古今文字皆在禁中宋朝神宗改官制易崇文院曰祕書省復唐制也殿中省魏置殿中監而北齊以屬門下隋大業三年分門下太僕二局取殿內之名為殿內監唐為殿中省也國子監晉武帝咸寧四年初立國子學國子周舊制也北齊為國子寺隋開皇十三年又為學煬帝即位改曰國子監少府秦置少府而不治府漢始有之隋煬帝大業五年始曰少府監也將作秦漢有將作而不列其府北齊始有將作寺隋文帝開皇二年改寺為監軍器後周武帝置都水漢武元鼎二年始置水衡初秦有都水丞於是水衡方有都水帝置都水謂之都水臺隋文仁壽元年始改為監太史局少昊歷正曰鳳鳥氏夏曰太史隋以名謂曰太史曹煬帝改曰監唐曰局乾元元年曰司天臺後復曰太史宋朝以來亦曰司天臺神宗改官制復為太史局也太醫局周有醫師秦置太醫歷代皆置宋朝神宗又置局曉醫者一人判局事按唐亦有太醫署而神宗創置以教生徒如學校也入內省宋朝會要曰國初有內中高品班院淳化五年改曰入內班院又改入內黃門班院又改內侍省入內內侍班院景德三年止名入內內侍省也又云景德三年五月內侍省內侍班院請入內內侍班院止稱入內內侍省本班亦請稱內侍省也東京記曰舊有入內都知司內東門都知司至是悉併於此內侍省周官有巷伯寺人及內小臣之職戰國時趙有宦者令秦置中常侍漢有謁者內侍之官而不言其府北齊始置中侍中省隋改曰內侍宋朝會要曰國初有內班院淳化五年改黃門院又改內侍省內侍班院景德三年止曰內侍省進奏院唐大歷十二年敕諸道舊置上都留侯院並官改曰上都進奏院此蓋其始也宋朝會要曰唐藩鎮皆置邸京師謂之上都留侯院大歷十二年改上都知進奏院五代支郡聽自置邸國初緣舊制各置進奏院太平興國八年十月詔於大內側近置都進奏官人兼三四州也檢院國史纂要曰武后時投匭者或不陳事而有嘲謔之言於是置使先閲其書奏然後投之匭院有司自此始也宋朝會要曰唐匭雍熙元年改為檢太平興國九年七月改匭院為登聞院至道五年或稱檢院景德四年五月詔改登聞檢院東京記曰唐置匭興國九年改匭為檢院曰登聞鼓院宋朝會要曰鼓院舊曰鼓司景德四年五月九日詔改為登聞鼓院軍頭司又曰國初但曰軍頭引見司後加御前忠佐之名又曰端拱二年改軍頭司曰御前忠佐軍頭司引見司曰御前忠佐引見司
