body:
  text: 公式姓諱部第八敕三代而上王言有典謨訓誥誓命凡六等其總謂之書漢初定儀制四品其四曰戒敕今敕是也自此帝王命令始稱敕至唐顯慶中始云不經鳳閣鸞臺不得稱敕敕之名遂定于此黃敕唐高宗上元三年以制敕施行既為永式用白紙多為蟲蛀自今已後尚書省頒下諸州諸縣並用黃紙敕用黃紙自高宗始也制劉協文心雕龍曰古者有命無制周禮太祝作六辭以通上下其二曰命是也蘇氏演義曰制也止也禁也斷也言君上用人或制斷而行之或禁制而止之詔又文心曰有熊唐虞同稱曰命其在三王事兼誥誓詔誥也教也所以告教百姓三代無文起于秦漢史記秦始皇二十六年李斯議命為制令為詔歷代因之鳳詔後趙石季龍置戲馬觀觀上安詔書用五色紙銜于木鳳口而頒之宋大禮御樓肆赦亦用其事自石季龍始也誥尚書湯黜夏作誥漢初太上皇稱之今太后亦稱之又所以命官授職皆為誥以成湯為之始蘇氏演義曰誥告也言布告王者之令使四方聞之今言告身者謂己身受其告令也册命漢儀四品一曰策書策簡也今册命即是蓋始于漢書顧命曰丁卯命作册書則漢緣周事也宣麻唐書百官志曰開元二十六年改翰林供奉為學士專掌內命凡拜免將相號令征伐皆用白麻則宣麻之始自明皇世也宣頭筆談曰宣頭所起按唐故事中書舍人職掌誥詔皆寫四本一為底一為宣謂出行耳未以名書也晚唐樞密使自禁中受旨出付中書即謂之宣中書承受録之于籍謂之宣底梁置崇政院專行密命後唐復樞密使以郭崇韜安重誨為之始分頒政事不關中書直行下者謂之宣如中書之敕也是則宣頭之始出于晚唐而定于後唐也教漢制王侯及郡守長吏于所部其指令皆稱教取敬敷五教之義今猶皇后稱教旨疑始于漢王侯長吏之稱教也表堯咨四嶽舜命九官並陳辭不假書翰則敷奏以言章表之義也漢乃有章表奏駮四等則表蓋漢制也蘇氏演義曰表者白也言以情旨表白于外也按衣外為表論語必表而出之以披露于意雜事曰漢定禮儀則有四品上書太甲既立不明伊尹作書以戒此上書之始也七國時臣子言事于其君皆曰上書秦改曰奏今亦有上書之事又通于臣下者也轉對唐書薛玨傳玨為京兆尹司農供三宮蓄茹不足請市時韋彤為萬年令玨使禁賣德宗怒奪彤俸帝疑下情不達詔延英坐日許百司長官二員言闕失謂之巡對唐會要曰正元中詔每御延英令諸司長官二人奏本司事常參官每日二人引見訪以政事謂之巡對宋朝因之曰轉對移文心曰始于劉歆移太常孔稚圭因有北山移文今有移牒之名疑始此也檄又曰始于周穆王令祭公謀父為威讓之辭以責狄人也戰國策謂始于張儀檄楚誤矣蘇氏演義曰顏師古注急就章云檄激也以辭旨慷慨發動之意又曰邀檄也關唐會要曰唐制諸司相質問三曰關開通其事也蓋始于唐宋朝神宗行官制用唐事露布隋書志曰後魏每征戰剋捷欲天下聞知乃書帛建于漆竿之上名為露布露布自此始也其後相因施行通典亦云爾按後漢桓帝時地數震李雲乃露布上書移副三府注謂不封之晉代桓溫北伐須露布文喚袁宏宏倚馬濡染不輟筆俄得七紙則露布晉已有矣祝文記云伊耆氏始為八蠟乃有祝文其文曰土反其宅水歸其壑昆蟲母作草木歸其澤是也漢董仲舒有祝日食文亦本於此誄周制大夫已上有諡士則有誄是誄起于周也禮檀弓魯莊公及宋戰縣賁父死之公誄之士之有誄自此始也按周禮六辭以通上下親疏遠近六曰誄注謂積纍生時德行以賜之命是也論語注云誄者哀死而述其行之辭也殿下漢以來皇太子諸王稱殿下漢之前未聞唐初百官于皇太后亦稱之百官洎東宮官對皇太子亦呼之今雖親王亦避也始于漢續事始曰漢以前未有此呼魏志太祖定漢中杜襲始呼之時操封魏王故襲呼殿下按此自杜襲始也酉陽雜俎曰秦漢以來于天子言陛下皇太子言殿下將言麾下使者言節下轂下二千石長吏言閣下父母言膝下通類相呼言足下閣下沈約宋書三公黃閣其事前史無文按禮士韠與天子同公侯大夫即異注謂三公與天子禮數相亞故黃其閣示謙不敢斥尊此是漢制疑閣下之呼出自此矣故今呼三公曰閣下足下畢苑曰晉介之推逃祿抱樹燒死文公拊木哀嗟伐而製屐每懷其功俯視其屐曰悲乎足下足下之稱當緣此爾史記戰國之士或上書時君或談説君前及相與論難多相斥曰足下蓋自七國相承至今也下官通典曰宋孝武帝多猜忌諸國吏人于本國君不得稱下官事在孝武建中也本為王國避臣之稱而今人或以自謂也啓張璠漢記曰董卓呼三臺尚書已下自詣啓事然後得行此則啓事得名之始也魏國箋記始云啓末云謹啓晉宋以來與表俱用今止臣下以相往來也簡詩出車曰畏此簡書簡書者治竹煞青作簡以書爾今人直用紙名曰簡以通慶弔問候之禮取簡書之義尺牘類也錦帶前書曰書版曰牘書竹曰簡書舜曰書用識哉春秋子家弔宣孟以書漢曰尺牘陳遵所善是也故今曰書尺名雖見于有虞而實始于春秋題緘事始曰唐元和中李趙公權傾天下四方緘翰日至蒲路帥郤士美有珍獻趙公報書敘殷勤誤入振武封中振武阿趺光進知其誤還之公因命書吏凡有書題名籤官號以送之于今為式曰題緘也門狀又曰漢初未有紙書名于刺削木竹為之後代稍用名紙唐武宗時李德裕貴盛百官以舊刺禮輕至是留具銜候起居之狀至今貴賤通用謂之門狀稍貴禮隔者如公狀體為大狀名紙釋名曰書名字于奏上曰刺後漢禰衡初遊許下懷一刺既無所之適至于刺字漫滅蓋今名紙之制也則名紙之始起于漢刺也姓通歷洎帝王五運歷年記人皇之後有五姓四姓七姓十二姓紀則姓之始疑起于此而帝王世紀至太昊始曰庖犧氏風姓也易類是謀曰黃帝吹律定姓疑姓自大昊始而黃帝定姓者因生賜姓之始也陸法言引風俗傳云張王李趙為黃帝賜姓果按姓者統其祖考之所自出氏者別其子孫之所自分氏春秋左氏傳曰天子因生以賜姓胙之土而命之氏蓋命氏之原尚矣天皇而降皆稱雖盤古之初亦曰氏也族望筆談曰世人以氏族相高雖從古有之然未盛著自魏氏銓總人物以氏族亦不專任門地唯四夷則全以為貴賤如天竺以剎利婆羅門為貴種其餘為庶姓是也國主大臣各有種姓茍非貴種國人莫肯歸之庶姓雖有勞能亦自甘居大姓之下後魏據中原此俗遂盛于中國唐末方衰息也名帝王世紀曰神農母名女登春秋鉤命決曰任似感龍生帝魁注云魁炎帝名左傳曰太皞以龍紀官故為龍師而龍名又太皞之母名華胥則名疑始于伏犧氏之前字禮記郊特牲曰冠而字之敬其名也冠而字成人之道也字所以貴名帝王世紀曰少皞帝名摯字青陽則自金天氏始為字也諱周禮小史之職有事詔王之諱注云先王之名禮卒哭以木鐸徇于路捨故而諱新注故高祖之諱新新死者之諱春秋左氏傳曰周人以諱事神名終將諱之則是諱名自周人始也禮祭義云文王稱諱如見親花押古者書名改真從草取其便于書記難於模倣唐書曰韋郇音荀公陟每書陟字自號五雲體俗浸相緣率以為常復有不取其名出于機巧心法者此押字之初疑自韋陟始也果按陟字殷卿明皇開元中注禮部侍郎常以五采箋為書記使侍妾主之陟惟署其名自謂書陟字若五朵雲特號郇公五雲體禮禮記曰禮始諸飲食蓋自太昊取犧牲以供庖廚制嫁娶以儷皮為禮始也王子年拾遺記曰庖羲崇禮教以遵文通典曰伏羲已來五禮始彰堯舜之時咸備揚子法言曰法始乎伏犧而成乎堯匪伏匪堯禮義哨哨也祭祀王子年拾遺記曰庖犧使鬼物以致群祠以犧牲登薦百神則祭祀之始也黃帝內傳曰黃帝始祠天祭地所以明大道史記曰高陽潔誠以祭祀高辛明鬼神而敬事之也齋戒春秋命誠圖曰黃帝請問太一長生之道太一曰齋六丁可以成功內傳曰帝誓翦蚩尤乃齋三日以告上帝此齋戒之始也壇墠左氏注曰除地為墠築土為壇書金縢武王有疾周公為三壇同墠黃帝內傳乃有築壇墠事是為其制起自黃帝郊丘通典曰黃帝封禪天地則郊丘之始矣又黃帝內傳曰王母既會帝于蓬萊帝歸乃築圜壇以祀天方壇以祭地則圜丘方澤之始也禘郊禮記祭法曰有虞氏禘黃帝而郊嚳祖顓帝而宗堯則茲禮始于虞舜也三歲郊史記封禪書曰漢武即位之明年初至雍郊見五畤後常二歲一郊則郊以三歲自漢武帝始也合祀祀天于南郊祭地于北郊古今之通義也通典曰漢平帝位王莽頗改祭禮云天地有合有別有合者孟春正月上帝辛丁天子親合祀天地于南郊于是始同祀若圜丘今南郊之合祀自王莽始也黃圖載元始四年宰衡莽孟春親郊祭天南郊以地配望于山川遍于群神天地位皆南鄉同席地差在東是也明堂尸子曰黃帝曰合宮有虞曰總章商曰陽館周曰明堂管子曰黃帝有明堂之議通典曰黃帝拜祀上帝于明堂唐虞祀五帝于五府夏后享祖宗于世室商人曰重屋周人宗祀文王于明堂以配上帝周禮又曰夏后世室商人重屋漢時公孫玉帶畫黃帝明堂圖則明堂要自黃帝始也而孟詵錦帶前書紀鄭康成匠人夏世室注云上五室法五行木室處東北曰青陽火室東南曰明堂金室西南曰總章水室西北曰元堂土室中央曰太室蓋夏以不毀為名故曰世室商加重簷故曰重屋周以明布政令故曰明堂餘見禮記月令也封禪史記封禪書曰封泰山禪梁父者七十二家無懷氏為之始蓋在太昊前也管子亦云遁甲開山記則太昊之後自女媧至無懷凡十五代乃在大昊後炎帝前也神州王者所居之地名也通典於周制方丘篇始録之則是神州之祭自周始也按王嬰古今通論崑崙方五千里謂之神州中有和美鄉帝王之宅聖人之所生也今呼京都為神州意蓋本於此也社禮記曰社祭土而主陰氣左氏曰共工氏有子曰句龍為后土實始為社漢書黃祖十年春有司奏令縣道常以春二月祠社稷以羊豕蓋自三代以來社稷為諸侯命祀秦罷侯置守故諸侯之職歸守令漢始以郡縣祠社稷也稷禮稷為五穀之長昔烈山氏之子曰柱能植百穀故祀為稷高辛至夏皆祀之湯為旱遷柱以周稷代之欲遷句龍無可代者故自湯以來皆祀之其州縣祭社稷儀蓋自宋祥符中始定其式也蠟臘蠟者歲十二月合聚百物而索饗之也禮記郊特牲曰伊耆氏始為蠟又曰蠟之祭主先嗇而祭司嗇先為田報祭也詩疏云伊耆神農並與大庭為一也山川通典曰黃帝祭于山川典禮為多則山川祀秩始自黃帝氏也舜典望秩于山川也按山川乃名山大川五嶽四瀆之屬望而祭之故曰望籍田周制天子孟春躬耕籍田國語虢文公言之詳矣其事亦見于周官甸師之職及禮記則其禮周制也禮記武王耕籍田然諸侯知所以敬先農漢文制春始耕于籍田官祠先農以一太牢則其祀由漢興也先蠶周禮內宰詔王后蠶于北郊齋戒享先蠶禮亦雜記其事然禮之紀多商周之制及其餘群小祀俱周典云五祀世本曰商湯作五祀戶井竈中霤行至周而七曰門行厲戶竈司命中霤也高禖五經要義曰高禖先王子孫之祀也注云高辛妃簡狄吞燕卵而生契後王以為禖官典曰鄭注俱云後王不知起于何代也靈星漢有天下高祖制詔御史令天下立靈星祠蓋祈穀也時漢興八年矣通典曰周制仲秋祭靈星于國之東南則非漢始祀之也壽星通典曰周立壽星祠在下杜亳時奉焉宋朝會要曰景德三年七月王欽若言禮記月令八月命有司秋分享壽星于南郊唐開元二十四年七月敕所司置壽星壇祭老人星及角亢七宿今百神咸秩而獨略壽星望俾崇祀禮院言壽星南極老人星也爾雅云壽星角亢也注云數起角亢列宿之長故云唐開元中上封事者言月令八月日月會于壽星居列宿之長請八月社日配壽星于太社壇享之當時遂敕特置壽星壇也周伯宋朝會要曰大中祥符二年九月邢中和言景德三年周伯星出角亢之下按角亢為太山之根果符上封之應望于親郊日置周伯星于亢宿間禮院言司天元奏周伯星出氐三度氐亢相去不遠並壽星之次乃設位于氐星之間九宮又曰景德三年九月王欽若言九宮貴神天寶立祀咸平四年三月杜鎬言唐明皇天寶中述九宮貴神次昊天上帝明皇肅宗皆嘗親祀又景祐二年四月章得象言唐天寶中術士蘇嘉慶始置九宮神壇于城東祭以四孟隨歲改位行棊謂之飛位按唐會要曰天寶三載十月十六日蘇嘉慶上言請于城東置九宮貴神壇每歲四孟月祭也大火又曰康定元年十月胡宿言按春秋士弱對晉侯曰古之火正或食于木陶唐火正曰閼伯居商丘祀大火焉説文曰火正火官也掌祭火星行火政後世以為火祖相土契之曾孫代閼伯宋其後也商丘今南京則閼伯之神主祀大火願列祀官祭大火禮官議曰閼伯為高辛火正實居商丘主祀大火後世因之為貴神配火侑神功謂宜因作壇兆秩大火以閼伯配然則大火之祀始于帝嚳而宋朝仁宗復其典也后土按西漢祭天于甘泉泰畤祭地于汾陰后土後漢始定南北郊然則汾陰后土本漢祀地示之所也宗廟禮緯元命包曰唐虞五廟沿革亦云昔唐虞五廟夏后因之至商而七書咸有一德曰七世之廟可以觀德是也周兼文武二祧故九廟由唐虞推而上之明其前有至堯舜乃祭五廟爾廟號王者祖有功宗有德始自有虞祖高陽而宗堯故舜典有歸格于藝祖受終于文祖大禹矢謨亦有受命于神宗之文商有天下太甲號囗囗太戊為中宗武丁為高宗始列宗廟之號故漢世因之西京有太宗世宗東京有顯宗肅宗而唐室諸帝乃例稱之蓋其事原于虞舜而備于商人也朝獻筆談曰唐制有事於上帝則百神皆預祭告惟太清宮太廟則上親行謂之奏告止南郊為正祠天寶九載詔以告者上告下之辭今後太清宮宜稱朝獻太廟宜稱朝饗自此失奏告之名又皆為正祠其禮自唐始也配天有虞為禘郊之禮以祀昊天上帝始有配食之事祭法有虞氏禘黃帝而郊嚳是也虞以上尚德用有德者夏商稍用其姓代之先後至周始嚴父配天故孝經曰嚴父莫大于配天則周公其人也周公郊祀后稷以配天宗祀文王于明堂以配上帝注謂以父配天之禮始自周公蓋配天侑食肇于有虞而明堂之嚴父配帝則自周公始也配饗尚書盤庚之告其臣曰茲豫大享于先王爾祖其從與享之則功臣配享之禮由商人始也周禮有功者書于太常祭于大丞司勳詔之也趙簡子記祀董安于廟魏祀曹真于太祖廟又祫祀功臣二十一人也木主典禮曰措之廟立之主曰帝檀弓曰商主綴重蓋廟所以藏主宜始為廟即立主也版位宋朝會要曰景德二年九月二日上封者言郊立天地神位不嚴望令重造詔王欽若詳閲修製十一月一日版位成貯以漆匣舁床覆以黃縑帕壇上四位以朱漆金字第一神位黑漆金字第二黑漆黃字第三已降黑漆朱字天地祖宗為一匣餘十二位為一匣即今之神位版也牙盤又曰乾德六年和峴言唐天寶中享太廟禮料外每室加常食一牙盤五代遂廢詔自今親享廟別設牙盤食禘夾時享皆同之按唐會要曰天寶五載四月十六日詔享太廟宜料外每室加常食一牙盤則享廟之設牙盤食自唐明皇始也獻果史記叔孫通傳孝惠曾春出遊離宮通曰古者有春嘗果今櫻桃熟可獻願因出取獻宗廟帝從之云諸果之獻由此興也按禮記有天子羞含桃薦之寢廟又似周制非始于通也飲福宋朝會要曰乾德元年十二月以南郊禮畢大宴于廣德殿自後凡大禮畢皆設宴如此例曰飲福宴蓋自此其始也青城又曰天聖二年三月太常禮院案周禮幕人掌帷幕幄帟綬之事鄭注云正出宮則有是事在傍曰帷在上曰幕皆以布為之四合象宮室曰幄王所居之帳也帟若幄中坐上承塵皆以繪為之綬組所以繫帷也又掌次云王大旅上帝則張氈案設皇邸祀五帝則張大次小次注曰次幄也大幄初往所止居也小次既接祭退俟之處宋朝自太祖以來每行郊禮皆營青城幄殿即周禮大次也又于東壝門外設更衣殿即小次也是則宋朝之設青城自周制也內寺僧史略曰謂之道場內起于後魏得名于隋煬帝改僧寺曰道場置于宮中故曰內今宋朝洪福等殿安佛經聲鍾為內寺此其初也唐代宗始有其事玉皇號宋朝會要曰大中祥符七年正月真宗詣玉清昭應宮率天下臣庶奏告上玉皇聖號真宗實録曰大中祥符七年九月上對侍臣曰自元符之降朕欲與天下臣庶同上玉皇聖號至天禧元年正月辛丑朔帝詣太初殿恭上玉皇大天帝聖號曰太上開天執符御歷合真體道玉皇大天帝惟是疑會要所紀奏告是八年事云章衡紀年通載曰大中祥符八年正月壬子朔上玉皇大天帝號聖祖號御製靈遇記曰景德初王中正遇司命真君傳藥金法上之四年十一月降劉承規之直舍五年始奉上徽號曰九天司命天尊真宗實録曰大中祥符五年十月十七日上夢景德四年先降神人傳玉皇命云今汝祖趙有名此月二十四日降如唐真元事至日天尊降延息殿閏十月己巳詔上九天司命保生天尊聖號曰聖祖上靈高道九天司命保生天尊大帝又六年七月甲午詔加上九天司命上卿保生天尊曰東嶽司命上卿佑聖真君初封禪畢詔上司命天尊之號至是以聖祖臨降名稱相類故改上焉天禧元年正月壬寅帝詣景靈宮天興殿恭上也然實録之記聖祖加號前後不同故備述二年中事云章衡紀年通載曰天禧元年辛丑朔上玉皇聖祖號寶册聖母號宋朝會要曰天禧元年三月六日册上聖祖母懿號曰元天大聖后先是大中祥符五年制加上聖祖母號俟兗州太極觀成擇日奉上至是詔王旦等行册禮也採訪號筆談曰廬山太平觀乃九天採訪使者祠自唐開元中創建元豐二年道士陶智仙門人陳若拙發地銅錢有應元保運四字至四年有詔進號九天採訪使者為應元保運真君遣內侍廖維持御書殿額賜之乃與錢文同符黑煞號楊億談苑曰開寶中有神降于終南山進士張守真自言我天之尊神號黑煞將軍與真武天蓬等列為天之大將太宗即位築宮終南山陰太平興國六年封翊聖將軍翊聖傳曰建隆之初鳳翔府盩厔縣民張守真遊終南山聞空中有召之者曰吾高天大聖玉帝輔臣授命衛時乘龍降世太宗遣王守節王龜從就終南山下築宮興國初詔封翊聖將軍真宗受元符封泰山後大中祥符七年詔加號曰翊聖保德真君真武號宋朝會要曰天禧二年閏四月詔醴泉所立觀曰祥源六年詔加真武號曰真武靈應真君孔子封唐禮樂志曰明皇開元二十七年詔夫子稱先聖可諡曰文宣王遣三公持節册命唐會要曰開元二十七年八月二十四日追諡孔子為文宣王其後嗣改封嗣文宣王二十七日命裴耀卿等就國子監册命宋朝會要曰大中祥符元年詔追諡玄聖文宣王五年十二月改諡至聖避聖祖諱也孔子父宋朝會要曰大中祥符元年十一月二日敕叔梁紇宜追封齊國公顏氏追封魯國太夫人孔子妻又敕幵官氏追封鄆國夫人果按世家注作丌宮氏今闕里之宮止曰官氏十哲封唐會要曰開元二十七年八月二十四日詔十哲並宜褒贈顏子亞聖須優其秩顏子封袞公閔子費侯等是也七十子又詔七十子並宜追贈曾參贈成伯顓孫師陳伯是也制曰十哲之外曾參之倫未有稱謂宜疏五等之封俾與先聖咸膺盛禮周公封宋朝會要曰大中祥符元年十一月詔周文公旦可追封文憲王于兗州曲阜縣建廟春秋委州長吏致祭太公封唐書肅宗紀曰上元元年閏四月己卯追封太公為武成王宋朝會要曰大中祥符元年十月詔維師尚父實贊隆周宜加諡昭烈武成王仍于青州建祠廟老子號又高宗紀曰乾封元年二月己未追號老子太上玄元皇帝唐會要曰天寶二載正月十五日加號大聖祖八載六月十五日加號大道玄元皇帝十三載二月七日加號大聖祖高上大道金闕玄元天皇大帝宋朝會要曰大中祥符六年八月十一日制謹奉上真元皇帝聖號曰太上老君混元上德皇帝真宗實録云六年七月庚午制也紀年通載云大中祥符七年正月戊申奉上太上老君尊號册寶也李母號又武后紀曰光宅二年九月甲寅追尊老子母曰先天太后唐會要則云文明元年九月册玄元皇帝妻為先天太后二説未知孰是列子號唐會要曰天寶元年三月十九日李林甫奏列子號沖靈真人宋朝會要曰景德二年二月九日詔沖靈真人宜進號沖虛至德真人列子廟在圃田至是真宗車駕經過故有此詔莊子號又唐會要曰天寶元年二月十二日追贈莊子南華真人三月十九日李林甫奏文子列子莊子庚桑子其書各從其號為真經文子號又曰天寶元年三月十九日李林甫奏文子號通玄真人庚桑子號洞靈真人宋朝會要曰大中祥符五年十月二十六日禮儀院請改文子為通元真人五嶽號又曰武后垂拱四年七月一日封嵩嶽為神嶽太中王萬歲通天元年四月一日尊為皇帝中宗神龍元年復為王先天元年八月二十日又封西嶽為金天王開元十三年封太山為天齊王天寶五載正月封中嶽為中天王南嶽司天王北嶽安天王宋朝會要曰大中祥符元年十月十五日詔泰山天齊王加號仁聖天齊王四年二月二十一日加號西嶽曰順聖金天王二十六日又詔加號中天王為崇聖中天王五月加上中嶽曰中天崇聖帝東嶽曰天齊仁聖帝南嶽曰司天昭聖帝西嶽曰金天順聖帝北嶽曰安天元聖帝五鎮號隋書開皇十四年立冀鎮霍山祠開元禮惟祭四鎮開寶後益霍山為五唐天寶十載正月二十三日始封東鎮沂山為東安公南鎮會稽山為永興公西鎮吳山為成德公中鎮霍山為應聖公北鎮醫巫閭山為廣寧公嶽后號宋朝會要曰大中祥符四年十一月二十九日詔加上東嶽淑明后南嶽景明后西嶽肅明后北嶽靖明后中嶽正明后之號四海號唐會要曰天寶十載正月二十三日封東海為廣德公南海廣利公西海廣潤公北海廣澤公宋朝會要曰康定二年十一月詔封東海為淵聖廣德王南海洪聖廣利王西海通聖廣潤王北海沖聖廣澤王四瀆號又唐會要曰天寶六載正月十二日封河為靈源公濟為清源公江為廣源公淮為長源公宋朝會要曰大中祥符元年十一月十四日詔河瀆進號為順聖靈源公康定二年詔封四瀆皆為王按三代命五嶽視三公四瀆視諸侯唐始加其等也水府號宋朝會要曰大中祥符二年九月十七日詔江州馬當上水府廣祐寧江王宜封福善安江王太平州採石中水府濟遠定江王封順聖平江王潤州金山下水府虛肅鎮江王封昭信泰江王舊封江南保大中偽號至是始易之追贈自武王克商追王太王王季故後代有追諡追尊之典兩漢逮今人臣亦有追贈之制追封漢書張賀傳賀為掖庭令宣帝以皇曾孫收養掖庭恩甚密及帝即位追思賀封恩德侯此則追封之始也樂山海經曰祝融生長琴是處搖山始作樂風注云創樂風曲也通典曰伏犧樂名扶來亦曰立本神農樂名扶持亦曰下謀隋樂記曰伏羲有網罟之歌詠伊耆有葦籥之音葛天八闋神農五絃其來尚矣呂氏春秋曰葛天氏之樂三人操牛尾投足歌八闋則非長琴始為樂也世本曰伏羲造琴瑟是始為樂至黃帝命伶倫考八音調和八風為雲門之樂則其事于是乎備樂府通典曰漢武立樂府蓋始置之也樂府之名當起于此胡部唐禮樂志曰自周陳以上雅鄭淆雜而無別隋文始分雅俗二部今俗樂二十八調是也又有倍四本寫樂形類雅音而曲出於胡部此名胡部之始也復有銀字中管之別皆前代應律之器後人失其傳而更異名故俗部諸曲悉源於雅樂筆談曰外國之聲前自別為四夷樂唐天寶十三載始詔法典與胡部合奏自此全失古注以先王之樂為雅樂前世新聲為清樂合胡部為宴樂教坊唐明皇開元二年於蓬萊宮側始立教坊以隸散樂倡優曼衍之戲餘見教坊使條鈞容宋朝會要曰鈞容軍樂也太平興國三年詔籍軍中之善樂者命曰引龍直每巡省遊幸則騎導車駕而奏樂端拱二年又選捧日等軍曉暢音律者增多其數蕃臣以樂工進亦隸之淳化三年改名鈞容直取鈞天之義雲韶又曰雲韶部者黃門樂也開寶中平嶺表擇廣州內臣之聰警者得八十人令于教坊習樂賜名簫韶部雍熙初改名雲韶舊唐志曰武德已來置內教坊于禁中則天改曰雲韶府會要曰如意元年五月二十八日也則雲韶之名已見于是矣律法通典曰伏犧氏作易紀陽氣之初以為律法此蓋其肇也律呂呂氏春秋曰黃帝命伶倫自大夏之西阮隃之陰取竹于嶰谷以生空竅厚均者斷兩節間長三寸九分而吹之以為十二筒聽鳳鳴以為十二律雄鳴六為律雌鳴六為呂月令章句曰上古聖人本陰陽別風聲乃截竹為管謂之律晉律歷志曰黃帝命伶倫造律呂也二變通典曰商已前但有五音宮商角徵羽自周加文武二聲謂之二變孟詵錦帶前書曰變宮變徵自商以前皆用五聲以配十二辰至周武王克商之時從午至子天有七助故加文武二變聲是為七音五聲為體二變為和依此相生迭為之宮尚書大傳云七始為七其五聲為正二聲為變然則變宮變徵乃始於周也按國語周景王問七律伶州鳩曰武王伐商歲在鶉火月在天駟星在天黿姬氏出自天黿自鶉及駟七列南北之揆七同凡神人以數合之以聲昭之然後可同也故以七同其數而律和其聲故有七律此蓋其始也諸調筆談曰宮商角為正聲徵羽為變聲加變徵則從變之聲已瀆矣隋鄭譯始調具之均展轉相生為八十四調清濁溷淆紛亂無統並流為新聲自後有犯聲側聲王煞寄煞偏字傍字雙半字之法然則今胡部諸調皆源於鄭譯三臺三十拍曲名也劉公嘉話録曰三臺送酒蓋因北齊文宣毀銅雀臺別築二箇臺宮人拍手呼上臺因以送酒李氏資暇曰昔鄴中有三臺石季龍遊宴之所樂工造此曲促飲也又一説蔡雍自御史纍遷尚書三日之間歷三臺樂府以雍曉音律製此曲以悅之未知孰是小辭筆談曰古詩皆詠之然後以聲依之詠以成曲謂之協律詩外有和聲所謂曲也唐人乃以辭填入曲中不復用和聲此格雖云自王涯始然正元元和之間為之者已多有在涯前者又小曲有咸陽沽酒寶叉空之句云李白作花間集乃云張泌所為莫知孰是楊繪本事曲子云近世謂小辭起于溫飛卿然王建白居易前於飛卿久矣王建有宮中三臺宮中調笑樂天有謝秋娘咸在本集與今小辭同花間集序則云起自李太白謝秋娘一云望江南又曰近傳一闋云李白製即今菩薩蠻其辭非白不能及此信其自白始也劉斧青瑣集隋海中記有望江南調即焬帝世已有其事也鼓吹唐樂志曰黃帝使岐伯作鼓吹以揚德建武蔡雍禮志亦云然唐紹傳曰紹謂鼓吹本軍容黃帝戰涿鹿以為警衛也凱歌蔡雍禮志曰黃帝使岐伯作軍樂凱歌今還軍有樂即其遺意也女樂列女傳曰夏桀既棄禮義淫於婦人求四方美女積之後宮作爛漫之樂晉獻公欲伐虞遺以女樂二八左傳鄭略晉侯以女樂論語齊人歸魯女樂自周末皆有而桀為之始準漢元帝時京房造準中瑟而十二絃隱開九尺中央一絃下有盡分寸六十律之節宋朝仁宗時阮逸胡瑗輩復用其制作之歌山海經曰夏后開上三嬪於天得九歌九辨以下焉又曰帝俊有子八人是始歌舞夏侯玄辨樂論曰伏犧有網罟之歌呂氏春秋有葛天氏歌八闋一曰載人二玄鳥三逐草木四奮五穀五天帝六達帝功七依地德八物禽獸之極則歌以太昊為始蓋太昊之後十三代有葛天氏故也舞又山海經曰天與帝爭神帝斷共首乃以乳為眼以臍為口操干戚以舞又曰帝俊八子是始為舞孟頻引教坊記曰昔陰康氏次葛天氏元氣肇分災沴未弭民多重腿之疾思所以通利關節是始制舞然則舞自康氏始也呂氏春秋曰陶唐氏之始陰多滯伏民多壅閼故為作舞以宣導之誤矣孟詵錦帶前書則云舞樂之興始於黃帝故周用六代之樂越取黃帝以謂始舞可尊也周禮六舞五曰人舞注無所執以手袖為威儀祀星長舞之即今代之舞出於此也鐘月令章句曰上古聖人本陰陽別風聲審清濁不可以文載口傳於是始鑄金作鐘以主十二月之聲山海經曰炎帝之孫伯歧因鼓遂為鐘又曰伯歧生鼓延是始為鐘呂氏春秋曰黃帝命伶倫鑄十二鐘世本曰黃帝工人垂所造皇圖要紀曰帝嚳造鐘聲禮曰垂之和鐘鄭康成云垂堯時鐘工也鎛鐘隋音樂志曰鎛鐘即黃帝所命伶倫鑄十二鐘和五音者也宋朝會要載馮元等議曰昔黃帝命伶倫與營援鑄十二鐘以調月律今鎛鐘是也鼓禮記明堂位曰土鼓蕢桴伊耆氏之樂也帝王世紀曰黃帝殺夔以其皮為鼓黃帝內傳曰帝與蚩尤戰玄女為帝製夔牛鼓又請帝制鼓鼙以當雷霆世本曰夷作鼓蓋起於伊耆氏之土鼓也山海經云夔大獸似牛一足無角皮可面鼓鼓足又明堂位曰夏后氏之鼓足鄭注云足是四足毛公詩注曰夏后氏足鼓隋音樂志曰建鼓夏后氏加四足謂之鼓足建鼓同前又曰商楹鼓詩商頌曰置我鞉鼓毛公注云商人置鼓鄭箋云湯改夏之制乃始植我商家之鼓楹謂之柱楹貫植之隋音樂志曰建鼓商人柱貫之謂之楹鼓近代相承植而貫之謂之建鼓蓋商所作也又棲翔鷺於上不知何代所加或曰鵠取其聲揚而遠聞或曰鷺鼓精越王句踐大鼓於雷門以厭吳晉時移於建康有雙鷺哾鼓而飛入雲或曰皆非也詩云振振鷺鷺於飛鼓咽咽醉言歸古之君子悲周道之衰頌聲輟飾鼓以鷺存其風流未知孰是懸鼓明堂位曰周懸鼓按周頌有瞽之詩曰應田懸鼓周禮雷靈路晉鼛等鼓皆有簨簴以懸之隋音樂志曰建鼓周人懸之謂之懸鼓磬説文曰無句氏作磬世本亦云又曰磬叔所造不知何代人古史考曰堯時人也樂録曰磬叔所作禮記曰叔之離磬皇圖要紀曰帝嚳造鐘磬通禮義纂曰黃帝使伶倫造磬也簨簴禮記曰夏后氏龍簨簴蓋樂之制自造鐘磬則宜有簨簴而飾之以龍則自夏后氏始也方響通典曰梁有銅磬則今方響也方響以鐵為之以代磬唐書禮樂志曰方響體以應石審此則是出於編磬之制而梁始為之者也琴文選西都賦曰伏犧作琴世本曰伏犧造琴琴操曰伏犧作琴長三尺六寸六分琴書曰伏犧氏王天下制桐為琴廣雅曰伏犧氏琴長七尺二寸説文曰琴神農所造桐越練朱五絃至周文增其二帝王世紀曰炎帝作五絃之琴桓談新論曰神農氏始削桐為琴繩絲為絃又曰周文王武王各加一絃廣雅又云神農琴長三尺六寸六分止有五絃文王增二絃隋音樂志曰琴神農制為五絃周文王加二絃為七者也高氏小史曰炎帝教人作五絃之琴通禮義纂曰堯使母句作琴五絃楊雄琴清英曰舜彈五絃琴堯加二絃山海經曰帝俊生晏龍是始為琴禮記曰舜作五絃之琴以歌南風雖諸家記所始長短增絃不同要之以太昊作之為是趙惟暕又云琴始自伏犧爾雅曰大琴曰離二十絃傳此是伏犧所制一絃琴通典曰一絃琴有十二柱柱如琵琶晉紀曰孫登居白鹿蘇門二山彈一絃琴按拾遺記云師延商樂工也商時總修三皇五帝之樂撫一絃之琴或作瑟則地祇皆升是商代則有矣今瞽者撫之以擬曲者是擊琴通典曰擊琴柳惲所作惲嘗為文思有所屬援筆誤中琴因以管承絃又以竹片約而束之使絃急而聲亮舉以擊之以節曲按南史柳惲傳初父世隆彈琴為士流第一惲每奏父曲嘗感思復變體備寫古曲嘗賦詩未就以筆捶琴坐客過以筯扣之惲驚其哀韻乃制其雅音後傳擊琴自於此今世俗有彈獨絃琴以竹作扣擊之節疑此也馬明生別傳曰明生隨神女入石室金床玉几彈琴有一絃五音並奏瑟世本曰伏犧造瑟王子年拾遺記曰庖犧氏絃桑為瑟世本又曰庖犧氏作瑟五十絃後黃帝使素女鼓瑟哀不自勝破為二十五絃具二均聲帝王世紀曰伏犧作瑟三十六絃隋音樂志曰瑟二十七絃伏犧所作者也高氏小史曰太昊作二十五絃之瑟西都賦曰神農造瑟呂氏春秋曰朱襄氏之王天下為風陽氣畜積果實不成故王建作五絃之瑟高誘曰王建朱襄之臣瞽瞍制為十五絃舜益以八絃為二十三絃山海經曰晏龍始為瑟數説雖異以世本之説為得阮通典曰秦琵琶也武后時蜀人蒯朗於古墓中得銅器似琵琶而圓時人莫識之元行沖曰此阮咸所造命匠人以木為之行沖以其形似月聲合琴名月琴杜佑以為晉竹林七賢圖阮咸所彈與此同因謂之阮咸李氏資暇曰唐中宗朝元行沖為太常少卿有人於古冡獲銅鑄樂似琵琶而圓獻於元公元曰此阮仲容所造命工以木為之音韻清朗頗難名之權以仲容姓名呼焉阮公昔賢豈可以其名氏號樂器乎元以其形似月聲合琴因是名月琴自是知之者不以舊名呼或謂咸豐肥創此器以移琴聲四絃十三柱倚膝摐之謂之擘以代撫琴之艱也今人但直曰阮也箜篌釋名曰師涓所作靡靡之樂也蓋空國之侯所好之晉應劭曰漢武令侯調始造此器史記封禪書漢武禱祠太一后士始用樂作空侯杜佑曰或云俟暉其聲坎坎應節故曰坎侯訛為空侯侯者因樂人姓耳謂師延作非也風俗通曰漢武令樂人侯調依琴作坎侯宋臨川守劉義慶空侯賦曰侯牽化而始造通典説其形似瑟而小用撥彈之非今器也又有云空侯胡樂也漢靈帝好之體曲而長二十三絃抱於懷中兩手齊奏之謂之擘正今物也續漢書曰靈帝胡服作胡空侯隋音樂志曰立箜篌出自西域非華夏舊器也箏陸法言切韻曰箏秦蒙恬所造風俗通曰箏秦聲也而五絃今十三絃不知誰作傳玄箏賦序曰或以謂蒙恬造亡國之臣蓋不能關思也隋音樂志曰箏十三絃所謂秦聲蒙恬所作也又風俗通曰按禮樂記箏築身今箏形如瑟不知誰改傅子曰上圓象天下平象地空中準六合絃柱十二擬十二月乃仁智之器阮瑀箏賦曰長六尺應律數晉陶融妻陳氏箏后夔創制子野考成也琵琶風俗通曰琵琶近代樂家所作不知其始樂府雜録曰始自烏孫公主造馬上彈之王愆期終幕祠儀曰出於絃鼗傅玄琵琶賦序曰故老云漢遣鳥孫公主嫁昆彌念其行道思慕使知音者裁箏築空侯之聲作馬上之樂以方語目之曰琵琶釋名曰本起於胡中馬上所鼓石崇以謂昔公主嫁烏孫令琵琶馬上作樂以慰其思隋音樂志曰曲項琵琶出自西域非華夏舊器也事始云或云碎葉國所獻嵇琴杜摯賦序曰秦末人苦長城之役絃鼗而鼓之記以為琵琶之始按鼗如鼓而小有柄長尺餘然則擊絃於鼓首而屬之於柄末與琵琶極不仿佛其狀則今嵇琴也是嵇琴為絃鼗遺象明矣唐禮樂志曰琵琶禮圓修頸而小號秦漢子蓋絃鼗之遺製出於胡中傳為秦漢所作今人又號嵇琴為秦漢子通典亦云秦漢子本出胡中俗傳是漢制兼以秦制者蓋兼用秦漢之法而諸家皆記為琵琶之始何也或曰嵇琴嵇康所制故名嵇琴雖出於傳誦而理或然也簫通禮義纂曰伏犧作簫十六管事始云女媧造風俗通曰舜作竹簫其形參差以象鳳翼十管長尺二寸世本亦曰舜造長二尺隋音樂志曰簫十六管長二尺舜所造者也各不同而古今以為舜作篪世本曰蘇成公所造古史考謂成公善篪耳又曰暴辛公所造舊制一曰管不知辛公何代人然非舜前明矣舜時西王母獻管則辛公安得造也隋書音樂志曰篪長尺四寸八孔蘇公所作者也通歷曰帝嚳平共工之亂作鼗鼓控揭塤篪故樂記以為聖人作為德音之音也觱篥説文曰乃羌人所吹屠觱以驚馬樂録曰笳管也何承天纂文曰羌胡樂記出於胡中其聲悲本名悲栗通典亦云或曰胡人吹之以驚中國馬後乃以笳為首以竹為管樂府雜録曰本龜茲國樂唐編鹵簿名為笳管用之雅樂以為雅管六竅則為鳳管令狐揆樂要曰篳篥出於胡中或云龜茲國也徐景山云本胡人牧馬截骨為筒用蘆貫首吹之以驚群馬因而為竅以成音律今胡部在管音前故世亦云頭管笛馬融長笛賦序曰此器起於近代本出羌中風俗通曰漢武時丘仲所造長尺四寸七孔京房曰丘仲工其事不言所造廣雅曰籥謂之笛有七孔而周官笙師教吹笛音笛藝文類聚有宋玉笛賦則笛前於丘仲遠矣隋書音樂志曰笛漢武帝時丘仲所作者也京房備五音有七孔以應七聲太平御覽曰黃帝使伶倫伐竹於昆溪斬而作笛吹之作鳳鳴筆談曰有雅笛有羌笛其形制所始舊説皆不同後漢馬融所賦長笛空洞無底剡其上孔五孔一出其背正似今尺八李善為之注云七孔長一尺四寸此乃今橫笛耳鼓吹部謂之橫吹非融所賦者融賦云易京君明識音律故本四孔加以一君明所加孔後出所謂商聲五音畢沈約宋書亦云京房備其五音周禮笙師注杜子春雲笛乃今時所吹五空竹笛以融約所謂論之則古笛不應有五孔子春之説亦未為然也三禮圖笛亦橫設而五孔不知出何典據樂要曰笛自丘仲以七孔一尺四寸之長六帖曰笛本四孔京房加以一按馬融賦云近世雙笛從羌起羌人伐竹未及已龍鳴水中不見矣截竹吹之聲相似易京君明識音律故呼四孔加以一君明所加孔後出是謂商聲五音畢籥禮記曰土鼓蕢桴葦籥伊耆氏之樂也注云伊耆古天子號則籥蓋伊耆氏所作也笳杜摯笳賦序曰昔伯陽避亂入戎懷土遂建斯樂又胡笳漢舊録有其物不記所出本末云胡人卷蘆葉吹之故曰胡笳亦云李伯陽入西戎所造笙禮記明堂位曰女媧之笙簧簧笙中之簧也世本曰女媧作笙簧高氏小史亦云曹植女媧贊曰造簧作笙隋音樂志曰笙竽並女媧之所作也竽世本曰隨作竽注云隨女媧之臣也通禮義纂曰漢武帝時丘仲作竽笙三十六管而韓子有齊宣王好吹竿之事則竽非丘仲所作明矣世本之説是塤又曰塤暴辛公所作宋均云周平王時諸侯通典曰不知何代人周之畿內有暴國豈其人乎承謂世本所記當是以詩有暴公為卿士而譖蘇公蘇公作何人斯以絶之其詩云伯氏吹塤仲氏吹篪以言在俱為王臣恩如兄弟故謂伯仲耳其相應和如塤篪也便謂暴公作塤蘇公造篪云按樂記曰聖人作為鞉鼓控揭塤篪此六者德音之音也言聖人作為則明非暴公所能作矣隋音樂志亦謂塤六孔暴辛公之所作非也通歷曰帝嚳造王子年拾遺記乃云庖犧灼土為塤也擊甌呂氏春秋曰堯使質以麋絡魚缶而鼓之詩宛丘曰坎其擊缶史記秦趙會澠池秦王擊缶則古有擊缶為樂者擊甌蓋擊缶之遺事也唐大中初郭道源善之用越甌邢甌十二旋加減水以筯擊之其音妙于方響昔人於此記其法疑其自道源始也鼗呂氏春秋曰帝嚳使垂作鼗通歷曰帝嚳平共工之亂作鼗鼓羯鼓羯鼓録曰以戎羯之鼓故曰羯鼓唐禮樂志曰蓋本戎羯之樂其音太簇一均明皇帝稱八音之領袖諸樂不可方也通典曰以出羯中故號羯柷敔禮樂記曰聖人作為控鞚注云謂柷敔也通歷曰帝嚳平共工之亂作鞚揭拍板樂府雜録曰明皇令黃幡綽撰拍板譜綽曰但有耳道則不失其節奏通典有擊以代抃抃擊節也因其聲以節舞拍板蓋出於擊節也又晉魏之代有宋識善擊節然以板拍之而代擊節是則拍板之始也鄴城舊事曰華林園齊武成時穿池為北海中有密作堂以船為腳作木人七一拍板則此器已見於北齊矣鈸通典曰鈸亦名銅盤出西戎及南蠻其圓數寸隱起如涇漚貫之以韋相擊以和樂南蠻大者圓數尺或謂齊穆王素所造鹵簿炙轂子曰車駕行羽儀導獲謂之鹵簿自秦漢始有其名後漢胡廣作天子出行鹵大楯也所以扞敵部伍之次皆著之簿儀其五兵獨以楯為名者行道之時甲楯居外餘兵在內故但言鹵簿五禮精義曰鹵大盾也以大盾領一部之人故名鹵簿象西京雜記漢朝輿駕有象車鼓吹十三人中道晉輿服志曰象車漢鹵簿最在前晉諸公讚曰晉時南越獻馴象為作車令越人騎之帝行則以試橋梁通典曰晉武帝太康中平吳南越獻馴象詔作大車駕之使越人騎之大駕鹵簿行則試橋梁宋朝會要曰漢鹵簿象最在前晉作大車駕之以試橋梁皇朝象亦居先設木蓮花坐金蕉葉然則象之先導自漢始也駕頭筆談曰正衙法座香木為之加金飾四足墮角其前小偃織藤冒之每車駕出幸則使老內臣馬上抱之曰駕頭虞候春秋時晉有候正主斥候又有原候候奄則虞候之名蓋因此齊晏子云藪之薪蒸虞候守之本山澤望候之官李靖兵法有左右虞候名同而職異矣佽飛漢百官表曰少府官屬秦有左弋武帝太初元年更為佽飛呂氏春秋曰荊有茲非渡江兩蛟繞舟茲非拔劍殺之荊王任以執圭後世以為勇力之官茲佽音相近許慎曰佽便利也顏師古以謂取勇力人以名官亦取其便利輕捷若飛故號佽飛今大駕齒簿備此二者以為儀衛指南樂臺注鬼谷子曰肅慎還周公恐其迷路造指南車送之古史考亦云周公作或曰管仲作崔豹古今注曰舊説周公所作周公致太平越裳氏重譯來獻使者迷其歸路周公錫以軿車五乘皆為司南之製按黃帝內傳曰玄女為帝製司南車當其前志林曰黃帝與蚩尤戰於涿鹿之野蚩尤作大霧彌三日人皆惑帝令風后法斗機作指南車以別四方古今注又曰指南車起於黃帝戰蚩尤作大霧迷四方於是作指南車也記里古今注曰大章車所以識道里也起於西京亦曰記里車黃帝內傳曰玄女為帝製司南車當其前記里車居其右則是其制始自黃帝造之非西漢所作也白鷺通典曰隋置一名鼓吹車車上施層樓樓上有翔鸞棲焉宋朝會要曰隋所制也柱杪刻木為鷺銜鵝毛䇶鸞旗通典曰鸞旗車漢制編羽旄列繫幡傍胡廣曰以銅作鸞鳥於車衡上宋朝會要曰漢制為前驅上載赤旗繡鸞也皇祐大饗明堂記曰景祐五年重制此旗赤質繡鸞載以車也崇德宋朝會要曰崇德車本秦辟惡車也上有桃弧棘矢所以禳卻不祥乾德元年八月改今名中載黃旗太卜令在車執旗古今注曰辟惡車秦製也桃弓葦矢所以祓除不祥故曰辟惡皮軒通典曰皮軒車漢制以虎皮為軒宋朝會要曰漢制前驅車也取曲禮前有士師則載虎皮之義也相風黃帝內傳有相風烏制疑黃帝始作之也拾遺記曰少昊母曰皇娥遊窮桑之浦有神童稱為白帝子與皇娥宴戲泛於海以桂枝為表結芳茅為旌刻玉為鳩置於表端言知四時之候今之相風烏亦其遺像古今注曰相風為夏禹所作周遷輿服雜事曰相風周公所造即鳴鳶之象禮曰前有塵埃則載鳴鳶後代改為烏沈約輿服志曰相風烏秦制鐘鼓輿宋朝會要曰隋大駕鐘車鼓車也隋大業雜記曰大駕羽衛有行漏車鐘車鼓車今為輿行漏又宋朝會要曰隋大業行漏車也蓋隋制十二神宋朝會要又曰開寶新定禮所增大饗明堂記曰十二神輿載十二月之神象自鉦鼓漏鐘及神輿舊禮令無文開寶通禮新加儀馬今導駕有御馬分左右按自漢有之西京雜記漢朝輿駕祀甘泉汾陰罼罕左右及節十六後乃有御馬三則儀馬之設自漢始也香鐙宋朝會要曰香鐙唐制也腰輿通典曰唐有腰輿大駕先五輅行五輅隋書禮儀志曰輅虞氏謂之鸞車夏后謂之車輅商謂之大輅周謂之乘輅按此則謂之輅者自商人始也周人初制五輅金玉象革以飾諸末木無飾後漢加虡文晉兩廂加鵾翅時亦謂之鵾車注旗旗於左加棨戟於石皆橐藏之戟韜以繡黻大輦宋朝會要曰周官巾車氏有輦車以人組挽之宮中從容所乘建隆四年南郊陶穀為禮儀使創意造為大輦也芳亭通典周制輦七其五曰芳亭輦蓋始以為大駕羽衛也鳳輦又曰唐輦有七一曰大鳳輦前世無文疑唐所造也今止曰鳳輦小輿又通典曰按小輿今犢車軿車之流宋制小輿形如軺車小行幸則乘之五牛輅通典曰東晉過江副車遺缺有事權以馬車代之建旗其上後制五色木牛象五時車立旗於背行則使人輿之牛取負重致遠而安旗常纏而不舒所謂德車綏旌晉書輿服志曰五牛旗平吳後所造以五牛建旗車設五牛青赤在左黃在中白黑在右周遷輿服雜事亦云晉平吳後造非過江始為也副車禮記有二車鄭康成云副車又有佐車然則副車亦周事也通典曰秦平天下以諸侯之車為副又周禮成車五倅有成輅及廣闕蘋輕等車之倅倅副也則輅車有副周制然也金根古今注曰秦制也秦并天下閲三代之輿服謂商得瑞山車一曰金根故作金根之車乃增飾而乘御漢因為乘輿董巴輿服志曰商瑞山車金根之色商人以為大輅於是秦始皇作金根之車漢承秦制為乘輿孔子所謂乘商之輅也然則金根之制蓋出於商人大輅之法大戴禮曰昔成湯郊祀因有山車之瑞亦為桑根秦謂金根商輅矣耕根通典曰漢制如副車有三蓋一曰芝車置輹耒耜之箙上親耕所乘晉駕駟隋以青質羽葆雕裝軾平青囊盛耒耜而加之也進賢車安車也通典曰周致仕之老及后乘之漢有五時安車各以方色宋朝會要曰進賢古安車也乾德元年八月改明遠宋朝會要曰古四望車也駕以牛乾德元年八月改仍駕四馬制如屋上層四面垂簾通典曰齊四望車亦曰皀輪車以加貴臣按齊已上無文便為齊制明矣又曰唐始駕四馬也羊車通典曰晉制宋朝會要曰古輦車也亦為畫輪車駕以牛隋駕果下馬今亦駕以二馬景祐五年九月賈昌朝上言羊車本漢晉之代乘於後宮隋大業中增金寶之飾駕以小駟馭以卯童自是以來遂為法從宋綬議引後漢劉熙釋名曰羸車羊車各以其駕名之隋禮儀志曰漢世或以人牽或駕果下馬此乃漢代先有晉武偶取乘於後宮非特為掖庭制也然則羊車漢儀非晉始有也黃鉞車宋朝會要曰黃鉞車漢制乘輿建之唐初元正觀後始加古今注曰金斧黃鉞也三代用之斷斬金以黃為乘輿之飾武王以黃鉞斬紂故王者以為戒通典以為晉制豹尾古今注曰周禮也所以象君子豹變尾言謙也古軍正建之今惟乘輿得建謂晉代也通典曰漢制大駕法駕出屬車最後一乘懸豹尾豹尾以前比省中宋志按徐廣淮南子軍正執豹皮以正其衆禮記前有士師則載虎皮乘輿豹尾以其義類宋朝會要曰唐正觀後始加此車於鹵簿內屬車周末諸侯有二車九乘二車即屬車也亦周制所有秦滅九國兼其車服故八十一乘建旗沈約輿服志曰車服以庸著在唐典夏建旌旗辨其尊卑通典曰夏后氏俾車正奚仲建旗旐尊卑上下各有等級則車輅之建旗常始於禹也通典曰黃帝設五旗夏后奚仲為車正建旗斿旐以別尊卑等級也駕易言黃帝服牛乘馬則馬駕之初也至陶唐氏始乘彤車白馬則齊毫之始也通典以堯乘白馬駕馬之始古史考以禹時奚仲駕馬誤矣世本曰黃帝之臣臣胲作服牛相土作駕馬呂氏春秋曰乘時作駕王永作服牛也高氏小史云太昊服牛乘馬乘通典曰昔人皇乘雲駕六羽出谷及五龍氏乘龍上下以理此乘之始也駕六昔人皇駕六羽史記曰秦并天下自以水德故始駕六馬按夏書五子之歌曰若朽索之御六馬則駕六之制夏后已然非自秦始皇起也逸禮王度記曰天子駕六馬諸侯四大夫士二庶人一易京房春秋公羊説皆云天子駕六許慎亦云而周禮四馬為乘詩天子至大夫同駕四顧命時諸侯皆布乘黃朱後漢輿服志劉昭補注云今帝者駕六此自漢制與古異爾大安輦宋朝會要曰乾興元年九月禮儀院奏周守恩狀奉聖旨製造皇太后御座簷子乞詳定制度所稱名目詔以大安輦為名輦通典曰夏后末代制輦商曰胡奴車周曰輜車隋制輦而不施輪以人荷之注云人牽為輦正義曰秦始皇去其輪而輿之漢代遂為人君之乘亦曰秦也
