  - {type: variant, offset: 2248, length: 2, content: 僧院, WYG: 宫室上棟下宇以待風雨謂黄帝也内傳曰帝斬蚩尤因建宫室穆天子傳曰登崑崙觀黄帝宫室白虎通曰黄帝作宫室以避寒暑此宫室之始也世本曰堯使禹作宫室謂廣其制爾神異經有天湰之宫管子黄帝有合宫堯貳宫湯有􅀈宫周有蒿宫秦有萬年漢有未央等}
