  - {type: variant, offset: 1, length: 2, content: 務職, WYG: 全書事物紀原卷八宋髙承撰舟車帷幄部四十舟淮南子曰見􅑆木浮而知為舟吕氏春秋曰虞姁音詡作物理論曰化狐作墨子曰工倕作山海經曰畨禺作束晢發蒙記曰伯益作世本曰共鼓貨狄作注云並黄帝臣釋名曰黄帝造拾遺記曰軒皇變乗桴以造舟檝黄帝内傳曰帝既斬蚩尤乃剏舟檝易繫辭曰黄帝氏作刳木為舟剡木為檝蓋以黄帝為是筏拾遺記曰軒皇變乗桴以造舟檝則是未為舟前第乗桴以濟矣筏即桴也蓋其事出自黄帝之前今竹木之排謂之筏是也車淮南子說山訓曰見飛蓬轉而知為車又氾論訓古者肩負擔之勤而作為之剡輪建輿駕馬服牛民以致逺而不勞通典曰上古聖人覩蓬轉而為輪輪行可載因物知生復為之輿輿輪相承流運罔極任重致逺以利天下此車之始也後世聖人觀於天視斗周旋魁方杓曲以攜龍角為帝車於是曲其輈也春秋命厯序曰人皇駕六提羽乗雲車蜀記曰三皇乗祇車出谷口吕氏春秋曰奚仲作車世本曰奚仲造車謂廣其制度爾山海經曰番禺生奚仲奚仲生吉光是始以木為車郭璞注云世本言奚仲作車此云吉光明其父子創意也荀子曰奚仲作車乗楊倞注云奚仲夏車正黄帝時已有車服故謂之軒轅此云奚仲者亦改制也古史考曰黄帝作車引重致逺其後少昊時駕牛禹時奚仲駕馬劉昭補注後漢志曰服牛乗馬以利天下其所起逺矣豈奚仲所為世本之誤史考所說是也釋名曰黄帝造舟車黄帝内傳曰帝既斬蚩尤因乗車輅又云帝令邑夷造車以便民因話錄裴諌議問東津先生先生曰軒轅制車服按易繫九事言黄帝服牛乗馬引重致逺蓋取諸隨則車亦宜黄帝造也小車蜀相諸葛亮之出征始造木牛流馬以運餉蓋巴蜀道阻便於登陟故耳木牛即今小車之有前轅者流馬即今獨推者是而民間謂之江州車子按後漢郡國志巴郡有江州縣是時劉備全有巴蜀之地疑亮之創始作之於江州縣當時云然故後人以為名也檐子舊唐書輿服志曰開成末定制宰相三公諸司官及致仕官疾病官許乗檐子如漢魏載輿之制按唐乾元以來始用兠籠代車輿疑自此又為檐子之制也亦漢魏載輿步輿之遺事云然則今大臣朝廷所崇敬而老疾則賜以肩輿蓋自開成之制也兠子又曰兠籠巴蜀婦人所用乾元以來蕃將多著勲於朝兠籠易於檐負京師奚車兠籠代於車轝矣兠籠即今之兠子蓋其制起於巴蜀而用於中朝自唐乾元以來也簾莊子曰有張毅者髙門懸箔無不走也而談藪有户下懸簾明知是箔則懸箔即簾矣荀子有}
