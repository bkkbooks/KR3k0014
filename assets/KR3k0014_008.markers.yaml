  - {type: variant, offset: 5803, length: 195, content: 軍導江縣李冰廟也秦孝文王時冰為蜀郡守自汶山壅江灌溉三郡開稻田歷代以來蜀人德之饗祀不絕偽蜀封大安王孟昶又號應聖靈感王開寶七年改號廣濟王英顯王廟在梓州梓潼縣本梓潼神也舊記曰神本張惡子仕晉戰死而廟存唐明皇狩蜀神迎於萬里橋追命左丞相僖宗播遷亦有助封濟順王咸平中益卒為亂王師討之忽有人呼曰梓潼神遣我來九月二十日城陷果克四年州以狀聞故命追封英顯王新息王辰州新息王廟後漢伏波將軍馬援祠也咸平元年三月本州上, WYG: 公美公劉}
