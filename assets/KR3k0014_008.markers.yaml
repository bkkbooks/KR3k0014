  - {type: variant, offset: 2130, length: 1, content: 官, WYG: 作紙鳶藏詔於中間文帝出太極殿前因西北風放之冀得達援軍賊謂是厭勝又射下之見馬總通厯云然其事初一見於此證知其審為韓信造矣競渡楚傳云起於越王勾踐荆楚嵗時記曰五月五日為屈原沒汨羅人傷其死並將舟楫拯之因以為俗嵗華紀厯曰因勾踐以為成風拯屈原而為俗也艾人荆楚嵗時記曰端午日荆人皆蹋百草採艾為人懸於門上以禳毒氣當是以師曠占有嵗病則艾草先生故也五綵風俗通曰五月五日以五綵絲繫臂辟鬼及兵令人不病瘟又曰示婦人蠶功成也續齊諧記曰屈原五月五日投汨羅死楚人哀之每至此日以竹筒貯米投水祭之漢建武中長沙區曲忽見一士稱三閭大夫曰見祭甚善但常年所遺為蛟龍所竊今若有惠以棟葉塞筒五綵線縛之此二物蛟龍所憚曲依言故世人五月五日作粽幷五綵線及棟葉皆汨羅遺風也百索續漢書曰夏至隂氣萌作恐物不成以朱索連以桃印文施門户故漢五月五日以朱索五色印為門户飾以禁止惡氣今有百索即朱索之遺事也蓋始於漢本以飾門户而今人以約臂相承之誤也又以綵絲結紐而成者為百索紐以約股者名五絲云線符漢五月五日以五色印為門户飾續漢書所謂桃印者也劉昭曰桃印本漢制今世端午以五綵繒篆符以相問遺亦以}
