  - {type: variant, offset: 2300, length: 0, content: '', WYG: 始皇作朝宫渭南先作前殿阿房商君書有言天子之殿則是秦自孝公而來已云然矣蓋秦始曰殿也漢因之有涵徳明光諸名也堂演義曰堂當也當正向陽之屋又堂明也言明禮義之所管子曰軒轅有明堂之議春秋因事曰軒轅氏始有堂室棟宇則堂之名肇自黄帝也觀黄帝内傳曰帝置元始真容於髙觀之上觀之言可以觀望於其上也周有兩觀春秋書雉門及兩觀灾是也今俗謂之朶樓蓋周制也宅堯典曰宅嵎夷禹貢曰降丘宅土孟子曰五畝之宅戴延之西征記曰蒲坂城外有舜宅則宅之名始於堯帝之時矣邸宿也史記封禪書方士多言天子朝諸侯於甘泉作諸侯邸漢書曰代王馳入代邸是邸之義設起於漢也今謂諸王所居曰邸亦因代邸之說也第史記齊王自淳子髠以下皆命曰列大夫為開第康莊之衢漢書髙祖詔列侯二千石大小第室注云有甲乙次第故曰第又曰不出里門面臨大道曰第按左氏傳齊景公欲更晏子之第蓋丘明周人所記又周事當亦周制云爾樓史記方士言於漢武帝曰黄帝為五城十二樓以候神人帝乃立井幹樓則樓蓋起於黄帝之時閣韓詩外傳曰黄帝時鳳巢於阿閣則閣亦肇於黄帝矣庭說文曰庭朝中也揚子法言曰鳳鳥蹌蹌匪堯之庭列子曰黄帝居大庭之館此庭名之起也廊周書作雒曰五宫明堂咸有重廊漢武䇿曰舜游巖廊晉灼曰堂邊曰巖文穎曰殿下外屋曰廊然則唐虞時事也屋釋名曰屋奥也淮南子曰舜築牆茨屋新語曰堯舜之人比屋可封以言民居也易上棟下宇蓋其始矣其謂之屋則自堯舜始矣房蘇鶚演義曰房方也室内之方正也又房防也防風雨燥濕也說文曰房室在旁者也尚書顧命有東房西房詩右招我由房蓋周制也序爾雅曰東西牆曰序所以序别内外書大訓在西序河圖在東序商學曰序則序自商人名之也廟軒轅本}
