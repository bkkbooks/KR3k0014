  - {type: variant, offset: 9759, length: 599, content: 蓋起於此唐僖宗廣明中賜僧知玄號悟達國師僧徹淨光大師可符法智大師德宣演暢大師自此始為朝廷寵渥之命見事始云僧紫事始云代宗實錄曰大歷三年僧惠崇內賜紫袈裟記以為僧賜紫衣之始按贊寧僧史略曰則天朝僧法朗譯大雲經陳符命言法朗等皆賜紫袈裟則僧之賜紫自武后始也不然唐會要安得開元二十年波斯王遣僧及烈至唐敕賜紫袈裟還國之事也蓋僧賜紫不起於代宗明矣僧褐僧史略曰漢魏之世出家者多著赤布僧伽梨又秣陵諸僧衣色倣西竺後周忌聞黑衣之讖悉屏黑色著黃色衣謂今僧衣褐起於宇文周制注按北齊忌黑文宣殺弟煥以七近漆屬黑後果敗於宇文黑獺然則非後周也筆受宋朝會要曰太平興國七年六月譯經院成譯經詔梵學僧筆受綴文七月詔左右街義學僧詳定十二月選梵學沙門一人為筆受義學沙門十人為證義其後以惟淨為梵學筆受自此其始也談苑曰譯經常以梵僧後令惟淨同譯經梵學筆受二人譯經綴文二人證義八人唐世翻譯有筆受官以朝臣為之佛陀多羅之譯圓覺經也房融為筆受是矣宋廟太宗始用梵學僧也伎術黃帝內傳曰帝既昇為天子命句芒等司五行於是針經脈訣天文地里卜法算術吉兇喪葬無不備也凡伎術皆自軒轅始醫帝王世記曰黃帝使岐伯主典醫藥以療眾疾說文曰巫彭初作醫呂氏春秋亦曰巫彭作醫醫書皇甫謐帝王世紀曰黃帝命雷公岐伯教制九鍼著內外經素問之書咸出焉黃帝內傳曰帝昇為天子鍼經脈訣無不備也故金匱甲乙之類皆祖黃帝方書世諸方書藥法雖損益隨時大抵祖述黃帝如脈訣之出於晉王叔和病源之出於隋巢元方湯液經之出於商伊尹傷寒論之, WYG: ''}
