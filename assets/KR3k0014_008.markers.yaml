  - {type: variant, offset: 1941, length: 4, content: 迎送賓客, WYG: 金盞無儲病其熨指取楪子承盛之既啜而傾乃以蠟環楪子中坐之盃遂定即遣匠以漆環易蠟寜竒之製名托子遂行於代後傳者更環其底唾壺西京雜記曰廣川王發魏襄王冢得玉唾壺蓋吐物戰國時已有其制也鏡𤣥中記曰尹夀作鏡堯臣也黄帝内傳曰帝既與王母會於王屋乃鑄大鏡十二面隨月用之則鏡蓋肇於軒轅非尹氏始作也鏡臺魏武雜物疏曰鏡臺出魏宫中有參帶鏡臺七子貴人公主鏡臺也扇崔豹古今注曰舜廣開視聴求賢人以自輔作五明扇而黄帝内傳亦有五明扇之起以五明而制也陸機扇賦曰昔武王𤣥覽造扇於前然則今以招涼者周武王所作云}
