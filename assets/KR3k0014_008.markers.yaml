  - {type: variant, offset: 97, length: 299, content: 圖畫局宋朝會要曰雍熙元年置翰林圖畫院在內中池東門裏咸平元年移在右掖門外紹聖二年改院為局國信所又曰國信所掌契丹使介交聘之事景德初遣內臣排辦禮信四年改初雄州用兵之際每密事擇吏主之號機宜司及契丹請和改曰國信司又景德四年八月帝謂近臣曰契丹使副到闕見辭及館接伴支賜例物并朝廷遣使合行之事並有規制行之以二年已成定例可特置管句往來國信所一司舊止云排辦禮信所至是立局置印也燒朱所又曰燒朱所太平興國三年置寺務司又曰寺務司淳化四年置騏驥院周官有十二閑蓋國馬之所也漢有未央廄唐有飛龍院宋朝會要曰舊左右飛龍院太平興國五年正月改曰天廄院雍熙二年十月改為騏驥院估馬司宋朝會要曰估馬司咸平元年置掌納諸州所市馬估直驗記置牧養今廢陝, WYG: 虎枕}
