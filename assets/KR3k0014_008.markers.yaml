  - {type: variant, offset: 7409, length: 2348, content: 道士之初當此矣注列仙傳又有道士浮丘公接周靈王太子晉上嵩高山者道錄續事始引仙傳拾遺曰隋文帝始以玄都觀主王延為威儀唐置左右兩街宋朝會要曰唐有左右街威儀周避諱改為道錄宋朝因之都監又曰太平興國中增置副道錄都監首座通舊為八員已上總知教門公事首座又曰首座亦太平興國中增置鑒義又曰天禧五年置首座鑒義分領本街事道官唐高宗時葉靜能入直翰林為國子祭酒姪孫法善玄宗時授銀青光祿大夫鴻臚卿又尹愔亦拜諫議大夫道士之命以官自高宗始也宋朝會要曰開寶五年十二月賜道士玄祕大師馬志通議大夫階道封後周武帝時衛元嵩封蜀郡公蓋道士授封之始也葉法善玄宗時亦封越國公道贈唐王知遠贈昇玄先生葉法善贈金紫光祿大夫越州都督道士之襃贈蓋自王知遠始也道諡梁代陶洪景死賜諡正白先生則道之諡自梁陶隱居始也道號元魏世祖時賜寇謙之天師之號後漢張道陵亦有天師之稱蓋自列子言黃帝之稱牧馬童子曰天師始也唐玄宗賜李含光曰玄靜先生此賜號先生之始也宋朝緣唐事亦有賜號先生處士者真宗陳搏賜號希夷先生神宗時張噩賜號沖靖處士是也道紫唐中宗神龍初葉靜能雖加金紫之階而未頒紫衣至代宗時李泌立大功李輔國將不利之泌乞為道士許之又賜紫衣其後道士賜紫自李泌始也朝野僉載曰史崇玄附太平公主授鴻臚卿衣紫羅裙帔蓋雖衣之而未賜也佛像漢書霍去病過焉耆山得休屠王祭天金人顏師古注云作金人為天神之主今佛像是其遺法後漢明帝夢金人長大頂有日光傅毅曰天竺有其道者號曰佛於是遣使天竺圖其形像此中國有佛像之始也宋書云漢世始有佛像也佛塔高僧傳曰康僧會吳赤烏十年至建業孫權使求舍利既得之權即為造塔晉帝過江更修飾之此蓋中國造塔之始也佛經漢明帝永平中摩騰竺法蘭以白馬馱經至東都即四十二章經中國之有佛經此蓋其始也鄴城舊事云永平十年經像初來也譯經漢自永平後摩騰首譯四十二章經歷魏晉南北朝皆有翻經館唐置譯經潤文之官元和後廢宋朝太宗興國中復興其事置譯經院也談禪寶林曰佛涅槃時告迦葉曰吾清淨法服以付汝迦葉傳阿難二十八代至達摩梁普通中自南天竺泛海至廣州後止崇山住少林寺傳惠可中國談禪自此始也讚唄僧史略曰讚唄原始按十誦律中俱胝耳作三契聲以讚佛後趙石勒時建中神降安邑諷詠經音七日方絕僧有摹寫為梵唄焉此讚梵之始也續搜神記曰晉太元中竺曇遂死作清溪廟神諸道人詣廟便靈語云久不聞唄聲其伴惠範為作之即是自晉已有讚唄非始於石勒是也戒律又曰漢靈帝建寧三年安世高首出義決律二卷次有比丘諸禁律魏世天竺三藏曇磨迦羅到許州至洛慨魏境僧無律範遂於嘉平中與曇諦譯四分羯磨及僧祗戒心圖此蓋中國戒律之始也戒壇又曰漢魏之僧雖剃染而戒法未備唯受三歸嘉平正元中既傳戒律立大僧羯磨法斯蓋比丘立戒壇之始也又曰起於南朝求那跋磨為宋國比丘於蔡州岸受戒為始自爾南北相次為壇受戒中國之人受戒自魏朱士行為之首也尼壇又曰受戒初本僧尼同壇宋朝太祖不許尼往僧中自是始別為壇宋朝會要曰開寶五年二月詔自今尼有合度者只許於本寺起壇受戒蓋自此始別立尼受戒壇也尼戒薩婆多師資傳曰宋元嘉十一年師子國尼鐵索羅等於建康南林寺壇上為景福寺尼惠果淨音等受戒法事此方尼受戒自惠果等始也僧後漢明帝遣蔡惜等往天竺訪僧法於彼見摩騰乃要還漢地此中國有僧之始也僧史略曰漢明聽陽城侯劉峻等出家此又中國之人為僧之始也注新唐書傅奕上疏曰浮圖法漢明始立胡祠然惟西域桑門自傳其教西晉已上不許中國削髮事胡石符亂華乃弛厥禁此疑中國為僧之始尼僧史略又曰漢明帝既聽劉峻等出家又聽洛陽婦女阿潘等出家此蓋中國尼之始稱釋高僧傳曰出家從師命氏晉道安受業佛圖澄澄姓帛氏安以師莫過佛遂以釋為姓僧之稱釋自道安始也度牒僧史略曰度牒自南北朝有之見高僧傳名籍限局必有憑由憑由即今祠部牒也唐會要曰天寶六年五月制僧尼令祠部給牒則僧尼之給牒自唐明皇始也空名唐食貨志曰肅宗至鳳翔明年鄭叔清議以天下用度不充諸道得召人納錢給空名度僧道則是空名度牒自唐肅宗始也僧隸唐會要曰武后延載元年五月十一日敕天下僧尼隸祠部此祠部轄僧之始也唐志亦云僧帳又曰舊制僧尼簿三年一造其籍一本送祠部一本留州縣又開元十七年八月十日敕僧尼宜依十六年舊籍則僧尼供帳始於此耳僧史略曰唐文宗太和四年正月祠部請天下僧尼具名申省以憑入籍入籍造帳自太和始也二文不同以會要為正本朝用周顯德事三年一造帳定著於令僧講僧史略曰僧講自朱士行魏代講道行經始也尼講又曰東晉廢帝太和三年洛陽東寺尼道馨通法華維摩研窮理味一方宗師此則尼講說之始也僧諡洪明集曰後魏太祖時法果卒諡趙胡靈公此僧賜諡之始也宋朝會要曰咸平三月八日梵僧法賢卒諡慧辨四年法天卒諡元覺其後施護卒亦諡明悟也道林諡真宗實錄曰大中祥符六年六月甲申詔諡誌公真覺大師宜加為遁林真覺大師注宋敏求東京記曰祥符五年諡真覺大師明覺諡又曰大中祥符六年六月戊子詔泗州僧伽大師宜加號普照明覺大師僧封洪明集曰元魏封法果輔國宜城子果加忠信侯安城公唐封不空肅國公僧之得封自後魏太祖始也僧贈元魏法果卒贈老壽將軍趙胡靈公此其始也唐亦贈不空司空僧官自隋文帝以沙門彥琮為翻經館學士後始命僧以官及唐又以不空為開府儀同三司試鴻臚卿宋朝會要曰太宗時法賢雍熙四年加試光祿卿階朝散大夫其後法天累試鴻臚卿亦加朝散大夫及惟淨已故吳王燬弟從鑑之於為梵學筆受大中祥符後同譯經為試光祿卿也注太祖朝僧元靄亦加朝散大夫階也僧錄廣洪明集曰後魏太祖皇始中以沙門法果為統管攝僧徒文帝以師賢為僧統參玄語錄曰後秦姚萇立道䂮音略為僧正秩同侍郎法欽慧斌掌僧錄給事同吏人此僧立正錄之始也又元魏以沙門僧顯為京師統隋天下分置十統呼上統或曰大統唐罷統立兩錄司於京邑謂之僧錄僧號後秦鳩摩羅什始號法師其後中國名僧亦稱之晉朝講經草堂寺有廟臣大德沙門千餘人此始有大德之呼後趙石虎號佛圖澄曰大和尚此稱和尚之始也晉初鳩摩羅炎東渡龜茲王請為國師姚興迎羅什待以國師之初也梁敕慧約云允膺闍梨之尊屬當智者之號此師號之起也唐中宗神龍二年號萬迴曰法靈公姚秦又號羅什為大師則大師, WYG: 圏}
