  - {type: variant, offset: 1918, length: 0, content: '', krp: 髙齊始為之等差云今天子用紅黄二等而庶僚通用青其天子之以黄蓋自秦漢黄屋左纛之制也雨傘}
  - {type: variant, offset: 1919, length: 0, content: '', WYG: 韜曰天雨不張蓋幔周初事也通俗文曰張帛避雨謂之繖蓋即雨傘之用三代已有也繖傘字通薫籠晉東宫舊事曰太子納妃有衣薫籠當亦秦漢之制也什物器用部四}
  - {type: variant, offset: 1919, length: 0, content: '', krp: 韜曰天雨不張蓋幔周初事也通俗文曰張帛避雨謂之繖蓋即雨傘之用三代已有也繖傘字通薫籠晉東宫舊事曰太子納妃有衣薫籠當亦秦漢之制也什物器用部四}
  - {type: variant, offset: 1920, length: 1, content: 里, WYG: 一什物史記曰舜作什器於夀丘蓋世所常用之器也漆器韓子曰舜作食器黑漆其上禹作祭器黑漆其外朱畫其内唐太宗曰舜作漆器而諫者十七人則器之布漆自舜始也蓋堯啜土鉶飯土簋故爾樽禮運曰禮之初始諸飲食汙樽而抔飲注云鑿地為樽此樽名始也後世或以瓦木為之取諸此也至}
