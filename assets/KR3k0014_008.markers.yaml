  - {type: variant, offset: 456, length: 252, content: 朝官主之神宗元豐末併馬軍步軍為諸軍與諸司為二院專句司又會要云專句司淳化三年戶部使樊知古奏置以分三司句院文案之繁務馬步各一司五年合為一也北排岸又曰北排岸司建隆三年置也朝服庫又曰朝服法物庫太平興國二年置分三庫也裁造院又曰乾德四年始置裁造院雜買務唐德宗置宮市以中官主之國初有市賈司太平興國四年改為雜買務至道中廢咸平時復置也雜賣務又會要云雜賣務景德四年置懷遠驛又曰懷遠驛景德三年置以待海南諸國進貢使介也文思院唐有文思院蓋天子內殿之比也其事見畫斷然非工作之所而宋朝太平興國三年始置文思院掌工巧之事非唐制矣會要云青箱, WYG: ''}
