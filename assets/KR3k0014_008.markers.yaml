  - {type: variant, offset: 1953, length: 1, content: 通, WYG: 條融一名仄影此疑羽扇之始也輪扇西京雜記曰長安巧工丁緩作七輪扇以七輪相連一人運之滿堂寒顫今禁中洎宗戚貴室亦多為此物者蓋起自漢丁緩云如意吳時秣陵有掘得銅匣開之得白玉如意所執處皆刻螭彪蠅蟬等形胡綜謂秦始皇東遊埋寶以當王氣則此也蓋如意之始非周之舊當戰國事爾竈淮南子曰炎帝王於火死而為竈後漢李尤竈銘曰燧人造火竈續事始則曰竈黄帝所置釡甑古史考曰黄帝始造釡甑火食之道成矣詩疏引禮運注云中古未有釡甑中古謂神農時也匙方言曰匕謂之匙說文曰匕所以取飯文王之贊易至震曰不喪匕鬯大東之詩曰有捄棘匕注云匕所以載鼎實用匕三王之制也箸禮記曰飯黍無以箸韓子曰紂為象箸觀之明箸前有商紂始以象為之耳箕箒世本曰少康作箕箒飯帚許慎云陳畱以飯帚為䈾今人亦呼飯箕為梢箕慎既漢人所記疑皆秦漢時事耳斧周書曰神農作斤斧皇圖要紀亦曰神農作斧斤鋸古史考曰孟莊子作鋸鑿古史考又曰鑿亦孟莊子作也秤斗尺吕氏春秋曰黄帝使伶倫取竹於崑崙之嶰谷為黄鍾之律而造權衡度量蓋因其所勝輕重之數而生權以為銖兩斤鈞石則秤之始也因其所積長短之數而生度以為分寸尺丈引則尺之始也因其所受多寡之數而生量以為合龠升斗斛則斗之始也紙後漢書蔡倫傳曰自古書契多編以竹簡其用縑帛者謂之紙縑貴而簡重幷不便於人倫乃造意用封膚麻頭及弊布魚網以為紙元興元年上之和帝善其能自是天下莫不從用咸稱蔡侯紙盛洪之荆州記曰漢順帝時蔡倫始以魚網造紙東觀漢記曰倫典尚方作紙用故麻名麻紙用木皮名榖紙用故魚網名網紙王隱晉書曰魏大和六年張楫云古之素帛依書長短隨事截繙枚數重沓名繙紙故從系後漢和帝元和中蔡倫以故布搗剉作之故從巾牋紙桓𤣥偽事曰𤣥令平准作青赤縹桃花紙又石季龍寫詔用五色紙蓋牋紙之制也此疑其起耳筆說文曰楚謂之聿吳謂之不律燕謂之弗秦謂之筆張華博物志曰秦蒙恬造又曰舜造筆古今注曰牛亨問自古有書契以來便應有筆世稱蒙恬造筆何也恬始秦筆耳以柘木為管鹿毛為柱羊毫為被所謂蒼毫非兔毫竹管也由此觀之則以羊毫為筆斯蒙恬所製耳墨硯後漢李尤墨硯銘曰書契既造墨硯乃陳則是兹二物者與文字同興於黄帝之代也撲滿西京雜記曰公孫洪元光五年為國所推上為賢良國人鄒長倩贈以撲滿一枚云撲滿以土為器以畜錢背有入竅而無出滿則撲之土麄物錢重貨入而不出積而不散故撲之上有聚歛而不能散者將有撲滿之敗可不戒歟故贈君然則漢武帝時世已為此器疑出於畜聚之後也嵗時風俗部四十二土牛禮記月令曰出土牛以示農耕之早晚注云若立春在十二月朢則䇿牛人近前示農早也月晦及正月旦則在中示農平也近正月朢則近後示農晩也其周制乎後漢禮儀制曰季冬立土牛於國都郡縣城外丑地以送寒月令章句曰是月之辰建丑丑為牛寒將極故出其物為形像以示送達之且以升陽也春幡續漢書禮儀志曰立春之日京都立春幡後漢書曰立春皆青幡幘今世或剪綵錯緝為幡勝雖朝廷之制亦鏤金銀或繒絹為之戴於首亦因此相承設之或於嵗旦刻青繒為小幡様重累凡十餘相連綴以簮之此亦漢之遺事也俗間因又曰年幡此亦其誤也綵燕荆楚嵗時記曰立春日悉剪綵為燕以戴之貼宜春字傅咸燕賦有其說桃版玉燭寶}
