  - {type: variant, offset: 2302, length: 0, content: '', WYG: 帝昇天臣寮追慕取几杖立廟於是曾遊處皆祠云此廟之始也庫說文曰庫兵車所藏帑金帛所藏府文書所藏商鞅之書曰湯武破桀紂築五庫藏五兵有大庭之庫此庫之始也後世凡所藏積皆謂之庫矣廚帝王世紀曰帝太昊制嫁娶之禮取犧牲以共庖廚此廚之始也倉鄭康成注周廩人云藏米曰廩然則倉廩蓋一事也孟子曰瞽瞍使舜完廩召康公之美公劉曰乃積乃倉則其事始見於陶唐之世也廏馬舍也周禮校人掌頒良馬而養乗之乗馬三乗為皁三皁為繫六繫為廏六廏成校此蓋名廏之始也幽王失徳故詩人刺之曰乗馬在廏穀梁書新延廏法廏注謂六閑之舊制按校人天子十二閑邦國六閑然則閑廏之制則是周為之也齋漢宣帝齋居決事此齋名之起也晉大和中陳郡殷府君引水入城穿池殷仲堪於此池北立小舍讀書百姓呼為讀書齋則齋之始疑自此厠禮儀曰𨽻人温厠蓋已名於周初也巷姜嫄之生后稷也誕寘之隘巷蓋已名於帝嚳之時也故尸子曰舜之方陶不能利其巷城市藩禦部四十四城吕氏春秋曰夏鯀作城注云兼作城郭也淮南子曰鯀作九仞之城吳越春秋曰堯聴鯀治水鯀乃築城造郭以為國固慱物志曰東里梩責禹亂天下事禹退而作三城又曰禹作城强者攻弱者守敵者戰城郭自禹始也軒轅本紀曰黄帝築城邑造五城黄帝内傳曰帝既殺蚩尤因之築城闕史記方士言於漢武帝曰黄帝為五城然則城蓋始於黄帝也漢書又云神農之教有石城十仞湯池百步又城池之設自炎帝始矣郭管子曰内謂之城外謂之郭孟子曰三里之城七里之郭吳越春秋曰鯀築城以衛君造郭以守民記以為城郭之始世本則云鯀作郭按軒轅本紀以謂黄帝築城邑則鯀不作城第為郭而已坊蘇鶚演義曰坊方也言人所在里為方方正也又方類也方以類聚居者必求其類從𨽻文欲强别白不惜文繁耳漢宫開名曰洛陽故北宫有九子坊則坊名漢有也市易曰包犧氏沒神農氏作日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑古史考曰神農作市世本則曰祝融作市譙周云髙陽氏市官不修祝融修之也風俗通曰言市井者按二十家為井今因井為市故云然也井淮南子曰伯益作井而龍登元雲注益佐舜初作井世本吕氏春秋俱謂伯益作井世本又云黄帝正名百物自穿井周書亦曰黄帝作井而盛洪之荆州記則云隨郡有巢父老傳炎帝所生村中有九井云神農既育九井自穿於此皆見門易繫曰神農氏沒黄帝堯舜氏作重門擊柝以待暴客蓋取諸豫皇圖要紀曰軒轅造門户然則門户之制其在上棟下宇之後乎牆淮南子曰舜作屋築牆茨屋令人皆知去嵓穴有室家則此蓋牆之起也至夏后世帝太康始峻宇雕牆矣階釋名云階梯也言有等差書稱舜舞干羽于兩階墨子稱堯土階三尺茅茨不剪韓詩外傳則云鳳蔽日而至黄帝降於東階則階陛之制自黄帝為棟宇則設之也折檻前漢書朱雲傳成帝時張禹為帝師雲上書願賜上方斬馬劔斷佞臣一人頭以勵其餘上問誰曰張禹也帝怒使御史將下殿雲攀檻折後理檻上曰勿易組之以旌直臣今殿檻之闕其中自朱雲始也鴟尾唐會要曰漢栢梁殿灾越巫言海中有魚虬尾似鴟激浪則降雨遂作其像於屋以厭火灾王叡炙轂子栢梁灾越巫獻術取鴟魚尾置於殿屋以厭勝之今瓦為之蘇鶚演義曰漢武作栢梁殿上疏者曰蚩尾水之精能辟火灾可置之堂殿今人多作鴟字顔之推亦作鴟劉}
