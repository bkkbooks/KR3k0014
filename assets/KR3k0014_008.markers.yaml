  - {type: variant, offset: 1920, length: 1, content: 里, krp: 一什物史記曰舜作什器於夀丘蓋世所常用之器也漆器韓子曰舜作食器黑漆其上禹作祭器黑漆其外朱畫其内唐太宗曰舜作漆器而諫者十七人則器之布漆自舜始也蓋堯啜土鉶飯土簋故爾樽禮運曰禮之初始諸飲食汙樽而抔飲注云鑿地為樽此樽名始也後世或以瓦木為之取諸此也至}
  - {type: variant, offset: 1922, length: 2, content: 驛驛, WYG: 虞始又以泰名樽四樽禮明堂位曰泰}
