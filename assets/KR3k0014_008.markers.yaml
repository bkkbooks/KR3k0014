  - {type: variant, offset: 2196, length: 1, content: 二, WYG: 七月十五日具百味五果以著盆中供養十方大徳後代廣為華飾乃至割木割竹極工巧也今人第以竹為圓架加其首以荷葉中貯雜饌陳具其救母畫像致之祭祀之所失之逺甚矣水陸今釋氏教中有水陸齋儀按其事始出於梁武帝蕭衍初帝居法雲殿一夕夢僧教設水陸齋覺而求其儀而世無其說因自撰集詮次既成設之於金山實天監七年也大抵取救熖口經事云爾菊酒西京雜記曰戚夫人侍兒賈佩蘭後出為段儒妻說在宫内時九月九日佩茱茰食蓬餌飲菊花酒云令人長夀菊花舒時並採莖葉雜黍米醸之至來年九月九日始熟焉謂之菊花酒馬鑑謂自後漢桓景始也登髙續齊諧記曰漢桓景隨費長房學謂曰九月九日汝家當有灾厄急令家人作絹嚢盛茱茰懸臂登髙山飲菊花酒禍乃可消景率家人登山夕還雞犬皆死房曰此可以代人則九日登髙始於桓景藥市唐王昌遇梓州人得道號易𤣥子大中}
