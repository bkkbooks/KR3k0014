  - {type: variant, offset: 2056, length: 2, content: 行四, WYG: 是此方正月朢謂之大神變白漢明帝令燒燈表佛法大明也一云因漢武祭五畤通夜設燎取周禮司爟燈燒燎照祭祀東漢以為佛事放夜唐睿宗先天二年正月朢初弛門禁𤣥宗天寶六年正月十八日詔重門夜開以達陽氣朱梁開平中詔開坊門三夜國朝會要曰乾徳五年詔朝廷無事區宇咸寧況年穀屢豐宜士民之縱樂上元可更增十七十八兩夜自後至十六日開封府以舊例奏請皆詔放兩夜也僧史略曰太平興國六年勑燃燈放夜為著令紫姑異苑曰世有紫子女古來相傳是人妾為大婦所嫉每以諸事相役正月十五日感激而死故世人以其日作其形於厠間或猪欄邊迎之曰子胥不在壻名也曹夫亦去大婦也小姑可出捉者覺動是神來矣占衆事卜絲蠶時鏡新書引洞覽記六帝俈之女胥死生好音樂正月十五日可以衣見迎記為紫姑之事未知孰是祓禊韓詩曰三月桃花水下之時鄭國之俗以上已於溱洧之上執蘭招魂續魄祓除不祥沈約宋書曰魏已後但用三日不復用已也嵗時記按周禮女巫有嵗時祓除之事鄭注云今上已水上之類又論語暮春者春服既成浴乎沂風乎舞雩謂水濱祓除由來逺矣蓋周典也今嵗三月西池之遊其遺事爾教池辛氏秦記曰昆明池漢武帝立之習水戰則是教池之事略見於此矣亦競渡之遺意也宋朝太祖建隆間即都城之南鑿講武池始習水戰將有事於江南也及太宗興國中得吳越錢氏龍舟七年疏國城西開金明池於是每嵗二月教池遂為故事子推故俗每寒食前一日謂之炊熟則以麵為蒸餠様團棗附之名為子推穿以栁條挿户牖間相緣云介子推逃祿晉文公焚山求之子推焚死文公為之寒食斷火故民從此物祀之而名子推相傳之謬至於如此也寒食陸翽鄴中記曰幷州之俗以冬至後一}
