  - {type: variant, offset: 2158, length: 0, content: '', WYG: 貞觀十八年五月五日太宗謂長孫無忌楊師道曰五日舊俗必用服玩相賀今朕各遺卿飛白扇二枚庶動清風以增美徳推舊俗之語則知端午之以扇相遺自唐太宗始也乞巧吳均續齊諧記曰桂陽成武丁有仙道忽謂其弟曰七月七日織女當渡河暫詣牽牛至今云織女嫁牽牛周處風土記曰七夕灑掃於庭施几筵設酒果於河鼓織女言二星神會乞富夀及子嵗時記曰七夕婦人以綵縷穿七孔針陳瓜花以乞巧則七夕之乞巧自成武丁始也穿針西京雜記曰漢采女常以七月七日夜穿七孔針於}
