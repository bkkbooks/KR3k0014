  - {type: variant, offset: 5999, length: 1405, content: 水旱祈禱有應請加封號即今號是也廣惠王宣州敬亭山神也宋元嘉二年有錢塘神梓華友人雙霞識之為神同住廟中縣令盛疑焚之來託此山景福中封昭威侯偽唐保大中封昭威王景德元年知州裴莊請加朝命故追號廣惠王顯應王在泉州是廟舊封昭德王天禧三年五月本州言歲旱禱之有應故加封號今顯應王是也順濟王筆談曰彭蠡小龍顯異人人能道之熙寧中王師南征有軍仗數十船泛江而南龍即伏其中乘風日數百里有司以狀聞詔封神為順濟王遣禮官林希致詔祠下英烈王大中祥符五年詔杭州吳山廟神宜特封英烈王神即伍子胥時葺廟故也德安公即夷門山神也景德四年十二月加封號德安公顯應公在京城北即崔府君祠也相傳唐滏陽令沒為神主幽冥本廟在磁州淳化中民於此置廟至道二年晉國公主石氏祈有應以事聞詔賜名護國景祐二年七月封護國顯應公炳靈公五代會要曰後唐長興四年七月封泰山三郎為威雄大將軍時上不豫泰山僧進藥小康僧請封之宋朝會要曰廟在兗州泰山下即泰山神三郎也後唐詔封威雄將軍大中祥符七年十月十五日詔封威雄將軍為炳靈公明應公在潤州即焦山大聖祠也大中祥符七年四月詔特封明應公靈惠公在歙州烏聊山即唐越國公華神也郡人立祠大中祥符二年詔加靈惠公封靈濟公在梓州射洪縣即瀘州刺史陸弼神也弼貶瀘州有善政卒土人為立廟水旱請禱偽蜀封洪濟王大中祥符六年九月詔封號靈濟公也昭應公在河南府永安縣至道二年十月太宗山陵乏水牛山下忽有泉湧山陵使元份以聞詔立廟泉側賜名昭聖景德四年特封昭應公嘉應侯熙寧閒百姓共立東岳張太尉祠於國城之外東南隅俗傳神姓張氏淮陰人死隸岳神主陰府要職京東州郡往往有祠世謂張舍人者是也至此號太尉元豐中光獻太皇太后祈有感始封嘉應侯號靈惠侯元豐時國城之西民立灌口二郎神祠云神永康導江縣廣濟王子王即秦李冰也會要所謂冰次子郎君神也宋後敕封靈惠侯東嶽諸祠大中祥符元年十月十五日詔封泰山上通泉廟為靈派侯亭亭山為廣禪侯嶧山神為靈巖侯普濟廟在京城西南隅景福坊即九龍堂也大中祥符四年六月十九日詔令完葺因賜名普濟廟也靈澤廟在鎮戎軍朝郍湫即龍廟秦漢所祠湫淵也天禧二年四月八日賜廟名靈澤顯靈廟在河南府永安縣安陵東北即蛇王祠也景德四年二月賜廟名顯靈靈惠廟在永安門徘徊泉上即泉神也大中祥符五年派守訓立廟遂賜靈惠名焉靈源廟在衛州共城縣即百門水所出也唐長安中置廟咸平元年春祈雨有應四月詔賜廟額曰靈源豐寶廟景德三年九月解州上言兩池左右祠廟請易題額詔取圖經所載者賜額遂改解縣池龍廟額曰豐寶安邑曰資寶分雲廟曰廣惠注自此以上除嘉應靈惠二侯外其不原所出者皆出宋朝會要生祠漢平公為縣吏曹決獄平郡中為立生祠自三代而來無生為立祠者至此始見茲事則生而立祠始於漢世也道釋漢自桓帝考濯龍之宮設華蓋以祀浮圖老子由此釋道二教稍稍興矣逮晉室其道始盛東遷之後二教峙立此釋道之所起也符錄龍魚河圖曰天遣玄女下授黃帝兵信神符制伏蚩尤黃帝出軍決曰蚩尤無道帝討之夢西王母遣人以符授之帝悟立壇而請有玄龜銜符從水中出置之壇中蓋自是始傳符籙也金寶牌宋朝會要曰天禧元年四月詔內出聖祖神化金寶牌分給在京宮觀及外州名山聖跡之處面文曰玉清昭應宮成天尊萬壽背文曰永鎮福地帝自封之命中使送諸路天慶觀今諸郡道正副所掌者是道士黃帝內傳有道士行禮之文此疑謂有道之士也樓觀本記曰周穆王因尹真人草樓之觀召幽逸人居之謂之道士平王東遷置七人漢明帝永平七年置三十人晉惠度四十九人審此即是自周而有也司馬遷班固敘秦漢甚詳洎春秋以來殊無一人以一言彷彿道茲事者亦為可疑矣然范曄後漢書於光武紀論始有言道士西門君惠李守等云劉秀為天子蓋, WYG: 執豕于牢}
