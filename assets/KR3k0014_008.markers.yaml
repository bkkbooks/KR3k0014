  - {type: variant, offset: 2041, length: 1, content: 驛, WYG: 嵗首畫鍾馗不知起自何時皇祐中金陵發一冢有石誌乃宋宗慤母鄭夫人云有妹曰鍾馗則知鍾馗之設亦遠矣捶糞錄異}
  - {type: page-break, offset: 2041, content: '', id: KR3k0014_WYG_008-26b, image: WYG0920/WYG0920-0220b.png}
  - {type: variant, offset: 2041, length: 1, content: 驛, krp: 嵗首畫鍾馗不知起自何時皇祐中金陵發一冢有石誌乃宋宗慤母鄭夫人云有妹曰鍾馗則知鍾馗之設亦遠矣捶糞錄異}
  - {type: variant, offset: 2043, length: 0, content: '', WYG: 曰歐明遇彭澤青洪君君有婢名如願君使隨明明意有所願如願輒得之成富人後不復愛如願正月嵗朝雞初鳴呼之不即起欲捶之願走糞上乃故嵗掃除所聚者由此逃去明謂在積壤中以杖捶糞使出知不可得因曰汝富我不復捶汝也今人元日雞鳴時輒往積壤間捶之云使人富蓋起自歐明也今京東之俗猶然畫雞董勛問禮曰正月一日為雞二日狗三日羊四日猪五日牛六日馬七日人正旦畫雞於門七日帖人於帳為此也拾遺記曰堯在位七年祇及國獻重明鳥狀如雞或一嵗數來或數嵗一來國人莫不掃灑門户以望其來或刻金寶為其狀置户牖間則鬼類自伏云今人每嵗元日刻畫為雞於户上蓋其遺像也書聻酉陽雜俎曰俗好於門上畫虎頭書聻字謂隂司乃鬼名可息瘧癘也段成式讀漢}
  - {type: page-break, offset: 2043, content: '', id: KR3k0014_WYG_008-27a, image: WYG0920/WYG0920-0220c.png}
  - {type: page-break, offset: 2043, content: '', id: KR3k0014_WYG_008-27b, image: WYG0920/WYG0920-0220d.png}
  - {type: variant, offset: 2043, length: 0, content: '', krp: 曰歐明遇彭澤青洪君君有婢名如願君使隨明明意有所願如願輒得之成富人後不復愛如願正月嵗朝雞初鳴呼之不即起欲捶之願走糞上乃故嵗掃除所聚者由此逃去明謂在積壤中以杖捶糞使出知不可得因曰汝富我不復捶汝也今人元日雞鳴時輒往積壤間捶之云使人富蓋起自歐明也今京東之俗猶然畫雞董勛問禮曰正月一日為雞二日狗三日羊四日猪五日牛六日馬七日人正旦畫雞於門七日帖人於帳為此也拾遺記曰堯在位七年祇及國獻重明鳥狀如雞或一嵗數來或數嵗一來國人莫不掃灑門户以望其來或刻金寶為其狀置户牖間則鬼類自伏云今人每嵗元日刻畫為雞於户上蓋其遺像也書聻酉陽雜俎曰俗好於門上畫虎頭書聻字謂隂司乃鬼名可息瘧癘也段成式讀漢}
  - {type: variant, offset: 2044, length: 0, content: '', WYG: 儀說儺逐疫鬼立桃人葦索滄耳虎等聻蓋滄耳也然則其說漢事也張讀宣室志曰裴漸隱居伊水時}
  - {type: variant, offset: 2044, length: 0, content: '', krp: 儀說儺逐疫鬼立桃人葦索滄耳虎等聻蓋滄耳也然則其說漢事也張讀宣室志曰裴漸隱居伊水時}
  - {type: variant, offset: 2045, length: 4, content: 步馬急遞, WYG: 道士李君善視鬼嘗見漸於伊上大厯中寓書博陵崔公曰當今制鬼無過漸耳是時朝士咸知漸耳字題其門者自於是此漸耳謂裴漸也爆竹嵗時記曰元日爆竹於庭以辟山臊山臊惡鬼也神異經曰犯人則病畏爆竹聲宗懍乃云爆竹然草起於庭燎風俗通謂起於庭燎不應濫王者也按周衰之末大夫而僭天子庶人而服侯服者皆是也奚獨燎明為不然乎懍之所記理或然矣綵花實錄曰晉惠帝令宫人挿五色通草花漢王符潛夫論已譏花采之費晉新野君傳家以剪花為業染絹為芙蓉捻蠟為菱藕剪梅若生之事按此則是花朶起於漢剪綵起於晉矣嵗時記則云今新花謝靈運所制疑綵花也唐中宗景龍中立春日出剪綵花又四年正月八日立春令侍臣迎春内出綵花人賜一枝董勛問禮曰人日造花勝相遺不言立春則立春之賜花自唐中宗始也綵勝初學記曰人日剪綵為勝起於晉代賈充夫人所作取黄母戴勝之義也觀燈唐書嚴挻之傳睿宗先天二年正月朢夜胡人婆陁請然百千燈因弛門禁帝御延熹安福門縱觀此天子御樓觀燈之始也放燈史記樂書曰漢帝以正月上辛祀太一甘泉以昏時祀到明徐堅謂今人正月朢夜遊觀燈是其遺事僧史略云漢法本傳曰西域十二月}
