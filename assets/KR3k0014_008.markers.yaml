  - {type: variant, offset: 2781, length: 3018, content: 禹平水土主名山川注云無名者主名之於是凡山川皆名之矣山海經洎爾雅所載者是也地圖春秋元命包曰神農世怪義生白阜圖地形脈水道注曰怪義白阜母名圖畫地形通水道之脈也今有地圖疑始於此弓手營宋朝會要曰咸平五年八月置縣尉司弓手營舍浮橋春秋後傳曰周赧王五十八年秦始作浮橋於河上按詩大明云造舟為梁孫炎曰造舟比舟為梁也比舟於水加板於上今浮橋也故杜預云造舟為梁則浮橋之謂矣爾雅釋水曰天子造舟諸侯維舟大夫方舟士特舟夏商尚質等制之文未備故鄭康成以為周制後傳以為秦始疑周有事則造舟而秦乃繫之也溫湯辛氏三秦記曰秦始皇與神女遊忤其旨唾之生瘡始皇怖謝乃為出溫湯洗除後人因以為驗漢武故事曰秦皇砌而起宇武帝加修飾焉道觀周穆王尚神仙召尹軌杜沖居終南山尹真人草樓之所因號樓觀蓋道觀之初也黃帝內傳西王母授帝白玉元始真容置於高觀之上時人謂之道觀名觀之義疑取諸此隋煬帝改為玄壇後復曰觀注續事始云宋廢國學置總明觀疑自是以來道家者流疑之以名其所居也景靈宮宋朝會要曰大中祥符五年十一月詔以聖祖臨降令擇地建宮遂以錫慶院建約唐太清宮制度仍上新宮名曰景靈神宗元豐中又廣其制盡奉諸帝后御容也上清宮宋敏求東京記曰端拱元年二月太宗詔取晉邸時太祖所賜金帛建宮至道元年八月宮成帝御書額金填其字賜之仁宗慶歷三年十一月遭焚毀熙寧元豐閒靈惠法師王太初再營之元祐初年宣仁太皇太后為出妝粉錢重建置也東太一宋朝會要曰太平興國初楚芝蘭言五福太一所在無兵疫人民豐樂凡行五宮四十五年一移自雍熙元年入黃室巽宮在吳分蘇州請築宮以祀六年十月芝蘭又言都城東南地名蘇村可徙宮以應蘇名遂詔營建注紀年通載則謂興國八年正月作也西太一又曰天聖六年三月司歷言五福太一自雍熙元年甲申及今四十五年太一行綦當入蜀郡之坤宮曰黃庭可於國城西南別建祈宮於是詔擇八角鎮地建西太一宮注紀年通載曰天聖六年三月建太一宮於西郊中太一神宗熙寧初即五岳觀舊址營中太一宮蓋自仁宗天聖六年至熙寧五年壬子四十五年五福太一行綦自黃庭宮移入貢室之中下臨京都之中故也建隆觀錢易洞微志曰周顯德中營道宮於皇城之西梁門外賜為太清觀太祖有天下始重飾之改為建隆注東京記內侍洪惟一人道建三宮院集禧觀宋朝會要曰大中祥符五年九月詔下謂就南薰門內奉節致遠三營地及填乾池之西偏建觀以奉五岳帝七年九月詔名觀曰會靈仁宗時觀火既重建改曰集禧池園又曰大中祥符八年五月詔會靈觀池以凝祥為名園以奉靈為名池觀醮殿蓋太祖所建池殿舊址也醴泉觀東京記曰本拱聖營天禧元年營卒有見龜蛇者軍士因建真武堂二年閏四月泉湧堂側汲不竭民疾疫者飲之多愈乃詔就其地建觀十月觀成名祥源宋朝會要曰天禧二年閏四月詔拱聖營醴泉所宜立觀以祥源為名仁宗時觀災既重立易今名曰醴泉萬壽觀本玉清昭應宮東偏別殿也宋朝會要昭應宮篇云天禧三年十一月皇后皇太子於宮東偏長生殿置經藏以祝聖壽詔賜殿名長生崇壽五年七月作皇帝本命殿於宮中名萬壽仁宗朝玉清昭應宮災所存止此殿重加營葺後以為萬壽觀也注林希兩朝寶訓曰天聖七年七月玉清昭應宮災上以所存長生崇壽殿為萬壽紀年通載云六月也天慶觀又曰大中祥符二年十月詔天下州府軍監關縣建道觀一所以天慶為名僧寺漢明帝於東都城門外立精舍以處攝摩騰竺法蘭即白馬寺也騰始自西域以白馬馱經來初止鴻臚寺遂取寺名刱置白馬寺即僧寺之始也隋煬帝改曰道場後復曰寺尼寺僧史略曰東晉何充始捨宅安尼此蓋尼寺之起也寺額漢取鴻臚寺名置白馬寺以處僧當是以白馬為額耳就則僧寺名額自漢顯宗始也相國寺唐房僚石幢記曰相國寺肇自中宗叶夢始置於茲宋敏求東京記曰本北齊大建國寺後廢唐為鄭審宅因病捨為招提坊神龍二年僧惠雲建為寺延和元年睿宗以舊封相王因改為相國寺宋朝會要曰至道中太宗御題額易曰大相國寺東塔曰普滿唐至德二載建開寶六年太祖修西塔曰廣願元祐元年僧中慜立會要又云咸平五年名後閣曰資聖東京記則云景德五年賜名也神宗熙寧閒重修飭之併諸院為八東曰寶嚴寶梵寶覺惠林西曰定慈廣慈普慈智海東京記又曰仁濟殿天聖八年建後與寶奎殿同賜名也景德寺宋朝會要曰本相國寺蔬圃周顯德中以僧居隘於此別建下院賜額天壽淳化二年別建寺門景德二年改今額天禧四年建寺廊經樓注東京記曰周世宗顯德五年以相國寺僧眾居隘就寺蔬圃別建置院分居之俗號東相國寺六年賜額曰天壽恭帝誕節名也又有觀音院峨眉僧茂正所建興國寺談苑曰太平興國寺舊龍興寺也周世宗廢為龍興倉國初寺主僧屢擊登聞鼓求復為寺上遣中使持劍以謂之曰此寺前朝所廢為倉敖以貯軍糧汝何故煩瀆帝庭朝命斷取汝首仍戒之曰儻偃蹇怖畏即斬之或臨刑無懼即未可既訊神色自若引頸就戮上大感歎復以為寺宋朝會要曰唐龍興寺也開寶二年詔重修太平興國元年賜今額傳法院又會要曰太平興國五年詔於太平興國寺大殿西度地作譯經院中設譯經堂東序為潤文堂西序為正義堂自是每誕節即獻經也八年改為傳法院按隋有翻經館唐初亦有翻譯之事元和後廢然則大宗之置茲院亦隋翻經館也四大寺五代會要曰周顯德四年九月賜京城內新修四大寺額以天清顯靜顯寧聖壽為名聖壽後又改曰顯聖是則四寺之始也建隆寺在揚州州城西北宋朝會要曰太祖征李重進於此置砦賊平建隆二年正月詔建寺焉有御榻在寺太祖忌日寺僧奉榻修供大中祥符五年始於寺建聖容殿元豐中神宗修景靈列聖神御殿故聖容復歸京師崇聖寺在并州舊州城外又會要曰舊名平晉寺太祖親征劉繼元行宮也興國中詔建寺賜名後於中設太宗御容大中祥符二年改名崇聖慈孝寺又曰慈孝寺故駙馬都御吳元扆宅也天聖二年十二月十二日詔建寺奉真宗神御初議名慈聖時太后號有此二字改賜今名東京記曰戒壇院本寺園寶元初僧文旦營刱戒壇慶歷五年賜額也開寶寺東京記曰北齊天保十年置號獨居寺唐開元十七年明皇東封改曰封禪寺宋朝會要曰開寶三年三月改今名福聖院會要云初吳越王錢俶在杭州建阿育王塔藏佛舍利歸朝於此建塔云端拱二年成加建塔院咸平二年賜今額東京記云本新羅僧智照所居舍利塔錢俶興國中令俞皓造慶曆四年六月火焚之後即其舊址建閣焉成於神宗元豐之初慈聖太皇太后以妝錢助成之賜名慶壽崇因或曰仁宗時已為此名其額亦帝所書但藏之禁中未以賜之洎閤成遂出以牓也永安院東京記曰本號普慶太宗在晉邸重建以賜僧普潤仍奏今額崇夏寺東京記曰唐大中三年置建隆中石守信以寺門窄狹重造二年八月門成車駕臨幸宋朝會要守信重修三門詔治宮材也應天寺後唐夾馬營也即太祖誕生之地景德二年真宗每幸二月詔建院奉太祖神御如啟聖制度大中祥符二年賜名應天在西京之水北民閒謂之瑠璃寺也啟聖院即太宗誕生之地晉護聖營也太平興國六年建院雍熙二年成賜名啟聖東京記曰本晉護聖營天福四年宣祖典禁兵太宗誕聖其地興國中建院也普安院又曰普安院周顯德中建建隆初賜今額奉先寺又曰奉先資福禪院即安陵卜定乾德二年改卜五月詔就陵域置院也資聖院在新井州會要又曰天禧五年真宗置嘗親征為陣亡將士追福德神虎三部落營地造天聖初成賜名資聖太祖太宗忌日皆就建道場崇真院又曰崇真院初太宗陳國長公主出家大中祥符二年八月進封吳國號報慈正覺大師賜名清裕九日出居是院初在建初坊後以迫隘徙城西隆安坊即今俗謂七公主院者是也印經院又曰太平興國八年置印經院神宗熙寧末廢其院以所印板賜顯聖寺靈顯王廟在鄭州城東僕射陂側陂本後魏孝文賜僕射李沖里俗因呼僕射陂唐末建廟因陂為名俗誤傳為李靖後唐明宗天成二年贈靖太保晉天福二年八月敕唐衛國公李靖宜封靈顯王顯聖王廟在寧州真寧縣即要冊湫也漢祠官所領唐乾符中封神為應聖侯光化二年封普濟王宋朝太宗在晉邸有神告之應太平興國二年七月四日封顯聖王按張緒續錦里耆舊傳曰太宗尹天府登極前有邠州客打軍巡引見問爭由曰爭說要冊大王上曰有侵傷不均吾為平之若爭要冊大王外邊商量此蓋神告之事耳廣濟, WYG: ''}
  - {type: variant, offset: 2781, length: 3018, content: 禹平水土主名山川注云無名者主名之於是凡山川皆名之矣山海經洎爾雅所載者是也地圖春秋元命包曰神農世怪義生白阜圖地形脈水道注曰怪義白阜母名圖畫地形通水道之脈也今有地圖疑始於此弓手營宋朝會要曰咸平五年八月置縣尉司弓手營舍浮橋春秋後傳曰周赧王五十八年秦始作浮橋於河上按詩大明云造舟為梁孫炎曰造舟比舟為梁也比舟於水加板於上今浮橋也故杜預云造舟為梁則浮橋之謂矣爾雅釋水曰天子造舟諸侯維舟大夫方舟士特舟夏商尚質等制之文未備故鄭康成以為周制後傳以為秦始疑周有事則造舟而秦乃繫之也溫湯辛氏三秦記曰秦始皇與神女遊忤其旨唾之生瘡始皇怖謝乃為出溫湯洗除後人因以為驗漢武故事曰秦皇砌而起宇武帝加修飾焉道觀周穆王尚神仙召尹軌杜沖居終南山尹真人草樓之所因號樓觀蓋道觀之初也黃帝內傳西王母授帝白玉元始真容置於高觀之上時人謂之道觀名觀之義疑取諸此隋煬帝改為玄壇後復曰觀注續事始云宋廢國學置總明觀疑自是以來道家者流疑之以名其所居也景靈宮宋朝會要曰大中祥符五年十一月詔以聖祖臨降令擇地建宮遂以錫慶院建約唐太清宮制度仍上新宮名曰景靈神宗元豐中又廣其制盡奉諸帝后御容也上清宮宋敏求東京記曰端拱元年二月太宗詔取晉邸時太祖所賜金帛建宮至道元年八月宮成帝御書額金填其字賜之仁宗慶歷三年十一月遭焚毀熙寧元豐閒靈惠法師王太初再營之元祐初年宣仁太皇太后為出妝粉錢重建置也東太一宋朝會要曰太平興國初楚芝蘭言五福太一所在無兵疫人民豐樂凡行五宮四十五年一移自雍熙元年入黃室巽宮在吳分蘇州請築宮以祀六年十月芝蘭又言都城東南地名蘇村可徙宮以應蘇名遂詔營建注紀年通載則謂興國八年正月作也西太一又曰天聖六年三月司歷言五福太一自雍熙元年甲申及今四十五年太一行綦當入蜀郡之坤宮曰黃庭可於國城西南別建祈宮於是詔擇八角鎮地建西太一宮注紀年通載曰天聖六年三月建太一宮於西郊中太一神宗熙寧初即五岳觀舊址營中太一宮蓋自仁宗天聖六年至熙寧五年壬子四十五年五福太一行綦自黃庭宮移入貢室之中下臨京都之中故也建隆觀錢易洞微志曰周顯德中營道宮於皇城之西梁門外賜為太清觀太祖有天下始重飾之改為建隆注東京記內侍洪惟一人道建三宮院集禧觀宋朝會要曰大中祥符五年九月詔下謂就南薰門內奉節致遠三營地及填乾池之西偏建觀以奉五岳帝七年九月詔名觀曰會靈仁宗時觀火既重建改曰集禧池園又曰大中祥符八年五月詔會靈觀池以凝祥為名園以奉靈為名池觀醮殿蓋太祖所建池殿舊址也醴泉觀東京記曰本拱聖營天禧元年營卒有見龜蛇者軍士因建真武堂二年閏四月泉湧堂側汲不竭民疾疫者飲之多愈乃詔就其地建觀十月觀成名祥源宋朝會要曰天禧二年閏四月詔拱聖營醴泉所宜立觀以祥源為名仁宗時觀災既重立易今名曰醴泉萬壽觀本玉清昭應宮東偏別殿也宋朝會要昭應宮篇云天禧三年十一月皇后皇太子於宮東偏長生殿置經藏以祝聖壽詔賜殿名長生崇壽五年七月作皇帝本命殿於宮中名萬壽仁宗朝玉清昭應宮災所存止此殿重加營葺後以為萬壽觀也注林希兩朝寶訓曰天聖七年七月玉清昭應宮災上以所存長生崇壽殿為萬壽紀年通載云六月也天慶觀又曰大中祥符二年十月詔天下州府軍監關縣建道觀一所以天慶為名僧寺漢明帝於東都城門外立精舍以處攝摩騰竺法蘭即白馬寺也騰始自西域以白馬馱經來初止鴻臚寺遂取寺名刱置白馬寺即僧寺之始也隋煬帝改曰道場後復曰寺尼寺僧史略曰東晉何充始捨宅安尼此蓋尼寺之起也寺額漢取鴻臚寺名置白馬寺以處僧當是以白馬為額耳就則僧寺名額自漢顯宗始也相國寺唐房僚石幢記曰相國寺肇自中宗叶夢始置於茲宋敏求東京記曰本北齊大建國寺後廢唐為鄭審宅因病捨為招提坊神龍二年僧惠雲建為寺延和元年睿宗以舊封相王因改為相國寺宋朝會要曰至道中太宗御題額易曰大相國寺東塔曰普滿唐至德二載建開寶六年太祖修西塔曰廣願元祐元年僧中慜立會要又云咸平五年名後閣曰資聖東京記則云景德五年賜名也神宗熙寧閒重修飭之併諸院為八東曰寶嚴寶梵寶覺惠林西曰定慈廣慈普慈智海東京記又曰仁濟殿天聖八年建後與寶奎殿同賜名也景德寺宋朝會要曰本相國寺蔬圃周顯德中以僧居隘於此別建下院賜額天壽淳化二年別建寺門景德二年改今額天禧四年建寺廊經樓注東京記曰周世宗顯德五年以相國寺僧眾居隘就寺蔬圃別建置院分居之俗號東相國寺六年賜額曰天壽恭帝誕節名也又有觀音院峨眉僧茂正所建興國寺談苑曰太平興國寺舊龍興寺也周世宗廢為龍興倉國初寺主僧屢擊登聞鼓求復為寺上遣中使持劍以謂之曰此寺前朝所廢為倉敖以貯軍糧汝何故煩瀆帝庭朝命斷取汝首仍戒之曰儻偃蹇怖畏即斬之或臨刑無懼即未可既訊神色自若引頸就戮上大感歎復以為寺宋朝會要曰唐龍興寺也開寶二年詔重修太平興國元年賜今額傳法院又會要曰太平興國五年詔於太平興國寺大殿西度地作譯經院中設譯經堂東序為潤文堂西序為正義堂自是每誕節即獻經也八年改為傳法院按隋有翻經館唐初亦有翻譯之事元和後廢然則大宗之置茲院亦隋翻經館也四大寺五代會要曰周