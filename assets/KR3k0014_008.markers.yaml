  - {type: variant, offset: 10489, length: 1172, content: 十一章為難經楊元操難經序曰黃帝八十一難經者秦越人扁鵲所作按黃帝內難二秩秩九卷其義難究越人乃採精要八十一章為難經本草帝王世紀曰炎帝嘗味草木置藥療疾著本草四卷至梁陶洪景唐李世勣等注敘為二十卷宋朝開寶中重校定仁宗嘉佑中命劉禹錫等集類諸家敘藥之說為補注本草唐書于志寧傳云漢班固惟紀黃帝內外經不載本草齊七錄乃稱之世謂神農嘗藥黃帝以前文字不傳以識相付至桐雷乃載篇冊然所載郡縣多漢時事疑張仲景華佗輩記其語陶洪景本草序云此書應與素問同類其餘多與志寧之說同也百藥淮南子曰神農始嘗百草之滋味當此之時一日而七十毒世本曰神農和藥濟人則百藥蓋自神農始也世紀或云伏羲嘗味百藥非也梁陶洪景本草序曰神農氏王天下宣藥療疾以拯夭傷高氏小史曰炎帝嘗百藥以治病嘗藥之時百死百生九鍼帝王世紀曰太昊畫八卦以類萬物之情六氣六腑五臟五行陰陽四時水火升降得以有象百病之理得以有類乃制九鍼又曰黃帝命雷公岐伯教制九鍼蓋鍼灸之始也明堂金醫家記鍼灸之穴為偶人點誌其處名明堂按銅人腧穴圖序曰黃帝問岐伯以人之經絡窮妙於血脈參變乎陰陽盡書其言藏於金蘭之室洎雷公請問乃坐明堂以授之後世之言明堂者以此醫獸續事始曰黃帝時有馬師皇者善醫馬通神明故周禮天官有獸醫夏官有巫馬之職也日者史記日者傳注云古人通卜筮則謂之日者其事則周太卜之職也墨子將北之齊過日者注謂當是周末語然也卜龜曰卜事始曰包犧氏時始有卜春秋元命包曰古者司經主卜也筮蓍曰筮世本曰巫咸作筮古史考曰商時巫咸善筮也呂氏春秋亦云巫作筮歸藏曰女媧作筮張雲幕而枚占書舜曰龜筮協從蓋筮誠巫咸所作則歸藏與書安得言筮也古史考曰庖犧氏作卦始有筮此蓋其初也三式風后演河圖為一千八百局曰遁甲周太公約為七十二漢張良定為一十八以六甲相遁而起故名遁甲并太一六壬是為三式黃帝內傳曰王母使玄女授帝法有九天九地八門六甲之術即今遁甲也蓋自黃帝始占歲世本曰后益作占歲呂氏春秋亦云爾師曠占乃有黃帝欲知歲苦歲樂歲善而占有蓬薺艾先生之說即占歲為起於黃帝雜占晉律歷志曰黃帝使羲和占日常儀占月車區占風鬼臾蓲占星呂氏春秋曰羲和作占日常儀作占月靈碁異苑曰十二碁卜出自張文成受法於黃石公蓋今靈碁也法以十二子分上中下擲之據所得按法驗之以考吉兇注文成留侯張子房諡也唐事遠棊經序曰靈經不知其所起或云東方朔漢武帝使之占兆無不中朔之術蓋如此又云張子房所師黃石公以之授良又云客以術干淮南王王祕其事亦此書也畫易通卦驗曰伏犧方牙倉精作易無書以畫事注云作易以為政而不書但畫其形此畫之起也世本曰史皇作圖宋衷云黃帝臣圖謂畫物象也或曰史皇即倉頡呂氏春秋亦曰史皇作畫射御易繫九事稱黃帝作弧矢以威天下又曰服牛乘馬引重致遠則射御皆始於黃帝也世本曰臣胲作服牛相土作乘馬𣎅作駕宋衷云皆黃帝臣又曰韓哀作御謂加精巧逢蒙作射謂改制也呂氏春秋作韓哀作御也規矩尸子曰古者倕為規矩準繩使天下傚焉倕黃帝時巧人也百巧山海經曰帝俊生身身生義均義均是始為巧倕始作百巧也, WYG: ''}
