  - {type: variant, offset: 2125, length: 0, content: '', WYG: 勅寒食上墓禮經無文近代相傳浸以成俗士庶有不合廟享者何以表其孝思宜許上墓編入五禮按漢官儀曰古不墓祭秦始皇起寢墓側漢因不改四時上飯後漢光武紀云建武十年八月幸長安有事十一陵蓋躬祭於墓也即今上墳拜掃蓋起於此明帝紀永平元年正月帝率公卿朝原陵如元會儀劉昭補注後漢禮儀志亦有上陵儀謝承書曰建寧五年正月車駕上陵原蔡邕曰明帝至孝光武即世帝嗣位羣臣朝正感先帝不復間見此禮乃率百僚就原陵創焉然則上墳之禮疑自是以來民間視上所行因習以為俗也破散五代會要曰奉先之道無寒食野祭之禮近代莊宗每年寒食出祭謂之破散則今人有破散之語自後唐莊宗始也蠶市仙傳拾遺曰蜀蠶叢氏王蜀教人蠶桑作金蠶數千每嵗首出之以給民家每給一所養之蠶必繁孳罷即歸於王王巡境内所止之處蠶成市蜀人因其遺事每年春有蠶市也紙鳶俗謂之風筝古今相傳云是韓信所作髙祖之征陳豨也信謀從中起故作紙鳶放之以量末央宫逺近欲以穿地墜入宫中也蓋昔傳如此理或然矣梁太清中侯景攻臺城内外}
