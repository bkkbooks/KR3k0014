  - {type: variant, offset: 2210, length: 2, content: 初置, WYG: 燕龍圖肅知郡事又展為三日至十一日而罷是則藥市之起自唐王昌遇始也有碑叙其本末甚詳賽神禮雜記曰子貢觀於蜡子曰百日之蜡一日之澤鄭康成謂嵗十二月索鬼神而祭祀則黨正以禮屬民而飲酒勞農而休息之}
  - {type: page-break, offset: 2210, content: '', id: KR3k0014_WYG_008-39b, image: WYG0920/WYG0920-0226d.png}
  - {type: variant, offset: 2210, length: 2, content: 初置, krp: 燕龍圖肅知郡事又展為三日至十一日而罷是則藥市之起自唐王昌遇始也有碑叙其本末甚詳賽神禮雜記曰子貢觀於蜡子曰百日之蜡一日之澤鄭康成謂嵗十二月索鬼神而祭祀則黨正以禮屬民而飲酒勞農而休息之}
  - {type: variant, offset: 2214, length: 0, content: '', WYG: 燕樂是君之澤也令賽社則其事爾今人以嵗十月農功畢里社致酒食以報田神因相與飲樂世謂巫禮始於周人之蜡云設浴俗緣記曰譬喻經云佛臘月八日降伏六師投佛請死言佛以法水洗我心垢今我請僧洗浴以除身穢仍為常緣則設浴之事西域舊俗也亦今臘月灌佛之始驅儺禮緯曰髙陽有三子生而亡去為疫鬼二居江水中為瘧一居人宫室區隅中善驚小兒於是以正嵗十二月命祀宫有儺以索室中而驅疫鬼軒轅本紀曰東海度索山有神荼鬱壘之神以禦凶鬼為民除害因制驅儺之神子游鳥問於雄黄曰今人逐疫出魁擊鼓呼噪何也雄黄曰黔首多疾黄帝氏立巫咸使黔首鳴鼓振鐸以動心勞形發隂陽之氣擊鼔呼噪遂以出魁黔首不知以為祟魅也或記以為驅儺之事按周禮有大儺漢儀有侲子要之雖原始於黄帝而大抵周之舊制也周官嵗終命方相氏率百𨽻索室驅疫以逐之則驅儺之始也}
