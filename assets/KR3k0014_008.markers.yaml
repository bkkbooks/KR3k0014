  - {type: 'tls:seg', offset: 1923, content: '', id: KR3k0014_CHANT_008-30a.16}
  - {type: variant, offset: 1925, length: 2, content: 餼給, WYG: 虞氏之尊也山罍夏后之尊也著商尊也犧象周尊也此四代之制也三爵又曰爵夏后氏以琖商以斚周以爵此三器之始也然則今世所用盞亦始於夏后之琖與三彛又曰灌尊夏后氏以雞彛商以斚周以黄目此三彛之始也三勺又曰勺夏后以龍勺商以疏勺周以蒲勺蓋龍疏蒲勺飾也後王加文耳然則勺之興當有虞始創之故無飾也至夏后加龍以飾之簠簋墨子曰堯飯土簋禮明堂位曰有虞氏之兩敦夏后氏之四璉商之六瑚周之八簋皆黍稷之器也始本於陶唐之土簋俎明堂位又曰有虞氏以䖾俎注云斷木為四足而已然則斷木而為足不致文飾創始為之故也唐太宗曰禹雕其俎至夏乃用雕文則俎自虞帝始也豆又曰夏后以掲豆注云掲無異物之飾也凡造物之初未始不本於樸素後王以為未足以致誠敬故因之加文焉則豆無異飾初為其器也豆疑始於夏后氏也籩豋爾雅曰竹豆謂之籩瓦豆謂之豋此二物取法於豆而製也疑出有夏之後鼎史記黄帝内傳鍾繇疏皆云黄帝採首山之銅鑄鼎於荆山此鼎之始也後至夏禹復鑄以象物自始六帖黄帝作鼎三象天地人禹收九牧之金以鑄九鼎水罐盧綝匝四起事曰晉惠帝征成都軍敗帝渇帳下齎五升銅罐取水就飲之後人因有水罐之制張敞晉東宫舊事曰太子初拜有塗金澡罐一幷青絲三合繩}
