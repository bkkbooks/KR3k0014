  - {type: variant, offset: 1928, length: 2, content: 候館, WYG: 此也在如意後甌許慎說文曰䀁音賄小甌揚雄方言曰甌甂音邊雄慎皆漢人凡所記非戰國即秦漢制度蓋三代飲燕之具俱俎豆之類故也盆爾雅曰盎謂之缶注云今盆也吕氏春秋曰堯使質絡缶而擊之則缶已為用於堯世矣周官牛人祭祀共其盆簝禮器孔子曰奥者老婦之祭也盛於盆尊於瓶此又二物之名出於周代也鉢本天竺國器也故語謂之鉢多羅漢云應重器省略彼土言故名鉢西國有佛鉢是也宋廬江王以銅鉢餉祖祈則是晉宋之間始為中夏所用也銚廣雅曰鋗謂之銚說文云温器也曹操上獻帝表曰臣祖騰有順帝賜純銀粉銚疑漢人始為之也杓禮明堂位曰勺夏后氏以龍勺推此以考蓋前有制矣有夏始加以龍飾杓即勺也祭祀曰勺民用曰杓其實一也或以勺之所容不過升勺命之而杓則加廣其所受皆取酌焉遂異其名制也杯禮玉藻曰母沒則杯棬不能飲十州記曰周穆王時西胡獻常滿杯蓋杯三代之制也紂為瓊杯是矣盤禮太學有湯之盤銘曰茍日新日日新又日新是夏世已有盤制而湯始銘之也或曰盤盂黄帝臣孔甲造此蓋二物之所起也盤盞周官司尊彛之職曰六彛皆有舟鄭司農云舟樽下臺若今承盤蓋今世所用盤盞之象其事已略見於漢世則盤盞之起亦法周人舟彛之制而為漢世承盤}
