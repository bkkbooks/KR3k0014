  - {type: variant, offset: 1960, length: 0, content: '', WYG: 其卑枝向東北曰鬼門萬鬼出入也有二神一曰神荼一曰鬱壘主閱領衆鬼之害人者於是黄帝法而象之毆除畢因立桃版於門户上畫鬱壘以禦凶鬼此則桃版之制也蓋其起自黄帝故今世畫神像於版上猶於其下書右鬱壘左神荼元日以}
