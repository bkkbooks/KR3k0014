  - {type: variant, offset: 7, length: 0, content: '', WYG: 代物禮曰天子外屛諸侯内屛大夫以簾士以幃牀孟子曰象往入舜宫舜在牀琴黄帝内傳有七寶登真之牀則牀疑始於有熊氏也胡床搜神記曰胡床戎翟之器也風俗通曰漢靈帝好胡服景師作胡床此蓋其始也今交椅是帳幄周官幕人掌帷幕幄帟綬之事注云四合象宫室曰幄王所居帳也則帳幄當周制也左傳有子我有幄又衛侯為虎幄皆周事云又所寢之幄謂之帳者黄帝内傳曰王母為帝設九真}
