  - {type: variant, offset: 8, length: 4, content: 四冰井務, WYG: 絶妙帳此疑帳之起也漢武帝作甲乙武帳蓋因此耳帳幕幕人注云在旁曰帷在上曰幕皆以布為之說文亦云然則帷幕亦周制也歸藏曰女媧張雲幕而枚占神明雖女媧之世有幕之名而其物之興當自周始也幔六韜曰天將雨不張幔蓋拾遺錄曰周穆王有鸞章錦幔蓋周有其物也屛風}
