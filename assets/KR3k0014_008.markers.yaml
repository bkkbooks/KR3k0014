  - {type: variant, offset: 79, length: 0, content: '', WYG: 云邸後板也康成謂後板屛風禮記明堂位曰天子負斧扆而立陸法言云今屛風扆遺象也三禮圖曰屛風之名出於漢世故班固之書多言其物徐堅為初學記亦載漢劉安羊勝等賦然則漢制屛風蓋起於周皇邸斧扆之事也拂廬唐書吐蕃處於大氊帳名拂廬髙宗永徽五年獻之髙五丈廣袤各二十七步其後豪貴稍以青絹布為之其始以拂於穹廬為號也}
