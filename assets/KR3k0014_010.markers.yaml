  - {type: variant, offset: 11135, length: 327, content: 兵呂氏春秋曰蚩尤作五兵戈殳戟酋矛夷矛也世本蚩尤以金作兵器然則兵蓋始於炎帝而鑄金為刃即自蚩尤始矣黃鉞輿服志曰黃鉞皇帝置內傳曰帝將伐蚩尤玄女授帝金鉞以主殺此其始也牙旗黃帝出軍決曰牙旗者將軍之精金鼓者將軍之氣一軍之形候也即知牙旗之製始自置軍之時疑有征伐則置之也吳孫權因之作黃龍大牙衣甲世本曰杼作甲杼或作與少康子也墨子亦云太白陰經曰蚩尤割革為甲管子亦云黃帝內傳曰玄女請帝制甲冑以備身也抹額二儀實錄曰禹娶塗山之夕大風雷電中有甲卒千人其不被甲者以紅綃帕抹其頭額云海神來朝禹問之對曰此武士之首服也秦始皇至海上有神朝皆抹額緋衫大口袴侍衛自此抹額遂為軍容之服兜鍪冑也黃帝內傳所述蓋玄女請帝製之以備身也淮南子紀論訓曰有鍪頭而綣領以王天下者矣許慎注曰蓋三皇所以鍪頭者兜鍪帽也則, WYG: 指揮先}
