  - {type: variant, offset: 2134, length: 3, content: 遣使造, WYG: 詔改簇御馬直曰簇御龍直骨䤪子直曰御龍骨䤪子直自此以下不著所出者皆出宋朝㑹要捧日􅘫直雍熙四年五月改殿前司曰騎􅕒直指揮為捧日􅘫直驍猛布拱宸天武皇祐大饗明堂記云五代禁軍號控鶴年多者號寛衣控鶴太平興國中改控鶴為天武寛衣控鶴曰天武散手後又改為寛衣天武唐天寳有天武徤兒今取此名五代㑹要曰梁開平二年十二月改左右天武為龍虎軍左右龍虎為天武軍額諸軍有控鶴葢梁已有天武軍矣宋朝㑹要曰太平興國二年正月詔改控鶴曰寛衣天武也唐書孔緯傳有天武都頭李順節龍衞五代㑹要曰廣順元年四月改侍衞馬軍曰龍捷左右軍宋朝㑹要曰太平興國二年正月詔改龍衞宋朝舊有龍騎興國二年改為龍猛也神衞五代㑹要曰廣順元年四月改侍衛步軍曰虎捷左右軍御撰其名此虎捷名軍}
