  - {type: variant, offset: 11463, length: 1871, content: 黃帝之制冑亦以古鍪頭之事耳故自古兜鍪為首鎡之名干戈王子年拾遺記曰庖義造干戈以飾武此干戈之始也則兵為起於大昊矣呂氏春秋云蚩尤造五兵蓋其一也劍管子曰昔葛天盧之山發而出金蚩尤受而制之以為劍鎧矛戟此劍甲之始也戟又管子黃帝問於伯高伯高曰雍狐之山發水出金蚩尤受而制之以為雍狐之戟此戟之始也實錄謂自夏后氏始非也呂氏春秋云蚩尤造五兵戟其一也龍魚河圖曰蚩尤造戟也續事始曰魏武加蝦蟆頭幡刀龍魚河圖曰黃帝時蚩尤造立刀戟郭憲洞冥記曰黃帝採首山之銅始為鑄刀二儀實錄曰刀之制自黃帝與蚩尤戰即有之槍實錄曰黃帝與蚩尤戰時即有槍漢諸葛亮始以木作之長丈二以鐵為頭續事始曰亮置苦竹槍長二丈五尺也矛世本曰杼作矛管子曰蚩尤為劍鎧矛戟呂氏春秋蚩尤作五兵有酋矛夷矛則矛蓋蚩尤所作也馬槊梁𥳑文帝馬槊譜序馬槊為用雖非遠法近代相傳稍以成藝按曹操父子橫槊賦詩於鞍馬之閒則馬槊之事已見於此矣豈其事之所起乎匕首漢王莽傳曰莽避火坐宣室前殿持虞帝匕首則匕首之制堯舜已為其物矣然兵械之原多出於黃帝亦其時事耶按左氏魯曹沫執匕首劫齊桓公弓矢太白陰經曰庖犧氏弦木為弓剡木為矢易繫辭曰神農氏沒黃帝堯舜氏作弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽山海經曰少皞生般始為弓矢世本曰牟夷作矢揮作弓宋衷注云牟夷揮皆黃帝臣郭璞弓矢一器而作者兩人於理可疑以般為是墨子曰羿作弓荀子曰倕作矢呂氏春秋曰夷羿作弓張㪍吳錄曰揮觀弧星始為弧司馬遷著史記曰黃帝之弓曰烏號然則當以繫辭為是員半千射決曰蚩尤作亂黃帝始制弧矢弩古史曰黃帝作弩吳越春秋陳音對越王曰弩生於弓弓生於彈彈生於古之孝子楚琴氏以弓矢之勢不足以威天下乃橫弓著臂施機設郭加之以力即是弩之始出於楚琴氏也而周官司弓矢掌六弓六弩其名物有唐大來庾之制則弩之起遠矣龍魚河圖則曰黃帝時蚩尤造五兵杖刀戟大弩也神臂弓筆談曰熙寧中李定獻偏架弩似弓而施榦鐙以鐙拒地而張之射三百步能洞札謂之神臂弓最為利器定黨項羌酋歸朝死於防團蓋神臂弓之為國用自定始也弓袋實錄曰器仗皆自有虞氏始韣鹿施弓袋通謂之三仗蓋大將備儀也左傳曰左橐鞬右鞭弭是也禮樂記曰武王克商倒載干戈包之以虎皮名之曰建櫜注建讀為鍵兵甲之衣曰櫜箭筒又曰箭筒自有虞氏始也周禮有矢箙射的虞書曰侯以明之注云作射侯之禮以明善惡則射侯始見於堯舜矣至周有熊虎麋豻三五正侯後世就𥳑但為射的蓋侯之遺意也射以暈計之亦三正五正之遺事也俗亦曰射帖鳴鏑前漢匈奴傳曰冒頓作鳴鏑應劭曰驍箭也遂以射殺頭曼單于者斬馬刀漢成帝時朱雲請上方斬馬劍斷張禹頭以厲其餘則斬馬劍之名已見於漢代矣宋朝神宗熙寧中又製斬馬刀其犀利則莫比蓋亦取漢氏舊名為稱也六纛實錄曰商有纛皁絲為之似蚩尤首黃帝內傳曰玄女為帝制玄纛十二以主兵是則纛自黃帝始旗幟列子曰黃帝與炎帝戰以鵰鶚鷹隼為旗幟故今旗物或綵錯為鵰鶚取諸此也太白陰經曰蚩尤建旗幟黃帝內傳曰玄女請帝制旗幟以象雲物此蓋旗幟之始也五方旗通典曰黃帝振兵設五旗黃帝內傳曰帝制五彩旗指顧向背黃帝出軍決曰攻伐作五彩牙旗青引東赤南白西黑北中黃是也亦自黃帝制之鉦黃帝內傳曰玄女請帝鑄鉦鐃以擬雹擊之聲今銅鑼其遺事也鐸鬻子曰禹治天下以五聲聽為銘書於簨簴曰告寡人以事者振鐸禹世已有此也角徐廣車服儀制曰角前書記所不載或云本出羌胡一云出於越黃帝內傳曰玄女請帝製角二十四以警眾像禮義纂曰蚩尤師魑魅與黃帝戰帝命始吹角作龍鳴以禦之蓋角肇於黃帝氏也谷儉角賦夫角蓋黃帝會群臣於泰山作清角之音號令之限度也軍中置之以司昏曉故角為軍容也鞞唐韻曰鼙騎上鼓鼙裨也裨助鼓節亦作鞞今軍行馬上所擊是也黃帝內傳曰玄女請帝制鼓鼙以當雷霆是則黃帝製之以伐蚩尤也呂氏春秋曰帝嚳令倕作鼙鼓之樂又云倕作鞞以節鼓鞀呂氏春秋曰倕作鞀鬻子曰禹為銘書於簨簴語寡人以獄訟者揮鞀音挑鞍轡桓寬鹽鐵論云古者繩鞚草鞮皮薦而已後代以革鞍而不飾六韜曰車騎之將軍馬不具鞍勒不備者誅推此當是三代之制蓋黃帝始服牛乘馬疑車騎也鞭說文所為驅遲者也古用革以為之左傳曰鞭之長不及馬腹是也後世代之以竹故或謂之策蓋策之以箠馬太王杖馬箠去邠是也虞書曰鞭作官刑則得名於堯舜之代始以為薄刑之用鐵蒺藜事始云鐵蒺藜菱角等起於隋焬帝征遼東置之要路水中以刺人馬非也按諸葛亮與司馬懿相持於武功五丈原亮卒懿追之亮長史楊儀多布鐵蒺藜則三國之際已有其物非自隋煬帝始也漢文帝時晁錯言守邊議云具藺石布渠答注云渠答鐵蒺藜也此又漢初事爾雖然非三代仁義之守也楯山海經曰羿與鑿齒戰於草疇之野羿持弓矢鑿齒持楯春秋元命包曰帝嚳戴干宋衷曰干楯也王嘉拾遺記曰庖犧造干此則楯之起也旁排實錄曰旁排自牟夷始也或曰旁排近世兵杖中有鏢牌蓋出溪洞之蠻熙寧中王師征交阯其法乃盛傳於中國至神宗設於行陣令諸軍習之也宋朝會要曰, WYG: ''}
