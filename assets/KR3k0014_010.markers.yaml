  - {type: variant, offset: 255, length: 197, content: 呂氏春秋曰后稷作稼注云烈山氏子曰柱能植百穀蔬菜梁陶洪景本草序曰昔神農氏之王天下造耕種以省穀耒耜易繫辭曰包犧氏沒神農氏作斲木為耜揉木為耒耒耜之利以教天下蓋取諸益禮含文嘉亦曰神農作耒耜古史考亦云而世本則曰倕作又以為咎繇作非也白虎通曰古者人食禽獸肉神農時人多禽獸不足神農乃因天時地利制耒耜教人農作高氏小史亦云炎帝種五穀為耒耜以利百姓犂山海經曰稷降以百穀種之弟曰台璽生叔均叔均生是代其父及稷播百穀始作耕, WYG: 忠佐}
