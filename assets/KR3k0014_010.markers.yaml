  - {type: variant, offset: 14101, length: 0, content: '', krp: 摸稜世人以依違不正辨為摸稜按唐書蘇味道居相位不能有所發眀依違取容}
  - {type: variant, offset: 14102, length: 0, content: '', WYG: 已甞謂人曰處事不欲眀白決㫁若有差誤必貽咎譴但摸稜以持兩端時人號曰蘇摸稜或曰味道為相人所咨決無所可否依違嗤胡以手摸所坐床故曰摸稜盖此語之始自味道也墜子晉石崇有妓名緑珠趙王倫之亂孫秀使人求之王與秀收之珠墜樓而死後人因目姬侍為墜子由此始也草木花菓部五十四占稻江淮之間有稻粒稍細耐水旱而成實早作飯差硬土人謂之占城米真宗甞植於苑中始自占城國傳其種遂植南方也宋朝㑹要曰大中祥符五年五月遣使福建取占城禾分給江淮兩浙漕并出種法令擇民田之髙者分給種之僧文瑩湘山野録曰真宗聞占城稻耐旱遣使以珍貨求其種播之始植於後苑也胡麻筆談曰胡麻只今油麻也中國之麻謂之大麻張騫始自大宛得油麻種亦謂之麻故以胡麻别之謂漢麻為大麻則是油麻亦自漢始來中夏矣然本草已載胡麻未知孰是陶隠居注本草云本生大宛故名胡麻波稜劉}
