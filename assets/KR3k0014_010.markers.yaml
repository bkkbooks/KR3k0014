  - {type: variant, offset: 13360, length: 2, content: 標牌, krp: 帶甲剰員太中祥符五年八月詔河東諸州軍昨簡𨽻剰員者如聞尚多强壯可併為帶甲剰員以備給使剰員真宗咸平五年七月四日以軍士三十三人𨽻剰員皆支體廢者不忍遽棄令廪給如故自是率以為例律令刑罰部五十二律風俗通曰臯陶謨虞始造律後漢張敞上疏曰臯陶造法律急就章曰臯陶造獄法律存也史記曰李悝造律晉刑法志曰秦漢舊律其文起自魏李悝撰次諸國法著法經唐書曰時所用律起自魏文侯師李悝然皆罪名也通典亦曰又以為商君受之以相秦至漢天下既定命蕭何次律令也孫奭律令義曰名例者漢九章散而未統魏始集罪例號為刑名晉賈充以刑名法例為篇北齊髙叡并曰名例衞禁者晉始有衞官之名北齊附以闗禁隋勅蘇威更新律名衞禁職制者晉本名違制隋更曰職制戶婚者漢九章専為戶律北齊附以婚事名婚戶隋更曰戶婚廢廏庫者漢厯北齊或名牧産隋益以庫事名廏庫擅興者漢名興律魏陳群定法名興擅北齊改文從繕隋定曰擅興賊盗者魏李悝首制賊盗二法後魏曰盗律賊律北齊合為一周分為刼盗賊叛隋更名賊盗律鬭訟者後漢始析前世繫訊律為鬭律北齊附以訟律後周改鬭競隋後齊名訐偽者魏世始分賊律創名之後無改雜律者李悝首曰雜法後周更為雜犯隋去犯字還為舊名捕亡者李悝首制捕法後魏益曰捕亡北齊改曰捕斷後周易曰捕逃隋世復曰捕亡斷獄者李悝始造因法魏世分出此篇北齊合扵捕斷後周復曰斷獄陳彭年唐紀曰太宗貞觀二年正月丁亥朔房𤣥齡與法官刪定律十二卷五百條令二十卷比隋律減死入流九十二條減流入徒七十一條令說命曰王言惟作命不言臣下㒺攸禀令是則王者之言下守之而為令也今令之文持所守之事冝以此為始杜周曰前王所定著為律後王所定疏為令六帖云蕭何攟摭法令宜扵今者乃著令唐紀曰太宗貞觀中房𤣥齡刪定法令三十卷一千五百條律疏唐刑法志曰自𤣥齡等更定律令訖太宗世無所更改髙宗即位詔律學之士撰律疏則律疏盖起自唐髙宗時也宣宗時張戮以刑律分類為大中刑律統類故五代以來又有刑統刑尚書吕刑曰蚩尤作五虐之刑曰法至舜乃命臯陶眀五刑也世本曰伯夷作五刑誤矣吕氏春秋又謂臯陶作刑也獄急就章曰臯陶造獄風俗通曰三王始有獄夏曰夏䑓商曰羑里周曰囹圄博物志曰夏曰念室商曰動止周曰稽留臺獄唐書崔隠甫傳曰隠甫拜御史大夫初臺無獄凡有囚則繫大理貞觀時李乾祐為大夫始置獄隠甫執故事罷之後患囚往來漏泄復繫除院則臺之置獄自李乾祐始也囚有罪而繫獄者曰囚疑古有之故泮水曰淑問如臯陶在泮獻囚赦虞書眚災肆赦則是赦之起葢始於帝舜也斷屠唐刑法制曰武德二年詔斷屠日不行刑㑹要曰武德二年正月二十四日詔自今後毎年正月五月九月及毎月十齋日並斷屠按此則是斷屠之制起於唐髙祖也杜佑集歴代沿革事為通典前此無文而首載武后聖厯二年事驗此可知也宋朝因之臨時限日云五刑唐刑法志曰隋已前死罪有五徒流之刑鞭笞兼用數皆踰百隋始定之為笞刑五自十至五十杖刑五自六十至百徒刑五自一年至三年流刑五自千里至三千里死刑二絞與斬並用為五刑皆今世循用者盖自隋始也三代以劓刖剕宫大辟為五刑絞古者棄市周禮有罄於甸人之說秦曰磔漢文帝二年改曰棄市取刑人於市與衆棄之之義隋謂之絞即絞葢興於周代矣斬尸子曰黄帝斬蚩尤於中冀黄帝内傳曰擒蚩尤於版泉之闕或斬之則知斬起於軒轅也配舊云刺面而配起於周太祖世宗之代按王溥五代㑹要曰晉天福三年八月左街從人韓延嗣徒二年半劄面配華州發運務葢唐制有配流嶺南諸州之文此始有配法而刺面當起扵晉也加役流唐刑法志曰太宗即位長孫無忌議絞刑三十皆免死而斷右趾裴洪獻以謂五刑而刖足是六也扵是除斷趾法為加役流葢自唐太宗始也流黄帝内傳曰帝斬蚩尤懸首軍門以威天下其衆流於八荒之外即流刑之始也舜去四㐫族流共工於幽州放驩兜於崇山竄三苖於三危殛鯀於羽山又其事也故舜典曰流宥五刑五流有宅徒周禮凡民有罪役諸司空即徒之始也孫奭律音又曰舊制犯徒者依年配犯流者流至配所居作皆不决杖宋朝建隆四年制徒者加杖免役流者加杖留住居役一年加役流三年也笞杖書曰鞭作官刑即笞之始也扑作教刑即杖之始也唐虞之盛與肉刑並用及漢齊太倉令淳于意有罪當刑少女緹縈上書文帝憐其意為除肉刑始專用笞杖也折杖宋朝㑹要曰建隆四年三月張昭請加役流脊杖二十配役三年流三千里脊杖二十二千五百里脊杖十八二千里脊杖十七並役一年徒三年脊杖二十二年半十八二年十七一年半十五一年十三杖一百臀杖二十九十十八八十十七七十十五六十十三笞五十杖十四十三十八下二十杖七下舊據獄官令用杖受杖者皆背臀腿分受殿庭决者皆背受至是始折杖又徒流皆背受笞杖者皆臀受也孫奭律音又曰舊制應决杖笞者皆依數决之宋朝建隆四年始有折杖之制杖制又曰舊制杖皆削節目常行杖大頭二分七釐小頭一分七釐笞杖大頭二分小頭一分半皆長三尺五寸建隆四年張昭等定常行杖昭請官杖長三尺五寸大頭闊不過二寸厚及小頭徑不過九分小杖長四尺五寸大頭徑六分小頭徑五分今官府常用者是此葢其始也桎梏山海經曰貳負之臣曰危與貳負煞窫窳帝乃桎之於疏屬之山桎其右足又曰大荒之中有宋山有木名楓蚩尤所棄桎梏也盖此械已出黄帝時今枷錮即其遺事耳枷重宋朝㑹要曰淳化二年九月勅所置枷徒流罪重二十斤死重二十五斤葢舊制有長短而無斤重則枷之有等重自}
