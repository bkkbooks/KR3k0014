  - {type: variant, offset: 4936, length: 2757, content: 十七月豈有三十六月之文禫又七月也應氏既失之於前而近代學者因循謬說未之思也含襚凡始死以珠玉實口中曰含以衣衾贈死者曰襚襚即今俗謂搭衣架是也穀梁曰貝玉曰含衣衾曰襚後漢趙咨遺書曰周室制兼二代重以殯葬之期衣衾稱襲衣之數然則禭周制也禮曰商王綴重三禮圖云以飯含餘粥盛之以鬲名曰重然則含商制也周人加以珠玉爾面帛今人死以方帛覆面者呂氏春秋曰夫差誅子胥數年越報吳踐其國夫差將死曰死者如其有知也吾何面目以見子胥於地下乃為冪以冒面而死此其始也風俗通曰吳王羞見子胥以帛幕面而死故後人因之制面衣說苑亦曰越襲吳吳王將死曰吾不用子胥之言至於此死者有知吾何面以見子胥也遂蒙絮覆面而死明衣三代以來襲有明衣唐改用生絹單衣今但新衣而已段成式酉陽雜俎曰明衣起於左伯桃也糧罌今喪家棺斂柩中必置糧罌者王肅喪服要記曰昔魯哀公祖載其父孔子問寧設五穀囊者公曰否也五穀囊者起自伯夷叔齊不食周粟而餓死恐其魂之饑也故設五穀囊吾父食味含哺而死何用此為又禮檀弓曰重生道也三禮圖曰重起於商代以飯含餘粥以鬲盛之名曰重設之於庭恐神依之以食今之糧罌即古重之遺意也棺槨禮檀弓曰有虞氏瓦棺鄭注云始不用薪也夏后氏堲周商之棺槨古史考曰舜作瓦棺禹作土堲作周棺湯作木槨以周土堲臣瓚曰商人作棺槨劉向曰棺槨之作自黃帝始後漢趙咨曰棺槨之造自黃帝始黃帝內傳曰帝斬蚩尤設棺槨易擊九事之八則曰古之葬者厚衣之以薪後世聖人易之以棺槨蓋取諸大過孔穎達疏云有虞瓦棺未必用木商以前槨無文按棺槨自商以後則夏已前未具也而易擊以為黃帝堯舜之事銘旌禮記曰銘明旌也以死者不可以別故以其旌識之後漢趙咨遺書曰古之葬者至商有加周室制兼二代表以旌名之儀則喪禮之有銘旌周制也喪服小記曰書銘自商始置非周禮也周官司常大喪共銘旌因商事爾士喪為銘各以其物書名於末曰某氏某之柩置於宇西階之上商以前皆書姓男名女字無書國者后亦不書氏至魏以為天下之號無所復別臣子故稱之以自別也桐人今喪葬家於壙中置桐人有仰視俯聽乃蒿里老人之類段成式酉陽雜俎云桐人起於虞鄉也明器禮檀弓曰孔子謂為明器者知喪道其曰明器神明之也塗車芻靈自古有之明器之道也謂為芻靈者善為俑者不仁不殆於用人乎哉為其像人而用之也鄭注云俑偶人有面目似生人孔子善古而非周周官冡人及葬言鸞車像人是像人之起始於周也今直以俑號明器云禮又曰夏后用明器謂竹不成用瓦不成味木不成斲琴瑟張而不平笙竽備而不和有鐘罄而無簨簴也以俑為明器誤矣寓錢今楮鏹也唐書王嶼傳曰玄宗時嶼為祠祭使專以祠解中帝意有所禳祓大抵類巫覡漢以來葬者昏有瘞錢後世里俗稍以紙寓錢為鬼事至是嶼乃用之則是喪祭之焚紙錢起於漢世之瘞錢也其禱神而用寓錢則自王嶼始耳今巫家有焚奏禳謝之事亦自此也注云漢葬者有昏寓錢謂昏晚埋錢於壙中為死者之用至唐王嶼乃於喪祭焚紙錢以代之也翣人之所持以蔽喪車前後以為飾者今挽郎所執是也禮記檀弓曰周人牆置翣世本曰武王作古史考曰周公作翣起於周也挽歌譙周法訓曰挽歌起自田橫通典曰漢高帝時齊王田橫自殺故吏不敢哭泣但隨柩敘哀後代相承以為挽歌按漢初橫死門人為薤露蒿里之歌蓋從者以寄哀耳武帝時李延年分為二薤露送王公貴人蒿里送大夫庶士蓋二歌之起始自橫也摯虞新禮議曰挽歌出於漢武帝役人勞苦歌聲哀切遂以送終非古制者誤矣左傳哀公十一年會吳伐齊將戰公孫夏命其徒歌虞殯杜預注云送葬歌曲哀死也孔穎達疏曰虞殯謂啟殯將虞之歌今謂之挽歌莊子曰紼謳於所生必於斥苦司馬彪注曰紼引柩索謳挽歌斥疏緩苦急促言引紼謳者為用人力以挽柩者所歌故曰挽歌馮鑑謂起於虞殯也然則其周人之制乎方相軒轅本紀曰帝周游時元妃嫘祖死於道令次妃姆嫫監護因置方相亦曰防喪此蓋其始也俗號險道神抑由此故爾周禮有方相氏狂夫四夫大喪先匶及墓入壙以戈擊四隅敺方良故葬家以方相先馳魌頭宋朝喪葬令有方相魌頭之別皆是其品所當用而世以四目為方相兩目為魌頭按漢世逐疫用魌頭亦周禮方相之比也方相氏蒙熊皮黃金四目以索室敺疫鄭注云如今魌頭是也疑自漢始云然荀子有仲尼之面如蒙倛則戰國已為是名碑碣管子曰無懷氏封泰山刻石紀功秦漢以來始謂刻石曰碑蓋因喪禮豐碑之制也刻石當以無懷為始而名為自秦漢也陸龜蒙叢目書曰碑悲也古者懸而窆用木書之以表其功德因留之不忍去碑之名由是而得自秦漢以降生有功德政事者亦碑之而又易之以石失其稱矣此又德政有碑之起也陸法言廣韻曰碑碣李斯造疑始於嶧山之刻爾釋名曰本葬時所設臣子追述君父之功以載其上也神道碑古之葬有豐碑以定秦漢以來死有功業生有德政者皆碑之稍改用石因總謂之碑晉宋之世始又有神道碑天子及諸侯皆有之其刻文止曰某帝或某官神道之碑今世尚有宋文帝神道碑墨本也其初由立之於葬兆之東南地理家言以東南為神道故以名碑爾按後漢中山簡王薨詔大為修冡塋開神道注云墓前開道建石柱以為標謂之神道是則神道之名在漢已有之也晉宋之後易以碑刻云葬埋孟子曰上世嘗有不葬其親者其親死則舉而委之於壑他日過之狐貍食之蠅蚋姑嘬之其顙有泚睨而不視蓋歸反虆梩而掩之則葬埋之禮疑自此起也炎帝之前始厚衣之以薪葬之中野不封不樹也果按虆士籠也梩土轝也封土為壟曰墳古人不為墳也不種樹也合葬禮記曰檀弓云季武子曰合葬非古也自周公以來未之有改又云舜葬蒼梧之野蓋三妃未之從也注謂古不合葬又季武子曰周公蓋祔注云祔謂合葬合葬自周公以來是則周公初制此禮也故周桓王之詩曰死則同穴冡墓黃帝內傳云帝斬蚩尤因置冡墓然諸小說家往往記伏犧女媧之冡疑後人增築云墓誌炙轂子曰齊王儉云石誌不出禮經起宋元嘉中顏延之為王球作墓誌以其無名誄故以紀行自此遂相祖習然魏侍中繆襲改葬父母制墓下埋文將以陵谷遷變欲使人有所聞知但記姓名歷官祖父姻媾而已有德業則為銘文又隋代釀家於王戎墓得銘云晉司徒安豐元公王君之銘有數百字則魏晉已有其事不起於宋也馮鑑續事始云按西京雜記前漢杜子春臨終作文命刻石埋於墓前恐墓誌因此始也承謂昔吳季札之喪孔子銘其墓曰鳴呼有吳延陵季子之墓莊子衛靈公葬沙丘掘得石槨銘曰不馮其子靈公奪而埋之唐開元時人有耕地得比干墓誌刻其文以銅盤曰右林左泉後岡前道方世之寧茲焉是保漢滕公夏侯嬰得定葬石銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室則墓之有誌其來遠矣石羊虎炙轂子曰秦漢以來帝王陵寢有石麟辟邪兕馬之屬人臣墓有石人羊虎柱之類皆表飾墳壠如生前儀衛風俗通曰方相氏葬日入壙驅罔像罔像好食死人肝腦人臣不敢備方相乃立其像於墓側又罔像畏虎與柏故頂上栽柏路前立虎也盧思道西征記曰新城西有漢桂陽太守趙越墓有石柱東南有亭因石柱為名漢霍去病墓像祁連三立石人馬然則墓前之立石人柱羊虎之類皆起於漢也諡禮檀弓曰幼名冠字五十以伯仲死諡周道也大戴諡法曰周公旦太公望相嗣王作諡法抱朴子曰諡始於周史記秦始皇初并天下制曰太古有號無諡中古有號死而以行為諡婦人諡穆天子傳曰天子為盛姬諡曰哀淑人此疑婦人諡之起也后諡諡所以易名也事雖起於周而王后亦無其禮漢初高祖之母始有昭靈之號諸后皆因帝諡以為稱雖呂氏專政上官臨制亦無殊號東京明帝始建光烈之名後漢皇后紀論云爾按漢高祖五, WYG: ''}
