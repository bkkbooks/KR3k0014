  - {type: variant, offset: 13585, length: 0, content: '', WYG: 立於塜墓之前以記其識也書函呉張温使蜀謂先主曰謹奉所賫函書書之有函不前見疑自漢有也土龍淮南子曰土龍致雨許慎注云湯遭旱作土龍山海經曰應龍殺蚩尤及夸父不得復上故數旱旱而作應龍之狀乃得雨注云今之土龍取此則是湯作土龍述黄帝之事童謡列子曰堯微服遊康衢聞童謡曰立我烝民莫匪爾極則童謡之起自堯時已然也樓羅幹事之稱也演義曰樓欖也羅綰也言}
