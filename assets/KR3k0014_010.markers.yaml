  - {type: variant, offset: 14044, length: 53, content: 之云雲梯墨子曰公輸般為雲梯之械左傳曰楚子使解揚登樓車文王之雅曰臨衝閑閑注云臨車即左氏所謂樓車也蓋雲梯矣當是, WYG: 女奚宜}
