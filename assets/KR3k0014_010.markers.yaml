  - {type: variant, offset: 14103, length: 2, content: 輸加, krp: 嘉話録曰波稜菜西國有僧將其子來韋絢云豈非頗陵國來語訛為波稜也唐㑹要曰尼波羅國獻波稜類紅藍實似蒺梨也胡荽博物志曰張騫使大夏得胡荽鄴中記曰石勒改曰香荽大蒜切韵曰張騫使西域得大蒜而還則自漢始有之也諸葛菜今所在有菜野生類蔓菁葉厚多岐差小子如蘿蔔復不光澤花四出而色紫人謂之諸葛亮菜劉禹錫嘉話曰諸葛所止令軍士種蔓菁何韋絢云莫不是取其纔出可生啗一也葉舒可煮食二也久居隨以滋長三也棄去不惜四也回則易㝷而採五也冬則有根可斸食六也此蔬其利不亦博乎禹錫曰信矣蜀人呼蔓菁為諸葛菜蘭香本名羅勒後趙石勒以羅勒犯己名改為蘭香至今以為名也苜蓿本自西域彼人以秣馬張騫使大夏得其種以歸與葡萄同種於離宫館傍極茂盛焉盖漢始至中國也牛尾蒿右丞相傳曰漢祖為兒時牧牛中野與羣童戲殺牛以烹之埋其尾偽報其家云牛忽陷地家人共引之其皮骨愈深入於地後其處生蒿作尾形也金錢花酉陽雜俎曰毗尸沙一名日中金錢花本出外國梁大同二年進來中土也牡丹隋煬帝世始傳牡丹唐人亦曰木芍藥開元時宫中及民間競尚之今品極多也一說武后冬月遊後苑花俱開而牡丹獨遲遂貶於洛陽故今言牡丹者以西洛為冠首劉公嘉話云世謂牡丹花近有盖以前朝文士集中無牡丹歌詩禹錫甞言楊子華有畫牡丹處極分眀子華北齊人則知牡丹花亦久矣酉陽雜俎曰前史中无說牡丹惟謝康樂集中言竹間水除多牡丹段成式檢隋種植法並不記說則知隋朝花中所無開元末裴士淹使幽冀至汾州衆香寺得白牡丹植於長興私第為都下寄賞至德中馬僕射又得紅紫二色者移於城内青瑣集有隋朝海山記中載牡丹品甚多而前賢所說如此一捻紅今牡丹中有一捻紅其花葉紅每一花葉端有深紅一㸃如半指眀皇時民有以此花上進者值妃子正作粧偶以粧指捻之臙脂之痕染焉植之眀年花開俱有其迹亦見明皇雜録也劉寄奴金瘡藥也昔宋武帝劉裕微時伐荻新洲射大蛇傷明日復徃聞杵臼聲見數青衣童𢷬藥問之答曰我主為劉寄奴所射今合藥付之帝曰王何神不殺之叱之皆散收得藥時人因此名其草曰劉寄奴也寄奴帝之小字何首烏本曰夜合藤昔有姓何人見其葉夜交異於餘草意其有靈採服其根老而不衰頭髮愈黒即因之名曰何首烏也亦曰即其人姓名羊負來博物志曰洛中有人驅羊入蜀胡枲子著羊毛蜀人種之曰羊負來故今人亦以名枲耳也陶𢎞景本草注曰昔中國無此言從外國逐羊毛中來因以名也麋銜本草曰麋春日遊牝既多即瘦瘠食此物乃復肥盛因即事名曰麋銜鹿活草酉陽雜俎曰天名精也昔青州劉􅖓宋元嘉中射鹿剖五藏以此草塞之踞然而起􅖓怪而拔草則復倒如此三度因宻録種之主傷折俗呼劉􅖓草亦曰鹿活異苑所載正同但以為鹿草也丁公藤南史解叔兼鴈門人母有疾夜於庭中稽顙祈告聞空中云得丁公藤治即差訪醫及本草無之至宜都山中見一老翁伐木云是丁公藤治風乃拜泣求得之及漬酒法受畢失翁所在母疾遂愈葢自是始傳丁公藤也本草謂之南藤葢本朝附之於經云威靈仙唐㑹要曰德宗貞元二年九月鄧思齊獻威靈仙草能愈衆疾上於禁中試有驗令編附本草史君子唐潘州郭史君多以此療兒得其效時人因其刺史所用治小兒故曰史君子本草曰俗傳始因潘州郭史君療小兒為是獨用此物後來醫家因號史君子訶子本出南海諸畨國胡人謂之訶梨勒後趙時避石勒名改曰訶子故今猶云然也山藥即本草所謂薯蕷者也唐避代宗嫌名故民間呼薯藥至宋朝嘉祐八年四月英宗即位人避嫌諱遂改曰山藥自此全失其本稱矣牽牛本草補注曰始出田野人牽牛易藥故以名之安石榴其生自西域漢武時博望侯窮河源回得其種遂傳中國也陸}
  - {type: variant, offset: 14106, length: 3, content: 巧爾續, WYG: 與弟書曰張騫為漢使外國十八年得塗林葢安石榴也博物志曰張騫使西域囘所得葡萄亦出於大夏葢與石榴同來中土漢書西域傳曰漢使歸葡萄苜蓿種來是也酉陽雜俎曰庾信謂魏使尉瑾曰在鄴大得葡萄竒有滋味瑾曰此物實出於大宛張騫所致有黄白黒三種西域釀以為酒在漢似亦不久杜陵田五十畆中有葡萄百樹橘奴後漢李衡好貨殖將死其妻憂貧衡曰吾洲上木奴可了千匹絹妻素不聞其有也曰此當謂橘耳衡向於洲上植橘千株故也後代縁有橘奴之語六帖曰李衡種甘橘千樹號千頭木奴也金桃唐㑹要曰貞觀九年十一月康國獻金桃詔令植於苑又云康國獻黄桃大如鵝卵其色如金亦曰金桃然則唐世始傳金桃也通典作康居云貞觀二十一年胡桃補注本草曰胡桃古今多言張騫自西域將來與苜蓿等物同至中華也博物志曰張騫使外國回乃得胡桃也晉劉陶母書胡桃本生西羌也萍藻淮南子曰海間生屈龍屈龍生容華容華生蔈蔈生萍藻萍藻生浮草凡根交者生於浮草許慎注云海閭浮草之先也酉陽雜俎作海間生屈龍屈龍生容華容華生蔈蔈生藻藻生浮草蟲魚禽獸部五十五𤣥駒古今注曰蟻名𤣥駒何也曰河内人並河見人馬數十萬皆如黍米動遊人以火燒之人皆蚉蚋馬皆大蟻今人名蚉蚋曰黍蟻曰𤣥駒宜自漢始也揚雄法言曰吾見𤣥駒之歩云一云元駒非也齊女又古今注牛亨問蟬名齊女者何也齊王后怨王而死尸變為蟬登庭樹嘒唳而鳴王悔恨故世名蟬曰齊女膾殘越王勾踐之保㑹稽也方斫魚為膾聞有吳兵棄其餘於江化而為魚猶作膾形故名膾殘亦曰王餘魚烏賊酉陽雜俎曰海人言昔秦王東遊棄筆袋於海化為此魚中猶有墨而作袋形古今注云一名河伯從事小吏嬾婦東海有之昔有婦惰女織姑責之恚恨自溺於海化為魚弱而多膏海人有得之者烹其膏以燃燈照紡績則暗而無光或以照管絃嬉戯則爛然矣酉陽雜俎云名奔䱐一名􅀈彭越似蟹而小世傳漢醢彭越以賜諸侯九江王英布獵得之不忍視盡以覆江中化而為此故名彭越啄木古今異傳曰啄木本雷公採藥吏為此鳥也逃河鵜鶘也本草曰身是水沫唯胷前兩塊肉如拳云昔為人竊肉入河化為此身今猶有肉因名逃河精衛山海經曰炎帝之女度海溺死其魄化為鳥為此常銜西山木石以填東海報其寃也杜宇蜀王本紀曰鼈靈死其屍逆江而流至蜀王杜宇以為相宇自以徳不及靈傳位而去其魄化為鳥因名此亦曰杜鵑即望帝也亦見杜甫李商隱詩盧永成都記曰蜀王杜宇稱望帝好稼穡治郫城死化為鳥曰杜鵑婆餅昔人有逺戍其婦山頭望之化為石其姑為餅將以為餉使其子偵之恐其焦不可食也往已無及矣因化此物但呼婆餅焦也今江淮所在有之野鷄即雉也自漢吕后稱制避其諱故也漢髙后紀注后諱雉之字野鷄顔師古曰吕后名雉字娥姁故臣下諱雉至唐髙宗諱治又帝小字雉奴故相承避至今也伯勞酉陽雜俎曰伯勞博勞也相傳伯竒所化右軍晉右將軍王羲之好鵝在㑹稽山隂道士養群鵝羲之每就玩之道士曰為冩黄庭經當以相贈羲之欣然冩畢籠鵝而去今人誤以鵝為右軍縁此故衞子世云衞靈公好乗驢車故世目驢為衞子或曰晉衞珍好乗驢為衞子也馬齒}
