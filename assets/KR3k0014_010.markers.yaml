  - {type: variant, offset: 13729, length: 226, content: 三覆以待之杜預注云覆伏兵也周公繇易言此疑亦三代之事爾火攻孫子之書有火攻故齊田單有火牛之事左傳桓公七年二月乙亥焚咸丘公羊曰樵之也樵之者以火攻也穀梁曰不言邾咸丘疾其以火攻也六帖云始火攻水攻國語智伯攻趙襄子決汾水灌晉陽城不沒者三版觀此二者非先王仁義之兵也蓋出於戰國吞并之世云京觀左傳楚子曰明王伐不敬取其鯨鯢而封之於是乎有京觀推此而言則是有征伐以來則有其事烽燧玄女戰經曰諸見舉烽火傳言虞虜且起黃帝出軍決亦有望見烽火之文周幽王為褒姒舉烽燧疑亦自初用兵即有之也營壘, WYG: 姬}
