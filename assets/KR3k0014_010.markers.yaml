  - {type: variant, offset: 13366, length: 1, content: 柝, WYG: 又景德四年五月河北提刑司勘事杖以下拒抗不招當枷問者未有定制請置枷重十五斤也梟首昔黄帝斬蚩尤懸首軍門此梟首之起也左傳曰叔孫昭子殺豎牛投其首寧風之棘上秦漢曰梟首始於黄帝之斬蚩尤顧野王玉篇曰梟首秦刑也今謂之簽首級贖世本曰夏作贖刑吕刑曰穆王訓夏贖刑則贖刑疑書名也按舜典曰金作贖刑注謂誤而入刑出金以贖則贖罪葢始於虞氏也錮身春秋左傳曰㑹於商任錮欒氏也則禁錮之事已見於春秋之時故漢末有黨錮今以盤枷錮其身謂之錮身葢出於此除名何法盛晉中興書曰胡毋崇為永康令多受貨賂除名為民此事不他見疑始於晉免官後漢梁崧為太僕作私書請託郡縣發覺免官按漢世三公有冊免則免官自漢始也胥吏附八條以吏為奉法者皆附於此堂後官宋朝㑹要曰堂吏自唐至五代率從京百司抽補開寳六年五月七日以武德縣尉姜宣義等充堂後官太祖知堂吏擅中書事權多為姦贓故令吏部選授堂吏用士人自此始也太平興國九年五月以將作監丞李元吉丁佐為堂後官京官任堂吏自此始也十二月以王渾綦佩為賛善充職朝官之任堂吏自此始也神宗元豐五年行官制除堂後官之名於門下省中書省置録事而已通典曰唐武德中始於諸州調左吏遂促年限優以次序有至上縣尉者主書通典曰晉中書有主書之員齊為主書令史陳去令史之名北齊初曰主書令史文宣帝甞立遣主書令史題署嫌其遲語曰但著主書何煩令史字自此除之也主事又曰主事二漢有之漢光祿勲有南北庭主事范遷光祿主事是也後魏于尚書諸司置主事令史隋煬帝去令史名但曰主事随曹閑劇每十令史置一主事雜用士人唐用流外都事又曰尚書有都令史隋皇初改為都事令史又曰令史漢官也漢官儀曰能通倉頡史籀篇補蘭臺令史漢韋彪疏曰往時楚獄大起故署令史以助郎職事也按史記項羽本紀曰陳嬰者故東陽令史則是秦有令史矣晉灼曰漢儀注令史曰令史丞吏曰丞史而周禮六官之屬皆有史以掌書書令史又曰晉宋蘭臺寺有正書令史北齊尚書郎判事正令史側坐書令史過事此葢令史之始也教練唐㑹要曰大中六年五月𠡠天下軍府有兵馬處且選㑹兵法能弓馬人充教練使宋巨眀皇二年蜀記曰天寳十五載正月十日楊國忠選監牧小兒於苑中教習請劍南舊將李福德劉光庭為教練使教練之目當由此出也鎮將通典曰鎮將後周之通班隋亦置其職微矣注云今以其卑賤故舉隋而已合謂唐也五代以來皆諸郡所自置宋朝始有宣授宋朝㑹要曰太平興國三年詔藩侯不得差親随為鎮將自此皆用本州牙吏為之亦有宣補者是也布帛雜事部五十三布帛禮運曰昔先王食鳥獸之肉茹其毛未有絲麻衣其羽皮後聖有作然后治其絲麻以為布帛漢王逸機賦曰帝軒龍躍桑葉是創仰攬三光悟彼織女爰制布帛}
