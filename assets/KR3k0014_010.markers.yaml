  - {type: variant, offset: 13441, length: 1, content: 孫, WYG: 元濟王承宗拒命經費盡竭皇甫鏄建議内外用錢每緡墊二十民間墊陌至七十穆宗即位糴米鹽每陌錢墊七八所在用錢墊不一詔從風俗所宜則蹺之起自唐皇甫鏄也今俗謂眀除者為蹺暗蹺者為墊甲跡今開元通寳錢縵上有文如初月者譚賔録曰}
