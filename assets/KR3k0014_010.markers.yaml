  - {type: variant, offset: 13437, length: 1, content: 齊, WYG: 立九府圜法始名以錢錢圓含方輕重以銖起於禹湯水旱之救民困也後魏髙謙之以為堯遭大水鑄錢故鴻鑑謂錢起於堯也金玊}
  - {type: variant, offset: 13437, length: 1, content: 齊, krp: 立九府圜法始名以錢錢圓含方輕重以銖起於禹湯水旱之救民困也後魏髙謙之以為堯遭大水鑄錢故鴻鑑謂錢起於堯也金玊}
  - {type: variant, offset: 13439, length: 1, content: 仲, WYG: 子又曰玉起於禹代金起於江漢珠起於赤野大錢國語周景王時患錢輕更鑄大錢韋昭注云徑一寸二分重十二銖文曰寳貨以勸農贍不足也而百姓䝉利後世權一時之用亦或行之事已輙罷盖大錢肇於周景王也鐵錢通典曰王莽改革漢錢百姓皆不便之公孫述廢銅錢置鐵官鑄鐵錢則以鐵為錢始於公孫述之據蜀也皇甫士安髙士傳曰史弼迎送郭泰也輙再屈首泰一揖而去門人問之弼曰鐵錢曰故以二當一爾此漢末事也今鐵錢止行於川陜而二當銅錢之一自爾時已然也錢文錢貨之典尚矣周自太公立九府圜法其文無見景王鑄大錢班固云文曰寳貨秦漢則半兩五銖王莽則貨泉貨布後魏孝文太和十九年公鑄粗偹文曰太和五銖又孝莊用楊福計永安二年福更鑄又曰永安五銖自是始以年號鑄於錢文唐㑹要曰武德四年七月十日廢五銖錢行開元通寳錢自此又以通元為文髙宗乾封中則曰乾封泉寳肅宗乾元時則曰乾元重寳五代㑹要曰晉天福三年十一月詔鑄錢以天福元寳為文及偽蜀之制有光天咸康通正天漢乾徳之號皆曰元寳至於宋朝每改元又更鑄其號於錢文矣盖錢文之以年自後魏孝文太和始也以寳者自周景王大錢始也以通者自唐髙祖武德始也以重者自肅宗乾元始也以元者自晉髙祖天福始也錢陌自古用錢貫皆以千百皆以足梁武帝時自破嶺以東八十為陌名東錢江郢以上七十名西錢京師九十名長錢大同元年詔通用足而人不從錢陌益少末年遂以三十五為陌錢以八十為陌葢自梁始也其事見通典唐昭宗時京師用錢八百五十為貫河南府以八百為貫筆談曰漢隠帝時三司使王章每出官錢以七十七為陌謂之省陌葢自五代漢始也兌便唐食貨志曰憲宗時商賈至京師委錢諸道富家以輕裝趍四方合劵乃取之號飛錢京師尹裴武禁之盧坦請許商人於三司飛錢毎十増給百令大府給公據次以字號兌便如盧坦請曰鈔錢葢唐飛錢之舊也起於憲宗之世蹺墊又曰憲宗朝}
