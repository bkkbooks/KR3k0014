  - {type: variant, offset: 14205, length: 383, content: 始曰諸葛亮圍郝昭於陳倉亮起衝車昭以繩連石磨四角擊其衝車車折即礮事矣而唐書李密傳密使田戍造廣雲旝三百具以機發石為攻城械號將軍礮戎車古司馬法曰戎車夏曰鉤車商曰寅車周曰元戎則戎車出於夏后之前至夏始名也戰舟墨子曰公輸般自魯之楚為舟戰之具謂之鉤拒此戰舟之始也太白陰經曰水戰之具始於伍員製之以船為車以櫓為馬云戍邊紂之時西患昆夷北難玁狁文王以紂命遣戍役以守衛中國采薇所歌是也其事起於商辛失道之世出軍筆談曰宋朝太祖制禁軍更戍之法欲其習山川勞苦遠妻拏懷土之戀兼外戍之日多在營之日少人人少子而衣食易足以禁軍出軍之始也又京師衛兵請糧者營在城東即令就西倉在城西即就城東倉仍不許僦車腳皆須自負以使之盡力制其驕惰故士卒衣食無外慕安辛苦而見使也避僧蘇氏演義曰鄴洛記云北齊忌黑文宣帝殺第七弟上黨王渙以七者漆也屬黑又僧衣多黑而出師決勝之辰多所避忌北齊始也今行軍出師之日忌見僧尼者始自北齊之所忌黑也云爾, WYG: 物紀原卷十}
