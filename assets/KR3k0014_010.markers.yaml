  - {type: variant, offset: 13356, length: 0, content: '', krp: 至是試頗精練遂立是軍也忠勇咸平五年四月馬知節言州兵有不從王均為亂殺賊者賜名忠勇升為禁軍而月給依舊請選留材勇者餘復退為州兵帝曰既稱忠順安可斥退令増給如禁軍例崇武太平興國八年三月改濮州平海指揮曰崇武振武咸平五年五月命使臣分往邠寧等十一州於保安保敬軍内選有力者一萬人升為禁軍號振武景德元年七月簡集成四十指揮也神銳咸平六年四月以河東州兵為神銳神虎指揮先此自京師發禁旅戍河東數不足則取州兵材勇者補之十不得二三又弗整於是命張延禧料簡得三十人立為此軍令常教習忠敢景德四年十月三十日詔象州澄海指揮名曰忠敢以城守之功也大中祥符九年九月詔廣南東西荆湖南路選兵合澄海名曰忠敢分三指揮以備蠻冦奉先大中祥符四年五月真宗宣示永安指揮以奉諸陵軍額猶𨽻西京本城廂軍可賜名奉先升為禁軍寧朔祥符四年九月宣示咸平中朕因揀閱諸州招到兵士為有人材堪充馬軍者置寧朔指揮清衞祥符八年置左右清衞二指揮以奉宫觀從修玉清昭應宫司之請也十二月景靈宫㑹靈觀募置到廂軍記立為清衞左右第二指揮寧海又八年三月詔名瓊州蠻蜑指揮曰寧海定功九年九月秦州曹瑋請選}
  - {type: variant, offset: 13358, length: 0, content: '', WYG: 堪充床子弩手者詔立為秦州定功指揮崇節天禧元年四月杭州言本城老浙兵指揮乞别立軍額詔以崇節為名建威又五月曹瑋言准詔於本城諸軍揀到秦州鄉土}
