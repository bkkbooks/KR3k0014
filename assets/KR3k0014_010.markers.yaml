  - {type: variant, offset: 4807, length: 128, content: 漢文帝酌變禮之宜創易月之制按前漢書文帝紀後元七年六月遺詔曰其令天下吏民令到三日釋服殿中當臨者皆以旦夕各十五舉音服大紅十五日小紅十四日纖七日釋服應劭曰凡三十六日而釋服此以日易月也顏師古曰紅與功同此喪制者文帝自率己意創為之非有取於周禮也何以日易月乎三年之喪其實, WYG: 乾德}
