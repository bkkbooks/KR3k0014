  - {type: variant, offset: 13426, length: 1, content: 黃, WYG: 蜀記也蜀自秦昭王時始通中國而三代已有錦見於禮多矣王嘉所記為近之繡事始曰錦繡西施造非也虞書舜命禹曰予觀古人之象日月星辰山龍華蟲作㑹宗彞藻火粉米黼黻絺繡以五采彰施于五色作服汝眀正義云舜令禹制繡以五種之彩眀施于五色制作衣服則}
