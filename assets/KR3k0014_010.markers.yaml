  - {type: variant, offset: 2823, length: 813, content: 世俗每至清明以麥成秫以杏酪煮為薑粥俟其凝冷裁作薄葉沃以餳若蜜而食之謂之麥餻此即其起也玉燭寶典曰今人研杏仁為酪以煮麥粥以餳沃之即此也粽一名角黍風土記曰仲夏端午端初也以菰葉裹黏米以栗棗灰汁煮之令熟節日啖取陰陽尚包裹之象一曰因屈原也齊諧記曰原以五月五日投汨羅楚人哀之每至此日以筒貯米祭今市俗置米於新竹筒中蒸食之謂之裝筒其遺事亦曰筒稯齊諧又記曰今世人五月五日作粽汨羅之遺風也異苑曰粽屈原姊所作饅頭稗官小說云諸葛武侯之征孟獲人曰蠻地多邪術須禱於神假陰兵一以助之然蠻俗必殺人以其首祭之神則嚮之為出兵也武侯不從因雜用羊豕之肉而包之以麪象人頭以祠神亦嚮焉而為出兵後人由此為饅頭至晉盧諶祭法春祠用饅頭始列於祭祀之品而束晳餅賦亦有其說則饅頭疑自武侯始也餅晉束晳餅賦曰禮仲春天子食餻而朝事之籩煮麥為麵內則諸饌不說餅然則餅之作其來遠矣按漢書百宮表少府屬有易官主餅餌又宣帝微時每買餅所從買者輒大售說苑敘戰國事則餅蓋起於七國之時也胡餅續漢書曰靈帝好胡餅京師皆食胡餅胡餅之起疑自此始也然則餅有胡漢之異矣胡餅蓋今俗所為者是而漢餅疑是今餅也後趙石勒諱胡改為麻餅蒸餅秦漢逮今世所食初有餅胡餅蒸餅湯餅之四品惟蒸餅至晉何曾所食非作十字折則不下箸方一見於此以是推之當出自漢魏以來也湯餅魏晉之代世尚食湯餅今索餅是也語林有魏文帝與何晏熱湯餅即是其物出於漢魏之閒也不托束晳餅賦曰朝事之籩煮麥為麪則麪之名蓋自此而出也魏世食湯餅晉以來有不托之號意不托之作緣湯餅而務簡矣今訛為餺飥亦直曰麪也黃兒唐五行志曰黃巢未入京時都人以黃米及黑豆屑蒸食之謂之黃賊打黑賊唐都長安今自陝而西以黃米為粉團棗蒸之曰黃兒其蕎麥麪者曰黑兒蓋出於此也鹽豉廣雅曰苦李作豉廣志曰苦秦豉則豉自一物爾謝承後漢書羊續為南陽太守鹽豉共器三輔決錄曰南陽舊語曰前隊太守范仲公鹽豉蒜菓共一筒史記貨殖傳曰糵麴鹽豉千答蓋四物也今京俗謂豉曰鹽豉或因此云然晉世已為此名世說武子云千里蓴羹未下鹽豉藏冰周公遭變陳后稷先公致王業之艱難其詩曰, WYG: 驍捷建隆}
