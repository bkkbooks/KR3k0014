  - {type: variant, offset: 1268, length: 187, content: 此言廣明其前有黃帝廣之爾一云淮南子言伯余之初作衣絲麻索縷手經指絓蓋織之始也陶周書曰神農作陶尸子曰夏桀臣昆吾作陶呂氏春秋亦曰昆吾作陶高誘云昆吾高陽後吳回黎陸終之子為夏伯制作陶冶埏埴為器也然黃帝時有甯封人為陶正則陶始於炎帝明矣冶古史考曰燧人鑄金作刀金即冶也而周書以謂神農作冶尸子以謂造冶者蚩尤也按禮曰昔先王未有火化後聖修火之利範金合土此冶之始也蓋始於鑽木造火之後漁尸子曰燧人之世, WYG: 是募}
