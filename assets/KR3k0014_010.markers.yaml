  - {type: variant, offset: 13457, length: 3, content: 戰爭呂, WYG: 然則法燭之起自劉安始也針禮記内則有紉針請縫之事由此考之當是自始制衣裳則宜有針線矣帝王世紀曰太昊制九針由此始繩易曰上古結繩而治書序曰伏羲造書契以代結繩之政則是繩出於太昊之前髙氏小史曰燧人氏時結繩刻木以記事則繩自燧人氏始也沐浴世本曰秦穆公作沐吕}
