  - {type: variant, offset: 13428, length: 1, content: 其, WYG: 舜始為繡也纈事始曰夾纈徹子造二儀實録曰秦漢間有之不知何人造陳梁間貴賤通服之潘氏紀聞譚曰唐代宗寳應二年吳皇后將合祔肅宗陵啓舊堂衣服繒綵如撮染成花鳥之狀𤣥宗栁婕妤妹適趙氏性巧因使工鏤板為雜花打為夾纈初獻皇后一匹代宗賞之勑宫中依様製造當時甚祕}
  - {type: page-break, offset: 13428, content: '', id: KR3k0014_WYG_010-25b, image: WYG0920/WYG0920-0279d.png}
  - {type: variant, offset: 13428, length: 1, content: 其, krp: 舜始為繡也纈事始曰夾纈徹子造二儀實録曰秦漢間有之不知何人造陳梁間貴賤通服之潘氏紀聞譚曰唐代宗寳應二年吳皇后將合祔肅宗陵啓舊堂衣服繒綵如撮染成花鳥之狀𤣥宗栁婕妤妹適趙氏性巧因使工鏤板為雜花打為夾纈初獻皇后一匹代宗賞之勑宫中依様製造當時甚祕}
  - {type: variant, offset: 13430, length: 4, content: 得其傳者, WYG: 漸出徧天下此似始為夾纈之制也錢管子又曰湯七年旱禹五年水湯以莊山禹以歴山之金並鑄幣以救人困至}
