  - {type: variant, offset: 1471, length: 523, content: 王天下結繩而為網罟以佃以漁蓋取諸離然則自太昊始也釣易稱太昊以佃以漁然釣以漁事蓋易以結網而漁為包犧作則尸子所云燧人教人以漁其釣之為漁當為此乎獵尸子曰伏犧之世天下多獸教人以獵易繫辭亦言包犧氏以佃以漁則獵始於太昊也羅世本曰包犧臣句芒作羅羅鳥罟也網古史考曰伏犧氏觀蒙面而作網世本曰句芒作易繫辭曰包犧結繩為網罟抱朴子曰太昊師蜘蛛而結網網魚罟也孟詵錦帶前書伏犧始為網罟高氏小史曰太昊作罟網以取禽獸五穀周書曰神農之時天雨粟是則初有五穀之始也高氏小史云炎帝種五穀故謂之神農穀食賈誼雜說曰神農嘗百草之實教民食穀藝文類聚曰神農時民始食穀加於燒石之上而食醴酪古史考曰古有醴酪禮運曰昔先王未有火化後聖有作然後修火之利以為醴酪注云烝釀之也酪酢胾蓋其物出自燧人作火之後爾酒酒經曰空桑穢飯醞以稷麥以成醇醪此酒之始也呂氏春秋曰狄儀作酒醪變五味戰國策曰狄儀帝女造酒進之於禹甘之遂疏狄儀古史考亦曰狄儀造酒博物志曰杜康造酒魏武帝詩曰何以解我憂惟有杜康酒玉篇曰酒杜康所作陶潛集述酒詩序曰狄儀造酒杜康潤色之而黃帝內傳王母會帝於嵩山飲帝以護神養氣金液流暉之酒又有延洪壽光之酒然黃帝時已有其物但不知杜康何世人而古今多言其始造酒也一曰少康作秫酒蠟茶楊文公談苑云蠟茶出建州陸羽茶經尚未知之但言福建, WYG: 員御龍}
