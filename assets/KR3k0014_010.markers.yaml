  - {type: variant, offset: 3637, length: 1134, content: 之日鑿冰冲冲三之日納於凌陰周禮凌人掌冰正歲十二月令斬冰三其凌注云凌冰室也三之者為消釋度也春秋左氏傳昭公四年申豐曰日在北陸而藏冰西陸朝覿而出之其藏之也黑牡秬黍以享司寒注黑牡黑牲也嫁娶通典曰遂皇氏有婦注云人皇是也伏犧氏制嫁娶以儷皮為禮帝王世紀曰包犧氏都陳制嫁娶之禮王子年拾遺記曰包犧始嫁娶以修人道撒豆穀漢世京房之女適翼奉子奉擇日迎之房以其日不吉以三煞在門故也三煞者謂青羊烏雞青牛之神也凡是三者在門新人不得入犯之損尊長及無子奉以謂不然婦將至門但以穀豆與草禳之則三煞自避新人可入也自是以來凡嫁娶者皆置草於門閫內下車則撒穀豆既至蹙草於側而入今以為故事也跨馬鞍蘇氏演義曰唐歷云國初以婚姻之禮皆胡虜之法也謂坐女於馬鞍之側此胡人尚乘鞍馬之義也酉陽雜記曰今士大夫家婚禮新婦乘馬鞍悉北朝之餘風也今娶婦家新人入門跨馬鞍此蓋其始也東床晉書王羲之傳曰羲之與王承王悅為王氏三少郗鑒使門生求女壻於王導導令就東廂徧觀子弟門生歸謂鑒曰王氏諸少並佳然聞信至咸自矜持惟一人坦腹食獨若不聞鑒曰此正佳壻也訪之乃羲之也遂以女妻之由是呼女壻為東床五姓蘇氏演義曰五音之配五姓郭璞以收舌之音為宮姓以至齶上之音為徵姓以脣音為羽姓以舌著齒外之音為商姓以胸中之音為角姓又青囊經云城寨屋宅之地亦以五姓配五行然則五姓之起自郭璞始也前漢王莽傅卜者王況謂李焉曰漢當復興君姓李李者徵徵火也當為漢輔按此五姓之說自漢已有之云媒鄭康成曰媒之言謀也謀合異類使和成者凡嫁娶之道必由媒妁自太昊制昏禮則判合之義當有所由便應有媒矣至周始置媒氏之官掌萬民之判也婦人拜禮曰男拜則尚左手女拜則尚右手又居喪之禮男拜稽顙女子則俯是古者男女之拜一也古詩曰長跽故夫前五言之作自漢李陵推此則由漢而來其拜猶同耳孫甫唐書云唐武后欲尊婦人始易今拜是則女屈膝而拜始於唐武后也主改適唐書公主傳宣宗女萬壽公主下嫁之後遂詔公主有子而寡不得復嫁宋朝之公主薨其夫亦不得復娶也喪紀上古親死葬之中野而喪期無數至虞舜二十有八載放勳徂落百姓如喪考妣三載四海遏密八音則三年之喪自堯舜始也三代同之故孟子曰三年之喪齊衰之服三代共之淮南子齊倍訓曰武王伐紂載尸而行海內未定故不為三年之喪許慎注云三年之喪始於成王喪服通曲曰喪期無數謂黃帝時心喪終身也三載遏密八音唐虞雖行心喪更三年為限三王乃制喪服則衰絰之起自三代始也五服許慎注淮南子曰三月之服夏后氏之禮又云五縗之服謂三年朞九月五月三月服也然則五服之等蓋原於夏備於商周其事具在於三禮之所記云耳母服三代之制父在為母服齊衰朞唐武后始請同父三年按盧履冰言上元中父在為母三年后雖請未用也逮垂拱始行之則父在之服母三年自唐垂拱中始也慈母服淮南子曰魯昭公有慈母而愛之死為之練冠故有慈母之服注云父所命己者禮記曰練冠而喪慈母自魯公始也故今五服敕有慈母服易月五代會要曰後唐同光三, WYG: ''}
