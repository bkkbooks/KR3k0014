  - {type: variant, offset: 642, length: 300, content: 曰鋤類爾雅釋器斫斸謂之定李巡曰鋤也廣雅曰鋤謂之耨然則耨即鋤矣鎌說苑曰孔子聞吾丘子振鎌帶而哭然則三代之田器也碓桓譚新論曰伏犧制杵臼之利後世加巧因借身踐碓而利十倍則碓蓋起於杵臼之遺法也磑世本曰公輸般作磑今以礲穀首自山而東謂之磑江浙之閒或曰礲編木附泥為之所以破穀出米矣磨方言曰磑謂之䃀錯碓切說文曰䃺石磑也方言磑以䃀為磨則磨以磑而作也蓋起於公輸作磑之後䃺古磨字碾後魏書云崔亮在雍州讀杜預傳見其為八磨嘉其有濟時用遂教民為碾此疑碾之起也杵臼桓譚新論云伏犧制杵臼世本乃云雍父作舂杵臼呂氏春秋曰赤冀作杵臼皆非也黃帝內傳曰帝既斬蚩尤因刱杵臼易繫辭曰神農氏沒黃帝堯舜氏作斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過此疑杵臼, WYG: 指揮使}
