  - {type: variant, offset: 13452, length: 2, content: 書皆, WYG: 文通俗謂之開通元寳鄭䖍㑹粹云詢初進蠟様日文德皇后搯一甲跡故錢上有搯文熙寧中劉斧撰青瑣集則謂事由眀皇楊貴妃而天下謂之曰兒錢謬矣彼徒見錢文有開元字便謂眀皇開元事爾亦不攷實之過也火禮㑹文嘉曰燧人始鑚木取火炮生為熟令人無腹疾遂人之意故名燧人世本曰燧人鑚木造火尸子曰燧人上觀星辰下察五木以為火淮南子曰燧人望辰心鑚木生火拾遺記曰燧眀國有火樹名燧後世聖人至其國息其下有鴞啄燦然火出聖人感之用小杖鑚火號燧人氏河圖云伏羲禪於伯牛鑚木作火非也白虎通曰謂之燧人何鑚木燧以火遂人之始燈黄帝内傳曰王母授帝九華燈檠於是燈有檠則注膏油以為燈眀其前有也法燭漢淮南王招致方術之士延八公等撰鴻寳方畢方法燭是其一也餘非民所急故不}
