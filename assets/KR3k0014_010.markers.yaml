  - {type: variant, offset: 8533, length: 2375, content: 博陸之戲聲譜曰博陸采名也孔子曰不有博弈者乎莊子博塞以游彈碁西京雜記曰漢成帝好蹴鞠群臣以為勞體非至尊所宜帝曰朕好之可擇似而不勞者奏之劉向作彈碁以獻傅玄彈碁賦序曰漢成帝好蹴鞠勞人體非至尊所御因其體而作彈碁之戲起自漢代矣宋臨川王義慶著世說以為彈碁始自魏宮裝奩戲文帝於此伎特妙用手巾角以拂碁帝客又能低頭以葛冠巾角拂碁妙逾於帝西陽雜俎曰彈碁起自魏室裝奩戲也典論曰予於他戲弄少所喜唯彈碁略盡其巧京師有馬合鄉侯東方安世張公子恨不與數子對起於魏室明矣二說非也今世尚或有其法而為之者亦少投子續事始曰陳思王曹子建製雙陸置投子二唐末有葉子戲不知誰遂加至六按烏曹始置六博老子置摴蒱李氏資暇引蔡澤說范雎云博者欲大投裴駰注謂投投子乃投擲之義謂摴蒱五木然則蒱皆有投子耳故曹植所造從幺至六謂之投子取投擲義云嘉話錄曰太和已後博戲家謂重四為堂印言重四則投子猶二也六隻蓋起近代太和文宗時年號今按唐李賀州郃撰葉子格世有其書則六隻當自郃矣潘氏紀聞譚自投子以飾四朱者因明皇與貴妃采戰將北唯重四可轉敗為勝上擲而連呼叱之宛轉良久而成重四上大悅命高力士賜四緋也摴蒱博物志曰摴蒱老子入西戎所造或云胡亦以此卜也買鬼世傳唐武后初諫議大夫明崇儼能役鬼物其微時人嘗與博凡擲投子必使鬼物持其彩應呼而成隨其所欲也後人因此為買鬼之戲就中彩名其通天火通之類云亦當時所役之物名也象戲太平御覽曰象戲周武帝所造而行碁有日月星辰之目與今人所為殊不同唐牛僧孺撰元怪錄載唐寶應元年岑順於陝州呂氏兇宅夜聞鼙鼓之聲介冑人報曰金象將夜警也寤見鐵騎長數寸進曰天馬斜飛度三疆上將橫行擊四方輜車直入無迴翔六甲次第不乖行乃有一馬斜去三尺止又一步卒橫出一尺後車進已而於見處掘之即古冡也前有金象局列馬滿枰其辭與勢正今世所為者是則此戲於此古冡初定時已與周武帝所造不同而同名象戲也說苑雍門周謂孟嘗君足下燕則鬭象碁亦戰國之事乎故今人亦曰象碁蓋戰國用兵爭強故時人用戰爭之象為碁勢也彩選彩選序曰唐之衰任官失序而廉恥路斷李賀州郃譏之恥當時職任用投子之數均班爵賞謂之彩選言其無實惟彩勝而已本朝劉蒙叟陳堯佐雖各有損益而大抵取法及趙明遠削唐雜任之門盡以今制專以進士為目時慶曆中也元豐末官制行朱昌國又以寄祿新格為名鬭雞列子有紀渻子為周宣王養鬭雞之事左傳述季郈之雞鬭季氏芥其羽郈氏為之金距推此則茲戲之始當出於周也鬭草宗懍荊楚歲時記曰競採百藥謂百草以蠲除毒氣故世有鬭草之戲鬭牛成都記曰李冰為蜀郡守有蛟暴入水戮之己為牛形約曰江神亦必牛形白帶者我也須臾有二牛鬭武士射其神斃蜀不復病水由是鬭牛之戲今世尚或有之蓋自秦世之始也戲場通典曰煬帝大業二年突厥染干來朝帝欲夸之追四方散樂大集東都自是每歲正月萬國來朝留至十五日於端門外列為戲場百官綵棚夾道從昏達旦以縱觀之宋朝至正歲上元闢端門起山樓露臺刺園列鈞容教坊樂及綵棚夾道令都人縱觀者此其始也角觗今相撲也漢武故事曰角觗昔六國時所造史記秦二世在甘泉宮作樂角觗注云戰國時增講武以為戲樂相誇角其材力以相觗鬭兩兩相當也漢武帝好之白居易六帖曰角觗之戲漢武始作相當角力也誤矣俳優列女傳曰夏桀既棄禮義求倡優侏儒而為奇偉之戲則優戲已見於夏后之末世晉獻公時有優施魯定公會齊侯於夾谷齊宮中之樂有俳優戲於前此蓋優戲之始也傀儡世傳傀儡起於漢高祖平城之圍用陳平計刻木為美人立之城上以詐冒頓閼氏後人因此為傀儡按前漢高紀七年注應劭曰平使畫工圖美女遣遺閼氏而無刻木事今按列子記周穆王時巧人有偃師者為木人能歌舞王與盛姬觀之舞既終木人瞬目以手招王左右王怒欲殺偃師偃師懼壞之皆丹墨膠漆之所為也此疑傀儡之始矣秦漢有魚龍曼衍之戲其事亦粗見唐李商隱宮辭曰不須看畫魚龍戲發遣君王怒偃師是以通典曰窟礧子亦曰魁礧作偶人以戲善歌舞審此知其偃師之遺事也一云本喪樂漢末始設之嘉會不知何以為喪樂風俗通曰漢靈帝時京師賓昏嘉會皆作魁礧梁散樂亦有之北齊後主高緯尤所好也顏氏家訓云古有禿人姓郭好諧謔今傀儡郭郎子是也百戲漢元帝纂要曰百戲起於秦漢曼衍之戲後乃有高絙吞刀履火尋橦等也一云都盧尋橦都盧山名其人善緣竿百戲舞輪通典曰梁有舞輪伎今之舞車輪者則是此戲自梁世始有之也高絙又曰梁有高絙伎云今戲繩者謂上索者是也亦踏索之事云非自梁始也又有弄椀諸伎後漢天子正旦受賀以大繩繫兩柱相去數丈兩倡女對舞行於繩上相逢比肩而不傾水戲典略曰魏明帝使博士馬鈞作水轉百戲巨獸魚龍曼延弄馬列騎備如漢西京故事今世皆傳其法蓋其始自馬鈞也影戲故老相承言影戲之原出於漢武帝李夫人之亡齊人少翁言能致其魂上念夫人無已迺使致之少翁夜為方帷張燈燭帝坐他帳自帷中望見之彷彿夫人像也蓋不得就視之由是世閒有影戲歷代舞所見宋朝仁宗時市人有能談三國事者或採其說加緣飾作影人始為魏吳蜀三分戰爭之像嗔拳江淮之俗每作諸戲必先設嗔拳笑面有諸行戲時嘗在故臘之末所作之人又多村夫初不知其所謂也按荊楚歲時記有諺語云臘鼓鳴春草生村人並細腰鼓戴胡公頭及作金剛力士以逐除今南方為此戲者必戴面如胡人狀作勇力之勢謂之嗔拳則知其為荊楚故俗舊矣合生唐書武平一傳曰中宗宴兩儀殿胡人襪子何懿倡合生歌言淺穢平一上書比來妖伎胡人於御座之前或言妃主情貌或列王公名質詠歌舞蹈號曰合生始自王公稍及閭巷即是合生之原起自唐中宗時也今人亦謂之唱題目吟叫嘉祐末仁宗上仙自帝即位至是殆五十年天下稔於豐樂不意邦國兇變之事而英宗諒陰不言能昭其功然四海方遏密故市井初有叫果子之戲其本蓋自至和嘉祐之閒叫紫蘇丸洎樂工杜人經十叫子始也京師凡賣一物必有聲韻其吟哦俱不同故市人採其聲調閒以詞章以為戲樂也今盛行於世又謂之吟叫也生花今京城有生花種植以戲者按前漢張騫傳漢遣趙破奴等破車師大宛以梨軒眩人獻於朝顏師古注云眩與幻同即今吞刀履火種瓜植樹屠人戮馬之術是也本自西域來由是言之種瓜植樹即生花之事也蓋自漢武時大宛所獻眩人始云打麥唐書武元衡之將遇害也京師童謠曰打麥三三三今俗兒戲有打麥鼓掌作打麥聲後必三拍之抑緣此也杵歌春秋左氏傳曰襄公十, WYG: 克寧指揮歸聖開寳}
