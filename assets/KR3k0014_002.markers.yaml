  - {type: variant, offset: 11140, length: 0, content: '', krp: 又風俗通曰按禮樂記箏筑身今箏形如瑟不知誰改傅子曰上圓象天下平象地中空凖六合絃柱十二擬十二月乃仁智之器阮瑀箏賦曰長六尺應律數晉陶融妻陳氏箏后䕫創制子野考成也琵琶風俗通曰琵琶近代樂家所作不知其始樂府雜録曰始自烏孫公主造馬上彈之王諐期終幕祠儀曰出于絃鼗傅𤣥琵琶賦序曰故老云漢遣烏孫公主嫁昆彌念其行道思慕使知音者裁箏筑空侯之聲作馬上之樂以方語目之曰琵琶釋名曰}
  - {type: variant, offset: 11143, length: 1, content: 魏, WYG: 胡中馬上所鼓石崇以謂昔公主嫁烏孫令琵琶馬上作樂以慰其思隋音樂志曰曲項琵琶出自西域非華夏舊器也事始云或云碎葉國所獻嵇琴杜摯賦序曰秦末人苦長城之役絃鼗而鼓之記以為琵琶之始按鼗如鼓而小有柄長尺餘然則繫絃于鼓首而屬之于柄末與琵琶極不彷彿其状則今嵇琴也是嵇琴為絃鼗遺象明矣唐禮樂志曰琵琶體圓修頸而小號秦漢子蓋絃鼗之遺製出于胡中傳為秦漢所作今人又號嵇琴為秦漢子通典亦云秦漢子本出胡中俗傳是漢制兼以秦制者蓋兼用秦漢之法而諸家皆記為琵琶之始何也或曰嵇琴嵇康所製故名嵇琴雖出于傳誦而理或然也簫通禮義纂曰伏犧作簫十六管事始云女媧造風俗通曰舜作竹簫其形參差以象鳳翼十管長尺二寸世本亦曰舜造長二尺隋音樂志曰簫十六管長二尺舜所造者也各不同而古今以為舜作篪世本曰蘇成公所造古史考謂成公善篪耳又曰暴辛公所造舊制一曰管不知辛公何代人然非舜前明矣舜時西王母獻管則辛公安得造也隋書音樂志曰篪長尺四寸八孔蘇公所作者也通厯曰帝嚳平共工之亂作鼗鼓控揭塤篪故樂記以為聖人作為徳音之音也觱篥説文曰乃羌人所吹屠觱以驚馬樂録曰笳管也何承天纂文曰羗胡樂器出于胡中其聲悲本名悲栗通典亦云或曰胡人吹之以驚中國馬後乃以笳為首以竹為管樂府雜録曰本龜兹國樂唐編鹵簿名為笳管用之雅樂以為雅管六竅則為鳳管令狐揆樂要曰篳栗出于胡中或云龜兹國也徐景山云本胡人牧馬截骨為筒用蘆貫首吹之以驚群馬因而為竅以成音律今胡部在管音前故世亦云頭管笛馬融長笛賦序曰此器起于近代本出羗中風俗通曰漢武時丘仲所造長尺四寸七孔京房曰丘仲工其事不言所造廣雅曰籥謂之笛有七孔而周官笙師教龡􅐟音滌藝文類聚有宋玉笛賦則笛前于丘仲逺矣隋書音樂志曰笛漢武帝時丘仲所作者也京房備五音有七孔以應七聲太平御覽曰黄帝使伶倫伐竹于昆溪斬而作笛吹之作鳳鳴筆談曰有雅笛有羗笛其形制所始舊説皆不同後漢馬融所賦長笛空洞無底剡其上孔五孔一出其背正似今尺八}
