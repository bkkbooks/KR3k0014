  - {type: variant, offset: 5, length: 2, content: 第一, WYG: 八勅三代而上王言有典謨訓誥誓命凡六等其總謂之書漢初定儀則四品其四曰戒勅今勅是也自此帝王命令始稱勅至唐顯慶中始云不經鳳閣鸞臺不得稱勅勅之名遂定于此黄勅唐髙宗上}
