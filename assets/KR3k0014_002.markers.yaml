  - {type: variant, offset: 11145, length: 1, content: 悝, WYG: 善為之注云七孔長一尺四寸此乃今横笛耳鼓吹部謂之横吹非融所賦者融賦云易京君明識音律故本四孔加以一君明所加孔後出是謂商聲五音畢沈約宋書亦云京房備其五音周禮笙師注杜子春云􅐟乃今時所吹五空竹􅐟以融約所謂論之則古􅐟不應有五孔子春之説亦未為然也三禮圖􅐟亦横設而五孔不知出何典據樂要曰笛自丘仲以七孔一尺四寸之長六帖曰笛本四孔京房加以一按馬融賦云近世雙笛從羌起羌人伐竹未及已龍鳴水中不見矣截竹吹之聲相似易京君明識音律故本四孔加以一君明所加孔後出是謂商聲五音畢籥禮記曰土鼓蕢桴葦籥伊耆氏之樂也注云伊耆古天子號則籥蓋伊耆氏所作也笳杜摯笳賦序曰昔伯陽避亂入戎懐土遂建斯樂一名長離舊録有其物不記所出本末云胡人卷蘆葉吹之故曰胡笳亦云李伯陽入西戎所造笙禮記明堂位曰女媧之笙簧簧笙中之簧也世本曰女媧作笙簧髙氏小史亦云曹植女媧贊曰造簧作笙隋音樂志曰笙竽並女媧之所作也竽世本曰隨作竽注云隨女媧之臣也通禮義纂曰漢武帝時丘仲作竽笙三十六管而韓子有齊宣王好吹竽之事則竽非丘仲所作明矣世本之説是壎又曰壎暴辛公所作宋均云周平王時諸侯}
