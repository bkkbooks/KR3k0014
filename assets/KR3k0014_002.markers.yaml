  - {type: 'tls:seg', offset: 40, content: '', id: KR3k0014_CHANT_002-1a.12}
  - {type: variant, offset: 40, length: 3, content: 形氣質, WYG: 魏國牋記始云啟末云謹啟晉宋以来與表俱用今止臣下以相往来也簡詩出車曰畏此簡書簡書者治行煞青作簡以書爾今人直用紙名曰簡以通慶吊問候之禮取簡書之義尺牘類也錦帶前書曰書版曰牘書竹曰簡書舜曰書用識哉春秋子家吊宣孟以書漢曰入牘陳遵所善是也故今曰書尺名雖見于有虞而實始于春秋題緘事始曰唐元和中李趙公權傾天下四方緘翰日至蒲路帥郤士美有珍獻趙公報書敘殷勤誤入振武封中振武阿跌光進知其誤還之公因命書吏凡有書題各籖官號以送之于今為式曰題緘也門狀又曰漢初未有紙書名于刺削木竹為之後代稍用名紙唐武帝時李徳裕貴盛百官以舊刺禮輕至是留}
