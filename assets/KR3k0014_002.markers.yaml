  - {type: 'tls:seg', offset: 29, content: '', id: KR3k0014_CHANT_002-1a.9}
  - {type: variant, offset: 29, length: 1, content: 形, WYG: 之令使四方聞之今言告身者謂己身受其告令也冊命漢儀四品一曰䇿書䇿簡也今冊命即是蓋始于漢書顧命曰丁卯命作冊書則漢縁周事也宣麻唐書百官志曰開元二十六年改翰林供奉為學士專掌内命凡拜免將相號令征伐皆用白麻則宣麻之始自明皇世也宣頭筆談曰宣頭所起按唐故事中書舍人職掌誥詔皆寫四本一為底一為宣謂出行耳未以名書也晚唐樞宻使自禁中受㫖出付中書即謂之宣中書承受録之于籍謂之宣底梁置崇政院專行宻命後唐復樞宻使以郭崇韜安重誨為之始分領政事不關中書直行下者謂之宣如中書之勑也是則宣頭之始出于晩唐而定于後唐也教漢制王侯及郡守長吏于所部其指令皆稱教取敬敷五教之義今猶皇后稱教㫖疑始于漢王侯長吏之稱教也表堯咨四嶽舜命九官並陳詞不假書翰則敷奏以言章表之義也漢乃有章表奏駮四等則表蓋漢制也蘇氏演義曰表者白也言以情㫖表白于外也按衣外為表論語必表而出之以披露于意雜事曰漢定禮儀則有四品上書太甲既立不明伊尹作書以戒此上書}
  - {type: page-break, offset: 29, content: '', id: KR3k0014_WYG_002-3a, image: WYG0920/WYG0920-0033c.png}
  - {type: page-break, offset: 29, content: '', id: KR3k0014_WYG_002-3b, image: WYG0920/WYG0920-0033d.png}
  - {type: page-break, offset: 29, content: '', id: KR3k0014_WYG_002-4a, image: WYG0920/WYG0920-0034a.png}
