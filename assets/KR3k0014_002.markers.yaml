  - {type: variant, offset: 11140, length: 0, content: '', WYG: 又風俗通曰按禮樂記箏筑身今箏形如瑟不知誰改傅子曰上圓象天下平象地中空凖六合絃柱十二擬十二月乃仁智之器阮瑀箏賦曰長六尺應律數晉陶融妻陳氏箏后䕫創制子野考成也琵琶風俗通曰琵琶近代樂家所作不知其始樂府雜録曰始自烏孫公主造馬上彈之王諐期終幕祠儀曰出于絃鼗傅𤣥琵琶賦序曰故老云漢遣烏孫公主嫁昆彌念其行道思慕使知音者裁箏筑空侯之聲作馬上之樂以方語目之曰琵琶釋名曰}
