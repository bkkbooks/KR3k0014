  - {type: variant, offset: 7891, length: 103, content: 元年又六國表云初更元年也檢自歷代人君即位為元年中閒無改元之制至秦惠王乃始有之漢興多因秦故故文帝因之亦有中元後元之改迄今以為常故改元之始由秦惠王也章衡編年通載曰魏惠王五十六年更為元年又曰以相王初改元稱一年太史, WYG: 廣徳}
