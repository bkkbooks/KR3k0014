  - {type: variant, offset: 2205, length: 0, content: '', WYG: 㑹要曰大中祥符七年正月真宗詣玉清昭應宫率天下臣庶奏吿上玉皇聖號真宗實録曰大中祥符七年九月上對侍臣曰自元符之降朕欲與天下臣庶同上玉皇聖號至天禧元年正月辛丑朔帝詣太初殿恭上玉皇大天帝聖號曰太上開天執符御厯含真體道玉皇大天帝惟是疑}
  - {type: page-break, offset: 2205, content: '', id: KR3k0014_WYG_002-25a, image: WYG0920/WYG0920-0044c.png}
  - {type: variant, offset: 2205, length: 0, content: '', krp: 㑹要曰大中祥符七年正月真宗詣玉清昭應宫率天下臣庶奏吿上玉皇聖號真宗實録曰大中祥符七年九月上對侍臣曰自元符之降朕欲與天下臣庶同上玉皇聖號至天禧元年正月辛丑朔帝詣太初殿恭上玉皇大天帝聖號曰太上開天執符御厯含真體道玉皇大天帝惟是疑}
  - {type: variant, offset: 2206, length: 0, content: '', WYG: 要所紀奏吿是八年事云章衡紀年通載曰大中祥符八年正月壬子朔上玉皇大帝號聖祖號御製靈遇記曰景徳初王中正遇司命真君傳藥金法上之四年十一月降劉承規之直舍五年始奉上徽號曰九天司命天尊真宗實録曰大中祥符五年十月十七日上夢景徳四年先降神人傳玉皇命云今汝祖趙有名此月二十四日降如唐真元事至日天尊降延恩殿閏十月己巳詔上九天司命保生天尊聖號曰聖祖上靈髙道九天司命保生天尊闕保生天尊曰東岳司命上卿佑聖真君初封禪畢詔上司命天尊之號至是以聖祖臨降名稱相類故改上焉天禧元年正月壬寅帝詣景靈宫天興殿恭上也然實録之記聖祖加號前後不同故備述二年中事云章衡紀年通載曰天禧元年辛丑朔上玉皇聖祖號寳冊聖母號宋朝㑹要曰天禧元年三月六日冊上聖祖母懿號曰元天大聖后先是大中祥符五年制加上聖祖母號俟兖州太極觀成擇日奉上至是詔王旦等行冊禮也採訪號筆談曰廬山太平觀乃九天採訪使者祠自唐開元中創建元豐二年道士陶智仙門人陳若拙發地銅錢有應元保運四字至四年有詔進號九天採訪使者為應元保運真君遣内侍廖維持御書殿額賜之乃與錢文同符黒煞號楊億談苑曰開寳中有神降于終南山進士張守真自言我天之尊神號黒煞將軍與真武天蓬等列為天之大將太宗即位築宫終南山隂太平興國六年封翊聖將軍翊聖傳曰建隆之初鳳翔府盩厔縣民張守真遊終南山聞空中有召之者曰吾髙天大聖玉帝輔臣授命衞時乗龍降世太宗遣王守節王龜從就終南山下築宫興國初詔封翊聖將軍真宗受元符封泰山後大中祥符七年詔加號曰翊聖保徳真君真武號宋朝㑹要曰天禧二年閏四月詔醴泉所立觀曰祥源六月詔加真武號曰真武靈應真君孔子封唐禮樂志曰明皇開元二十七年詔夫子稱先聖可諡曰文宣王遣三公持節冊命唐㑹要曰開元二十七年八月二十四日追諡孔子為文宣王其後嗣改封嗣文宣王二十七日命裴耀卿等就國子監冊命宋朝㑹要曰大中祥符元年詔追諡𤣥聖文宣王五年十二月改諡至聖避聖祖諱也孔子父宋朝㑹要曰大中祥符元年十一月二日勅叔梁紇宜追封齊國公顔氏追封魯國太夫人孔子妻又勅亓官氏追封鄆國夫人十哲封唐㑹要曰開元二十七年八月二十四日詔十哲並宜褒贈顔子亞聖須優其秩顔子封兖公閔子費侯等是也七十子又詔七十子並宜追贈曽參贈成伯顓孫師陳伯是也制曰十哲之外曽參之倫未有稱謂宜䟽五等之封俾與先聖咸膺盛禮周公封宋朝㑹}
