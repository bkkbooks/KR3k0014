  - {type: 'tls:seg', offset: 36, content: '', id: KR3k0014_CHANT_002-1a.11}
  - {type: variant, offset: 36, length: 1, content: 質, WYG: 言節下轂下二千石長吏言閤下父母言膝下通類相呼言足下閤下沈約宋書三公黄閤共事前史無文按禮士韠與天子同公侯大夫即異注謂三公與天子禮數相亞故黄其閤示謙不敢斥尊疑是漢制疑閤下之呼出自此矣故今呼三公曰閤下足下異苑曰介之推逃禄抱樹燒死文公拊木哀嗟伐而製屐每懐其功俯視其屐曰悲乎足下足下之稱當縁此爾史記戰國之士或上書時君或談説君前及相與論難多相斥曰足下蓋自七國相承至今也下官通典曰宋孝武帝多猜忌諸國吏人于本國君不得稱下官事在孝武孝建中本為王國避臣之稱而今人或以自謂也啟張璠漢記曰董卓呼三臺尚書以下自詣啟事然後得行此則啟事得名}
