  - {type: variant, offset: 5064, length: 2549, content: 皇帝故亦尊母曰皇太后也太皇漢因秦事母號皇太后故尊祖母曰太皇太后其禮雖始于漢要之自孝武始也按史記景帝二年四月壬午孝文太后崩高祖薄后也景帝之祖母爾時未號太皇武帝即位迎魯申公議明堂事司馬遷於儒林傳乃始稱太皇竇太后好老子言是太皇之號自漢武始明矣竇氏文帝后於武帝為祖母班固於景帝既立則以稱薄后然遷自武帝時人不應誤書也太妃魏以來諸王之母為太妃此蓋其始稱也司馬氏之晉帝母其嫡為皇太后所生為皇太妃晉書后妃傳章太妃周氏生哀帝拜貴人帝即位有司議位號詔崇為皇太妃其禮自晉哀帝始也宋朝真宗皇帝亦冊楊貴妃為皇太妃晉元帝所生母稱夏侯太妃四妃天官后妃四星其一為正嫡三為後宮故帝嚳取象于此立四妃而正嫡在其中然黃帝初有元妃嫘祖次妃嫫姆洎形魚氏方雷氏則是四妃之制自黃帝始矣三代有三夫人而無妃號漢有貴人魏始置妃此夫人號妃之始也唐初皇后而降有貴淑德賢是為四妃也貴妃宋孝武孝建三年初置貴妃位比相國又齊永明元年有司奏貴妃淑妃並加紫綬金章珮于闐玉淑妃魏明帝置淑妃齊永明中有司奏淑妃舊擬九棘以淑為溫恭之稱妃為亞后之名進同貴妃加比三司德妃隋煬帝置德妃北史后妃傳曰煬帝參詳典故自製美名有德妃為三夫人賢妃唐百官志內官有賢妃正一品注云因隋制有也而隋志及北史亦無其名當疑唐有國初置也續事始曰隋煬帝置德妃賢妃公主春秋公羊傳曰天子嫁女于諸侯至尊不自主婚必使同姓者主之謂之公主蓋周事也史記曰公叔相魏尚魏公主文侯時也蓋僭天子之女也春秋指掌碎玉曰天子嫁女秦漢以來使三公主之故呼公主也續事始曰自古至周天子之女未有封邑至周中葉使同姓諸侯主之始謂之公主也長主蔡邕曰漢帝女為公主姊妹為長公主職林曰漢制皇女皆封縣公主儀服同列侯其尊崇者加號長公主儀服同藩王前漢婁敬說高祖以長公主妻單于武帝女亦稱衛長公主此為長公主之始矣漢書昭帝紀後元二年二月戊辰帝即位鄂邑公主益邑為長公主即帝姊妹為長公主也建武十五年光武封武陽公主為長公主即尊崇之制云宋朝但帝姊妹乃封長公主太主漢武帝之始封太長公主號太主史記武帝本紀曰帝以衛長公主妻欒大自王侯將相已下皆遺獻之徐廣云武帝姑竇太后女也則太主之號亦自漢始明矣東方朔傳武帝姑館陶公主號竇太主縣主後漢帝女皆封縣公主或別為美名此疑縣主之始也其諸王女自為公主其父得自主婚故也隋唐以來雖諸王之女亦封郡縣但曰某郡縣主也主國漢以來公主所封皆為邑無封國者唐書公主傳亦自高祖謂同安公主而下亦無其事雖平陽昭公主有起兵參佐命之功不過死加鼓吹而已至睿宗女華婉以劉后所生始封代國爾後遂為常制云淑儀南史后妃傳敘曰晉武帝初置淑儀為九嬪視九卿唐百官志注云明皇開元中置六儀其一曰淑儀用晉事也國初亦省宋朝會要云真宗大中祥符六年正月二十一日又增置淑儀官也淑容南史又曰魏明帝泰始二年置淑容自後或置或否逮于國初亦省不置大中祥符中與淑儀同真宗增置也順儀隋內官有順儀北史后妃傳曰隋煬帝參詳典故置順儀為九嬪唐除之按唐百官志注曰明皇開元中置六儀四曰順儀國初亦不設真宗復置之與淑儀同時也順容隋九嬪有順容北史曰煬帝置宋朝會要真宗祥符中又增置順容之官婉儀北史后妃傳敘曰北齊文宣河清中置婉儀為八十一御女唐初亦無唐志注云明皇置六儀婉儀其四也至宋朝真宗復增置餘見婉容婉容宋朝會要曰大中祥符六年正月二十一日真宗增淑儀以下至婉容凡六官並從一品在昭儀之上昭儀漢元帝置昭儀封後代或省元魏置左右昭儀視大司馬北齊文宣時比丞相唐為九嬪也昭容漢孝武所置南朝亦或置之唐以為九嬪昭媛唐百官志注曰唐因隋制有之而隋志北史俱不載疑唐制也修儀魏明帝所置修儀隋煬帝以為九嬪修容魏文帝始置修容隋煬帝參祥典故復置之也修媛唐百官志注曰唐因隋制有修媛按隋志無之而北史后妃傳北齊文宣河清中置修媛為御女唐以為嬪疑唐采齊制也充儀隋有充儀為九嬪唐會要內職篇云自武德以來有其職也北史曰煬帝置充容漢典有充容則疑漢官也北史曰隋煬帝參詳典故著之於令也充媛唐志云唐因隋制有充媛隋書及北史隋后妃事皆無文疑亦唐置之也婕妤前漢有婕妤班馬皆見于傳南史后妃傳敘曰婕妤漢舊號蓋漢置官也隋煬帝以為世婦而為正二品通典曰漢武置婕妤視上卿比列侯貴人漢光武置貴人為三夫人曆代不常有宋朝真宗復置貴人也美人光武又置美人歷代多有之國初亦置之正四品也通典前漢內命婦有美人才人南史曰晉武帝采漢魏之制三夫人外有才人又云晉武所置而通典內命職漢有才人則疑漢置婦人封春秋左氏傳成公上晉敗齊師齊侯自徐關入見保者曰勉之齊師敗矣辟女子女子曰君免乎曰免銳司徒免乎曰免曰茍吾君與吾父免可若何齊侯以為有禮與之石窌此婦人得封之始也封夫人唐虞夏商公侯之妻尚無夫人之號由周克商列爵惟五于其封國皆稱君其妻皆為夫人其事雜見于詩禮雖皆命于天子亦無封冊之禮漢崔篆母師氏通經學百家之言王莽寵以殊禮賜號義成夫人則夫人之封自王莽始也蓋自魯昭公娶于吳為同姓夫人始不命于天子至莽乃加封號云太夫人前漢文帝紀七年十月令列侯太夫人無得擅徽稱如淳云列侯子復為列侯母稱太夫人蓋漢制也晉虞譚母亦拜武昌侯太夫人晉始加冊命國夫人宋鄱陽侯孟懷玉母拜國夫人洎隋高涼洗氏以功封譙國太夫人此夫人封國之始也見通典郡夫人通典曰隋高涼女子洗氏世為南越首領有功冊為高涼郡夫人既而冊譙國太夫人此夫人封郡之始也封君戰國時列國臣子有功者時皆封君秦孝公封公孫鞅為商君是也蓋未有婦人而封君者漢始有之疑取春秋小君之義爾郡君漢武帝尊王太后母臧兒為平原君平原漢郡此封郡君之始也縣君武帝又封太后微時金王孫家所生姊號修成君修成漢縣此封君之始也太君唐制四品妻為郡君五品為縣君其母邑號皆加太君封稱太此其始也尊號項峻始學篇曰天地立有天皇號曰天靈即帝王尊號之始也堯曰放勳舜曰重華禹曰文命或以謂三帝之號周列國或有之如楚郟敖祀東樓公莒茲平公是也秦有天下李斯王綰請上尊號曰泰皇至唐高宗上元二年九月壬辰始稱天皇中宗神龍元年十月上尊號曰應天皇帝景龍元年八月丙戌加號應天神龍玄宗開元以後宰相始率百官上尊號以為常制宋朝神宗熙寧中上以虛名無實遂罷之也稱朕朕我也古通稱之秦始皇二十六年始獨天子稱朕云史記曰李斯議天子自稱曰朕也呼上司馬遷作史記凡指斥君尊皆依違不正言但稱曰上太史公自敘書漢武本紀曰今上之類是也今臣下呼天子曰上由司馬子長始也蔡邕曰上尊位所在不敢媟言尊尊之意也御袍二儀實錄曰唐武德初用隋制天子常服黃袍及衫後漸用赤黃遂禁止士庶不得服其事自唐神堯始也後又曰赭黃王建宮詞曰日色赭黃相似謂赤黃也今俗又以天子常服淺黃為赭黃也服御, WYG: ''}
