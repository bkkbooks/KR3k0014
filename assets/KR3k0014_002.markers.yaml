  - {type: variant, offset: 9633, length: 215, content: 罷元會又太和三年七月崔龜從奏云正觀中任瓌卒有司對仗奏聞太宗責其乖禮岑文本歿其夕罷警嚴張公謹亡哭不避辰日臣謂大臣薨禮合輟朝推是則太宗以來尚未行茲禮也會要首錄開元事當是自明皇始也殿門沈括筆談曰周禮天官掌舍無宮則供人門今謂之殿門夫武官極天下長人之選上御前殿則執鉞立于紫宸門下行幸則為禁圍行于仗門之前今俗謂為鎮殿將軍者也蓋始于古人門衡門又曰宮殿行幸有衡門十人選武力絕倫者為之上御殿則執檛東西對立殿前亦古虎賁之類也虎賁蓋周制見周官也匭函唐會, WYG: 㑹}
