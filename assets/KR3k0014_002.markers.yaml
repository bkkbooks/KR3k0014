  - {type: punctuation, offset: 33, content: ；, id: KR3k0014_CHANT_002-bkkpn9}
  - {type: 'tls:seg', offset: 33, content: '', id: KR3k0014_CHANT_002-1a.10}
  - {type: variant, offset: 33, length: 0, content: '', WYG: 七國時臣子言事于其君皆曰上書秦改曰奏今亦有上書之事又通于臣下者也轉對唐書薛珏傳珏為京兆尹司農供三宫蓄茹不足請市時韋彤為萬年令珏使禁賣徳宗怒奪彤俸帝疑下情不逹詔延英坐日許百司長官二員言闕失謂之巡對唐會要曰貞元中詔每御延英令諸司長官二人奏本司事常㕘官每巳二人引見訪以政事謂之巡對宋朝因之曰轉對移文心雕龍曰始于劉歆移}
  - {type: page-break, offset: 33, content: '', id: KR3k0014_WYG_002-4b, image: WYG0920/WYG0920-0034b.png}
  - {type: page-break, offset: 33, content: '', id: KR3k0014_WYG_002-5a, image: WYG0920/WYG0920-0034c.png}
  - {type: variant, offset: 33, length: 0, content: '', krp: 七國時臣子言事于其君皆曰上書秦改曰奏今亦有上書之事又通于臣下者也轉對唐書薛珏傳珏為京兆尹司農供三宫蓄茹不足請市時韋彤為萬年令珏使禁賣徳宗怒奪彤俸帝疑下情不逹詔延英坐日許百司長官二員言闕失謂之巡對唐會要曰貞元中詔每御延英令諸司長官二人奏本司事常㕘官每巳二人引見訪以政事謂之巡對宋朝因之曰轉對移文心雕龍曰始于劉歆移}
  - {type: variant, offset: 34, length: 1, content: 素, WYG: 常孔稚圭因有北山移文今有移牒之名宜始此也檄又曰始于周穆王令祭公謀父為威譲之辭以責狄人也戰國䇿謂始于張儀檄楚誤矣蘇氏演義曰顔師古注急就章云檄激也以辭㫖慷慨發動之意又曰邀檄也關唐㑹要曰唐制諸司相質問三曰關開通其事也蓋始于唐宋朝神宗行官制用唐事露布隋書志曰後魏每征戰尅㨗欲天下聞知乃書帛建于漆竿之上名為露布露布自此始也其後相因施行通典亦云爾按後漢桓帝時地數震李雲乃露布上書移副三府注謂不封之晉代桓温北伐須露布文喚袁宏宏倚馬濡染不輒筆俄得七紙則露布晉已有矣祝文自伊耆氏始為八蜡則有之其文曰土反其宅水歸其壑昆蟲毋作草木歸其澤是也禮記云誄周制大夫已上有諡士則有誄是誄起于周也禮檀弓魯莊公及宋戰縣賁父死之公誄之士之有誄自此始也按周禮六辭以通上下親踈逺近六曰誄注謂積累生時徳行以賜之命是也殿下漢以來皇太子諸王稱殿下漢之前未聞唐初百官于皇太后亦稱之百官洎東宫官對皇太子亦呼之今雖親王亦避也始于漢續事始曰漢以前未有此呼魏志太祖定漢中杜襲始呼之時操封魏王故襲呼殿下按此自杜襲始也酉陽雜俎曰秦漢以来于天子言陛下皇太子言殿下將言麾下使}
