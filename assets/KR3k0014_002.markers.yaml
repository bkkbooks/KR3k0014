  - {type: variant, offset: 1188, length: 3, content: 江海歷, WYG: 壇墠左氏注曰除地為墠築土為壇書金縢武王有疾周公為三壇同墠黄帝内傳乃有築壇墠事是為其制起自黄帝郊丘通典曰黄帝封禪天地則郊丘之始矣又黄帝内傳曰王母既會帝于蓬莱帝歸乃築圓壇以祀天方壇以祭地則圓丘方澤之始也禘郊禮記祭法曰有虞氏禘黄帝而郊嚳祖顓頊而宗堯則茲禮始于虞舜也三嵗郊史記封禪書曰漢武即位之明}
