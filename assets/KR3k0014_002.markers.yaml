  - {type: variant, offset: 12477, length: 1, content: 謂, WYG: 設五旗夏后奚仲為車正建旗斿旐以别尊卑等級也駕易言黄帝服牛乗馬則馬駕之初也至陶唐氏始乗彤車白馬則齊毫之始也通典以堯乗白馬駕馬之始古史考以禹時奚仲駕馬誤矣世本曰黄帝之臣臣胲作服牛相土作駕馬吕氏春秋曰乗時作駕主永作服牛也髙氏小史云太昊服牛乗馬乗通典曰昔人皇乗雲駕六羽出谷及五龍氏乗龍上下以理此乗之始也駕六昔人皇駕六羽史記曰秦并天下自以水徳故始駕六馬按夏書五子之歌曰若朽索之御六馬則駕六之制夏后已然非自秦始皇起也逸禮}
