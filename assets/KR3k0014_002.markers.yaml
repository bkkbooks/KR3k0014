  - {type: variant, offset: 8072, length: 1019, content: 平趙弼考紀元云以一字紀元者始於漢文帝後元年景帝中元年以二字紀元者始於武帝建元元年以三字紀元者始於梁武帝大中通元年以四字紀元者始於漢哀帝太初元將元年今詳立號以紀元當始文景非武帝也萬歲考古逮周未有此禮戰國時秦王見藺相如奉璧田單偽約降燕馮諼焚孟嘗君債券左右及民皆呼萬歲蓋七國時眾所喜慶于君者皆呼萬歲秦漢以來臣下對見于君拜恩慶賀率以為常山呼後人以呼萬歲為山呼者其事蓋起于漢武時按前漢武帝本紀曰元封元年正月登嵩高御史乘屬在廟傍吏卒咸聞呼萬歲者三迄今三呼以為式而號山呼也又太始三年二月禮日成山登之罘山稱萬歲上壽通典曰禮有獻醻無上壽惟詩大雅云虎拜稽首天子萬壽豳風曰為此春酒以介眉壽非灼然明文要是彷彿其事古者詩工皆歌之故得而言也漢興叔孫通定儀七年長樂宮成諸侯朝賀禮畢置酒殿上尊卑次起上壽其事本起于此史記項羽與漢王飲鴻門項莊入為壽則茲事已見于漢初矣按淳于髡傳髡對齊威王有侍酒于前奉觴上壽之語及楚莊王置酒優孟前為壽皆戰國時事蓋非自漢始也春秋之閒亦無聞焉疑即七雄之禮云起居通典曰唐貞觀十三年房喬奏請三日一臨朝二十三年九月十八日太尉無忌奏請視朝坐日高宗報曰朕即大位自今已後每日常坐永徽元年十月五日敕京官五品依舊五日一參二年八月十九日詔此後每五日一度升太極殿視事朔望即為常式蓋今五日起居之始也漢書循吏傳曰漢宣五日一聽事則彷彿起居之事其禮雖見于漢要自唐始行之也記注漢武有禁中起居後漢明德馬皇后自撰顯宗起居注蓋周禮左右史之事耳謂之起居注則自前漢始也唐藝文志亦有獻帝起居注自茲歷代咸有也時政紀唐會要曰永徽以後左右史惟得對仗下後謀議皆不聞姚璹請仗下所言軍國政要宰相二人撰錄號時政紀又李吉甫對憲宗問時政紀曰是宰相記天子事以授史官之實錄也古左史記言今起居郎是右史記動今起居舍人是永徽中宰相姚璹慮造膝之言或不下聞因請隨奏對而記是則其事起自唐高宗時姚璹之請也索扇唐書明皇時蕭嵩為相以為天子升降俯仰眾人皆得見之非肅穆之容也奏請凡朔望受朝備羽扇于殿上將出所司承旨索扇扇合上坐坐定去扇禮畢上將退又索扇如初則此制之始自蕭嵩請也今之掌扇郎是也入閤宋朝會要曰唐敬宗始御紫宸殿群臣展入閤之儀後唐天成初又以月望入閤國朝以舊制皆以月朔閤門先期舉奏詔可即施行康定二年八月宋庠奏唐每坐朝之日即為入閤叔世離亂五朝草創大昕之制正衙立仗遂廢後或有行者人所罕見乃復謂之盛禮開元舊禮無開寶中增附始載月朔入閤之禮又丁度奏入閤是唐隻日紫宸殿受常朝之義云延英唐書韓皋曰延英之置肅宗以苗晉卿年老難步故設之耳後代因以為故事, WYG: 海廣利公西海廣潤公北海廣澤公}
