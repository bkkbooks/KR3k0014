  - {type: variant, offset: 2958, length: 1927, content: 觀十年始以季冬之寅蠟祭百神開元禮又用臘日蓋季冬之月星回歲終陰已交勞農大事五德之君各以其終而臘如水土終于辰火終于戌金終于丑木終于未是矣宋朝王于火戌故以戌臘而蠟復別為一祭臘獨以為時序之令又說文云冬至後三戌為臘也歷通歷曰太昊始有甲歷楊泉物理論曰神農立歷曰漢律歷志曰黃帝造歷董巴曰伏犧始作八卦三畫以象二十四氣黃帝因之初作調歷尸子曰羲和造歷呂氏春秋曰容成作歷世本亦云黃帝內傳曰既斬蚩尤乃命容成造歷以司天也歷名易乾鑿度曰歷原名握先紀曰甲子七十六歲為一紀二十紀為一蔀首注云握先為歷始之名猶言無前也沿革曰黃帝考定星歷建五行起消息正閏餘謂之調歷後代因之漢有太初唐有麟德等名也歷日物理論曰疇昔神農正節氣審寒溫以為早晚之期故立歷日算後漢律歷志曰隸首作數晉律歷志曰黃帝使隸首作算數博物記曰隸首黃帝臣一說隸首善算者也數謝察微算經曰易稱太極是生兩儀蓋數之先也史記曰黃帝建氣物分數孟康謂歷數之分世本曰隸首作數九章魏劉氏曰庖犧氏始畫八卦作九九之術以合六爻之變周公制禮而有九數九數之流則九章是矣一曰方田即今丈量田地畝之法二粟布粟是穀布是錢謂以多少錢糴多少穀三差分此是理會官員俸祿多少之法四少廣如今倉積米其中以其器而知其多少五商功商其工程如打土論方子打算一方土便會計得合用幾多人工六均輸均其道裏遠近之勞七盈朒盈是多朒是少數之顯者可見隱者不可見朒音縮八方程如算錢逐件除下零細的絕長補短湊得齊整便好算九句股此是量山量水之法今軍中立道寨有曉此法者渾儀春秋文耀鉤曰唐堯即位羲和立渾儀劉氏歷曰高陽造渾儀黃帝為蓋天則渾儀始于高陽氏也至舜則璇璣玉衡以齊七政刻漏梁刻漏經曰肇于軒轅之日宣乎夏商之代又黃帝刻漏水制器以分晝夜周禮有挈壼氏掌之以百刻分晝夜更點起于易繫九事重門擊柝之說自黃帝時也皇項峻始學篇曰天地立有天皇張愔帝系譜曰天地初起溟涬鴻濛即生天皇治世一萬八千歲此稱皇之始也帝由天皇至燧人皆稱皇故有天皇地皇人皇而燧人亦號燧皇及太昊帝王世紀稱曰帝庖犧氏繼天而王為百王先帝出于震未有所因此稱帝之始也皇帝世皇帝記曰五帝之初有天黃皇帝尚書呂刑曰皇帝清問下民蓋周穆王始以言唐堯也史記始皇本紀二十六年秦初并天下令曰六王咸伏天下大定名號不更無以稱成功其議帝號王綰李斯等議帝號曰古有天皇有地皇有泰皇泰皇最貴上尊號王為泰皇王曰去泰著皇采上古位號號曰皇帝曰秦兼天下建皇帝之號注云五帝自以德不及三皇故去皇號三王又以德不及五帝故損稱王秦自以德兼二代故兼稱之王夏商之前皆稱帝自周始降帝為王然夏啟之甘誓稱王曰嗟仲虺之誥湯曰惟王不邇聲色則二代雖號帝亦稱王也天子說文曰古之神聖人母感天而生子故曰天子春秋元命包曰安登生子人面龍顏始為天子帝王世紀曰神農氏之母有蟜氏名安登則帝王之稱天子自炎帝始也官家劉向說苑鮑白令之對秦始皇曰天下官則讓賢天下家則世繼故曰五帝以天下為官三王以天下為家蔣濟萬機論曰五帝官天下故傳之賢三王家天下故傳之子今指天子為官家則猶言帝王也其義始諸此僧文瑩湘山野錄曰真宗問李仲容何故謂天子曰官家遽對云蔣濟言三皇官天下五帝家天下兼三五之德故曰官家為小異爾按晉書五行志安帝義熙初童謠曰官家養蘆化作荻則晉末之語已云然矣隋唐之前稍云大家自茲世以稱至尊也五運通歷曰太昊木德王始有甲歷五運項峻始學篇曰天地立有天皇以木德王則五運之起自天皇氏始也然天地開闢之初溟涬鴻濛萬物未立五運相乘宜未詳也當自太昊為是王子年拾遺記曰伏犧以木德稱王位居東方以含養蠢化叶于木德其音附甲號曰木皇此宜木德相乘之始也後漢班固典引曰肇命人主五德初始莫不開元于太昊注云謂庖犧始以木德王也前漢郊祀志贊曰劉向父子以為帝出乎震故庖犧氏始受木德馮鑑續事始引徐秀帝王年代圖云伏犧為百王首故易曰帝出乎震即帝王五運震為木起自太昊也炙轂子曰五運有二說鄒衍以相勝劉向以相生自伏犧至顓頊以木火土金水相承漢魏以還共遵劉說孟詵錦帶前書亦曰伏犧始以木德出乎震故曰太皞所尚歷代帝王為正各異故所尚不同邢昺論語疏自夏正尚黑推而上之謂伏犧以上未聞謂女媧尚白神農赤黃帝黑少昊白高陽赤高辛黑陶唐白有虞赤宜自太昊始也國號後漢書班固典引曰肇命人主五德初始厥有氏號莫不開元于太昊注謂太昊號庖犧炎帝號神農黃帝號軒轅蓋自燧皇而上止以自名未為天下之號也至太昊始以庖犧為代號云太子唐虞而上皆傳之賢故無太子之文夏商之王雖傳之子其文略矣至周始見文王世子之目武王繼之稱太子發此其始也漢天子號皇帝故其嫡稱皇太子漢書高祖紀五年二月甲午漢王即皇帝位尊太子曰皇太子此其始也后春秋命歷序洛書摘三辟曰人皇九人別長九州離艮地精女出為之后注云離艮卦所推也此稱后之初云三代以上亦無其稱但曰正妃周人始曰王后妃配也自太昊制嫁娶之禮以相配偶然無以妃名其耦者帝王世紀至黃帝乃始有元妃次妃之列此疑妃之初爾韓子曰衛子嗣公愛泄姬恐其因愛以雍己乃尊魏妃以偶泄姬疑魏, WYG: ''}
