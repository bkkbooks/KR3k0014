  - {type: variant, offset: 12474, length: 0, content: '', krp: 之神象自鉦鼓漏鐘及神輿舊禮令無文開寳通禮新加儀馬今導駕有御馬分左右按自漢有之西京雜記漢朝輿駕祀甘泉汾隂罼䍐左右及節十}
  - {type: variant, offset: 12475, length: 1, content: 日, WYG: 後乃有御馬三則儀馬之設自漢始也香鐙宋朝㑹要曰香鐙唐制也􅆎輿通典曰唐有􅆎輿大駕先五輅行五輅隋書禮儀志曰輅虞氏謂之鸞車夏后謂之鉤車商謂之大輅周謂之乗輅按此則謂之輅者自商人始也周人初制五輅金玉象革以飾諸末木無飾後漢加􅏹文晉兩廂加鵾翅時亦謂之鵾車注旂旗于左加棨㦸于右皆槖藏之㦸韜以繡黻大輦宋朝㑹要曰周官巾車氏有輦車以人組挽之宫中從容所乗建隆四年南郊陶穀為禮儀使創意造為大輦也芳亭通典唐制輦七其五曰芳亭輦蓋始以為大駕羽衛也鳳輦又曰唐輦有七一曰大鳳輦前世無文疑唐所造也今止曰鳳輦小輿又通典曰按小輿今犢車軿車之流宋制小輿形如軺車小行幸則乗之五牛輅通典曰東晉過江副車遺缺有事權以馬車代之建旗其上後制五色木牛象五時車立旗于背行則使人輿之牛取負重致逺而安旗常纒而不舒所謂徳車綏旌晉書輿服志曰五牛旗平呉後所造以五牛建旗車設五牛青赤在左黄在中白黑在右周遷輿服雜事亦云晉平呉後造非過江始為也副車禮記有貳車鄭康成云副車又有佐車然則副車亦周事也通典曰秦平天下以諸侯之車為副又周禮戎車五倅有戎輅及廣闕苹輕等車之倅倅副也則輅車有副周制然也金根古今註曰秦制也秦并天下閲三代之輿服謂商得瑞山車一曰金根故作金根之車乃増飾而乗御漢因為乗輿董巴輿服志曰商瑞山車金根之色商人以為大輅于是秦始皇作金根之車漢承秦制為乗輿孔子所謂乗商之輅也然則金根之制蓋出于商人大輅之法大戴禮曰昔成湯郊祀因有山車之瑞亦謂桑根秦謂金根商輅矣耕根通典曰漢制如副車有三蓋一曰芝車置􅞙耒耜之箙上親耕所乗晉駕駟隋以青質羽葆雕裝軾平青嚢盛耒耜而加之也進賢車安車也通典曰周致仕之老及后乗之漢有五時安車各以方色宋朝㑹要曰進賢古安車也乾徳元年八月改明逺宋朝㑹要曰古四望車也駕以牛乾徳元年八月改仍駕四馬制如屋上層四面垂簾通典曰齊四望車亦曰皇輪車以加貴臣按齊已上無文便為齊制明矣又曰唐始駕四馬也羊車通典曰晉制宋朝㑹要曰古輦車也亦為畫輪車駕以牛隋駕果下馬今亦駕以二馬景祐五年九月賈昌朝上言羊車本漢晉之代乗于後宫隋大業中增金寳之飾駕以小駟馭以丱童自是以來遂為法從宋綬議引後漢劉熈釋名曰羸車羊車各以其駕名之隋禮儀志曰漢氏或以人牽或駕果下馬此乃漢代已有晉武偶取乗于後宫非特為掖庭制也然則羊車漢儀非晉始有也黄鉞車宋朝㑹要曰黄鉞車漢制乗輿建之唐初元貞觀後始加古今註曰金斧黄鉞也三代用之斷斬金以黄為乗輿之飾武王以黄鉞斬紂故王者以為戒通典以為晉制豹尾古今註曰周禮也所以象君子豹變尾言謙也古軍正建之今惟乗輿得建謂晉代也通典曰漢制大駕法駕出屬車最後一乗懸豹尾豹尾以前比省中宋志按徐廣淮南子軍正執豹皮以正其衆禮記前有士師則載虎皮乗輿豹尾以其義類宋朝㑹要曰唐貞觀後始加此車于鹵簿内屬車周末諸侯有貳車九乗貳車即屬車也亦周制所有秦滅九國兼其車服故八十一乗建旂沈約輿服志曰車服以庸著在唐典夏建旌旂辨其尊卑通典曰夏后氏俾車正奚仲建旂旐尊卑上下各有等級則車輅之建旂常始于禹也通典曰黄}
