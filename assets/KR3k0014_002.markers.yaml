  - {type: variant, offset: 7625, length: 200, content: 八日韋韜奏御案床褥望去紫用赤黃制可然則天子服御之以黃自韋韜之請也陛下唐以前天子無陛下之呼史記秦李斯議事始呼之耳陛階也所以陞堂天子必有近臣在階側以戒不虞臣與天子言不敢指斥但呼在陛下者與之言因卑達尊之義則此號秦禮也漢霍光奏太后亦曰陛下也聖節明皇雜錄曰唐玄宗八月五日降誕是日宴宰相于花萼樓源乾曜請以是日為千秋節群臣獻萬歲壽酒其後天子誕日節號自茲始也唐會要曰開元十七年八月五日源乾曜張說等請以是日為千秋節休假, WYG: ''}
