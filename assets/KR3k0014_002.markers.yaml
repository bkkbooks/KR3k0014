  - {type: variant, offset: 11077, length: 2, content: 設井, WYG: 如用樂作空侯杜佑曰或云侯暉其聲坎坎應節故曰坎侯訛為空侯侯者因樂人姓耳謂師延作非也風俗通曰漢武令樂人侯調依琴作坎侯宋臨川守劉義慶空侯賦曰侯牽化而始造通典説其形似瑟而小用撥彈之非今器也又有云空侯胡樂也漢靈帝好之體曲而長二十三絃抱于懐中兩手齊奏之謂之擘正今物也續漢書曰靈帝胡服作胡空侯隋音樂志曰立箜篌出自西域非華夏舊器也箏陸法言切韻曰箏秦蒙恬所造風俗通曰箏秦聲也而五絃今十三絃不知誰作傅𤣥箏賦序曰或}
