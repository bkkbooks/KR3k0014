  - {type: variant, offset: 11490, length: 275, content: 自開元已後租庸調法弊代宗時始以畝定稅至德宗相楊炎遂作兩稅法夏輸無過六月秋無過十一月是兩稅之始肇于開元天寶兵興之後也按春秋宣公十五年秋初稅畝公羊傳云稅畝者何履畝而稅也則今之稅以畝計此其初也其事雖出于唐代宗亦緣春秋稅畝之事爾其輸以夏秋乃自德宗始也商稅孟子曰文王之治岐關市譏而不征又曰市廛而不征則天下之商皆悅而願藏于其市矣則是夏商二代商無稅矣又曰古之為市以其所有易其所無有司者治之爾有賤丈夫焉必求龍斷而登之以左右望而罔市利故從而征之征商自此賤丈夫始矣此蓋商賈之初有稅也周官司關曰國有兇札則無關門之征趙岐曰王制云古者關譏而不征謂文王以前周禮關門有征謂周公以來, WYG: 辟惡皮軒}
