  - {type: variant, offset: 9279, length: 345, content: 載王縉始倡之云五代會要曰周廣順二年七月敕臣寮遇聖節底于寺觀起置道場皆是率醵今後中書門下與百官樞密院與諸司使副馬步軍都指揮使各共設齋故迄今以為故事也避殿史記吳王濞傳曰七國反吳王既敗走景帝詔將軍曰楚王卭等重逆無道燒宗廟朕素服避正殿則其事始自漢景帝也孝宣之世亦行其禮秦漢已上未聞事始謂自明帝始非也損膳事始云後漢鍾離意諫明帝起北宮疏曰陛下躬自克責降避正殿損常膳錄記以為二事之始今檢意傳疏文止言避正殿而無損膳之語又前漢文帝紀已書徹服損膳及賈山上疏文帝言治亂名至言有陛下即位自勉以厚天下損食膳不聽樂則事始所記謬矣按周官膳夫掌王食羞王日一舉鼎十有二物皆有俎齊日三舉大喪大荒大扎天地有烖邦有大故皆不舉是則王不舉者損常膳也疑茲禮有周舊典云爾蓋自周公制禮之始也迄今國有災減日食避正殿行之為式輟朝唐會要曰開元十八, WYG: ''}
