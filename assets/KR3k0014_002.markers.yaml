  - {type: variant, offset: 11051, length: 2, content: 津園, WYG: 不知何代所加或曰鵠取其聲揚而逺聞或曰鷺鼓精越王勾踐大鼓于雷門以厭呉晉時移于建康有雙鷺哾鼓而飛入雲或曰皆非也詩云振振鷺鷺于飛鼓咽咽醉言歸古之君子悲周道之衰頌聲輟飾鼓以鷺存其風流未知孰是懸鼓明堂位曰周懸鼓按周頌有瞽之詩曰應田懸鼓周禮雷靈路晉鼛等鼓皆有簨簴以懸之隋音樂志曰建鼓周人懸之謂之懸鼓磬説文曰無勾氏作磬世本亦云又曰叔所造不知何代人古史考曰堯時人也樂録曰磬叔傳作禮記曰叔之離磬皇圖要紀曰帝嚳造鐘磬通禮義纂曰黄帝使伶倫造磬也簨簴禮記曰夏后氏龍簨簴蓋樂之制}
