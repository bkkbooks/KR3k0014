  - {type: variant, offset: 2154, length: 2, content: 蕃息, WYG: 之四合象宫室曰幄王所居之帳也帟若握中坐上承塵皆以繒為之綬組所以繫帷也又掌次云王大旅上帝則張氊案設皇邸祀五帝則張大次小次注曰次幄也大幄初徃所止居也小次既接祭退俟之處聖朝自太祖以來每行郊禮皆營青城幄殿即周禮大次也又于東壝門外設更衣殿即小次也是則宋朝之設青城自周制也内寺僧史略曰謂之道場内起于後魏得名于隋煬帝改僧寺曰道場置于宫中故曰内今宋朝洪福等殿}
