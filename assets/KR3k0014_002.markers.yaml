  - {type: variant, offset: 11149, length: 3, content: 魏文侯, WYG: 不知何代人周之畿内有暴國豈其人乎承謂世本所記當是以詩有暴公為卿士而譛蘇公蘇公作何人斯以絶之其詩云伯氏吹壎仲氏吹篪以言其俱為王臣恩如兄弟故謂伯仲耳其相應和如壎篪也便謂暴公作壎蘇公造篪云按樂記曰聖人作為鞉鼓控掲壎篪此六者徳音之音也言聖人作為則明非暴公所能作矣隋音樂志亦謂壎六孔暴辛公之所作非也通厯曰帝嚳造王子年拾遺記乃云庖犧灼土為壎也擊甌吕氏春秋曰堯}
