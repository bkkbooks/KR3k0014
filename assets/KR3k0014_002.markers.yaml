  - {type: variant, offset: 11028, length: 0, content: '', WYG: 之所樂工造此曲促飲也又一説蔡邕自御史累遷尚書三日之間歴三臺樂府以邕曉音律製此曲以悦之未知孰是小詞筆談曰古詩皆詠之然後以聲依之詠以成曲謂之協律詩外有和聲所謂曲也唐人乃以詞填入曲中不復用和聲此格雖云自王涯始然貞元元和之間為之者已多有在涯前者又小曲有咸陽沽酒寳􅁫空之句李白作花間集乃云張泌所為莫知孰是楊繪本事曲子云近世謂小詞起于温飛卿然王建白居易前于飛卿久矣王建有宫中三臺宫中調笑樂天有謝秋娘咸在本集與今小詞同花間集序則云起自李太白謝秋娘一云望江南}
  - {type: page-break, offset: 11028, content: '', id: KR3k0014_WYG_002-38b, image: WYG0920/WYG0920-0051b.png}
