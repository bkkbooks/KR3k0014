  - {type: variant, offset: 1194, length: 8, content: 盤古死後賜為江海, WYG: 漢平帝立王莽頗改祭禮云天地有合有别有合者孟春正月上辛若丁天子親合祀天地于南郊于是始同祀于圓丘今南郊之合祀自王莽始也黄圖載元始四年嘗以嵗孟春親郊祭天南郊以地配望秩山川徧于群神天地位皆南鄉同席地差在東是也明堂尸子曰黄帝曰合宮有虞曰總章商曰陽館周曰明堂管子曰黄帝有明堂之議通典曰黄帝拜祀上帝于明堂唐虞祀五帝于五府夏后享祖宗于世室商人曰重屋周人宗祀文王于明堂以配上帝周禮又曰夏后世室商人重屋漢時公王帶畫黄帝明堂圖則明堂要自黄帝始也而}
