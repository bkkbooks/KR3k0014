  - {type: variant, offset: 10645, length: 286, content: 七年二月詔貧民住官舍者遇冬正寒食免僦直三日此節日放免之始也休沐史記李園事春申君謁歸故失期則假告已見于戰國漢律吏得五日一休沐言休息以洗沐也鄧通洗沐不出張安世休沐嘗出門是也唐會要永徽三年二月十日以天下無虞百司務𥳑每至旬假許不視事以寬百寮休沐然則休沐始于漢其以旬休則始于唐也戶帳又曰武德六年三月令天下戶每歲一造帳籍開元十八年十一月敕請戶籍三年一造此戶口有帳之初也戶等又曰武德六年三月令天下戶量其資產定為三等九年三月二十四日又為九等此戶有等第之始也正元四年正月仍令三年一定為常式宋朝因之為五等次宴今聖節後大宴曰次宴宋朝會要曰建隆元年二月以長春節大宴廣德殿誕聖節大宴自茲始也春宴又曰, WYG: ''}
