  - {type: variant, offset: 2054, length: 3, content: 賀正通, WYG: 周公郊祀后稷以配天宗祀文王于明堂以配上帝注謂以父配天之禮始自周公蓋配天侑食肇于有虞而明堂之嚴父配帝則自周公始也配饗尚書盤庚之吿其臣曰兹予大享于先王爾祖其從與享之則功臣配享之禮由商人始也周禮有功者書于太常祭于大烝司勲詔之也趙簡子記祀董安于廟魏祀曹真于太祖廟又祫祀功臣二十一人也木主}
