  - {type: variant, offset: 2046, length: 0, content: '', WYG: 帝嚳而宋朝仁宗復其典也后土按西漢祭天于甘泉泰畤祭地于汾隂后土後漢始定南北郊然則汾隂后土本漢祀地祇之所也宗廟禮緯元命包曰唐虞五廟􅆓革亦云昔唐虞五廟夏后因之至商而七書咸有一徳曰七世之廟可以觀徳是也周兼文武二祧故九廟由唐虞推而上之明其前有至堯舜乃祭五廟爾廟號王者祖有功宗有徳始自有虞祖髙陽而宗堯故舜典有歸格于藝祖受終于文祖大禹矢謨亦有受命于神宗之文商有天下}
  - {type: page-break, offset: 2046, content: '', id: KR3k0014_WYG_002-20b, image: WYG0920/WYG0920-0042b.png}
  - {type: variant, offset: 2046, length: 0, content: '', krp: 帝嚳而宋朝仁宗復其典也后土按西漢祭天于甘泉泰畤祭地于汾隂后土後漢始定南北郊然則汾隂后土本漢祀地祇之所也宗廟禮緯元命包曰唐虞五廟沿革亦云昔唐虞五廟夏后因之至商而七書咸有一徳曰七世之廟可以觀徳是也周兼文武二祧故九廟由唐虞推而上之明其前有至堯舜乃祭五廟爾廟號王者祖有功宗有徳始自有虞祖髙陽而宗堯故舜典有歸格于藝祖受終于文祖大禹矢謨亦有受命于神宗之文商有天下}
  - {type: variant, offset: 2047, length: 0, content: '', WYG: 甲號太戊為中宗武丁為髙宗始列宗廟之號故漢氏因之西京有太宗世宗東京有顯宗肅宗而唐室諸帝乃例稱之盖其事原于虞舜而備于商人也朝獻筆談曰唐制有事於上帝則百神皆預祭吿惟太清宫太廟則上親行謂之奏吿止南郊為正祠天寳九載詔以吿者上吿下之詞今後太清宫宜稱朝獻太廟宜稱朝饗自此失奏吿之名又皆為正祠其禮自唐始也配天有虞為禘郊之禮以祀}
