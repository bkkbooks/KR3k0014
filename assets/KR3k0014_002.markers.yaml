  - {type: variant, offset: 11196, length: 0, content: '', WYG: 鼗吕氏春秋曰帝嚳使倕作鼗通厯曰帝嚳平共工之亂作鼗鼓羯鼓羯鼓録曰以戎羯之鼓故曰羯鼓唐禮樂志曰蓋本戎羯之樂其音太蔟一均明皇帝稱八音之領袖諸樂不可方也通典曰以出羯中故號羯柷敔禮樂記曰聖人作為控掲注云謂柷敔也通厯曰帝嚳平共工之亂作控掲拍板樂府雜録曰明皇令黄幡綽撰拍板譜綽曰但有耳道則不失其節奏通典有擊以代抃抃擊節也因其聲以節舞拍板蓋出于擊節也又晉魏之代有宋識善擊節然以板拍之而代擊節是則拍板之始也鄴城舊事曰華林園齊武成時穿池為北海中有宻作堂以船為脚作木人七一拍板則此器已見于北齊矣鈸通典曰鈸亦名銅盤出西戎及南蠻其圓數寸隱起如涇漚貫之以韋相擊以和樂南蠻大者圓數尺或謂齊穆王素所造輿駕羽衞部十二鹵簿炙轂子曰車駕行羽儀導䕶謂之鹵簿自秦漢始有其名後漢胡廣作天子出行鹵大楯也所以扞敵部伍之次皆著之簿儀其五兵獨以楯為名者行道之時甲楯居外餘兵在内故但言鹵簿五禮精義曰鹵大盾也以大盾領一部之人故名鹵簿象西京雜記漢朝輿駕有象車鼓吹十三人中道晉輿服志曰象車漢鹵簿最在前晉諸公讚曰晉時南越獻馴象為作車令越人騎之帝行則以試橋梁通典曰晉武帝太康中平呉南越獻馴象詔作大車駕之使越人騎之大駕鹵簿行則試橋梁宋朝㑹要曰漢鹵簿象最在前晉作大車駕之以試橋梁皇朝象亦居先設木蓮花坐金蕉葉然則象之先導自漢始也駕頭筆談曰正衙法座香木為之加金飾四足墮角其前小偃織藤冒之每車駕出幸則使老内臣馬上抱之曰駕頭虞候春秋時晉有候正主斥候又有原候候奄則虞候之名蓋因此齊晏子云藪之薪蒸虞候守之本山澤望候之官李靖兵法有左右虞候名同而職異矣佽飛漢百官表曰少府官屬秦有左弋武帝太初元年更為佽飛吕氏春秋曰荆有兹非渡江兩蛟繞舟兹非拔劔殺之荆王任以執圭後世以為勇力之官兹佽音相近許慎曰佽便利也顔師古以謂取勇力人以名官亦取其便利輕捷若飛故號佽飛今大駕鹵簿備此二者以為儀衛指南樂臺注鬼谷子曰肅慎還周公恐其迷路造指南車送之古史考亦云周公作或曰管仲作崔豹古今註曰舊説周公所作周公致太平越裳氏重譯來獻使者迷其歸路周公錫以軿車五乗皆為司南之製按黄帝内傳曰𤣥女為帝製司南車當其前志林曰黄帝與蚩尤戰于涿鹿之野蚩尤作大霧彌三日人皆惑帝令風后法斗機作指南車以别四方古今註又曰指南車起于黄帝戰蚩尤作大霧迷四方于是作指南車也記里古今註曰大章車所以識道里也起于西京亦曰記里車黄帝内傳曰𤣥女為帝製司南車當其前記里車居其右則是其制始自黄帝造之非西漢所作也白鷺通典曰隋置一名鼓吹車車上施層樓樓上有翔鸞棲焉宋朝㑹要曰隋所制也柱杪刻木為鷺銜鵞毛筩鸞旗通典曰鸞旗車漢制編羽旄列繫幡傍胡廣曰以銅作鸞鳥于車衡上}
