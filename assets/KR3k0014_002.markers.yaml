  - {type: variant, offset: 11072, length: 1, content: 黃, WYG: 梁有銅磬則今方響也方響以鐵為之以代磬唐書禮樂志曰方響體以應石審此則是出于編磬之制而梁始為之者也琴文選西都賦曰伏犧作琴世本曰伏犧造琴琴操曰伏犧作琴長三尺六寸六分琴書曰伏犧氏王天下削桐為琴廣雅曰伏犧氏琴長七尺二寸説文曰琴神農所造桐越練朱五絃至周文增其二}
