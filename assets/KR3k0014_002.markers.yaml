  - {type: variant, offset: 4886, length: 164, content: 帝以三夫人名妃用此兩制皇后周禮天子之妃曰后周人稱王妃曰后秦號皇帝亦稱皇后后繼體之君也周人之稱王妃亦以繼天子之後故也尚書顧命曰皇后憑王几蓋史始以言成王之以道繼人之後也而秦漢以稱天子之妃漢高紀七年漢王即皇帝位尊王后曰皇后太后史記秦本紀曰昭王母芊氏號宣太后王母于是始以為稱故范睢說秦王有獨聞太后之語其後趙孝成王新立亦有太后用事之說是太, WYG: ''}
