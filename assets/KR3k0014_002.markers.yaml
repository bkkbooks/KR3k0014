  - {type: variant, offset: 2036, length: 0, content: '', krp: 月勅所司置夀星壇祭老人星及角亢七宿今百神咸秩而獨略夀星望俾崇祀禮院言夀星南極老人星也爾雅云夀星角亢也注云數起角亢列宿之長故云唐開元中上封事者言月令八月日月㑹于夀星居列宿之長請八月社日配夀星于太社壇享之當時遂勅特置夀星壇也周伯宋朝㑹要曰大中祥符二年九月邢中和言景徳三年周伯星出角亢之下按角亢為泰山之根果符上封之應望于親郊日置周伯星于亢宿間禮院言司天元奏周伯星出氐三度氐亢相去不逺並夀星之次乃設位于氐星之間九宫又曰景徳三年九月王欽若言九宫貴神天寳立祀咸平四年三月杜鎬言唐明皇天寳中述九宫貴神次昊天上帝明皇肅宗皆嘗親祀又景祐二年四月章得象言唐天寳中術士蘇嘉慶始置九宫神壇于城東祭以四孟隨嵗改位行棊謂之飛位按唐㑹要曰天寳三載}
  - {type: variant, offset: 2037, length: 2, content: 二候, WYG: 月十六日蘇嘉慶上言請于城東置九宫貴神壇每嵗四孟月祭也大火又曰康定元年十月胡宿言按春秋士弱對晉侯曰古之火正或食于木陶唐火正曰閼伯居商丘祀大火焉説文曰火正火官也掌祭火星行火政後世以為火祖相土契之曽孫代閼伯宋其後也商丘今南京}
