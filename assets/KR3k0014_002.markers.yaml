  - {type: variant, offset: 2021, length: 0, content: '', WYG: 也封禪史記封禪書曰封泰山禪梁父者七十二家無懐氏為之始蓋在太昊前也管子亦云遁甲開山記則太昊之後自女媧至無懐凡十五代乃在太昊後炎帝前也神州王者所居卜吉土五千里内之地名也通典于周制方丘篇始録之則是神州之祭自周人始也社禮記曰社祭土而主陰氣左氏曰共工氏有子曰勾龍為后土實始為社漢書髙祖十年春有司奏令縣道常以春二月祀社稷以羊彘蓋自三代以来社稷為諸侯命祀秦罷侯置守故諸侯之職歸守令漢始以郡縣祀社稷也稷禮稷為五穀之長昔烈山氏之子曰柱夏以上祀之實始為稷周棄為唐虞稷官湯既勝夏遷社而祀棄故自商以來祀之其州縣祭社稷儀蓋自皇朝祥符中始定之云蜡臘蜡者嵗十二月合聚百物而索饗之也禮記郊特牲曰伊耆氏始為蜡又曰蜡之祭主先嗇而祭司嗇先為田報祭也詩疏云伊耆神農並與大庭為一也山川通典曰黄帝祭于山川典禮為多則山川祀秩始自黄帝氏也舜典望秩于山川也籍田周制天子孟春躬耕籍田國語虢文公言之詳矣其事亦見于周官甸師之職及禮記則其禮周制也禮記武王耕籍田然後諸侯知所以敬先農漢文制春始耕于籍田官祀先農以一太牢則其祀由漢興也先蠶周禮内宰詔王后蠶于北郊齋戒享先蠶禮亦雜記其事然禮之所紀多商周之制及其餘群小祀俱周典云五祀世本曰商湯作五祀井竈中霤行至周而七曰門行厲户竈司命中霤也髙禖五經要義曰髙禖先王子孫之祀也}
