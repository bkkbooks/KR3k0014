  - {type: variant, offset: 26, length: 0, content: '', WYG: 制劉勰文心雕龍曰古者有命無制周禮}
  - {type: variant, offset: 26, length: 0, content: '', krp: 制劉勰文心雕龍曰古者有命無制周禮}
  - {type: variant, offset: 27, length: 0, content: '', WYG: 祝作六辭以通上下其二曰命是也蘇氏演義曰制也主也禁也斷也言君上用人或制斷而行之或禁制而止之詔文心雕龍曰有熊唐虞同稱曰命其在三王事兼誥誓詔誥也教也所以告教百姓三代無文起于秦漢史記秦}
  - {type: page-break, offset: 27, content: '', id: KR3k0014_WYG_002-2a, image: WYG0920/WYG0920-0033a.png}
  - {type: variant, offset: 27, length: 0, content: '', krp: 祝作六辭以通上下其二曰命是也蘇氏演義曰制也主也禁也斷也言君上用人或制斷而行之或禁制而止之詔文心雕龍曰有熊唐虞同稱曰命其在三王事兼誥誓詔誥也教也所以告教百姓三代無文起于秦漢史記秦}
  - {type: variant, offset: 28, length: 0, content: '', WYG: 皇二十六年李斯議命為制令為詔鳳詔後趙石季龍置戲馬觀觀上安詔書用五色紙銜于木鳳口而頒之今大禮御樓肆赦亦用其事自石季龍始也誥尚書湯黜夏作誥漢初太上皇稱之今太后亦稱之又所以命官授職皆為誥以成湯為之始蘇氏演義曰誥告也言布告王}
  - {type: page-break, offset: 28, content: '', id: KR3k0014_WYG_002-2b, image: WYG0920/WYG0920-0033b.png}
  - {type: variant, offset: 28, length: 0, content: '', krp: 皇二十六年李斯議命為制令為詔鳳詔後趙石季龍置戲馬觀觀上安詔書用五色紙銜于木鳳口而頒之今大禮御樓肆赦亦用其事自石季龍始也誥尚書湯黜夏作誥漢初太上皇稱之今太后亦稱之又所以命官授職皆為誥以成湯為之始蘇氏演義曰誥告也言布告王}
