  - {type: variant, offset: 11026, length: 1, content: 射, WYG: 諸調筆談曰宫商角為正聲徵羽為變聲加變徵則從變之聲已瀆矣隋鄭譯始調具之均展轉相生為八十四調清濁溷淆紛亂無綂並流為新聲自後有犯聲側聲主煞寄煞偏字傍字雙半字之法然則今胡部諸調皆源于鄭譯三臺三十拍曲名也劉公嘉話録曰三臺送酒蓋因北齊文宣毁銅雀臺别築二箇臺宫人拍手呼上臺因以送酒李氏資暇曰昔鄴中有三臺石季龍遊}
