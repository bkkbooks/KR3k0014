  - {type: variant, offset: 11030, length: 2, content: 景德, WYG: 近傳一闋云李白製即今菩薩蠻其詞非白不能及此信其自白始也劉斧青瑣集隋海記中有望江南調即煬帝世已有其事也鼓吹唐樂志曰黄帝使岐伯作鼓吹以揚徳建武蔡邕禮志亦云然唐紹傳曰紹謂鼓吹本軍容黄帝戰涿鹿以為警衛也凱歌蔡邕禮志曰黄帝使岐伯作軍樂凱歌今廻軍有樂即其遺意也女樂列女傳曰夏桀既棄禮義淫于婦人求四方美女積之後宫作爛漫之樂晉獻公欲伐虞遺以女樂二八左傳鄭略晉侯以女樂論語齊人歸魯女樂自周末皆有而桀為之始準漢}
  - {type: page-break, offset: 11030, content: '', id: KR3k0014_WYG_002-39a, image: WYG0920/WYG0920-0051c.png}
  - {type: page-break, offset: 11030, content: '', id: KR3k0014_WYG_002-39b, image: WYG0920/WYG0920-0051d.png}
  - {type: variant, offset: 11030, length: 2, content: 景德, krp: 近傳一闋云李白製即今菩薩蠻其詞非白不能及此信其自白始也劉斧青瑣集隋海記中有望江南調即煬帝世已有其事也鼓吹唐樂志曰黄帝使岐伯作鼓吹以揚徳建武蔡邕禮志亦云然唐紹傳曰紹謂鼓吹本軍容黄帝戰涿鹿以為警衛也凱歌蔡邕禮志曰黄帝使岐伯作軍樂凱歌今廻軍有樂即其遺意也女樂列女傳曰夏桀既棄禮義淫于婦人求四方美女積之後宫作爛漫之樂晉獻公欲伐虞遺以女樂二八左傳鄭略晉侯以女樂論語齊人歸魯女樂自周末皆有而桀為之始準漢}
  - {type: variant, offset: 11033, length: 1, content: 年, WYG: 帝時京房造準中瑟而十三絃隠開九尺中央一絃下有盡分寸六十律之節宋朝仁宗時阮逸胡瑗輩復用其制作之歌山海經曰夏后開上三嬪乎天得九歌九辯以下焉又曰帝俊有子八人是始歌舞夏侯𤣥辯樂論曰伏犧有網罟之歌吕氏春秋有葛天氏歌八闋一曰載人二𤣥鳥三逐草木四奮五穀五天帝六達帝功七依地徳八物禽獸之極則歌以太昊為始蓋太昊之後十三代有葛天氏故也舞山海經曰刑天與帝爭神帝㫁其首乃以乳為眼以臍為口操干戚以舞又曰帝俊八子是始為舞孟頻引教坊記曰昔隂康氏次葛天氏元氣肇分災沴未弭民多重膇之疾思所以通利關節是始制舞然則舞自康氏始也吕氏春秋曰陶唐氏之始隂多滯伏民多壅閼故為作舞以宣導之誤矣孟詵錦帶前書則云舞樂之興始于黄帝故周用六代之樂越取黄帝以謂始舞可尊也周禮六舞五曰人舞注無所執以手䄂為威儀祀星辰舞之即今代之舞出于此也鐘月令章句曰上古聖人本隂陽别風聲審清濁不可以文載口傳于是始鑄金作鐘以主}
