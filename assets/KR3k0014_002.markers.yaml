  - {type: variant, offset: 11037, length: 0, content: '', WYG: 之聲山海經曰炎帝之孫岐伯因鼓遂為鐘又曰岐伯生鼓延是始為鐘吕氏春秋曰黄帝命伶倫鑄十二鐘世本曰黄帝工人垂所造皇圖要紀曰帝嚳造鐘磬禮曰垂之和鐘鄭康成云垂堯時鐘工也鎛鐘隋音樂志曰鏄鐘即黄帝所命伶倫鑄十二鐘和五音者也宋朝㑹要載馮元等議曰昔黄帝命伶倫與營援鑄十二鐘以調月律今鏄鐘是也鼓禮記明堂位曰土鼔蕢桴伊耆氏之樂也帝王世紀曰黄帝煞􅇪以其皮為鼓黄帝内傳曰帝與蚩尤戰𤣥女為帝製䕫牛鼓又請帝製鼓鼙以當雷霆世本曰夷作鼓蓋起于伊耆氏之土鼓也鼓足又明堂位曰夏后氏之鼓足鄭注云足是}
