  - {type: variant, offset: 674, length: 410, content: 分野之度史記歷書曰黃帝名察度驗臣瓚謂題名宿度候察進退三辰之度吉兇之驗也又曰漢武招致方術士唐都分天部漢書音義云謂分部二十八宿為距度而晉書天文志亦曰庖犧氏立周天歷度也風雨帝王五運歷年記曰盤古之君龍首蛇身噓為風雨雷電又曰盤古吹為雷電陰陽春秋內事曰伏犧氏定天地分陰陽晝夜又歷年記曰盤古開目為晝閉目為夜通歷曰地皇氏分晝夜五行史記歷書曰黃帝建立五行起五部應劭曰金木水火土也孟康謂天有四時分為五行十二辰事始曰黃帝立子丑十二辰以名月又以十二名獸屬之人風俗通曰俗說天地開闢未有人民女媧摶黃土為人劇務力不暇供乃引繩絙泥中舉以為人故富貴者黃土人也貧賤凡庸者絙人也淮南子曰黃帝生陰陽上駢生耳目桑林生臂手此女媧所以七十化也許慎注云黃帝古天神所造人時化生陰陽上駢桑林皆神名又曰突生海人海人生若菌音群若菌生聖人聖人生庶人凡庸者生于庶人突人之先此人之始也君臣典略載云孫瓚表曰皇羲已來始有君臣上下之事由是推之天皇以降雖有其分固亦略矣至太昊始正之也夫婦杜佑, WYG: ''}
