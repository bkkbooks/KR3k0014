  - {type: variant, offset: 11813, length: 578, content: 貢法至商而助周人以徹其取于民也有制故國有定賦而無橫斂周衰之末諸侯以強霸相尚兵革不息故費博而什一不足此雜稅之法所由起也漢有名件矣蓋自孝武算舟車也唐建中元年九月趙贊請天下所販竹木茶漆皆什一稅之也稅草唐書食貨志曰正觀中始稅草以給諸閑則稅草起自唐太宗也稅錢沿革曰晉齊梁時凡貨牛馬田宅有文券者率輸四百入官賣主三買主一蓋始于漢武算緡榷酤通典曰漢文帝時初榷酤沿革曰漢武帝天漢三年始榷酒酤也榷茶起于唐建中正元之閒趙贊張滂建議稅其什一一云德宗正元八年張滂奏收茶稅唐會要曰正元九年正月初稅茶先是張滂奏請于出茶州縣及茶山要路定三等每十稅一茶之有稅自此始也一云穆宗時王涯始榷茶榷鹽其始原于唐第五琦及劉晏代其任大歷末一歲征賦所入之鹽當天下大半之賦鹽鈔筆談曰陝西顆鹽舊法官自般運置務拘賣兵部員外郎范祥始為鈔法令商人就邊郡入錢至解池請任私賣得錢以實塞下行之既久鹽價時有低昂又于京師置都鹽院也漕運沿革曰秦伐匈奴令天下飛芻輓粟此漕運之始也屯田事始曰昭帝紀始元二年詔發習戰射士詣朔方調故將吏屯田於張掖謂為屯田之始也按西域傳曰自武帝初通西域置校尉屯田於渠犂又征和中桑宏羊奏言可遣屯田卒益種五穀於張掖酒泉然則屯田蓋起于漢武開西域之時也職田孟子曰卿已下必有圭田禮王制曰圭田無征周官亦有大夫之采地此職田之起也晉有芻藁之田後魏給公田北齊自一品已下各有差武德元年十二月制外官各給職分田則職田之名唐始有之也, WYG: 軒}
