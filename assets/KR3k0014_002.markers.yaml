  - {type: variant, offset: 11038, length: 11, content: 日命石保吉賜契丹使宴射, WYG: 足毛公詩注曰夏后氏足鼓隋音樂志曰建鼓夏后氏加四足謂之鼓足建鼓同前又曰商楹鼓詩商頌曰置我鞉鼓毛公注云商人置鼓鄭箋云其改夏之制乃始植我商家之鼓楹謂之柱楹貫植鞉雖不植貫而搖之商人柱貫之謂之楹鼓近代相承植而員之謂之建鼓蓋商所作也又棲翔鷺}
