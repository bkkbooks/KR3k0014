  - {type: variant, offset: 11074, length: 0, content: '', krp: 王世紀曰炎帝作五絃之琴桓譚新論曰神農氏}
  - {type: variant, offset: 11075, length: 0, content: '', WYG: 削桐為琴繩絲為絃又曰周文王武王各加一絃廣雅又云神農琴長三尺六寸六分止有五絃文王增二絃隋音樂志曰琴神農制為五絃周文王加二絃為七者也髙氏小史曰炎帝教人作五絃之琴通禮義纂曰堯使母勾作琴五絃揚雄琴清英曰舜彈五絃琴堯加二絃山海}
