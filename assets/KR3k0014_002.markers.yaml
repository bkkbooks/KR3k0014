  - {type: variant, offset: 11075, length: 0, content: '', krp: 削桐為琴繩絲為絃又曰周文王武王各加一絃廣雅又云神農琴長三尺六寸六分止有五絃文王增二絃隋音樂志曰琴神農制為五絃周文王加二絃為七者也髙氏小史曰炎帝教人作五絃之琴通禮義纂曰堯使母勾作琴五絃揚雄琴清英曰舜彈五絃琴堯加二絃山海}
  - {type: variant, offset: 11076, length: 0, content: '', WYG: 曰帝俊生晏龍是始為琴禮記曰舜作五絃之琴以歌南風雖諸家記所始長短增絃不同要之以太昊作之為是趙惟暕又云琴始自伏犧爾雅曰大琴曰離二十絃傳此是伏犧所制一絃琴通典曰一絃琴有十二柱柱如琵琶晉紀曰孫登居白鹿蘇門二山彈一絃琴按拾遺記云師延商樂工也商時摠修三皇五帝之樂撫一絃之琴或作瑟則地祇皆升是商代則有矣今瞽者撫之以擬曲者是擊琴通典曰擊琴栁惲所作惲嘗為文思有所屬援筆誤中琴因以管承絃又以竹片約而束之使絃急而聲亮舉以擊之以節曲按南史栁惲傳初父世隆彈琴為士流第一惲每奏父曲嘗感思復變體備冩古曲嘗賦詩未就以箄捶琴坐客過以筯扣之惲驚其哀韻乃制其雅音後傳擊琴自于此今世俗有彈獨絃琴以竹作扣擊之節疑此也馬明生别傳曰明生隨神女入石室金床玉几彈琴有一絃五音並奏瑟世本曰伏犧造瑟王子年拾遺記曰庖犧氏絃桑為瑟世本又曰庖犧氏作瑟五十絃後黄帝使素女鼓瑟哀不自勝破為二十五絃具二均聲帝王世紀曰伏犧作瑟三十六絃隋音樂志曰瑟二十七絃伏犧所作者也髙氏小史曰太昊作二十五絃之瑟西都賦曰神農造瑟吕氏春秋曰朱襄氏之王天下多風陽氣畜積果實不成故士達作五絃之瑟髙誘曰士達朱襄之臣瞽叟制為十五絃舜益以八絃為二十三絃山海經曰晏龍始為瑟數説雖異以世本之説為得阮通典曰秦琵琶也武后時蜀人蒯朗于古墓中得銅器似琵琶而圓時人莫識之元行沖曰此阮咸所造命匠人以木為之行沖以其形似月聲合琴名月琴社佑以為晉竹林七賢圖阮咸所彈與此同因謂之阮咸李氏資暇曰唐中宗朝元行沖為太常少卿有人于古塜獲銅鑄樂似琵琶而圓獻于元公元曰此阮仲容所造命工以木為之音韻清朗頗難名之權以仲容姓名呼焉阮公昔賢豈可以其名氏號樂器乎元以其形似月聲合琴因是名月琴自是知之者不以舊名呼或謂咸豐肥創此器以移琴聲四絃十三柱倚膝摐之謂之璧以代撫琴之艱也今人但直曰阮也箜篌釋名曰師涓所作靡靡之樂耳蓋空國之侯所好也晉應劭曰漢武令侯調始造此器史記封禪書漢武禱祠太一后}
