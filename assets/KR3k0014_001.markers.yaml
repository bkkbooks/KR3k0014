  - {type: variant, offset: 5, length: 0, content: '', WYG: 星辰盖地皇氏始定為星辰黄帝又名之至帝嚳而序也星官後漢天文志曰軒轅始受河圖鬭苞授規日月星辰之象故星官之書自黄帝始至髙陽氏乃使南正重司天星次帝王世紀曰黄帝受命乃推分星次以定律度劉昭補漢志亦曰黄帝定星次即今爾雅所記十二次與二十八舍之度皆自黄帝創之也宿度王子年拾遺記曰庖犧視五星之文分野之度史記厯書曰黄帝名察度驗臣瓚謂題名宿度候察進退三辰之度吉凶之驗也又曰漢武招致方術士唐都分天部漢書音義云謂分部二十八宿為距度而晉書天文志亦曰庖犧氏立周天厯度也風雨帝王五運厯年記曰盤古之君龍首蛇身噓為風雨雷電又曰盤古吹為雷電隂陽春秋内事曰伏犧氏定天地分隂陽晝夜又歴年記曰盤古開目為晝閉目為夜通厯曰地皇氏分晝夜五行史記厯書曰黄帝建立五行起五部應劭曰金木水火土也孟康謂天有四時分為五行十二辰事始曰黄帝立子丑十二辰以名月又以十二名獸屬之人風俗通曰俗說天地開闢未有人民女媧摶黄土為人劇務力不暇供乃引繩絙泥中舉以為人故富貴者黄土人也貧賤凡庸者絙人也淮南子曰黄帝生隂陽上駢生耳目桑林生臂手此女媧所以七十化也許慎注云黄帝古天神所造人時化生隂陽上駢桑林皆神名又曰突生海人海人生若菌音辟若菌生聖人聖人生庶人凡庸者生于庶人突人之先此人之始也君臣典畧載云孫瓚表曰皇羲已來始有君臣上下之事由是推之天皇以降雖有其分固亦畧矣至太昊始正之也夫婦杜佑通典曰遂皇氏始有夫婦之道注云人皇是也山嶽歴年記曰盤古死後骨節為山林又古昔𫝊盤古左手為東嶽右手為西嶽腹為中嶽首為南嶽足為北嶽與此為小異王子年拾遺記曰庖犧審地勢以定川嶽山谷遁甲開山記曰麗山氏産生山谷肇分自此其始也江海歴年記曰盤古死後腸為江海孟詵錦帶前書早紀括提紀云有神農氏立蛇形甄四海此前神農也論語摘輔象伏羲六佐仲起為海陸注云主平地兼統海陽為江注云主江湖淮瀆又曰盤古血為淮瀆草木又曰盤古之君身死後毛髪為草木淮南子曰日馮生陽閈陽閈生喬如喬如生幹木幹木生庶木凡根㧞木者生于庶木根㧞生若程若程生𤣥玉𤣥玉生醴泉醴泉生皇辜皇辜生庶草凡根苃草者生于庶草許慎注云日馮木之先根拔生草之先也段成式酉陽雜爼曰日馮生𤣥陽閈𤣥陽閈生麟胎麟胎生幹木幹木生庶木招揺生程君程君生𤣥玉𤣥玉生醴泉醴泉生應黄應黄生黄華黄華生庶草與淮南子小異此盖草木之始也鳥獸淮南子曰羽嘉生飛龍飛龍生鳯凰鳯凰生鸞鳥鸞鳥生庶鳥凡羽者生于庶鳥毛牘生應龍應龍生建馬建馬生麒麟麒麟生庶獸凡毛者生于庶獸注云羽嘉飛蟲之先酉陽雜爼則云羽嘉生飛龍飛龍生鳯凰鳯凰生鸞鸞生庶鳥應龍生建馬建馬生麒麟麒麟生庶獸此盖鳥獸之始也徐整三五厯曰天地之初有三白鳥故生衆鳥龜魚同前又曰介鱗生蛟龍蛟龍生鯤鯤生鯁鯁生建邪建邪生庶魚凡鱗者生于庶魚介墰生先龍先龍生𤣥黿𤣥黿生靈龜靈龜生庶龜凡介者生于庶龜注介鱗鱗之先介墰龜之先也段成式以黿為魭此盖龜魚之始也正朔厯數部二甲子世本曰大撓造甲子呂氏春秋曰黄帝師大撓黄帝内傳曰帝既斬蚩尤命大撓造甲子正時月令章句曰大撓探五行之情占斗剛所建于是始作甲乙以名日謂之幹作子丑以名月謂之支支幹相配以成六旬嵗黄帝定星厯正閏餘以成嵗事至堯定四時成嵗書曰朞三百六旬有六日以閏月定四時成嵗則名嵗之義自陶唐始也正歴代所尚不同故所為之正各異邢昺論語疏有推鄭康成尚書三帛注意謂舜以十一月堯十二月髙辛十二月髙陽十一月少昊十二月黄帝十三月炎帝十一月女媧十二月又推易說卦云帝出乎震謂伏犧也建寅之月又木之始則正當從太昊始也由秦諱政故音從征今尚云然也閏史記曰黄帝起消息正閏餘則閏盖餘分之月也黄帝造厯始正之月朔通厯曰地皇氏分晝夜以三十日為月朔髙氏小史亦云爾八節春秋内事曰伏犧氏建分八節以應天氣晉志曰炎帝分八節以始農功氣候董巴議曰昔伏犧始造八卦作三畫以象二十四氣消息禍福以制吉凶禮記月令注曰昔周公作時訓定二十四氣分七十二候則氣候之起始于太昊而定于周公也賀正通典曰漢髙帝十月定秦遂為嵗首七年長樂宮成制羣臣朝賀儀武帝改用夏正亦在建寅之朔則元日慶賀始于漢髙祖也人日東方朔占書曰嵗正月一日占雞二日占狗三日占羊四日占猪五日占牛六日占馬七日占人八日占穀皆晴明温和為蕃息安泰之候隂寒慘烈為疾病衰耗故杜子美詩曰元日至人日未有不隂時盖傷時之言也推此當由漢世始有其義天慶宋朝㑹要曰大中祥符元年十一月詔以正月三日天書降日為天慶節休假五日中和李肇國史補曰唐正元五年初置中和節新唐書李泌𫝊曰徳宗以前世上巳九日皆大宴集而寒食多與上巳同時欲以二月名節自我為古李泌請以二月朔為中和節王溥唐㑹要曰正元五年五月十一日勑四序嘉辰歴代増置漢宗上巳晉紀重陽朕以春方發生候維仲月勾萌悉達自今以二月一日為中和節二十八日李泌請令文武百寮進農獻穜稑王公戚里上春服士庶以刀尺相遺村社作中和酒祭勾芒祈年榖聚㑹宴樂名為饗勾芒天祺宋朝㑹要曰天禧元年正月詔大中祥符元年四月一日天書再降内中功徳閣其建為天祺節一如天貺節例乾興元年二月禮儀院上言四月一日天書降日節名下一字與御名同合行回避詔以天祺節為名天貺又曰祥符元年六月六日天書降兖州二年五月八日詔曰其六月六日天書降大山日宜令設醮六月又詔在京及諸州並賜休假一日前此遣中使詣宰臣王旦第特令中外賜假四年正月以六月六日為天貺節在京禁屠宰九日詔諸路並禁從歐陽彪之請也伏日厯忌釋曰四時代謝皆以相生立秋以金代火而畏火故至庚日必伏故謂之伏日顔師古曰隂氣將起廹于殘陽而未得升故為藏伏因名曰伏史記秦徳公二年初伏以禦蠱孟康云六月伏日也周無至此乃有之年表云初作伏也先天宋朝㑹要曰大中祥符五年閏十月一日詔以七月一日聖祖下降日為先天節降聖唐㑹要曰㑹昌元年二月十五日詔我聖祖降誕昌辰宜改為降聖節則降聖之號唐武宗先以名節也宋朝㑹要曰大中祥符五年閏十月詔以十月二十四日聖祖降誕延恩殿日為降聖節葢用唐故亊者也冬至通厯曰地皇氏以十一月為冬至髙氏小史亦云賀冬玉燭寳典曰冬至隂陽百物之始日極南影長有履長之慶漢雜事曰冬至陽生君子道長故賀然則當是漢制也臘日禮月令孟冬十月臘先祖魏臺訪議云薦田獵先所得禽獸謂之臘疑特時祭之名云爾然亦伊耆氏之蜡也始臘蜡本一夏后曰嘉平商曰清祀周曰大蜡秦初曰臘巳而為嘉平漢復曰臘也周以来用孟冬至唐貞觀十年始以季冬之寅蜡祭百神開元禮又用臘日盖季冬之月星回嵗終隂已交勞農大享五徳之君各以其終而臘如水土終于辰火終于戍金終于丑木終于未是矣宋朝王于火戌故以戌臘而蜡復别為一祭臘獨以為時序之令又說文云冬至後三戍為臘也厯通厯曰太昊始有甲厯楊泉物理論曰神農立厯日漢律厯志曰黄帝造厯董巴曰伏犧始作八卦三畫以象二十四氣黄帝因之初作調厯尸子曰羲和造厯呂氏春秋曰容成作厯世本亦云黄帝内𫝊曰既斬蚩尤乃命容成造厯以司天也厯名易乾鑿度曰厯原名握先紀曰甲子七十六嵗為一紀二十紀而一蔀首注云握先為厯始之名始言無前也㳂革曰黄帝考定星厯建五行起消息正閏餘謂之調厯後代因之漢有太初唐有麟徳等名也厯日物理論曰疇昔神農正節氣審寒温以為早晚之期故立厯日筭後漢律厯志曰𨽻首作數晉律厯志曰黄帝使𨽻首作筭數博物記曰𨽻首黄帝臣一說𨽻首善筭者也數謝察微筭經曰易稱太極是生兩儀盖數之先也史記曰黄帝建氣物分數孟康謂厯數之分世本曰𨽻首作數九章後漢鄭康傳注曰九章筭術周公作也一方田二粟米三差分四少廣五均輸六方程七傍要八盈不足九鈎股即周禮九數是也渾儀春秋文耀鈎曰唐堯即位羲和立渾儀劉氏厯曰髙陽造渾儀黄帝為盖天則渾儀始于髙陽氏也至舜則琁璣玉衡以齊七政刻漏梁刻漏經曰肇于軒轅之日宣乎夏商之代至周挈壺氏掌之更㸃起于易繫九事重門撃柝一說自黄帝始也帝王后妃部三皇項峻始學篇曰天地立有天皇張愔帝系譜曰天地初起溟涬鴻濛即生天皇一萬八千嵗此稱皇之始也帝由天皇至燧人皆稱皇故有天皇地皇人皇而燧人亦號燧皇及太昊帝王世紀稱曰帝庖犧氏繼天而王為百王先帝出于震未有所因此稱帝之始也皇帝世皇帝記曰五帝之初有天黄皇帝尚書呂刑曰皇帝清問下民盖周穆王始以言唐堯也史記始皇本紀二十六年秦初并天下令曰六王咸伏天下大定名號不更無以稱成功其議帝號王綰李斯等議帝號曰古有天皇有地皇有泰皇泰皇最貴上尊號王為泰皇王曰去泰著皇采上古位號號曰皇帝曰秦兼天下建皇帝之號注云五帝自以徳不及三皇故去皇號三王又以徳不及五帝故損稱王秦自以徳兼二代故兼稱之王夏商之前皆稱帝自周始降帝為王然夏啓之甘誓稱王曰嗟仲虺之誥湯曰惟王不邇聲色則二代雖號帝亦稱王也天子說文曰古之神聖人母感天而生子故曰天子春秋元命包曰女登生子人面龍顔始為天子帝王世紀曰神農無任姒有蟜氏名女登則帝王之稱天子自炎帝始也官家劉向說苑鮑白令之對秦始皇曰天下官則讓賢天下家則世繼故曰五帝以天下為官三王以天下為家蔣濟萬機論曰五帝官天下故傳之賢三王家天下故𫝊之子今指天子為官家則猶言帝王也其義始諸此僧文瑩湘山野録曰真宗問李仲容何故謂天子曰官家遽對云蔣濟言三皇官天下五帝家天下兼三五之徳故曰官家為小異爾按晉書五行志安帝義熙初童謡曰官家養蘆化作荻則晉末之語已云然矣隋唐之前稍云大家自兹世以稱至尊也五運通厯曰太昊木徳王始有甲厯五運項峻始學篇曰天地立有天皇以木徳王則五運之起自天皇氏始也然天地開闢之初溟涬鴻濛萬物未立五運相乗宜未詳也當自太昊為是王子年拾遺記曰伏犧以木徳稱王位居東方以含養蠢化叶于木徳其音附甲號曰木皇此宜五徳相乘之始也後漢班固典引曰肇命人主五徳初始莫不開元于太昊注云謂庖犧始以木徳王也前漢郊祀志贊曰劉向父子以為帝出乎震故庖犧氏始受木徳馮鑑續事始引徐秀帝王年代圖云伏犧為百王首故易曰帝出乎震即帝王五運震為木起自太昊也灸轂子曰五運有二說鄒衍以相勝劉向以相生自伏犧至顓頊以木火土金水相承漢魏以還共遵劉說孟詵錦帶前書亦曰伏犧始以木徳出乎震故曰太皥所尚歴代帝王為正各異故所尚不同邢昺論語疏自夏正尚黑推而上之謂伏犧以上未聞謂女媧尚白神農赤黄帝黑少昊白髙陽赤髙辛黑陶唐白有虞赤宜自太昊始也國號後漢書班固典引曰肇命人主五徳初始厥有氏號莫不開元于太昊注謂太昊號庖犧炎帝號神農黄帝號軒轅盖自燧皇而上止以自名未為天下之號也至太昊始以庖犧為代號云太子唐虞而上皆𫝊之賢故無太子之文夏商之王雖𫝊之子其文畧矣至周始見文王世子之目武王繼之稱太子發此其始也漢天子號皇帝故其嫡稱皇太子漢書髙祖紀五年二月甲午漢王即皇帝位尊太子曰皇太子此其始也后春秋命厯序洛書擿三辟曰人皇九人别長九州離艮地精女出為之后注云離艮卦所推也此稱后之初云三代以上亦無其稱但曰正妃周人始曰王后妃配也自太昊制嫁娶之禮以相配偶然無以妃名其耦者帝王世紀至黄帝乃始有元妃次妃之列此疑妃之初爾韓子曰衛子嗣公愛泄姬恐其因愛以雍己乃尊魏妃以偶泄姬疑魏明帝以三夫人名妃用此兩制皇后周禮天子之妃曰后周人稱王妃曰后秦號皇帝亦稱皇后后繼體之君也周人之稱王妃亦以繼天子之後故也尚書顧命曰皇后憑玉几盖史始以言成王之以道繼人之後也而秦漢以稱天子之妃漢髙紀七年漢王即皇帝位尊王后曰皇后太后史記秦本紀曰昭王母芈氏號宣太后王母于是始以為稱故范睢說秦王有獨聞太后之語其後趙孝成王新立亦有太后用事之說是太后之號自秦昭王始也漢襲秦故號皇帝故亦尊母曰皇太后也太皇漢因秦事母號皇太后故尊祖母曰太皇太后其禮雖始于漢要之自孝武始也按史記景帝二年四月壬午孝文太后崩髙祖薄后也景帝之祖母爾時未號太皇武帝即位迎魯申公議明堂事司馬遷於儒林𫝊乃始稱太皇竇太后好老子言是太皇之號自漢武始明矣竇氏文帝后於武帝為祖母班固於景帝既立則以稱薄后然遷是武帝時人不應誤書也太妃魏以来諸王之母為太妃此盖其始稱也司馬氏之稱帝母其嫡為皇太后所生為皇太妃晉書后妃傳章太妃周氏生哀帝拜貴人帝即位有司議位號詔崇為皇太妃其禮自晉哀帝始也宋朝真宗皇帝亦册楊貴妃為皇太妃晉元帝夏侯太妃四妃天官后妃四星其一為正嫡三為後宮故帝嚳取象于此立四妃而正嫡在其中然黄帝初有元妃嫘祖次妃嫫姆洎形魚氏方雷氏則是四妃之制自黄帝始矣三代有三夫人而無妃號漢有貴人魏始置妃此夫人號妃之始也唐初皇后而降有貴淑徳賢是為四妃也貴妃宋孝武孝建三年初置貴妃位比相國又齊永明元年有司奏貴妃淑妃並加紫綬金章珮干寘玉淑妃魏明帝置淑妃齊永明中有司奏淑妃舊擬九棘以淑為温恭之稱妃為亞后之名進同貴妃加比三司徳妃隋煬帝置徳妃北史后妃傳曰煬帝參詳典故自製美名有徳妃為三夫人賢妃唐百官志内官有賢妃正一品注云因隋制有也而隋志及北史亦無其名當疑唐有國初置也續事始曰隋煬帝置徳妃賢妃公主春秋公羊傳曰天子嫁女于諸侯至尊不自主婚必使同姓者主之謂之公主盖周事也史記曰公叔相魏尚魏公主文侯時也盖僭天子之女也春秋指掌碎玉曰天子嫁女秦漢以来使三公主之故呼公主也續事始曰自古至周天子之女未有封邑至周中葉使同姓諸侯主之始謂之公主也長主蔡邕曰漢帝女為公主姊妺為長公主職林曰漢制皇女皆封縣公主儀服同列侯其尊崇者加號長公主儀服同藩王前漢婁敬說髙祖以長公主妻單于武帝女亦稱衛長公主此為長公主之始矣漢書昭帝紀後元二年二月戊辰帝即位鄂邑公主益邑為長公主即帝姊妹為長公主也建武十五年光武封武陽公主為長公主即尊崇之制云宋朝但帝姊妹乃封長公主大主漢皇帝之始封大長公主號大主史記武帝本紀曰帝以衛長公主妻欒大自大主將相已下皆遺獻之徐廣云武帝姑竇太后女也則大主之號亦自漢始明矣縣主後漢帝女皆封縣公主或别為美名此疑縣主之始也其諸王女自為公主其父得自主婚故也隋唐以来雖諸王之女亦封郡縣但曰某郡縣主也主國漢以来公主所封皆為邑無封國者唐書公主傳亦自髙祖媦同安公主而下亦無其事雖平陽昭公主有起兵叅佐命之功不過死加鼓吹而已至睿宗女華婉以劉后所生始封代國爾后遂為常制云嬪御命婦部四淑儀南史后妃傳叙曰晉武帝初置淑儀為九嬪視九卿唐百官志注云明皇開元中置六儀其一曰淑儀用晉事也國初亦省宋朝㑹要云真宗大中祥符六年正月二十一日又増置淑儀官也淑容南史又曰魏明帝泰始二年置淑容自后或置或否逮于國初亦省不置大中祥符中與淑儀同真宗増置也順儀隋内官有順儀北史后妃傳曰隋煬帝叅詳典故置順儀為九嬪唐除之按唐百官志注曰明皇開元中置六儀四曰順儀國初亦不設真宗復置之與淑儀同時也順容隋九嬪有順容北史曰煬帝置宋朝㑹要真宗祥符中又増置順容之官婉儀北史后妃傳叙曰北齊文宣河清中置婉儀為八十一御女唐初亦無唐志注云明皇置六儀婉儀其四也至宋朝真宗復增置餘見婉容婉容宋朝會要曰大中祥符六年正月二十一日真宗増淑儀以下至婉容凡六官並從一品在昭儀之上昭儀漢元帝置昭儀封后代或省元魏置左右昭儀視大司馬北齊文宣時比丞相唐為九嬪也昭容漢孝武所置南朝亦或置之唐以為九嬪昭媛唐百官志注曰唐因隋制有之而隋志北史俱不載疑唐制也修儀魏明帝所置修儀煬帝以為九嬪修容魏文帝始置修容煬帝叅詳典故復置之也修媛唐百官志注曰唐因隋制有修媛按隋志無之而北史后妃傳北齊文宣河清中置修媛為御女唐以為嬪疑唐采齊制也充儀隋有充儀為九嬪唐㑹要内月篇云自武徳以来有其職也北史曰煬帝置充容漢典有充容則疑漢官也北史曰隋煬帝叅詳典故著之於令也充媛唐志云唐因隋制有充媛隋書及北史隋后妃事皆無文疑亦唐置之也婕妤前漢有婕妤班馬皆見于傳南史后妃傳叙曰婕妤漢舊號盖漢置官也隋煬帝以為世婦而品正第二通典曰漢武置婕妤視上卿比列侯貴人漢光武置貴人為三夫人歴代不常有宋朝真宗復置貴人也美人光武又置美人歴代多有之國初亦置之正四品也通典前漢内命婦有美人才人南史曰晉武帝采漢魏之制三夫人外有才人又云晉武所置而通典内命職漢有才人則疑漢置婦人封春秋左氏傳成公㑹晉敗齊師齊侯自齊關入見保者曰勉之齊師敗矣辟女子女子曰君免乎曰免銳司徒免乎曰免曰茍君與吾父免可若何齊侯以為有禮與之石窌此婦人得封之始也封夫人唐虞夏商公侯之妻尚無夫人之號由周克商列爵惟五于其封國皆稱君其妻皆為夫人其事雜見于詩禮雖皆命于天子亦無封冊之禮漢崔篆母師氏通經學百家之言王莽寵以殊禮賜號義成夫人則夫人之封自王莽始也盖自魯昭公娶于吳為同姓夫人始不命于天子至莽乃加封號云太夫人前漢文帝紀七年十月令列侯太夫人無得擅徽稱如淳云列侯子復為列侯母稱太夫人盖漢制也晉虞譚母亦拜武昌侯太夫人晉始加冊命國夫人宋鄱陽侯孟懐玉母拜國夫人洎隋髙涼洗氏以功封譙國太夫人此夫人封國之始也見通典郡夫人通典曰隋髙涼女子洗氏世為南越首領有功冊為髙凉郡夫人既而冊譙國太夫人此夫人封郡之始也封君戰國時列國臣子有功者時皆封君秦孝公封公孫鞅為商君是也盖未有婦人而封君者漢始有之疑取春秋小君之義爾郡君漢武帝尊王太后母臧兒為平原君平原漢郡此封郡君之始也縣君武帝又封太后微時金王孫家所生姊號修成君修成漢縣此封縣君之始也太君唐制四品妻為郡君五品為縣君其母邑號皆加太君封稱太此其始也朝廷注措部五尊號項峻始學篇曰天地立有天皇號曰天靈即帝王尊號之始也堯曰放勲舜曰重華禹曰文命或以謂三帝之號周列國或有之如楚郟敖杞東樓公莒兹平公是也秦有天下李斯王綰請上尊號曰泰皇至唐髙宗上元二年九月壬辰始稱天皇中宗神龍元年十月上尊號曰應天皇帝景龍元年八月丙戌加號應天神龍𤣥宗開元已后宰相始率百官上尊號以為常制宋朝神宗熙寧中上以虚名無實遂罷之也稱朕朕我也古通稱之秦始皇二十六年始獨天子稱朕云史記曰李斯議天子自稱曰朕也呼上司馬遷作史記凡指斥君尊皆依違不正言但稱曰上太史公自叙書漢武本紀曰今上之類是也今臣子亦呼天子曰上由司馬子長始也蔡邕曰上尊位所在不敢媟言尊尊之意也御袍二儀實録曰唐武徳初用隋制天子常服黄袍及衫後漸用赤黄遂禁止士庶不得服其事自唐神堯始也後又曰赭黄王建宮詞曰日色赭黄相似謂赤黄也今俗又以天子常服淺黄為赭黄也服御唐㑹要曰天寳七年正月二十八日韋韜奏御案床褥望去紫用赤黄制可然則天子服御之以黄自韋韜之請也陛下周以前天子無陛下之呼史記秦李斯議事始呼之耳陛階也所以陞堂天子必有近臣階則以戒不虞臣與天子言不敢指斥但呼在陛下者與之言因卑達尊之義則此號秦禮也漢霍光奏太后亦曰陛下也聖節明皇雜録曰唐𤣥宗八月五日降誕是日宴宰相于花蕚樓源乾曜請以是日為千秋節羣臣獻萬嵗夀酒其後天子誕日節號自兹始也唐㑹要曰開元十七年八月五日源乾曜張說等請以是日為千秋節休假三日至長慶七年十月十日穆宗誕日令天下州府置宴文宗開成二年誕日始禁屠宰此聖節禁屠置宴之始也宋朝俱循用之改元史記秦本紀曰惠文王十四年更為元年乆大國表云初更元年也檢自歴代人君即位為元年中間無改元之制至秦惠王乃始有之漢興多因秦故故文帝因之亦有中元後元之改迄今以為常故改元之始由秦惠王也章衡編年通載曰魏惠王五十六年更為元年又曰以相王初改元稱一年太史公書誤分為二王之年數後十年秦始更元年也年號始自漢武帝建元元年顔師古前漢書曰自古帝王未有年號始起于此而紀年通譜云道書有赤明上皇無極永夀等號揚雄蜀王本紀云望帝禪位鼈靈靈稱叢帝號方通萬嵗考古逮周未有此禮戰國時秦王見藺相如奉璧田單偽約降燕馮諼焚孟甞君債劵左右及民皆呼萬嵗盖七國時衆所喜慶于君者皆呼萬嵗秦漢以来臣下對見于君拜恩慶賀率以為常山呼後人以呼萬嵗為山呼者其事盖起于漢武時按前漢武帝本紀曰元封元年正月登嵩髙御史乗屬在廟傍吏卒咸聞呼萬嵗者三迄今三呼以為式而號山呼也又太始三年二月禮日成山登之罘山稱萬嵗上夀通典曰禮有獻醻無上夀惟詩大雅云虎拜稽首天子萬夀豳風曰為此春酒以介眉夀非灼然明文要是彷彿其事古者詩工皆歌之故得而言也漢興叔孫通定儀七年長樂宮成諸侯朝禮畢置酒殿上尊卑次起上夀其事本起于此史記項羽與漢王飲鴻門項莊入為夀則兹事已見于漢初矣按淳于髠傳髠對齊威王有侍酒于前奉觴上夀之語及楚莊王置酒優孟前為夀皆戰國時事盖不自漢始也春秋之間亦無聞焉疑即七雄之禮云起居又曰唐貞觀十三年房喬奏請三日一臨朝二十三年九月十八日太尉無忌奏請視朝坐日髙宗報曰朕即大位今已後每日常坐永徽元年十月五日勑京官五品依舊五日一㕘二年八月十九日詔此後每五日一度太極殿視事朔望即為常式盖今五日起居之始也漢書循吏傳曰漢宣五日一聽事則彷彿起居之事其禮雖見于漢要自唐始行之也記注漢武有禁中起居後漢明徳馬皇后自撰顯宗起居注盖周禮左右史之事耳謂之起居注則自前漢始也唐藝文志亦有獻帝起居注自兹歴代咸有也時政紀唐㑹要曰永徽以後左右史惟得對仗下後謀議皆不聞姚璹請仗下所言軍國政要宰相二人撰録號時政紀又李吉甫對憲宗問時政紀曰是宰相記天子事以授史官之實録也古左史記言今起居郎是右史記動今起居舍人是永徽中宰相姚璹慮造膝之言或不下聞因請隨奏對而記是則其事起自唐髙宗時姚璹之請也索扇唐書明皇時蕭嵩為相以為天子升降俯仰衆人皆得見之非肅穆之容也奏請凡朔望受朝備羽扇于殿上將出臨朝承㫖索扇扇合上坐坐定去扇禮畢上將退又索扇如初則此制之始自蕭嵩請也入閤宋朝會要曰唐敬宗始御紫宸殿羣臣展入閤之儀後唐天成初又以月望入閤國朝以舊制皆以月朔閤門先期舉奏詔可即施行康定二年八月宋庠奏唐每坐朝之日即為入閤叔世亂離五朝草創大昕之制正衙立仗遂廢後或有行者人所罕見乃復謂之盛禮開元舊禮無開寳中増附始載月朔入閤之禮又丁度奏入閤是唐隻日紫宸殿受常朝之義云延英唐書韓臯曰延英之置肅宗以苖晉卿年老難歩故設之耳後代因以為故事宋朝㑹要曰康定二年八月宋庠奏唐自中葉已還雙日及非時大臣奏事别開延英賜對今假日御崇政延和是也廊飡唐㑹要曰貞觀四年詔所司于外廊置食一頓五代㑹要曰唐室升平日常叅官每日朝退賜食謂之廊飡今起居幕中賜酒饌是也盖自唐太宗始也内道塲贊寧僧史畧曰魏太武始光二年立道塲神䴥四年諸州悉立盖誕日也寧云生日暫建道塲法㑹耳始光中是帝自崇福之始也神䴥中是臣下奉祝之始也即今代所行皆是唐代宗時始誦仁王經盖自元載王縉始倡之云五代㑹要曰周廣順二年七月勑臣寮遇聖節底于寺觀起置道塲皆是率醵今後中書門下與百官樞宻院與諸司使副馬歩軍都指揮使各共設齋故迄今以為故事也避殿史記吳王濞傳曰七國反吳王既敗走景帝詔將軍曰楚王卭等重逆無道燒宗廟朕素服避正殿則其事始自漢景帝也孝宣之世亦行其禮秦漢已上未聞事始謂自明帝始非也損膳事始云後漢鍾離意諫明帝起北宮疏曰陛下躬自克責降避正殿損常膳録記以為二事之始今檢意傳疏文止言避正殿而無損膳之語又前漢文帝紀已書徹服損膳及賈山上疏文帝言治亂名至言有陛下即位自勉以厚天下損食膳不聽樂則事始所記謬矣按周官膳夫掌王食羞王日一舉鼎十有二物皆有爼齊日三舉大喪大荒大扎天地有烖邦有大故皆不舉是則王不舉者損常膳也疑兹禮有周舊典云爾盖自周公制禮之始也迄今國有災減日食避正殿行之為式輟朝唐㑹要曰開元十八年十一月張說薨輟朝罷元㑹又太和三年七月崔龜從奏云貞觀中任瓌卒有司對仗奏聞太宗責其乖禮岑文本沒其夕罷警嚴張公謹亡哭不避辰日臣謂大臣薨禮合輟朝推是則太宗以來尚未行兹禮也㑹要首録開元事當是自明皇始也殿門沈括筆談曰周禮天官掌舍無宮則供人門今謂之殿門天武官極天下長人之選上御前殿則執鉞立于紫宸門下行幸則為禁圍行于仗門之前今俗謂為鎮殿將軍者也盖始于古人門衡門又曰宮殿行幸有衡門十人選武力絶倫者為之上御殿則執檛東西對立殿前亦古虎賁之類也虎賁盖周制見周官也匭函唐㑹要曰武后垂拱二年六月置匭以達下情盖取白獸樽之義也今登聞所投此其始也梁天監元年于公車府立謗木肺石置函欲有横議投謗木于函則唐之置匭用此也宋朝興國九年七月改為檢而民間猶呼之登聞鼓昔堯置敢諫之鼓即其始也用下達上而施于朝故曰登聞晉施廣盜官慢令棄市子宗及雲撾登聞鼓治理政體部六進貢尚書禹貢禹别九州始任土作貢孔安國注謂貢賦之差堯時事則進貢之始在禹平水土之後也賞賜又曰車服以庸自唐虞即然商功懋懋賞周有車馬器服之等此賞賜之始也賜服呂夷簡三朝寳訓曰建隆三年十月賜近臣冬服有司言累朝故事止賜將相學士諸軍大校太祖曰不賜百官甚無謂也宜並賜之自是文武常叅官悉及盖唐已来品官在職即有衣俸罷即随住太祖始通給也王沂公筆録曰公服舊制冬亦單甞賜單製太祖訝詰有司以前代之典上特命改製今有夾服自此始也吏禄筆談曰天下吏人素無常禄惟以受賕為生熙寧三年始制天下吏禄而設重法以絶請託借緋通典曰開元八年二月勑都督刺史品卑者借緋及魚袋唐㑹要曰二月二十日也又曰舊制凡授都督刺史階未及五品並聽着緋佩魚離任則停則借緋之制自唐明皇始也宋朝賜緋者亦借紫而相承不佩魚借紫又通典曰唐武后天授二年八月右羽林大將軍建昌王攸寧借紫衫金帶九月二十六日除納言依舊着紫帶金龜則借紫之制自則天時武攸寧始也執笏禮受命于君前以笏三代之制也古者貴賤通用書君上政令後代惟八座尚書執之其餘公卿執手版主敬示非記事官至後周武帝保定四年始令百官執笏版簿周禮司民掌登萬民之數自生齒已上皆書于版小宰聽閭里以版圖今州縣有丁口版簿即此盖始于周也鬻官㳂革曰鬻爵賣官三代無有起于秦漢之𣙜利通典曰漢文納晁錯言令人入粟六百石爵上造萬二千石為大庶長漢武元朔元年國用空竭募人入奴婢終身以為郎即賣官之始也靈帝懸鴻都牓開賣官路今亦有大理寺丞及殿直者告身印通典曰唐明皇開元二十三年七月吏部尚書李暠奏告身印與曹印文同請加告身兩字即吏部告身之印始自唐李暠也放房錢宋朝㑹要曰大中祥符五年正月以雪寒應店宅務賃屋者免僦錢三日此雨雪免房錢之始也七年二月詔貧民住官舍者遇冬正寒食免僦直三日此節日放免之始也休沐史記李園事春申君謁歸故失期則假告已見于戰國漢律吏得五日一休沐言休息以洗沐也鄧通洗沐不出張安世休沐甞出門是也唐㑹要永徽三年二月十日以天下無虞百司務簡毎至旬假許不視事以寛百寮休沐然則休沐始于漢其以旬休則始于唐也戸帳又曰武徳六年三月令天下戸每嵗一造帳籍開元十八年十一月勑諸戸籍三年一造此戸口有帳之初也戸等又曰武徳六年三月令天下戸量其資産定為三等九年三月二十四日又為九等此戸有等第之始也正元四年正月仍令三年一定為常式宋朝因之為五等次宴今聖節後大宴曰次宴宋朝㑹要曰建隆元年二月以長春節大宴廣徳殿誕聖節大宴自兹始也春宴又曰太平興國三年三月大宴大明殿春宴自兹始也乾明節在十月故太宗朝止設春宴咸平三年九月大宴含光殿真宗朝聖節外始備設春秋二宴自此為定制秋宴又曰建隆元年八月大宴廣徳殿太祖朝長春節二月故止設秋宴此盖其始也射宴又曰景徳元年十二月四日命右保吉賜契丹使宴射于玉津園自後凡其使至皆賜宴射此其始也利源調度部七井田通典曰黄帝始經土設井以塞爭端立歩制畝以防不足使八家為井井間四道此井田之原也其法肇于黄帝成于大禹備于周壊于秦也水利㳂革曰井田廢溝澮湮水利所以作也本起于魏李悝通典曰魏文侯使李悝作水利常平漢宣帝時數豐稔耿夀昌奏諸邊郡以榖賤時増價糴入貴則減價糶出名曰常平此其始也宋朝㑹要曰淳化三年六月京畿大穰物價至賤遣使于京城四門置場増價糴令造倉貯之名曰常平嵗歉減價以糶用振貧民景徳三年正月上封者請諸路皆置義倉通典曰隋文帝開皇五年長孫平奏令諸州百姓勸課當社共立義倉唐太宗貞觀中戴胄言隋天下之人節級輸粟名為社倉又韓仲良奏王公已下應墾田者畝納二升貯之州縣以備凶年賑給百姓始為義倉盖其事自隋始也宋朝㑹要曰建隆四年三月詔諸州所屬縣各置義倉官所收二稅每石别輸一斗貯之以備凶儉給與人民倉名倉所以貯國儲也商有鉅橋漢有成臯敖倉及常平隋有黎陽自古亦無名額通典食貨篇隋文開皇三年華州置廣通倉則倉有名額此其始也六帖乃云吳倉春申君所造名均輸武王發鉅橋之粟孔安國以為紂所積之倉也兩稅唐食貨志曰自開元已後租庸調法弊代宗時始以畝定稅至徳宗相楊炎遂作兩稅法夏輸無過六月秋無過十一月是兩稅之始肇于開元天寳兵興之後也按春秋宣公十五年秋初稅畝公羊傳云稅畝者何履畝而稅也則今之稅以畝計此其初也其事雖出于唐代宗亦縁春秋稅畝之事爾其輸以夏秋乃自徳宗始也商稅孟子曰文王之治岐關市譏而不征又曰市㕓而不征則天下之商皆恱而願藏于其市矣則是夏商二代商無稅矣又曰古之為市以其所有易其所無有司者治之爾有賤丈夫焉必求龍斷而登之以左右望而罔市利故從而征之征商自此賤丈夫始矣此盖商賈之初有稅也周官司關曰國有凶禮則無關門之征趙岐曰王制云古者關譏而不征謂文王以前周禮關門有征謂周公以来通典曰漢武始稅商賈時征伐四夷國用空竭興利之官自兹始也雖原起于漢亦自孟子征賤丈夫之事雜稅自夏后始為貢法至商而助周人以徹其取于民也有制故國有定賦而無横斂周衰之末諸侯以强霸相尚兵革不息故費慱而什一不足此雜稅之法所由起也漢有名件矣盖自孝武筭舟車也唐建中元年九月趙贊請天下所販竹木茶漆皆什一稅之也稅草唐書食貨志曰貞觀中始稅草以給諸閑則稅草起自唐太宗也稅錢㳂革曰晉齊梁時凡貨牛馬田宅有文劵者率輸四百入官賣主三買主一盖始于漢武筭緡𣙜酤通典曰漢文帝時初𣙜酤㳂革曰漢武帝天漢三年始𣙜酒酤也𣙜茶起于唐建中貞元之間趙贊張滂建白稅其什一一云徳宗貞元八年張滂奏收茶稅唐㑹要曰貞元九年正月初稅茶先是張滂奏請于出茶州縣及茶山要路定三等每十稅一茶之有稅自此始也一云穆宗時王涯始𣙜茶𣙜鹽其始原于唐第五琦及劉晏代其任大厯末一嵗征賦所入鹽當天下大半之賦鹽鈔筆談曰陜西顆鹽舊法官自般運置務拘賣兵部貟外郎范祥始為鈔法令商人就邊郡入錢至解池請任私賣得錢以實塞下行之既久鹽價時有低昻又于京師置都鹽院也漕運㳂革曰秦代匈奴令天下飛芻輓粟此漕運之始也屯田事始曰昭帝紀始元二年詔發習戰射士詣朔方調故將吏屯田張掖謂為屯田之始非也按西域傳曰自武帝初通西域置校尉屯田渠犂又征和中桑𢎞羊奏言可遣屯田卒益種五榖張掖酒泉然則屯田盖起于漢武開西域之時也職田孟子曰卿已下必有圭田禮王制曰圭田無征周官亦有大夫之采地此職田之起也晉有芻藁之田後魏給公田北齊自一品已下各有差武徳元年十二月制外官各給職分田則職田之名唐始有之也宋朝㑹要曰咸平二年七月真宗欲復典職田詔杜鎬等檢討故事縁革復給之也官米宋朝㑹要曰天禧元年三月以京十四場糶米令毎場日加至五百石今諸倉糶米疑起自此官炭又曰大中祥符五年十二月六日帝謂王旦曰民間乏炭秤二百文令三司出炭四十萬減價鬻與貧民非惟抑髙價且以濟民六年遂置以備濟民}
