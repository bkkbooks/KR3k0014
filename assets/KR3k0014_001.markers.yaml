  - {type: variant, offset: 4, length: 0, content: '', WYG: 卷一宋髙承撰天地生植部一元氣列子曰太易未見氣也太初者氣之太始也太始者形之始也太素者質之始也形氣質具而未離故曰混沌髙氏小史曰太易氣象未分太初氣象始萌太始氣象初端太素氣形變質太極形質已具然則元氣之始自太初也徐整三五厯紀曰嵗起攝提元氣肇始有神人號天皇遁甲開山記曰厲山氏分布元氣也天地清輕者上為天濁重者下為地冲和氣者為人循之不得名曰易一變而為七七變而為九九復為一一者形變之始也清輕重濁清以陽發故氣冲為天濁以隂凝故氣沉為地天地形别謂之兩儀列子曰視之不見聽之不聞周易繋辭曰易有太極是生兩儀髙氏小史曰兩儀分五運通二體分形離為清濁三五厯紀曰天地渾混如雞子盤古生其中萬八千嵗天地開闢陽清為天隂濁為地盤古在其中一日九變神于天聖于地天日髙一丈地日深一丈盤古日長一丈如此萬八千嵗天極髙地極深盤古極長後乃有三皇此天地人之始也四方王希明太一金鏡經曰昔燧人氏仰觀斗極而定方名東西南北是也則四方之名盖始自燧皇定之日月天地開闢萬八千嵗而盤古死帝王五運厯年紀曰盤古死後左目為日右目為月山海經曰東南海之外甘水之間有羲和之國有女子曰羲和羲和者帝俊之妻是生十日郭璞注云羲和盖天地始生日月者也星辰馬揔通厯曰地皇氏定星辰後漢天文志注曰黄帝分星次凡中外官常明者百二十四可名者三百二十微星萬一千五百二十黄帝創制之大畧也禮記乃云帝嚳能}
