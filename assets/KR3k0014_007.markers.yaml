  - {type: variant, offset: 6459, length: 410, content: 諸軍事某州刺史宋朝以他官知州事而刺史下臨州以為武臣加官而已舊唐志云初漢奉使者皆持節故刺史臨部持節晉任重者為使持節部督後魏北齊加諸軍事也知州唐李師道之阻兵也謂其弟師古曰是不更民疾苦要令知衣食所從乃署知密州唐會要曰太和四年八月御史臺奏按大歷十二年五月一日敕刺史有故乃闕但令上佐依次知州事則知州之名自代宗始也宋朝之制自大都督府至下州親王為大都督庶姓為長史餘使及刺史有故及闕但令上佐依次知州事太祖始削外權止令文臣權莅後為知軍州事二品以上及帶兩府宣徽者稱判國老閑談曰太祖嘗語趙普以唐室亂源在諸侯難制何術以革之普曰諸列郡以京官知三年一替則無虞迄今行之也通判國家初置諸州通判楊文公談苑云太宗始置即古監郡也宋朝會要曰建隆四年四月命賈玭等充荊南諸州通判又乾德四年十月詔書已有通判又建隆乾德皆太祖年號則是此官之設自太祖始也按唐室上州置長史一人掌通判州事則通判之名亦取唐制州長史之職為稱耳勸農漢承秦置大農丞十三人人部一州以勸農桑力田者此勸農官, WYG: ''}
