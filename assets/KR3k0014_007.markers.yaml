  - {type: variant, offset: 9588, length: 4, content: 敵樓作瓮, WYG: 陣亡將士追福徳神虎三部落營地造天聖初成賜名資聖太祖太宗忌日皆就建道場崇真院又曰崇真院初太宗陳國長公主出家大中祥符二年八月進封吳國號報慈正覺大師賜名清裕九月出居是院初在建初坊後以迫隘徙}
