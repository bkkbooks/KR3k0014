  - {type: variant, offset: 9574, length: 2, content: 而成, WYG: 改名崇聖慈孝寺又曰慈孝寺故駙馬都尉吳元扆宅也天聖二年十二月十二日詔建寺奉真宗神御初議名慈聖時太后號有此二字改賜今名東京記曰戒壇院本寺園寳元初僧文旦營創戒壇慶厯五年賜額也開寳寺東京記曰北齊天保十年置號獨居寺唐開元十七年明皇東封改曰封禪寺}
