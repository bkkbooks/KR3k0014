  - {type: 'tls:seg', offset: 9623, content: '', id: KR3k0014_CHANT_007-105a.6}
  - {type: variant, offset: 9623, length: 0, content: '', WYG: 月賜道士𤣥秘大師馬志通議大夫階道封後周武帝時衛元嵩封蜀郡公盖道士受封之始也葉法善𤣥宗時亦封越國公道贈唐王知逺贈昇𤣥先生葉法善贈金紫光禄大夫越州都督道士之褒贈盖自王知逺始也道諡梁代陶洪景死賜諡貞白先生則道之諡自梁陶隠居始也道號元魏世祖時賜冦謙之天師之號後漢張道陵亦有天師之稱盖自列子言黄帝之稱牧馬童子曰天師始也唐𤣥宗賜李含光曰𤣥静先生此賜號先生之始也宋朝縁唐事亦有賜號先生處士者真宗陳摶賜號希夷先生神宗時張噩賜號沖靖處士是也道紫唐中宗神龍初葉静能雖加金紫之階而未頒紫衣至代宗時李泌立大功李輔國將不利之泌乞為道士許之又賜紫衣其後道士賜紫自李泌始也朝野僉載曰史崇𤣥附太平公主授鴻臚卿衣紫羅裙帔蓋雖衣之而未賜也佛像漢書霍去病過焉耆山得休屠王祭天金人顔師古注云作金人為天神之主今佛像是其遺法後漢明帝夢金人長大頂有日光傅毅曰天竺有得道者號曰佛於是遣使天竺圖其形像此中國有佛像之始也宋書云漢世始有佛像也佛塔髙僧傳曰康僧㑹吳赤烏十年至建業孫權使求舍利既得之權即為造塔晉帝過江更修飾之此蓋中國造塔之始也佛經漢明帝永平中摩騰竺法蘭以白馬䭾經至東都即四十二章經中國之有佛經此蓋其始也鄴城舊事云永平十年經像初來也譯經漢自永平後摩騰首譯四十二章經歴魏晉南北朝皆有翻經館唐置譯經潤文之官元和後廢宋朝太宗興國中復興其事置譯經院也談禪寳林曰佛涅槃時告迦葉曰吾清淨法服以付汝迦葉傳阿難二十八代至達摩梁普通中自南天竺泛海至廣州後止崇山住少林寺傳恵可中國談禪自此始也讚唄僧史畧曰讚唄原始按十誦律中俱胝耳作三契聲以讚佛後趙石勒時建中神降安邑諷詠經音七日方絕僧有摹寫為梵唄焉此讚梵之始也續搜神記曰晉太元中竺曇遂死作清溪廟神諸道人詣廟便靈語云久不聞唄聲其伴恵範為作之即是自晉已有讚唄非始於石勒時也戒律又曰漢靈帝建寧三年安世髙首出義決律二卷次有比丘諸禁律魏世天竺三藏曇摩迦羅到許洛慨魏境僧無律範遂於嘉平中興曇諦譯四分羯磨及僧秖戒心圖此蓋中國戒律之始也戒壇又曰漢魏之僧雖剃染而戒法未備唯受三歸嘉平正元中既傳戒律立大僧羯磨法斯蓋比丘立戒壇之始也又曰起于南朝求􅄼䟦磨為宋國比丘於蔡州岸受戒為始自爾南北相次為壇受戒又曰北方受戒自魏朱士行為之首也尼壇又曰受戒初本僧尼同壇本朝太祖不許尼徃僧中自是始别為壇宋朝㑹要曰開寳五年二月詔自今尼有合度者只許於本寺起壇受戒蓋自此始别立尼受戒壇也尼戒薩婆多師資傳曰宋元嘉十一年師子國尼鐵索羅等於建康南林寺壇上為景福寺尼恵果淨音等受戒法事北方尼受戒自恵果等始也僧後漢明帝遣蔡愔等徃天竺訪僧法於彼見摩騰乃要還漢地此中國有僧之始也僧史畧曰漢明聽陽城侯劉峻等出家此又中國之人為僧之始也注新唐書傅奕上疏曰浮圖法漢明始立胡祠然惟西域桑門自傳其教西晉已上不許中國削髮事胡石苻亂華乃㢮厥禁此宜中國為僧之始尼僧史畧又曰漢明帝既聽劉峻等出家又聽洛陽婦女阿潘等出家此蓋中國尼之始稱釋髙僧傳曰出家從師命氏晉道安受業佛圖澄澄姓帛氏安以師莫過佛遂以釋為姓僧之稱釋自道安始也度牒僧史畧曰度牒自南北朝有之見髙僧傳名籍限局必有憑由憑由}
