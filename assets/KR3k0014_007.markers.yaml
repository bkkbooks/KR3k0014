  - {type: variant, offset: 11209, length: 0, content: '', WYG: 八十一章為難經本草帝王世紀曰炎帝嘗味草木宣藥療疾著本草四卷至梁陶洪景唐李世勣等注叙為二十卷宋朝開寳中重校定仁宗嘉祐中命掌禹錫等集類諸家叙藥之說為補注本草唐書于志寧傳志寧云班固惟記黄帝内外經不載本草齊七録乃稱之世謂神農嘗藥黄帝以前文字不傳以識相付至桐雷乃載篇册然所載郡縣多漢時疑張仲景華佗竄記其語梁陶洪景本草序云此書應與素問同類其餘多與志寧之說同也百藥淮南子曰神農始嘗百草之滋味當此之時一日而七十毒世本曰神農和藥濟人則百藥蓋自神農始也世紀或云伏犧嘗味百藥非也梁陶洪景本草序曰神農氏王天下宣藥療疾以拯夭傷髙氏小史曰炎帝嘗百藥以治病嘗藥之時百死百生九鍼帝王世紀}
