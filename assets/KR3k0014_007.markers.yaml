  - {type: variant, offset: 11207, length: 1, content: 會, WYG: 太宗求天下名方集太平聖恵其餘紛紛無代無之髙氏小史曰炎帝作藥方以救時疾小方孫思邈千金方曰小兒六歳以上黄帝無說中古有巫妨始撰顱􅇟經以占夀夭自兹始有小方則小兒方藥始於巫妨也難經帝王世紀曰黄帝命雷公岐伯論經脈旁通問難八十一為難經楊元操難經序曰黄帝八十一難經者秦越人所作按黄帝内難二帙帙九卷其義難究越人乃採精}
