  - {type: variant, offset: 11811, length: 1305, content: 之曰侍中寺晉志曰給事黃門侍郎與侍中俱管門下眾事故謂之門下省然則晉始名之也唐志曰晉始置門下省也中書省中書之官雖起自漢武而所治之府魏晉始有之謂之中書省通典曰中書之官舊矣謂之中書省自魏晉始焉鳳池世謂中書曰鳳池者按晉荀勗為中書監遷尚書令勗久在中書失之甚恚有賀之者怒曰奪我鳳皇池何賀故今以為稱也尚書省通典曰堯試舜於大麓領錄天下事似其任也周之司會又其職焉鄭康成云司會若今尚書也漢有尚書臺宋始曰尚書省也都省漢以僕射總理六尚書謂之都省至唐垂拱中改尚書省曰都省是則都省之號始自漢也南省晉以門下名省號北省故以尚書為南省是則南省之稱始自晉也蘇鶚演義曰省省也謂省察天下簿書之所御史臺秦漢有御史府亦曰寺亦曰憲臺後漢始曰御史臺亦為蘭臺寺舊唐志則曰後漢改為憲臺魏晉宋曰蘭臺梁陳北朝曰御史臺也臺門御史臺記曰臺門北開取肅殺就陰之義韋述唐兩京記曰臺門北開以糾劾之司主意於殺故門北啟以象陰殺或曰俗傳開南門不利大夫譚賓錄曰或云隋初移都兵部尚書李圜通兼御史大夫欲向省便故開北門唐因循不改迄今遂為故事唐會要載裴冕語云此說若取冬殺之義本置臺司以糾正冤濫是有好生之德豈創冬殺之義以入人罪乎馮鑑以冕說為當柏臺漢成帝時御史府列柏樹故人由是號柏臺烏府漢御史府植柏常有野烏數千棲宿其上晨去暮來號朝夕烏一旦烏不至及朱博為大夫烏復至因號烏府亦曰烏臺九寺漢以來九卿所治之府謂之九寺後魏始有三府九寺之稱然通其名不連官號其以官名寺自北齊始也蘇氏演義曰寺司也官有所司存釋名曰寺嗣也官曹相嗣續其中非也許慎曰寺從叉從寸寺者掌法度之所叉者手象如手持尺寸以度其典章耳祕書省漢藝文志曰武帝建藏書之府置寫書之官天下文籍悉在天祿石渠圖廣內祕室之書故曰祕書後漢有蘭臺東觀雖孝桓始置祕書監而不以名其省至梁始曰祕書省也唐六典曰祕書省中外三閣掌圖書古今文字皆在禁中宋朝神宗改官制易崇文院曰祕書省復唐制也殿中省魏置殿中監而北齊以屬門下隋大業三年分門下太僕二局取殿內之名為殿內監唐為殿中省也國子監晉武帝咸寧四年初立國子學國子周舊制也北齊為國子寺隋開皇十三年又為學煬帝即位改曰國子監少府秦置少府而不治府漢始有之隋煬帝大業五年始曰少府監也將作秦漢有將作而不列其府北齊始有將作寺隋文帝開皇二年改寺為監軍器後周武帝置都水漢武元鼎二年始置水衡初秦有都水丞於是水衡方有都水帝置都水謂之都水臺隋文仁壽元年始改為監太史局少昊歷正曰鳳鳥氏夏曰太史隋以名謂曰太史曹煬帝改曰監唐曰局乾元元年曰司天臺後復曰太史宋朝以來亦曰司天臺神宗改官制復為太史局也太醫局周有醫師秦置太醫歷代皆置宋朝神宗又置局曉醫者一人判局事按唐亦有太醫署而神宗創置以教生徒如學校也入內省宋朝會要曰國初有內中高品班院淳化五年改曰入內班院又改入內黃門班院又改內侍省入內內侍班院景德三年止名入內內侍省也又云景德三年五月內侍省內侍班院請入內內侍班院止稱入內內侍省本班亦請稱內侍省也東京記曰舊有入內都知司內東門都知司至是悉併於此內侍省周官有巷伯寺人及內小臣之職戰國時趙有宦者令秦置中常侍漢有謁者內侍之官而不言其府北齊始置中侍中省隋改曰內侍宋朝會要曰國初有內班院淳化五年改黃門院又改內侍省內侍班院景德三年止曰內侍省進奏院唐大歷十二年敕諸道舊置上都留侯院並官改曰上都進奏院, WYG: 筮}
