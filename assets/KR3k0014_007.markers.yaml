  - {type: variant, offset: 9612, length: 1, content: 改, WYG: 封號靈濟公也昭應公在河南府永安縣至道二年十月太宗山陵乏水半山下忽有泉湧山陵使元份以聞詔立廟泉側賜名昭聖景徳四年特封昭應公嘉應侯熈寧間百姓共立東嶽張太尉祠於國城之外東南隅俗傳神姓張氏淮隂人死隸嶽神主隂府要職京東州郡徃徃有祠世謂張舍人者是也至此號太尉元豐中光獻太皇太后祈有感始封嘉應侯號靈恵侯元豐時國城之西民立灌口二郎神祠云神永康導江縣廣濟王子王即秦李氷也㑹要所謂氷次子郎君神也今上即位勅封靈恵侯東嶽諸祠大中祥符元年十月十五日詔封泰山上通泉廟為靈泒侯亭亭山為廣禪侯嶧山神為靈巖侯普濟廟在}
