  - {type: variant, offset: 10173, length: 310, content: 道俱威儀教坊作樂奉真宗御集御書自玉清昭應宮安於閣上也此其始云東京記曰天章閣天禧五年三月建以藏真宗御集寶文閣東京記曰本名壽昌閣與天章並建慶歷初改日寶文仁宗聖文神翰秘於此也資善堂仁宗肄學之所也宋朝會要曰在元符觀南大中祥符八年置天禧四年徙御廚北也又曰祥符九年二月詔元符皇子就學之所宜以資善堂為名繼聖堂東京記曰太宗尹京命署東建堂習射大中祥符二年閏二月真宗臨幸宰臣請以繼聖為名許之今人呼曰繼聖堂學士院唐武德正觀時溫大雅等以文辭召待詔常於北門候進止玄宗開元二十六年始置學士院始改待詔為翰林學士故也史館史職肇自黃帝而倉頡沮誦掌之周及列國亦有史名漢武置太史公漢以後職在祕書唐太宗始置史館以修國史唐百官志曰歷代史官隸祕書省著作局正觀三年閏, WYG: 詳定}
