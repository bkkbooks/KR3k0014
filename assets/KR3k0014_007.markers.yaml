  - {type: punctuation, offset: 9506, content: 《, id: KR3k0014_CHANT_007-bkkpn1916}
  - {type: variant, offset: 9506, length: 0, content: '', WYG: 東京記曰端拱元年二月太宗詔取晉邸時太祖所賜金帛建宫至道元年八月宫成帝御書額金填其字賜之仁宗慶厯三年十一月遭焚毁熈寧元豐間靈恵法師王太初再營之元祐初年宣仁太皇太后重建置也東太一宋朝㑹要曰太平興國初楚芝蘭言五福太一所在無兵疫人民豐樂凡行五宫四十五年一移自雍熈元年入黄室巽宫在吳分蘇州請築宫以祀六年十月芝蘭又宫都城東南地名蘇村可徙宫以應蘇名遂詔營建注紀年通載則謂興國八年正月作也西太一又曰天聖六年三月司厯言五福太一自雍熈元年甲申及今四十五年太一行綦當入蜀郡之坤宫曰黄庭可於國城西南别建祈宫於是詔擇八角鎖池建西太一宫注紀年通載曰天聖六年三月建太一宫於西郊中太一神宗熈寧初即五嶽觀舊址營中太一宫盖自仁宗天聖六年至熈寧五年壬子四十五年五福太一行綦自黄庭宫移入真室之中下臨京都之中故也建隆觀錢易洞㣲志曰周顯徳中營道宫於皇城之西梁門外賜為太清觀太祖有天下始重飾之因改爲建隆觀集禧觀宋朝㑹要曰大中祥符五年九月詔下謂就南薰門内奉節致逺三營地及墳乾池之西偏建觀以奉五嶽帝七年九月詔名觀曰㑹靈仁宗時觀大既重建改曰集禧池園又曰大中祥符八年五月詔會靈觀池以凝祥為名園以奉靈為名池觀醮殿盖太祖所建池殿舊址也醴泉觀東京記曰本拱聖營天禧元年營卒有見龜蛇者軍士因建真武堂二年閏四月泉湧堂側汲不竭民􅍚疫者飲之多愈乃詔就其地建觀十月觀成名祥源宋朝㑹要曰天禧二年閏四月詔拱聖營醴泉所宜立觀以祥源為名仁宗時觀灾既重立易今名曰醴泉萬夀觀本玉清昭應宫東偏别殿也宋朝㑹要昭應宫篇云天禧三年十一月皇后皇太子於東宫偏長生殿置經藏以祝聖夀詔賜殿名長生崇夀五年七月作皇帝本命殿於宫中名萬夀仁宗朝玉清昭應宫灾所存止此殿重加營葺後以為萬夀觀也注林希兩朝寳訓曰天聖七年七月玉清昭應宫灾上以所存長生崇夀殿為萬夀紀年通載云六月也天慶觀又曰大中祥符二年十月詔天下州府軍監關縣建道觀一皆以天慶為名白馬寺漢明帝於東都城門外立精舍以處攝摩騰竺法蘭即白馬寺也騰始自西域以白馬䭾經來初上鴻臚寺遂取寺名創置白馬寺即僧寺之始也隋煬帝改曰道場後復曰寺尼寺僧史畧曰東晉何充始捨宅安尼此盖尼寺之起也寺額漢取鴻臚寺名置白馬寺以處僧當是以白馬為額耳然則僧寺名額自漢顯宗始也相國寺唐房僚石幢記曰相國寺肇自中宗叶夢始置于兹宋敏求東京記以本北齊大建國寺後廢唐為鄭審宅因病捨為招提坊神龍二年僧恵雲建為寺延和元年睿宗以舊封相王因改為相國寺宋朝㑹要曰至道中太宗御題額易曰大相國寺東塔曰晉滿唐至徳二載建開寳六年太祖修西塔曰廣願元祐元年僧中恵立㑹要又云咸平五年名後閤曰資聖東京記則云景徳五年賜名也神宗熈寧間重修飭之併諸院為八東曰寳嚴寳梵寳覺恵林西曰定慈廣慈普慈智海東京記又曰仁濟殿天聖八年建後與寳奎殿同賜名也景徳寺宋朝㑹要曰本相國寺蔬圃周顯徳中以僧居隘於此别建下院賜額天夀淳化二年别建寺門景徳二年改今額天禧四年建寺廊經樓注}
