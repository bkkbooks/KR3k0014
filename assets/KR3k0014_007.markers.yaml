  - {type: variant, offset: 11553, length: 256, content: 生白匹帛曰雜色匹帛祥符二年併金銀絲緜為一七年併生白雜色為生熟匹帛奉宸庫宋朝會要曰舊五庫一宣聖殿二穆清殿三崇聖殿四受納真珠五樂器康定元年九月合為一庫改名奉宸庫也御殿素廚又曰大中祥符九年置在玉清昭應宮後徙御廚也金水河又曰東京水源曰祝龍泉過中牟曰金水建隆二年春命陳承昭引抵都城西架其水橫絕經汴入浚溝乾德三年引貫皇城歷後苑內庭池沼皆至開寶九年太祖親按引注王第及公主第也五丈河談苑曰京水自滎陽至於汴陳承昭本江南人習知水利國初上言導京水踰汴東北注河通山東之漕其廣五丈以號河其事在太祖時也門下省先秦有黃門郎而無寺府後漢嘉平六年, WYG: 庖犧氏作卦}
