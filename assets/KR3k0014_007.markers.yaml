  - {type: variant, offset: 10495, length: 352, content: 是始別局也昭文館唐會要曰武德四年正月置修文館九年三月改為弘文九月太宗即位弘文殿聚書殿側置弘文館神龍元年十月十九日改曰昭文後復曰弘文宋朝避廟諱復曰昭文與集賢史館同為三館也神宗行官制皆隸祕書省青箱雜記曰本前世弘文館建隆中以犯宣祖諱改焉集賢院唐開元五年乾元殿寫四部書置麗正修書院於集仙殿十三年明皇召張說等宴集仙殿謂說曰今與卿等賢才同宴於此宜改名集賢由是修書院亦曰集賢院祕閣宋朝會要曰端拱元年五月詔就崇文院中堂建祕閣淳化元年八月二十一日李至書言漢桓置祕書監掌禁中圖書祕記魏以屬少府王肅表論不應屬少府曰魏之祕書即漢東觀因是不屬而蘭臺亦藏書故薛夏云蘭臺為外臺秘書為內閣然則祕閣之名始於此矣晉孝武敕徐廣料祕閣四部三萬餘卷是也起居院北齊有起居省宋朝會要曰淳化五年四月五日張泌奏復左右史之職記錄以為起居注太宗從之置院於禁中, WYG: ''}
