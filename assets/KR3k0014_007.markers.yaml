  - {type: variant, offset: 9585, length: 2, content: 面築, WYG: 年宣祖典禁兵太宗誕聖其地興國中建院也普安院又曰普安院周顯徳中建建隆初賜今額奉先寺又曰奉先資福禪院即安陵卜定乾徳二年改卜五月詔就陵域置院也資聖院在新并州㑹要又曰天禧五年真宗置嘗親征}
