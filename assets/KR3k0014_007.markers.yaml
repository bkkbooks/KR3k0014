  - {type: variant, offset: 9514, length: 1, content: 德, WYG: 徳五年以相國寺僧衆居隘就寺蔬圃别建置院分居之俗號東相國寺六年賜額曰天夀恭帝誕節名也又有觀音院峨眉僧茂正所建興國寺談苑曰太平興國寺舊龍興寺也周世宗廢為龍興倉國初寺主僧屢撃登聞鼓求復為寺上遣中使持劍以謂之曰此寺前朝所廢為倉厫以貯寧糧汝何故煩瀆帝庭朝命斷取汝首仍戒之曰儻偃蹇怖畏即斬之或臨刑無懼即未可既訊神色自若引頸就戮上大感嘆復以為寺宋朝㑹要曰唐龍興寺也開寳}
