  - {type: variant, offset: 9323, length: 1, content: 立, krp: 為田開阡陌地里春秋命厯序曰神農度地形甄度四海東西九十萬里南北八十一萬里然則炎帝始有里數矣淮南子則曰萬民喜置堯為天子於是天下廣狹險易逺近始有道里之起自陶唐氏始也按黄帝内傳有記里車則里始於炎帝明矣里路山海經曰帝令豎亥歩天地之東西二萬八千里南北二萬六千里淮南子曰禹使大章步自東極至西極二億三千五百里七十五步又八極之廣東西二億三萬三千里南北二億三萬一千里而黄帝有記里之車按黄帝遊幸天下而車以記里疑道路之紀以里堠起軒轅時也封堠拾遺録曰禹治水所穿鑿處皆青泥封記使𤣥龜印其上今人聚土為界乃遺事也此封堠之始矣儀制令談苑曰太平興}
  - {type: variant, offset: 9325, length: 0, content: '', WYG: 中孔承恭為大理正上言儀制令賤避貴少避長輕避重去避來望令於兩京諸州要害處刻牓以掲之所以興禮遜厚風俗從之今京師諸門關亭皆有之而所在道途雙堠處皆刻之盖自本朝孔承恭始也地名項峻治書曰人皇出於提地之國則提地疑國名也於是國有名則土地國邑之名此為之始也山川名人皇以來土地國邑始各有名則山川之號疑亦從此起故神農興於厲山共工之觸不周炎帝以姜水黄帝以姬水此山川之名之始也書吕刑曰禹平水土主名山川注云無名者主名之於是凡山川皆名之矣山海經洎爾雅所載者是也地圖春秋元命包曰神農世怪義生白阜圖地形脈水道注曰怪義白阜母名圖畫地形通水道之脈也今有地圖疑始於此弓手營宋朝㑹要曰咸平五年八月置縣尉司弓手營舍浮橋春秋後傳曰周赧王五十八年秦始作浮橋於河上按詩大明云造舟為梁孫炎曰造舟比舟為梁也比舟於水加板於上今浮橋也故杜預云造舟為梁則浮橋之謂矣爾雅釋水曰天}
