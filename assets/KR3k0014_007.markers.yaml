  - {type: variant, offset: 9615, length: 1, content: 內, krp: 西南隅景福坊即九龍堂也大中祥符四年六月十九日詔令完葺因賜名普濟廟也靈澤廟在鎮戎軍朝那湫即龍廟秦漢所祠湫淵也天禧二年四月八日賜廟名靈澤顯靈廟在河南府永安縣安陵東北即蛇王祠也景徳四年二月賜廟名顯靈靈恵廟在永安門徘徊泉上即泉神也大中祥符五年江守訓立廟遂賜靈恵名焉靈源廟在衛州共城縣即百門水所出也唐長安中置廟咸平元年春祈雨有應四月詔賜廟額曰靈源豐寳廟景徳三年九月解州上言兩池左右祠廟請易題額詔取圖經所載者賜額遂改解縣池龍廟額曰豐寳安邑曰資寳分雲廟曰廣恵注自此以上除嘉應靈恵二侯}
  - {type: variant, offset: 9617, length: 2, content: 門名, WYG: 其不原所出者皆出宋朝㑹要生祠漢于公為縣吏曹決獄平郡中為立生祠自三代而來無生為立祠者至此始見兹事則生而立祠始於漢世也道釋科教部}
