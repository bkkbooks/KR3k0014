  - {type: variant, offset: 915, length: 0, content: '', WYG: 朝服法物庫太平興國二年置分三庫也裁造院又曰乾徳四年始置裁造院雜買務唐徳宗置宫市以中官主之國初有市買司太平興國四年改為雜買務至道中廢咸平時復置也雜賣務又㑹要云雜賣務景徳四年置懐逺驛又曰懐逺驛景徳三年置以待海南諸國進貢使介也文思院唐有文思院盖天子内殿之比也其事見畫斷然非工作之所而宋朝太平興國三年始置文思院掌工巧之事非唐制矣㑹要云青箱雜記曰考工記㮚氏掌攻金其量銘曰時文思索故今世工作之所號文思院二八作㑹要又云舊八作分兩使止一司太平興國二年分兩司景徳四年又併為一司監官通掌天聖元年始分置官局也箔場又曰建隆元年置箔場二窰務後漢有甄官至歴代皆有之掌塼瓦之事即今窰務之掌也宋朝㑹要曰舊有東西二務景徳四年廢於河隂置受納場}
