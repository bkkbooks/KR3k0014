  - {type: variant, offset: 1879, length: 424, content: 使有內八作使牛羊通典曰太僕之屬北齊有牛羊置令宋朝會要諸司使副有牛羊使諸司庫務有牛羊司開寶二年六月詔文已有大祀所供犢自今委牛羊司豢養之語疑國初官也香藥宋朝會要曰太平興國中以克平嶺南及交趾海南諸國連歲入貢通關市市人歲乘舶販易外物自三佛齊勃泥占城犀象香藥之物充牣府庫始議於京師置香藥榷易院增香藥之直聽商人市之命張遜為香藥庫使以主之此蓋置官之初也榷易又曰舊有香藥榷易院因置使此其本也又曰大中祥符二年二月撥併榷易院入榷貨務而使名不除也氈毯又曰唐有氈坊毯坊使五代合為一使宋朝因之鞍轡又曰唐神策軍有鞍轡庫五代置使宋朝因之酒坊又曰唐有酒坊使宋朝初加內字後去之法酒通典曰梁有酒庫丞宋朝會要曰周太祖平河中得酒工王思善造法麴因法酒庫置使蓋亦梁酒庫丞比也自皇城至法酒庫已上為東班醫官宋朝會要曰淳化五年八月以翰林醫官趙自化為少府監丞充醫官副使按唐會要正元八年八月令侍御醫尚藥直長藥藏郎並留授翰林醫官然則醫官之置使當是唐官也宮苑通典曰宮苑總監自隋置掌苑內宮館園池之事蓋宮苑之職, WYG: ''}
