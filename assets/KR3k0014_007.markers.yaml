  - {type: variant, offset: 9578, length: 0, content: '', WYG: 㑹要曰開寳三年三月改今名福聖院㑹要云初吳越王錢俶在杭州建阿育王塔藏佛舍利歸朝於此建塔云端拱二年成加建塔院咸平二年賜今額東京記云本新羅僧智照所居舍利塔錢俶興國中令俞皓造慶厯四年六月火焚之後即其舊址建閣焉成於}
