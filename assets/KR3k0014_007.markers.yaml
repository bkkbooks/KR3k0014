  - {type: variant, offset: 9517, length: 0, content: '', WYG: 詔重修太平興國元年賜今額傳法院又㑹要曰太平興國五年詔於太平興國寺大殿西度地作譯經院中設譯經堂東序為潤文堂西序為正義堂自是每誕節即獻經也八年改為傳法院按隋有翻經館唐初亦有翻譯之事元和後廢然則太宗之置兹院亦隋翻經館也}
