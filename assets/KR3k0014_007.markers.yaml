  - {type: variant, offset: 9323, length: 1, content: 立, WYG: 為田開阡陌地里春秋命厯序曰神農度地形甄度四海東西九十萬里南北八十一萬里然則炎帝始有里數矣淮南子則曰萬民喜置堯為天子於是天下廣狹險易逺近始有道里之起自陶唐氏始也按黄帝内傳有記里車則里始於炎帝明矣里路山海經曰帝令豎亥歩天地之東西二萬八千里南北二萬六千里淮南子曰禹使大章步自東極至西極二億三千五百里七十五步又八極之廣東西二億三萬三千里南北二億三萬一千里而黄帝有記里之車按黄帝遊幸天下而車以記里疑道路之紀以里堠起軒轅時也封堠拾遺録曰禹治水所穿鑿處皆青泥封記使𤣥龜印其上今人聚土為界乃遺事也此封堠之始矣儀制令談苑曰太平興}
  - {type: page-break, offset: 9323, content: '', id: KR3k0014_WYG_007-12a, image: WYG0920/WYG0920-0186a.png}
