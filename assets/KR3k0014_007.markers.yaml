  - {type: variant, offset: 9326, length: 0, content: '', WYG: 造舟諸侯維舟大夫方舟士特舟夏商尚質等制之文未備故鄭康成以為周制後傳以為秦始疑周有事則造舟而秦乃繫之也溫湯辛氏三秦記曰秦始皇與神女遊忤其㫖唾之生瘡始皇怖謝乃為出溫湯洗除後人因以為驗漢武故事曰秦皇砌而起宇武帝加修飾焉真壇淨社部三十六道觀周穆王尚神仙召尹軌杜冲居終南山尹真人草樓之所因號樓觀盖道觀之初也黄帝内傳西王母授帝白玉元始真容置於髙觀之上時人謂之道觀名觀之義疑取諸此隋煬帝改為𤣥壇後復曰觀注續事始云宋廢國}
