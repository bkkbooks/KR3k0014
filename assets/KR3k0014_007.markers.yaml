  - {type: variant, offset: 9632, length: 0, content: '', WYG: 僧隸唐㑹要曰武后延載元年五月十一日勅天下僧尼隸祠部此祠部轄僧之始也唐志亦云僧帳又曰舊制僧尼簿三年一造其籍一本送祠部一本留州縣又開元十七年八月十日勅僧尼宜依十六年舊籍則僧尼供帳始於此耳僧史畧曰唐文宗太和四年正月祠部請天下僧尼具名申省以憑入籍入籍造帳自太和始也二文不同以㑹要為正本朝用周顯徳事三年一造帳定著于令僧講僧史畧曰僧講自朱士行魏代講道行經始也尼講又曰東晉廢帝大和三年洛陽東寺尼道馨通法華維摩硏窮理味一方宗師此則尼講說之始也僧諡洪明集曰後魏太祖時法果卒諡趙胡靈公此僧賜諡之始也宋朝㑹要曰咸平三月八日梵僧法賢卒諡慧辨四年法天卒諡元覺其後施䕶卒亦諡明悟也道林諡真宗寳録曰大中祥符六年六月甲申詔諡誌公真覺大師宜加為道林真覺大師注宋敏求}
