  - {type: variant, offset: 9583, length: 1, content: 始, WYG: 未以賜之洎閤成遂出以牓也永安院東京記曰本號普慶太宗在晉邸重建以賜僧普潤仍奏今額崇夏寺東京記曰唐大中三年置建隆中石守信以寺門窄狹重造二年八月門成車駕臨幸宋朝㑹要守信重修二門詔治宫材也應天寺後唐夾馬營也即太祖誕生之地景徳二年真宗每幸二月詔建院奉太祖神御如啟聖制度大中祥符二年賜名應天在西京之水北民間謂之瑠璃寺也啟聖院即太宗誕生之地晉護聖營也太平興國六年建院雍熈二年成賜名啟聖東京記曰本晉䕶聖營天福}
