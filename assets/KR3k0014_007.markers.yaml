  - {type: variant, offset: 9607, length: 0, content: '', WYG: 八年置印經院神宗熈寧末廢其院以所印板賜顯聖寺靈宇廟貌部三十七靈顯王在鄭州城東僕射陂側陂本後魏孝文賜僕射李沖里俗因呼僕射陂唐末建廟因陂為名俗誤傳為李靖後唐明宗天成二年贈靖太保晉天福二年八月勅唐衛國公李靖宜封靈顯王顯聖王廟在寧州真寧縣即要冊湫也漢祠官所領唐乾符中封神為應聖侯光化二年封普濟王宋朝太宗在晉邸有神告之應太平興國二年七月}
  - {type: page-break, offset: 9607, content: '', id: KR3k0014_WYG_007-25b, image: WYG0920/WYG0920-0192d.png}
  - {type: page-break, offset: 9607, content: '', id: KR3k0014_WYG_007-26a, image: WYG0920/WYG0920-0193a.png}
  - {type: variant, offset: 9607, length: 0, content: '', krp: 八年置印經院神宗熈寧末廢其院以所印板賜顯聖寺靈宇廟貌部三十七靈顯王在鄭州城東僕射陂側陂本後魏孝文賜僕射李沖里俗因呼僕射陂唐末建廟因陂為名俗誤傳為李靖後唐明宗天成二年贈靖太保晉天福二年八月勅唐衛國公李靖宜封靈顯王顯聖王廟在寧州真寧縣即要冊湫也漢祠官所領唐乾符中封神為應聖侯光化二年封普濟王宋朝太宗在晉邸有神告之應太平興國二年七月}
  - {type: variant, offset: 9608, length: 0, content: '', WYG: 日封顯聖王按張緒續錦里耆舊傳曰太宗尹天府登極前有邠州客打軍巡引見問爭由曰爭說要冊大王上曰有侵傷不均吾為平之若爭要冊大王外邊商量此盖神告之事耳廣濟王在永康軍導江縣李氷廟也秦孝文王時氷為蜀郡守自汶山壅江灌溉二郡開稻田歴代以來蜀人徳之饗祀不絶偽蜀封大安王孟昶又號應聖靈感王開寳七年改號廣濟王英顯王廟在梓州梓潼縣本梓潼神也舊記曰神本張惡子仕晉戰死而廟存唐明皇狩蜀神迎於萬里橋追命左丞相僖宗播遷亦有助封濟順王咸平中益卒為亂王師討之忽有人呼曰梓潼神遣我來九月二十日城陷果克四年州以狀聞故命追封英顯王新息王辰州新息王廟後漢伏波將軍馬援祠也咸平元年三月本州上言水旱祈禱有應請加封號即今號是也廣濟王宣州敬亭山神也宋元嘉二年有錢塘神梓華友人雙霞識之為神同在廟中縣令盛疑焚之來託此山景福中封昭威侯偽唐保大中封昭威王景徳元年知州裴莊請加朝命故追號廣恵王顯應王在泉州是廟舊封昭徳王天禧三年五月本州言歲旱禱之有應故加封號今顯應王是也順濟王筆談曰彭蠡小龍顯異人人能道之熈寧中王師南征有軍仗數十船泛江而南龍即伏其中乗風日數百里有司以狀聞詔封神為順濟王遣禮官林希致詔祠下英烈王大中祥符五年詔杭州吳山廟神宜特封英烈王神即伍子胥時新葺廟故也徳安公即夷門山神也景徳四年十二月加封號徳安公顯應公在京城北即崔府君祠也相傳唐滏陽令沒為神主幽㝠本廟在磁州淳化中民於此置廟至道二年晉國公主石氏祈有應以事聞詔賜名䕶國景祐二年七月封䕶國顯應公炳靈公五代㑹要曰後唐長興四年七月封泰山三郎為威雄大將軍時上不豫泰山僧進藥小康僧請封之宋朝㑹要曰廟在兖州泰山炳靈泰山神三郎也後唐詔封威雄將軍大中祥符七年十月十五日詔封威雄將軍為炳靈公明應公在潤州即焦山大聖祠也大中祥符七年四月詔特封明應公靈恵公在􅀈州烏聊山即唐越國公華神也郡人立祠大中祥符二年詔封靈恵公靈濟公在梓州射洪縣即瀘州刺史陸弼神也弼貶瀘州有善政卒土人為立廟水旱請禱偽蜀封洪濟王大中祥符六}
