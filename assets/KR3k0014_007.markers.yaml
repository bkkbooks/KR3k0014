  - {type: variant, offset: 1070, length: 180, content: 宗淳化中以供奉有四十年不遷者陞授崇班則是五代以來為武臣之職也左右侍禁談苑曰本朝太宗雍熙四年增置左右侍禁宋朝會要曰淳化二年正月置左右侍禁在殿直之上先是供奉官殿直有四十年不遷者故特置崇班侍禁之目左右殿直梁開平二年七月敕有殿直之文又元年宣下宣徽院收管殿前受旨官左右內直等後唐清泰元年七月有殿直都知趙處愿晉天福六年七月敕亦有殿直文則殿直之官梁已有之也三班奉職談苑曰宋朝, WYG: 祖}
