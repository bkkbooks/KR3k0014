  - {type: variant, offset: 8510, length: 211, content: 置令丞則縣令及丞自秦孝公始也漢百官表曰縣令長皆秦官萬戶以上為令減萬戶為長宋朝會要曰周衰六國置縣邑其長齊晉曰大夫魯衛曰宰楚曰公曰尹秦曰令曰長也知縣唐會要曰大中五年十二月景陵有賊斫損神門戟架六年四月裴讓權知縣事蓋知縣之名始起於此矣宋朝會要曰建隆四年六月詔河朔右地魏為大名分治劇邑當用能吏思慎釐於縣務特選士於朝行斷自朕心以重其任大理正奚嶼知大名府館陶縣事監察御史王祐知魏縣楊應夢知永齊縣屯田于繼徽知臨清朝臣知縣自嶼等始也縣丞史記, WYG: ''}
