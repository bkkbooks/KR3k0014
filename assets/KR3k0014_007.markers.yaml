  - {type: variant, offset: 7195, length: 1156, content: 留府軍監皆置焉監皆曰幕職或呼幕客舊唐志云皆天寶後置也馮鑑乃云開元後始有之尚為諸使官屬五代多故始領郡事以為州府職也推官唐百官志曰節察防團使皆有推官舊唐書云天寶續事也書記漢書百官志曰王公及大將軍幕府皆有記室掌章表書記續事始引魏志太祖以陳琳阮瑀為記室文帝與吳質書稱孔璋章表殊健元瑜書記翩翩宋江夏王乃以丘源為掌書記而未為職名唐開元元年敕節度置掌書記自後藩侯得自奏請也又魏志建安中曹洪欲使阮瑀掌書記支使唐置觀察使亦置觀察支使則支使唐置官也續事始曰唐至德初改採訪使為觀風始置判官二人支使二人推官一人也軍判五代會要曰後唐天成二年九月十九日敕刺史州不合有防禦判官今後改為軍判官此蓋置官之本也軍巡又曰梁開平三年十月置左右軍巡使各置巡院宋朝會要云唐末始置後唐分左右也舊開封府以牙校為之開寶六年六月改用士人李萼趙中衡太祖以刑禁之重始任士流也呂夷𥳑三朝寶訓曰開寶六年上謂近臣曰開封府左右軍巡諸州馬步判官比來所在止選牙校為之刑獄事重人命所繫自今當選士流任之也參軍杜佑云參軍後漢末置參諸軍府事若今節度判官漢書曰靈帝以幽州刺史陶謙參司空張溫軍事此其始也本公府官晉始置其官於州齊唐諸曹皆稱之續事始以謂後漢置在州曰司錄事漢司隸屬有功曹從事史兼錄眾事在州為治中漢又有督郵主簿皆錄事之任也晉始置錄事參軍刺史有軍而開府者並置之本為公府官非州職也續事始曰後漢有郡主簿亦曰督郵隋以錄事參軍代之掌句稽文簿舉彈善惡監牌印給紙筆之事開元初京兆河南曰司錄管六曹宋朝京邑大府以京朝官領其事曰知其非京官而資考久次者亦曰知也三輔決錄韋康成為郡主簿是也功曹秦漢有功曹史蕭何為書史掾功曹是也後漢有功曹史主選功勞北齊為功曹參軍今止開封府置餘州皆省也倉曹漢有倉曹史北齊以為參軍今亦獨開封府置也戶曹漢公府有戶曹掾主民戶祀農桑州郡為史北齊與功倉曹同為參軍唐諸府曰戶曹餘州曰司戶兵曹漢公府掾史有兵曹主兵事司隸屬官有兵曹從事史郡國為使北齊同諸曹為參軍今又獨置於開封府也法曹漢公府掾史有賊曹掾主刑法曹之任也歷代皆有或為法曹隋以後與功曹同陳孝意為東郡司法書佐是也唐為參軍事士曹北齊始有士曹參軍今獨開封府置餘州雖有司士又以為散官也司理漢公府有決曹掾主罪法事通典以為法曹之職白氏六帖則云魏置理曹掾蓋法曹也即今司理之任舊制諸州有馬步院及子城院主禁繫訊獄張緒續錦里耆舊傳曰開寶六年秋敕改馬步院為司理院廢馬步都虞候除文資為司理參軍成都雄藩一十六處置左右焉子城院不得禁繫公事呂夷𥳑三朝寶訓曰太祖開寶六年謂近臣曰諸州馬步判官比來止選牙校為之刑獄人命所繫當選士流任之蓋自是始置司理之官也餘見軍巡條唐諸州有馬步使文學漢郡國皆有文學掾則文學漢官也唐會要曰大歷十四年十二月五日諸州府學博士改為文學品秩同參軍唐志曰文學州授於吏部然無職事衣冠恥之故朝以為散官炙轂子曰隋開皇中潞州刺史柳昴表勸學帝令州置博士俾其教授唐肅, WYG: ''}
