  - {type: variant, offset: 9617, length: 2, content: 門名, krp: 其不原所出者皆出宋朝㑹要生祠漢于公為縣吏曹決獄平郡中為立生祠自三代而來無生為立祠者至此始見兹事則生而立祠始於漢世也道釋科教部}
  - {type: variant, offset: 9621, length: 0, content: '', WYG: 八道釋漢自桓帝考濯龍之宫設華盖以祀浮圖老子由此釋道二教稍稍興矣逮晉室其道始盛東遷之後三教峙立此釋道之所起也符籙龍魚河圖曰天遣𤣥女下授黄帝其信神符制伏蚩尤黄帝出軍決曰蚩尤無道帝討之夢西王母遣人以符授之帝悟立壇而請}
  - {type: page-break, offset: 9621, content: '', id: KR3k0014_WYG_007-32b, image: WYG0920/WYG0920-0196b.png}
  - {type: variant, offset: 9621, length: 0, content: '', krp: 八道釋漢自桓帝考濯龍之宫設華盖以祀浮圖老子由此釋道二教稍稍興矣逮晉室其道始盛東遷之後三教峙立此釋道之所起也符籙龍魚河圖曰天遣𤣥女下授黄帝其信神符制伏蚩尤黄帝出軍決曰蚩尤無道帝討之夢西王母遣人以符授之帝悟立壇而請}
  - {type: variant, offset: 9622, length: 0, content: '', WYG: 𤣥龜銜符從水中出置之壇中盖自是始傳符籙也金寳牌宋朝㑹要曰天禧元年四月詔内出聖祖神化金寳牌分給在京宫觀及外州名山聖跡之處面文曰玉清昭應宫成天尊萬夀背文曰永鎮福地帝自封之命中使送諸路天慶觀今諸郡道正副所掌者是道士黄帝内傳有道士行禮之文此疑謂有道之士也樓觀本記曰周穆王因尹真人草樓之觀召幽逸人居之謂之道士平王東遷置七人漢明帝永平七年置三七人晉恵度四十九人審此即是自周而有也司馬遷班固叙秦漢甚詳洎春秋以來殊無一人以一言彷彿道兹事者亦為可疑矣然范曄後漢書於光武紀論始有言道士西門君恵李守等云劉秀為天子盖前漢末事則道士之初當此矣注列仙傳又有道士浮丘公接周靈王太子晉上嵩髙山者道録續事始引仙傳拾遺曰隋文帝始以𤣥都觀主王延為威儀唐置左右兩街宋朝㑹要曰唐有左右街威儀周避諱改為道録宋朝因之都監又曰太平興國中増置副道録都監首座通舊為八員已上總知教門公事首座又曰首座亦太平興國中増置鑒義又曰天禧五年置首座鑒義分領本街事道官唐髙宗時葉静能入直翰林為國子祭酒姪孫法善𤣥宗時授銀青光禄大夫鴻臚卿又尹愔亦拜諫議大夫道士之命以官自髙宗始也宋朝㑹要曰開寳五年十}
