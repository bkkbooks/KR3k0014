  - {type: variant, offset: 3715, length: 273, content: 使持節者始謂之節度使然猶未以名官也留後宋武起義以孟昶總攝後事其伐荊州也以劉道鄰監留府事此留後之始也唐開元之後凡節度入朝或遙領不臨鎮則置留後以董軍事唐會要曰開元十五年十一月蕭嵩領河西二十六年正月李林甫領隴右楊國忠領劍南嵩以牛仙客林甫以杜希望國忠以李察崔圓並為留後此蓋置官之始也德宗正元二年程懷直又自稱觀察留後故聖朝兼二使以名官觀察唐明皇開元二年置十道按察採訪處置使肅宗改曰觀察處置新唐書方鎮表曰至德元載置觀察使百官志曰肅宗乾元元年改也防禦武后聖歷元年以夏州領防禦使祿山犯順當衝諸郡皆置之則是防禦使自則天始也職林云至德後置舊唐書志曰至德後中原大郡要害, WYG: ''}
