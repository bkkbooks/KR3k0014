  - {type: variant, offset: 6879, length: 215, content: 牧守皆以勸農名其官宋朝會要曰至道二年七月直史館陳靖言天下多曠士流民請置使招集八月以靖為勸農使按行陳許等八州勸民墾田其副皇甫選何亮以為功難成願罷至景德三年二月詔諸路轉運開封知府諸知州少卿監以上並兼勸農使其餘知州軍通判並兼勸農事令自今除授依此河隄宋朝會要曰乾德五年正月詔開封大名鄆澶等十七州長吏並兼河隄使此蓋其始也晉東都省都水置河隄使者簽判宋朝之制諸州府幕官大藩鎮以京朝官簽署節度觀察判官者曰簽判治平中避英宗嫌名改署曰書宋朝會要曰景德, WYG: 唐武徳}
