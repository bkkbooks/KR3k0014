  - {type: variant, offset: 13119, length: 0, content: '', WYG: 初也三式風后演河圖為一千八百局曰遁甲周太公約為七十二漢張良定為一十八以六甲相遁而起故名遁甲并太一六壬是為三式黄帝内傳曰王母使𤣥女授帝法有九天九地八門六甲之術即今遁甲也蓋自黄帝}
  - {type: variant, offset: 13119, length: 0, content: '', krp: 初也三式風后演河圖為一千八百局曰遁甲周太公約為七十二漢張良定為一十八以六甲相遁而起故名遁甲并太一六壬是為三式黄帝内傳曰王母使𤣥女授帝法有九天九地八門六甲之術即今遁甲也蓋自黄帝}
  - {type: variant, offset: 13120, length: 0, content: '', WYG: 占歲世本曰后益作占歲吕氏春秋亦云爾師曠占乃有黄帝欲知歲苦歲樂歲善而占有蓬薺艾先生之說即占歲為起於黄帝雜占晉律厯志曰黄帝使羲和占日常儀占月申區占星氣吕氏春秋曰羲和作占日常儀作占月靈碁異苑曰十二碁卜出自張文成受法於黄石公蓋今靈碁}
