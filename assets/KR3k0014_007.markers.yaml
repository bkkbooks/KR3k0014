  - {type: variant, offset: 2310, length: 988, content: 十九年湯崇慶為五坊宮苑使本一使也唐末始分之唐書方鎮表曰開元二十年置宮苑使朔方節度兼之又會要曰太和九年十一月又有閑廄宮苑使然則宮苑唐官也五代會要梁諸司使亦有宮苑使李肇國史補曰開元之前有事於外則命使自置節度始有坐而為使者後又有宮苑使騏驥宋朝會要曰唐有飛龍使及小馬坊使後唐長興元年改飛龍院為左飛龍院小馬坊為右飛龍院太平興國三年改左右天廄坊雍熙二年始曰左右騏驥院使名從之此左右騏驥使副之始也內藏又曰太平興國三年十月初置內藏庫及使名也左藏唐百官志曰開元十九年以監察御史一人監左藏庫後以殿中侍御史一人為左藏使此蓋設官之本也宋朝會要曰唐以太府卿知左藏庫出納五代有使宋朝因之作坊唐百官志曰少府之屬有金銀作坊院宋朝會要曰唐有作坊五代置使宋朝因之莊宅李吉甫百司舉要曰則天分置莊宅使又曰司農別有園苑莊宅使馮鑑續事始則云玄宗置唐會要曰昭宗天祐元年正月敕亦有莊宅使也李肇國史補曰玄宗開元止天寶末置使有莊宅使六宅宋朝會要曰唐置十宅六宅使以諸王所屬為名或總云十六宅後止云六宅宋朝因之文思五代會要曰梁諸使有文思使又云開平元年五月改為乾文院使三年十月以乾文院為文思院後乾文卻置院文思自為一使宋朝會要曰太平興國三年置文思院亦有文思使內園李吉甫百司舉要曰則天分置園苑使後改曰內園又曰司農別有園苑使唐會要正元十四年夏旱吳奉奏有內園使又五代會要梁諸使有內園栽接使也洛苑唐會要曰武德九年七月十九日置洛陽宮苑監永淳元年五月十一日置東西監管諸園苑至開成五年四月敕總監宣令內司管仍別置使此疑其洛苑置使之本唐書馮鑑傳有洛苑使姚文壽縱部曲奪民田則其官始見於此會要梁諸司使亦有洛苑使也如京唐主倉官也唐會要曰文明元年準吏部式監太倉本是察院職務第一人監倉近移入殿院太和九年六月李固言奏殿中侍御史充監太倉使唐志云開元十九年以監察御史充太倉出納使五代梁諸使始有如京使當是梁改太倉使曰如京也蓋取詩曾孫之庾如坻如京之義張緒續錦里耆舊傳王蜀亦有如京副使黃筌也崇儀宋朝會要曰唐有閑廄使大平興國五年改名崇儀也西京左藏又曰真宗咸平三年五月八日以贊善石熙政為西京左藏庫副使前此無見疑國初所置官也蓋唐都京兆為西京不得以別都直稱左藏也五代殘缺別都因不言具故事耳西京作坊又曰太祖開寶六年七月錄遺以尹崇珂子昭言為西京作坊使餘如西京左藏說也染院周官有染人掌染帛秦為平準令隋有司染署唐又有染坊宋朝會要曰唐有染坊使太平興國三年分置東西染院使名亦改也禮賓唐會要曰天寶十三, WYG: ''}
