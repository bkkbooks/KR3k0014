  - {type: variant, offset: 9979, length: 192, content: 改西京新修諸殿名今太極天興等名是也南京殿又曰大中祥符七年二月真宗幸應天府詔升為南京正殿以歸德為名又以南門為崇禮雙門為祥輝三月又賜南京諸門名龍圖閣又曰咸平四年十月以杜鎬為龍圖待制即建閣在是年前矣又云真宗於會慶殿西偏藏太宗御製咸平又真宗登極年號即建閣當在初年矣東京記則云大中祥符初建以奉太宗御集而國老閑談乃有太宗幸龍圖閣觀書之語天章閣又曰天禧五年二月於龍圖閣北起天章閣奉安真宗御製既成令兩, WYG: 左右}
