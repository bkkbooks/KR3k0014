  - {type: variant, offset: 1251, length: 137, content: 國之初承舊制有殿前承旨雍熙四年改為三班奉職宋朝會要則其事在淳化二年正月改也三班借職談苑云舊制有借職承旨太宗雍熙中改曰三班借職會要以謂淳化二年正月也談苑又云自供奉至借職其員無數亦漢三署郎比也按今自崇班以上曰大使臣供奉以下至借職為小使臣也諸使宋朝會要曰唐制百職皆九寺三監分典開元, WYG: 隆}
