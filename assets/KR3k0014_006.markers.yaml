  - {type: variant, offset: 7400, length: 202, content: 尚食如淳曰掌天子之物曰尚秦置六尚乃有尚食則尚食秦官也尚藥梁陳以來皆為太醫兼職亦秦所置六尚之一也尚醞唐已前有尚乘無尚醞宋朝元豐中官制行則置此官也尚衣周有司服為禮官之屬戰國始有尚衣尚冠之職北齊制主衣隋復曰尚衣也左氏曰昔虞閼父為周陶正注云陶復陶也陶正主君上之衣服此尚衣之始也尚舍周禮天官有掌舍凡舍事則掌之漢官有守宮舍於魏則殿中職也隋煬帝別置殿內監改舊殿中局曰尚舍尚輦周官有巾車秦漢為車府令隋煬帝初置殿內省置尚輦, WYG: ''}
