  - {type: variant, offset: 4582, length: 199, content: 官品始有太子侍講此置官之始也中舍人晉咸寧中初置太子中舍人官宋朝神宗又置之唐以來有太子中舍而無中舍人舍人秦官唐龍朔二年改為太子右司議郎咸亨元年復為太子舍人宋朝初亦不置神宗正官制復置之翊善宋朝王府之官多省不置別置翊善曰某王府翊善蓋古王傅之任而輕其名位也宋朝會要曰太平興國中始置也又云八年三月以戴元為衛王府閻象為廣平王府楊可法等為皇太子翊善蓋自此始也王侍讀宋武帝初以徐受為晉安王子勳侍讀此王府侍讀之初也唐, WYG: ''}
