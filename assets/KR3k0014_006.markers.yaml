  - {type: variant, offset: 3615, length: 183, content: 元和四年五月御史臺奏舊例監察御史從下第六人各察尚書省一司是也宋朝會要曰國家每八閤國忌臨時差六察吏察兵察戶察刑察禮察工察元豐中神宗始置六察司於御史臺知雜唐武后以來呼侍御曰端公侍御之職四自雜侍臺侍悉總判之故知雜事者曰雜端後又有以郎中員外兼侍御而知雜事者亦呼雜端官制行省之左右巡唐會要曰正元十年四月敕準六典殿中侍御史分知左右巡察其不法之事按六典自明皇時作則左右巡之置亦其時, WYG: 天寳續}
