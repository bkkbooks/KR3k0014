  - {type: variant, offset: 165, length: 0, content: '', WYG: 兩省自侍中中書令已下盡名供奉官此名供奉官之初也筆談曰供奉官本唐從官永徽已後人主多居大明宫别置官謂之東頭供奉官西内具員不廢則謂西頭供奉官宋朝太宗淳化中以供奉有四十年不遷者陞授崇班則是五代以来為武臣之職也左右侍禁談苑曰本朝太宗雍熙四年増置左右侍禁宋朝㑹要曰淳化}
  - {type: page-break, offset: 165, content: '', id: KR3k0014_WYG_006-6a, image: WYG0920/WYG0920-0153a.png}
  - {type: variant, offset: 165, length: 0, content: '', krp: 兩省自侍中中書令已下盡名供奉官此名供奉官之初也筆談曰供奉官本唐從官永徽已後人主多居大明宫别置官謂之東頭供奉官西内具員不廢則謂西頭供奉官宋朝太宗淳化中以供奉有四十年不遷者陞授崇班則是五代以来為武臣之職也左右侍禁談苑曰本朝太宗雍熙四年増置左右侍禁宋朝㑹要曰淳化}
  - {type: variant, offset: 167, length: 0, content: '', WYG: 正月置左右侍禁在殿直之上先是供奉官殿直有四十年不遷者故特置崇班侍禁之目左右殿直左右殿直梁開平三年七月勅有殿直之文又元年宣下宣徽院收管殿前受㫖官左右内直等後唐清泰元年七月有殿直都知趙處愿晉天福六年七月勅亦有殿直文則殿直之官梁已有之}
