  - {type: variant, offset: 3351, length: 5, content: 多外任風憲, krp: 皆統於使五代罷巡院置轉運司國初但曰勾當某路水陸計度轉運事官髙即曰使也運副開元中裴耀卿為江淮轉運使以崔希逢等為副此盖運副之始也宋朝㑹要轉運篇云太平興國初又置副使也運判宋朝㑹要曰開寳五年八月九日以潘美尹崇珂並兼領嶺南轉運使以轉運使王明為副使許允言為判官則轉運之有判自此其始也太平興國三年四月十日置諸道轉運判官始以戴允誠等分為之唐㑹要云景龍二年七月置十道按察使分察天下今轉運之兼按察者盖始於此府提㸃又曰景德三年三月勅置開封府界提㸃司即置提㸃之官吕夷簡三朝寳訓曰真宗謂近臣曰諸道刑獄皆遣官提振唯京師無之去夏開封府訊進士蹇符暴於日中裂其背而鞠之無狀炎暑之際罪未見情枉罹虐毒令置司命京師刑獄處悉糾之提刑又曰淳化二年五月詔諸路轉運司各命常參官一人專知糾察刑獄公事始以司門董循等為之至三年四月詔始稱提㸃刑獄景徳四年六月真宗筆記六事一曰提㸃刑獄七月詔擇官提㸃諸路刑獄公事始命屯田李拱等為之將領宋朝神宗初置將官於諸路曰東南或西北等某將有副掌春秋訓練有警則部所將兵以䇿應於是又有提舉將兵之官都監唐書白居易傳曰王承宗叛帝以吐突承璀率師出討居易諫曰唐家制度每征伐專委將率比年始以中人為都監韓全義討淮西賈良國監之髙崇文討蜀劉正亮監之此疑其初也宋朝㑹要曰國初諸州都監或雜文臣其後遂罷止以武臣為之乾德三年五月勅差起居舎人劉兼通判泗州兼兵馬都監是也太平興國三年五月以客省使翟守素為兩浙諸州兵馬都監此又國家命官之始也監押唐中宗始以中官監押兵馬宋朝諸州亦有兵馬監押小使臣以下即為監押大使臣已上曰都監張緒續錦里耆舊傳曰端拱元年春供奉官宿翰充成都府兵馬監押宋朝之置監押自此始陵臺令唐百官志有陵臺令初曰諸陵署令天寳十載改獻昭等王陵署曰陵臺此盖命名之初也漢有長陵及文園令歴代皆有令丞宋朝會要曰乾徳二年以河南府鞏縣令孔美兼安陵令雍熙二年五月詔今後注鞏縣令便令兼陵臺令公事景徳四年正月詔永安鎮特建縣其縣令兼陵臺令也盖本周官冢人}
