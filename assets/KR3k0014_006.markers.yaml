  - {type: variant, offset: 4893, length: 1, content: 會, krp: 神宗元豐中除之初宋朝唯以四門國子助教命醫者故官制行唯置太醫及州助教也京邑館閣部三十二京師釋名曰國君所居曰都帝王世紀曰太昊都陳此稱都之初也三代而来夏曰夏邑商周曰京師京大也師衆也大衆所居故以名天子之都京城宋朝㑹}
