  - {type: variant, offset: 9531, length: 159, content: 內率隋置左右率掌禁內侍衛唐為左右內率舊唐志曰隋初置左右內率府擬上臺千牛衛也南班筆談曰宗子授南班官世傳王曾為相日始開此議不然也故事宗子無遷官法唯遇稀曠大慶則遷一官景祐中初定祖宗並配南郊宗子緣大禮乞推恩自此遂有南班之授近屬自初除小將軍七遷為節度使遂為定制熙寧元豐閒袒免之外例授小使臣同庶官也內常侍秦置中常侍官參用士人給事殿, WYG: 入内}
