  - {type: variant, offset: 8553, length: 326, content: 主簿晉初於衡有其官後隨府改也上將軍大記曰義帝以宋義為上將軍漢以呂祿為上將軍魏黃初中有上大將軍唐正元二年九月諸衛上將軍也老子曰君子用兵則貴右是以偏將軍處左上將軍處右說苑田忌奔楚王問齊楚相并柰何對曰齊使申孺將則楚發五萬人使上將軍將之則是春秋逮戰國始有上將軍之官也大將軍戰國時始有大將軍之號隨事即置亦不主官劉劭爵制以謂秦十八爵大庶長即大將軍也左右庶長即左右偏裨將軍也楚懷王與秦戰秦虜其大將軍屈匄是也項羽時范增稱大將軍漢遂置大將軍開府如三公至煬帝於諸衛悉置將軍周禮天子六軍軍一萬二千五百人其將皆命卿蓋在國稱大夫在軍稱將軍自晉獻公作二軍而公將上軍故將軍之名特出於此左傳閻沒汝寬偕謂魏獻子為將軍後漢百官志云初漢武將軍始自秦晉以為卿號七國皆有其事漢以來其命官之名極多, WYG: ''}
