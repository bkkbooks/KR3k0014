  - {type: variant, offset: 3350, length: 0, content: '', krp: 年李靖除定襄道大總管是也宋朝初有兵馬都部署治平初避英宗嫌名改為總管亦法古號也續事始載周武帝建徳六年以王謙為益州總管記為命官之始幕府漢書李廣傳注晉灼曰衛青征匈奴大克就拜大將軍於幕中故曰幕府幕府之名始於此也顔師古曰幕府者以軍幕為義軍旅無常居止故以帳幕遮之亷頗李牧市租皆入幕府此則非因衛青始有號矣又漢文帝問馮唐唐對有上功幕府之説則上將之稱幕府其来久矣今人以稱元帥義取諸此館接伴宋朝㑹要曰景德二年五月詔將来契丹使至令諸司緣路供帳十一月命翰林學士李宗諤東上閤門使曹利用在京館伴契丹賀承天節使此疑館伴之始也又曰特巳命樂黄同康京元詣雄州接伴迴日充送伴使此疑接伴之始也發運五代㑹要曰晉天福三年韓延嗣配華州發運務此始見發運之名宋朝㑹要曰乾德二年二月以何幼沖充京畿東西水陸發運使此始有發運使之官也至道元年始命王子興等為江淮兩浙發運使兼制置茶鹽事就淮南置局咸平二年仍領荆湖四年又加都大字景徳二年二月以馮亮為淮南江浙荆湖制置茶鹽兼都大發運使自是使名始定也又有三門白波發運使太平興國五年正月命姚沆為陕府三門發運此疑其初云唐書李傑𫝊進陜州刺史水陸發運使置自傑始發副至道元年七月以楊允恭為江淮兩浙發運副使兼捉賊制置茶鹽公事景徳後亦有副使也轉運秦攻匈奴使天下飛芻輓粟漢蕭何漕運關中又漢漕運山東粟以給中都即轉運之起也唐㑹要曰先天二年李傑為陕州刺史充水陸發運使開元十八年裴耀卿始為江淮轉運使此其命官之始也宋朝㑹要曰唐置江淮處置轉運使後置諸道鹽鐵轉運使多以重臣兼領而諸道各置巡}
  - {type: variant, offset: 3351, length: 5, content: 多外任風憲, WYG: 皆統於使五代罷巡院置轉運司國初但曰勾當某路水陸計度轉運事官髙即曰使也運副開元中裴耀卿為江淮轉運使以崔希逢等為副此盖運副之始也宋朝㑹要轉運篇云太平興國初又置副使也運判宋朝㑹要曰開寳五年八月九日以潘美尹崇珂並兼領嶺南轉運使以轉運使王明為副使許允言為判官則轉運之有判自此其始也太平興國三年四月十日置諸道轉運判官始以戴允誠等分為之唐㑹要云景龍二年七月置十道按察使分察天下今轉運之兼按察者盖始於此府提㸃又曰景德三年三月勅置開封府界提㸃司即置提㸃之官吕夷簡三朝寳訓曰真宗謂近臣曰諸道刑獄皆遣官提振唯京師無之去夏開封府訊進士蹇符暴於日中裂其背而鞠之無狀炎暑之際罪未見情枉罹虐毒令置司命京師刑獄處悉糾之提刑又曰淳化二年五月詔諸路轉運司各命常參官一人專知糾察刑獄公事始以司門董循等為之至三年四月詔始稱提㸃刑獄景徳四年六月真宗筆記六事一曰提㸃刑獄七月詔擇官提㸃諸路刑獄公事始命屯田李拱等為之將領宋朝神宗初置將官於諸路曰東南或西北等某將有副掌春秋訓練有警則部所將兵以䇿應於是又有提舉將兵之官都監唐書白居易傳曰王承宗叛帝以吐突承璀率師出討居易諫曰唐家制度每征伐專委將率比年始以中人為都監韓全義討淮西賈良國監之髙崇文討蜀劉正亮監之此疑其初也宋朝㑹要曰國初諸州都監或雜文臣其後遂罷止以武臣為之乾德三年五月勅差起居舎人劉兼通判泗州兼兵馬都監是也太平興國三年五月以客省使翟守素為兩浙諸州兵馬都監此又國家命官之始也監押唐中宗始以中官監押兵馬宋朝諸州亦有兵馬監押小使臣以下即為監押大使臣已上曰都監張緒續錦里耆舊傳曰端拱元年春供奉官宿翰充成都府兵馬監押宋朝之置監押自此始陵臺令唐百官志有陵臺令初曰諸陵署令天寳十載改獻昭等王陵署曰陵臺此盖命名之初也漢有長陵及文園令歴代皆有令丞宋朝會要曰乾徳二年以河南府鞏縣令孔美兼安陵令雍熙二年五月詔今後注鞏縣令便令兼陵臺令公事景徳四年正月詔永安鎮特建縣其縣令兼陵臺令也盖本周官冢人}
