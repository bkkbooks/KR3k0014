  - {type: variant, offset: 159, length: 1, content: 下, krp: 職事官𨽻閤門也閤門祇候宋朝㑹要曰故事閤門無通事舎人通事舎人𨽻中書省其長一人判四方館謂之館老如抽赴閤門祇應者則兼稱閤門祇候按唐武德中改隋通事謁者為通事舎人則閤門祇候之名疑亦武德以来始有其稱也宋朝遂别以命官為通事之次樞密承㫖宋朝㑹要曰五代樞宻有承㫖以諸衛將軍充宋朝始有樞宻都承㫖副承㫖又别置諸房副承㫖也延福宫使又曰明道元年置延福宫使盖仁宗之初年置也景福宫使又曰大中祥符五年宣政使劉承珪以久疾辭職特置是名在客省使之上又曰大中祥符五年十二月以宣政使劉承珪為景福宫使初承珪乞退宰臣請别加美名真宗曰可特置景福宫使自此始也宣慶使又曰舊諸司使止于宣政大中祥符元年東封禮畢宣政使李神福當遷職特置宣慶使名授之也宣正使又曰淳化五年以王繼恩有平賊功特置此名授之談苑曰太宗時内侍王繼恩平蜀李順之亂中書議以為宣徽使上不欲宦者預政召張洎錢若水議置宣正使在昭宣使之上㑹要又云五年八月也昭宣使又曰淳化四年置昭宣使初以皇城使王延德王繼恩莊宅使杜彦鈞為之又曰諸司使舊無此額詔㫖特置在此年二月也内殿承制又曰大中祥符二年正月詔置内殿承制班在内殿崇班上秩比殿中丞内殿崇班又曰淳化二年正月詔置内殿崇班在供奉官之上餘見侍禁條供奉官唐則天實録曰如意元年置内供奉𤣥宗時有翰林供奉}
