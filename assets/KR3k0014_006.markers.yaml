  - {type: variant, offset: 3349, length: 0, content: '', WYG: 賊遷死延州鈴轄張崇貴乞朝廷遣使弔問仍望遣大臣至邊上召賊所親信張浦定議故命敏中經度之十月以知青州張齊賢兼青淄維等州安撫使并兵馬巡檢賊盜公事自此又為内地帥座之任經略唐太宗貞觀中邊州别置經略使此盖使名之起也髙宗儀鳳二年以黒齒常之為河源軍經略大使宋朝㑹要曰舊不常置皆因事命使寳元以来陕西縁邊大將皆兼經畧也宋自咸平四年八月張齊賢為涇源安撫又始以安撫使兼經略云招討唐百官志曰招討使掌征伐兵罷則省云天寳末置招討都統之名始於此事始云開元十七年宰相奏置招討使天寳十五載以来瑱為潁川太守兼招討使職林曰貞元時置注又云德宗建中年以馬燧為魏博招討使舊唐志曰貞元末置用兵權兵罷則停也總管晉有都督諸軍事後周改為總管唐武徳初邊要之地亦置總管以統軍貞觀}
