  - {type: variant, offset: 4338, length: 238, content: 燕義曰古者周天子之官有庶子周禮夏官司馬之屬謂之諸子秦置中庶子詹事員漢因之晉以為東宮官晉書鄭默為中庶子朝官以為太子官是也隋分左右通典曰品官命數篇漢有太子庶子魏有太子中庶子則非晉以為東宮官也少詹唐始於詹事府置少詹事一人以貳詹事諭德唐龍朔三年初置太子左右諭德蓋取文王世子教之以事而諭諸德之義太子侍讀漢宣帝詔王襃等皆皆之太子宮娛侍太子朝夕誦讀此蓋其始也宋有諸王侍讀唐正觀中許叔牙為王侍讀高宗升春宮仍兼侍讀職林云開成元年十一月宰相李石奏置太子諸王侍讀太子侍講後漢張酺以尚書講論授皇太子其, WYG: 續}
