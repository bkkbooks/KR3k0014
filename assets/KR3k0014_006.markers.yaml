  - {type: variant, offset: 4832, length: 1, content: 掾, WYG: 文帝與吳質書稱孔璋章表殊健元瑜書記翩翩宋江夏王乃以丘源為掌書記而未為職名唐開元元年勅節度置掌書記自後藩侯得自奏請也又魏志建安中曹洪欲使阮瑀掌書記支使唐置觀察使亦置觀察支使則支使唐置官也續事始曰唐至徳初改採訪使為觀風始置判官二人支使二人推官一人也軍判五代㑹要曰後唐天成二年九月十九日勅刺史州不合有防禦判官今後改為軍判官此盖置官之本也軍巡又曰梁開平三年十月置左右軍巡使各置巡院宋朝㑹要曰唐末始置後唐分左右也舊開封府以牙校為之開寳六年六月改用士人李萼趙中衡太祖以刑禁之重始任士流也吕夷簡三朝寳訓曰開寳六年上謂近臣曰開封府左右軍巡諸州馬歩判官比来所在止選牙校為之刑獄事重人命所繫自今當選士流任之也叅軍杜佑云參軍後漢末置參諸軍府事若今節度判官漢書曰靈帝以幽州刺史陶謙參司空張温軍事此其始也本公府官晉始置}
