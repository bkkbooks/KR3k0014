  - {type: 'tls:seg', offset: 4874, content: '', id: KR3k0014_CHANT_006-65a.15}
  - {type: variant, offset: 4876, length: 0, content: '', WYG: 㑹要曰天聖四年七月詔開封兩縣各置丞一人在簿尉之上先兩縣簿尉多差出至是蘇耆上言乃命増置此國家置丞之初也應邵漢官曰大縣丞左右尉所謂命卿三人也今以京朝官領其任者曰知縣丞自神宗朝増置也主簿漢有之後漢繆彤仕縣為主簿是也續事始則云後漢始有主簿之號諸郡置之即今録事參軍也至隋大業中諸縣始置主簿掌勾稽簿籍糾正縣内非違縣尉漢百官表曰縣有丞尉長安有四尉分左右是也盖}
  - {type: page-break, offset: 4876, content: '', id: KR3k0014_WYG_006-38b, image: WYG0920/WYG0920-0169b.png}
  - {type: variant, offset: 4876, length: 0, content: '', krp: 㑹要曰天聖四年七月詔開封兩縣各置丞一人在簿尉之上先兩縣簿尉多差出至是蘇耆上言乃命増置此國家置丞之初也應邵漢官曰大縣丞左右尉所謂命卿三人也今以京朝官領其任者曰知縣丞自神宗朝増置也主簿漢有之後漢繆彤仕縣為主簿是也續事始則云後漢始有主簿之號諸郡置之即今録事參軍也至隋大業中諸縣始置主簿掌勾稽簿籍糾正縣内非違縣尉漢百官表曰縣有丞尉長安有四尉分左右是也盖}
  - {type: variant, offset: 4877, length: 0, content: '', WYG: 漢官都廂國初以来以四廂都指揮使巡轄提舉京城裏諸巡警時謂之廂主凡煙火盜賊即部所轄以赴之諸公事自笞以下皆得區分神宗熙寧中}
  - {type: page-break, offset: 4877, content: '', id: KR3k0014_WYG_006-39a, image: WYG0920/WYG0920-0169c.png}
  - {type: variant, offset: 4877, length: 0, content: '', krp: 漢官都廂國初以来以四廂都指揮使巡轄提舉京城裏諸巡警時謂之廂主凡煙火盜賊即部所轄以赴之諸公事自笞以下皆得區分神宗熙寧中}
  - {type: variant, offset: 4878, length: 0, content: '', WYG: 勾當左右廂公事所以文臣一員主之自鬬訟賊盜杖六十而下皆決之以分天府之劇也民間謂之都廂别駕唐六典曰後漢州置别駕歴代皆有之杜佑云别駕本因漢置随刺史巡察若今觀察之有副使也宋朝與長史司馬並為散官云通典曰從刺史行部别乗一乗傳車故謂之别駕漢制也長史漢百官表曰秦置郡丞其郡當邊戍者丞為長史則長史為秦所置官也通典曰唐五府長史理府事餘府州通判而已司馬曲禮天子之五官有司馬周禮以為政官之率漢為三公之任周政官之屬文有大小軍輿行都家等職本任武之官古者軍行則有之左傳晉悼公以魏絳為中軍司馬是也魏晉以後刺史帶將軍開府者則置之自此始為州郡官唐高宗即位改治中為司馬節度亦有行軍司馬今與節度團練副使並以為貶責之官醫學唐㑹要曰貞觀三年九月十六日諸州府置醫藥博士開元十一年五月七日始置醫學博士唐志曰開元九年改醫藥博士為醫學也助教晉咸寧四年初立國子學置助教以教生徒魏始}
