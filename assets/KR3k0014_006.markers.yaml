  - {type: variant, offset: 7800, length: 339, content: 置司業官取禮記樂正司業之義國子監丞亦隋官置與司業之官同置也國子主簿北齊初置國子主簿國子博士班固云六國時往往有博士漢多至數十人晉武初立國子學始置國子博士之官漢百官表曰博士秦官通古今太學博士通典曰漢武建元五年初置五經博士按趙岐孟子題辭云漢興孝文欲廣游學之路論語孝經孟子爾雅皆置博士後罷傳記博士獨立五經而已此今太學博士之職也晉江左增置國子博士六人始謂之太學博士品服同國博神宗元豐中官制行改舊直講之官復置太學博士職如經博士也武學博士宋朝神宗熙寧中即武成王廟建武學置教授如國子監直講官制行亦改為武學博士律學博士晉初置律學博士屬廷尉衛尉親置請律學博士輔相教授唐移屬國子監唐志曰武德初也太學正錄宋朝仁宗時胡瑗掌太學其正錄第補諸生以為學校職掌然不以命有官者神宗熙寧末興三舍始敕授命官亦為學官之例, WYG: ''}
