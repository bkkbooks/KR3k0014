  - {type: variant, offset: 3339, length: 0, content: '', WYG: 置文思院亦有文思使内園李吉甫百司舉要曰則天分置園苑使後改曰内園又曰司農别有園苑使唐㑹要貞元十四年夏旱吳奉奏有内園使又五代㑹要梁諸使有内園栽接使也洛苑唐㑹要曰武徳九年七月十九日置洛陽宫苑監永淳元年五月十一日置東西監管諸園苑至開成五年四月勅總監宜令内司管仍别置使此疑其洛苑置使之本唐書馮鑑𫝊有洛苑使姚文夀縱部曲奪民田則其官始見於此㑹要梁諸司使亦有洛苑使也如京如京唐主倉官也唐㑹要曰文明元年凖吏部式監太倉本是察院職務第一人監倉近移入殿院太和九年六月李固言奏殿中侍御史充監太倉使唐志云開元十九年}
  - {type: page-break, offset: 3339, content: '', id: KR3k0014_WYG_006-14a, image: WYG0920/WYG0920-0157a.png}
