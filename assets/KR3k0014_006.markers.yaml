  - {type: variant, offset: 5036, length: 476, content: 常蓋秦官也初學記曰高祖改漢百官表曰景帝中六年更太常丞秦置官漢為太常亦曰太常丞太常簿漢有之疑漢官太常博士魏官也魏文帝初置之顏師古注漢書曰太常王者旌旗畫日月大事則建以行禮官主奉持之故曰奉常後改曰太常尊大之義也協律郎漢武帝置律協都尉以李延年始為之晉改為校尉後魏曰協律郎蓋漢武以延年善新聲故特為置協律奉禮郎漢大鴻臚有治禮郎蓋設官之始也按通典歷代皆為治禮郎唐初亦有掌設板位執儀行事永徽二年以諱改為奉禮杜佑云奉禮本名治禮國家撰五代史志至永徽七年乃成於時此官已改故北齊及隋治禮皆為奉禮奉體之名雖見於史其改始自永徽太祝商官六太其一曰太祝在周禮為禮官宗伯之屬掌六祝之辭秦漢有丞隋除令丞止存太祝齋郎魏始有太常齋郎唐有太廟郊社之別唐洎國家其久次者太廟又補室長郊社即補掌坐掌次謂之黃衣選人祖宗以來又以為朝臣子弟起家之官郊社令梁始有太社令後周為司社上士隋於太常寺置郊社署故為郊社令宋朝避英宗嫌名改曰局藉田令周為甸師漢文帝初立藉田乃置令也太醫令周禮天官冢宰之屬有醫師上士下士掌醫之政令聚毒藥以供醫事秦為太醫令丞漢因之宗正周官也在周禮實小宗伯之職宋百官春秋曰周封兄弟之國十有五同姓之, WYG: 平興}
