  - {type: variant, offset: 4864, length: 3, content: 則記室, krp: 刺史有軍}
  - {type: variant, offset: 4868, length: 0, content: '', WYG: 開府者並置之本為公府官非州職也續事始曰後漢有郡主簿亦曰督郵隋以録事參軍代之掌勾稽文簿舉彈善惡監郡印給紙筆之事開元初京兆河南曰司録管六曹宋朝京邑大府以京朝官領其事曰知其非京官而資考久次者亦曰知也三輔決録韋康成為郡主簿是也功曹秦漢有功曹史蕭何為書史掾功曹是也後漢有功曹史主選功勞北齊為功曹參軍今止開封府置餘州皆省也倉曹漢有倉曹史北齊以}
  - {type: page-break, offset: 4868, content: '', id: KR3k0014_WYG_006-34a, image: WYG0920/WYG0920-0167a.png}
  - {type: page-break, offset: 4868, content: '', id: KR3k0014_WYG_006-34b, image: WYG0920/WYG0920-0167b.png}
  - {type: variant, offset: 4868, length: 0, content: '', krp: 開府者並置之本為公府官非州職也續事始曰後漢有郡主簿亦曰督郵隋以録事參軍代之掌勾稽文簿舉彈善惡監郡印給紙筆之事開元初京兆河南曰司録管六曹宋朝京邑大府以京朝官領其事曰知其非京官而資考久次者亦曰知也三輔決録韋康成為郡主簿是也功曹秦漢有功曹史蕭何為書史掾功曹是也後漢有功曹史主選功勞北齊為功曹參軍今止開封府置餘州皆省也倉曹漢有倉曹史北齊以}
