  - {type: variant, offset: 6477, length: 294, content: 太初元年改曰大司農魏文帝黃初中止曰司農司農寺丞秦治粟丞也漢置丞十三人為勸農官後改司農亦曰司農丞司農簿晉太康中始置司農主簿太府周禮天官冢宰之屬有太府下大夫梁武帝天監七年始置太府卿續事始則云梁天監中置少府卿後魏太和中改太府丞簿周禮太府上士即丞職也下士即簿職也梁置太府卿則丞簿二官亦梁置也續事始曰魏也祕書監漢桓帝延熙二年始置祕書監一人祕書少監隋煬帝始置祕書少監一人祕書丞齊職儀曰漢獻帝置祕書令丞二人魏文帝分祕書別掌文籍自置丞一人此蓋置官之始也或曰魏武帝置也祕書郎通典曰後漢馬融為祕書郎當是其官自漢置也職林曰魏官也初漢置祕書郎蓋中書之任魏分祕書掌文籍為祕書郎中宋除中字校書郎又曰西漢蘭臺後漢東觀皆, WYG: 建}
