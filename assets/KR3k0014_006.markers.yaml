  - {type: variant, offset: 5579, length: 3, content: 序九族, WYG: 犯宣祖諱改焉集賢院唐開元五年乾元殿寫四部書置麗正修書院於集仙殿十三年明皇召張説等宴集仙殿謂説曰今與卿等賢才同室於此宜改名集賢由是修書院亦曰集賢院秘閣宋朝㑹要曰端拱元年五月詔就崇文院中堂建秘閣淳化元年八月二十一日李至書言漢桓置秘書監掌禁中圖書秘記魏以屬少府王肅表論不應屬少府曰魏之秘書即漢東觀因是不屬而蘭臺亦藏書故薛夏云蘭臺為外臺秘書為内閣然則秘閣之名始於此矣晉孝武勅徐廣料秘閣四部三萬餘卷是也起居院北齊有起居省宋朝㑹要曰淳化五年四月五日張秘奏復左右史之職記録以為起居注太}
