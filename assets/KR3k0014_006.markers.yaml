  - {type: variant, offset: 6026, length: 179, content: 景帝中元中更名大理蓋復古號也舊唐書志曰取天官貴人之牢曰大理之義即周禮士師之職孟詵錦帶前書載三代法官之名則云虞曰士夏曰大理也大理寺丞晉武帝咸寧中曹志請廷尉置承北齊曰大理也大理簿通典所載自魏晉以來歷代皆有之是疑魏置官大理正秦置廷尉正禮記曰獄成告於職之正注云正周禮鄉師之屬則秦之置官亦法周也其名亦隋改云司值後魏永安二年御史中尉高穆奏置大理司直漢武初置司直之官屬丞相, WYG: ''}
