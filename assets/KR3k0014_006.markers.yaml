  - {type: variant, offset: 563, length: 0, content: '', WYG: 撥併𣙜易院入𣙜貨務而使名不除也氊毯又曰唐有氊坊毯坊使五代合為一使宋朝因之鞍轡又曰唐神䇿軍有鞍轡庫五代置使宋朝因之酒坊又曰唐有酒坊使宋朝初加内字後去之法酒通典曰梁有酒庫丞宋朝㑹要曰周太祖平河中得酒工王思善造法麴因法酒庫置使盖亦梁酒庫丞比也自皇城至法酒庫已上為東班醫官宋朝㑹要曰淳化五年八月以翰林醫官趙自化為少府監丞充醫官副使按唐㑹要貞元八年八月令侍御醫尚藥直長藥藏郎並留授翰林醫官然則醫官之置使當是唐官也宫苑通典曰宫苑總監自隋置掌苑内宫館園池之事盖宫苑之職也唐㑹要曰開元十九年湯崇慶為五坊宫苑使本一使也唐末始分之唐書友鎮表曰開元}
