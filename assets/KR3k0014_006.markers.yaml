  - {type: variant, offset: 9190, length: 236, content: 屯衛也六帖曰漢宣帝即位初置屯衛領軍衛魏武為漢丞相相府自置領軍非漢官也建安十二年改中領軍文帝受禪始置領軍將軍晉武初有左右監門衛舊唐志曰漢魏曰丞門校尉隋初有監門府將軍唐龍朔二年改府為衛千牛衛宋謝綽拾遺千牛刀人主防身刀也義取莊子庖丁解割千牛而刀刃若新發硎之義故後魏有千牛備身掌執御刀唐顯慶五年始置左右千牛府唐龍朔二年改府曰衛諸率自秦漢始有諸率以為東宮禁衛晉始置五率歷代因革不常遂分左右也府率秦官也晉武建東宮始置率此其始也副率隋制諸率府各置副率掌貳率事衛率秦置衛率府後漢主門衛晉武, WYG: ''}
