  - {type: variant, offset: 3358, length: 1, content: 用, WYG: 掌公墓之比撫字長民部三十一留守成王命君陳分正東郊成周通典記以李晦為西京留守開元十一年太原府置尹以尹為留守謂之三都留守唐志云車駕不在京則置留守此盖命官之始也宋朝則曰兼某京留守司事也州牧黄帝立四監以治方國舜外有州牧侯伯則州牧之始盖自有虞氏也府尹周成王之命君陳東郊曰尹兹東土春秋之時縣邑之長或曰尹楚有令尹此尹之始也漢京兆河南曰尹唐以州郡建府者皆曰尹按漢百官表曰右内史武帝太初元年更名京兆尹此名官之始也都督漢光武建武初權置督軍御史事竟輒罷魏文黄初三年初置都督諸軍事然魏初受漢禪時已有持節都督則非三年初置也大抵魏所建官耳明帝太和四年秋始加大都督以命司馬懿唐太極初并益荆揚開元中兼潞為五大都督也漢建安中魏武為相始遣大將軍督之二十一年征孫權還使夏侯惇都督二十六軍於是始有都督之官矣刺史先秦以御史監郡漢初省之恵帝復建監三輔郡文帝十三年九月遣丞相史出刺并督察御史武帝元封五年又置部刺史察州晉以来任輕者加持節後周又加諸軍事唐武徳後加號使持節某州諸軍事某州刺史宋朝以}
