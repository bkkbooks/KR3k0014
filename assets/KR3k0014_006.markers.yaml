  - {type: variant, offset: 4895, length: 0, content: '', WYG: 曰自朱梁建都以汴州為東京皆因藩鎮舊制但改名額而周顯德五年始廣新城周回四十八里二百三十步宋敏求東京記曰周世宗顯德二年四月詔京城四面别築羅城三年正月發京畿滑鄭曹之民命薛可言等四面督之韓通總其事王朴經度凡通衢委巷廣袤之間皆朴定其制踰年而成宋朝神宗熙寧中始四面築為敵樓作瓮城及濬治壕塹也門名又曰太平興國四年九月詔改京城内外門名三十有二即今名南薰宣化是也東京記曰外城諸門大扺俱周顯德中築外城立也保康門又曰大中祥符五年七月詔曰重城陽位通門肇開宜以京城新開門為保康門初建㑹靈觀於奉節致逺二營仍作此門於朱雀門之東南闢街與觀北門相直也坊名又}
