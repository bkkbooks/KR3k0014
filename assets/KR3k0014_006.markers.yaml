  - {type: variant, offset: 5577, length: 0, content: '', WYG: 月置修文館九年三月改為𢎞文九月太宗即位𢎞文殿聚書殿側置𢎞文館神龍元年十月十九日改曰昭文後復曰𢎞文宋朝避廟諱復曰昭文與集賢史館同為三館也神宗行}
