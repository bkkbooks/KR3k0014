  - {type: variant, offset: 5574, length: 0, content: '', WYG: 真宗幸應天府詔升為南京正殿以歸德為名又以南門為崇禮雙門為祥輝二月又賜南京諸門名龍圖閣又曰咸平四年十月以杜鎬為龍圖待制即建閣在是年前矣又云真宗於㑹慶殿西偏藏太宗御製咸平又真宗登極年號即建閣當在初年矣東京記則云大中祥符初建以奉太宗御集而國老閑談乃有太宗幸龍圖閣觀書之語天章閣又曰天禧五年二月於龍圖閣北起天章閣奉安真宗御製既成令兩街僧道具威儀教坊作樂奉真宗御集御書自玉清昭應宫安于閣上也此其始云東京記曰天章閣天禧五年三月建以藏真宗御集寳文閣東京記曰本名夀昌閣與天章並建慶厯初改曰寳文仁宗聖文神翰秘于此也資善堂仁宗肄學之所也宋朝㑹要曰在元符觀南大中祥符八年}
  - {type: page-break, offset: 5574, content: '', id: KR3k0014_WYG_006-44a, image: WYG0920/WYG0920-0172a.png}
  - {type: page-break, offset: 5574, content: '', id: KR3k0014_WYG_006-44b, image: WYG0920/WYG0920-0172b.png}
  - {type: variant, offset: 5574, length: 0, content: '', krp: 真宗幸應天府詔升為南京正殿以歸德為名又以南門為崇禮雙門為祥輝二月又賜南京諸門名龍圖閣又曰咸平四年十月以杜鎬為龍圖待制即建閣在是年前矣又云真宗於㑹慶殿西偏藏太宗御製咸平又真宗登極年號即建閣當在初年矣東京記則云大中祥符初建以奉太宗御集而國老閑談乃有太宗幸龍圖閣觀書之語天章閣又曰天禧五年二月於龍圖閣北起天章閣奉安真宗御製既成令兩街僧道具威儀教坊作樂奉真宗御集御書自玉清昭應宫安于閣上也此其始云東京記曰天章閣天禧五年三月建以藏真宗御集寳文閣東京記曰本名夀昌閣與天章並建慶厯初改曰寳文仁宗聖文神翰秘于此也資善堂仁宗肄學之所也宋朝㑹要曰在元符觀南大中祥符八年}
  - {type: variant, offset: 5575, length: 0, content: '', WYG: 天禧四年徙御厨北也又曰祥符九年二月詔元符皇子就學之所宜以資善堂為名繼聖堂東京記曰太}
  - {type: variant, offset: 5575, length: 0, content: '', krp: 天禧四年徙御厨北也又曰祥符九年二月詔元符皇子就學之所宜以資善堂為名繼聖堂東京記曰太}
  - {type: variant, offset: 5576, length: 0, content: '', WYG: 尹京命署東建堂習射大中祥符二年閏二月真宗臨幸宰臣請以繼聖為名許之今人呼曰繼聖堂學士院唐武德貞觀時温大雅等以文詞召待詔常於北門候進止𤣥宗開元二十六年始置學士院始改待詔為翰林學士故也史館史職肇自黄帝而倉頡沮誦掌之周及列國亦有史名漢武置太史公漢以後職在秘書唐太宗始置史館以修國史唐百官志曰歴代史官𨽻秘書省著作局貞觀三年閏十二月始移史館於禁中盖自是始别局也昭文館唐㑹要曰武徳四年}
