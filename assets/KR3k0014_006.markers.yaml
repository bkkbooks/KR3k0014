  - {type: 'tls:seg', offset: 3347, content: '', id: KR3k0014_CHANT_006-47a.16}
  - {type: variant, offset: 3347, length: 0, content: '', WYG: 充太倉出納使五代梁諸使始有如京使當是梁改太倉使曰如京也盖取詩曽孫之庾如坁如京之義張緒續錦里耆舊傳王蜀亦有如京副使黄筌也崇儀宋朝㑹要曰唐有閑廏使太平興國五年改名崇儀也西京左藏又曰真宗咸平三年五月八日以賛善石熙政為西京左藏庫副使前此無見疑國初所置官也盖唐都京兆為西京不得以别都直稱左藏也五代殘缺别都因不言具故事耳西京作坊又曰太祖開寳六年七月録遺以尹崇珂子昭言為西京作坊使餘如西京左藏説也染院周官有染人掌染帛秦為平凖令隋有司染署唐又有染坊宋朝㑹要曰唐有染坊使太平興國三年分置東西染院使名亦改也禮賔唐㑹要曰天寳十三年三月二十七日勅鴻臚屬司有禮賓院又元和元年六月置禮賔院于長興里其使名疑自此有也五代㑹要曰後唐天成元年太常禮院奏本朝故事諸蕃客並于内殿引對事在禮賔使由此證知其官始自先唐也又長興三年三月有禮賔使梁進德自契丹報聘迴也供備五代㑹要曰梁諸司使有武備庫使按其職非供備之掌也宋朝㑹要曰太平興國三年改供備庫為内物料庫而使名不改疑亦國初官也右自宫苑至供備庫使以上為西班教坊唐百官志曰開元二年置教坊于蓬莱宫側京都置左右教坊掌俳優雜劇以中官為教坊使此其始也又曰武德後置内教坊武后改曰雲韶府以中官為使開元後始不𨽻太常也續事始曰𤣥宗立教坊以新聲歡樂之曲優倡曼衍之戲因其諧謔以金帛章綬賞之因置使以教習之國家乃以伶人之久次者為使云節鉞帥漕部三十節度後漢公孫瓚討烏桓詔令受劉虞節度唐室名使盖取此義唐制縁邊戎冦之地則加以旌節謂之節度使始自睿宗景雲二年四月以賀拔延嗣為河西節度使也肅宗至徳以後天下用兵中原刺史一例受號也唐書方鎮表云開元二十二年朔方節度始兼處置使兵志曰髙宗永徽以後都督帶使持節者始謂之節度使然猶未以名官也留後宋武起義以孟昶總攝後事其伐荆州也以劉道隣監留府事此留後之始也唐開元之後凡節度入朝或遥領不臨鎮則置留後以董軍事唐㑹要曰開元十五年十一月蕭嵩領河西二十六年正月李林甫領隴右楊國忠領劔南嵩以牛仙客林甫以杜希望國忠以李察崔圎並為留後此盖置官之始也德宗貞元二年程懐直又自稱觀察留後故聖朝兼二使以名官觀察唐明皇開元二年置十道按察採訪處置使肅宗改曰觀察處置新唐書方鎮表曰至德元載置觀察使百官志曰肅宗乾元元年改也防禦武后聖厯元年以夏州領防禦使禄山犯順當衝諸郡皆置之則是防禦使自則天始也職林云至德後置舊唐書志曰至德後中原大郡要害之地置防禦使以治軍事不賜旌節也團練肅宗乾元元年置防禦團練使馮鑑曰至德中觀風使并領都團練其後上州亦有其號唐百官志曰元載秉政恩結人心刺史皆得兼團練使元載傳曰載用事授刺史者悉帶團練使以悦人心宣撫宋朝㑹要曰咸平三年六月詔遣參政向敏中充河北東緣邉宣撫大使馮拯陳堯叟充副大使存問官吏自後随事即置事巳乃省盖自此始也宣撫唐官新唐書徳宗詔蕭復充山南江湖等道宣撫安慰使是也見復𫝊安撫唐貞觀初遣大使巡天下諸州水旱則有安撫之名高宗時命裴行儉冊波斯王始為安撫大使天后時聖厯元年狄仁傑為河北道安撫此盖其始也徳宗貞元元年又置副使宋朝㑹要曰咸平三年十月以王欽若為西川梁顥為峡路安撫使但以觀省風俗耳四年八月以張齊賢充涇源等十五軍州安撫經略使帝以邉將玩冦始改命齊賢等使自此始為邊帥也又景德元年五月以知永興軍向敏中充峡路縁邊安撫使}
