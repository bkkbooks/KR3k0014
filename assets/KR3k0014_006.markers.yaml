  - {type: variant, offset: 3803, length: 288, content: 殿中侍御史自開元初知左右巡百僚班序有雜立失言頑而不肅者則以禮罰之是則此制自開元始也李肇國史補曰玄宗開元初至天寶末年置御史左右巡使也臺簿漢有此官張忠為御史大夫署孫寶為主簿是也疑漢官云宋朝會要曰淳化四年六月始置二人後止一員也檢法唐置御史臺推直官而無檢法宋朝元豐中神宗正官制除推直始置檢法之官六傅夏商雖世嗣而太子之名亦略矣其師傅之官亦無文至周始見文王世子故禮之所記班班僅可推考文王世子曰凡三王教世子立太傅少傅以養之太傅在後入則有保出則有師則太傅之原概舉于此矣武王又稱太子也漢止有太傅少傅至晉有天下愍懷建官乃置太子太師太傅太保洎三少為六傅也漢賈誼上疏云保保其身體傅傅其德義師道之教訓此, WYG: ''}
