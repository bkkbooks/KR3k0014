  - {type: variant, offset: 3349, length: 0, content: '', krp: 賊遷死延州鈴轄張崇貴乞朝廷遣使弔問仍望遣大臣至邊上召賊所親信張浦定議故命敏中經度之十月以知青州張齊賢兼青淄維等州安撫使并兵馬巡檢賊盜公事自此又為内地帥座之任經略唐太宗貞觀中邊州别置經略使此盖使名之起也髙宗儀鳳二年以黒齒常之為河源軍經略大使宋朝㑹要曰舊不常置皆因事命使寳元以来陕西縁邊大將皆兼經畧也宋自咸平四年八月張齊賢為涇源安撫又始以安撫使兼經略云招討唐百官志曰招討使掌征伐兵罷則省云天寳末置招討都統之名始於此事始云開元十七年宰相奏置招討使天寳十五載以来瑱為潁川太守兼招討使職林曰貞元時置注又云德宗建中年以馬燧為魏博招討使舊唐志曰貞元末置用兵權兵罷則停也總管晉有都督諸軍事後周改為總管唐武徳初邊要之地亦置總管以統軍貞觀}
  - {type: variant, offset: 3350, length: 0, content: '', WYG: 年李靖除定襄道大總管是也宋朝初有兵馬都部署治平初避英宗嫌名改為總管亦法古號也續事始載周武帝建徳六年以王謙為益州總管記為命官之始幕府漢書李廣傳注晉灼曰衛青征匈奴大克就拜大將軍於幕中故曰幕府幕府之名始於此也顔師古曰幕府者以軍幕為義軍旅無常居止故以帳幕遮之亷頗李牧市租皆入幕府此則非因衛青始有號矣又漢文帝問馮唐唐對有上功幕府之説則上將之稱幕府其来久矣今人以稱元帥義取諸此館接伴宋朝㑹要曰景德二年五月詔將来契丹使至令諸司緣路供帳十一月命翰林學士李宗諤東上閤門使曹利用在京館伴契丹賀承天節使此疑館伴之始也又曰特巳命樂黄同康京元詣雄州接伴迴日充送伴使此疑接伴之始也發運五代㑹要曰晉天福三年韓延嗣配華州發運務此始見發運之名宋朝㑹要曰乾德二年二月以何幼沖充京畿東西水陸發運使此始有發運使之官也至道元年始命王子興等為江淮兩浙發運使兼制置茶鹽事就淮南置局咸平二年仍領荆湖四年又加都大字景徳二年二月以馮亮為淮南江浙荆湖制置茶鹽兼都大發運使自是使名始定也又有三門白波發運使太平興國五年正月命姚沆為陕府三門發運此疑其初云唐書李傑𫝊進陜州刺史水陸發運使置自傑始發副至道元年七月以楊允恭為江淮兩浙發運副使兼捉賊制置茶鹽公事景徳後亦有副使也轉運秦攻匈奴使天下飛芻輓粟漢蕭何漕運關中又漢漕運山東粟以給中都即轉運之起也唐㑹要曰先天二年李傑為陕州刺史充水陸發運使開元十八年裴耀卿始為江淮轉運使此其命官之始也宋朝㑹要曰唐置江淮處置轉運使後置諸道鹽鐵轉運使多以重臣兼領而諸道各置巡}
