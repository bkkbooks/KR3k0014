  - {type: 'tls:seg', offset: 4871, content: '', id: KR3k0014_CHANT_006-65a.14}
  - {type: variant, offset: 4871, length: 0, content: '', WYG: 今亦獨開封府置也户曹漢公府有户曹掾主民户祀農桑州郡為史北齊與功倉曹同為參軍唐諸府曰户曹餘州曰司户兵曹漢公府掾史有兵曹主兵事司𨽻屬官有兵曹從事史郡國為使北齊同諸曹為參軍今又獨置於開封府也法曹漢公府掾史有賊曹掾主刑法曹之任也歴代皆有或為法曹隋以後與功曹同陳孝意為東郡司法書佐是也唐為參軍事士曹北齊始有士曹參軍今獨開封府置餘州雖有司士又以為散官也司理漢公府有決曹掾主罪法事通典以為法曹之職白氏六帖則云魏置理曹掾盖法曹也即今司理之任舊制諸州有馬歩院及子城院主禁繫訊獄張緒續錦里耆舊傳曰開寳六年秋勅改馬歩院為司理院廢馬歩都虞侯除文資為司理參軍成都雄藩一十六處置左右焉子城院不得禁繫公事吕夷簡三朝寳訓曰太祖開寳六年謂近臣曰諸州馬步判官比来止選牙校為之刑獄人命所繫當選士流任之盖自是始置司理之官也餘見軍巡條唐諸州有馬步使文學漢郡國皆有文學掾則文學漢官也唐㑹要曰大厯十四年十二月五日諸州府學博士改為文學品秩同參軍唐志曰文學州授於吏部然無職事衣冠恥之故朝以為散官炙轂子曰隋開皇中潞州刺史栁昴表勸學帝令州置博士俾其教授唐肅宗時顔真卿曰文學盖復漢舊號也教授隋有州博士潘徽嘗為之唐武德初府郡亦置經學博士掌以五經教授徳宗即位改為文學元和中廢宋朝神宗元豐中興太學三舎以經術養天下之才又於諸大郡府始各置教授一人掌教導諸生如太學博士亦隋州博士之職也縣令周官有縣正下大夫春秋之時縣邑之長曰大夫秦本紀曰孝公十二年并諸小郷聚為大縣縣一令商君列傳曰鞅令邑聚為縣置令丞則縣令及丞自秦孝公始也漢百官表曰縣令長皆秦官萬户以上為令減萬户為長宋朝㑹要曰周衰六國置縣邑其長齊}
