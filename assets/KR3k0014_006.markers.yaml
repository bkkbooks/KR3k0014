  - {type: variant, offset: 5620, length: 9, content: 宗室子孫眾多聚居必, WYG: 錢幣金銀四帛淳化三年分置左右右納左給凡六庫四年廢右分左藏庫為四庫曰錢金銀曰絲綿曰生白匹帛曰雜色匹帛祥符二年併金銀絲綿為一七年併生白雜色為生熟匹帛奉宸庫宋朝㑹要曰舊五庫一宜聖殿二穆清殿三崇聖殿四受納真珠五樂器康定元年九月合為一庫改名奉宸庫也御殿素厨又曰大中祥符九年置在玉清昭應宫後徙御厨也金水河又曰東京水源曰祝龍泉過中牟曰金水建隆二年春命陳承昭引抵都城西架其水横絕經汴入浚溝乾徳三年引貫皇城歴後苑内庭池沼皆至開寳九年太祖親按引注王第及公主第也五丈河談苑曰京水自滎陽至于汴陳承昭本江南人習知水利國初上言導京水踰汴東北注河通山東之漕其廣五丈}
