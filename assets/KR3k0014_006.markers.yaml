  - {type: variant, offset: 168, length: 2, content: 散騎, WYG: 三班奉職談苑曰宋朝建國之初承舊制有殿前承㫖雍熙四年改為三班奉職宋朝㑹要則其事在淳化二年正月改也三班借職談苑云舊制有借職承㫖太宗雍熙中改曰三班借職㑹要以謂淳化二年正月也談苑又云自供奉至借職其員無數亦漢三署郎比也按今自崇班以上曰大使臣供奉以下至借職為小使臣也東西使班部二十九諸使宋朝㑹要曰唐制百職皆九寺三監分典開元中始置諸使朝廷有詔則云諸司諸使以該之皇城唐書朱泚傳曰泚以李忠正為皇城使盖名官之事始見于此太平興國六年十一月改武德司為皇城司故宋朝諸使有皇城使翰林宋朝㑹要曰唐有翰林使掌技術之待詔者五代有翰林茶酒使宋朝初有茶床使後止云翰林使尚食}
