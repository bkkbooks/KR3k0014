  - {type: variant, offset: 4872, length: 0, content: '', WYG: 曰大夫魯衛曰宰楚曰公曰尹秦曰令曰長也知縣唐㑹要曰大中五年十一月景陵有賊斫損神門㦸架六年四月裴讓權知縣事盖知縣之名始起于此矣宋朝㑹要曰建隆四年六月詔河朔右地魏為大名分治劇邑當用能吏思慎釐於縣務特選士於朝行斷自朕心以重其任大理正奚嶼知大名府館陶縣事監察御史王祐知魏縣楊應夢知永齊縣屯田于繼徽知臨清朝臣知縣自嶼等始也縣丞史記商君傳曰鞅令邑聚為縣置令丞縣丞秦}
