  - {type: variant, offset: 600, length: 1, content: 靈, WYG: 有之然諸傅無其說亦可疑焉賔客漢髙祖欲易太子吕后用留侯計迎四皓以定太子故賔客之名始起于此孝文為太子立思賢苑以招賔客孝武為太子立博望苑使通賔客洎晉􅉖懐建宫恵帝使衛庭司馬畧等五人更徃來備賔友雖非官而謂之東宫賔客唐顯慶元年正月以于志寧等為太子賔客遂以名官定置四人盖取法于四皓詹事秦官掌太子家歴代因之通典曰東宫官序秦漢加置詹事庶子及諸府率官也應劭曰詹省也給也漢官儀曰秦官竇嬰景帝即位為詹事孔霸宣}
