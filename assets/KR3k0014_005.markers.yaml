  - {type: variant, offset: 551, length: 0, content: '', krp: 武徳令吏禮兵民刑工貞觀即吏禮民兵刑工光宅元年九月五日改為六官凖周禮通典曰周禮天官冡宰掌邦六典以佐王理邦國漢成置四尚書因事設員非擬于古光武分六曹稍以周禮唐武后遂以吏部為天官户部為地官禮部為春官兵部為夏官刑部為秋官工部為冬官以承六官之制國初以吏兵户刑工禮為次神宗行官制復唐故事又以吏户禮兵刑工為次也子司又曰故事以兵吏及左右司為前行刑户為中行工禮為後行每行各管四司以本行為頭司餘為子司自唐制始也二十四司自秦始置尚書而歴郎曹多寡不等少或十二亦至三十六隋有天下尚書有六曹二十四郎即今都省列曹是也其制自隋始也子司印唐㑹要曰故事凡尚書省除吏部兵部外共用都司印至聖厯二年二月九日初備文昌臺二十四司印本司郎官主之八座後漢以六曹尚書并令僕為八座梁齊亦有稱隋唐至今令僕為宰相故六尚書及左右丞為八座盖其事自漢東京始也六侍郎漢制尚書郎三嵗稱侍郎隋煬帝即位于尚書六曹各置侍郎一人按漢百官表有侍郎秩比四百石也郎中漢制尚書郎初上稱守郎中晉武帝始置諸曹郎中唐以來號}
  - {type: variant, offset: 552, length: 0, content: '', WYG: 郎武徳三年尚書郎改為郎中按秦有郎中令臣瓚以為主郎内諸官則郎中秦官也員外隋開皇三年尚書二十四司各置員外郎一人以司其曹帳籍則郎置員外自隋文帝始也按漢書恵帝即位賜爵外郎滿六嵗一級則隋置員外郎亦取漢事云爾韋述唐兩京記曰晉宋以來始置員外郎左右司隋煬帝即位尚書都司初置左右司郎一人副左右丞唐又置員外郎諸司號為都公唐書百官志云天后永昌元年置左右司員外郎各一人也吏部漢初曰常侍曹後漢為選部魏始曰吏部按周官司馬之屬有士司為下大夫通典則以為吏部之始疑出于此也司封左傳晉文公為執秩以正其官杜預云謂主爵秩之官盖今司封職也漢尚書有封爵之任後漢馮勤是也北齊有主爵職林曰唐龍朔二年改為司封通典以為光宅元年司勲周禮夏官司馬之屬有司勲掌賞地之法後周始置其官于尚書省通典云後周吏部有司勲上士考功漢京房作考課之法而其職不在尚書光武改尚書三公曹主嵗考課至此始為尚書職魏初置考功亦唐虞考績之事也而周禮亦有考功記云户部周禮地官之掌也漢置尚書四人一主財帛委輸即今户部任矣吳始有户部名通典曰吳孫休即位户部尚書讀奏是也周禮司民掌登萬民之數即户部任也度支通典曰漢張蒼善筭以列侯主計領郡國上計者殆今度支之任也魏文帝始置度支尚書唐以為子司金部周官職金掌錫石丹青之令則金部之職也魏世始置尚書金部郎倉部周官倉人主藏九榖廩人主其數賙賜稍食則倉部之職也魏時尚書始置倉部郎禮部唐虞秩宗周官宗伯皆今禮部之任也後周有禮部不言職事隋以典儀曹其名命自宇文周始也祠部魏代始于尚書置祠部曹盖其官自魏始也歴代因之不改主客漢成帝初置尚書客曹光武分置南北客主于此遂以名曹膳部即周官膳夫也晉有左右士曹北齊曰膳部兵部周禮夏官司馬之職也魏有五兵尚書晉宋為七兵後周始曰兵部職方周官有職方氏掌天下九州之圖隋初有職方侍郎通典曰後周依周官有職方也駕部周官輿司馬校人牧師巾車之職皆駕部之事也魏晉之代尚書始置駕部郎庫部周官司甲掌戈盾弓矢則今庫部也魏尚書始有庫部郎也刑部唐虞之士周禮司冦皆刑部之任也光武謂之賊曹為尚書職後周始有刑部大夫則刑部自宇文周始也都官漢司隸屬有都官從事掌中都官不法事此名官之初也光武改成帝二千石曹掌中都官水火盗賊魏青龍二年始置尚書都官郎佐督軍事比部魏尚書有比部曹通典曰北齊比部掌檢勾事唐天寳十一年改掌諸司公廨公私欠負及勾用度物也司門周禮有司門通典曰後周依周官有司門隋初為司門侍郎煬帝除侍字也工部唐虞共工在周禮為冬官之職漢置民曹光武改主繕修工作池苑魏為左民晉尚書為起部郎後周始曰工部也屯田漢昭帝始置屯田而成帝置尚書郎一人主户口墾田此盖尚書屯田之始也魏代為農部晉始有屯田尚書則屯田名曹在晉世也虞部舜命益作虞周禮有虞衡之官盖虞部設官之本魏始置虞曹郎後周改曰虞部水部周禮夏官有司險掌溝塗盖水部之職也魏尚書始有水部郎符憲儲闈部二十三御史大夫周禮春官宗伯之屬有御史掌贊書戰國時秦趙會澠池各命御史書鼓瑟擊缶之事淳于髠謂齊王曰御史在前則上世皆為記事之官也秦漢以來始糾察風憲然則御史盖周官也秦置御史大夫以為御史之率故曰大夫中丞漢初御史大夫有兩丞一曰御史丞一曰中丞初學記曰秦官漢因之謂之中丞以其别在殿中掌蘭臺秘書外督部刺史内領侍御史故云成哀間更名御史長史光武復曰中丞獨坐後漢宣秉傳曰光武建武元年秉拜御史中丞特詔與司隸校尉尚書令並專席而坐故京師號曰三獨坐今中丞亦循其制始自漢東京迄今為故事也侍御周為柱下史秦時張蒼為御史主柱下方書是也亦為侍御史是則侍御之官始于柱下也漢始有侍御史又有繡衣侍御史盖自武帝置也後漢亦有之隋直曰侍御史漢書朝議以范丹為侍御史是也韓朗以侍御史與三府掾治楚獄是也端公唐侍御史之職有四謂推彈公廨事臺内之事悉主之號為臺端他人稱之曰端公其語自唐始也南床唐制御史故事食坐之南設横榻謂之南床殿中監察不得坐也唯侍御坐焉凡侍御例不出累月而遷南省者故號為南床今猶有是循唐故事也殿中魏蘭臺遣御史居殿中察非法即殿中侍御史之始也監察初秦以御史監理諸郡謂之監察御史盖監察名官之始也隋文帝開皇三年始曰監察御史宋朝㑹要曰太平興國三年以張巽為監察御史先是三院多外任風憲之職用他官領之遂詔正名舉職自此始也宋朝之制凡職事官皆他官領之惟三院御史自是始正其名也裏行唐太宗初置此官自馬周始也初馬周以布衣任事詔令于監察御史裏行遂以名官舊唐書志云貞}
