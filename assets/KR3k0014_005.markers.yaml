  - {type: variant, offset: 6540, length: 1078, content: 置正議大夫為散官取秦大夫掌議論之義宋朝會要曰太平興國元年詔改為正奉神宗正官名復曰正議通議亦隋所置散官其命名之義同正議宋朝太宗太平興國元年始詔改為通奉神宗復曰通議太中秦官也掌議論而劉向說苑有晉太中屠餘見晉平公之驕則晉亦有其官矣當是晚周列國之官秦以太中為大夫也中大中大夫亦秦置為光祿勳屬官前漢文紀後元五年有中大夫令免漢書載趙中大夫白公引涇為渠中散王莽所置官也或云漢有中散大夫朝議隋置散官取諸大夫以上得奉朝議以為名朝請通典曰漢竇嬰為朝請竇太后憎嬰門籍不得入朝請此其始也漢律諸侯春朝天子曰朝秋曰請又曰奉朝請無員本不為官漢東京罷省三公外戚皇室諸侯多奉朝請奉朝請者奉朝會請召而已隋開皇中罷奉朝請置朝請大夫為散官取漢公卿年高德重者以列侯奉朝請之義也朝散亦隋所置為散官也朝奉宋朝會要曰太平興國元年詔改唐朝議大夫為朝奉大夫朝請郎通典曰朝請郎亦隋官蓋採晉宋齊梁奉朝請之名也朝散郎亦隋散官也朝奉郎宋朝太平興國初改唐朝議郎為朝奉郎承議通典曰隋所置舊唐書百官志曰唐武德七年改隋文騎尉為承議郎奉議隋散官有通議郎舊唐書志曰正觀十一年定令唯改通議郎為奉議郎通典作奉議郎神宗正官制亦曰奉議通直通典曰隋所置蓋採晉宋以來諸官皆有通直之名官品高下通為宿直也舊唐志曰武德七年改隋屯騎尉為通直郎宣德亦隋置散官也宣義唐改隋游騎尉為宣義郎取梁宣義將軍之名承事漢昭帝時任宮為丞相徵事捕斬上官桀注云徵事丞相屬官隋置徵事郎蓋取諸此宋朝避仁宗嫌名改曰承事宋朝會要曰乾興元年詔改也承奉隋文帝置唐因之宋朝元豐新制改太常寺太祝奉禮部為承奉郎承務唐置因隋尚書省二十四司承務郎之名也古二十五階宋朝元豐中神宗改正官制所定以為寄祿格元祐初各分左右紹聖二年復舊也二柱國楚寵官也懷王使柱國昭陽攻齊陳軫問曰楚國何貴昭陽曰上柱國是也後魏孝莊始立柱國大將軍後將軍官廢有八柱國後周建德四年又增置上柱國大將軍隋置上柱國柱國以酬勳勞實不理事故唐以為勳官二護軍秦有護軍都尉漢以陳平為護軍中尉盡統諸將歷代為將領之任舊唐書志曰武德七年定今改秦齊王下統軍為護軍副為副護軍蓋未為勳官也又有上大將軍大將軍正觀十一年改上大將軍為上護軍大將軍為護軍也按漢百官表護軍都尉哀帝更為司寇平帝元始元年更為護軍也二輕車漢武帝初置輕車將軍始以公孫賀為之又有輕車校尉唐採其名置上輕車都尉及輕車都尉舊唐志曰武德七年改上開府儀同三司為上輕車都尉開府儀同三司為輕車都尉二騎漢武帝元鼎二年置騎都尉初以李陵為之唐採故事置上騎都尉與騎都尉舊唐志曰武德定令改隋儀同三司曰騎都尉四尉謂驍飛雲武四騎尉也並隋置為文散官舊唐書百官志曰武德定令改隋上大都督為驍騎尉大都督為飛騎尉師都督為雲騎尉都督, WYG: ''}
