  - {type: variant, offset: 597, length: 1, content: 良, WYG: 故禮之所記班班僅可推攷文王世子曰凡三王教世子立太傅少傅以養之太傅在後入則有保出則有師則太傅之原槩舉于此矣武王又稱太子也漢止有太傅少傅至晉有天下愍懐建官乃置太子太師太傅太保有三少為六傅也漢賈誼上疏}
