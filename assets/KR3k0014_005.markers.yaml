  - {type: variant, offset: 9081, length: 140, content: 肅宗時郭元振李光弼號使相也相銜唐百官志敘曰永淳元年郭待舉岑長倩同平章事始以入銜後循之以為故事當筆通典曰肅宗至德二年三月宰相分直政事筆人知十日德宗正元五年五月八日又分日一人執筆迄今為故事曰當筆中堂唐制宰相常於門下省議事謂之政事堂永淳中中書令裴炎移在中書省開元十一年張說奏改曰中書門下, WYG: 内供奉}
