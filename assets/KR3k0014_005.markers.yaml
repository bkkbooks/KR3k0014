  - {type: variant, offset: 9574, length: 165, content: 梁開平元年五月改樞密院為崇政院始命敬翔為院使仍置判官一人自後不置判官置副使一人後唐同光元年十月依舊為樞密亦為樞密副使宋朝會要曰建隆元年八月以趙普為樞密副使周末闕副使至是始置同知樞宋朝會要曰淳化二年九月樞密使王顯出鎮以副使溫仲舒寇準同知院事同知之名自此始也神宗元豐中正官名不置使但以寄祿官一人知院事一人同知為副而已簽樞又宋朝會要曰太, WYG: 大}
