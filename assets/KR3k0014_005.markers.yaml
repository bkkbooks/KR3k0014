  - {type: variant, offset: 614, length: 5, content: 章程繇善隸, WYG: 宗正秦因其說置宗正兩漢晉授皇族不雜姓晉始兼庶姓也舊唐志曰星經有宗正在帝座東南漢髙紀七年二月置宗正官以序九族宗正寺丞漢置官亦用公族宗正簿梁置官也宗正司林希兩朝寳訓曰景祐三年仁宗謂輔臣曰宗室子孫衆多聚居必以尊賢者糾合之詔置大宗正司擇祖宗後各一人命之首以濮安懿王與守節任其事後又有同姓庶官知丞事神宗時乃參用光禄漢}
