  - {type: variant, offset: 5537, length: 712, content: 志曰勳官出於周齊交戰之際本以酬戰士其後漸及朝流也品秩自太昊以龍紀官唐虞建官惟百未分品秩周官以九儀正邦國自一命至九命漢自中二千碩止二百碩皆有北魏文帝延康元年陳群立九品官人之法後魏文有從品孝武自四品已下每品為階北齊九品各分正從則品秩之原肇於魏陳群也世廕尚書大禹謨皋陶稱舜之德曰賞延於世則世廕之始蓋起於有虞氏也章服唐車服志曰高祖初入長安罷隋竹使符班銀菟符後改銅魚貴賤應召命隨身盛以袋三品已上飾以金五品已上飾以銀開元時中書令張嘉正奏致仕官佩魚終身自是賞緋紫者必以魚謂之章服服色隋禮儀志曰大業元年煬帝詔牛洪宇文愷等創造章服差等五品已上通著紫袍六品已下兼用緋綠胥吏以青庶人以白屠商以皁士卒以黃二儀寶錄曰隋煬帝詔牛洪等衣冠皆有等差三四品通著紫五品朱六品已下綠官吏青庶人白商皁服色之分疑自此始而唐書馬周傳云品官舊止黃紫周於是建白三品服紫四五品朱六七品綠八九品青則又其別為自馬周始矣筆談曰中國衣冠自北齊全用胡服窄袖緋綠此蓋其始也堂除續事始曰舊制內外皆吏部授自隋以來五品以上官中書門下訪擇聞奏然後下制肅宗復令中書以功除官今謂堂除也考績起于虞舜三載考績之文故今官以考定勞一歲為考四考而遷謂磨勘也循資唐選舉志開元十八年裴光庭始作循資格而賢愚一概必與格合乃得銓授限年躡級不得踰越於今以為制也致仕尚書咸有一德曰伊尹既復政厥辟告歸疏云告老致政事于君此臣下致仕之初也至周乃有大夫七十致仕之禮其事自伊尹始折俸宋朝會要曰唐正元四年定百官月俸僖昭之亂國用窄闕天祐中止給其半後唐同光初孔謙以軍儲不充百官俸錢數多而折之非實請減半數而支實錢是後所支半實俸復從虛折宋朝約後唐所定其非兼職者皆一分實錢二分折支景德罷兵之後始詔俸當給他物者京師每一千給實錢六百在外四百則今折俸, WYG: ''}
