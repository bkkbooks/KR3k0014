  - {type: variant, offset: 553, length: 1, content: 十, krp: 初也龍朔元年}
  - {type: variant, offset: 555, length: 0, content: '', WYG: 月以王本立為監察裏行唐㑹要以謂裏行之名始于此非也六典亦云始于馬周宋朝行官制始省之續事始曰太宗時疑未以名官自髙宗始以命官云三院唐憲府故事侍御殿中監察呼三院故今亦斥殿中曰殿院監察曰察院自唐室始也六察唐百官志曰監察御史分察尚書省六司興元元年一人察吏禮部一人察兵工部一人察户刑部嵗終議殿最元和中以新人不出使無以觀能否乃命專察尚書省號六察唐㑹要云元和四}
