  - {type: variant, offset: 10302, length: 863, content: 大學士為宰相兼職又有學士為諸學士之首後以文明真宗諡也更曰紫宸議者又以紫宸非人臣宜稱遂更曰觀文資政又曰王欽若罷參政真宗特置資政殿學士以寵之時寇準在中書定其官在翰林下欽若訴於上曰臣自學士拜參政今無罪而罷班反在下是貶也帝為特置大學士班在翰林之上宋朝會要曰景德二年四月以參政王欽若為資政殿學士先是欽若求罷繼以面請故特置是職十二月又以為大學士翰林唐太宗時名儒時時召以草制待詔常於北門候進止號北門學士明皇改曰翰林待詔已而改為供俸開元二十六年乃為翰林學士此蓋其始也職林云至德後天子召集賢學士於禁中草書詔因在翰林待進止遂以為名承旨職林曰至德以後翰林置學士六人內年深德重者一人為承旨所以獨承密命故也此疑承旨之始也而唐百官志曰元和中翰林學士以院長一人別承敕旨或密受顧命為學士承旨職林又謂德宗正元已後承旨多至宰相疑唐志為誤內翰唐百官志曰開元二十六年改翰林供奉為學士別置學士院其後選用益重號為內相又陸贄傳贄入翰林雖外有宰相主大議而贄常居中參裁可否時號內相則是其稱自陸贄始也由此今亦呼翰林學士為內相亦曰內翰敕設筆談曰京師百官上日惟翰林學士敕設用樂雖宰相無此禮優伶並開封府點集陳繹除學士時繹知府遂不用女優學士院敕設之不用女優自繹始也其事在熙寧中端明職林曰五代唐明宗初置端明殿學士如三館之例初入洛謂安重誨曰先帝時馮道何在曰近除翰林學士帝曰此人朕素諳委俄拜端明宋朝會要曰後唐明宗不知書每四方章奏令安重誨讀之多不曉文義宰相孔循獻議置端明殿學士二員在翰林之上以馮道為之太平興國中緣殿名改文明仁宗明道初改承明殿為端明殿明年置端明殿學士又云明道二年八月詔特置端明殿學士始以宋綬充之也二侍通典曰開元中馬懷素等侍讀禁中十三年集賢院置侍讀學士其後康子元為侍講學士宋朝真宗始置此二職於翰林蓋自楊徽之邢昺始也宋朝會要曰咸平二年七月以楊徽之夏侯嶠並為翰林侍讀學士邢昺為翰林侍講學士景德四年八月以翰林侍講學士邢昺知曹州此又侍講學士之外使自昺始也天禧二年十二月以參政張知白為翰林侍讀學士知天雄軍此又侍讀之外使自知白始也唐宋申錫敬宗寶歷二年充翰林侍講學士文宗時鄭覃亦為之龍圖宋朝會要曰, WYG: 頭髙品}
