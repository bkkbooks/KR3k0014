  - {type: variant, offset: 2776, length: 383, content: 藝文志所載實錄自周興嗣梁皇帝實錄為始則其事自茲以為始也著書史記太史公自敘曰昔西伯拘於羑里演周易則著書之始也類事證古類事其始本出於梁沈約之徒屬辭比事往往成編故唐白居易傚之為六帖山海經其文所記皆山川草木鳥獸之奇疑禹治水所過所見而識之莊子所謂齊諧者志怪也禹知而名之益見而記之當是此也其書盛行於漢氏自劉向辨貳負之屍始也音韻筆談曰音韻之學自沈約為四聲及天竺梵學入中國其學漸密也切字又曰切字本出於西域漢人訓字止曰讀如某字未用反切然古語已有二聲合為一字如不可為叵如是為爾而已為耳之乎為諸之類以西國二合音蓋切字之原也如耎字從而犬亦切音殆與聲俱生莫知從來也切韻陸法言切韻序曰隋開皇初劉臻等八人論法言論及音韻法言記之後取諸家字書所記定為切韻五卷其書成於仁壽元年唐天寶十三載孫愐增修目曰唐韻押韻張孟押韻後序曰押韻肇自顏魯公迄于聖宋蓋孟在天聖中準宋韻重編集也玉篇梁大同九年三月顧野王撰也唐上, WYG: 乾}
