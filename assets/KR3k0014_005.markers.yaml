  - {type: variant, offset: 11595, length: 358, content: 唐復為樞密院亦曰樞密院學士宋朝會要曰後唐同光中置樞密直學士同光蓋莊宗時年號也蓋朱梁崇政院判官之職也制誥唐百官志曰中書舍人六人以久次者一人為閣老判本省雜事一人知制誥領進畫開元初以他官掌詔敕冊命謂之知制誥宣宗時選用尚書郎蓋先是率用前行正郎宋朝自司諫正言以上參用之官制改其事歸中書舍人又宋朝會要曰雍熙四年以知制誥范杲知京兆府以知制誥領外藩自杲始也續事始曰開元元年蘇頲王琚為紫微侍郎知制誥自後以他官為翰林學士中書舍人皆稱制誥直學士院宋朝會要曰開寶元年中書李昉知制誥盧多遜並直學士院蓋其始也又作二年十一月直舍人院又曰開寶九年十一月以張洎王克正直舍人院此其置職之始也集賢學士唐玄宗開元五年始置修書院於集仙殿即置學士員後改集賢亦曰集賢學士通典曰開元五年十一月於乾元殿東廊寫四部書令馬懷素褚元量總其事於麗正殿安置為修書使十六年宴張說, WYG: 苑内品散内品}
