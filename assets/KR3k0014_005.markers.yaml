  - {type: variant, offset: 607, length: 0, content: '', WYG: 宋朝初亦不置神宗正官制復置之翊善宋朝王府之官多省不置别置翊善曰某王府翊善盖古上傅之任而輕其名位也宋朝㑹要曰太平興國中始置也又云八年三月以戴元為衛王府閻象為廣平王府楊可法等為皇太子翊善盖自此始也王侍讀宋武帝初以徐受為晉安王子勛侍讀此王府侍讀之初也唐志曰開元初十王宅引辭學工書者入教亦為侍讀王侍講宋朝省王府餘官而别置侍講一員記室魏置太祖以陳琳阮瑀為記室掾其官始見于魏武之世矣宋用晉制自明帝後皇子弟雖非都督亦置記室參軍則記室而為參軍晉官也宋朝亦置于諸王府曰某王府記室也宫教宋朝會要曰至道元年以孫蠙充皇姪皇孫教授從新號也時中書言唐文宗朝李石奏太子有侍讀諸王亦有無隆殺今皇姪皇孫官是環衛請以教授為名此盖王宫教授設官之初也九寺卿少部二十四九卿禮記曰夏后氏百官始置九卿漢九卿俱不以卿名官梁武天監七年始加卿字少卿後魏官氏志云大和十五年初置少卿以卿為大卿太常亦周禮春官職也秦有奉常漢初改曰太常盖秦官也初學記曰髙祖改漢百官表曰景帝中六年更太常丞秦置官漢為太常亦曰太常丞太常簿漢有之疑漢官太常博士魏官也魏文帝初置之顔師古注漢書曰太常王者旌旗畫日月大事則建以行禮官主奉持之故曰奉常後改曰太常尊大之義也協律郎漢武之置協律都尉以李延年始為之晉改為校尉後魏曰協律祝盖漢武以延年善新聲故特為置協律奉禮郎漢大鴻臚有治禮郎盖設官之始也按通典歴代皆為治禮郎唐初亦有掌設板位執儀行事永徽二年以諱改為奉禮杜佑云奉禮本名治禮國家撰五代史志至永徽七年乃成于時此官已改故北齊及隋治禮皆為奉禮奉禮之名雖見于史其改始自永徽太祝商官六太其一曰太祝在周禮為禮官宗伯之屬掌六祝之詞秦漢有丞隋除令丞止存太祝齋郎魏始有太常齋郎唐有太廟郊社之别唐洎國家其久次者太廟又補室長郊社即補掌坐掌次謂之黄衣選人祖宗以來又以為朝臣子弟起家之官郊社令梁始有太社令後周為司社上士隋于太常寺置郊社署名為郊社令宋朝避英宗嫌名改曰局籍田令周為甸師漢文帝初立籍田乃置令也太醫令周禮天官冡宰之屬有醫師上士下士掌醫之政令聚毒藥以供醫事秦為太醫令丞漢因之宗正周官也在周禮實小宗伯之職宋百官春秋曰周封兄弟之國十有五}
