  - {type: variant, offset: 1280, length: 324, content: 目藏之錄云晉祕書荀勗因魏中經更以四部別之惠懷之亂及李充始加刪正荀勗四部之法總以甲乙為次也巾箱南史齊衡陽王鈞嘗親手細書五經部為一卷置巾箱中侍讀賀玠曰殿下家有墳索復何細書別藏巾箱鈞曰巾箱中檢閱既易且更手寫則永不忘矣諸王聞之爭效為巾箱今謂籍之細書小本者為巾箱始於此也石經漢靈帝詔諸儒校定五經鐫石以刊其文命蔡邕等書為古篆隸三體立於太學門謂之石經印板筆談曰板印書籍唐人尚未盛為之自馮道始印五經之後典籍皆為板本即唐始為板印矣五代會要曰後唐長興三年二月中書門下奏請依石經文字刻九經印板也八卦易繫辭曰兩儀生四象四象生八卦又曰庖犧氏之王天下也始作八卦以通神明之德以類萬物之情孔安國序尚書曰伏犧始畫八卦史記太史公自敘曰伏犧至純厚作易八卦董巴議曰昔伏犧始造八卦作三畫以象, WYG: ''}
