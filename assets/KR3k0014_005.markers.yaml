  - {type: variant, offset: 650, length: 6, content: 程邈變篆作隸, WYG: 郎中令掌宫殿掖門武帝太初元年更名光禄勲通典云梁除勲字曰光禄卿續事始曰秦掌宫殿門户郊祀主諸郎將在殿中侍衛北齊兼掌膳隋全掌諸殽膳不掌宮殿光禄丞簿皆漢所置應劭曰光明也禄爵也太官令周官膳夫庖人外饔皆其任也秦置太官令屬少府漢不改晉屬光禄後魏分太官為尚食知御膳太官掌百官之饌衛尉秦官也掌宫門衛屯兵之職尉罻也古兵獄之官皆以尉言所以罻羅奸邪也衛尉丞簿皆秦漢所置也太僕周禮夏官司馬之屬有太僕下大夫尚書冏命穆王命伯冏為周太僕正則太僕周官也應劭曰盖大卿衆僕之長太僕寺丞秦漢有此官也太僕簿梁始于太僕置主簿大理齊職儀曰古官也管子曰黄帝得后土辨于四方使為理春秋元命包曰堯為天子得臯陶為大理舜時為士官韓詩外傳有晉文公使}
