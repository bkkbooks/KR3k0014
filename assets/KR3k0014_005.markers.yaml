  - {type: variant, offset: 8846, length: 4, content: 陳平言宰, WYG: 有諸率以為東宫禁衛晉始置五率歴代因革不常遂分左右也府率秦官也晉武建東宫始置率此其始也副率隋制諸率府各置副率掌貳率事衛率秦置衛率府後漢主門衛晉武太始五年分左右司禦率隋文帝制左右宗衛其官如左右衛煬帝改曰率唐龍朔二年改為左右司禦衛後復曰率清道率隋文帝置左右虞侯各置開府一人唐龍朔二年改為清道衛開元初為率府監門率隋有左右監門率掌門禁唐志曰武徳五年改左右宫門率也内率隋置左右率掌禁内侍衛唐為左右内率舊唐志曰隋初置左右内率府擬上臺千牛衛也南班筆談曰宗子授南班官世傳王曽為}
