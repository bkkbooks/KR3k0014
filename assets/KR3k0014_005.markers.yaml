  - {type: variant, offset: 1069, length: 3, content: 五經或, WYG: 漢之令官亦法古爾評事漢宣帝地節三年初置廷尉左右評魏晉無左右直曰評隋煬帝始曰評事鴻臚周官大行人也干寳曰亦周禮象胥之職漢書曰秦為典客掌諸侯四方歸義蠻夷漢改曰大鴻臚徐堅云漢改之漢百官表曰太初元年更也梁除大字應劭曰鴻聲臚傳之也傳聲贊道也劉熈曰鴻大也臚陳也欲大以禮序陳賔客也馮鑑續事始曰楚云連敖漢為典屬國按漢世典屬國自為一職非鴻臚之任也鴻臚簿唐}
