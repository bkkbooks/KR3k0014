  - {type: variant, offset: 9744, length: 536, content: 正月以石熙載為樞密直學士簽署樞密院事簽書之名自此始也治平中避英宗嫌名改曰簽書宣徽唐書裴度傳有宣徽五坊小使則宣徽官名已見於元和之時矣唐末洎五代又有南北兩院使晉天福四年以樞密副使張從恩為宣徽使權罷樞密故也蓋唐官云宋朝會要曰唐置宣徽南北院使有副使後唐省副使開寶九年以潘美依前山南東道節度充宣量徽北院使節度之領宣徽自茲始也按北史后妃傳敘北齊文宣河清中下嬪有宣徽為婦官之名也大學士唐書李泌加集賢殿大學士泌言學士加大始中宗時張說為之按說傳玄宗欲授說大學士辭曰學士本無大稱中宗崇寵大臣乃有之唐百官志曰景龍二年置也蓋其名自中宗時始今惟觀文資政端明有之學士漢孔安國序尚書言秦焚書坑儒天下學士逃難解散蓋以斥承學之士爾晉陶淵明集有學士祖企謝景夷而晉志不言其官然前亦未聞南史宋謝超宗傳曰齊受禪高帝令撰郊廟歌有聰明學士劉融等陳有德教殿學士北齊有文林館學士後周亦有麟趾殿學士當是其稱始自漢晉而命官起於宋齊也唐初有東宮王府等學士齊王元吉亦有文學館學士此從集賢昭文崇賢翰林等雜置不一貞觀初開文學館以房玄齡等十八人為學士宋朝皆為侍從之臣直學士職林曰唐憲宗朝裴垍奏集賢御書院請五品已上為學士六品已下為直學士非登朝者為校理按唐書百官志儀鳳中弘文置詳正學士又曰武德後五品已上曰學士六品已上曰直學士然則唐祖有國之初, WYG: ''}
