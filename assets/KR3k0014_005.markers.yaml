  - {type: variant, offset: 1901, length: 301, content: 而其卦六十四安得與周同也繇爻繫辭曰易之興也當商之末世周之盛德耶當文王與紂之事耶司馬遷曰文王囚而演易揚子法言曰文王重易六爻漢書揚雄傳曰文王附六爻藝文志曰文王重易六爻作上下篇按升之六四曰王用享于岐山謂文王也文王之追王在克商之後明夷之六五曰箕子之明夷箕子之囚在觀兵之時二者非文王所及也乾鑿度曰垂皇者犧卦道演德者文通卦驗曰蒼牙通靈昌之盛蓋言卦繇辭文王作也春秋左氏傳曰韓宣子適魯見易象云吾乃知周公之德蓋言卦爻辭周公作也易更三聖不言周公穎達謂父統子業故也十翼漢書藝文志重易作上下篇孔氏為之彖象繫辭序卦之屬凡十篇孔穎達周易正義曰彖象十翼以為孔子所作謂上彖一下彖二上象三下象四上繫五下繫六文言七說卦八序卦九雜卦十也二禮, WYG: 郎}
