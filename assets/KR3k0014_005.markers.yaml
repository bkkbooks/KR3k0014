  - {type: variant, offset: 7, length: 1, content: 七, WYG: 九日也宋朝㑹要曰雍熈五年二月詔改補闕為左右司諫拾遺為左右正言盖太宗欲令諫官修其職業故改其官號也然周禮地官之屬有司諫則周已名官矣唐書朱滔傳建中三年滔僭稱王後二年䀻張遂王道為司諫則滔又以此名立官也中書令舜納言周内史皆中書之任也漢武游宴後庭始宦者典事尚書謂之中書謁者置令不言謁者省}
  - {type: page-break, offset: 7, content: '', id: KR3k0014_WYG_005-4a, image: WYG0920/WYG0920-0127a.png}
  - {type: variant, offset: 7, length: 1, content: 七, krp: 九日也宋朝㑹要曰雍熈五年二月詔改補闕為左右司諫拾遺為左右正言盖太宗欲令諫官修其職業故改其官號也然周禮地官之屬有司諫則周已名官矣唐書朱滔傳建中三年滔僭稱王後二年䀻張遂王道為司諫則滔又以此名立官也中書令舜納言周内史皆中書之任也漢武游宴後庭始宦者典事尚書謂之中書謁者置令不言謁者省}
