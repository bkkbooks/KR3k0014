  - {type: variant, offset: 10, length: 3, content: 淮南子, WYG: 漢魏品卑而任重隋文帝廢三公府寮令中書令與侍中知政事遂有為宰相職林以謂漢成帝建始四年改中書謁者令}
  - {type: variant, offset: 10, length: 3, content: 淮南子, krp: 漢魏品卑而任重隋文帝廢三公府寮令中書令與侍中知政事遂有為宰相職林以謂漢成帝建始四年改中書謁者令}
