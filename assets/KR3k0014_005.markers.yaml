  - {type: variant, offset: 810, length: 187, content: 張晏曰庖犧氏將興神龍負圖而至帝王世紀曰黃帝游於洛水上見大魚煞五牲祭之雨七日夜魚流始得圖書春緯云河以通乾出天苞洛以流坤出地符河龍圖發洛龜書發孔安國以為河圖八卦是也洛書九疇是也書契尚書序曰古者伏犧氏之王天下也始畫八卦造書契以代結繩之政帝王世紀曰伏犧氏仰觀象於天俯察理於地觀鳥獸之文與地之宜近取諸身遠取諸物於是造書契五經太昊始畫八卦則易之始也又能網罟之歌則詩之始也伏犧神農黃帝之書, WYG: 官屬丞相府}
