  - {type: variant, offset: 12745, length: 150, content: 駙馬駙馬都尉漢武帝元鼎二年初置掌駙馬駙馬非正駕車者皆為副馬一曰附近也疾也通典袁樞議曰駙馬都尉置由漢武帝以假功臣戚屬齊職儀曰凡尚公主必拜駙馬都尉者自魏晉已來因為瞻準蓋以王姬之重庶姓之輕若不加等級寧可合巹所以假之皇女也漢制以列侯尚公主而魏何晏始以主壻拜故後代循用為常制蓋自晏為始也唐韻曰晉尚公主者並加之也, WYG: 事物紀原卷五}
