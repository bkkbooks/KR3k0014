  - {type: variant, offset: 589, length: 0, content: '', WYG: 作則左右廵之置亦其時事也通典曰殿中侍御史自開元初知左右廵百僚班序有雜立失言頑而不肅者則以禮罰之是則此制自開元始也李肇國史補曰𤣥宗開元初至天寳末年置御史左右廵使也臺簿漢有此官張忠為御史大夫署孫寳為主簿是也疑漢官云宋朝㑹要曰淳化四年六月始置二人後止一員也檢法唐置御史臺推直官而無檢法宋朝元豐中神宗正官制除推直始置檢法之官六傅夏商雖世嗣而太子之名亦畧矣其師傅之官亦無文至周始見文}
