  - {type: variant, offset: 14, length: 2, content: 倉頡, WYG: 中謁者令以士人為之魏文帝黄初初改秘書令為中書令也中書侍郎漢武帝置中書領尚書事有令丞郎魏黄初初置通事郎後改曰中書侍郎唐志曰晉加侍字中書舍人初學記曰魏世中書始置通事一人明帝時有通事劉泰是也髙貴鄉公改曰通事都尉尋為通事侍郎晉初置舍人通事各一人東晉各為一職梁始掌詔誥其後除通事直曰中書舍人舍人本周官掌平宫中之政尚書令三代冡宰之職也秦漢置尚書令于百官無所不主漢武元鼎二年始以張安世為}
