  - {type: variant, offset: 551, length: 0, content: '', WYG: 武徳令吏禮兵民刑工貞觀即吏禮民兵刑工光宅元年九月五日改為六官凖周禮通典曰周禮天官冡宰掌邦六典以佐王理邦國漢成置四尚書因事設員非擬于古光武分六曹稍以周禮唐武后遂以吏部為天官户部為地官禮部為春官兵部為夏官刑部為秋官工部為冬官以承六官之制國初以吏兵户刑工禮為次神宗行官制復唐故事又以吏户禮兵刑工為次也子司又曰故事以兵吏及左右司為前行刑户為中行工禮為後行每行各管四司以本行為頭司餘為子司自唐制始也二十四司自秦始置尚書而歴郎曹多寡不等少或十二亦至三十六隋有天下尚書有六曹二十四郎即今都省列曹是也其制自隋始也子司印唐㑹要曰故事凡尚書省除吏部兵部外共用都司印至聖厯二年二月九日初備文昌臺二十四司印本司郎官主之八座後漢以六曹尚書并令僕為八座梁齊亦有稱隋唐至今令僕為宰相故六尚書及左右丞為八座盖其事自漢東京始也六侍郎漢制尚書郎三嵗稱侍郎隋煬帝即位于尚書六曹各置侍郎一人按漢百官表有侍郎秩比四百石也郎中漢制尚書郎初上稱守郎中晉武帝始置諸曹郎中唐以來號}
