  - {type: variant, offset: 7620, length: 1116, content: 騎尉也右十二轉唐以為勳官宋朝因之三師尚書周官曰乃立太師太傅太保茲惟三公晉以為上公後魏始號三師太師虞官商時箕子為之漢官儀曰紂時胥餘為之或云胥餘箕子字也書微子作誥父師少師是也史記曰周成王為太子以太公望為太師續事始曰史記周文王得呂尚於磻溪以為師謂之太師太傅周官或曰古官通典曰成王時畢公為之大戴禮曰周公始為之太保虞官杜佑云商太甲時伊尹為之文王世子曰虞有師保是也三公周始有三公坐而論道後漢始以太尉司徒司空為三公或曰王莽時也太尉秦官河圖錄運法曰堯坐舟中與太尉舜觀鳳凰應劭以為周官皆非也按禮記月令曰孟夏太尉贊傑月令本出於呂不韋不韋秦相故知其秦官耳漢百官表曰太尉秦官掌武事者司徒古官也管子曰黃帝得祝融南方使為司徒少昊以祝鳩氏為司徒舜之命契曰汝作司徒敬敷五教在寬司空亦古官管子曰黃帝得奢龍辨于東方使為士師即司空也少昊鳲鳩氏為司空舜典曰伯禹作司空三臺傅子曰黃帝以風后配上臺后土配中臺五聖配下臺故後世由此以三公為三臺將相軒轅本紀曰帝舉風后為相力牧為將此蓋將相之始也管子曰黃帝得六相而天下治虞舜舉元愷而謂之十六相重事唐會要曰神龍元年五月制盧欽望加平章軍國重事是也景雲三年七月詔竇懷正軍國重事宜共平章又太和四年六月制以裴度為司徒平章軍國重事是時度勳望高以疾上相印又惜之故有此詔唐書裴度傳曰文宗太和四年加度司徒平章軍國重事則是此名自唐中宗命盧欽望始也宋朝元祐初今上新即位以文潞公始為之用前志也平章唐有中書門下平章事為宰相之任蓋行丞相事之類漢韓安國為御史大夫行丞相事後漢周澤行司徒事是也唐百官志曰李靖以疾辭位詔三兩日一至中書門下平章政事名官自此始也會要曰正觀八年十一月也又正觀十七年六月高士廉同中書門下平章政事高宗永淳四年四月郭待舉等並同中書門下同承受進止平章事上謂參知政事崔知溫曰待舉歷任尚淺且令預聞政事未可與卿同受名稱自此四品已下知政事者以平章事為名唐志以為永淳元年也參政唐宰相有參知政事宋朝以為執政官唐會要曰武德元年六月裴寂知政事正觀元年九月杜淹參議朝政三年二月魏徵參預朝政十三年劉洎始為參知政事唐太宗本紀云十一月戊辰也蓋其命官自劉洎始云宋朝會要曰乾德二年四月以薛居正呂餘慶參知政事先是已命趙普為相將用居正等為副太祖召陶穀問下丞相一等有何官對曰唐有參知政事故以命之蓋帝意未欲令居正等名位與普齊也錢若水曰按唐故事劉洎為參知政事宰相任也高宗用郭待舉謂崔知溫曰待舉歷任尚淺未可與卿等同名稱遂令同平章事以此言之平章事亞參知政事矣穀不能遠引漢御史大夫亞丞相故事失之也神宗元豐中行官制除之左右相通典曰成湯初置二相以伊尹仲虺為之伊尹號阿衡仲虺為左相是也又武丁得傅說爰立作相王置諸其左右書亦稱召公為保周公為師相成王為左右故秦悼武王置左右相漢高后亦置二相自此以後多非尋常人臣, WYG: 侯}
