  - {type: variant, offset: 604, length: 1, content: 與, WYG: 以貳詹事諭徳唐龍朔二年初置太子左右諭徳盖取文王世子教之以事而諭諸徳之義太子侍讀漢宣帝詔王褒等皆之太子宫娛侍太子朝夕誦讀此盖其始也宋有諸王侍讀唐貞觀中許叔牙為王侍讀髙宗升春宫仍兼侍讀職林云開成元年十一月宰相李石奏置太子諸王侍讀太子侍講後漢張酺以尚書講論授皇太子其事始見于此魏官品始有太子侍講此置官之始也中舍人晉咸寧中初置大子中舍人官宋朝神宗又置之唐以來有太子中舍而無中舍人舍人}
