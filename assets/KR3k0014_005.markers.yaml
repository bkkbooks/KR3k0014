  - {type: variant, offset: 9285, length: 166, content: 唐代宗永泰中敕中官董廷秀管樞密因置內樞密使後唐莊宗始用郭崇韜分中書兵房置樞密院與宰相分秉朝政自此始用士人凡文事出中書武事出樞密謂之二府宋朝會要曰開寶九年二月以曹彬為樞密使領忠武軍節度樞密帶節度自此始也太平興國六年九月以石熙載為戶部尚書充樞密使文資正官充使自此始也樞相宋朝會要曰唐以中官為樞密使後唐始有帶相印者則樞相之始自後唐也又至道, WYG: 雍熈}
