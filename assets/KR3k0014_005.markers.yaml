  - {type: variant, offset: 4027, length: 201, content: 連珠興於漢章帝班固賈逵傅毅皆受詔作之體則假喻達旨賢者微悟欲使歷歷如貫珠易覩而可悅故曰連珠梁沈約云連珠之作始自揚子雲歐陽詢作藝文類中亦有揚雄連珠則為斯文之興不自漢章明矣爵公侯伯子男謂之爵唐虞輯五瑞修五玉是五等自堯舜始也禮制文嘉曰殷爵三等周五等或謂黃帝立五等也封建沿革曰黃帝分州畫野得百里之國萬區唐虞列為五等此封建之始也帝王世紀曰炎帝之世有諸侯風沙氏史記曰神農氏世衰諸侯相侵則炎帝時已有諸侯至黃帝始大封也陸, WYG: 博}
