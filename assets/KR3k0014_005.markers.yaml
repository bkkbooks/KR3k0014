markers:
  front:
  - {type: variant, offset: 0, length: 3, content: 經籍藝, WYG: 欽定四庫全書事物紀原卷五宋髙承撰三省綱轄部二十二侍中環濟要略曰古官也風后為黄帝侍中周有常伯見尚書立政秦漢為侍中徐堅初學記曰秦取古官置本丞相史也丞相使史五人來徃殿中奏事故謂之侍中後魏始為樞宻之任梁}
  - {type: page-break, offset: 0, content: '', id: KR3k0014_WYG_005-1a, image: WYG0920/WYG0920-0125a.png}
  - {type: variant, offset: 0, length: 3, content: 經籍藝, krp: 欽定四庫全書事物紀原卷五宋髙承撰三省綱轄部二十二侍中環濟要略曰古官也風后為黄帝侍中周有常伯見尚書立政秦漢為侍中徐堅初學記曰秦取古官置本丞相史也丞相使史五人來徃殿中奏事故謂之侍中後魏始為樞宻之任梁}
  body:
  - {type: variant, offset: 4, length: 0, content: '', WYG: 以為宰相職事唐侍中與中書尚書二令並為真宰相矣門下門下侍郎秦官秦有黄門侍郎歴代不改與侍中俱管門下衆事凡禁門黄闥故號黄門其官給事于黄闥内故云唐天寳元年改曰門下唐百官志云二年也散騎秦置散騎又置中常侍本二官魏文帝黄初初合散騎常侍為一官唐顯慶中分左右左隸門下右中書也給事秦置通典曰加官也初秦漢别有給事黄門之職後漢有給事黄門侍郎左右給事中以有事殿中故曰給事中獻帝時去給事黄門侍郎後周有給事中士别置給事中在六官外隋初開皇六年始于吏}
  - {type: page-break, offset: 4, content: '', id: KR3k0014_WYG_005-1b, image: WYG0920/WYG0920-0125b.png}
  - {type: page-break, offset: 4, content: '', id: KR3k0014_WYG_005-2a, image: WYG0920/WYG0920-0126a.png}
  - {type: variant, offset: 4, length: 0, content: '', krp: 以為宰相職事唐侍中與中書尚書二令並為真宰相矣門下門下侍郎秦官秦有黄門侍郎歴代不改與侍中俱管門下衆事凡禁門黄闥故號黄門其官給事于黄闥内故云唐天寳元年改曰門下唐百官志云二年也散騎秦置散騎又置中常侍本二官魏文帝黄初初合散騎常侍為一官唐顯慶中分左右左隸門下右中書也給事秦置通典曰加官也初秦漢别有給事黄門之職後漢有給事黄門侍郎左右給事中以有事殿中故曰給事中獻帝時去給事黄門侍郎後周有給事中士别置給事中在六官外隋初開皇六年始于吏}
  - {type: variant, offset: 5, length: 1, content: 第, WYG: 置給事郎煬帝移為門下職唐武徳三年改給事郎為給事中夕拜漢給事中故事每日暮時入對青𤨏門拜故謂之夕拜亦為夕郎諫議秦置諫大夫後漢光武增為諫議大夫歴代不改唐龍朔中屬中書開元後歸門下貞元四年五月分左右以右隸中書二起居周有左右史王言則左史書之動則右史書之盖起居之本也漢武有禁中起居後漢馬后自撰明帝起居注則其事似在宫中古女史之職也此始有起居之名魏晋以降著作掌之後魏有置起居令史别置修起居注隋煬帝置起居舍人唐貞觀二年于門下省置起居郎顯慶中復于中書置起居舍人以郎為左史以舍人為右史諫正唐武后垂拱中置拾遺補闕掌諷諫中宗以來有左右開元時左屬門下右中書會要云垂拱元年二月二}
  - {type: page-break, offset: 5, content: '', id: KR3k0014_WYG_005-2b, image: WYG0920/WYG0920-0126b.png}
  - {type: page-break, offset: 5, content: '', id: KR3k0014_WYG_005-3a, image: WYG0920/WYG0920-0126c.png}
  - {type: page-break, offset: 5, content: '', id: KR3k0014_WYG_005-3b, image: WYG0920/WYG0920-0126d.png}
