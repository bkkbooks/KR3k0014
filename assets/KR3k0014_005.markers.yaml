  - {type: variant, offset: 11954, length: 774, content: 於集仙殿改殿名集賢改修書使為集賢殿書院學士宋朝曰集賢院學士修國史唐會要曰自正觀中始置史館而著作罷史任至顯慶四年三月始詔劉仁軌等修史長安二年劉允濟又稱修國史天祐二年五月二十九日敕史館修撰張策職名稍卑不稱內庭密重宜稱兼修國史蓋太宗始置館雖有修史之官尚未以修國史為名也高宗乃以命仁軌等云鄴城舊事曰北齊神武時魏收自散騎常侍兼中書侍郎修國史修撰唐明皇開元八年始置修撰於集賢殿天寶後他官兼史職者亦曰史館修撰吳處厚青箱雜記曰太平興國中趙鄰幾等直史館掌修撰楊文舉為史館編修是時修撰未列於職至道中始以李若拙為史館修撰也侍講後漢張酺顯宗時數講於御前每侍講有救正之辭帝常言酺侍講屢諫正及他傳往往有侍講禁內之文名蓋起於此也侍讀唐明皇開元三年七月敕每讀史籍中有闕宜選耆儒博碩一人每日侍讀故馬懷素褚元量更日入直此侍讀之始也直史館唐會要曰正觀三年閏十二月移史館於門下省其修撰史事以他官兼領或品卑而有才者亦直焉此直史館之始也直昭文宋朝會要曰淳化元年八月二十五日以品祐之等直昭文館先是但有直史館至是始命祐之等分直備三館職也談苑曰淳化中復置直史館疑唐有是職也直集賢唐明皇開元十二年改麗正修書院為集賢院增置校理及直院宋朝會要曰淳化元年八月二十六日以和濛直集賢院集賢舊無直院惟江南李氏嘗以朝士任之至是始置從新置也談苑曰淳化中始置直祕閣宋朝會要曰端拱元年五月詔就崇文院中堂建祕閣是月以宋泌直祕閣此蓋置官之始也校理唐開元十二年增置集賢校理宋朝太宗端拱元年建祕閣即以杜鎬為祕閣校理此二官之始也青箱雜記曰端拱初以李宗諤為集賢校理則宋朝集賢校理自宗諤始也說書宋朝會要曰景祐元年二月詔以賈昌朝等為崇政殿說書明道元年翰林侍講孫奭年老乞外郡上問誰可代充講官奭舉昌朝等至是始特置此職四年改為天章閣侍講慶歷二年以趙師民預講復為崇政殿說書稱謂筆談曰集賢院記云開元故事校書官許稱學士今三館貼職皆稱學士循唐典也宋朝, WYG: ''}
