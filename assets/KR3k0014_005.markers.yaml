  - {type: variant, offset: 603, length: 0, content: '', WYG: 為太子詹事庶子禮記燕義曰古者周天子之官有庶子周禮夏官司馬之屬謂之諸子秦置中庶子詹事員漢因之晉以為東宫官晉書鄭黙為中庶子朝官以為太子官是也隋分左右通典曰品官命數篇漢有太子庶子魏有太子中庶子則非晉以為東宫官也少詹唐始于詹事府置少詹事一}
