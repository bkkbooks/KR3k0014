  - {type: variant, offset: 18, length: 1, content: 作, WYG: 學記曰秦官也漢因之僕射秦官史記始皇本紀有僕射周青臣是也古者重武以善射者掌事故曰僕射僕射者僕役于射也一云僕主也古有主射以督課漢因秦事自侍中謁者博士郎軍屯永巷洎尚}
  - {type: page-break, offset: 18, content: '', id: KR3k0014_WYG_005-5b, image: WYG0920/WYG0920-0127d.png}
  - {type: variant, offset: 18, length: 1, content: 作, krp: 學記曰秦官也漢因之僕射秦官史記始皇本紀有僕射周青臣是也古者重武以善射者掌事故曰僕射僕射者僕役于射也一云僕主也古有主射以督課漢因秦事自侍中謁者博士郎軍屯永巷洎尚}
  - {type: variant, offset: 20, length: 0, content: '', WYG: 皆有之成帝建始元年初置尚書五人一人為僕射此盖其始也獻帝建安四年}
  - {type: variant, offset: 20, length: 0, content: '', krp: 皆有之成帝建始元年初置尚書五人一人為僕射此盖其始也獻帝建安四年}
  - {type: variant, offset: 21, length: 2, content: 辨治, WYG: 邵榮為左僕射衛臻為右僕射置左右之始也左右丞秦置尚書丞一人漢成帝建始四年置四人光武始减其二分左右佐令僕之事唐以來在尚書之下宋朝官制改陞在上又為執政官六尚書尚書秦官秦時少府遣吏四人在殿中主發書故謂之尚書劉向新序曰齊宣王為太室香居諫王召尚書尚書之名則七國時已有其官矣晉志曰漢光武始分尚書為六曹通典曰漢初尚書雖有曹名不以為號及靈帝以梁鵠為選部尚書于是始見曹名漢}
