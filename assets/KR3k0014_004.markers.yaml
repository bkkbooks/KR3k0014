  - {type: variant, offset: 2363, length: 0, content: '', krp: 古者有分土無分民若乃以户口為差降略封疆之逺近所謂分民自漢始也盖漢艾亡秦大侯不過萬家小者五六百户則封國之以户漢其始也諸侯帝王世紀曰女媧未有諸侯有共工氏任智刑以强伯而不王炎帝世乃有諸侯夙沙氏叛炎帝修徳夙沙之民自攻其君則建侯分土自炎帝始也諸王古者天子稱王周失其道春秋之時吳楚之君始僭稱之楚世家曰周夷王時楚熊渠曰我蠻夷也乃立長子康為句亶王紅為鄂王執疵為越章王厲王暴虐復去之至於熊通始僭號是為楚武王此諸侯號王之始也七雄爭强亦各稱之秦至恵王始稱之四年齊魏為王十三年韓亦為王秦并天下號皇帝除王之名漢滅楚始謂之諸侯王盖諸侯封王自楚漢之際也郡王事始云}
  - {type: variant, offset: 2364, length: 0, content: '', WYG: 魏始封功臣為郡王以為王封郡之始按晉書宗室傳太康九年益封子邁為隋郡王則其事自晉始矣然庶姓功臣之封而稱某郡王當自元魏始也國公事始曰隋文帝始封功臣為國公郡公後漢光武建武十三年以土無二王爵不過公於是以太原王章為齊公魯王興為魯公功臣悉為公晉始曰開國郡公也開國由三代至漢魏諸侯無以國為號第曰某侯耳晉令始有開國之稱故五等皆郡縣開國陳亦有開國郡公縣侯伯子男侯已降無郡封田唐迄今因而不改盖開國之號自晉始也官崔實政論曰太昊之世設九庖之官後有龍瑞則以龍紀官左傳郯子之論是也盖設官之初原於伏羲氏也至唐虞建官惟百故歴代稱百官焉守官漢有守令守郡尉以秩未當得而越授之故曰守猶今權也則官之有守自漢始也宋朝神宗改官制始正其名故有行試守三等通典曰試未正命也階髙官卑稱行階卑官髙稱守試官職林曰唐武后天授二年凡舉人無賢不肖咸加擢拜大置試官則官之有試自唐始也謂之試取尚書明試以功之意唐會要曰天授二年二月十五日十道使舉人王山輝並授試官試官自此始也又曰檢校試官皆神龍已後有之檢校唐書髙祖紀武徳六年四月癸酉楊恭仁檢校梁州諸軍事疑檢校之官自此始也至太宗紀貞觀中又有杜淹檢校吏部尚書杜如晦檢校侍中唐會要曰檢校官神龍後有之非也譚賔録曰唐陳少游檢校職方員外郎充廻紇使云郎官之有檢校自此始也知判職林曰唐中宗神龍二年既置員外官同正員又有檢校試攝知判等官知者云知某官判者云判某官宋朝皆循用之府寺監省州縣城寨各以官知判盖自唐中宗始也流内通典曰隋制九品自太師始焉謂之流内流内之目自此始也流外又曰凡府寺胥吏守局既乆積月累勞故得齒於下品文中子曰吏而登位非古也推此疑}
