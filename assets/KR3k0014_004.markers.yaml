  - {type: variant, offset: 6429, length: 761, content: 色蓋自垂衣裳則有之後世加文飾耳衫子又曰女子之衣與裳連如披衫短長與裙相似秦始皇方令短作衫子長袖猶至於膝宜衫裙之分自秦始也又云陳宮中尚窄衫子纔用八尺當是今制也偏衫僧尼之上服也僧史略曰後魏宮中見僧自恣偏袒右肩乃施一邊衣號偏衫全其兩肩衿袖失祇支之體此疑其始也腰帶實錄曰自古皆有革帶皮插垂頭至秦二世始名腰帶唐高祖令向下插垂頭取順下之義名鉈尾上元元年自三品官至庶人各有等制以金玉犀銀鍮鉐銅鐵為飾自十三銙至六銙筆談曰自北齊全用胡服蹀躞帶所垂蓋欲以佩帶弓劍帉悅算囊刀礪之類後去蹀躞猶存其環環所銜以蹀躞如馬鞦根即今帶銙也天子必以十二環為節唐開元之後帶鉤尚穿帶本為孔宋朝加順折也金帶穆天子傳曰天子北征舍於珠澤珠澤之人獻白玉石天子賜黃金六鐶三五朱帶此即金帶之起也至唐定令為四品服宋朝太祖又以玉不離石犀不離角可貴者金也作金裘紋方團帶賜政府御仙花帶賜侍臣今世謂笏頭荔枝者此始也環瑞應圖曰黃帝時西王母獻白環舜時又獻之則環當出於此指環春秋繁露曰紂刑鬼侯取其指環五經要義曰古者后妃群妾御於君所當御者以銀環進之娠則以金環退之進者著右手退者著左手今有指環此之遺事也本三代之制者也釧通俗文曰環臂謂之釧後漢孫程十九人立順帝有功各賜金釧指環則釧之起漢已有之也訶子本自唐明皇楊貴妃作之以為飾物貴妃私安祿山以後頗無禮因狂悖指爪傷貴妃胸乳閒遂作訶子之飾以蔽之事見唐宋遺史珮董巴輿服志曰古者君臣皆佩玉三代同之蓋起于夏后氏至周始制其等禮玉藻所記天子佩白玉公侯山玄大夫水蒼世子瑜玉士瓀玫是也璽春秋運斗樞曰舜為天子黃龍負圖封兩瑞有璽文曰天皇符璽後漢祭祀志曰三王彫文詐偽漸興始有璽符以檢姦萌是印璽之起肇於三代也應劭曰璽信也古者尊卑共之月令云固封璽左傳襄公在楚季武子使公冶問璽書而與之是也衛宏曰秦已前民亦以金玉為印龍虎鈕秦始天子稱璽又以玉群臣莫敢用也唐武后改曰寶章衡編年通載曰開元六, WYG: ''}
