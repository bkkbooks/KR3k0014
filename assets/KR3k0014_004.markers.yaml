  - {type: variant, offset: 2338, length: 0, content: '', WYG: 小篆秦徐邈造刻符扶風曹喜造籀篆書周柱下史所造圖書易曰河出圖洛出書聖人則之張晏曰庖犧氏將興神龍負圖而至帝王世紀曰黄帝游於洛水上見大魚煞五牲祭之雨七日夜魚流始得圖書春緯云河}
  - {type: page-break, offset: 2338, content: '', id: KR3k0014_WYG_004-4a, image: WYG0920/WYG0920-0098a.png}
  - {type: variant, offset: 2338, length: 0, content: '', krp: 小篆秦徐邈造刻符扶風曹喜造籀篆書周柱下史所造圖書易曰河出圖洛出書聖人則之張晏曰庖犧氏將興神龍負圖而至帝王世紀曰黄帝游於洛水上見大魚煞五牲祭之雨七日夜魚流始得圖書春緯云河}
  - {type: variant, offset: 2339, length: 1, content: 竹, WYG: 通乾出天苞洛以流坤出地符河龍圖發洛龜書發孔安國以為河圖八卦是也洛書九疇是也書契尚書序曰古者伏犧氏之王天下也始畫八卦造書契以代結繩之政帝王世紀曰伏犧氏仰觀象於天俯察理於地觀鳥獸之文與地之宜近取諸身逺取諸物於是造書契五經六英始畫八卦則易之始也又有網罟之歌則詩之始也伏犧神農黄帝之書謂之三墳則書之始也易始八卦而文王六十四故謂之周易葢夏曰連山商曰歸藏周曰周易故也濟南伏生以其上古之書故曰尚書毛公傳詩以名家而鄭康成箋之故曰毛詩然則五經或因或作而成於仲尼秦焚六籍班班僅存書亡其半詩亡者六篇春秋偶完而禮樂之書無復遺文易以卜筮故得全今禮記又雜出於漢儒如月令之出於吕不韋蔡邕王肅則以為周公作漢文帝令諸儒博士作王制子思作中庸劉瓛云公孫尼子作緇衣而樂記一篇司馬遷以為公孫洪所記著以為樂書在八書之一他皆錯雜出自漢世也四部今崇文所録書具經史子集為甲乙丙丁四部者葢始於晉李充按晉書李充傳充為著作郎時典籍混雜充以類相從分為四部此葢其始也續事始曰魏武置四庫圖書分甲乙丙丁為部目藏之録云普祕書監荀朂因魏中經更以四部别之恵懐之亂及李充始加刪正荀朂四部之法總以甲乙為次也巾箱南史齊衡陽王鈞嘗親手細書五經部為一卷置巾箱中侍讀賀玠曰殿下家有墳素復何細書别藏巾箱鈞曰巾箱中檢閱既易且更手寫則永不忘矣諸王聞之爭效為巾箱今謂籍之細書小本者為巾箱始於此也石經漢靈帝詔諸儒校定五經鐫石以刋其文命蔡邕等書為古篆隸三體立於太學門謂之石經印板筆談曰板印書籍唐人尚未盛}
