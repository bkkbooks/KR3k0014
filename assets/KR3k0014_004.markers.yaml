  - {type: variant, offset: 5895, length: 0, content: '', WYG: 下制肅宗復令中書以功除官今謂堂除也考績起於虞舜三載考績之文故今官以考定勞一嵗為考四考而遷謂磨勘也循資唐選舉志開元十八年裴光庭始作循資格而賢愚一槩必與格合乃得銓授限年躡級不得踰越于今以為制也致仕尚書咸有一徳曰伊尹既復政厥辟告歸疏云告老致政事于君此臣下致仕之初也至}
