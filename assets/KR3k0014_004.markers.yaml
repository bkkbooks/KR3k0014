  - {type: variant, offset: 11069, length: 355, content: 也今貢舉發解皆用其事曰封彌宋朝會要曰咸平二年正月命董龜正等封印卷首蓋試日就院置局始命官曹主之也話錄亦謂糊名自唐武后始也巡鋪宋朝會要曰雍熙二年正月詔禮部引試分差官廊下察視勿容私相教授此巡鋪之始也初以檢視九經諸科至景德四年十二月十三日命喬希顏等始為巡試鋪又天聖二年正月始有巡鋪官孔延魯自此巡鋪遂為定制也監門又曰雍熙二年正月詔禮部試九經諸科輪番差官二人在省門監守此試院監門之始也洎真宗景德四年十二月十三日乃命嚴類等專監門也知舉唐選舉志曰隋唐之代貢士皆考功主試開元二十四年考功員外郎李昂為舉人詆訶玄宗以員外郎望輕遂移貢舉於禮部以侍郎主之禮部選士自茲始也對拜筆談曰禮部貢院試進士曰設香案於階下主司與舉人對拜此唐禮也設為供帳有司具茶湯至試學究則悉徹帳幕氈席之類亦無茶湯防氈幕及供應人私傳所試經義蓋嘗有敗者故也別試又唐選舉志, WYG: ''}
