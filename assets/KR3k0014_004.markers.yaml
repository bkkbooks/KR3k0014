  - {type: variant, offset: 7330, length: 4, content: 省樞密院, WYG: 年二月魏徴參預朝政十三年劉洎始為參知政事唐太宗本紀云十一月戊辰也盖其命官自劉洎始云宋朝會要曰乾徳二年四月以薛居正吕餘慶參知政事先是已命趙普為相將}
  - {type: variant, offset: 7330, length: 4, content: 省樞密院, krp: 年二月魏徴參預朝政十三年劉洎始為參知政事唐太宗本紀云十一月戊辰也盖其命官自劉洎始云宋朝會要曰乾徳二年四月以薛居正吕餘慶參知政事先是已命趙普為相將}
