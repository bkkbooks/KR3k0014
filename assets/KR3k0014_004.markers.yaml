  - {type: variant, offset: 10227, length: 317, content: 貢舉例送此武舉之始也宋朝其科雖不廢亦不常舉自神宗立武學始詔三歲一次隨進士明法發解也事訓云天聖中置皇祐初詔罷治平元年樞密院言不可廢英宗復置之鄉貫唐會要曰開元十九年六月六日敕諸州貢舉皆於本貫不得於所在附貫然則貢舉之用鄉貫自明皇始也貢士周禮大司徒邦國舉賢者於王則貢舉之始也唐武德初諸州號明經俊秀州縣試取合格者每年十月隨方物入貢摭言曰武德辛巳歲四月一日敕也按辛巳武德四年云群見唐高祖始詔舉人隨物入貢會要曰長壽二年十月十日劉承慶疏伏見比來天下所貢物至元日皆陳在御前唯貢人獨於朝堂拜恐所謂重物輕人請貢人列方物之前從之此貢人群見之始也筆談曰舊制貢舉人到闕悉入對謂之群見遠方士不知朝廷儀班列紛錯見之日至有更相抱持以望黼座有司患之近歲止令解頭入見蓋自仁, WYG: 文}
