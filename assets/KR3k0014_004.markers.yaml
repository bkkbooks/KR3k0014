  - {type: variant, offset: 7203, length: 1, content: 印, WYG: 掌議論而劉向說苑有晉太中屠餘見晉平公之驕則晉亦有其官矣當是晚周列國之官秦以太中為大夫也中大中大夫亦秦置為光禄勲屬官前漢文紀後元五年有中大夫令免漢書載趙中大夫白公引涇為渠中散王莽所置官也或云漢有中散大夫朝議隋置散官取諸大夫以上得奉朝議以為名朝請通典曰漢竇嬰為朝請竇太后憎嬰門籍不得入朝請此其始也漢律諸侯春朝天子曰朝秋曰請又曰奉朝請無員本不為官漢東京罷省三公外戚皇室諸侯多奉朝請奉朝請者奉朝會請召而已隋開皇中罷奉朝請置朝請大夫為散官取漢公卿年髙徳重者以列侯奉朝請之義也朝散亦隋所置為散官也朝奉宋朝會要曰太平興國元年詔改唐朝議大夫為朝奉大夫朝請郎通典曰朝請郎亦隋官盖採晉宋齊梁奉朝請之名也朝散郎亦隋散官也朝奉郎宋朝太平興國初改唐朝議郎為朝奉郎承議通典曰隋所置舊唐書百官志曰唐武徳}
