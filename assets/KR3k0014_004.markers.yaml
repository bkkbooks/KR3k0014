  - {type: variant, offset: 8094, length: 962, content: 樂記曰武王克商袒冕搢笏而虎賁之士說劍也笏袋唐明皇雜錄曰故事皆搢笏於帶然後乘馬張九齡體羸不勝因設笏囊使人持之馬前遂以為常制梁職儀曰八座尚書以紫紗裹手板垂白絲於手如筆通志曰今僕射尚書手板以紫皮裹之名曰笏袋梁中世以來執笏者皆白筆綴頭以紫囊之此又似笏之設囊之始也笏帛酉陽雜俎曰陳希烈不便搢笏騎馬以帛囊之令左右持之笏之設帛自此始也韤文子曰文王伐崇韤係解則其物已見於商代實錄曰自三代以來有之謂之角韤前後兩相承中心繫之以帶洎魏文帝吳妃乃始裁縫為之即今樣也以綾為之洛神賦羅韤生塵是也履舄世本曰于則作扉履宋衷曰黃帝臣草曰扉麻皮曰履實錄曰三代皆以皮為之單底曰履復底曰舄古今注曰舄以木置履下乾臘不畏泥溼履乃屨之不帶者蓋祭服謂之舄朝服謂之履燕服謂之屨也周禮屨人有赤黑二舄素葛命功等四屨亦通名耳續事始曰宋元嘉元年始有鳳頭履故今人亦有鳳頭鞋也靴釋名曰本胡服趙武靈王所作實錄曰胡屨也趙武靈王好胡服常短靿以黃皮為之後漸以長靿軍戎通服之唐馬周以麻為之殺其靿加以靴氈開元中裴叔通以羊皮為之隱麖加以帶子裝束筆談曰北齊全用胡服長靿靴也續事始曰故事胡虜之服不許著入殿省至馬周加飾乃許也屨草履也詩糾糾葛屨是也唐韻曰扉草屨黃帝臣于則所造世本亦曰于則作扉屨宋衷云草屨為扉實錄謂始皇二年始以蒲為履馮鑑續事引古今注云屨亦履也以謂有帶者此說非也鞋古者草謂之屨皮謂之履實錄曰鞵夏商皆以草為之周以麻晉永嘉中以絲或云馬周始以麻為之名鞋也古今注曰魏文帝絕寵段巧笑始製絲履則非晉永嘉中始以絲為鞋矣按禮少儀云國雖靡敝君子不履絲屨則周人已用絲為屨也屐異苑曰介之推抱木燒死晉文公伐以製屐蕭子顯齊書曰襄陽有發楚王冢獲王屐論語隱義曰孔子至蔡有取孔子屐者按晉文公之時已有製屐之事而孔子亦有其物則是屐之為物春秋之閒已見於世矣至司馬晉遂為常服也古今注曰屐即舄之制而木匠曰齒也雨衣事始曰凡雨具周已有左傳云陳成子衣製仗戈杜預注曰製雨衣也是矣炙轂子曰帷絹油制之及油帽陳始有之也馮鑑又引左傳楚子次於乾谿雨雪王皮冠秦復陶以證雨衣按虞開父為周陶正注曰陶復陶白氏取為尚衣之職杜預又以復陶為油衣蓋若晉武所焚雉頭裘唐太平公主所服百鳥毛裙今世駝褐之類也不得為雨衣云學禮有虞氏養國老於上庠又曰古之教者家有塾黨有庠遂有序國有學孟子曰夏曰校商曰序周曰庠學則三代共之沿革曰有虞氏大學為上庠然則學自有虞氏始也通典曰漢文翁為蜀郡修起學宮, WYG: ''}
