  - {type: variant, offset: 2342, length: 0, content: '', WYG: 自馮道始印五經之後典籍皆為板本即唐始為板印矣五代㑹要曰後唐長興三年二月中書門下奏請依石經文字刻九經印板也八卦易繫辭曰兩儀生四象四象生八卦又曰庖犧氏之王天下也始作八卦以通神明之徳以類萬物之情孔安國序尚書曰伏犧始畫八卦史記太史公自叙曰伏犧至純厚作易八卦董巴議曰昔伏犧始造八卦作三畫以象二十四氣禮緯含文嘉曰伏犧徳合上下天應以鳥獸文章地應以河圖洛書伏犧則而象之始作八卦王子年拾遺記曰伏犧坐於方壇之上聽八風之氣乃畫八卦六十四帝王世紀曰炎帝重八卦之數究八八之體為六十四卦史記周本紀曰西伯囚羑里葢益易之八卦為六十四揚子法言易始八卦而文王六十四孔頴達周易正義曰重卦之人王弼以為伏犧鄭𤣥以為神農孫盛以為夏禹史遷以為文王說卦云昔者聖人之作易也幽贊於神明而生蓍謂伏犧也又繫辭之論用蓍云四營而成易十有八變而成卦明用蓍在六爻之後非三畫之時太昊始有蓍筮則伏犧重卦明矣穎達以謂王弼以伏犧既畫八卦即自重為六十四卦為得淮南子亦曰八卦可以識吉凶知禍福矣而伏犧為之六十四變不然周官太卜三易二曰歸藏杜子春以為黄帝書而其卦六十四安得與周同也繇爻繫辭曰易之興也當商之末世周之盛徳耶當文王與紂之事耶司馬遷曰文王囚而演易揚子法言曰文王重易六爻漢書揚雄傳曰文王附六爻藝文志曰文王重易六爻作上下篇按升之六四曰王用享于岐山謂文王也文王之追王在克商之後明夷之六五曰箕子之明夷箕子之囚在觀兵之時二者非文王所及也乾鑿度曰垂皇者犧卦道演徳者文通卦驗曰蒼牙通靈昌之盛葢言卦繇辭文王作也春秋左氏傳曰韓宣子適魯見易象云吾乃知周公之徳葢言卦爻辭周公作也易更三聖不言周公頴達謂父統子業故也十翼漢書藝文志重易作上下篇孔氏為之彖象繫辭序卦之屬凡十篇孔頴達周易正義曰彖象十翼以為孔子所作謂上彖一下彖二上象三下象四上繫五下繫六文言七說卦八序卦九雜卦十也二禮通典曰周公攝政六年致太平述文武之徳制周官及儀禮孔子時已不能具秦平天下收儀禮歸之咸陽故得不亡也春秋杜預春秋序曰春秋者魯史記之名也孟子曰晉謂之乗楚謂之檮杌而魯謂之春秋事始據此云起自周公旦尚書序亦曰孔子約史記而修春秋論語孔子沒七十子之儔會集夫子之言以為論語葢其書成於曽參有若故其文毎至二子所記多曰曽子有子他則皆字也唐柳宗元亦謂成於曽子子思之徒宋朝翰林鄭學士獬亦謂論語成於曽子不然曽子弟子所記也孝經史記仲尼弟子傳曰曽參字子輿孔子以為能通孝道故授之業作孝經葢孝經以曽子故作也爾雅郭璞爾雅序曰興於中古隆於漢代豹䑕既辨其業亦富大抵解詁詩人之㫖或曰周公作以其文考之如瑟兮僩兮衛武公之詩也猗嗟名兮齊人刺魯莊公也而文皆及之則周公安得述也承謂當是出於孔子刪詩書之後爾西京雜記曰郭偉謂爾雅有張仲孝友張仲宣王時人則非周公之制明矣劉子駿以問揚子雲曰孔子門徒游夏之儔所記以解詁六藝者也劉向以為外戚傳稱史佚教其子以爾雅小學又記言孔子教魯哀公學爾雅爾雅之出逺矣舊傳學者皆云周公所記也張仲孝友之類後人所足耳御製家語舜作南風之詩此則御製之始也子文心雕龍曰鬻熊作書題曰鬻子盖周初人此名子之始也史吕氏春秋曰蒼頡造史帝王世紀曰黄帝時造史蒼頡始作文字史官之作葢自此始記其言行䇿而藏之則史之原起於黄帝實録三代之王有左右史記其言動漢武有禁中起居明帝有起居注而無名實録者唐藝文志所載實録自周興嗣梁皇帝實録為始則其事自兹以為始也著書史記太史公自叙曰昔西伯拘於羑里演周易則著書之始也類事證古類事其始本出於梁沈約之徒屬辭比事徃徃成編故唐白居易傚之為六帖山海經其文所記皆山川草木鳥獸之竒疑禹治水所過所見而識之莊子所謂齊諧者志怪也禹知而名之益見而記之當是此也其書盛行於漢氏自劉向辨貳負之屍始也音韻筆談曰音韻之學自沈約為四聲及天竺梵學入中國其學漸宻也切字又曰切字本出於西域漢人訓字正曰讀如某字未用反切然古語已有二聲合為一字如不可為叵如是為爾而巳為耳之乎為諸之類似西國二合音蓋切字之原也如耎字從而犬亦切音殆與聲俱生莫知從來也切韻陸法言切韻序曰隋開皇初劉臻等八人論法言論及音韻法言記之後取諸家字書所記定為切韻五巻其書成於仁夀元年唐天寳十三載孫愐増修目曰唐韻押韻張孟押韻後序曰押韻肇自顔魯公迄于聖宋蓋孟在天聖中准宋韻重編集也玉篇梁大周九年三月顧野王撰也唐上元元年甲戍九月孫强又増加字云詩樂書曰伏羲之樂曰立基神農之樂曰下謀夫樂必有章樂章之謂詩始於太昊之世五言李翰䝉求曰李陵初詩始變其體作五言格也其始亦本於詩佌佌彼有屋蔌蔌方有榖之類六帖曰谷永始作六言亦詩公尸來燕來寧之類也七言劉義慶世說曰王子猷詣謝公云詩何七言子猷曰昻昻若千里之駒泛泛若水中之鳬此語出離騷東方朔傳曰漢武在柏梁䑓上}
