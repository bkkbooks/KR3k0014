  - {type: variant, offset: 2304, length: 1, content: 楚, WYG: 門吏帛飛自成字故名飛帛劉公嘉話曰飛帛始於蔡邕在鴻都學見匠人施堊帚遂剏意焉唐會要曰貞觀十八年五月太宗為飛白書作鸞鳯蝶龍等字葢自是始改舊體又李陽氷論篆云秦始皇時}
