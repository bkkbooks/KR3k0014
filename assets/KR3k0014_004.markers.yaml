  - {type: variant, offset: 7353, length: 0, content: '', WYG: 成湯初置二相以伊尹仲虺為之伊尹號阿衡仲虺為左相是也又武丁得傅說爰立作相王置諸其左右書亦稱召公為保周公為師相成王為左右故秦悼武王置左右相漢髙后亦置二相自此以後多非尋常人臣之職唐龍朔元年改侍中為左相中書令為右相武后又改尚書僕射為文昌左右相開元元年又為左右丞相天寳元年復為僕射又以侍中中書令為左右相至徳初復舊故今亦以左右丞相呼二揆者此其始矣宰相昔周公位冡宰正百工以相成王故有宰相之稱其事自秦漢始陳平言宰相上佐天子是也通典曰春秋之義尊上公謂之宰言海内無不統也漢亦謂上相陸賈謂陳平曰足下位為上相是也丞相史記秦本紀悼武王二年初置丞相盖三代三公之任也今得中令僕射皆其職爾故今亦以為稱應劭曰丞者承也相助也商鞅書定分篇云秦孝公問法令于鞅鞅有丞相置一法官之語則為具名也已見于孝公時非悼武王始特置之也大抵秦所建官云相國亦秦置官始皇帝立尊吕不韋為相國漢初蕭何亦為之今人以呼宰輔也使相唐睿宗景雲元年始置節度使首以賀拔延嗣領河西至開元中朔方節度牛仙客同中書門下三品節度如故此盖使相之始也肅宗時郭元振李光弼號使相也相銜唐百官志叙曰永淳元年郭待舉岑長倩同平章事始亦入銜後循之以為故事當筆通典曰肅宗至徳二年三月宰相分直政事筆人知十日徳宗貞元五年五月八月又分日一人執筆迄今為故事曰當筆中堂唐制宰相常于門下省議事謂之政事堂永淳中中書令裴炎移在中書省開元十一年張說奏改曰中書門下宋朝行官制除其名也監國史唐百官志曰貞觀以後多以宰相監修國史遂成故事也樞宻西晉泰始中王景文為中書令兼管内樞宻此其名之始也君臣政要曰唐代宗永泰中勅中官董廷秀管樞宻因置内樞宻使後唐荘宗始用郭崇韜分中書兵房置樞宻院與宰相分秉朝政自此始用士人凡文事出中書武事出樞宻謂之二府宋朝會要曰開寳九年二月以曹彬為樞宻使領忠武軍節度樞宻帶節度自此始也太平興國六年九月以石熈載為户部尚書充樞宻使文資正官充使自此始也樞相宋朝會要曰唐以中官為樞宻使後唐始有帶相印者則樞相之始自後唐也又至道三年八月以曹彬為兼侍中充使大中祥符五年九月以吏部尚書王欽若户部尚書陳堯叟並守本官同平章事充使儒臣為樞宻而兼使相自欽若始也知樞宋朝會要曰周顯徳六年宰相范質王溥並叅知樞宻院事又淳化二年九月以副使宣徽北院使張士遜知樞宻院事知院之名自此始也樞副五代會要曰梁開平元年五月改樞宻院為崇政院始命敬翔為院使仍置判官一人自後不置判官置副使一人後唐同光元年十月依舊為樞宻亦為樞宻副使宋朝會要曰建隆元年八月以趙普為樞宻副使周末闕副使至是始置同知樞宋朝會要曰淳化二年九月樞宻使王顯出鎮以副使温仲舒冦凖同知院事同知之名自此始也神宗元豐中正官名不置使但以寄禄官一人知院事一人同知為副而已簽樞又宋朝會要曰太平興國四年正月以石熈載為樞宻直學士簽著樞宻院事簽書之名自此始也治平中避英宗嫌名改曰簽書宣徽唐書裴度傳有宣徽五坊小使則宣徽官名已見于元和之時矣唐末洎五代又有南北兩院使晉天福四年以樞宻副使張從恩為宣徽使權罷樞宻故也盖唐官云宋朝會要曰唐置宣徽南北院使有副使後唐省副使開寳九年以潘美依前山南東道節度充宣徽北院使節度之領宣徽自兹始也按北史后妃傳叙北齊文宣河清中下嬪有宣徽為婦官之名也法從清望部大學士唐書李泌加集賢殿大學士泌言學士加大始中宗時張說為之按說傳𤣥宗欲授說大學士辭曰學士本無大稱中宗崇寵大臣乃有之唐百官志曰景龍二年置也盖其名自中宗時始今惟觀文資政端明有之學士漢孔安國序尚書言秦焚書坑儒天下學士逃難解散盖以斥承學之士爾晉陶淵明集有學士祖企謝景夷而晉志不言其官然前亦未聞南史宋謝超宗傳曰齊受禪髙帝令撰郊廟歌有總明學士劉融等陳有徳教殿學士}
