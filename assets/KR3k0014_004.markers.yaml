  - {type: variant, offset: 2373, length: 2, content: 析羽, WYG: 下各有兩字功臣則宋朝不獨以賜將相也會要曰興國元年正月一日赦文諸軍諸使諸道應奉天及進收京城將士等並賜名奉天定難功臣唐兵志曰徳宗幸梁神䇿兵有勞皆號興元元年從奉天定難功臣又曰代宗即位以射生軍清難賜名寳應功臣此盖其始矣筆談誤也勲品沿革曰勲品自齊梁有之今柱國而下是也周禮王功曰勲盖取諸此舊唐書百官志曰勲官出}
