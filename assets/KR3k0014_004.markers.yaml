  - {type: variant, offset: 7335, length: 3, content: 銀蓋自, WYG: 居正等為副太祖召陶榖問下丞相一等有何官對曰唐有參知政事故以命之盖帝意未欲令居正等名位與普齊也錢若水曰按唐故事劉洎為參知政事宰相任也髙宗用郭待舉謂崔知温曰待舉歴任尚淺未可與卿等同名稱遂令同平章事以此言之平章事亞叅知政事矣榖不能逺引漢御史大夫亞丞相故事失之也}
