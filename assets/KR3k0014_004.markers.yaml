  - {type: variant, offset: 7208, length: 1, content: 臣, WYG: 任官為丞相徴事捕斬上官桀注云徴事丞相屬官隋置徴事郎盖取諸此宋朝避仁宗嫌名改曰承事宋朝會要曰乾興元年詔改也承奉隋文帝置唐因之宋朝元豐新制改太常寺太祝奉禮郎為承奉郎承務唐置因隋尚書省二十四司承務郎之名也古二十五階宋朝元豐中神宗改正官制所定以為寄禄格元祐初各分左右紹聖二年復舊也二柱國楚寵官也懐王使柱國昭陽攻齊陳軫問曰楚國何貴昭陽曰上柱國是也後魏孝莊始立柱國大將軍後將軍官廢有上柱國後周建徳四年又增置上柱國大將軍隋置上柱國柱國以酬勲勞實不理事故唐以為勲官二䕶軍秦有䕶軍都尉漢以陳平為䕶軍中尉盡統諸將歴代為將領之任舊唐書志曰武徳七年定令改秦齊王}
