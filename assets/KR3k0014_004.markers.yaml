  - {type: variant, offset: 2367, length: 5, content: 旌節畫白獸, WYG: 流外勲品自諸録事及五省令史始焉謂之流外自兹始也功臣筆談曰賜功臣號始於唐徳宗奉天之役自後藩鎮下至從軍資深者例賜之本朝唯以賜將相熈寧中因上尊號上不允曰正如卿等功臣何補名實時吳充為相請止從之自是罷不賜按今宿衛諸班直自押班}
