  - {type: variant, offset: 2348, length: 1, content: 周, WYG: 尚以聲律唐宋之問傳曰建安江左詩律屢變至沈約庾信以音律相婉附屬對精宻及之問沈佺期又囘忌聲病約句凖篇則律格之始原於約信而成於沈宋也聨句自漢武為柏梁詩}
