  - {type: variant, offset: 12476, length: 127, content: 中庸各一本八年四月王拱辰以下又賜大學篇也謁先師唐書劉伯芻傳伯芻子允章咸通中為禮部侍郎請諸生及進士第並謁先師則茲禮起於唐懿宗之世劉允章請也又選舉志曰開元五年始令鄉貢明經進士見訖國子監謁先師是則開元之禮第施於貢士而咸通時允章所請糾開元貢士之禮而為之制也唐會要, WYG: ''}
