  - {type: variant, offset: 7264, length: 0, content: '', WYG: 太師太傅周官或曰古官通典曰成王時畢公為之大戴禮曰周公始為之太保虞官杜佑云商太甲時伊尹為之文王世子曰虞}
  - {type: variant, offset: 7264, length: 0, content: '', krp: 太師太傅周官或曰古官通典曰成王時畢公為之大戴禮曰周公始為之太保虞官杜佑云商太甲時伊尹為之文王世子曰虞}
  - {type: variant, offset: 7265, length: 0, content: '', WYG: 師保是也三公周始有三公坐而論道後漢始以太尉司徒司空為三公或曰在莽時太尉秦官河圗録運法曰堯坐舟中與太尉舜觀鳯凰應劭以為周官皆非也按禮記月令曰孟夏太尉贊儁傑月令本出于吕不韋不韋秦相故知其秦官耳漢百官表曰太尉秦官掌武事者司徒古官也管子曰黄帝得祝融南方使為司徒少昊以祝鳩氏為司徒舜之命契曰汝作司徒敬敷五教在寛司空亦古官管子曰黄帝得奢龍辨于東方使為士師即司空也少昊鳲鳩氏為司空舜典曰伯禹作司空三台傅子曰黄帝以風后配上台后土配中台五聖配下台故後世由此以三公為三台將相軒轅本紀曰帝舉風后為相力牧為將此盖將相之始也管子曰黄帝得六相而天下治虞舜舉元愷而謂之十六相重事唐會要曰神龍元年五月制盧欽望加平章軍國重事是也景雲三年七月詔竇懐正軍國重事宜共平章又大和四年六月制以裴度為司徒平章軍國重事是時度勲望髙以􅍚上相}
