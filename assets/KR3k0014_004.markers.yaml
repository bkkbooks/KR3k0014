  - {type: variant, offset: 12633, length: 204, content: 月禮部侍郎鄭顥進進士諸家科目記十三卷敕自今後放牓訖仰寫及第人姓名仍付所司逐年編次摭言曰永徽已前俊士秀才二科猶與進士並列咸亨後由文學舉於有司者競集於進士繇是趙傪刪去俊秀故自之曰進士登科記其事之始疑自唐初而獨以進士登科名記當起於高宗時趙傪云曳白唐天寶元年冬選六十四人判入等時御史中丞張倚男奭判入高等有下第者當為薊令以其事白安祿山祿山奏之來年正月玄宗御勤政樓親重試唯十二人比類稍優張奭不措一辭時人謂之曳白即拖白是也, WYG: ''}
