  - {type: variant, offset: 2429, length: 332, content: 相云數寸隅垂赤麻餘與旌同此蓋唐制也冠三禮圖曰緇布冠始冠之冠也太古冠布然則冠之興其始自太古乎通典曰上古衣毛帽皮後代聖人見鳥獸冠角乃作冠纓黃帝始用布帛或曰黃帝已前用皮羽也六帖曰孔子作緇布冠誤矣冕說文曰黃帝初作冕世本曰黃帝作旃冕宋衷云冠之垂旒者通典曰黃帝作冕垂旒目不邪視也充纊耳不聽讒言也應劭曰周始垂旒杜佑云宋更名平天冕故今人亦以為稱也弁世本曰魯昭公作弁而禮記稱三王共皮弁素積然則弁蓋三代之制非魯昭公所能作也宋均謂作素弁是則始以素為弁矣孔子麻冕禮也今也純儉吾從眾孔子之時冕已用純則冕弁之以絲自魯昭公始也簪桓寬鹽鐵論曰禹治水墮簪不顧簪始見此古今注曰女蝸為簪以貫髮亦簪之始矣其與冠纓同興乎纓董巴輿服志曰上古衣毛而帽皮後代聖人易之見鳥獸冠角髯胡遂作冠冕纓緌淮南子亦云沿革曰唐虞, WYG: 品}
