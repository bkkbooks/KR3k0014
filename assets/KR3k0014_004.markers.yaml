  - {type: variant, offset: 7205, length: 1, content: 雄, WYG: 年改隋文騎尉為承議郎奉議隋散官有通議郎舊唐書志曰貞觀十一年定令唯改通議郎為奉議郎通典作奉議郎神宗正官制亦曰奉議通直通典曰隋所置盖採晉宋以來諸官皆有通直}
