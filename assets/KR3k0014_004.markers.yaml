  - {type: variant, offset: 2299, length: 4, content: 墨者田鳩, WYG: 蒼頡作書注云蒼頡生而知書寫倣鳥跡以造文字黄帝内傳曰帝煞蚩尤因命蒼頡造文字以變質帝王世紀曰蒼頡取像鳥跡始作文字李瀚䝉求曰蒼頡黄帝史臣觀鳥跡以作文字鬼夜哭龍潛藏晉衛恒曰昔在黄帝創制造物有沮誦蒼頡始作書葢觀鳥跡以興思世本亦曰沮誦蒼頡造書宋𠂻云皆黄帝史也字源曰太昊時始有文字或云篆黄帝變古為文字又曰庖犧氏獲景龍作龍書炎帝因嘉禾作穂書蒼頡變古文寫鳥跡作鳥跡篆少昊作鸞鳯書取似古文髙陽作科斗書堯因軒轅龜圖作龜書夏后氏作形似篆商務光作倒薤篆今曰薤葉周瑞赤雀丹烏作鳥書又媒氏作填書今曰勒字書斷曰古文黄帝史蒼頡作大篆周宣王史史籀作小篆秦丞相李斯作八分秦羽人上谷王次仲作𨽻書秦獄吏下邽程邈作飛白漢左中郎將蔡邕作章草漢黄門令史史游作行書後漢頴川劉徳升作草書王右軍云其先出杜氏名伯度趙壹云興於秦末或云漢時杜伯度屬草所作因章帝所好名章草韋誕謂之草聖漢興有之不知誰作書斷謂如淳之作起草為藁草書葢起于此一說李斯又作刻符書雲頭鳥脚斯及趙髙俱善之章帝時曹喜作垂露懸針二體晉王羲之作龍爪篆山𦙍作花篆魏鍾繇作正書散𨽻漢蔡邕}
