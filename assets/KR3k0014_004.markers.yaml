  - {type: variant, offset: 2359, length: 0, content: '', WYG: 五子之歌始於漢武柏梁之作而成于何遜也唱和帝舜與臯陶乃賡載歌則唱和之初也亦本於詩之籜兮倡予和女之義其事新見於齊梁時顔延年謝元暉始之也次韻顔延年謝元暉作詩相倡和皆不次韻至唐元稹作春深二十首並用家花車斜四字為韻白居易劉禹錫和之亦用其韻及令狐楚和詩多次其韻宋朝真宗時楊内翰億謂次韻于此也見談苑賦詩序六義次二曰賦當謂直陳其事爾左傳言鄭莊公入而賦大隧之中於後荀卿宋玉之徒演為别體因謂之賦故昔人謂賦者古詩之流以荀宋為始漢書曰不歌而頌曰賦釋名曰敷布其義曰賦論文心雕龍昔仲尼微言門人追記目為論語葢羣論立名始於兹矣莊周之書有嘗試論之荀卿有正論賈誼有過秦論論以荀賈為始䇿事始云起自漢武帝䇿董仲舒始以其文曰興自朕躬故也按前漢書有􅏯錯賢良䇿盖文帝䇿之曰興自朕躬則䇿始於漢文帝之䇿􅏯錯也議管子曰軒轅有明堂之議此盖疑為議之始也讚文心雕龍昔虞舜重贊及益贊于禹伊陟贊于巫咸並揚言以明事嗟嘆以助辭故漢置鴻臚唱拜為贊如相如之贊荆軻班固之褒貶以讚皆取益贊于禹之義要之自司馬相如贊荆軻始頌詩序六義其六曰頌盖頌者美盛徳之形容以其成功告于神明者也詩有商周魯三頌文心雕龍昔帝俈之世咸黒為頌以歌九招則頌起于帝俈也箴文心雕龍曰軒轅輿凡以弼不逮即為箴又曰斯文之興盛於三代夏商二箴餘句尚存及周辛甲百官箴闕虞人之箴體義備焉連珠傅𤣥曰連珠興於漢章帝班固賈逵傅毅皆受詔作之體則假喻達㫖賢者㣲悟欲使歴歴如貫珠易覩而可恱故曰連珠梁沈約云連珠之作始自揚子雲歐陽詢作藝文類中亦有揚雄連珠則為斯文之興不自漢章明矣官爵封建部十八爵公侯伯子男謂之爵唐虞輯五瑞修五玉是五等自堯舜始也}
