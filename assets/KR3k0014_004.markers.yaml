  - {type: variant, offset: 11701, length: 1, content: 寶, WYG: 寳元年中書李昉知制誥盧多遜並直學士院盖其始也又作二年十一月直舍人院又曰開寳九年十一月以張洎王克正直舍人院此其置職之始也集賢學士唐𤣥宗開元五年始置修書院于集仙殿即置學士員後改集賢亦曰集賢學士通典曰開元五年十一月于乾元殿東廊寫四部書令馬懐素禇无量總其事于麗正殿安置為修書使十}
