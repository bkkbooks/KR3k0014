  - {type: variant, offset: 7322, length: 7, content: 司使印塗金後制, WYG: 兩日一至中書門下平章政事名官自此始也會要曰貞觀八年十一月也又貞觀十七年六月髙士亷同中書門下平章政事髙宗永淳元年四月郭待舉等並同中書門下同承受進止平章事上謂參知政事崔知温曰待舉歴任尚淺且令預聞政事未可與卿同受名稱自此四品已下知政事者以平章事為名唐志以為永淳元年也參政唐宰相有參知政事宋朝以為執政官唐會要曰武徳元年六月裴寂知政事貞觀元年九月杜淹參議朝政}
