  - {type: 'tls:seg', offset: 2363, content: '', id: KR3k0014_CHANT_004-34a.17}
  - {type: variant, offset: 2363, length: 0, content: '', WYG: 古者有分土無分民若乃以户口為差降略封疆之逺近所謂分民自漢始也盖漢艾亡秦大侯不過萬家小者五六百户則封國之以户漢其始也諸侯帝王世紀曰女媧未有諸侯有共工氏任智刑以强伯而不王炎帝世乃有諸侯夙沙氏叛炎帝修徳夙沙之民自攻其君則建侯分土自炎帝始也諸王古者天子稱王周失其道春秋之時吳楚之君始僭稱之楚世家曰周夷王時楚熊渠曰我蠻夷也乃立長子康為句亶王紅為鄂王執疵為越章王厲王暴虐復去之至於熊通始僭號是為楚武王此諸侯號王之始也七雄爭强亦各稱之秦至恵王始稱之四年齊魏為王十三年韓亦為王秦并天下號皇帝除王之名漢滅楚始謂之諸侯王盖諸侯封王自楚漢之際也郡王事始云}
  - {type: page-break, offset: 2363, content: '', id: KR3k0014_WYG_004-19b, image: WYG0920/WYG0920-0105d.png}
