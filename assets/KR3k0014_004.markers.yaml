  - {type: variant, offset: 9057, length: 515, content: 下皆立學自文翁始也孔子廟後漢鍾離意傳曰意為魯相身入孔子廟堂蓋孔氏家廟也唐禮樂志曰武德二年始詔國學立孔子廟會要云六月一日也正觀四年又詔州縣皆作會要又曰高宗總章二年敕天下皆置宋朝因之配坐通典曰魏齊王芳正始二年二月講論通使太常釋奠以太牢祀孔子于辟雍以顏回配此蓋其始也唐會要曰正觀二年以顏子配享孔子宋朝神宗熙寧中大興學校又兼以孟子配也先賢配唐會要曰正觀二十一年二月十五日詔以左丘明等二十一人並令配享尼父廟堂此蓋其始也蘇氏曰正觀顯慶稱二十一賢太極開元即稱二十二賢將前敕并學令比類於服虔下有賈逵不知何年月附入武學宋朝神宗熙寧中興學以上舍養士始就武成王廟側建武學如太學儀章衡編年通載曰仁宗慶歷三年五月置武學於武成王廟八月罷太公廟唐書明皇本紀曰開元十九年四月丙申始立太公廟十八日也武成廟唐會要曰開元十九年四月十八日置太公廟以張良配享仍簡取自古名將準十哲上元元年閏四月十九日赦文太公望追封武成王委中書門下擇古名將準文宣王例置亞聖十哲建中三年七月十一日史館奏奉今年五月十五日敕武成王廟配享人宜令史館參詳定名以張良田穰苴已下十人為十哲孫臏范蠡以下七十二人為弟子賢良漢唐逮宋取士之制有賢良方正茂才異等六科謂之制舉亦曰大科通謂之賢良其制蓋自漢文帝始史記文紀, WYG: 禧}
