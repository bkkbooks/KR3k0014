  - {type: variant, offset: 7194, length: 2, content: 乙巳, WYG: 詔又定加文武官月俸勲階寄禄部十九開府漢文帝元年用宋昌為衛將軍位亞三司後漢章帝建初三年使車騎將軍馬防班同三司同三司自此始也殤帝延平元年鄧騭為車騎將軍儀同三司儀同之號自此始也魏黄權以車騎將軍開府儀同三司盖漢制唯三公開府至魏以餘官其儀同三公故以為號由此歴代以名官唐武徳七年以為散官特進漢氏諸侯有功徳優盛朝廷所敬異者賜位特進在三公下隋文帝以為散官金紫魏晉以來有左右光禄及光禄大夫皆銀印青綬重者詔加金章紫綬因稱金紫光禄大夫後周以為散官銀青漢有光禄大夫皆銀印青綬魏晉之代亦有金紫之别故號銀青光禄大夫後周時為散官光禄秦置光禄勲屬官有中大夫漢武太初元年更名光禄大夫歴代不}
