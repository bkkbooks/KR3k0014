  - {type: variant, offset: 7513, length: 156, content: 虞氏服韍夏后山商火周龍章鄭康成注曰韍舜所作之以尊祭服三代增以畫文蓋冕服之𩏂也周諸臣所服又有縕赤之別蘇氏演義曰昔先王食鳥獸之肉衣其羽皮韍字遂從韋韋皮也春秋正義云戰國以韍非兵飾去之漢明復制用赤皮魏晉以還易以絳紗字遂有從系者也蓋太古蔽膝之法象冕服謂之韍朝服謂之𩏂也袴史記屠岸賈滅趙氏趙朔之妻有遺腹生男賈索之夫人置其袴中, WYG: 麟趾殿學士當是}
