  - {type: variant, offset: 7210, length: 1, content: 璽, krp: 統軍為䕶軍副為副䕶軍盖未為勲官也又有上大將軍大將軍貞觀十一年改上大將軍為上䕶軍大將軍為䕶軍也按漢百官表䕶軍都尉哀帝更為司冦平帝元}
  - {type: variant, offset: 7212, length: 1, content: 稱, WYG: 元年更為䕶軍也二輕車漢武帝初置輕車將軍始以公孫賀為之又有輕車校尉唐採其名置上輕車都尉及輕車都尉舊唐志}
  - {type: variant, offset: 7212, length: 1, content: 稱, krp: 元年更為䕶軍也二輕車漢武帝初置輕車將軍始以公孫賀為之又有輕車校尉唐採其名置上輕車都尉及輕車都尉舊唐志}
  - {type: variant, offset: 7214, length: 1, content: 印, WYG: 武徳七年改上開府儀同三司為上輕車都尉開府儀同三司為輕車都尉二騎漢武帝元鼎二年置騎都尉初以李陵為之唐採故事置上騎都尉與騎都尉舊唐志曰武徳定令改隋儀同三司曰騎都尉四尉謂驍飛雲武四騎尉也並隋置為文散官舊唐書百官志曰武徳定令改隋上大都督為驍騎尉大都督為飛騎尉師都督為雲騎尉都督為武騎尉也右十二轉唐以為勲官宋朝因之師保輔相部二十三師尚書周官曰乃立太師太傅太保兹惟三公晉以為上公後魏始號三師太師虞官商時箕子為之漢官儀曰紂時胥餘為之或云胥餘箕子字也書㣲子作誥父師少師是也}
