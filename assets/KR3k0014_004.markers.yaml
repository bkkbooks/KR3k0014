  - {type: variant, offset: 3574, length: 253, content: 之玄中記曰旬始作帽漢櫂船者著黃帽晉王濛破帽入市則歷代皆有之五代梁始漆為今樣吳處厚青箱雜記梁仁宗天聖前烏帽惟用光紗自後始用南紗迨熙寧中復稍稍用光紗矣蓆帽實錄曰本羌人首服以羊毛為之謂之氈帽即今氈笠也秦漢競服之後故以蓆為骨而鞔之謂之蓆帽女人戴者四緣垂下網子以之蔽今世俗或然吳處厚青箱雜記曰王衍在蜀好私行恐人識之令民戴大帽則世俗之戴蓆帽始於王衍也大帽又曰大帽野老之服也今重戴是本野夫嵒叟之服唐以皁縠為之以隔風塵李氏資暇曰大裁帽也談苑曰後魏孝文帝自雲中徙代以賜百寮五代以來唯御史服之宋朝淳化初宰相學士御史北省官尚書省, WYG: 差等}
