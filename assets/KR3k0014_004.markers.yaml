  - {type: variant, offset: 2360, length: 1, content: 儀, WYG: 含文嘉曰殷爵三等周五等或謂黄帝立五等也封建沿革曰黄帝分州畫野得百里之國萬區唐虞列為五等此封建之始也帝王世紀曰炎帝之世有諸侯夙沙氏史記曰神農氏世衰諸侯相侵則炎帝時已有諸侯至黄帝始大封也陸士衡五等諸侯論略曰五等之制始於黄唐謂黄帝唐堯也實封通典曰唐封公侯無國土其加實封者則食其所封之户分食諸郡以租庸調給沿革曰魏黄初間爵自關内侯不食邑但虚封而已故唐因之加實封宋朝會要曰唐制食實封者户給縑帛每賜爵逓加一級唐末及五代始有特加邑户而罷實封之給今位為虚名也户封晉書地理}
