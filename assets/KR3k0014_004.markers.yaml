  - {type: variant, offset: 7205, length: 1, content: 雄, krp: 年改隋文騎尉為承議郎奉議隋散官有通議郎舊唐書志曰貞觀十一年定令唯改通議郎為奉議郎通典作奉議郎神宗正官制亦曰奉議通直通典曰隋所置盖採晉宋以來諸官皆有通直}
  - {type: variant, offset: 7207, length: 0, content: '', WYG: 名官品髙下通為宿直也舊唐志曰武徳七年改隋屯騎尉為通直郎宣徳亦隋置散官也宣義唐改隋游騎尉為宣義郎取梁宣義將軍之名承事漢昭帝}
  - {type: page-break, offset: 7207, content: '', id: KR3k0014_WYG_004-31b, image: WYG0920/WYG0920-0111d.png}
