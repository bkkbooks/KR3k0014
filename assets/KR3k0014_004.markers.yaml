  - {type: variant, offset: 7210, length: 1, content: 璽, WYG: 統軍為䕶軍副為副䕶軍盖未為勲官也又有上大將軍大將軍貞觀十一年改上大將軍為上䕶軍大將軍為䕶軍也按漢百官表䕶軍都尉哀帝更為司冦平帝元}
