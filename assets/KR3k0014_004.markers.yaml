  - {type: 'tls:seg', offset: 5906, content: '', id: KR3k0014_CHANT_004-79a.2}
  - {type: variant, offset: 5906, length: 522, content: 汗衫實錄曰古者朝燕之服有中單郊饗之服又有明衣漢祖與項羽戰爭之際汗透中單遂有汗衫之名也半臂實錄又曰隋大業中內官多服半臂除即長袖也唐高祖減其袖謂之半臂今背子也江淮之閒或曰綽子士人競服隋始制之也今俗名搭護襖子舊唐書輿服志曰讌服古褻服也亦謂之常服江南以巾褐裙襦北朝雜以戎夷之制至北齊有長帽短靴合袴襖子朱紫玄黃各任所好若非元正大會一切通用蓋取于便事則今代襖子之始自北齊起也涼衫筆談曰近歲京師士人朝服乘馬以黲衣蒙之謂之涼衫亦古遺法也儀禮曰朝服加景但不知古人制度何如耳大衣商周之代內外命婦服諸翟唐則裙襦大袖為禮衣開元中婦見舅姑戴步搖插翠釵今大衣之制蓋起于此實錄大袖在背子下身與衫子齊而袖大以為禮服疑即此也長裙實錄曰隋煬帝作長裙十二破名仙裙今大衣中有之隋制也帔又實錄曰三代無帔說秦有披帛以縑帛為之漢即以羅晉永嘉中制絳暈帔子開元中令三妃以下通服之是披帛始于秦帔始于晉矣今代帔有二等霞帔非恩賜不得服為婦人之命服而直帔通用於民閒也唐制士庶女子在室搭帔帛出適披帔子以別出處之義今仕族亦有循用者背子又曰秦二世詔衫子上朝服加背子其制袖短于衫身與衫齊而大袖今又長與裙齊而袖纔寬於衫蓋自秦始也裙又曰古所貴衣裳連下有裙隨衣色而有緣堯舜已降有六破及直縫皆去緣商周以其太質加花繡上綴, WYG: 祥符}
