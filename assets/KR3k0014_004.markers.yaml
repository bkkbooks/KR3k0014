  - {type: variant, offset: 4370, length: 1363, content: 古今註曰魏文帝有絕寵四人莫瓊樹制蟬鬢縹緲如蟬翼段巧笑始錦衣絲履作紫粉拂面陳尚衣能歌舞薛夜來善為衣裳一時冠絕一云冠起當世特髻燧人始為髻至周王后首服為副編鄭云三輔謂之假髻今特髻其遺事也二儀實錄曰燧人氏婦人束髮為髻髻繼也言女子必有繼於人也但以髮相纏而無物繫縛髲髢周禮王后夫人之服有以髲髢為首飾者故詩鬒髮如雲不屑髢也蓋周制云馮鑑後事云晉永嘉中以髮為步搖之狀名曰鬢以為禮容即今纏髮特髻乃其遺象也釵實錄曰燧人始為髻女媧之女以荊杖及竹為笄以貫髮至堯以銅為之且橫貫焉舜雜以象牙玳瑁此釵之始也玉釵郭憲洞冥記曰漢武帝元鼎元年有神女留玉釵與帝故宮人作玉釵梳實錄曰赫胥氏造梳以木為之二十四齒取疏通之義篦說文曰櫛梳枇總名也釋名曰梳言其齒疏也枇言其細相比也禮男女不同巾櫛是枇因梳而制也今作篦妝周文王時女人始傅鉛粉秦始皇宮中悉紅妝翠眉此妝之始也宋武宮女效壽陽落梅之異作梅花妝隋文宮中紅妝謂之桃花面首飾實錄曰自燧人之始婦人束髻舜加首飾文王又加翠翹步搖也畫眉秦始皇宮中悉紅妝翠眉此婦人畫眉之初也實錄曰漢武帝令宮人掃八字眉西京雜記曰司馬相如妻卓文君眉如遠山時人效之畫遠山眉魏武令宮人埽青黛眉妝靨遠世婦人妝喜作粉靨如月形如錢樣又或以朱若燕脂點者唐人亦尚之段成式酉陽雜俎曰如射月者謂之黃星靨靨鈿之名蓋自吳孫和誤傷鄧夫人頰醫以白獺髓合膏琥珀太多痕不滅有赤點更益其妍諸嬖欲要寵者皆以丹青點頰此其始也又云大歷已前士大夫妻多妬者婢妾少不如意則印面故有月點錢茍如此則固非嘉事也宋武宮中斅壽陽落梅妝此其遺意也花鈿酉陽雜俎曰今婦人面飾用花子起自唐上官昭容所制以掩點迹也按隋文宮貼五色花子則前此已有其制矣似不起於上官氏也雜五行書曰宋武帝女壽陽公主人日臥於含章殿檐下梅花落額上成五出花拂之不去經三日洗之乃落宮女奇其異競效之花子之作疑起於此鉛粉墨子曰禹作粉張華博物志曰紂燒鉛作粉謂之胡粉續事始曰鉛粉即紂所造也輕粉實錄曰蕭史與秦穆公鍊飛雲丹第一轉與弄玉塗之名曰粉即輕粉也此蓋其始也燕脂古今註曰燕脂草出西方葉似薊花似莤土人以染粉為婦人面色故名燕脂後人效之以紅花染絳為之非彼草染者也秦宮中悉紅妝當是其物自秦始也一曰燕支續事始云面脂廣志曰面脂自魏興已來始有之刷陸雲與兄機書曰按行曹公舊物有刷泥處尚識又別有剔齒纖疑自秦漢已來也衣裳通典曰上古衣毛後代以麻易之先知為上以制衣後知為下以制裳易曰黃帝垂衣裳而天下治世本曰胡曹作衣宋衷曰黃帝臣呂氏春秋亦云淮南子曰伯余初作衣許慎注云黃帝臣也一云伯余黃帝也世本又云伯余制衣裳孟詵錦帶前書曰十紀合雒紀四始教人食鳥獸衣其皮毛家語五帝德孔子曰黃帝始垂衣裳袞衣事始曰黃帝作畫象日月星辰于衣上以似天故有袞龍之頌黃帝內傳曰帝伐蚩尤乃服袞冕至舜始備十二章書稱予欲觀古人之象日月星辰山龍華蟲作會宗彝藻火粉米黼黻絺繡以五采彰施于五色作服是也周登日月於太常九章而已餘五服俱周制也裘黃帝出軍決曰帝伐蚩尤未克夢西王母遣道人披玄狐之裘以符授帝然則彼時已有裘之名說文曰裘皮衣蓋上古衣毛冒皮之遺象也袴褶唐書歸崇敬傅曰德宗時百官朝朔望皆服袴褶崇敬非之建言三代逮漢無其制隋已來始有服者干寶搜神記亦或言其物蓋晉以來有其制也通典晉衣服制有之云袴褶之制未詳所起近代服之無定色朝服晉書輿服志曰漢制五郊天子與執事服各如方色百官不執事者服常服絳衣以從魏秦靜曰漢氏承秦改六冕之制但無冠絳衣而已魏以來名朝服公服, WYG: ''}
