  - {type: variant, offset: 9613, length: 473, content: 朕躬是也亦見班固前漢晁錯本傳云事始則謂自孝武策仲舒始非也秀才漢世取士又有孝廉秀才二等齊宋以來州有秀才之舉隋唐之代其科最上正觀中有舉而不第者坐其州長由是其科廢故自唐及宋雖進士猶以秀才為號自唐漢之舊也蘇氏演義曰漢武有策秀才文也李肇國史補曰進士為時所尚久矣俊乂實在其中由此出者終身為文人其通稱謂之秀才投刺謂之鄉貢肇元和中人蓋自憲宗時已為進士之稱也進士摭言曰周諸侯貢賢於天子升之太學曰造士大樂正論造士之秀者以告於王而升諸司馬曰進士其事見於禮王制及周官樂正之職此蓋進士之始也摭言又云隋大業中始置進士之科此蓋設科之始也明經漢始以明經射策取人以通經多寡補文學長故唐乃置明經之科開元中崔元瓘上言問大義十道時務策三道宋朝定業三經義三十道也學究唐選舉志取士之科有明經有進士有明法有九經有五經有三經有二經有學究為舉之常選學究設科自唐始也宋朝神宗熙寧中以經術興三舍始除之三禮唐會要曰德宗正元五年五月五日置三禮科唐百官志則云二月敕置三禮開元禮科三傳又會要曰穆宗長慶二年二月商侑奏置三傳及三史科宋朝神宗始以經義取士獨立進士明法二科餘並廢也明法漢新有國詔明法者遣詣相府此明法之, WYG: 知白}
