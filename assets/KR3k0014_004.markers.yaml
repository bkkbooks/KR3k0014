  - {type: variant, offset: 10920, length: 4, content: 混牓印題, WYG: 龍圖天章寳文皆置學士直學士而天章學士罕以命人訖仁宗世纔王贄一人而已自後無聞也天章侍講又曰景祐四年三月詔以賈昌朝等為天章閣侍講比直龍圖閣此盖設官之初也寳文英宗治平初以寳文閣藏仁宗御書御製即置寳文閣學士直學士及待制之官盖始用邵必為學士也樞直職林曰五代朱梁太祖開平二年改樞宻院為崇政院始置直學士後唐復為樞宻院亦曰樞宻院學士宋朝會要曰後唐同光中置樞宻直學士同光盖莊宗時年號也盖朱梁崇政院判官之職也制誥唐百官志曰中書舍人六人以久次者一人為閣老判本省雜事一人知制誥領進書開元初以他官掌詔勅册命謂之知制誥宣宗時選用尚書郎盖先是率用前行正郎宋朝自司諫正言以上㕘用之官制改其事歸中書舍人}
