  - {type: variant, offset: 3881, length: 130, content: 全幅連綴于油帽或氈笠之前以障風塵為遠行之服蓋本此又有面衣前後全用紫羅為幅下垂雜他色為四帶垂於背為女子遠行乘馬之用亦曰面帽按西京雜記趙飛鷰為皇后女弟昭儀上襚三十五條有金花紫羅面衣則漢已有面衣也頭巾古以皁羅裹頭號頭巾蔡邕獨斷曰古幘無巾王莽頭禿乃始施巾之始也筆談曰今, WYG: ''}
