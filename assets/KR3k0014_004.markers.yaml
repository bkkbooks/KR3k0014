  - {type: variant, offset: 12397, length: 1, content: 三, WYG: 八月二十五日以吕誨之等直昭文闕職也談苑曰淳化中復置直史館疑唐有是職也直集賢唐明皇開元十二年改麗正修書院為集賢院増置校理及直院宋朝會要曰淳化元年八月二十六日以和濛直集賢院集賢舊無直院惟江南李氏嘗以朝士任之至是始置從新置也談苑曰淳化中始置直秘閣宋朝會要曰端拱元年五月詔就崇文院中堂建秘閣是月以宋泌直秘閣此蓋置官之始也校理唐開元十二年増置集賢校理宋朝太宗端拱元年建秘閣即以杜鎬為秘閣校理此立官之始也青箱雜記曰端拱初以李宗諤為集賢校理則本朝集賢校理自宗諤始也說書宋朝會要曰景祐元年二}
