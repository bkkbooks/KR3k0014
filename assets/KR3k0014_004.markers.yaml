  - {type: variant, offset: 2781, length: 683, content: 幘按董巴云起於秦人施於武將初為絳帕以表貴賤漢文時加以高頂孝元額有壯髮不欲人見乃始進幘又董偃綠幘東觀記云賜段熲赤幘故知自上下通服之皆烏也廚人綠馭人赤輿輦人黃駕五輅人逐車色其承遠遊進賢者施以掌導謂之介幘承武弁者施以笄導謂之平巾通天蔡邕獨斷曰通天冠漢制之秦禮無文貂蟬一曰武弁大冕侍中冠之金璫左貂昔趙武靈王胡服也秦始皇滅趙以賜侍中故為侍中之服長冠漢書高祖紀曰帝為亭長乃以竹皮為冠令求盜之薛治之及貴常冠所謂劉氏冠漢以來曰長冠通典曰漢高帝採楚制制長冠形如板以竹為裏亦名齊冠以高帝所制曰劉氏冠果按長冠以竹始生皮為冠今鵲尾冠是高山後漢志胡廣曰齊王冠秦滅齊以賜謁者服之董巴志曰一曰側注傅子曰魏明帝以似通天乃毀變其形除去卷筩今如介幘幘上加物以象山峰法冠後漢輿服志曰法冠一名柱後惠文或謂之獬豸冠獬豸神羊能別曲直楚王嘗獲之故以為冠楚執法者服之御史是也淮南子曰楚文王好服獬冠楚國效之注云獬豸冠也當是楚文王所制進賢古緇布冠之遺象也董巴以為文儒之服漢官曰平帝元始五年令公卿列侯冠三梁二千石兩梁千石以下一梁梁別貴賤自漢始也幞頭二儀實錄曰古以皁羅三尺裹頭號頭巾三代皆冠列品黔首以皁絹裹髮亦為軍戎之服後周武帝依周三尺裁為幞頭此得名之始也至唐馬周交解為之用一尺八寸左右三攝法三才重繫前腳法二儀唐會要曰故事全幅皁向後幞髮俗謂之幞頭周武帝建德中裁為四腳正觀中太宗謂侍臣曰幞頭起於周武蓋取便於軍容其巾子則自武德中始用按穆宗朝帝好擊鞠而宣喚不以時諸司供奉人急於應召始為硬裹裝於木圍之上以侍倉卒五代末梁高祖始布漆於紗施鐵為腳作今樣也筆談曰唐惟人主用硬腳晚唐方鎮擅命始僭用之宋朝有直腳等五等惟直腳貴賤通服也續事始云隋, WYG: ''}
