  - {type: variant, offset: 71, length: 455, content: 幰弩而不以弓亦弛而不用行則居前由魏始也幰者車上張繒也車輻古今注曰棒也漢朝執金吾金吾亦棒以銅為之黃金塗兩頭謂之金吾御史大夫司隸校尉亦得執焉御史校尉郡守都尉縣長之屬例皆木為吾用以夾故謂之車輻一曰形如車輻故云也宋朝會要曰形如車輻今剡木漆八稜勘箭筆談曰大駕鹵簿中有勘箭如古之契勘也其牡謂之雄牡箭牝謂之闢仗箭本胡法也熙寧中罷之警蹕周禮夏官隸僕掌蹕宮中之事注謂止行者自漢以來天子出稱警入稱蹕古今註曰所以戒行徒也周禮蹕而不警秦制出軍者皆警戒入國者皆蹕止故云出警入蹕一曰蹕路也謂行者皆警於塗路也蓋始于周制皁纛六典曰後魏有纛頭宋朝會要曰皁纛本後魏纛頭之制唐衛尉纛居其一蓋旄頭之遺像犦矟宋朝會要曰犦擊聲也一云象犦牛善鬭字從犦唐金吾將軍執之今制如節加碧油殳古今註曰殳戟之遺象也詩所謂伯也執殳為王前驅殳前驅之器也以木為之後世澆偽無復典刑以赤油韜之亦謂之油戟亦曰棨戟王公已下通用為前驅蓋周制周官考工記曰廬人為殳此其始也餘見五兵牙門宋朝會要曰古者天子出建大牙今制錯綵為神人象中道前後各一左右道五門門二旗蓋取周制立旌表門及天子五門之制玉兔旗, WYG: 志逺}
