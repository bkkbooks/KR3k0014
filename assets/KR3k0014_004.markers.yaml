  - {type: variant, offset: 708, length: 1587, content: 輿服志曰漢大駕前驅有鳳凰闒戟鈒闒字同然則疑秦制也罕罼通典曰武王剋紂百夫荷罕旗以先驅後漢有九游雲罕西京雜記曰漢大駕有罕罼在左右則是漢始制此二物晉輿服志五時車後次華蓋中道左罼右罕宋朝會要曰象罼為天街故為前引皆赤質金銅飾朱藤結網金獸面罕方上有二螭首銜紅絲拂罼如圓扇黃麾通典曰黃帝振兵設五旗五麾則黃麾制自有熊始也宋朝會要曰麾古有黃朱纁三色所以指麾也漢鹵簿有前後黃麾今制絳帛為之如幡采成黃麾字古今註曰麾所以指麾武王執白旄以麾是也乘輿以黃諸王以朱刺史二千石以纁氅宋朝會要曰氅本緝鳥毛為之唐有六色孔雀大小鵝毛鷄毛之制隋書禮儀志曰梁武受禪於齊多循其儀物御仗其赤氅青氅於此已有氅制矣儀鍠宋朝會要曰鉞屬也秦漢有之唐用為儀仗古今註曰秦改鐵鉞作鍠秦製也白幹槍又宋朝會要曰矟也唐羽林所執制同矟而鐵刃上綴朱絲拂隋志記齊梁四代儀中亦有此物疑晉宋以後以為仗衛也班劍又曰本漢朝服帶劍取五色班闌之義開元禮義纂曰漢制朝服帶劍晉代之以木謂之班劍宋齊謂之象劍儀刀二儀實錄曰儀刀自東晉多虞遂以木代之以備威儀即衙刀也宋朝會要曰銀飾王公亦給御刀宋朝會要曰晉宋以來有之黑鞘金花銀飾靶厄紫絲絛引駕旗皇祐大饗明堂記曰引駕旗唐禮令無文開寶通禮新加謂十二辰天王二等旗也龍墀旗又曰龍墀旗唐禮令亦無文開寶通禮新加謂天下太平一五方各一君王萬歲一日月各一合璧旗漢書律歷志曰武帝選治歷者造太初歷復使淳于渠陵覆歷晦望弦朔最密太初元年十一月甲子朔旦冬至七政周起牽牛初度日月如合璧五星如連珠大饗明堂記曰宋朝取此義制二旗并以禮物謂日月合璧一苣文二夾之五星連珠一祥雲二夾之五嶽旗大饗明堂記曰五嶽五方神五龍五鳳四瀆神等旗宋朝新制方繖宋朝會要曰方繖古張帛避雨之制今有方繖大繖則是繖之制始於古張帛也雉扇古今註曰起於商高宗有雊雉之祥服章多用翟羽周以為王后夫人之服飾車之有翣織雉羽為扇以翳風塵漢乘輿服之後以賜梁孝王魏晉以來為常雖諸王皆得用之毬杖宋朝會要曰毬杖非古蓋唐世尚之以資玩樂鳴鞭又曰唐及五代有之周官條狼氏執鞭趨辟之遺法也然則鳴鞭雖始於唐亦本周事也旂常周禮巾車玉輅建太常疏曰按司馬法云章夏以日月上明商以虎上威周以龍上文釋名曰日月為常畫日月於旗端言常明也云自夏后始奚仲為夏車正加以旂常於是斿就有差用明尊卑之別朱團扇宋朝會要曰本漢世長柄扇宋孝武時詔王侯鄣扇不得用雉尾故王公以下有朱團扇疑自此其始也金節又宋朝會要曰金節隋制也八層黃繡龍袋籠之周禮六節山國用虎土國用人澤國用龍三節皆金為之則防別金節取茲義爾節周禮地官之屬掌節有玉角虎人龍符璽旌等節漢文有旄節之制西京雜記曰漢大駕鹵簿有節十六在左右則漢始用為儀仗也筆談曰古節如今虎符其用則有珪璋龍虎之別皆櫝將之英蕩是也漢人有持節乃古旄也然則節自周始而旄節則起於漢也果按掌節掌守邦節而辨其用以輔王命華蓋古今註曰華蓋黃帝與蚩尤戰常有五色雲氣金枝玉葉止于帝上有花蘤之象故作華蓋筆談輦後曲蓋謂之筤兩旁夾扇通謂之扇筤皆繡亦有銷金者即古華蓋也今殿上寶蓋是也旌管子曰舜有進善之旌則旌為起於虞帝旃世本曰黃帝作旃俾倪宋朝會要曰漢乘輿用之如花蓋而小疑漢始制之也負圖旗宋朝會要曰建隆中將郊祀太祖又詔別造大黃龍負圖旗一大神旗六日旗一月旗一君王萬歲一天下太平一獅子二金鸞金鳳各一玉龍五凡二十一旗皆有架南郊用之大黃龍負圖旗陳于端門前餘二十旗悉立於宿頓宮前朝會冊禮亦陳于殿庭也曲蓋古今註曰曲蓋太公所作武王伐紂大風折蓋太公因折蓋之形而制曲蓋雞竿楊文公談苑曰杜鎬言金雞肆赦不知起於何代關東風俗傳曰宋孝王問司馬膺之後魏北齊赦日立金雞事膺之曰按海中星占云天雞星動為有赦蓋王者以天雞為度隋書刑法志北齊赦日令武庫設金雞及鼓於𨵗門右撾鼓千聲宣赦建金雞或云起于西涼呂光未知孰是究其旨蓋西方主兌兌為澤雞者巽神巽主號令故合二物置其形楬于長竿使眾覩之唐百官志曰中尚令赦日立金雞於仗南有雞黃金飾首銜絳幡承以采盤維以絳繩教坊小兒得雞首者官以錢購或取絳幡而已蓋此禮起於有唐也旌節呂, WYG: 吕}
