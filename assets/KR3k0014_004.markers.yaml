  - {type: variant, offset: 4200, length: 139, content: 歷代衣服之制其物無文隋志于梁陳已來始戴之又據釋名為制按釋名後漢劉熙所作當是曲領之起亦漢儀也蓋頭唐初宮人著羃䍦雖發自戎夷而金身障蔽王公之家亦用之永徽之後用幃帽後又戴皁羅方五尺亦謂之幞頭今曰蓋頭凶服者亦以三幅布為之或曰白碧絹若羅也冠子二儀實錄曰爰自黃帝制為冠冕而婦人者之首飾服無文至, WYG: 馬}
