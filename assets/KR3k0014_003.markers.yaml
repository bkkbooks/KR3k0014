  - {type: variant, offset: 7180, length: 2, content: 垂拱, WYG: 以吏部選人多不實乃令試日自糊其名暗考以定其等第蓋糊名考校自唐始也今貢舉發解皆用其事曰封彌宋朝㑹要曰咸平二年正月命董龜正等封印卷首蓋試日就院置局始命官曹主之也話録亦謂糊名自唐武后始也巡鋪宋朝㑹要曰雍熈二年正月詔禮部引試分差官廊下察視勿容私相教授此巡鋪之始也初以檢視九經諸科至景德}
