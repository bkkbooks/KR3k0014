  - {type: variant, offset: 5154, length: 265, content: 之神位版也牙盤又曰乾德六年和峴言唐天寶中享太廟禮料外每室加常食一牙盤五代遂廢詔自今親享廟別設牙盤食禘袷時享皆同之按唐會要曰天寶五載四月十六日詔享太廟宜料外每室加常食一牙盤則享廟之設牙盤食自唐明皇始也獻果史記叔孫通傳孝惠曾春出遊離宮通曰古者有春嘗果今櫻桃熟可獻願因出取獻宗廟帝從之云諸果之獻由此興也按禮記有天子羞含桃薦之寢廟又似周制非始于通也飲福宋朝會要曰乾德元年十二月以南郊禮畢大宴于廣德殿自後凡大禮畢皆設宴如此例曰飲福宴蓋自此其始也青城又曰天聖二年三月太常禮院案周禮幕人掌帷幕幄帟綬之事鄭注云正出宮則有是事在傍曰帷在上曰幕皆以布, WYG: 亦}
