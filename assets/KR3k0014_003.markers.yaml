  - {type: variant, offset: 4800, length: 353, content: 也配天有虞為禘郊之禮以祀昊天上帝始有配食之事祭法有虞氏禘黃帝而郊嚳是也虞以上尚德用有德者夏商稍用其姓代之先後至周始嚴父配天故孝經曰嚴父莫大于配天則周公其人也周公郊祀后稷以配天宗祀文王于明堂以配上帝注謂以父配天之禮始自周公蓋配天侑食肇于有虞而明堂之嚴父配帝則自周公始也配饗尚書盤庚之告其臣曰茲予大享于先王爾祖其從與享之則功臣配享之禮由商人始也周禮有功者書于太常祭于大丞司勳詔之也趙𥳑子記祀董安于廟魏祀曹真于太祖廟又祫祀功臣二十一人也木主典禮曰措之廟立之主曰帝檀弓曰商主綴重蓋廟所以藏主宜始為廟即立主也版位宋朝會要曰景德二年九月二日上封者言郊立天地神位不嚴望令重造詔王欽若詳閱修製十一月一日版位成貯以漆匣舁床覆以黃縑帕壇上四位以朱漆金字第一神位黑漆金字第二黑漆黃字第三已降黑漆朱字天地祖宗為一匣餘十二位為一匣即, WYG: ''}
