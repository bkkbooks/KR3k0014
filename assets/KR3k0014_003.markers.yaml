  - {type: variant, offset: 10991, length: 721, content: 王建作五絃之瑟高誘曰王建朱襄之臣瞽瞍制為十五絃舜益以八絃為二十三絃山海經曰晏龍始為瑟數說雖異以世本之說為得阮通典曰秦琵琶也武后時蜀人蒯朗於古墓中得銅器似琵琶而圓時人莫識之元行沖曰此阮咸所造命匠人以木為之行沖以其形似月聲合琴名月琴杜佑以為晉竹林七賢圖阮咸所彈與此同因謂之阮咸李氏資暇曰唐中宗朝元行沖為太常少卿有人於古冡獲銅鑄樂似琵琶而圓獻於元公元曰此阮仲容所造命工以木為之音韻清朗頗難名之權以仲容姓名呼焉阮公昔賢豈可以其名氏號樂器乎元以其形似月聲合琴因是名月琴自是知之者不以舊名呼或謂咸豐肥創此器以移琴聲四絃十三柱倚膝摐之謂之擘以代撫琴之艱也今人但直曰阮也箜篌釋名曰師涓所作靡靡之樂也蓋空國之侯所好之晉應劭曰漢武令侯調始造此器史記封禪書漢武禱祠太一后士始用樂作空侯杜佑曰或云俟暉其聲坎坎應節故曰坎侯訛為空侯侯者因樂人姓耳謂師延作非也風俗通曰漢武令樂人侯調依琴作坎侯宋臨川守劉義慶空侯賦曰侯牽化而始造通典說其形似瑟而小用撥彈之非今器也又有云空侯胡樂也漢靈帝好之體曲而長二十三絃抱於懷中兩手齊奏之謂之擘正今物也續漢書曰靈帝胡服作胡空侯隋音樂志曰立箜篌出自西域非華夏舊器也箏陸法言切韻曰箏秦蒙恬所造風俗通曰箏秦聲也而五絃今十三絃不知誰作傳玄箏賦序曰或以謂蒙恬造亡國之臣蓋不能關思也隋音樂志曰箏十三絃所謂秦聲蒙恬所作也又風俗通曰按禮樂記箏筑身今箏形如瑟不知誰改傅子曰上圓象天下平象地空中準六合絃柱十二擬十二月乃仁智之器阮瑀箏賦曰長六尺應律數晉陶融妻陳氏箏后夔創制子野考成也琵琶風俗通曰琵琶近代樂家所作不知其始樂府雜錄曰始自烏孫公主造馬上彈之王諐期終幕祠儀曰出於絃鼗傅玄琵琶賦序曰故老云漢遣鳥孫公主嫁昆彌念其行道思慕使知音者裁箏筑空侯之聲作馬上之樂以方語, WYG: ''}
