  - {type: variant, offset: 159, length: 0, content: '', WYG: 也亦見班固前漢晁錯本傳云事始則謂自孝武䇿仲舒始非也秀才漢氏取士又有孝亷秀才二等齊宋以來州有秀才之舉隋唐之代其科最上貞觀中有舉而不第者坐其州長由是其科廢故自唐及今雖進士猶以秀才為號自唐漢之舊}
