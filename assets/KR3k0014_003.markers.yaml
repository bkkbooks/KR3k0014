  - {type: variant, offset: 7690, length: 225, content: 侯唐始加其等也水府號宋朝會要曰大中祥符二年九月十七日詔江州馬當上水府廣祐寧江王宜封福善安江王太平州採石中水府濟遠定江王封順聖平江王潤州金山下水府虛肅鎮江王封昭信泰江王舊封江南保大中偽號至是始易之追贈自武王克商追王太王王季故後代有追謚追尊之典兩漢逮今人臣亦有追贈之制追封漢書張賀傳賀為掖庭令宣帝以皇曾孫收養掖庭恩甚密及帝即位追思賀封恩德侯此則追封之始也樂山海經曰祝融生長琴是處搖山始作樂風注云創樂風曲也通典曰伏犧樂名扶來亦曰立本神農樂名扶持亦曰下謀隋樂, WYG: 家科目}
