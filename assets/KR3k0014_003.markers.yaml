  - {type: variant, offset: 1, length: 3, content: 式姓諱, krp: 以下通用為前驅蓋周制周官考工記曰廬人為殳此其始也餘見五兵牙門宋朝㑹要曰古者天子出建大牙今制錯綵為神人象中道前後各一左右道五門門一旗蓋取周制立旌表門及天子五門之制玉旗又曰乾德六年太祖親郊有司請以國初以來祥異著旗章遂作金鸚鵡玉兎馴象三旗注云建隆二年隴州楊勲獻鸚鵡鄆州姚光輔獻白兎及馴象自來為三旗也攝提旗又曰建隆四年將郊祀禮儀使陶榖建議取天文北角攝提之象作攝提旗及北斗二十八宿十二辰五嶽五方神五鳳四瀆等旗也龍旗開寳通禮新加然則蓋自宋朝新制也謂風伯雨師雷公雷母各一五星五左右攝提二北斗一也鈒史記趙良謂衛鞅曰君之出也操闟㦸者旁車而趨續漢書輿服志曰漢大駕前驅有鳳凰闟㦸鈒闟字同然則疑秦制也䍐罼通典曰武王剋紂百夫荷䍐旗以先驅後漢有九游雲䍐西京雜記曰漢大駕有䍐罼在左右則是漢始制此二物晉輿服志五時車後次華蓋中道左罼右䍐宋朝㑹要曰象畢為天街故為前引皆赤質金銅飾朱藤結網金獸面䍐方上有二螭首銜紅絲拂罼如圓扇黄麾通典曰黄帝振兵設五旗五麾則黄麾製自有熊始也宋朝㑹要曰麾古有黄朱纁三色所以指麾也漢鹵簿有前後黄麾今制絳帛為之如幡采成黄麾字古今注曰麾所以指麾武王執白旄以麾是也乗輿以黄諸王以朱刺史二千石以纁氅宋朝㑹要曰氅本緝鳥毛為之唐有六色孔雀大小鵝毛雞毛之制隋書禮儀志曰梁武受禪于齊多循其儀物御仗有赤氅青氅于此已有氅制矣儀鍠宋朝㑹要曰鉞屬也秦漢有之唐用為儀仗古今注曰秦改鐵鉞作錦秦制也白幹槍又宋朝㑹要曰矟也唐羽林所執制同矟而鐵刃上綴朱絲拂隋志記齊梁四代儀中亦有此物疑晉宋以后以為仗街也班劔又曰本漢朝服帶劒取五色斑斕之義開元禮義纂曰漢制朝服帶劒晉代之以木謂之班劒宋齊謂之象劒儀刀二儀實録曰儀刀自東晉多虞遂以木代之以備威儀即衙刀也宋朝㑹要曰銀飾王公亦給御刀宋朝㑹要曰晉宋以來有之黒鞘金花銀飾靶厄紫絲絛􅀈錔引駕旗皇祐大饗明堂記曰引駕旗唐禮今無文開寳通禮新加謂十二辰天王二等旗也龍墀旗又曰龍墀旗唐禮今亦無文開寳通禮新加謂天下太平一五方各一君王萬嵗一日月各一合璧旗漢書律厯志曰武帝選治厯者造太初厯復使淳于渠陵覆厯晦望弦朔最宻太初元年十一月甲子朔旦冬至七政周起牽牛初度日月如合璧五星如連珠大饗明堂記曰宋朝取此義制二旗并以禮物謂日月合璧一苣文二夾之五星連珠一祥雲二夾之五嶽旗大饗明堂記曰五嶽五方神五龍五鳳四瀆神等旗宋朝新制方繖宋朝㑹要曰方繖古張帛避雨之制今有方繖大繖則是繖之制始于古張帛也雉扇古今注曰起于商髙宗有雊雉之祥服章多用翟羽周以為王后夫人之服飾車之有翣織雉羽為扇以翳風塵漢乗輿服之後以賜梁孝王魏晉以来為常雖諸王皆得用之毬杖宋朝㑹要曰毬杖非古蓋唐世尚之以資玩樂鳴鞭又曰唐及五代有之周官條狼氏執鞭趨辟之遺法也然則鳴鞭雖始于唐亦本周事也旂常周禮巾車玉輅建太常疏曰按司馬法章夏以日月上明商以虎上威周以龍上文釋名曰日月為常畫日月于旗端言常明也云自夏后始奚仲為夏車正加以旂常於是斿就有差用明尊卑之别朱團扇宋朝㑹要曰本漢世長柄扇宋孝武時詔王侯鄣扇不得用雉尾故王公以下有朱團扇疑自此其始也金節又宋朝㑹要曰金節隋制也八層黄綉龍袋籠之周禮六節山國用虎上國用人澤國用龍三節皆金為之則防别金節取茲義爾節周禮地官之屬掌節有八角虎人龍符璽旌等節漢文有旄節之制西京雜記曰漢大駕鹵簿有節十六在左右則漢始用為儀仗也筆談曰古節如今虎符其用則有珪璋龍虎之别皆櫝將之英蕩是也漢人有持節乃古旄也然則節自周始而旄節則起于漢也華蓋古今注曰華蓋黄帝與蚩尤戰常有五色雲氣金枝玉葉止于帝上有花蘤之象故作華蓋筆談曰輦後曲蓋謂之艮兩旁夾扇通謂之扇􅀢皆繡亦有銷金者即古華蓋也旌管子曰舜有進善之旌則旌為起于虞帝旃世本曰黄帝作旃俾倪宋朝㑹要曰漢乗輿用之如花蓋而小疑漢始制之也負神旗宋朝㑹要曰建隆中將郊祀太祖又詔别造大黄龍負圖旗一大神旗六日旗一月旗一君王萬嵗一天下太平一師子二金鸞金鳳各一五龍五凡二十一旗皆有架南郊用之大黄龍負圖旗陳于端門前餘二十旗悉立於宿頓宫前朝㑹册禮亦陳于殿庭也曲蓋古今注曰曲蓋太公所作武王伐紂大風折蓋太公因折蓋之形而制曲蓋雞竿楊文公談苑曰杜鎬言金雞肆赦不知起于何代關東風俗傳曰宋孝王問司馬膺之後魏北齊赦日立金雞事膺之曰按海中星占云天雞星動為有赦蓋王者以天雞為度隋書刑法志北齊赦日令武庫設金雞及鼓于闕門右撾鼓千聲宣赦建金雞或云起于西涼吕光未知孰是究其㫖蓋西方主兊兊為澤雞者巽神巽主號令故合二物置其形揭于長竿使衆覩之唐百官志曰中書令赦日立金雞于仗南有雞黄金飾首銜絳幡承以采盤維以絳繩教坊小兒得雞首者官以錢購或取絳幡而已蓋此禮起于有唐也旌節吕氏春秋曰墨者田鳩見楚王王悦之得將軍之節將軍賜節戰國已然周禮六節道路用旌節孟詵錦帶前書云以竹為之使人執導之又周使節四旌節其一也隋書禮儀志曰後周制有旌節畫白獸而析羽于其上唐車服志曰髙祖初大將出賜旌以顓賞賜節以顓殺旌以絳帛五丈粉畫虎銅龍一首纒緋旛紫縑為袋油囊為表節懸畫木盤三相去數寸隅垂赤麻餘與旌同此蓋唐制也冠冕首飾}
  - {type: variant, offset: 5, length: 3, content: 第八敕, WYG: 十四冠三禮圖曰緇布冠始冠之冠也太古冠布然則冠之興其始自太古乎通典曰上古衣毛冒皮後代聖人見鳥獸冠角乃作冠纓黄帝始用布帛或曰黄帝已前用皮羽也六帖曰孔子作緇布冠誤矣冕説文曰黄帝初作冕世本曰黄帝作旃冕宋𠂻云冠之垂旒者通典曰黄帝作冕垂旒目不邪視也充纊耳不聽䜛言也應劭曰周始垂旒杜佑云宋更名平天冕故今人亦以為稱也弁世本曰魯昭公作弁而禮記稱三王共皮弁素積然則弁蓋}
