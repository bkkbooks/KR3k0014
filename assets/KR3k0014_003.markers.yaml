  - {type: variant, offset: 149, length: 1, content: 辭, WYG: 學禮有虞氏養國老于上庠又曰古之教者家有塾黨有庠遂有序國有學孟子曰夏曰校商曰序周曰庠學則三代共之沿革曰有虞氏太學為上庠然則學自有虞氏始也通典曰漢文翁為蜀郡修起學宫天下皆立學自文翁始也孔子廟後漢鍾離意傳曰意為魯相身入孔子廟堂蓋孔氏家廟也唐禮樂志曰武徳二年始詔國學立孔子廟會要云六月一日也貞觀四年又詔州縣皆作㑹要又曰髙宗緫章二年勅天下皆置宋朝因之配坐通典曰魏齊王芳正始二年二月講論通使太常釋奠}
