  - {type: variant, offset: 2207, length: 226, content: 莫肯歸之庶姓雖有勞能亦自甘居大姓之下後魏據中原此俗遂盛于中國唐末方衰息也名帝王世紀曰神農母名女登春秋鉤命決曰任似感龍生帝魁注云魁炎帝名左傳曰太皞以龍紀官故為龍師而龍名又太皞之母名華胥則名疑始于伏犧氏之前字禮記郊特牲曰冠而字之敬其名也冠而字成人之道也字所以貴名帝王世紀曰少皞帝名摯字青陽則自金天氏始為字也諱周禮小史之職有事詔王之諱注云先王之名禮卒哭以木鐸徇于路捨故而諱新注故高祖之諱新新死者之諱春秋左氏傳曰周人以諱事神名終將諱之則是諱名自周人始也禮祭義云, WYG: 問䇿外更詩賦并雜}
