  - {type: variant, offset: 8536, length: 111, content: 五音宮商角徵羽自周加文武二聲謂之二變孟詵錦帶前書曰變宮變徵自商以前皆用五聲以配十二辰至周武王克商之時從午至子天有七助故加文武二變聲是為七音五聲為體二變為和依此相生迭為之宮尚書大傳云七始為七其五聲為正二聲為變然則變宮變徵乃始, WYG: 司者競集}
