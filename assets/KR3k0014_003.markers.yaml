  - {type: variant, offset: 7535, length: 3, content: 封東海, WYG: 賜新及第進士諸科吕蒙正以下緑袍靴笏非常例也御前釋褐蓋自是始呉處厚青箱雜紀曰世傳潘閬安鴻漸八才子圖皆策蹇重戴又王禹偁贈崔遵度及第未脱白詩曰且留重戴士風多則國初舉子猶重戴矣此唐風也英宗在諒陰於及第後用其禮云賜宴又曰開寳八年賜新及第進士王嗣宗等錢有手令宴樂太平興國二年正月七日太宗親試吕蒙正以下並賜及第仍賜宴開寳寺兼降御製詩二首賜之此賜宴及詩之始也唐制禮部放牓後勅下之日醵錢於曲江}
