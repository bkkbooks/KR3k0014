  - {type: variant, offset: 4292, length: 491, content: 按唐會要曰天寶三載十月十六日蘇嘉慶上言請于城東置九宮貴神壇每歲四孟月祭也大火又曰康定元年十月胡宿言按春秋士弱對晉侯曰古之火正或食于木陶唐火正曰閼伯居商丘祀大火焉說文曰火正火官也掌祭火星行火政後世以為火祖相土契之曾孫代閼伯宋其後也商丘今南京則閼伯之神主祀大火願列祀官祭大火禮官議曰閼伯為高辛火正實居商丘主祀大火後世因之為貴神配火侑神功謂宜因作壇兆秩大火以閼伯配然則大火之祀始于帝嚳而宋朝仁宗復其典也后土按西漢祭天于甘泉泰畤祭地于汾陰后土後漢始定南北郊然則汾陰后土本漢祀地示之所也宗廟禮緯元命包曰唐虞五廟沿革亦云昔唐虞五廟夏后因之至商而七書咸有一德曰七世之廟可以觀德是也周兼文武二祧故九廟由唐虞推而上之明其前有至堯舜乃祭五廟爾廟號王者祖有功宗有德始自有虞祖高陽而宗堯故舜典有歸格于藝祖受終于文祖大禹矢謨亦有受命于神宗之文商有天下太甲號囗囗太戊為中宗武丁為高宗始列宗廟之號故漢世因之西京有太宗世宗東京有顯宗肅宗而唐室諸帝乃例稱之蓋其事原于虞舜而備于商人也朝獻筆談曰唐制有事於上帝則百神皆預祭告惟太清宮太廟則上親行謂之奏告止南郊為正祠天寶九載詔以告者上告下之辭今後太清宮宜稱朝獻太廟宜稱朝饗, WYG: 牓}
