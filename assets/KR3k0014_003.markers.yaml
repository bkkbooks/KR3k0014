  - {type: variant, offset: 8648, length: 1942, content: 周也按國語周景王問七律伶州鳩曰武王伐商歲在鶉火月在天駟星在天黿姬氏出自天黿自鶉及駟七列南北之揆七同凡神人以數合之以聲昭之然後可同也故以七同其數而律和其聲故有七律此蓋其始也諸調筆談曰宮商角為正聲徵羽為變聲加變徵則從變之聲已瀆矣隋鄭譯始調具之均展轉相生為八十四調清濁溷淆紛亂無統並流為新聲自後有犯聲側聲王煞寄煞偏字傍字雙半字之法然則今胡部諸調皆源於鄭譯三臺三十拍曲名也劉公嘉話錄曰三臺送酒蓋因北齊文宣毀銅雀臺別築二箇臺宮人拍手呼上臺因以送酒李氏資暇曰昔鄴中有三臺石季龍遊宴之所樂工造此曲促飲也又一說蔡邕自御史累遷尚書三日之閒歷三臺樂府以邕曉音律製此曲以悅之未知孰是小辭筆談曰古詩皆詠之然後以聲依之詠以成曲謂之協律詩外有和聲所謂曲也唐人乃以辭填入曲中不復用和聲此格雖云自王涯始然正元元和之閒為之者已多有在涯前者又小曲有咸陽沽酒寶釵空之句云李白作花閒集乃云張泌所為莫知孰是楊繪本事曲子云近世謂小辭起于溫飛卿然王建白居易前於飛卿久矣王建有宮中三臺宮中調笑樂天有謝秋娘咸在本集與今小辭同花閒集序則云起自李太白謝秋娘一云望江南又曰近傳一闋云李白製即今菩薩蠻其辭非白不能及此信其自白始也劉斧青瑣集隋海中記有望江南調即焬帝世已有其事也鼓吹唐樂志曰黃帝使岐伯作鼓吹以揚德建武蔡邕禮志亦云然唐紹傳曰紹謂鼓吹本軍容黃帝戰涿鹿以為警衛也凱歌蔡邕禮志曰黃帝使岐伯作軍樂凱歌今還軍有樂即其遺意也女樂列女傳曰夏桀既棄禮義淫於婦人求四方美女積之後宮作爛漫之樂晉獻公欲伐虞遺以女樂二八左傳鄭略晉侯以女樂論語齊人歸魯女樂自周末皆有而桀為之始準漢元帝時京房造準中瑟而十二絃隱開九尺中央一絃下有盡分寸六十律之節宋朝仁宗時阮逸胡瑗輩復用其制作之歌山海經曰夏后開上三嬪於天得九歌九辯以下焉又曰帝俊有子八人是始歌舞夏侯玄辯樂論曰伏犧有網罟之歌呂氏春秋有葛天氏歌八闋一曰載人二玄鳥三逐草木四奮五穀五天帝六達帝功七依地德八物禽獸之極則歌以太昊為始蓋太昊之後十三代有葛天氏故也舞又山海經曰天與帝爭神帝斷共首乃以乳為眼以臍為口操干戚以舞又曰帝俊八子是始為舞孟頻引教坊記曰昔陰康氏次葛天氏元氣肇分災沴未弭民多重腿之疾思所以通利關節是始制舞然則舞自康氏始也呂氏春秋曰陶唐氏之始陰多滯伏民多壅閼故為作舞以宣導之誤矣孟詵錦帶前書則云舞樂之興始於黃帝故周用六代之樂越取黃帝以謂始舞可尊也周禮六舞五曰人舞注無所執以手袖為威儀祀星長舞之即今代之舞出於此也鐘月令章句曰上古聖人本陰陽別風聲審清濁不可以文載口傳於是始鑄金作鐘以主十二月之聲山海經曰炎帝之孫伯歧因鼓遂為鐘又曰伯歧生鼓延是始為鐘呂氏春秋曰黃帝命伶倫鑄十二鐘世本曰黃帝工人垂所造皇圖要紀曰帝嚳造鐘聲禮曰垂之和鐘鄭康成云垂堯時鐘工也鎛鐘隋音樂志曰鎛鐘即黃帝所命伶倫鑄十二鐘和五音者也宋朝會要載馮元等議曰昔黃帝命伶倫與營援鑄十二鐘以調月律今鎛鐘是也鼓禮記明堂位曰土鼓蕢桴伊耆氏之樂也帝王世紀曰黃帝殺夔以其皮為鼓黃帝內傳曰帝與蚩尤戰玄女為帝製夔牛鼓又請帝制鼓鼙以當雷霆世本曰夷作鼓蓋起於伊耆氏之土鼓也山海經云夔大獸似牛一足無角皮可面鼓鼓足又明堂位曰夏后氏之鼓足鄭注云足是四足毛公詩注曰夏后氏足鼓隋音樂志曰建鼓夏后氏加四足謂之鼓足建鼓同前又曰商楹鼓詩商頌曰置我鞉鼓毛公注云商人置鼓鄭箋云湯改夏之制乃始植我商家之鼓楹謂之柱楹貫植之隋音樂志曰建鼓商人柱貫之謂之楹鼓近代相承植而貫之謂之建鼓蓋商所作也又棲翔鷺於上不知何代所加或曰鵠取其聲揚而遠聞或曰鷺鼓精越王句踐大鼓於雷門以厭吳晉時移於建康有雙鷺哾鼓而飛入雲或曰皆非也詩云振振鷺鷺於飛鼓咽咽醉言歸古之君子悲周道之衰頌聲輟飾鼓以鷺存其風流未知孰是懸鼓明堂位曰周懸鼓按周頌有瞽之詩曰應田懸鼓周禮雷靈路晉鼛等鼓皆有簨簴以懸之隋音樂志曰建鼓周人懸之謂之懸鼓磬說文曰無句氏作磬世本亦云又曰磬叔所造不知何代人古史考曰堯時人也樂錄曰磬叔所作禮記曰叔之離磬皇圖要紀曰帝嚳造鐘磬通禮義纂曰黃帝使伶倫造磬也簨簴禮記曰夏后氏龍簨簴蓋樂之制自造鐘磬則宜有簨簴而飾之以龍則自夏后氏始也方響通典曰梁有銅磬則今方響也方響以鐵為之以代磬唐書禮樂志曰方響體以應石審此則是出於編磬之制而梁始為之者也琴文選西都賦曰伏犧作琴世本曰伏犧造琴琴操曰伏犧作琴長三尺六寸六分琴書曰伏犧氏王天下制桐為琴廣雅曰伏犧氏琴長七尺二寸說文曰琴神農所造桐越練朱五絃至周文增其二帝王世紀曰炎帝作五絃之琴桓譚新論曰神農氏始削桐為琴繩絲為絃又曰周文王武王各加一絃廣雅又云神農琴長三尺六寸六分止有五絃文王增二絃隋音樂志曰琴神農制為五絃周文王加二絃為七者也高氏小史曰炎帝教人作五絃之琴通禮義纂曰堯使母句作琴五絃楊雄琴清英曰舜彈五絃琴堯加二絃山海經曰帝俊生晏龍是始為琴禮記曰舜作五絃之琴以歌南風雖諸家記所始長短增絃不同要之以太昊作之為, WYG: 進士繇}
