markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書事物紀原卷三宋髙承撰旗旐采章部十三幰弩古今注云漢京兆河南尹執金吾司𨽻校尉皆使馬前導引傳呼使行者止坐者起四人持角弓箭走及乗髙窺瞰者皆射之魏設而不用今鹵簿又以幰弩而不以弓亦弛而不用行則居前由魏始也車輻古今注曰棒也漢朝執金吾金吾赤棒以銅為之黄金塗兩頭謂之金吾御史大夫司𨽻校尉亦得執焉御史校尉郡守都尉縣長之屬例皆木為之用以夾車謂之車輻一曰形如車輻故云也宋朝㑹要曰形如車輻今剡木漆八稜勘箭筆談曰大駕鹵簿中有勘箭如古之契勘也其牡謂之雄牡箭牝謂之闢仗箭本胡法也熈寧中罷之警蹕周禮夏官𨽻僕掌蹕宫中之事註謂止行者自漢以来天子出稱蹕古今註曰所以戒行徒也周禮蹕而不警秦制出軍者皆警戒入國者皆蹕止故云出警入蹕一曰蹕路也謂行者皆警于塗路也蓋始于周制皂纛六典曰後魏有纛頭宋朝會要曰皂纛本後魏纛頭之制唐衞尉纛居其一蓋旄頭之遺像犦矟宋朝會要曰犦擊聲也一云象犦牛善鬭字從犦唐金吾將軍執之今制如節加碧油殳古今註曰殳㦸之遺象也詩所謂伯也執殳為王前驅殳前驅之器也以木為之後世澆偽無復典刑以赤油韜之亦謂之油㦸亦曰棨㦸王}
