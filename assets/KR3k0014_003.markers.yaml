  - {type: variant, offset: 7916, length: 227, content: 曰伏羲有網罟之歌詠伊耆有葦籥之音葛天八闋神農五絃其來尚矣呂氏春秋曰葛天氏之樂三人操牛尾投足歌八闋則非長琴始為樂也世本曰伏羲造琴瑟是始為樂至黃帝命伶倫考八音調和八風為雲門之樂則其事于是乎備樂府通典曰漢武立樂府蓋始置之也樂府之名當起于此胡部唐禮樂志曰自周陳以上雅鄭淆雜而無別隋文始分雅俗二部今俗樂二十八調是也又有倍四本寫樂形類雅音而曲出於胡部此名胡部之始也復有銀字中管之別皆前代應律之器後人失其傳而更異名故俗部諸曲悉源於雅樂筆談曰外國之聲前自別為四夷樂唐天寶, WYG: ''}
