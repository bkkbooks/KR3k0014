  - {type: variant, offset: 12605, length: 3644, content: 禮圖篴亦橫設而五孔不知出何典據樂要曰笛自丘仲以七孔一尺四寸之長六帖曰笛本四孔京房加以一按馬融賦云近世雙笛從羌起羌人伐竹未及已龍鳴水中不見矣截竹吹之聲相似易京君明識音律故呼四孔加以一君明所加孔後出是謂商聲五音畢籥禮記曰土鼓蕢桴葦籥伊耆氏之樂也注云伊耆古天子號則籥蓋伊耆氏所作也笳杜摯笳賦序曰昔伯陽避亂入戎懷土遂建斯樂又胡笳漢舊錄有其物不記所出本末云胡人卷蘆葉吹之故曰胡笳亦云李伯陽入西戎所造笙禮記明堂位曰女媧之笙簧簧笙中之簧也世本曰女媧作笙簧高氏小史亦云曹植女媧贊曰造簧作笙隋音樂志曰笙竽並女媧之所作也竽世本曰隨作竽注云隨女媧之臣也通禮義纂曰漢武帝時丘仲作竽笙三十六管而韓子有齊宣王好吹竿之事則竽非丘仲所作明矣世本之說是壎又曰壎暴辛公所作宋均云周平王時諸侯通典曰不知何代人周之畿內有暴國豈其人乎承謂世本所記當是以詩有暴公為卿士而譖蘇公蘇公作何人斯以絕之其詩云伯氏吹壎仲氏吹篪以言在俱為王臣恩如兄弟故謂伯仲耳其相應和如壎篪也便謂暴公作壎蘇公造篪云按樂記曰聖人作為鞉鼓控揭壎篪此六者德音之音也言聖人作為則明非暴公所能作矣隋音樂志亦謂壎六孔暴辛公之所作非也通歷曰帝嚳造王子年拾遺記乃云庖犧灼土為壎也擊甌呂氏春秋曰堯使質以麋絡魚缶而鼓之詩宛丘曰坎其擊缶史記秦趙會澠池秦王擊缶則古有擊缶為樂者擊甌蓋擊缶之遺事也唐大中初郭道源善之用越甌邢甌十二旋加減水以筯擊之其音妙于方響昔人於此記其法疑其自道源始也鼗呂氏春秋曰帝嚳使垂作鼗通歷曰帝嚳平共工之亂作鼗鼓羯鼓羯鼓錄曰以戎羯之鼓故曰羯鼓唐禮樂志曰蓋本戎羯之樂其音太簇一均明皇帝稱八音之領袖諸樂不可方也通典曰以出羯中故號羯柷敔禮樂記曰聖人作為控鞚注云謂柷敔也通歷曰帝嚳平共工之亂作鞚揭拍板樂府雜錄曰明皇令黃幡綽撰拍板譜綽曰但有耳道則不失其節奏通典有擊以代抃抃擊節也因其聲以節舞拍板蓋出於擊節也又晉魏之代有宋識善擊節然以板拍之而代擊節是則拍板之始也鄴城舊事曰華林園齊武成時穿池為北海中有密作堂以船為腳作木人七一拍板則此器已見於北齊矣鈸通典曰鈸亦名銅盤出西戎及南蠻其圓數寸隱起如涇漚貫之以韋相擊以和樂南蠻大者圓數尺或謂齊穆王素所造鹵簿炙轂子曰車駕行羽儀導獲謂之鹵簿自秦漢始有其名後漢胡廣作天子出行鹵大楯也所以扞敵部伍之次皆著之簿儀其五兵獨以楯為名者行道之時甲楯居外餘兵在內故但言鹵簿五禮精義曰鹵大盾也以大盾領一部之人故名鹵簿象西京雜記漢朝輿駕有象車鼓吹十三人中道晉輿服志曰象車漢鹵簿最在前晉諸公讚曰晉時南越獻馴象為作車令越人騎之帝行則以試橋梁通典曰晉武帝太康中平吳南越獻馴象詔作大車駕之使越人騎之大駕鹵簿行則試橋梁宋朝會要曰漢鹵簿象最在前晉作大車駕之以試橋梁皇朝象亦居先設木蓮花坐金蕉葉然則象之先導自漢始也駕頭筆談曰正衙法座香木為之加金飾四足墮角其前小偃織藤冒之每車駕出幸則使老內臣馬上抱之曰駕頭虞候春秋時晉有候正主斥候又有原候候奄則虞候之名蓋因此齊晏子云藪之薪蒸虞候守之本山澤望候之官李靖兵法有左右虞候名同而職異矣佽飛漢百官表曰少府官屬秦有左弋武帝太初元年更為佽飛呂氏春秋曰荊有茲非渡江兩蛟繞舟茲非拔劍殺之荊王任以執圭後世以為勇力之官茲佽音相近許慎曰佽便利也顏師古以謂取勇力人以名官亦取其便利輕捷若飛故號佽飛今大駕齒簿備此二者以為儀衛指南樂臺注鬼谷子曰肅慎還周公恐其迷路造指南車送之古史考亦云周公作或曰管仲作崔豹古今註曰舊說周公所作周公致太平越裳氏重譯來獻使者迷其歸路周公錫以軿車五乘皆為司南之製按黃帝內傳曰玄女為帝製司南車當其前志林曰黃帝與蚩尤戰於涿鹿之野蚩尤作大霧彌三日人皆惑帝令風后法斗機作指南車以別四方古今註又曰指南車起於黃帝戰蚩尤作大霧迷四方於是作指南車也記里古今註曰大章車所以識道里也起於西京亦曰記里車黃帝內傳曰玄女為帝製司南車當其前記里車居其右則是其制始自黃帝造之非西漢所作也白鷺通典曰隋置一名鼓吹車車上施層樓樓上有翔鸞棲焉宋朝會要曰隋所制也柱杪刻木為鷺銜鵝毛䇶鸞旗通典曰鸞旗車漢制編羽旄列繫幡傍胡廣曰以銅作鸞鳥於車衡上宋朝會要曰漢制為前驅上載赤旗繡鸞也皇祐大饗明堂記曰景祐五年重制此旗赤質繡鸞載以車也崇德宋朝會要曰崇德車本秦辟惡車也上有桃弧棘矢所以禳卻不祥乾德元年八月改今名中載黃旗太卜令在車執旗古今註曰辟惡車秦製也桃弓葦矢所以祓除不祥故曰辟惡皮軒通典曰皮軒車漢制以虎皮為軒宋朝會要曰漢制前驅車也取曲禮前有士師則載虎皮之義也相風黃帝內傳有相風烏制疑黃帝始作之也拾遺記曰少昊母曰皇娥游窮桑之浦有神童稱為白帝子與皇娥讌戲汎於海以桂枝為表結芳茅為旌刻玉為鳩置於表端言知四時之候今之相風烏亦其遺像古今註曰相風為夏禹所作周遷輿服雜事曰相風周公所造即鳴鳶之象禮曰前有塵埃則載鳴鳶後代改為烏沈約輿服志曰相風烏秦制鐘鼓輿宋朝會要曰隋大駕鐘車鼓車也隋大業雜記曰大駕羽衛有行漏車鐘車鼓車今為輿行漏又宋朝會要曰隋大業行漏車也蓋隋制十二神宋朝會要又曰開寶新定禮所增大饗明堂記曰十二神輿載十二月之神象自鉦鼓漏鐘及神輿舊禮令無文開寶通禮新加儀馬今導駕有御馬分左右按自漢有之西京雜記漢朝輿駕祀甘泉汾陰罼罕左右及節十六後乃有御馬三則儀馬之設自漢始也香鐙宋朝會要曰香鐙唐制也腰輿通典曰唐有腰輿大駕先五輅行五輅隋書禮儀志曰輅虞氏謂之鸞車夏后謂之車輅商謂之大輅周謂之乘輅按此則謂之輅者自商人始也周人初制五輅金玉象革以飾諸末木無飾後漢加虡文晉兩廂加鵾翅時亦謂之鵾車注旂旗於左加棨戟於石皆橐藏之戟韜以繡黻大輦宋朝會要曰周官巾車氏有輦車以人組挽之宮中從容所乘建隆四年南郊陶穀為禮儀使創意造為大輦也芳亭通典周制輦七其五曰芳亭輦蓋始以為大駕羽衛也鳳輦又曰唐輦有七一曰大鳳輦前世無文疑唐所造也今止曰鳳輦小輿又通典曰按小輿今犢車軿車之流宋制小輿形如軺車小行幸則乘之五牛輅通典曰東晉過江副車遺缺有事權以馬車代之建旗其上後制五色木牛象五時車立旗於背行則使人輿之牛取負重致遠而安旗常纏而不舒所謂德車綏旌晉書輿服志曰五牛旗平吳後所造以五牛建旗車設五牛青赤在左黃在中白黑在右周遷輿服雜事亦云晉平吳後造非過江始為也副車禮記有貳車鄭康成云副車又有佐車然則副車亦周事也通典曰秦平天下以諸侯之車為副又周禮成車五倅有成輅及廣闕苹輕等車之倅倅副也則輅車有副周制然也金根古今註曰秦制也秦并天下閱三代之輿服謂商得瑞山車一曰金根故作金根之車乃增飾而乘御漢因為乘輿董巴輿服志曰商瑞山車金根之色商人以為大輅於是秦始皇作金根之車漢承秦制為乘輿孔子所謂乘商之輅也然則金根之制蓋出於商人大輅之法大戴禮曰昔成湯郊祀因有山車之瑞亦為桑根秦謂金根商輅矣耕根通典曰漢制如副車有三蓋一曰芝車置輹耒耜之箙上親耕所乘晉駕駟隋以青質羽葆雕裝軾平青囊盛耒耜而加之也進賢車安車也通典曰周致仕之老及后乘之漢有五時安車各以方色宋朝會要曰進賢古安車也乾德元年八月改明遠宋朝會要曰古四望車也駕以牛乾德元年八月改仍駕四馬制如屋上層四面垂簾通典曰齊四望車亦曰皀輪車以加貴臣按齊已上無文便為齊制明矣又曰唐始駕四馬也羊車通典曰晉制宋朝會要曰古輦車也亦為畫輪車駕以牛隋駕果下馬今亦駕以二馬景祐五年九月賈昌朝上言羊車本漢晉之代乘於後宮隋大業中增金寶之飾駕以小駟馭以卯童自是以來遂為法從宋綬議引後漢劉熙釋名曰羸車羊車各以其駕名之隋禮儀志曰漢世或以人牽或駕果下馬此乃漢代先有晉武偶取乘於後宮非特為掖庭制也然則羊車漢儀非晉始有也黃鉞車宋朝會要曰黃鉞車漢制乘輿建之唐初元正觀後始加古今註曰金斧黃鉞也三代用之斷斬金以黃為乘輿之飾武王以黃鉞斬紂故王者以為戒通典以為晉制豹尾古今註曰周禮也所以象君子豹變尾言謙也古軍正建之今惟乘輿得建謂晉代也通典曰漢制大駕法駕出屬車最後一乘懸豹尾豹尾以前比省中宋志按徐廣淮南子軍正執豹皮以正其眾禮記前有士師則載虎皮乘輿豹尾以其義類宋朝會要曰唐正觀後始加此車於鹵簿內屬車周末諸侯有貳車九乘貳車即屬車也亦周制所有秦滅九國兼其車服故八十一乘建旗沈約輿服志曰車服以庸著在唐典夏建旌旗辯其尊卑通典曰夏后氏俾車正奚仲建旗旐尊卑上下各有等級則車輅之建旗常始於禹也通典曰黃帝設五旗夏后奚仲為車正建旗斿旐以別尊卑等級也駕易言黃帝服牛乘馬則馬駕之初也至陶唐氏始乘彤車白馬則齊毫之始也通典以堯乘白馬駕馬之始古史考以禹時奚仲駕馬誤矣世本曰黃帝之臣臣胲作服牛相土作駕馬呂氏春秋曰乘時作駕王永作服牛也高氏小史云太昊服牛乘馬乘通典曰昔人皇乘雲駕六羽出谷及五龍氏乘龍上下以理此乘之始也駕六昔人皇駕六羽史記曰秦并天下自以水德故始駕六馬按夏書五子之歌曰若朽索之御六馬則駕六之制夏后已然非自秦始皇起也逸禮王度記曰天子駕六馬諸侯四大夫士二庶人一易京房春秋公羊說皆云天子駕六許慎亦云而周禮四馬為乘詩天子至大夫同駕四顧命時諸侯皆布乘黃朱後漢輿服志劉昭補注云今帝者駕六此自漢制與古異爾大安輦宋朝會要曰乾興元年九月禮儀院奏周守恩狀奉聖旨製造皇太后御座檐子乞詳定制度所稱名目詔以大安輦為名輦通典曰夏后末代制輦商曰胡奴車周曰輜車隋制輦而不施輪以人荷之注云人牽為輦正義曰秦始皇去其輪而輿之漢代遂為人君之乘亦曰秦也, WYG: ''}
  - {type: variant, offset: 12605, length: 3644, content: 禮圖篴亦橫設而五孔不知出何典據樂要曰笛自丘仲以七孔一尺四寸之長六帖曰笛本四孔京房加以一按馬融賦云近世雙笛從羌起羌人伐竹未及已龍鳴水中不見矣截竹吹之聲相似易京君明識音律故呼四孔加以一君明所加孔後出是謂商聲五音畢籥禮記曰土鼓蕢桴葦籥伊耆氏之樂也注云伊耆古天子號則籥蓋伊耆氏所作也笳杜摯笳賦序曰昔伯陽避亂入戎懷土遂建斯樂又胡笳漢舊錄有其物不記所出本末云胡人卷蘆葉吹之故曰胡笳亦云李伯陽入西戎所造笙禮記明堂位曰女媧之笙簧簧笙中之簧也世本曰女媧作笙簧高氏小史亦云曹植女媧贊曰造簧作笙隋音樂志曰笙竽並女媧之所作也竽世本曰隨作竽注云隨女媧之臣也通禮義纂曰漢武帝時丘仲作竽笙三十六管而韓子有齊宣王好吹竿之事則竽非丘仲所作明矣世本之說是壎又曰壎暴辛公所作宋均云周平王時諸侯通典曰不知何代人周之畿內有暴國豈其人乎承謂世本所記當是以詩有暴公為卿士而譖蘇公蘇公作何人斯以絕之其詩云伯氏吹壎仲氏吹篪以言在俱為王臣恩如兄弟故謂伯仲耳其相應和如壎篪也便謂暴公作壎蘇公造篪云按樂記曰聖人作為鞉鼓控揭壎篪此六者德音之音也言聖人作為則明非暴公所能作矣隋音樂志亦謂壎六孔暴辛公之所作非也通歷曰帝嚳造王子年拾遺記乃云庖犧灼土為壎也擊甌呂氏春秋曰堯使質以麋絡魚缶而鼓之詩宛丘曰坎其擊缶史記秦趙會澠池秦王擊缶則古有擊缶為樂者擊甌蓋擊缶之遺事也唐大中初郭道源善之用越甌邢甌十二旋加減水以筯擊之其音妙于方響昔人於此記其法疑其自道源始也鼗呂氏春秋曰帝嚳使垂作鼗通歷曰帝嚳平共工之亂作鼗鼓羯鼓羯鼓錄曰以戎羯之鼓故曰羯鼓唐禮樂志曰蓋本戎羯之樂其音太簇一均明皇帝稱八音之領袖諸樂不可方也通典曰以出羯中故號羯柷敔禮樂記曰聖人作為控鞚注云謂柷敔也通歷曰帝嚳平共工之亂作鞚揭拍板樂府雜錄曰明皇令黃幡綽撰拍板譜綽曰但有耳道則不失其節奏通典有擊以代抃抃擊節也因其聲以節舞拍板蓋出於擊節也又晉魏之代有宋識善擊節然以板拍之而代擊節是則拍板之始也鄴城舊事曰華林園齊武成時穿池為北海中有密作堂以船為腳作木人七一拍板則此器已見於北齊矣鈸通典曰鈸亦名銅盤出西戎及南蠻其圓數寸隱起如涇漚貫之以韋相擊以和樂南蠻大者圓數尺或謂齊穆王素所造鹵簿炙轂子曰車駕行羽儀導獲謂之鹵簿自秦漢始有其名後漢胡廣作天子出行鹵大楯也所以扞敵部伍之次皆著之簿儀其五兵獨以楯為名者行道之時甲楯居外餘兵在內故但言鹵簿五禮精義曰鹵大盾也以大盾領一部之人故名鹵簿象西京雜記漢朝輿駕有象車鼓吹十三人中道晉輿服志曰象車漢鹵簿最在前晉諸公讚曰晉時南越獻馴象為作車令越人騎之帝行則以試橋梁通典曰晉武帝太康中平吳南越獻馴象詔作大車駕之使越人騎之大駕鹵簿行則試橋梁宋朝會要曰漢鹵簿象最在前晉作大車駕之以試橋梁皇朝象亦居先設木蓮花坐金蕉葉然則象之先導自漢始也駕頭筆談曰正衙法座香木為之加金飾四足墮角其前小偃織藤冒之每車駕出幸則使老內臣馬上抱之曰駕頭虞候春秋時晉有候正主斥候又有原候候奄則虞候之名蓋因此齊晏子云藪之薪蒸虞候守之本山澤望候之官李靖兵法有左右虞候名同而職異矣佽飛漢百官表曰少府官屬秦有左弋武帝太初元年更為佽飛呂氏春秋曰荊有茲非渡江兩蛟繞舟茲非拔劍殺之荊王任以執圭後世以為勇力之官茲佽音相近許慎曰佽便利也顏師古以謂取勇力人以名官亦取其便利輕捷若飛故號佽飛今大駕齒簿備此二者以為儀衛指南樂臺注鬼谷子曰肅慎還周公恐其迷路造指南車送之古史考亦云周公作或曰管仲作崔豹古今註曰舊說周公所作周公致太平越裳氏重譯來獻使者迷其歸路周公錫以軿車五乘皆為司南之製按黃帝內傳曰玄女為帝製司南車當其前志林曰黃帝與蚩尤戰於涿鹿之野蚩尤作大霧彌三日人皆惑帝令風后法斗機作指南車以別四方古今註又曰指南車起於黃帝戰蚩尤作大霧迷四方於是作指南車也記里古今註曰大章車所以識道里也起於西京亦曰記里車黃帝內傳曰玄女為帝製司南車當其前記里車居其右則是其制始自黃帝造之非西漢所作也白鷺通典曰隋置一名鼓吹車車上施層樓樓上有翔鸞棲焉宋朝會要曰隋所制也柱杪刻木為鷺銜鵝毛䇶鸞旗通典曰鸞旗車漢制編羽旄列繫幡傍胡廣曰以銅作鸞鳥於車衡上宋朝會要曰漢制為前驅上載赤旗繡鸞也皇祐大饗明堂記曰景祐五年重制此旗赤質繡鸞載以車也崇德宋朝會要曰崇德車本秦辟惡車也上有桃弧棘矢所以禳卻不祥乾德元年八月改今名中載黃旗太卜令在車執旗古今註曰辟惡車秦製也桃弓葦矢所以祓除不祥故曰辟惡皮軒通典曰皮軒車漢制以虎皮為軒宋朝會要曰漢制前驅車也取曲禮前有士師則載虎皮之義也相風黃帝內傳有相風烏制疑黃帝始作之也拾遺記曰少昊母曰皇娥游窮桑之浦有神童稱為白帝子與皇娥讌戲汎於海以桂枝為表結芳茅為旌刻玉為鳩置於表端言知四時之候今之相風烏亦其遺像古今註曰相風為夏禹所作周遷輿服雜事曰相風周公所造即鳴鳶之象禮曰前有塵埃則載鳴鳶後代改為烏沈約輿服志曰相風烏秦制鐘鼓輿宋朝會要曰隋大駕鐘車鼓車也隋大業雜記曰大駕羽衛有行漏車鐘車鼓車今為輿行漏又宋朝會要曰隋大業行漏車也蓋隋制十二神宋朝會要又曰開寶新定禮所增大饗明堂記曰十二神輿載十二月之神象自鉦鼓漏鐘及神輿舊禮令無文開寶通禮新加儀馬今導駕有御馬分左右按自漢有之西京雜記漢朝輿駕祀甘泉汾陰罼罕左右及節十六後乃有御馬三則儀馬之設自漢始也香鐙宋朝會要曰香鐙唐制也腰輿通典曰唐有腰輿大駕先五輅行五輅隋書禮儀志曰輅虞氏謂之鸞車夏后謂之車輅商謂之大輅周謂之乘輅按此則謂之輅者自商人始也周人初制五輅金玉象革以飾諸末木無飾後漢加虡文晉兩廂加鵾翅時亦謂之鵾車注旂旗於左加棨戟於石皆橐藏之戟韜以繡黻大輦宋朝會要曰周官巾車氏有輦車以人組挽之宮中從容所乘建隆四年南郊陶穀為禮儀使創意造為大輦也芳亭通典周制輦七其五曰芳亭輦蓋始以為大駕羽衛也鳳輦又曰唐輦有七一曰大鳳輦前世無文疑唐所造也今止曰鳳輦小輿又通典曰按小輿今犢車軿車之流宋制小輿形如軺車小行幸則乘之五牛輅通典曰東晉過江副車遺缺有事權以馬車代之建旗其上後制五色木牛象五時車立旗於背行則使人輿之牛取負重致遠而安旗常纏而不舒所謂德車綏旌晉書輿服志曰五牛旗平吳後所造以五牛建旗車設五牛青赤在左黃在中白黑在右周遷輿服雜事亦云晉平吳後造非過江始為也副車禮記有貳車鄭康成云副車又有佐車然則副車亦周事也通典曰秦平天下以諸侯之車為副又周禮成車五倅有成輅及廣闕苹輕等車之倅倅副也則輅車有副周制然也金根古今註曰秦制也秦并天下閱三代之輿服謂商得瑞山車一曰金根故作金根之車乃增飾而乘御漢因為乘輿董巴輿服志曰商瑞山車金根之色商人以為大輅於是秦始皇作金根之車漢承秦制為乘輿孔子所謂乘商之輅也然則金根之制蓋出於商人大輅之法大戴禮曰昔成湯郊祀因有山車之瑞亦為桑根秦謂金根商輅矣耕根通典曰漢制如副車有三蓋一曰芝車置輹耒耜之箙上親耕所乘晉駕駟隋以青質羽葆雕裝軾平青囊盛耒耜而加之也進賢車安車也通典曰周致仕之老及后乘之漢有五時安車各以方色宋朝會要曰進賢古安車也乾德元年八月改明遠宋朝會要曰古四望車也駕以牛乾德元年八月改仍駕四馬制如屋上層四面垂簾通典曰齊四望車亦曰皀輪車以加貴臣按齊已上無文便為齊制明矣又曰唐始駕四馬也羊車通典曰晉制宋朝會要曰古輦車也亦為畫輪車駕以牛隋駕果下馬今亦駕以二馬景祐五年九月賈昌朝上言羊車本漢晉之代乘於後宮隋大業中增金寶之飾駕以小駟馭以卯童自是以來遂為法從宋綬議引後漢劉熙釋名曰羸車羊車各以其駕名之隋禮儀志曰漢世或以人牽或駕果下馬此乃漢代先有晉武偶取乘於後宮非特為掖庭制也然則羊車漢儀非晉始有也黃鉞車宋朝會要曰黃鉞車漢制乘輿建之唐初元正觀後始加古今註曰金斧黃鉞也三代用之斷斬金以黃為乘輿之飾武王以黃鉞斬紂故王者以為戒通典以為晉制豹尾古今註曰周禮也所以象君子豹變尾言謙也古軍正建之今惟乘輿得建謂晉代也通典曰漢制大駕法駕出屬車最後一乘懸豹尾豹尾以前比省中宋志按徐廣淮南子軍正執豹皮以正其眾禮記前有士師則載虎皮乘輿豹尾以其義類宋朝會要曰唐正觀後始加此車於鹵簿內屬車周末諸侯有貳車九乘貳車即屬車也亦周制所有秦滅九國兼其車服故八十一乘建旗沈約輿服志曰車服以庸著在唐典夏建旌旗辯其尊卑通典曰夏后氏俾車正奚仲建旗旐尊卑上下各有等級則車輅之建旗常始於禹也通典曰黃帝設五旗夏后奚仲為車正建旗斿旐以別尊卑等級也駕易言黃帝服牛乘馬則馬駕之初也至陶唐氏始乘彤車白馬則齊毫之始也通典以堯乘白馬駕馬之始古史考以禹時奚仲駕馬誤矣世本曰黃帝之臣臣胲作服牛相土作駕馬呂氏春秋曰乘時作駕王永作服牛也高氏小史云太昊服牛乘馬乘通典曰昔人皇乘雲駕六羽出谷及五龍氏乘龍上下以理此乘之始也駕六昔人皇駕六羽史記曰秦并天下自以水德故始駕六馬按夏書五子之歌曰若朽索之御六馬則駕六之制夏后已然非自秦始皇起也逸禮王度記曰天子駕六馬諸侯四大夫士二庶人一易京房春秋公羊說皆云天子駕六許慎亦云而周禮四馬為乘詩天子至大夫同駕四顧命時諸侯皆布乘黃朱後漢輿服志劉昭補注云今帝者駕六此自漢制與古異爾大安輦宋朝會要曰乾興元年九月禮儀院奏周守恩狀奉聖旨製造皇太后御座檐子乞詳定制度所稱名目詔以大安輦為名輦通典曰夏后末代制輦商曰胡奴車周曰輜車隋制輦而不施輪以人荷之注云人牽為輦正義曰秦始皇去其輪而輿之漢代遂為人君之乘亦曰秦也, krp: ''}
