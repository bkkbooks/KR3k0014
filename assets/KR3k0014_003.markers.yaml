  - {type: variant, offset: 3094, length: 220, content: 帝于明堂唐虞祀五帝于五府夏后享祖宗于世室商人曰重屋周人宗祀文王于明堂以配上帝周禮又曰夏后世室商人重屋漢時公孫玉帶畫黃帝明堂圖則明堂要自黃帝始也而孟詵錦帶前書紀鄭康成匠人夏世室注云上五室法五行木室處東北曰青陽火室東南曰明堂金室西南曰總章水室西北曰元堂土室中央曰太室蓋夏以不毀為名故曰世室商加重檐故曰重屋周以明布政令故曰明堂餘見禮記月令也封禪史記封禪書曰封泰山禪梁父者七十二家無懷氏為之始蓋在太昊前也管子亦云遁甲開山記則太昊之後自女媧至無懷凡十, WYG: 條印卷}
