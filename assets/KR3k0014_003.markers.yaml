  - {type: variant, offset: 77, length: 3, content: 此黃敕, WYG: 冠因裁纚為帽上下通服之𤣥中記曰旬始作㡌漢櫂船者著黄㡌晉王濛破帽入市則歴代皆有之五代梁姞漆為今様呉處厚青箱雜記曰天聖已前烏幘惟用光紗自後始用南紗迨熈寧中復稍稍用光紗矣蓆㡌實録曰本羌人首服以羊毛為之謂之氊㡌即今氊笠也秦漢競服之後故以蓆為骨而鞔之謂之蓆㡌女人戴者四縁垂下網子以自蔽今世俗或然呉處厚青箱雜記曰王衍在蜀好私行恐人識之令民戴大㡌則世俗之戴蓆㡌始于王衍也大帽又曰大帽野老之服也今重戴是本野夫嵓叟之服}
