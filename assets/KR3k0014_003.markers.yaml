  - {type: variant, offset: 131, length: 1, content: 勰, krp: 熈所作當是曲領之起亦漢儀也蓋頭唐初宫人着羃䍦雖發自戎夷而全身障蔽王公之家亦用之永徽之後用幃帽後又戴皂羅方五尺亦謂之幞頭今曰蓋頭凶服者亦以三幅布為之或曰白碧絹若羅也冠子二儀實録曰爰自黄帝制為冠冕而婦人者之首飾服無}
