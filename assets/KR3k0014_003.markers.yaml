  - {type: variant, offset: 152, length: 0, content: '', WYG: 載曰仁宗慶厯三年五月置武學于武成王廟八月罷太公廟唐書明皇本紀曰開元十九年四月丙申始立太公廟十八日也武成廟唐㑹要曰開元十九年四月十八日置太公廟以張良配享仍簡取自古名將准十哲}
