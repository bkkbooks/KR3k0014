  - {type: 'tls:seg', offset: 449, content: '', id: KR3k0014_CHANT_003-8a.10}
  - {type: variant, offset: 451, length: 284, content: 皇世也宣頭筆談曰宣頭所起按唐故事中書舍人職掌誥詔皆寫四本一為底一為宣謂出行耳未以名書也晚唐樞密使自禁中受旨出付中書即謂之宣中書承受錄之于籍謂之宣底梁置崇政院專行密命後唐復樞密使以郭崇韜安重誨為之始分頒政事不關中書直行下者謂之宣如中書之敕也是則宣頭之始出于晚唐而定于後唐也教漢制王侯及郡守長吏于所部其指令皆稱教取敬敷五教之義今猶皇后稱教旨疑始于漢王侯長吏之稱教也表堯咨四岳舜命九官並陳辭不假書翰則敷奏以言章表之義也漢乃有章表奏駮四等則表蓋漢制也蘇氏演義曰表者白也言以情旨表白于外也按衣外為表論語必表而出之以披露于意雜事曰漢定禮儀則有四品上書太甲既立不明伊尹作書以戒此上書, WYG: 法}
