  - {type: variant, offset: 145, length: 0, content: '', WYG: 也韓文公之詩曰不知官髙卑玉帶懸金魚是也笏唐會要曰笏周制也周禮諸侯象大夫魚鬚士以竹晉宋以来謂之手板西魏以後五品以上通用象牙武徳四年七月六日詔五品以上象笏六品以下竹木笏舊制三品以上前挫後直五品以上前挫後屈武徳以来一例上圓下方也淮南子曰武王問}
  - {type: page-break, offset: 145, content: '', id: KR3k0014_WYG_003-36a, image: WYG0920/WYG0920-0085a.png}
  - {type: variant, offset: 145, length: 0, content: '', krp: 也韓文公之詩曰不知官髙卑玉帶懸金魚是也笏唐會要曰笏周制也周禮諸侯象大夫魚鬚士以竹晉宋以来謂之手板西魏以後五品以上通用象牙武徳四年七月六日詔五品以上象笏六品以下竹木笏舊制三品以上前挫後直五品以上前挫後屈武徳以来一例上圓下方也淮南子曰武王問}
  - {type: variant, offset: 146, length: 1, content: 祝, WYG: 公曰寡人伐紂恐後世鬭爭不巳太公曰王欲久持則塞民于兊于是解其劔而帶之笏此蓋周人制笏之始也樂記曰武王克商􅃝冕搢笏而虎賁之士説劔也笏袋唐明皇雜録曰故事皆搢笏于帶然后乗馬張九齡體羸不勝因設笏嚢使人持之馬前遂以為常制梁職儀曰八座尚書以紫紗裹手板垂白絲于手如筆通志曰今僕射尚書手板以紫皮裹之名曰笏袋梁中世以来執笏者皆白筆綴頭以紫嚢之此又似笏之設嚢之始也笏帛酉陽雜俎曰陳希烈不便搢笏騎馬以帛嚢之令左右持之笏之設帛自此始也韈文子曰文王伐崇韈係解則其物已見于商代實録曰自三代以来有之謂之角韈前後兩相承中心繫之以帶洎魏文帝呉妃乃始裁縫為之即今様也以綾為之洛神賦羅韈生塵是也履舄世本曰于則}
