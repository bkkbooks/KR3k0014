  - {type: punctuation, offset: 136, content: 》, id: KR3k0014_CHANT_003-bkkpn28}
  - {type: variant, offset: 136, length: 0, content: '', WYG: 之頌黄帝内傳曰帝伐蚩尤乃服衮冕至舜始備十二章書稱予欲觀古人之象日月星辰山龍華蟲作會宗彛藻火粉米黼黻絺繡以五采彰施于五色作服是也周登日月于太常九章而已餘五服俱周制也裘黄帝出軍決曰帝伐蚩尤未克夢西王母遣道人披𤣥狐之裘以符授帝然則彼時已有裘之名説文曰裘皮衣蓋上古衣毛冒皮之遺象也袴褶唐書歸崇敬傳曰徳宗時百官朝朔望皆服袴褶崇敬非之建言三代逮漢無其制隋已来始有服者干寳搜神記亦或言其物蓋晉以来有其制也通典晉衣服制有之云袴褶之制未詳所起近代服之無定色朝服晉書輿服志曰漢制五郊天子與執事服各如方色百官不執事者服常服絳衣以從魏秦靜曰漢氏承秦改六冕之制但無冠絳衣而已魏以来名朝服公服筆談曰中國衣冠自北齊已来乃全用胡服窄袖緋緑唐武德貞觀時猶爾開元之後稍襃博矣通典曰宇文䕶始袍加下襴遂為後制即今公服之制也此蓋原矣襴衫唐志曰馬周以三代布深衣因于其下着襴及裾名襴衫以為上事之服今舉子所衣者襴衫之始也衫輿服志曰馬周上儀禮無服衫之文三代有深衣請襴䄂褾襈為士人上服開骻者名􅆙骻衫庶人服之即今四袴衫也蓋自馬周始云續事始曰後周以枲紵為衫貴女功始也汗衫實録}
