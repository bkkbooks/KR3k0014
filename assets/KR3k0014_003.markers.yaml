  - {type: variant, offset: 5455, length: 1689, content: 掌次云王大旅上帝則張氈案設皇邸祀五帝則張大次小次注曰次幄也大幄初往所止居也小次既接祭退俟之處宋朝自太祖以來每行郊禮皆營青城幄殿即周禮大次也又于東壝門外設更衣殿即小次也是則宋朝之設青城自周制也內寺僧史略曰謂之道場內起于後魏得名于隋煬帝改僧寺曰道場置于宮中故曰內今宋朝洪福等殿安佛經聲鍾為內寺此其初也唐代宗始有其事玉皇號宋朝會要曰大中祥符七年正月真宗詣玉清昭應宮率天下臣庶奏告上玉皇聖號真宗實錄曰大中祥符七年九月上對侍臣曰自元符之降朕欲與天下臣庶同上玉皇聖號至天禧元年正月辛丑朔帝詣太初殿恭上玉皇大天帝聖號曰太上開天執符御歷合真體道玉皇大天帝惟是疑會要所紀奏告是八年事云章衡紀年通載曰大中祥符八年正月壬子朔上玉皇大天帝號聖祖號御製靈遇記曰景德初王中正遇司命真君傳藥金法上之四年十一月降劉承規之直舍五年始奉上徽號曰九天司命天尊真宗實錄曰大中祥符五年十月十七日上夢景德四年先降神人傳玉皇命云今汝祖趙有名此月二十四日降如唐真元事至日天尊降延息殿閏十月己巳詔上九天司命保生天尊聖號曰聖祖上靈高道九天司命保生天尊大帝又六年七月甲午詔加上九天司命上卿保生天尊曰東岳司命上卿佑聖真君初封禪畢詔上司命天尊之號至是以聖祖臨降名稱相類故改上焉天禧元年正月壬寅帝詣景靈宮天興殿恭上也然實錄之記聖祖加號前後不同故備述二年中事云章衡紀年通載曰天禧元年辛丑朔上玉皇聖祖號寶冊聖母號宋朝會要曰天禧元年三月六日冊上聖祖母懿號曰元天大聖后先是大中祥符五年制加上聖祖母號俟兗州太極觀成擇日奉上至是詔王旦等行冊禮也採訪號筆談曰廬山太平觀乃九天採訪使者祠自唐開元中創建元豐二年道士陶智仙門人陳若拙發地銅錢有應元保運四字至四年有詔進號九天採訪使者為應元保運真君遣內侍廖維持御書殿額賜之乃與錢文同符黑煞號楊億談苑曰開寶中有神降于終南山進士張守真自言我天之尊神號黑煞將軍與真武天蓬等列為天之大將太宗即位築宮終南山陰太平興國六年封翊聖將軍翊聖傳曰建隆之初鳳翔府盩厔縣民張守真遊終南山聞空中有召之者曰吾高天大聖玉帝輔臣授命衛時乘龍降世太宗遣王守節王龜從就終南山下築宮興國初詔封翊聖將軍真宗受元符封泰山後大中祥符七年詔加號曰翊聖保德真君真武號宋朝會要曰天禧二年閏四月詔醴泉所立觀曰祥源六年詔加真武號曰真武靈應真君孔子封唐禮樂志曰明皇開元二十七年詔夫子稱先聖可諡曰文宣王遣三公持節冊命唐會要曰開元二十七年八月二十四日追諡孔子為文宣王其後嗣改封嗣文宣王二十七日命裴耀卿等就國子監冊命宋朝會要曰大中祥符元年詔追諡玄聖文宣王五年十二月改諡至聖避聖祖諱也孔子父宋朝會要曰大中祥符元年十一月二日敕叔梁紇宜追封齊國公顏氏追封魯國太夫人孔子妻又敕幵官氏追封鄆國夫人果按世家注作丌宮氏今闕里之宮止曰官氏十哲封唐會要曰開元二十七年八月二十四日詔十哲並宜襃贈顏子亞聖須優其秩顏子封袞公閔子費侯等是也七十子又詔七十子並宜追贈曾參贈成伯顓孫師陳伯是也制曰十哲之外曾參之倫未有稱謂宜疏五等之封俾與先聖咸膺盛禮周公封宋朝會要曰大中祥符元年十一月詔周文公旦可追封文憲王于兗州曲阜縣建廟春秋委州長吏致祭太公封唐書肅宗紀曰上元元年閏四月己卯追封太公為武成王宋朝會要曰大中祥符元年十月詔維師尚父實贊隆周宜加諡昭烈武成王仍于青州建祠廟老子號又高宗紀曰乾封元年二月己未追號老子太上玄元皇帝唐會要曰天寶二載正月十五日加號大聖祖八載六月十五日加號大道玄元皇帝十三載二月七日加號大聖祖高上大道金闕玄元天皇大帝宋朝會要曰大中祥符六年八月十一日制謹奉上真元皇帝聖號曰太上老君混元上德皇帝真宗實錄云六年七月庚午制也紀年通載云大中祥符七年正月戊申奉上太上老君尊號冊寶也李母號又武后紀曰光宅二年九月甲寅追尊老子母曰先天太后唐會要則云文明元年九月冊玄元皇帝妻為先天太后二說未知孰是列子號唐會要曰天寶元年三月十九日李林甫奏列子號沖靈真人宋朝會要曰景德二年二月九日詔沖靈真人宜進號沖虛至德真人列子廟在圃田至是真宗車駕經過故有此詔莊子號又唐會要曰天寶元年二月十二日追贈莊子南華真人三月十九日李林甫奏文子列子莊子庚桑子其書各從其號為真經文子號又曰天寶元年三月十九日李林甫奏文子號通玄真人庚桑子號洞靈真人, WYG: ''}
