  - {type: variant, offset: 10592, length: 398, content: 惟暕又云琴始自伏犧爾雅曰大琴曰離二十絃傳此是伏犧所制一絃琴通典曰一絃琴有十二柱柱如琵琶晉紀曰孫登居白鹿蘇門二山彈一絃琴按拾遺記云師延商樂工也商時總修三皇五帝之樂撫一絃之琴或作瑟則地祇皆升是商代則有矣今瞽者撫之以擬曲者是擊琴通典曰擊琴柳惲所作惲嘗為文思有所屬援筆誤中琴因以管承絃又以竹片約而束之使絃急而聲亮舉以擊之以節曲按南史柳惲傳初父世隆彈琴為士流第一惲每奏父曲嘗感思復變體備寫古曲嘗賦詩未就以筆捶琴坐客過以筯扣之惲驚其哀韻乃制其雅音後傳擊琴自於此今世俗有彈獨絃琴以竹作扣擊之節疑此也馬明生別傳曰明生隨神女入石室金床玉几彈琴有一絃五音並奏瑟世本曰伏犧造瑟王子年拾遺記曰庖犧氏絃桑為瑟世本又曰庖犧氏作瑟五十絃後黃帝使素女鼓瑟哀不自勝破為二十五絃具二均聲帝王世紀曰伏犧作瑟三十六絃隋音樂志曰瑟二十七絃伏犧所作者也高氏小史曰太昊作二十五絃之瑟西都賦曰神農造瑟呂氏春秋曰朱襄氏之王天下為風陽氣畜積果實不成, WYG: 傪刪去俊秀}
