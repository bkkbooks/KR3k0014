  - {type: variant, offset: 1265, length: 360, content: 稱殿下漢之前未聞唐初百官于皇太后亦稱之百官洎東宮官對皇太子亦呼之今雖親王亦避也始于漢續事始曰漢以前未有此呼魏志太祖定漢中杜襲始呼之時操封魏王故襲呼殿下按此自杜襲始也酉陽雜俎曰秦漢以來于天子言陛下皇太子言殿下將言麾下使者言節下轂下二千石長吏言閤下父母言膝下通類相呼言足下閤下沈約宋書三公黃閤其事前史無文按禮士韠與天子同公侯大夫即異注謂三公與天子禮數相亞故黃其閤示謙不敢斥尊此是漢制疑閤下之呼出自此矣故今呼三公曰閤下足下畢苑曰晉介之推逃祿抱樹燒死文公拊木哀嗟伐而製屐每懷其功俯視其屐曰悲乎足下足下之稱當緣此爾史記戰國之士或上書時君或談說君前及相與論難多相斥曰足下蓋自七國相承至今也下官通典曰宋孝武帝多猜忌諸國吏人于本國君不得稱下官事在孝武建中也本為王國避臣之稱而今人或以自謂也啟張璠漢記曰董卓呼三臺尚書已下自詣啟事然後得行此, WYG: ''}
