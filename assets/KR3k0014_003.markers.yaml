  - {type: variant, offset: 141, length: 0, content: '', krp: 婦服諸翟唐則裙襦大袖為禮衣開元中婦見舅姑戴步揺挿翠釵今大衣之制蓋起于此實録大袖在背子下身與衫子齊而袖大以為禮服疑即此也長裙實録曰隋煬帝作長裙十二破名仙裙今大衣中有之隋制也帔又實録曰三代}
  - {type: variant, offset: 142, length: 0, content: '', WYG: 帔説秦有披帛以縑帛為之漢即以羅晉永嘉中制絳暈帔子開元中令王妃以下通服之是披帛始于秦帔始于晉矣今代帔有二等霞帔非恩賜不得服為婦人之命服而直帔通用于民間也唐制士庶女子在室搭披帛出適披帔子以别出處之義今仕族亦有循用者背子又曰秦二世詔衫子上朝服加背子其制袖短于衫身與衫齊而大袖今又長與裙齊而袖纔寛于衫蓋自秦始也裙又曰古所貴衣裳連下有裙隨衣色而有縁堯舜已降有六破及直縫皆去縁商周以其太質加花繡上綴五色蓋自垂衣裳則有之後世加文飾耳衫子又曰女子之衣與裳連如披襖短長與裙相似秦始皇方令短作衫子長袖猶至于膝宜衫裙之分自秦始也又云陳宫中尚窄衫子纔用八尺當是今制也偏衫僧尼之上服也僧史略曰後魏宫中見僧自恣偏袒右肩乃施一邊衣號偏衫全其兩肩衿袖失祇支之體此疑其始也腰帶實録曰自古皆有革帶及挿垂頭至秦二世始名腰帶唐髙祖令向下挿垂頭取順下之義名䤩尾上元元年自三品官至庶人各有等制以金玉犀銀鍮鉐銅鐵為飾自十三銙至六銙筆談曰自北齊全用胡服鞢􅶋帶所垂蓋欲以佩帶弓劔帉帨筭囊刀礪之類後去鞢􅶋猶存其環環所銜以鞢􅶋如馬鞦根即今帶銙也天子必以十三環為節唐開元之後帶鈎尚穿帶本為孔本朝加順折也金帶穆天子傳曰天子北征舍于珠澤珠澤之人獻白玉石天子賜黄金六鐶三五朱帶此即金帶之起也至唐定令為四品服宋朝太祖又以玉不離石犀不離角可貴者金也作金毬紋方團帶賜政府御仙花帶賜侍臣今世謂笏頭荔枝者此始也環瑞應圖曰黄帝時西王母獻白環舜時又獻之則環當出于此指環春秋繁露曰紂刑鬼侯取其指環五經要又曰古者后妃羣妾御于君所當御者以銀環進之娠則以金環退之進者著右手退者著左手今有指環此之遺事也本三代之制者也釧通俗文曰環臂謂之釧後漢孫程十九人立順帝有功各賜金釧指環則釧之起漢巳有之也訶子本自唐明皇楊貴妃作之以為飾物貴妃私安禄山以後頗無禮因狂悖指爪傷貴妃胷乳間遂作訶子之飾以蔽之事見唐宋遺史珮董巴輿服志曰古者君臣皆佩玉三代同之蓋起于夏后氏至周始制其等禮玉藻所記天子佩白玉公侯山𤣥大夫水蒼世子瑜玉士瓀玫是也璽春秋運斗樞曰舜為天子黄龍負圖封兩瑞有璽文曰天皇符璽後漢祭祀志曰三王彫文詐偽漸興始有璽符以檢姦萌是印璽之起肇于三代也應劭曰璽信也古者尊卑共之月令云固封璽左傳襄公在季武子使公冶問璽書而與之是也衞宏曰秦已前民亦以金玉為印龍虎鈕秦始天子稱璽又以玉羣臣莫敢用也唐武后改曰寳章衡編年通載曰開元六年十一月乙巳改傳國璽曰寳也印七雄之時臣下璽始稱曰印史記蘇秦佩六國相印是也又人臣賜印之始云漢自三公而下有金銀銅三等今惟節度觀察防禦等使賜之事始曰州縣之有印始于秦按商鞅書定分篇曰法令之長印以封劵云以法令之長有印以封劵則有司之賜印自秦孝公之變法始爾筆談曰舊制中書樞宻三司使印塗金近制三省樞宻院用銀蓋自神宗元豐中行官制初也條印通典曰北齊有督攝萬機之印一紐以木為之長尺二寸廣二寸五分背上為鼻鈕長九寸厚一寸廣七分腹下隱起篆文曰督攝萬機凡四字唯以印縫今齪合縫條印蓋原於此綬禮玉藻曰天子佩白玉而𤣥組綬公侯山𤣥玉而朱組綬則綬蓋貫佩玉而相承受者也董巴輿服志曰戰國解去紱佩留其絲璲以采組相連結于璲轉相綬今所帶綬蓋起于七國而名之自三代也韍五經要義曰韍舜所製禮明堂位曰有虞氏服韍夏后山商火周龍章鄭康成注曰韍舜所作之以尊祭服三代增以畫文蓋冕服之􅔖也周諸臣所服又有緼赤之别蘇氏演義曰昔先王食鳥獸之肉衣其羽皮韍字遂從韋韋皮也春秋正義云戰國以韍非兵飾去之漢明復}
