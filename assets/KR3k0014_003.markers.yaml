  - {type: variant, offset: 146, length: 1, content: 祝, krp: 公曰寡人伐紂恐後世鬭爭不巳太公曰王欲久持則塞民于兊于是解其劔而帶之笏此蓋周人制笏之始也樂記曰武王克商袒冕搢笏而虎賁之士説劔也笏袋唐明皇雜録曰故事皆搢笏于帶然后乗馬張九齡體羸不勝因設笏嚢使人持之馬前遂以為常制梁職儀曰八座尚書以紫紗裹手板垂白絲于手如筆通志曰今僕射尚書手板以紫皮裹之名曰笏袋梁中世以来執笏者皆白筆綴頭以紫嚢之此又似笏之設嚢之始也笏帛酉陽雜俎曰陳希烈不便搢笏騎馬以帛嚢之令左右持之笏之設帛自此始也韈文子曰文王伐崇韈係解則其物已見于商代實録曰自三代以来有之謂之角韈前後兩相承中心繫之以帶洎魏文帝呉妃乃始裁縫為之即今様也以綾為之洛神賦羅韈生塵是也履舄世本曰于則}
  - {type: variant, offset: 148, length: 0, content: '', WYG: 屝履宋衷曰黄帝臣草曰屝麻皮曰履實録曰三代皆以皮為之單底曰履復底曰舄古今註曰舄以木置履下乾腊不畏泥濕履乃屨之不帶者蓋祭服謂之舄朝服謂之履燕服謂之屨也周禮屨人有赤黒二舄素葛命功等四屨亦通名耳續事始曰宋元嘉元年始有鳯頭履故今人亦有鳳頭鞋也靴釋名曰非古服趙武靈王所作實録曰北屨也趙武靈王始改服常短靿以黄皮為之後漸以長靿軍戎通服之唐馬周以麻為之殺其靿加以靴氊開元中裴叔通以羊皮為之隱麖加以帶子裝束筆談曰北齊全用此服長靿靴也續事始曰故事邊裔之服不許着入殿省至馬周加飾乃許也屨草履也詩糾糾葛屨是也唐韻曰屝草屨黄帝臣于則所造世本亦曰于則作屝屨宋𠂻云草屨為屝實録謂始皇二年始以蒲為履馮鑑續事引古今注云屨亦履也以謂有帶者此説非也鞋古者草謂之屨皮謂之履實録曰􅀈夏商皆以草為之周以麻晉永嘉中以絲或云馬周始以麻為之名鞋也古今注曰魏文帝絶寵段巧笑始製絲履則非晉永嘉中始以絲為鞋矣按禮少儀云國雖靡敝君子不履絲屨則周人巳用絲為屨也屐異苑曰介之推抱木燒死晉文公伐以製屐蕭子顯齊書曰襄陽有發楚王塜獲王屐論語隱義曰孔子至蔡有取孔子屐者按晉文公之時已有製屐之事而孔子亦有其物則是屐之為物春秋之間已見于世矣至司馬晉遂為常服也古今注曰屐即舄之制而木匠曰齒也雨衣事始曰凡雨具周巳有左傳云陳成子衣製仗戈杜預注曰製雨衣也是矣炙轂子曰惟絹油製之及油帽陳始有之也馮鑑又引左傳楚子次于乾谿雨雪王皮冠秦復陶以證雨衣按虞閼父為周陶正注曰陶復陶白氏取為尚衣之職杜預又以復陶為油衣蓋若晉武所焚雉頭裘唐太平公主所服百鳥毛裙今世駞褐之類也不得為雨衣云學校舉貢部十}
