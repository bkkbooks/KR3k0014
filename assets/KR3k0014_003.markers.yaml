  - {type: variant, offset: 11770, length: 834, content: 始云或云碎葉國所獻嵇琴杜摯賦序曰秦末人苦長城之役絃鼗而鼓之記以為琵琶之始按鼗如鼓而小有柄長尺餘然則擊絃於鼓首而屬之於柄末與琵琶極不仿佛其狀則今嵇琴也是嵇琴為絃鼗遺象明矣唐禮樂志曰琵琶禮圓修頸而小號秦漢子蓋絃鼗之遺製出於胡中傳為秦漢所作今人又號嵇琴為秦漢子通典亦云秦漢子本出胡中俗傳是漢制兼以秦制者蓋兼用秦漢之法而諸家皆記為琵琶之始何也或曰嵇琴嵇康所制故名嵇琴雖出於傳誦而理或然也簫通禮義纂曰伏犧作簫十六管事始云女媧造風俗通曰舜作竹簫其形參差以象鳳翼十管長尺二寸世本亦曰舜造長二尺隋音樂志曰簫十六管長二尺舜所造者也各不同而古今以為舜作篪世本曰蘇成公所造古史考謂成公善篪耳又曰暴辛公所造舊制一曰管不知辛公何代人然非舜前明矣舜時西王母獻管則辛公安得造也隋書音樂志曰篪長尺四寸八孔蘇公所作者也通歷曰帝嚳平共工之亂作鼗鼓控揭壎篪故樂記以為聖人作為德音之音也觱篥說文曰乃羌人所吹屠觱以驚馬樂錄曰笳管也何承天纂文曰羌胡樂記出於胡中其聲悲本名悲栗通典亦云或曰胡人吹之以驚中國馬後乃以笳為首以竹為管樂府雜錄曰本龜茲國樂唐編鹵簿名為笳管用之雅樂以為雅管六竅則為鳳管令狐揆樂要曰篳篥出於胡中或云龜茲國也徐景山云本胡人牧馬截骨為筒用蘆貫首吹之以驚群馬因而為竅以成音律今胡部在管音前故世亦云頭管笛馬融長笛賦序曰此器起於近代本出羌中風俗通曰漢武時丘仲所造長尺四寸七孔京房曰丘仲工其事不言所造廣雅曰籥謂之笛有七孔而周官笙師教龡篴音笛藝文類聚有宋玉笛賦則笛前於丘仲遠矣隋書音樂志曰笛漢武帝時丘仲所作者也京房備五音有七孔以應七聲太平御覽曰黃帝使伶倫伐竹於昆溪斬而作笛吹之作鳳鳴筆談曰有雅笛有羌笛其形制所始舊說皆不同後漢馬融所賦長笛空洞無底剡其上孔五孔一出其背正似今尺八李善為之注云七孔長一尺四寸此乃今橫笛耳鼓吹部謂之橫吹非融所賦者融賦云易京君明識音律故本四孔加以一君明所加孔後出所謂商聲五音畢沈約宋書亦云京房備其五音周禮笙師注杜子春雲篴乃今時所吹五空竹篴以融約所謂論之則古篴不應有五孔子春之說亦未為然也, WYG: 物紀原卷}
