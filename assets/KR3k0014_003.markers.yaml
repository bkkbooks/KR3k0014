  - {type: variant, offset: 151, length: 0, content: '', WYG: 大牢祀孔子于辟雍以顔囘配此蓋其始也唐會要曰貞觀二年以顔子配享孔子宋朝神宗熈寧中大興學校又兼以孟子配也先賢配唐會要曰貞觀二十一年二月十五日詔以左丘明等二十一人並令配享尼父廟堂此蓋其始也蘇氏曰貞觀顯慶稱二十一賢太極開元即稱二十二賢將前勅并學令比類于服䖍下有賈逵不知何年月附入武學宋朝神宗熈寧中興學以上舍養士始就武成王廟側建武學如太學儀章衡編年}
