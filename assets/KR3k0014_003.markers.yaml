  - {type: variant, offset: 10, length: 0, content: '', WYG: 之制非魯昭公所能作也宋均謂作素弁是則始以素為弁矣孔子麻冕禮也今也純儉吾從衆孔子之時冕已用純則冕弁之以絲自魯昭公始也簮桓寛鹽鐵論曰禹治水墮簮不顧簮始見此自女媧之女為笄以貫髪亦簮之始矣其與冠纓同興乎纓董巴輿服志曰上古衣毛}
