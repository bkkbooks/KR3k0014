  - {type: variant, offset: 2434, length: 352, content: 王稱諱如見親花押古者書名改真從草取其便于書記難於模倣唐書曰韋郇音荀公陟每書陟字自號五雲體俗浸相緣率以為常復有不取其名出于機巧心法者此押字之初疑自韋陟始也果按陟字殷卿明皇開元中注禮部侍郎常以五采箋為書記使侍妾主之陟惟署其名自謂書陟字若五朵雲特號郇公五雲體禮禮記曰禮始諸飲食蓋自太昊取犧牲以供庖廚制嫁娶以儷皮為禮始也王子年拾遺記曰庖羲崇禮教以遵文通典曰伏羲已來五禮始彰堯舜之時咸備揚子法言曰法始乎伏犧而成乎堯匪伏匪堯禮義哨哨也祭祀王子年拾遺記曰庖犧使鬼物以致群祠以犧牲登薦百神則祭祀之始也黃帝內傳曰黃帝始祠天祭地所以明大道史記曰高陽潔誠以祭祀高辛明鬼神而敬事之也齋戒春秋命誠圖曰黃帝請問太一長生之道太一曰齋六丁可以成功內傳曰帝誓翦蚩尤乃齋三日以告上帝此齋戒之始也壇墠左氏注曰除地為墠築土為壇書金縢武王有疾周公, WYG: 貼經}
