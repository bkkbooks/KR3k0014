  - {type: variant, offset: 7541, length: 16, content: 公南海廣利公西海廣潤公北海廣澤公, WYG: 二年始賜宴於瓊林苑自此為定制按李肇國史補云曲江大㑹此為下第舉人其筵席簡率比之幕天席地爾來漸加侈靡皆為上列所據向之下第舉人不復預矣摭言曰曲江遊賞雖云自神龍已来然盛於開元之末今瓊林賜宴亦唐曲江杏園之事爾題名宋朝之制進士中第必賜名於桂籍堂其事以唐人題名慈恩寺為始劉禹錫嘉話録曰慈恩題名起自張莒本於寺中開宴偶題其同年人因為故事摭言云神龍已来杏園宴後皆於慈恩寺塔下題名又曰進士題名自神龍之後遇開宴率皆期集慈恩塔下題名賜儒行}
