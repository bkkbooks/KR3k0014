  - {type: variant, offset: 8223, length: 309, content: 鈞容軍樂也太平興國三年詔籍軍中之善樂者命曰引龍直每巡省遊幸則騎導車駕而奏樂端拱二年又選捧日等軍曉暢音律者增多其數蕃臣以樂工進亦隸之淳化三年改名鈞容直取鈞天之義雲韶又曰雲韶部者黃門樂也開寶中平嶺表擇廣州內臣之聰警者得八十人令于教坊習樂賜名簫韶部雍熙初改名雲韶舊唐志曰武德已來置內教坊于禁中則天改曰雲韶府會要曰如意元年五月二十八日也則雲韶之名已見于是矣律法通典曰伏犧氏作易紀陽氣之初以為律法此蓋其肇也律呂呂氏春秋曰黃帝命伶倫自大夏之西阮隃之陰取竹于嶰谷以生空竅厚均者斷兩節閒長三寸九分而吹之以為十二筒聽鳳鳴以為十二律雄鳴六為律雌鳴六為呂月令章句曰上古聖人本陰陽別風聲乃截竹為管謂之律晉律歷志曰黃帝命伶倫造律呂也二變通典曰商, WYG: 永徽}
