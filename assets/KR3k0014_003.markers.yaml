  - {type: variant, offset: 133, length: 2, content: 心雕, WYG: 至周始有不過副笄而已漢宫掖承恩者始賜碧或緋芙蓉冠子則其物自漢始矣古今註曰魏文帝有絶寵四人莫瓊樹制蟬鬢縹緲如蟬翼段巧笑始錦衣絲履作紫粉拂面陳尚衣能歌舞薛夜来善為衣裳一時冠絶一云冠起當世特髻燧人始為髻至周王后首服為副編鄭云三輔謂之假髻今特髻其遺事也二儀實録曰燧人氏婦人束髪為髻髻繼也言女子必有繼于人也但以髪相纒而無物繫縳髲髢周禮王后夫人之服有以髲髢為首飾者故詩鬒髪如雲不屑髢也蓋周制云馮鑑後事云晉永嘉中以髪為步揺之狀名曰鬢為禮容即今經髪特髻乃其遺象釵實録曰燧人始為髻女媧之女以荆梭及竹為笄以貫髪至堯以銅為之且横貫焉舜雜以象牙玳瑁此釵之始也玉釵郭憲洞冥記曰漢武帝元鼎元年有神女留玉釵與帝故宫人作玉釵梳實録曰赫胥氏造梳以木為之二十四齒取疏通之義笓説文曰櫛梳枇緫名也釋名曰梳言其齒疏也枇言其細相比也禮男女不同巾櫛是枇因梳而制也今作笓粧周文王時女人始傅鉛粉秦始皇宫中悉紅粧翠眉此粧之始也宋武宫女效夀陽落梅之異作梅花粧隋文宫中紅粧謂之桃花面首飾實録曰自燧人之始婦人束髻舜加首飾文王又加翠翹步揺也畫眉秦始皇宫中悉紅粧翠眉此婦人畫眉之初也實録曰漢武帝令宫人掃八字眉西京雜記曰司馬相如妻卓文君眉如逺山時人效之畫逺山眉魏武令宫人掃青黛眉粧靨近世婦人粧喜作粉靨如月形如錢様又或以朱若燕脂㸃者唐人亦尚之段成式酉陽雜俎曰如射月者謂之黄星靨靨鈿之名蓋自呉孫和誤傷鄧夫人頰醫以白獺髓合膏琥珀太多㾗不滅有赤㸃更益其妍諸嬖欲要寵者皆以丹青㸃頰此其始也又云大厯已前士大夫妻多妬者婢妾少不如意則印面故有月㸃錢茍如此則固非嘉事也宋武宫中斆夀陽落梅粧此其遺意也花鈿酉陽雜俎曰今婦人面飾用花子起自唐上官昭容所制以掩㸃迹也按隋文宫女貼五色花子則前此已有其制矣似不起于上官氏也雜五行書曰宋武帝女夀陽公主人日卧于含章殿簷下梅花落額上成五出花拂之不去經三日洗之乃落宫女竒其異競效之花子之作疑起于此鉛粉墨子曰禹作粉張華博物志即紂燒鉛作粉謂之胡粉續事始曰鉛粉即紂所造也輕粉實録曰蕭史與秦穆公鍊飛雲丹第二轉與弄玉塗之名曰粉即輕粉也此蓋其始也燕脂古今註曰燕脂草出西方葉似荆花似茜土人以染粉為婦人面色故名燕脂後人效之以紅花染絳為之非彼草染者也秦宫中悉紅粧當是其物自秦始也一曰燕支續事始云面脂廣志曰面脂自魏興已来始有之刷陸雲與兄機書曰按行曹公舊物有刷泥處尚識又别有剔齒籖疑自秦漢已来也衣裘帶服部十五衣裳通典曰上古衣毛後代以麻易之先知為上以制衣後知為下以制裳易曰黄帝垂衣裳而天下治世本曰胡曹作衣宋衷曰黄帝臣吕氏春秋亦云淮南子曰伯余初作衣許慎注云黄帝臣也一云伯余黄帝也世本又云伯余制衣裳孟詵錦帶前書曰十紀合椎紀四始教人食鳥獸衣其皮毛家語五帝徳孔子曰黄帝始垂衣裳衮衣事始曰黄帝作畫象日月星辰于衣上以似天故有衮}
