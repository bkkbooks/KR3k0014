  - {type: variant, offset: 140, length: 0, content: '', krp: 中單郊饗之服又有明衣漢祖與項羽戰爭之際汗透中單遂有汗衫之名也半臂實録又曰隋大業中内官多服半臂除即長䄂也唐髙祖減其袖謂之半臂今背子也江淮之間或曰綽子士人競服隋始制之也襖子舊唐書輿服志曰讌服古䙝服也亦謂之常服江南以巾褐裙襦北朝雜以戎夷之制至北齊有長帽短靴合袴襖子朱紫𤣥黄各任所好若非元正大㑹一切通用盖取便于事則今代襖子之始自北齊起也涼衫筆談曰近嵗京師士人朝服乗馬以黲衣蒙之謂之涼衫亦古遺法也儀禮曰朝服加景但不知古人制度何如耳大衣商周之代内外}
  - {type: variant, offset: 141, length: 0, content: '', WYG: 婦服諸翟唐則裙襦大袖為禮衣開元中婦見舅姑戴步揺挿翠釵今大衣之制蓋起于此實録大袖在背子下身與衫子齊而袖大以為禮服疑即此也長裙實録曰隋煬帝作長裙十二破名仙裙今大衣中有之隋制也帔又實録曰三代}
