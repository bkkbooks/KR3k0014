  - {type: variant, offset: 144, length: 0, content: '', WYG: 赤皮魏晉以還易以絳紗字遂有從糸者也蓋太古蔽膝之法象冕服謂之韍朝服謂之韠也袴史記屠岸賈滅趙氏趙朔之妻有遺腹生男賈索之夫人置其袴中其稱始見諸此實録曰上古食肉衣皮遂以為袴名袴褶今武士大口袴褶是魏文上馬袴也禈實録曰西戎以皮為之夏后氏以来用絹長至于膝漢晉名犢鼻北齊則與袴長短相似而省犢鼻之名魚袋實録曰三代以韋為之謂之筭袋魏易之為龜唐髙祖給隨身魚三品以上其飾金五品以上其飾銀故名魚袋天后改為龜後復曰魚神龍初賜紫則給金魚賜緋則給銀魚不限品也唐會要曰永徽二年四月二十九日給隨身魚袋咸亨三年五月三日始令京官四品五品職事佩銀魚久視元年十月十三日職事三品以上用金飾四品銀五品銅景雲二年四月二十四日赦文魚袋着紫者金裝緋者銀裝宋朝神宗元豐末親王又賜玉魚以副金帶金魚以副玉帶以唐}
