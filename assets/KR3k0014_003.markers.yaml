  - {type: variant, offset: 3316, length: 639, content: 乃在大昊後炎帝前也神州王者所居之地名也通典於周制方丘篇始錄之則是神州之祭自周始也按王嬰古今通論崑崙方五千里謂之神州中有和美鄉帝王之宅聖人之所生也今呼京都為神州意蓋本於此也社禮記曰社祭土而主陰氣左氏曰共工氏有子曰句龍為后土實始為社漢書黃祖十年春有司奏令縣道常以春二月祠社稷以羊豕蓋自三代以來社稷為諸侯命祀秦罷侯置守故諸侯之職歸守令漢始以郡縣祠社稷也稷禮稷為五穀之長昔烈山氏之子曰柱能植百穀故祀為稷高辛至夏皆祀之湯為旱遷柱以周稷代之欲遷句龍無可代者故自湯以來皆祀之其州縣祭社稷儀蓋自宋祥符中始定其式也蠟臘蠟者歲十二月合聚百物而索饗之也禮記郊特牲曰伊耆氏始為蠟又曰蠟之祭主先嗇而祭司嗇先為田報祭也詩疏云伊耆神農並與大庭為一也山川通典曰黃帝祭于山川典禮為多則山川祀秩始自黃帝氏也舜典望秩于山川也按山川乃名山大川五岳四瀆之屬望而祭之故曰望籍田周制天子孟春躬耕籍田國語虢文公言之詳矣其事亦見于周官甸師之職及禮記則其禮周制也禮記武王耕籍田然諸侯知所以敬先農漢文制春始耕于籍田官祠先農以一太牢則其祀由漢興也先蠶周禮內宰詔王后蠶于北郊齋戒享先蠶禮亦雜記其事然禮之紀多商周之制及其餘群小祀俱周典云五祀世本曰商湯作五祀戶井竈中霤行至周而七曰門行厲戶竈司命中霤也高禖五經要義曰高禖先王子孫之祀也注云高辛妃𥳑狄吞燕卵而生契後王以為禖官典曰鄭注俱云後王不知起于何代也靈星漢有天下高祖制詔御史令天下立靈星祠蓋祈穀也時漢興八年矣通典曰周制仲秋祭靈星于國之東南則非漢始祀之也壽星通典曰周立壽星祠在下杜亳時奉焉宋朝, WYG: ''}
