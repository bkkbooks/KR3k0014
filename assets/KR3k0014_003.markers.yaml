  - {type: variant, offset: 129, length: 0, content: '', WYG: 筆談曰今庶人所戴頭巾唐亦謂之四脚二繫腦後二繫頷下取服勞不脱反繫于頂上今人不復繫頷下兩帶遂為虚設後又有兩帶四帶之異蓋自本朝始幅巾古庶人服巾士則冠矣傳子曰漢末王公多重士服以幅巾為雅素則幅巾古賤者服也漢末始為士人之服袁紹戰敗幅巾渡河是也頭􅔮三儀實録曰燧人時為髻但以髪相纒而無物繫縳至女媧之女以羊毛為繩向後繫之後世易之以絲及綵絹名頭􅔮繩之遺狀也曲領隋禮儀志云曲領按釋名在單衣内襟領上横以雍項檢自歴代衣服之}
