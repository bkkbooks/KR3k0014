  - {type: variant, offset: 10393, length: 1, content: 昇, WYG: 周㳺時元妃嫘祖死于道令次妃嫫母監䕶因置方相亦曰防喪此盖其始也俗號險道神抑由此故爾周禮有方相氏狂夫四夫大喪先匶及墓入壙以戈擊四隅敺方良故葬家以方相先馳魌頭宋朝喪葬令有方相魌頭之别皆是其品所當用而世以四目為方相兩目為魌頭按漢世逐疫用魌頭亦周禮方相之比也方相氏蒙熊皮黄金四目以索室敺疫鄭注云如今魌頭是也疑自漢始云然荀子有仲尼之面如蒙倛則戰國已為是名碑碣管子曰無懐氏封泰山刻石紀功秦漢以來始謂刻石曰碑盖因喪禮豐碑之制也刻石當以無懐為始而名為自秦漢也陸龜蒙野廟碑曰碑悲也古者懸而窆用木書之以表其功德因留之不忍去碑之名由是而得自秦漢以降生有功徳政事者亦碑之而又易之以石失其稱矣此又徳政有碑之起也陸法言廣韻曰碑碣李斯造疑始于嶧山之刻爾釋名曰本葬時所設臣子追述君父之功以載其上也神道碑古之葬有豐碑以窆秦漢以來死有功業生有徳政者皆碑之稍改用石因總謂之碑晉宋之世始又有神道碑}
