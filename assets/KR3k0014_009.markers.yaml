  - {type: variant, offset: 11305, length: 481, content: 皆知去喦穴有室家則此蓋牆之起也至夏后世帝太康始峻宇雕牆矣階釋名云階梯也言有等差書稱舜舞干羽於兩階墨子稱堯土階三尺茅茨不翦韓詩外傳則云鳳蔽日而至黃帝降於東階則階陸之制自黃帝為棟宇則設之也折檻前漢書朱雲傳成帝時張禹為帝師雲上書願賜上方斬馬劍斷佞臣一人頭以勵其餘上問誰曰張禹也帝怒使御史將下殿雲攀檻折後理檻上曰勿易緝之以旌直臣今殿檻之闕其中自朱雲始也鴟尾唐會要曰漢柏梁殿災越巫言海中有魚虯尾似鴟激浪則降雨遂作其像於屋以厭水災王叡炙轂子曰柏梁災巫獻術取鴟魚尾置於殿屋以厭勝之今以瓦為之蘇鶚演義曰漢武作柏梁殿上疏者曰蚩尾水之精能辟火災可置之堂殿今人多作鴟字顏之推亦作鴟劉孝孫事始作蚩尾又俗閒呼為鴟吻如鴟鳶遂以此呼之後因有作此鴟者王子年拾遺記曰鯀治水無功目沈羽淵化為玄魚海人於羽山下修玄魚祠四時致祭嘗見瀺灂出水長百丈噴水激浪必雨降漢書越巫請以鴟魚尾厭水災今鴟尾即此魚尾也按王嘉晉人晉去漢未遠當時已作鴟字蘇鶚之說亦未為允也吳處厚青箱雜記曰海有魚虯尾似鴟用以噴浪則降雨漢柏梁臺災越巫上厭勝之法起建章宮設鴟魚之像於屋脊以厭火災即今世鴟吻是也墀禮曰天子赤墀禮之所記皆三代事則墀蓋三代, WYG: ''}
