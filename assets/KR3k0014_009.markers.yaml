  - {type: variant, offset: 559, length: 255, content: 車亦宜黃帝造也小車蜀相諸葛亮之出征始造木牛流馬以運餉蓋巴蜀道阻便於登陟故耳木牛即今小車之有前轅者流馬即今獨推者是而民閒謂之江州車子按後漢郡國志巴郡有江州縣是時劉備全有巴蜀之地疑亮之創始作之於江州縣當時云然故後人以為名也檐子舊唐書輿服志曰開成末定制宰相三公諸司官及致仕官疾病官許乘檐子如漢魏載輿之制按唐乾元以來始用兜籠代車輿疑自此又為檐子之制也亦漢魏載輿步輿之遺事云然則今大臣朝廷所崇敬而老疾則賜以肩輿蓋自開成之制也兜子又曰兜籠巴蜀婦人所用乾元以來蕃將多著勳於朝兜籠易於檐負京師先用車轝後亦以兜籠代之即今之兜子蓋, WYG: ''}
