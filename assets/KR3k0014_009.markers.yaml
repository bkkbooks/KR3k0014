  - {type: variant, offset: 10398, length: 1, content: 慕, WYG: 册故唐安主為韓國正穆故義章公主為荘穆唐書公主傳亦云爾按唐平陽公主髙祖之女起兵叅佐命已諡為昭又南史沈攸之傳言齊髙帝女義興憲公主妻攸之子文和憲亦諡爾不審侃何以言自唐安公主始也起復禮曾子問云子夏問曰三年之喪金革之事無避也者非與孔子曰吾聞老耼曰昔者魯公伯禽有為為之也注云魯徐戎作難喪卒哭而征之急王事也故春秋亦紀晉襄公墨縗之事漢唐以來遂有起復之禮盖自伯禽始也忌日又祭義曰君子有終身之憂忌日之謂也忌日不用非不詳也言夫日志有所至而不敢盡其私也注曰忌日親亡之日不用舉他事如有時日之禁志有所至于親以此日亡其哀心如喪時又曰文王忌日必哀稱諱如見親然則忌日疑始于周也周禮小史若有事詔王之忌諱注云忌先王之死日博弈嬉戯部四十八圍碁博物志曰堯造圍碁以教丹朱或曰舜造也手談今人目圍碁為手談者語云王中郎以碁為手談也世說曰王中郎以圍碁是坐隱支公以圍碁為手談王積新碁勢譜圗曰王郎號為坐隱祖約稱為手談由是言之雖說有小同異然疑晉以來語也蹴踘劉向别録曰蹴踘者傳言黄帝造或曰起戰國時蹋鞠兵勢也所以練武事知有材皆因嬉戯而講陳之博物志曰黄帝所作也投壺禮記投壺曰投壺之禮主人奉矢司射奉中使人執壺壺頭修七寸腹修五寸口徑二寸半容一斗五升壺中實小豆焉為其矢之躍而出也壺去席二矢半矢以柘若棘毋去其皮而鼓節有魯葬之異其禮盖自周人始也春秋左氏傳有晉侯以齊侯宴中行穆子相投壺之禮是矣西京雜記云漢武時郭舎人善投壺以竹為矢不用棘也古之投壺}
