  - {type: variant, offset: 4425, length: 342, content: 權衡度量蓋因其所勝輕重之數而生權以為銖兩斤鈞石則秤之始也因其所積長短之數而生度以為分寸尺丈引則尺之始也因其所受多寡之數而生量以為合龠升斗斛則斗之始也紙後漢書蔡倫傳曰自古書契多編以竹簡其用縑帛者謂之紙縑貴而簡重並不便於人倫乃造意用樹膚麻頭及弊布魚網以為紙元興元年上之和帝善其能自是天下莫不從用咸稱蔡侯紙盛洪之荊州記曰漢順帝時蔡倫始以魚網造紙東觀記曰倫典上方作納用故麻造者謂之麻紙用木皮名穀紙用故魚網名網紙王隱晉書曰魏太和六年張楫云古之素帛依書長短隨事截繙枚數重沓名番紙故從系後漢蔡倫以故布搗剉作之故字從巾按蔡倫典上方作納用之說上方乃朝庭造作之所納用獻納府使之物也牋紙桓玄偽事曰玄令平淮作青赤縹桃花紙又石季龍寫詔用五色紙蓋牋紙之制也此疑其起耳筆說文曰楚謂之聿吳謂之不律燕謂之弗秦謂之筆張華, WYG: 酒}
