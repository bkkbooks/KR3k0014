  - {type: variant, offset: 966, length: 199, content: 今交椅是也帳幄周官幕人掌帷幕幄帟綬之事注云四合象宮室曰幄王所居帳也則帳幄當周制也左傳有子我有幄又衛侯為虎幄皆周事云又所寢之幄謂之帳者黃帝內傳曰王母為帝設九真十絕妙帳此疑帳之起也漢武帝作甲乙武帳蓋因此耳帳幕幕人注云在旁曰帷在上曰幕皆以布為之說文亦云然則帷幕亦周制也歸藏曰女媧張雲幕而致占神明雖女媧之世有幕之名而其物之興豈自周始也幔六韜曰天將雨不張幔蓋拾遺錄曰周穆王有鸞章錦幔蓋周有其物也屏風周禮掌次設, WYG: ''}
