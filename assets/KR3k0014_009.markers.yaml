  - {type: variant, offset: 10595, length: 2, content: 失德, WYG: 公名質詠歌舞蹈號曰合生始自王公稍及閭巷即是合生之原起自唐中宗時也今人亦謂之唱題目吟呌嘉祐末仁宗上仙自帝即位至是殆五十年天下稔于豐樂不意邦國㓙變之事而英宗諒隂不言能昭其功然四海方遏密}
