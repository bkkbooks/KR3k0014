  - {type: variant, offset: 8803, length: 0, content: '', WYG: 安今自陜而西以黄米為粉團棗烝之曰黄兒其喬麥麵者曰黒兒蓋出于此也鹽豉廣雅曰苦李作豉廣志曰苦秦豉則豉自一物尔謝承後漢書羊續為南陽太守鹽豉共器三輔決録曰南陽舊語曰前隊太守范仲公鹽豉蒜菓共一筒史記貨殖傳曰孽麴鹽豉千合蓋四物也今京俗謂豉曰鹽豉或因此云然晉世已為此名世說武子云千里蓴羮未下鹽豉藏氷周公遭變陳后稷先公致王業之艱難其詩曰二之日鑿氷沖沖三之日納于凌隂周禮凌人掌氷正嵗十二月令斬氷三其凌注云凌氷室也三之者為消釋度也春秋左氏傳昭公四年申豐曰日在北陸而藏氷西陸朝覿而出之其藏之也黒牡秬黍以享司寒注黒其黒牡也吉㐫典制部四十七嫁娶通典曰遂皇氏有婦注云人皇是也伏犧氏制嫁娶以儷皮為禮帝王世紀曰包犧氏都陳制嫁娶之禮王子年拾遺記曰包犧始嫁娶以修人道撒豆穀漢世京}
