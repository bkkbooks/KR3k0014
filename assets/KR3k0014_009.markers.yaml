  - {type: variant, offset: 8904, length: 7, content: 於九月初集梓州, WYG: 北人之法也謂坐女于馬鞍之側此北人尚乗鞍馬之義也酉陽雜俎曰今士大夫家婚禮新婦乗馬鞍悉北朝之餘風也今娶婦家新人入門跨馬鞍此蓋其始也東牀晉書王羲之傳曰羲之與王承王悦為王氏二少郗鑒使門生求女婿于王導導令就東廂徧觀子弟門生歸謂鑒曰王氏諸少並佳然聞信至咸自矜持惟一人坦腹食獨若不聞鑒曰此正佳婿也訪之乃羲之也遂以女妻之由是呼女婿為東牀五姓蘓氏演義曰五音之配五姓郭璞以收舌之音為宫姓以至齶上之音為徴姓以唇音為羽姓以舌著齒外之音為商姓以胷中之音為角姓又青囊經云}
