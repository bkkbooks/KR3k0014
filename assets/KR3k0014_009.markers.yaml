  - {type: variant, offset: 9009, length: 0, content: '', WYG: 曰媒之言謀也謀合異類使和成者凡嫁娶之道必由媒妁自太昊制昏禮則判合之義當有所由便應有媒矣至周始置媒氏之官掌萬民之判也婦人拜禮曰男拜則尚左手女拜則尚右手又居喪之禮男拜稽顙女子則否是古者男女之拜一也古詩曰長跽故夫前五言之作自漢李陵推此則由漢而來其拜猶同耳孫甫唐書云唐武后欲尊婦人始易今拜是則女屈膝而拜始于唐武后也主改適唐書公主傳宣宗女萬夀公主下嫁之後遂詔公主有子而寡不得復嫁宋朝之制主薨其夫亦不得復娶也喪紀上古親死𦵏之中野而喪期無數至虞舜二十有八載放勲徂落百姓如喪考妣三載四海遏宻八音則三年之喪自堯舜始也三代同之故孟子曰三年之喪齊衰之服三代共之淮南子齊倍訓曰武王伐紂載尸而行海内未定故不為三年之喪許慎注云三年之喪始于成王喪服通典曰喪期無數}
