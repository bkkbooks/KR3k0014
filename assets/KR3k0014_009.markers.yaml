  - {type: variant, offset: 1581, length: 212, content: 拾遺記曰軒皇使百辟群臣列圭玉於蘭蒲席上以蘭蒲為席而薦圭玉之重器不嫌其陋初有物故也韓子曰禹為蔣席赬緣此彌侈矣蓋至禹始增純緣之飾也至周司幾筵掌五席有莞藻次蒲熊之名其純有紛畫黼之別也簟詩斯干曰下莞上簟注云竹葦曰簟說文曰簟竹席也以竹為席謂之簟則是因席遂為簟也故周成王之顧命曰敷重篾席注謂篾桃竹其物雖已見於周初而猶以竹名號席則簟之名當出於周之中葉故宣王之雅始見簟名焉几漢李尤幾銘敘曰黃帝軒轅仁智恐事有闕作輿几之法則幾創始自黃帝也杖山海, WYG: 絲麻索縷手}
