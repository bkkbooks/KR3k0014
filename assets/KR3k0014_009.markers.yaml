  - {type: variant, offset: 4044, length: 316, content: 輪扇西京雜記曰長安巧工丁緩作七輪扇以七輪相連一人運之滿堂寒顫今禁中洎宗戚貴室亦多為此物者蓋起自漢丁緩云如意吳時秣陵有掘得銅匣開之得白玉如意所執處皆刻螭彪蠅蟬等形胡綜謂秦始皇東遊埋寶以當王氣則此也蓋如意之始非周之舊當戰國事爾竈淮南子曰炎帝王於火死而為竈後漢李尤竈銘曰燧人造火竈續事始則曰竈黃帝所置釜甑古史考曰黃帝始造釜甑火食之道成矣詩疏引禮運注云中古未有釜甑而中古謂神農時也匙方言曰匕謂之匙說文曰匕所以取飯文王之贊易至霍曰不喪匕鬯大東之詩曰有捄棘匕注云匕所以載鼎實則匕三王之制也箸禮記曰飯黍無以箸韓子曰紂為象箸以象箸觀之明箸前有商紂始以象為之耳箕箒世本曰少康作箕箒飯帚許慎云陳留以飯帚為筲今人亦呼飯箕為梢箕慎既漢人所記疑皆秦漢時事耳斧, WYG: 陶}
