  - {type: variant, offset: 9544, length: 2, content: 宮室, WYG: 棺槨盖取諸大過孔穎達疏云有虞瓦棺未必用木商以前無槨又按棺槨自商以後則夏已前未具也而易繫以為黄帝堯舜之事銘旌禮記曰銘明旌也以死者不可以别故以其旗識之後漢趙咨遺書曰古之葬者至商有加周官制兼二代表以旌名之儀則喪禮之有銘旌周制也喪服小記曰書銘自商始置非周禮也周官司常大喪共銘旌因商事爾士喪為銘各以其物書名于末曰某氏某之棺置于宇西階之}
