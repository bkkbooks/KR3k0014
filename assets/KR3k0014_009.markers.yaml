  - {type: 'tls:seg', offset: 10412, content: '', id: KR3k0014_CHANT_009-129a.8}
  - {type: variant, offset: 10412, length: 0, content: '', WYG: 嘉話録曰大和已後博戲家謂重四為堂印言重四則投子猶二也六隻盖起近代大和文宗時年號今按唐李賀州郃撰葉子格世有其書則六隻當自郃矣潘氏紀聞謂自投子以飾四朱者因明皇與貴妃采戰将北唯重四可轉敗為勝上擲而連呼叱之宛轉良久而成重四上大悦命髙力士賜四緋也樗蒲博物志曰樗蒲老子入西戎所造或云胡亦以}
  - {type: variant, offset: 10412, length: 0, content: '', krp: 嘉話録曰大和已後博戲家謂重四為堂印言重四則投子猶二也六隻盖起近代大和文宗時年號今按唐李賀州郃撰葉子格世有其書則六隻當自郃矣潘氏紀聞謂自投子以飾四朱者因明皇與貴妃采戰将北唯重四可轉敗為勝上擲而連呼叱之宛轉良久而成重四上大悦命髙力士賜四緋也樗蒲博物志曰樗蒲老子入西戎所造或云胡亦以}
  - {type: variant, offset: 10413, length: 1, content: 廟, WYG: 卜也買鬼世傳唐武后初諫議大夫明崇儼能役鬼物其微時人嘗與博凡擲投子必使鬼物持其彩應呼而成隨其所欲也後人因此為買鬼之􅃧就中彩名其通天火通之類云亦當時所役之物名也象戲太平御覽曰象戯周武帝所造而行碁有日月星辰之目與今人所為殊不同唐牛僧孺撰元恠録載唐寳應元年岑順于陜州吕氏㐫宅夜聞鼙鼓之聲有介人報曰金象将夜警也寤見鐡騎長數寸進曰天馬斜飛度三疆上将横行擊四方輜車直入無迴翔六甲次第不乖行乃有一馬斜去三尺止又一歩卒横出一尺後車進已而于見䖏掘之即古塚也前有金象局列馬滿枰其辭與勢正今世所為者是則此􅃧于此古塚初窆時已與周武帝所造不同而同名象􅃧也説苑雍門周謂孟嘗君下燕則鬭象碁亦戰國之事乎故今人亦曰象碁盖戰國用兵爭強故時人用戰爭之象為碁勢也彩選彩選序曰唐之衰任官失序而廉恥路斷李賀州郃譏之恥當時職任用投子之數均班爵賞謂之彩選言其無實惟彩勝而已本朝劉蒙叟陳堯佐雖各有損益而大抵取法及趙明逺削唐雜任之門盡以今制專以進士為目時慶厯中也元豐末官制行朱昌國又以寄祿新格為名鬭雞列子有紀渻子為周宣王養鬭雞之事左傳述季郈之雞鬭季氏介其雞郈氏為之金距推此則兹􅃧之始當出于周也鬭草宗傳荆楚嵗時記曰競採百藥謂百草以蠲除毒氣故世有鬭草之􅃧鬭牛成都記曰李氷為蜀郡守有蛟暴入水戮之已為牛形約曰江神亦必牛形白帶者我也須㬰有二牛鬭武士射其神斃蜀不復病水由是鬭牛之􅃧今世尚或有之盖自秦世}
