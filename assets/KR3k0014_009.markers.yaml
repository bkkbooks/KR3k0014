  - {type: variant, offset: 4885, length: 174, content: 撲滿西京雜記曰公孫洪元光五年為國所推上為賢良國人鄒長倩贈以撲滿一枚云撲滿以土為器以畜錢背有入竅而無出滿則撲之土粗物錢重貨入而不出積而不散故撲之上有聚斂而不能散者將有撲滿之敗可不戒歟故贈君然則漢武帝時世已為此器疑出於畜聚之後也土牛禮記月令曰出土牛以示農耕之早晚注云若立春在十二月望則策牛人近前示農早也月晦及正月旦則在中示農平也近正月望則近後示農晚也其, WYG: 炙}
