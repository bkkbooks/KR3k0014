  - {type: variant, offset: 6069, length: 346, content: 始蓋聻謂裴漸耳本助辭後人因李君之書誤作一字也爆竹歲時記曰元日爆竹於庭以辟山臊山臊惡鬼也神異經曰犯人則病畏爆竹聲宗懍乃云爆竹然草起於庭燎風俗通謂起於庭燎不應濫王者也按周衰之末大夫而僭天子庶人而服侯服者皆是也奚獨燎明為不然乎懍之所記理或然矣綵花實錄曰晉惠帝令宮人插五色通草花漢王符潛夫論已譏花采之費晉新野君傳家以翦花為業染絹為芙蓉捻蠟為菱藕翦梅若生之事按此則是花朵起於漢翦綵起於晉矣歲時記則云今新花謝靈運所制疑綵花也唐中宗景龍中立春日出翦綵花又四年正月八日立春令侍臣迎春內出綵花人賜一枝董勛問禮曰人日造花勝相遺不言立春則立春之賜花自唐中宗始也綵勝歲時記曰人日翦綵為勝起於晉代賈充夫人所作取黃母戴勝之義也觀燈唐書嚴挺之傳睿宗先天二年正月望夜胡人婆陀請然百千燈因弛門禁帝於延熹安福門縱觀此天子御樓觀燈, WYG: 盖食卵}
