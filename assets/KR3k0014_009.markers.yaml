  - {type: variant, offset: 2656, length: 886, content: 云鑿地為尊此尊名始也後世或以瓦木為之取諸此也至有虞始又以泰名尊四尊禮明堂位曰泰有虞氏之尊也山罍夏后氏之尊著商尊也犧象周尊也此四代之制也三爵又曰爵夏后氏以琖商以斝周以爵此三器之始也然則今世所用盞亦始於夏后之琖歟三彝又曰灌尊夏后氏以雞彝商以斝周以黃目此三彝之始也三勺又曰勺夏后以龍勺商以疏勺周以蒲勺蓋龍疏蒲勺飾也後王加文耳然則勺之興當有虞始創之故無飾也至夏后加龍以飾之簠簋墨子曰堯飯土簋禮明堂位曰有虞氏之兩敦夏后氏之四璉商之六瑚周之八簋皆黍稷之器也始本於陶唐之土簋俎明堂位又曰有虞氏以䖾俎注云斷木為四足而已然則斷木而為足不致文飾創始為之故也唐太宗曰禹雕其俎至夏乃用雕文則俎自虞帝始也豆又曰夏后以揭豆注云揭無異物之飾也凡造物之初未始不本於樸素後王以為未足以致誠敬故因之加文焉則豆無異飾初為其器也豆疑始於夏后氏也籩豋爾雅曰竹豆謂之籩瓦豆謂之豋蓋二物取法於豆而製也疑出有夏之後鼎史記黃帝內傳鍾繇疏皆云黃帝採首山之銅鑄鼎於荊山此鼎之始也後至夏禹復鑄以象物白氏六帖黃帝作鼎三象天地人禹收九牧之金以鑄九鼎水罐盧綝帀四起事曰晉惠帝征成都軍敗帝渴帳下齎五升銅罐取水就飲之後人因有水罐之制張敞晉東宮舊事曰太子初拜有塗金澡罐一并青絲三合繩即此也在如意後甌許慎說文曰䀁音賄小甌揚雄方言曰甌翩音邊雄慎皆漢人凡所記非戰國即秦漢制度蓋三代飲燕之具俱俎豆之類故也盆爾雅曰盎謂之缶注云今盆也呂氏春秋曰堯使質絡缶而擊之則缶已為用於堯世矣周官牛人祭祀共其盆簝禮器孔子曰奧者老婦之祭也盛於盈尊於瓶此又二物之名出於周代也鉢本天竺國器也故語謂之鉢多羅漢云應量器省略彼土言故名鉢西國有佛鉢是也宋廬江王以銅鉢餉祖祈則是晉宋之閒始為中夏所用也銚唐雅曰鋗謂之銚說文云溫器也曹操上獻帝表曰臣祖騰有順帝賜純銀粉銚疑漢人始為之也杓禮明堂位曰勺夏后氏以龍勺推此以考蓋前有制矣有夏始加以龍飾杓即勺也祭祀曰勺民用曰杓其實一也或以勺之所容不過升勺命之而杓則加廣其所受皆取酌焉遂異其名制也杯禮玉藻曰母沒則杯圈不能飲十州記曰周穆王時西胡獻常滿杯蓋杯三代之制也紂為瓊杯是矣盤禮大學有湯之盤銘曰德日新日日新又日新是夏世已有盤制而湯始銘之也或曰盤盂黃, WYG: 伯余黄}
