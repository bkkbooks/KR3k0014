  - {type: variant, offset: 2229, length: 426, content: 手巾禮浴用二巾上絺下綌雖上下異用而無異名此三代之制也漢王莽之斥逐王閎也閎伏泣元后親以手巾拭之於是始見手巾之目其事雖出於三代而制名當自漢世也布袋召康公美公劉之厚於民也其詩曰乃裹餱糧於橐於囊毛傳曰大曰橐小曰囊御覽云古行者之食以布囊貯糧則是布囊為裹糧之用自公劉之世已然矣蓋在夏后之世者也傘通典曰北齊庶姓王儀同已下翟尾扇傘皇宗三品已上青朱裹其青傘碧裹達於士人按晉代諸臣皆乘車有蓋無傘元魏自代北有中國然北俗故便於騎則傘蓋施於騎耳疑是後魏時始有其制也亦古張帛為繖之遺事也高齊始為之等差云今天子用紅黃二等而庶僚通用青其天子之以黃蓋自秦漢黃屋左纛之制也雨傘六韜曰天雨不張蓋幔周初事也通俗文曰張帛避雨謂之繖蓋即雨傘之用三代已有也繖傘字通薰籠晉東宮舊事曰太子納妃有衣薰籠當亦秦漢之制也什物史記曰舜作什器於壽丘蓋世所常用之器也漆器韓子曰舜作食器黑漆其上禹作祭器黑漆其外朱畫其內唐太宗曰舜作漆器而諫者十七人則器之布漆自舜始也蓋堯啜土鉶飯土簋故爾尊禮運曰禮之初始諸飲食汙尊而抔飲, WYG: ''}
