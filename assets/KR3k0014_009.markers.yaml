  - {type: variant, offset: 3555, length: 258, content: 盤盞周官司尊彝之職曰六彝皆有舟鄭司農云舟尊下臺若今承盤蓋今世所用盤盞之象其事已略見於漢世則盤盞之起亦法周人舟彝之制而為漢世承盤之遺事也注子事始曰唐元和初酌酒用尊勺雖十數人一尊一杓挹酒了無遺滴無幾改用注子雖起自元和時而輒失其所造之人偏提又曰太和中仇士良惡注子之名同鄭注乃立柄安系若茶瓶而小異名曰偏提托子又曰建中初崔寧女以金盞無儲病其熨指取楪子承盛之既啜而傾乃以蠟環楪子中坐之杯遂定即遣匠以漆環易蠟寧奇子製名托子遂行於代後傳者更環其底唾壺西京雜記曰廣川王發魏襄王冢得玉唾壺蓋此物戰國時已有其制也鏡玄中記曰羽壽作鏡堯臣也黃, WYG: 織黄}
