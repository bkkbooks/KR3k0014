  - {type: variant, offset: 10395, length: 0, content: '', WYG: 子及諸侯皆有之其刻文止曰某帝或某官神道之碑今世尚有宋文帝神道碑墨本也其初由立之于葬兆之東南地理家言以東南為神道故以名碑爾按後漢中山簡王薨詔大為修塚塋開神道注云墓前開道建石柱以為標謂之神道是則神道之名在漢已有之也晉宋之後易以碑刻云葬埋孟子曰上世嘗有不葬其親者其親死則舉而委之于壑他日過之狐狸食之蠅蚋姑嘬之其顙有泚睨而不視盖歸反虆而掩之則葬埋之禮疑自此起也炎帝之前殆厚衣之以薪葬之中野不封不樹也合葬禮記曰檀弓云季武子曰合葬非古也自周公以來未之有改又云舜葬蒼梧之野盖二妃未之從也注謂古不合葬又季武子曰周公蓋附注云附謂合葬合葬自周公以來是則周公初制此禮也故周桓王之詩曰死則同穴塚墓黄帝内傳云帝斬蚩尤因置塚墓然諸小說家往往記伏犧女媧之塚疑後人増築云墓誌炙轂子曰齊王儉云石誌不出禮經起宋元嘉中顔延之為王球作墓誌以其無名誄故以紀行事爾遂相祖習然魏侍中繆襲改葬父母制墓下埋文将以陵谷遷變欲使人有所聞知但記姓名歴官祖父婣媾而已有徳業則為銘文又隋代醸家于王戎墓得銘云晉司徒安豐元公王君之銘有數百字則魏晉已有其事不起于宋也馮鑑續事始云按西京雜記前漢杜子春臨終作文命刻石埋于墓前則墓誌因此始也承謂昔吳季札之喪孔子銘其墓曰嗚呼有吳延陵季子之墓荘子衛靈公𦵏沙丘掘得石槨銘曰不馮其子靈公奪而埋之唐開元時人有耕地得比干墓誌刻其文以銅盤曰右林左泉後崗前道方世之寧茲焉是保漢滕公夏侯嬰得定葬石銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室則墓之有誌其來逺矣石羊虎炙轂子曰秦漢以來帝王陵寢有石麟辟邪兕馬之屬人}
