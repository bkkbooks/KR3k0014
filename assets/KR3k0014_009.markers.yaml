  - {type: variant, offset: 1794, length: 318, content: 曰夸父與日爭走道死棄其杖化為鄧林此已見杖矣蓋切於此乎大戴禮武王有杖銘莊子有神農曝然放杖之文案有虞三代有俎而無案戰國始有其稱燕太子丹與荊軻等案而食是也案蓋俎之遺也匱國語曰夏之衰也襃人之神化為二龍夏后布幣而策告之卜藏其漦及龍亡而漦在櫝韋昭曰櫝匱也書武王有疾周公作冊納之金縢之匱中蓋櫝匱一器也夏后謂之櫝周始謂之匱然則三代之制也嬾架陸法言切韻曰曹公作欹架臥視書今嬾架即其制也則是此器起自魏武帝也櫝食國語閑談曰真宗問杜鎬櫝食原於何代鎬對曰漢景為太子時帝鍾愛既居東朝文帝念之曰太子之食必料差殊乃命所在每日具兩檐櫝以賜之此其始也博山黃帝內傳有博山爐蓋王母遺帝者蓋其名起於此爾漢晉以來盛用於此香毬西京雜記長安巧工丁緩者作臥褥香爐一名被中香爐本出防風其法, WYG: 指緯}
