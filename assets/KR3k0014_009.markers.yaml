  - {type: variant, offset: 8, length: 1, content: 舟, WYG: 五田畆詩疏曰易繋辭稱神農始作耒耜則田起神農矣通典曰皇帝始立歩制畆是田以畆計起自軒轅也司馬法以六尺為歩歩百為畆顧野王云秦孝公以二百三十歩為畆今又二百四十歩也青齊諸部又以三百六十歩為一大畆云田業三代之民皆受田于公則所田之田王田也一夫一婦受地百畆秦孝公任衛公孫鞅廢井田開阡陌民得賣買而天下之田為私業此民田業賣買之始也耕周書曰神農之時天雨粟帝耕而種之黄帝内傳曰帝昇為天子地神獻草木述播種之利因廣耕則耕盖始于炎帝種}
