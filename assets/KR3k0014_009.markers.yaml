  - {type: variant, offset: 4397, length: 4, content: 秤斗尺呂, WYG: 髙氏小史云炎帝種五穀故謂之神農穀食賈誼雜說曰神農嘗百草之實教民食穀藝文類聚曰神農時民始食穀加于燒石之上而食醴酪古史考曰古有醴酪禮運曰昔先王未有火化後聖有作然後修火之利以為醴酪注云烝釀之也酪酢胾蓋其物出自燧人作火之後爾酒酒經曰空桑穢飯醖以稷麥以成醇醪此酒之始也吕}
