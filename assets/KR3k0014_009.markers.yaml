  - {type: variant, offset: 10593, length: 1, content: 幽, WYG: 又有弄椀諸伎後漢天子正旦受賀以大繩繫兩柱相去數丈兩倡女對舞行于繩上相逢比肩而不傾水戯典略曰魏明帝使博士馬鈞作水轉百戯巨獸魚龍曼延弄馬列騎備如漢西京故事今世皆傳其法盖其始自馬鈞也影戯故老相承言影戯之原出于漢武帝李夫人之亡齊人少翁言􅀎致其魂上念夫人無已廼使致之少翁夜為方帷張燈燭帝坐它帳自帷中望見之仿彿夫人像也盖不得就視之由是世間有影戯歴代無所見宋朝仁宗時市人有能談三國事者或採其說加緣飾作影人始為魏吴蜀三分戰爭之像嗔拳江淮之俗每作諸戯必先設嗔拳笑面有諸行戯時嘗在故臈之末所作之人又多村夫初不知其所謂也按荆楚嵗時記有諺語云臘鼓鳴春草生村人並細腰鼔戴胡公頭及作金剛力士以逐除今南方為此戯者必戴面如胡人状作勇力之勢謂之嗔拳則知其為荆楚故俗舊矣合生唐書武平一傳曰中宗宴兩儀殿胡人襪子何懿倡合生歌言淺穢平一上書比來妖伎胡人街童市子或言妃主情兒或列}
