  - {type: variant, offset: 1166, length: 171, content: 邸鄭司農云邸後板也康成謂後板屏風禮記明堂位曰天子負斧扆而立陸法言云今屏風扆遺象也三禮圖曰屏風之名出於漢世故班固之書多言其物徐堅為初學記亦載漢劉安羊勝等賦然則漢制屏風蓋起於周皇邸斧扆之事也拂廬唐書吐蕃處於大氈帳名拂廬高宗永徽五年獻之高五丈廣袤各二十七步其後豪貴稍以青絹布為之其始以拂於穹廬為號也宋朝每大宴犒亦設於殿庭曰拂廬亭此蓋其始也虎枕西京雜, WYG: 圗要}
