  - {type: variant, offset: 5579, length: 290, content: 誰對曰臣終南進士鍾馗也因應舉不捷觸殿階而死奉旨賜綠袍而葬誓除天下虛耗妖孽言訖覺而疾愈乃召吳道子圖之上賞其神妙賜以百金是以今人畫其像於門也沈括筆談曰歲首畫鍾馗不知起自何時皇祐中金陵發一冢有石誌云乃宋宗愨母鄭夫人云有妹馗鍾馗之設遠矣捶糞錄異傳曰歐明遇彭澤青洪君君有婢名如願君使隨明明意有所願如願輒得之成富人後不復愛如願正月歲朝雞初鳴呼之不即起欲捶之願走糞上乃故歲埽除所聚者由此逃去明謂在積壤中以杖捶糞使出知不可得因曰汝我富不復捶汝也今人元日雞鳴時輒往積壤閒捶之云使人富蓋起自歐明也今京東之俗猶然畫雞董勛問禮曰正月一日為雞二日狗三日牛四日豬五日牛六日馬七日人正旦畫雞於門七日貼人於帳為此, WYG: 熟}
