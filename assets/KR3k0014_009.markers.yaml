  - {type: variant, offset: 11254, length: 0, content: '', WYG: 弦木為弧剡木為矢弧矢之利以威天下盖取諸睽山海經曰少皥生般始為弓矢世本曰牟夷作矢揮作弓宋衷注云牟夷揮皆黄帝臣郭璞弓矢一器而作者兩人于理可疑以般為是墨子曰羿作弓荀子曰倕作矢吕氏春秋曰夷羿作弓張教吴録曰揮觀弧星始為弧按司馬遷史記曰黄帝之弓曰烏號然則當以繫辭為是員半千射決曰蚩尤作亂黄帝始制弧矢弩古史曰黄帝作弩吳越春秋陳音對越王曰弩生于弓弓生於彈彈生于古之孝子楚琴氏以弓矢之勢不足以威天下乃横弓著臂施機設郭加之以力即是弩之始出于楚琴氏也而周官司弓矢掌六弓六弩其名物有唐大夾庾之别則弩之起逺矣龍魚河圗則曰黄帝時蚩尤造五兵杖刀㦸大弩也神臂弓筆談曰熙寧中李定獻偏架弩似弓而施榦鐙以鐙拒地而張之射三百歩能洞扎謂之神臂弓最為利器定黨項羌酋歸朝死于防團盖神臂弓之為國用自定始也弓袋實録曰器仗皆自有虞氏始䪅鹿施弓袋通謂之三仗盖大將備儀也左傳曰左櫜鞬右鞭弭是也禮樂記曰武王克商倒載干戈包之以虎皮名之曰建櫜注建讀為鍵兵甲之衣曰櫜箭筒又曰箭筒自有虞氏始也周禮有矢箙射的虞書曰侯以明之注云作射侯之禮以明善惡則射侯始見于堯舜矣至周有熊虎麋豻三五正侯後世就簡但為射的盖侯之遺意也射以暈計之亦三正五正之遺事也俗亦曰射帖鳴鏑前漢匈奴傳曰冒頓作鳴鏑應劭曰髐箭也遂以射殺頭曼單于者斬馬刀漢成帝時朱雲請上方斬馬劔斷張禹頭以厲其餘則斬馬刀之名已見于漢代矣宋朝神宗熙寧中又製斬馬刀其犀利則莫比盖亦取漢氏舊名為稱也六纛實録曰商有纛皂絲為之似蚩尤首黄帝内傳曰𤣥女為帝制𤣥纛十二以主兵是則纛自黄帝始旗幟列子曰黄帝與炎帝戰以鵰鶚鷹隼為旗幟故今旗物或綵錯為鵰鶚取諸此也太白隂經曰蚩尤建旗幟黄帝内傳曰𤣥女請帝制旗幟以象雲物此盖旗幟之始也五方旗通典曰黄帝振兵設五旗黄帝内傳曰帝制五彩旗指顧向背黄帝出軍決曰攻伐作五彩牙旗青引東赤南白西黒北中黄是也亦自黄帝制之鉦黄帝内傳曰𤣥女請帝鏄鉦鐃以擬雹擊之聲今銅鑼其遺事也鐸鬻子曰禹治天下以五聲聽為銘書于簨簴曰教寡人以事者振鐸禹世已有此也角徐廣車服儀制曰角前書記所不載或云本出羌胡一云出于越黄帝内傳曰𤣥女請帝製角一十四以警夜通禮義纂曰蚩尤帥蝄蜽與黄帝戰帝命始吹角作龍鳴以禦之盖角肇于黄帝氏也谷儉角賦夫角盖黄帝㑹羣臣于泰山作清角之音號令之限度也軍中置之以司昏曉故角為軍容也鞞唐韻曰鼙騎上鼓鼙禆也禆助鼓節亦作鞞今軍行馬上所擊是也黄帝内傳曰𤣥女請帝制鼓鼙以當雷霆是則黄帝制之以伐蚩尤也吕氏春秋曰帝嚳令倕作鼙鼓之樂又云倕作鞞以節鼓鞀吕氏春秋曰倕作鞀鬻子禹為銘書于簨簴語寡人以獄訟者揮鞀鞍轡桓寛鹽鐡論云古者繩鞚草鞮皮薦而已後代以革鞍而不飾六韜曰車騎之將軍馬不具鞍勒不備者誅推此當是三代之制盖黄帝始服牛乗馬宜未騎也鞭說文所為驅遲者也古用革以驅馬左傳曰鞭之長不及馬腹是也後世代之以竹故或謂之箠盖䇿之以箠馬太王杖馬箠去邠是也虞書曰鞭作官刑則得名于堯舜之代始以為薄刑之用鐡蒺䔧事始云鐡蒺䔧菱角等起于隋煬帝征遼東置之要路水中以刺人馬非也按諸葛亮與司馬懿相持于武功五丈原亮卒懿追之亮長史楊儀多布鐡蒺䔧則三國之際已有其物非自隋煬帝始也漢文帝時晁錯言守邊議云具藺石布渠答注云渠答鐡蒺䔧也此又漢初事爾雖然非三代仁義之守也盾山海經曰羿與鑿齒戰于草疇之野羿持弓矢鑿齒持楯春秋元命包曰帝嚳戴干宋衷曰干楯也王嘉拾遺記曰庖犧造干此則楯之起也傍排實録曰傍排自牟夷始也或曰傍排近世兵杖中有鏢牌盖出溪洞之蠻熙寧中王師征交阯其法乃盛傳于中國至神宗設于行陣令諸軍習之也宋朝㑹要曰太宗聞南方以標槍傍排為兵令蕭延皓取廣徳軍習之中土之用標牌此其始也柝易繫辭曰}
