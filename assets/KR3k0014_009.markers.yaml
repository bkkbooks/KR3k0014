  - {type: variant, offset: 4382, length: 0, content: '', WYG: 以謂造冶者蚩尤也按禮曰昔先王未有火化後聖修火之利範金合土此冶之始也盖始于鑚木造火之後漁尸子曰燧人之世天下多水教人以漁易繫辭曰包犧氏之王天下結繩而為網罟以佃以漁蓋取諸離然則漁自太昊始也釣易稱太昊以佃以漁然釣亦漁事蓋易以結網而漁為包犧}
