  - {type: variant, offset: 10406, length: 3, content: 曾遊處, krp: 彈起三皇之世也陸博說文曰古烏曹氏始作博盖夏后之臣也事始曰烏曹始置博陸之戲聲譜曰博陸采名也孔子曰不有博弈者乎荘子博塞以㳺彈碁西京雜記曰漢成帝好蹴鞠羣臣以為勞體非至尊所宜帝曰朕好之可擇似而不勞者奏之劉向作彈碁以獻傳𤣥彈碁賦序曰漢成帝好蹴鞠勞人體非至尊所御因其體而作彈碁之戲起自漢代矣宋臨川王義慶著世說以為彈碁始自魏宫装奩戲文帝于此伎特妙用手巾角以拂碁帝客又能低頭以葛冠巾角拂碁妙逾于帝酉陽雜俎曰彈碁起自魏室粧奩戲也典論曰予于他戲弄少所喜唯彈碁略盡其巧京師有馬合卿侯東方安世張公子恨不與數子對起于魏室明知二說非也今世尚或有其法而為之者亦少投子續事始曰陳思王曹子建制雙陸置投子二唐末有葉子戲不知誰置遂加投子至六按烏曹始置六博老子置樗蒲李氏資暇引蔡澤説范雎云博者欲大投装駰注謂投投子乃投擲之義謂樗蒲五木然則蒲}
  - {type: variant, offset: 10410, length: 1, content: 祠, WYG: 有投子耳故曹植所造從么至六謂之投子取投擲義}
