  - {type: variant, offset: 8797, length: 0, content: '', WYG: 原以五月五日投汨羅楚人哀之每至此日以筒貯米祭今市俗置米於新竹筒中蒸食之謂之装筒其遺事亦曰筒糉齊諧又記曰今世人五月五日作糉汨羅之遺風也異苑曰糉屈原姊所作饅頭小說云昔諸葛武侯之征孟獲也人曰蠻地多邪術須禱于神假隂兵一以助之然蠻俗必殺人以其首祭之神則嚮之為出兵也武侯不從因雜用羊豕之肉以包之以麵象人頭以祠神亦嚮焉而為出兵後人由此為饅頭至晉盧諶祭法春祠用饅頭始列于祭祀之品而束晢餅賦亦有其說則饅頭疑自武侯始也餅晉束晢餅賦曰禮仲春天子食餻而朝事之籩煑麥為麵内則諸饌不說餅然則餅之作其來逺矣按}
  - {type: page-break, offset: 8797, content: '', id: KR3k0014_WYG_009-14b, image: WYG0920/WYG0920-0242b.png}
  - {type: page-break, offset: 8797, content: '', id: KR3k0014_WYG_009-15a, image: WYG0920/WYG0920-0242c.png}
  - {type: variant, offset: 8797, length: 0, content: '', krp: 原以五月五日投汨羅楚人哀之每至此日以筒貯米祭今市俗置米於新竹筒中蒸食之謂之装筒其遺事亦曰筒糉齊諧又記曰今世人五月五日作糉汨羅之遺風也異苑曰糉屈原姊所作饅頭小說云昔諸葛武侯之征孟獲也人曰蠻地多邪術須禱于神假隂兵一以助之然蠻俗必殺人以其首祭之神則嚮之為出兵也武侯不從因雜用羊豕之肉以包之以麵象人頭以祠神亦嚮焉而為出兵後人由此為饅頭至晉盧諶祭法春祠用饅頭始列于祭祀之品而束晢餅賦亦有其說則饅頭疑自武侯始也餅晉束晢餅賦曰禮仲春天子食餻而朝事之籩煑麥為麵内則諸饌不說餅然則餅之作其來逺矣按}
  - {type: variant, offset: 8798, length: 4, content: 桓景隨費, WYG: 書百官表少府属有湯官主餅餌又宣帝微時每買餅所從買者輙大售說苑叙戰國事則餅蓋起于七國之時也胡餅續漢書曰靈帝好胡餅京師皆食胡餅胡餅之起疑自此始也然則餅有胡漢之異矣胡餅蓋今俗所為者是而漢餅疑是今餅也後趙石勒諱胡改為麻餅蒸餅秦漢逮今世所食初有餅胡餅蒸餅湯餅之四品惟蒸餅至晉何曽所食非作十字拆則不下箸方一見于此以是推之當出自漢魏以來也湯餅魏晉之代世尚食湯餅今索餅是也語林有魏文帝與何晏熱湯餅即是其物出于漢魏之間也不托束晢餅賦曰朝事之籩煑麥為麵則麵之名蓋自此而出也魏世食湯餅晉以來有不托之號意不托之作緣湯餅而務簡矣今訛為䬪飥亦直曰麵也黄兒唐五行志曰黄巢未入京時都人以黄米及黒豆屑蒸食之謂之黄賊打黒賊唐都}
