  - {type: variant, offset: 60, length: 0, content: '', WYG: 耕注云用牛犁以耕也是則耕之用牛自叔均始矣後魏賈勰齊民要術曰趙過始為牛耕實勝耒耜之利崔寔正論曰漢武帝以趙過為搜粟都尉教民種殖其法三犁共一牛一人將之下種挽樓皆取備焉又牛耕之始自趙過也然崔賈之論為有所由爾樓犁魏畧曰皇甫隆為燉煌太守民不曉耕隆乃教民作樓犁省力過半鉏周書曰神農天雨粟帝種之作鉏鎒以墾草莽然後五穀興則鉏蓋神農造也詩臣工曰痔乃錢鏄注鏄鎒也}
