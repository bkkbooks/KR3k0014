  - {type: variant, offset: 10598, length: 1, content: 詩, krp: 市井初有呌果子之戯其本盖自至和嘉祐之間呌紫蘓丸洎樂工杜}
  - {type: variant, offset: 10600, length: 1, content: 刺, WYG: 經十呌子始也京師凡賣一物必有聲韻其吟哦俱不同故市人採其聲調間以詞章以為戯樂也今盛行于世又謂之吟呌也生花今京城有生花種植以戯者按前漢張騫傳漢遣趙破奴等破車師大宛以梨軒眩人獻于朝顔師古注云眩與幻同即今吞刀履火種𤓰植樹屠人戮馬之術是也本自西域來由是言之種𤓰植樹即生花之事也盖自漢武時大宛所獻眩人始云打麥唐書武元衡之将遇害也京師童謡曰打麥三三三今俗兒戯有打麥鼓掌作打麥聲後必三拍之抑緣此也杵歌春秋左氏傳曰襄公十七年十一月宋皇國父為平公築臺妨農功子罕請俟農畢公弗許築者謳曰澤門之晢實興我役邑中之黔實慰我心杜預注曰周十一月今九月澤門宋城門宋國父白晢居近澤門子罕黒色而居邑中今版築役夫歌以應杵者此盖其始也其歌往往叙苦樂之意者由此爾吕氏春秋云翟煎對魏惠王曰舉大木者前唱輿樗後亦應之此舉重勸力之歌也今人舉重出力者一人倡則為號頭衆皆和}
