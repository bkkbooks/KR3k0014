  - {type: variant, offset: 5970, length: 98, content: 名可息瘧癘也段成式讀漢舊儀說儺逐疫鬼立桃人葦索蒼耳虎頭等聻蓋蒼耳也然則其說漢事也張續宣室志曰裴漸隱居伊水時有道士李君善視鬼嘗見漸於伊上大歷中寄書博陵崔公曰當今制鬼無過漸耳是時朝士咸書漸耳字題其門自, WYG: 世民始食卵鳳凰乃去}
