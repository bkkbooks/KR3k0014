  - {type: variant, offset: 1367, length: 191, content: 虎枕之始魏咸熙中得梁冀玉虎枕臆下有題曰帝辛九年帝辛即紂也是則商紂之時已有其制矣被召南小星之詩曰抱衾與裯注云衾被也裯單被也論語鄉黨篇孔子必有寢衣長一身有半此二者商周之事也疑三代之制西京雜記趙飛燕為皇后女弟昭儀上襚三十五條有鴛鴦被則漢始名被也氈周官掌皮供毳毛為氈則周制也或曰黃帝作旃旃古氈字也褥黃帝內傳曰王母為帝列七寶登員之床敷華茸淨光之褥疑二物此其起爾趙昭儀上皇后襚三十五條有鴛鴦褥席, WYG: 絲機䇡}
