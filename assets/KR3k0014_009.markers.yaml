  - {type: variant, offset: 9558, length: 1, content: 內, WYG: 塗車芻靈自古有之明器之道也謂為芻靈者善為俑者不仁不殆于用人乎哉為其像人而用之也鄭注云俑偶人有面目似生人孔子善古而非周周官冢人及葬言鸞車像人是像人之起始于周也今直以俑號明器云禮又曰夏后用明器謂竹不成用瓦不成味木不成斵琴瑟張而不平笙竽備而不和有鍾罄而無簨􅙇也以俑為明器誤矣寓錢今楮鏹也唐書王嶼}
