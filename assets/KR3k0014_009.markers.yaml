  - {type: variant, offset: 10396, length: 1, content: 寮, WYG: 墓有石人羊虎柱之類皆表飾墳壠如生前儀衛風俗通曰方相氏葬日入壙駈罔像罔像好食死人肝腦人臣不敢備方相乃立其像于墓側又罔像畏虎與栢故頂上栽栢路前立虎也盧思道西征記曰新城西有漢桂陽太守趙越墓有石柱東南有亭因石柱為名漢霍去病墓像祁連山立石人馬然則墓前之立石人柱羊虎之類皆起于漢也諡禮檀弓曰幼名冠字五十以伯仲死諡周道也大戴諡法曰周公旦太公望相嗣王作諡法抱朴子曰諡始于周史記秦始皇初并天下制曰太古有號無諡中古有號死而以行為諡婦人諡穆天子傳曰天子為盛姬諡曰哀淑人此疑婦人諡之起也后諡諡所以易名也事雖起於周而王后亦無其禮漢初髙祖之母始有昭靈之號諸后皆因帝諡以為稱雖吕氏專政上官臨制亦無殊號東京明帝始建光烈之名後漢皇后紀論云爾按漢髙祖五年二月甲午漢王即皇帝位尊先媪曰昭靈夫人髙后五年五月辛未尊曰昭靈后元紀元帝母曰恭哀許皇后張晏曰婦人從夫諡閔其見殺故兼二諡則后諡自漢祖始也主諡楊侃職林曰唐貞元十五年故唐安公主賜諡曰荘穆諡自唐安始也唐㑹要曰貞元十五年七月十五日}
