  - {type: variant, offset: 6833, length: 1876, content: 歲時記按周禮女巫有歲時祓除之事鄭注云今上巳水上之類又論語暮春者春服既成浴乎沂風乎舞雩謂水濱祓除由來遠矣蓋周典也今歲三月西池之遊其遺事爾教池辛氏秦記曰昆明池漢武帝立之習水戰則是教池之事略見於此矣亦競渡之遺意也宋朝太祖建隆閒即都城之南鑿講武池始習水戰將有事於江南也及太宗興國中得吳越錢氏龍舟七年疏國城西開金明池於是每歲二月教池遂為故事子推故俗每寒食前一日謂之炊熟則以麪為蒸餅樣團棗附之名為子推穿以柳條插戶牖閒相緣云介子推逃祿晉文公焚山求之子推焚死文公為之寒食斷火故民從此物祀之而名子推相傳之謬至於如此也寒食陵翽鄴中記曰并州之俗以冬至後一百三日為介子推斷火冷食三日作乾粥食之中國以為寒食歲時記曰去冬至一百五日即有疾風甚雨謂之寒食秋千古今藝術圖曰北方戎狄愛習輕趫之態每至寒食為之後中國女子李芝蘭乃以綵繩懸樹立架謂之秋千或曰本山戎之戲也自齊桓公北伐山戎此戲始傳中國一云正作千秋字為秋千非也本出自漢宮祝壽辭也後世語倒為秋千耳禁火鄴中記曰舊云寒食斷火起於介子推左氏史記不見子推被焚之事按周禮司烜仲春以木鐸修火禁於國中注謂季春將出火今寒食推節氣是中春末清明是三日初然則亦周人出火之事也後漢周舉遷并州太原舊俗以介子推焚骸一月斷火舉移書廟云寒食一月老小不堪今則三日而已自漢以來訛謬已若此也拜埽開元禮曰宗子去在他國庶子無廟孔子許望墓以時祭祀唐禮每新改命釋褐結綬皆往墓見開元二十二年敕寒食上墓禮經無文近代相傳浸以成俗士庶有不合廟享者何以表其孝思宜許上墓編入五禮按漢官儀曰古不墓祭秦始皇起寢墓側漢因不改四時上飯後漢光武紀云建武十年八月幸長安有事十一陵蓋躬祭於墓也即今上墳拜埽蓋起於此明帝紀永平元年正月帝率公卿朝原陵如元會儀劉昭補注後漢禮儀志亦有上陵儀謝承書曰建寧五年正月車駕上陵原蔡邕曰明帝至孝光武即世帝嗣位群臣朝正感先帝不復聞見此禮乃率百僚就原陵創焉然則上墳之禮疑自是以來民閒視上所行因習以為俗也破散五代會要曰奉先之道無寒食野祭之禮近代莊宗每年寒食出祭謂之破散則今人有破散之語自後唐莊宗始也蠶市仙傳拾遺曰蜀蠶叢氏王蜀教人蠶桑作金蠶數千每歲首出之以給民家每給一所養之蠶必繁孳罷即歸於王王巡境內所止之處民成市蜀人因其遺事每年春有蠶市也紙鳶俗謂之風箏古今相傳云是韓信所作高祖之征陳豨也信謀從中起故作紙鳶放之以量未央宮遠近欲以穿地隧入宮中也蓋昔傳如此理或然矣梁太清中侯景攻臺城內外斷絕羊侃教小兒作紙鳶藏詔於中簡文帝出太極殿前因西北風放之冀得達援軍賊謂是厭勝又射下之見馬總通歷云然其事初一見於此證知其審為韓信造矣競渡楚傳云起於越王句踐荊楚歲時記曰五月五日為屈原投汨羅人傷其死並將舟楫拯之因以為俗歲華紀歷日因句踐以為成風拯屈原而為俗也艾人荊楚歲時記曰端午日荊人皆蹋百草採艾為人懸於門上以禳毒氣當是以師曠占有歲病則艾草先生故也五綵風俗通曰五月五日以五綵絲繫臂辟鬼及兵令人不病瘟又曰示婦人蠶功成也續齊諧記曰屈原五月五日投汨羅死楚人哀之每至此日以竹筒貯米投水祭之漢建武中長沙區回忽見一士稱三閭大夫曰見祭甚善但常年所遺為蛟龍所竊今若有惠以楝葉塞筒五綵線縛之此二物蛟龍所憚回依言故世人五月五日作粽并五綵線及楝葉皆汨羅遺風也百索續漢書曰夏至陰氣萌作恐物不成以朱索連以桃印文施門戶故漢五月五日以朱索五色即為門戶飾以難止惡氣今有百索即朱索之遺事也蓋始於漢本以飾門戶而今人以約臂相承之誤也又以綵絲結紐而成者為百索紐以作股者名五絲云線符漢五月五日以五色印為門戶飾續漢書所謂桃印者也劉昭曰桃印本漢制今世端午以五綵線篆符以相問遺亦以置戶牖帳屏之閒蓋本於漢桃印之制遺扇唐會要曰正觀十八年五月五日太宗謂長孫無忌楊師道曰五日舊俗必用服玩相賀今朕各遺卿飛白扇二枚庶動清風以增美得推舊俗之語則知端午之以扇相遺自唐太宗始也乞巧吳均續齊諧記曰桂陽成武丁有仙道忽謂其弟曰七月七日織女當渡河暫詣牽牛至今云織女嫁牽牛周處風土記曰七夕洒埽於庭施几筵設酒果於河鼓織女言二星神會乞富壽及子歲時記曰七夕婦人以綵縷穿七孔針陳瓜花以乞巧則七夕之乞巧自成武丁始也穿針西京雜記曰漢采女常以七月七日夜穿七孔針於開襟樓今七夕望月穿針以綵縷過者為得巧之候其事蓋始於漢盂蘭今世每七月十五日營僧尼供謂之盂蘭齋者按盂蘭經曰目連母亡生餓鬼中佛言須十方眾僧之力至七月十五日具百味五果以著盆中供養十方大德後代廣為華飾乃至割木割竹極工巧也今人弟以竹為圓架加其首以荷葉中貯雜饌陳目連救母書像致之祭祀之所失之遠甚矣水陸今釋氏教中有水陸齋儀按其事始出於梁武帝蕭衍初帝居法雲殿一夕夢僧教設水陸齋覺而求其儀而世無其說因自撰集銓次既成設之於金山實天監七年也大抵取救焰口經事云爾菊酒, WYG: ''}
