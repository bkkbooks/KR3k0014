  - {type: variant, offset: 10763, length: 4, content: 築作城郭, WYG: 太白隂經曰蚩尤割革為甲管子亦云黄帝内傳曰𤣥女請帝制甲胄以備身也抹額二儀實録曰禹娶塗山之夕大風雷電中有甲卒千人其不被甲者以紅綃帕抹其頭額云海神來朝禹問之對曰此武士之首服也秦始皇至海上有神朝皆抹額緋衫大口袴侍衛自此抹額遂為軍容之服兜鍪胄也黄帝内傳所述盖𤣥女請帝製之以備身}
