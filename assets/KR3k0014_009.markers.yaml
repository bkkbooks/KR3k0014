  - {type: variant, offset: 10760, length: 2, content: 城注, WYG: 五兵戈殳㦸酋矛夷矛也世本蚩尤以金作兵器然則兵盖始于炎帝而鑄金為刃即自蚩尤始矣黄鉞輿服志曰黄鉞黄帝置内傳曰帝將伐蚩尤𤣥女授帝金鉞以主煞此其始也牙旗黄帝出軍決曰牙旗者將軍之精金鼓者將軍之氣一軍之形候也即知牙旗之製始自置軍之時宜有征伐則置之也故孫權因之作黄龍大牙衣甲世本曰杼作甲杼或作輿少康子也墨子亦}
