  - {type: variant, offset: 8790, length: 3, content: 登高續, WYG: 世俗每至清明以麥或秫以杏酪煑為薑粥俟其凝冷裁作薄葉沃以餳若宻而食之謂之陵餻此即其起也玉燭寳典曰今人研杏仁為酪以煑凌粥以餳沃之即此也糉一名角黍風土記曰仲夏端午端初也以菰葉裹粘米以栗棗灰汁煑之令熟節日啖取隂陽尚包裹之象一曰因屈原也}
