  - {type: variant, offset: 9366, length: 11, content: 世俗皆文身作魚龍飛僊鬼, WYG: 但新衣而已叚成式酉陽雜俎曰明衣起于左伯桃也糧罌今喪家棺歛柩中必置糧罌者王肅喪服要記曰昔魯哀公祖載其父孔子問寧設五穀囊者公曰否也五穀囊者起自伯夷叔齊不食周粟而餓死恐其魂之饑也故設五穀囊吾父食味含哺而死何用此為又禮檀弓曰重主道也三禮圗曰重起于商代以飯唅餘粥以鬲盛之名曰重設之於庭恐}
