  - {type: variant, offset: 9717, length: 301, content: 殿則有階陛堂有階無陛春秋謂之路寢禮記與白虎通俱曰天子之堂史記秦始皇作朝宮渭南先作前殿阿房商君書有言天子之殿則是秦自孝公而來已云然矣蓋秦始曰殿也漢因之有函德明光諸名也堂演義曰堂當也當正向陽之屋又堂明也言明禮義之所管子曰軒轅有明堂之議春秋因事曰軒轅氏始有堂室棟宇則堂之名肇自黃帝也觀皇帝內傳曰帝置元始真容於高觀之上觀之言可以觀望於其上也周有兩觀春秋書雉門及兩觀災是也今俗謂之朵樓蓋周制也宅堯典曰宅嵎夷禹貢曰降丘宅土孟子曰五畝之宅戴延之西征記曰蒲坂城外有舜宅則宅之名始於堯帝之時矣邸宿也史記封禪書方士多言天子朝諸侯於甘泉作諸侯邸漢書曰代王馳入代邸是邸之義設起於漢也今謂諸王所居曰邸亦因代邸之說也第史記齊王自淳, WYG: 挽歌出}
