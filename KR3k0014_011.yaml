body:
  text: 軍伍名額部第五十一軍兵古者兵隱於農無軍民之別隋唐以來雖有府衛之制亦有番次入則為兵出則為農五代多故始刺其手至周太祖乃刺其面給以廩食自是兵民始分也禁兵自西魏始作府兵而其法備於隋唐唐兵志曰唐有天下兵勢三變其始盛時有府兵已而廢為彍騎又廢而為方鎮及其末也強臣悍將兵布天下而天子亦置兵於京師曰禁兵又曰唐承隋制置十二衛府兵及罷始置神策神武等軍曰禁軍此禁兵之始也涅面唐書劉仁恭傳曰天祐三年朱全忠自將攻滄州仕恭悉發男子十五已上為兵涅其面曰定霸都兵之涅面雖自周上皇始亦原於劉仁恭定霸之事也遞兵宋朝會要曰建隆二年五月詔諸州府以軍卒代百姓為遞夫先是天下郵傳率役平民至是太祖始盡易之三年正月又詔郡國起今後不得差道路居人充遞運腳力蓋遞鋪之以兵卒自宋朝太祖始也等樣建隆三年五月太祖以六師老壯不等乃搜揀強勇士謂之兵樣散降諸道令依樣招收其後募兵之制為木杖差以尺寸高下謂之等杖設旗及賞募之此其始也忠佐又曰五代有內外馬步軍都頭漢置都引進使宋朝去引進之名端拱二年又改曰御前忠佐指揮使唐書兵制曰禧宗幸蜀田令孜募神策新軍為五十四都離為十軍以左右神策軍大將軍為左右神策軍諸都指揮使此名指揮使之始也五代有鐵騎護聖等軍皆置指揮使自此諸軍皆有之蓋起於此也都頭又曰田令孜募神策新軍為五十四都頭以都將亦曰都頭此名都頭之初也後又有捧日都頭李筠自此以來諸軍之置都頭蓋取諸此也殿前諸班五代會要曰周顯德中世宗以驍勇之士多為外諸侯所占於是募天下武藝超絶及有身首者為殿前諸班因有散員散指揮使內殿直散都頭之員御龍等直宋朝會要曰太平興國二年詔改簇御馬直曰簇御龍直骨𨦃子真曰御龍骨𨦃子直以下不著所出者皆出宋朝會要捧日𨧱直雍熙四年五月改殿前司曰騎𨧱直指揮為捧日𨧱直驍猛為拱宸天武皇祐大饗明堂記云五代禁軍號控鶴年多者號寬衣控鶴太平興國中改控鶴為天武寬衣控鶴曰天武散手後又改為寬衣天武唐天寶有天武健兒今取此名五代會要曰梁開平二年十二月改左右天武為龍虎軍左右龍虎為天武軍額諸軍有控鶴蓋梁已有天武軍矣宋朝會要曰太平興國二年正月詔改控鶴曰寬衣天武也唐書孔緯傳有天武都頭李順節龍衛五代會要曰廣順元年四月改侍衛馬軍曰龍捷左右軍宋朝會要曰太平興國二年正月詔改龍衛宋朝舊有龍騎興國二年改為龍猛也神衛五代會要曰廣順元年四月改侍衛步軍曰虎捷左右軍御撰其名此虎捷名軍之始也宋朝會要曰乾德三年四月詔改西川感化耀武等軍為虎捷太平興國二年正月改虎捷曰神衛神勇宋朝會要曰太平興國二年正月改威雄曰雄勇至雍熙四年五月又改為神勇也捧日唐兵志中有捧日都頭李筠則是唐以捧日名軍也五代有鐵騎指揮宋朝會要曰太平興國二年正月改鐵騎曰日騎雍熙四年五月改日騎為捧日疑取唐軍名也小底宋朝會要曰至道二年九月帝閲試前所擇兵士驍騎試弓箭中者六十人以殿前小底為軍額步直又至道二年九月帝親閲步兵試槍槊掉刀中者百人以殿前步直為吉軍額殿虎雍熙四年五月改上鐵林為殿前司虎翼腰弩為神射步虎同前改侍衛步軍司鐵林曰步軍司虎翼神衛水軍大中祥符六年七月真宗謂近臣曰太祖朝多幸造船場製造兵棹蓋防水路用兵時神衛諸軍立水軍指揮以備其用蓋此軍額太祖時立也虎翼水軍真宗謂近臣曰水陸之兵有時而用不可久闕可以江浙淮南選取習水兵士立成指揮就彼置營其在京即於諸軍選江淮人習水者立充虎翼仍於金明池側置營即今虎翼水軍是也驍捷建隆二年十一月改左右雄捷左右騎武並為驍捷左右備征為雲騎左右平遠為廣捷左右懷德為懷順效順建隆四年八月賜河東樂平縣歸降人為效順懷恩五代會要曰周顯德二年十二月以新收復秦鳳所獲軍為懷恩軍則是周為懷恩軍名也宋朝會要曰乾德二年二月詔遼州降軍宜以效順懷恩為名用周事也雄武乾德三年九月二日諸道先奉詔於本城兵士內選擇驍勇者相繼到闕太祖親閲之中選者萬餘人馬軍以驍雄步軍以雄武為額克寧又九月五日令諸州本城各置克寧指揮歸聖開寶七年十一月詔李從善部下及江南水軍並令黥面籍以為王師以歸聖歸化為軍額保捷咸平四年九月詔陝西緣邊州軍兵士先選中者並升為禁軍名保捷廣捷咸平五年正月詔置廣捷軍伍指揮先是太宗開南方以標槍旁排為兵帝即位令蕭延皓取廣德兵習之至是試頗精練遂立是軍也忠勇咸平五年四月馬知節言州兵有不從王均為亂殺賊者賜名忠勇升為禁軍而月給依舊請選留材勇者餘復退為州兵帝曰既稱忠順安可斥退令增給如禁軍例崇武太平興國八年三月改濮州平海指揮曰崇武振武咸平五年五月命使臣分往邠寧等十一州於保安保敬軍內選有力者一萬人升為禁軍號振武景德元年七月𥳑集成四十指揮也神鋭咸平六年四月以河東州兵為神鋭神虎指揮先此自京師發禁旅戍河東數不足則取州兵材勇者補之十不得二三又弗整於是命張延禧料𥳑得三千人立為此軍令常教習忠敢景德四年十月三十日詔象州澄海指揮名曰忠敢以城守之功也大中祥符九年九月詔廣南東西荊湖南路選兵合澄海名曰忠敢分三指揮以備蠻寇奉先大中祥符四年五月真宗宣示永安指揮以奉諸陵軍額猶隸西京本城廂軍可賜名奉先升為禁軍寧朔祥符四年九月宣示咸平中朕因揀閲諸州招到兵士為有人材堪充馬軍者置寧朔指揮清衛祥符八年置左右清衛二指揮以奉宮觀從修玉清昭應宮司之請也十二月景靈宮會靈觀募置到廂軍詔立為清衛左右第二指揮寧海又八年三月詔名瓊州蠻蛋指揮曰寧海定功九年九月秦州曹瑋請選軍士堪充床子弩手者詔立為秦州定功指揮崇節天禧元年四月杭州言本城老浙兵指揮乞別立軍額詔以崇節為名建威又五月曹瑋言準詔於本城諸軍揀到秦州鄉士之人知山川道路諳識蕃情乞降軍額詔立充秦州本城建威指揮平河至道二年八月楊允恭引販私鹽三十九人見太宗曰此皆久習江湖宣團為平河指揮以備舟船閒用帶甲剩員太中祥符五年八月詔河東諸州軍昨𥳑隸剩員者如聞尚多強壯可併為帶甲剩員以備給使剩員真宗咸平五年七月四日以軍士三十三人隸剩員皆支體廢者不忍遽棄令廩給如故自是率以為例律風俗通曰皋陶謨虞始造律後漢張敞上疏曰皋陶造法律急就章曰皋陶造獄法律存也史記曰李悝造律晉刑法志曰秦漢舊律其文起自魏李悝撰次諸國法著法經唐書曰時所用律起自魏文侯師李悝然皆罪名也通典亦曰又以為商君受之以相秦至漢天下既定命蕭何次律令也孫奭律令義曰名例者漢九章散而未統魏始集罪例號為刑名晉賈充以刑名法例為篇北齊高睿并曰名例衛禁者晉始有衛宮之名北齊附以關禁隋勑蘇威更新律名衛禁職制者晉本名違制隋更曰職制戶婚者漢九章專為戶律北齊附以婚事名婚戶隋更曰戶婚廢廄庫者漢歷北齊或名牧産隋益以庫事名廄庫擅興者漢名興律魏陳群定法名興擅北齊改文從繕隋定曰擅興賊盜者魏李悝首制賊盜二法後魏曰盜律賊律北齊合為一周分為劫盜賊叛隋更名賊盜律鬭訟者後漢始析前世繫訊律為鬭律北齊附以訟律後周改鬭競隋後齊名詐僞者魏世始分賊律創名之後無改雜律者李悝首曰雜法後周更為雜犯隋去犯字還為舊名捕亡者李悝首制捕法後魏益曰捕亡北齊改曰捕斷後周易曰捕逃隋世復曰捕亡斷獄者李悝始造因法魏世分出此篇北齊合於捕斷後周復曰斷獄陳彭年唐紀曰太宗正觀二年正月丁亥朔房玄齡與法官刪定律十二卷五百條令二十卷比隋律減死入流九十二條減流入徒七十一條令說命曰王言惟作命不言臣下罔攸稟令是則王者之言下守之而為令也今令之文皆所守之事宜以此為始杜周曰前王所定著為律後王所定疏為令六帖云蕭何攟托法令宜於今者乃著令唐紀曰太宗正觀中房玄齡刪定法令三十卷一千五百條律疏唐刑法志曰自玄齡等更定律令訖太宗世無所更改高宗即位詔律學之士撰律疏則律疏蓋起自唐高宗時也宣宗時張戮以刑律分類為大中刑律統類故五代以來又有刑統刑尚書呂刑曰蚩尤作五虐之刑曰法至舜乃命皋陶明五刑也世本曰伯夷作五刑誤矣呂氏春秋又謂皋陶作刑也獄急就章曰皋陶造獄風俗通曰三王始有獄夏曰夏臺商曰羑里周曰囹圄博物志曰夏曰念室商曰動止周曰稽留臺獄唐書崔隱甫傳曰隱甫拜御史大夫初臺無獄凡有囚則繫大理正觀時李乾祐為大夫始置獄隱甫執故事罷之後患囚往來漏泄復繫除院則臺之置獄自李乾祐始也囚有罪而繫獄者曰囚疑古有之故詩泮水曰淑問如皋陶在泮獻囚赦虞書眚災肆赦則是赦之起蓋始於帝舜也斷屠唐刑法志曰武德二年詔斷屠日不行刑會要曰武德二年正月二十四日詔自今後每年正月五月九月及每月十齊日並斷屠按此則是斷屠之制起於唐高祖也杜佑集歷代沿革事為通典前此無文而首載武后聖歷二年事驗此可知也宋朝因之臨時限日云五刑唐刑法志曰隋已前死罪有五徒流之刑鞭笞兼用數皆踰百隋始定之為笞刑五自十至五十杖刑五自六十至百徒刑五自一年至三年流刑五自千里至三千里死刑二絞與斬並用為五刑皆今世循用者蓋自隋始也三代以劓刖剕宮大辟為五刑絞古者棄市周禮有罄於甸人之說秦曰磔漢文帝二年改曰棄市取刑人於市與衆棄之之義隋謂之絞則絞蓋興於周代矣斬尸子曰黃帝斬蚩尤於中冀黃帝內傳曰擒蚩尤於版泉之上帝以金鉞斬之則知斬起於軒轅也配舊云刺面而配起於周太祖世宗之代按王溥五代會要曰晉天福三年八月左街從人韓延嗣徒二年半刺面配華州發運務蓋唐雖有配流嶺南諸州之文此始有配法而刺面當起於是也加役流唐刑法志曰太宗即位長孫無忌議絞刑二十皆免死而斷右趾裴洪獻以謂五刑而刖足是六也於是除斷趾法為加役流蓋自唐太宗始也流黃帝內傳曰帝斬蚩尤懸首軍門以威天下其衆流於八荒之外即流刑之始也舜去四凶族流共工於幽州放歡兜於崇山竄三苗於三危殛鯀於羽山又其事也故舜典曰流宥五刑五流有宅徒周禮凡民有罪役諸司空即徒之始也孫奭律音又曰舊制犯徒者依年配犯流者流至配所居作皆不決杖宋朝建隆四年制徒者加杖免役流者加杖留住居役一年加役流三年也笞杖書曰鞭作官刑即笞之始也撲作教刑即杖之始也唐虞之盛與肉刑並用及漢齊太倉令淳于意有罪當刑少女緹縈上書文帝憐其意為除肉刑始專用笞杖也折杖宋朝會要曰建隆四年三月張昭請加役流脊杖二十配役三年流三千里脊杖十九二千五百里脊杖十八二千里脊杖十七並役一年徒三年脊杖二十二年半十八二年十七一年半十五一年十三杠一百臀杖二十九十十八八十十七七十十五六十十三笞五十杖十四十三十八下二十十七下舊據獄官令用杖受杖者皆背臀腿分受殿庭決者皆背受至是始折杖又徒流皆背受笞杖者皆臀受也孫奭律音又曰舊制應決杖笞者皆依數決之宋朝建隆四年始有折杖之制杖制又曰舊制杖皆削節目常行杖大頭二分七釐小頭一分七釐笞杖大頭二分小頭一分半皆長三尺五寸建隆四年張昭等定常行杖昭請官杖長三尺五寸大頭闊不過二寸厚及小頭徑不過九分小杖長四尺五寸大頭徑六分小頭徑五分今官府長用者是此蓋其始也桎梏山海經曰二負之臣曰危與二負殺窫窳帝乃桎之於疏屬之山桎其右足又曰大荒之中有宋山有木名楓蚩尤所棄桎梏也蓋此械已出黃帝時今枷錮即其遺事耳枷重宋朝會要曰淳化二年九月敕所司置枷徒流罪重二十斤死重二十五斤蓋舊制有長短而無斤重則枷之有等重自此其始也又景德四年五月河北提刑司勘事杖以下拒抗不招當枷問者未有定制請置枷重十五斤也梟首昔黃帝斬蚩尤懸首軍門此梟首之起也左傳曰叔孫昭子殺豎牛投其首寧威之上秦漢曰梟首始於黃帝之斬蚩尤顧野王玉篇曰梟首秦刑也今謂之簽首級贖世本曰夏作贖刑呂刑曰穆生訓夏贖刑則贖刑疑書名也按舜典曰金作贖刑注謂誤而入刑出金以贖則贖罪蓋始於虞氏也錮身春秋左傳曰會於商任錮欒氏也則禁錮之事已見於春秋之時故漢末有黨錮今以盤枷錮其身謂之錮身蓋出於此除名何法盛晉中興書曰胡母崇為永康令多受貨賂除名為民此事不他見疑始於晉免官後漢梁嵩為太僕作私書請託郡縣發覺免官按漢世三公有冊免則免官自漢始也胥吏附八條以吏為奉法者皆附於此堂後官宋朝會要曰堂吏自唐至五代率從京百司抽補開寶六年五月七日以武德縣尉姜宣義等充堂後官太祖知堂吏擅中書事權多為姦贓故令吏部選授堂吏用士人自此始也太平興國九年五月以將作監丞李元吉子佐為堂後官京官任堂吏自此始也十二月以王渾綦佩為贊善充職朝官之任堂吏自此始也神宗元豐五年行官制除堂後官之名於門下省中書省置録事而已通典曰唐武德中始於諸州調左吏遂促年限優以次序有至上縣尉者主書通典曰晉中書有主書之員齊為主書令史陳去令史之名北齊初曰主書令史文宣帝嘗立遣主書令史題署嫌其遲語曰但著主書何煩令史字自此除之也主事又曰主事二漢有之漢光祿勳有南北庭主事范遷光祿主事是也後魏於尚書諸司置主事令史隋煬帝去令史名但曰主事隨曹間劇每十令史置一主事雜用士人唐用流外都事又曰尚書有都令史隋皇初改為都事令史又曰令史漢官也漢官儀曰能通倉頡史籀篇補蘭臺令史漢韋彪疏曰往時楚獄大起故署令史以助郎職事也按史記項羽本紀曰陳嬰者故東陽令史則是秦有令史矣晉灼曰漢儀注令史曰令史丞吏曰丞史而周禮六官之屬皆有史以掌書書令史又曰晉宋蘭臺寺有正書令史北齊尚書郎判事正令史側坐書令史過事此蓋令史之始也教練唐會要曰大中六年五月敕天下軍府有兵馬處且選會兵法能弓馬人充教練使宋巨明皇二年蜀記曰天寶十五載正月十日楊國忠選監牧小兒於苑中教習請劍南舊將李福德劉光庭為教練使教練之日當由此出也鎮將通典曰鎮將後周之通班隋亦置其職微矣注云今以其卑賤故舉隋而已合謂唐也五代以來皆諸郡所白置宋朝始有宣授宋朝會要曰太平興國二年詔藩侯不得差親隨為鎮將自此皆用本州牙吏為之亦有宣補者是也布帛禮運曰昔先王食鳥獸之肉茹其毛未有絲麻衣其羽皮後聖有作然後治其絲麻以為布帛漢王逸機賦曰帝軒龍躍桑葉是創仰攬三光悟彼織女爰制布帛易曰黃帝堯舜垂衣裳而天下治蓋取諸乾坤孔穎達疏曰以前衣皮其制短小今衣絲麻布帛所作衣裳長大故云垂考此則布帛自黃帝制也五采董巴輿服志曰上古衣毛而冒皮後聖易之以絲觀翬翟之文榮華之包乃染帛效之始作五采成以作服易以黃帝堯舜垂衣裳取諸乾坤乾坤有文則五采與衣服同興矣錦拾遺曰員嶠山環丘有冰蠶霜覆之然後成繭其色五采唐堯之時海人織錦以獻後代效之染五色絲織以為錦丹陽記曰歷代尚未有錦而成都獨稱妙蓋始於蜀記也蜀自秦昭王時通中國而三代已有錦見於禮多矣王嘉所記為近之繡事始曰錦繡西施造非也虞書舜命禹曰豫觀古人之象日月星辰山龍華蟲作會宗彝藻火粉米黼黻絺繡以五采彰施于五色作服汝明正義云舜令禹制繡以五種之彩明施於五色制作衣服則帝舜始為繡也纈事始曰夾纈徹子造二儀實録曰秦漢閒有之不知何人造陳梁閒貴賤通服之潘氏紀聞談曰唐代宗寶應二年吳皇后將合袝肅宗陵啓舊堂衣服繒綵如撮染成花鳥之狀玄宗柳婕妤妹適趙氏性巧因使工鏤板為雜花打為夾纈初獻皇后一匹代宗賞之敕宮中依樣製造當時甚祕後漸出遍天下此似始為夾纈之制也錢管子又曰湯七年旱禹五年水湯以莊山禹以歷山之金並鑄幣以救人困至周太公立九府圜法始名以錢錢圓含方輕重以銖起於禹湯水旱之救民困也後魏高謙之以為堯遭大水鑄錢故馮鑑謂錢起於堯也金玉管子又曰玉起於禹代金起於江漢珠起於赤野大錢國語周景王時患錢輕更鑄大錢韋昭注云徑一寸二分重十二銖文曰寶貨以勸農贍不足也而百姓蒙利後世權一時之用亦或行之事已輒罷蓋大錢肇於周景王也鐵錢通典曰王莽改革漢錢百姓皆不便之公孫述廢銅錢置鐵官鑄鐵錢則以鐵為錢始於公孫述之據蜀也皇甫士安高士傳曰史弼迎送郭泰也輒再屈其泰一揖而去門人問之弼曰鐵錢曰故以二當一爾此漢末事也今鐵錢止行於川峽而二當銅錢之一自爾時已然也錢文錢貨之典尚矣周自太公立九府圜法其文無見景王鑄大錢班固云文曰寶貨秦漢則半兩五銖王莽則貨泉貨布後魏孝文太和十九年公鑄粗備文曰太和五銖又孝莊用楊福計永安二年福更鑄文曰永安五銖自是始以年號鑄於錢文唐會要曰武德四年七月十日廢五銖錢行開元通寶錢自此又以通元為文高宗乾封中則曰乾封泉寶肅宗乾元時則曰乾元重寶五代會要曰晉天福三年十一月詔鑄錢以天福元寶為文及僞蜀之制有光天咸康通正天漢乾德之號皆曰元寶至於宋朝每改元又更鑄其號於錢文矣蓋錢文之以年自後魏孝文太和始也以寶者自周景王大錢始也以通者自唐高祖武德始也以重者自肅宗乾元始也以元者自晉高祖天福始也錢陌自古用錢貫皆以千百皆以足梁武帝時自破嶺以東八十為陌名東錢江郢以上七十名西錢京師九十名長錢大同元年詔通用足而人不從錢陌益少末年遂以三十五為陌錢以八十為陌蓋自梁始也其事見通典唐昭宗時京師用錢八百五十為貫河南府以八百為貫筆談曰漢隱帝時三司使王章每出官錢以七十七為陌為之省陌蓋自五代漢始也兌便唐食貨志曰憲宗時商賈至京師委錢諸道富家以輕裝趨四方合券乃取之號飛錢京師尹裴武禁之盧坦請許商人於三司飛錢每十增給百令大府給公據次以字號兌便如盧坦請曰鈔錢蓋唐飛錢之舊也起於憲宗之世蹺墊又曰憲宗朝吳元濟王承宗拒命經費盡竭皇甫鎛建議內外用錢每緍墊二十民閒墊陌至七十穆宗即位來米鹽每陌錢墊七八所在用錢墊不一詔從風俗所宜則蹺之起自唐皇甫鎛也今俗謂明除者為蹺暗蹺者為墊甲跡今開元通寶錢縵上有文如初月者談賓録曰武德初行開元通寶錢初進樣日文德皇后搯一甲因不復改唐會要曰武德四年七月十日行開元通寶錢歐陽詢制辭及書字合八分篆隸三體回環讀之其亦通俗謂之開通元寶鄭虔會粹云詢初進蠟樣日文德皇后搯一甲跡故錢上有搯文熙寧中劉斧撰青瑣集則謂事由明皇楊貴妃而天下謂之曰兒錢謬矣彼徒見錢文有開元字便謂明皇開元事爾亦不考實之過也火禮會文嘉曰燧人始鑽木取火炮生為熟令人無腹疾遂人之意故名燧人世本曰燧人鑽木造火尸子曰燧人上觀星辰下察五木以為火淮南子曰燧人望辰心鑽木生火拾遺記曰遂明國有大樹名遂後世聖人至其國息其下有鳥啄粲然火出聖人感之用小杖鑽火號燧人氏河圖云伏羲禪於伯牛鑽木作火非也白虎通曰謂之燧人何鑽木燧取火遂人之始燈黃帝內傳曰王母授帝九華燈檠於是燈有檠則注膏油以為燈明其前有也法燭漢淮南王招致方術之士延八公等撰鴻寶方畢方法燭是其一也餘非民所急故不行於世然則法燭之起自劉安始也針禮記內則有紉針請縫之事由此考之當是自始制衣裳則宜有針線矣帝王世紀曰太昊制九針由此始繩易曰上古結繩而治書序曰伏犧造書契以代結繩之政則是繩出於太昊之前高氏小史曰燧人氏時結繩刻木以記事則繩自燧人氏始也沐浴世本曰秦穆公作沐呂氏春秋曰禹一沐三握髮史記亦以稱周公則禹時有其事非秦穆公作也木人仙傳拾遺曰始自黃帝臣左徹帝升天乃刻木為帝狀率諸侯而朝之此刻木像人之初也金人史記曰范蠡越王句踐之相也既雪會稽之恥乃乘扁舟泛五湖越王思之鑄為其像則金為人始於句踐也漢世胸奴休屠王乃有祭天金人後世以銅鐵鑄佛像自句踐始也流杯束皙對晉武帝問曲水事曰周公卜成洛邑因流水以泛酒故逸詩曰羽觴隨流晉以來三月三日曲水流杯即其始隋大業記煬帝大修水飾以小舟行觴及唐豪貴作池亭引水為之也銘蔡雍曰黃帝有金几之名王子年拾遺記曰黃帝以神金鑄器皆有銘題凡所造建皆記其年時此銘之起也華表古今注曰程雅問堯設誹謗之木何也曰今之華表以木交柱頭狀如華形似褐褉之狀或謂之表木應劭曰今宮外橋梁頭四柱木是也尸子曰堯立誹謗之木韋昭曰愚政事有缺失使言事者書之於木凡交衢道路悉施焉後世以石易之第取其觀瞻而已後人立於冢墓之前以紀其識也書函吳張溫使蜀謂先主曰謹奉所函書書之有函不前見疑自漢有也土龍淮南子曰土龍致雨許慎注云湯遭旱作土龍山海經曰應龍殺蚩尤及夸父不得復上故數旱旱而作應龍之狀乃得雨注云今之土龍取之則是湯作土龍述黃帝之事童謠列子曰堯微服游康衢聞童謠曰立我蒸民莫匪爾極則童謠之起自堯時已然也樓羅幹事之稱也演義曰樓攬也羅綰也言人善當荷幹辦於事者能樓攬羅綰遂謂之樓羅酉陽雜俎曰段成式在祕丘見同官說樓羅因天寶中進士有東西棚各有聲勢稍傖者多會於酒樓食畢羅故有此語成式讀梁元帝風人辭云城頭羅雀樓羅人著則知樓羅之言其起已久城頭網張雀樓羅會人著稱漢演義曰今俗罵人曰漢蓋晉末胡亂中原故胡人罵中國曰漢兒南人罵北人為胡為虜華夷自太始太素已還有國號者至多獨以漢名曰取兩漢盛者也按三代而上華夷之勢遠不相接雖春秋之閒驪戎赤狄附見諸國然分土而守者大小尚二百餘其語難以一二指不得以一國名也至漢天子大同而武帝征討四夷專事胸奴由此有胡漢之斥也正如天竺文字自漢始至中國歷代非無翻譯之事其言梵語者必對以唐言則其事至唐而備所講求專故也無恙又演義曰時人以無憂疾謂之無恙神異經曰北方大荒中有獸食人咋人則病羅人則疾名曰㺊㺊恙也常近人村落入人屋室人皆患之黃帝殺之由是此方人方得無憂疾謂之無恙此其始也不下驢演義曰北齊湯愔字遵彥為吏部尚書昔遭屯厄一餐之惠酬答甚厚性命之讎赦而不問及典選多以貌言恩舊時致謗曰有選人魯漫漢自言獨不見識愔曰前日在元子思方騎禿尾草驢以方麴障面見我不下驢何云不識竟不為選用今俗以惡己者謂何處見不下驢蓋起於此今或有此語麻胡朝野僉載曰後趙石勒將麻胡性虎險鳩毒有兒啼每輒恐之麻胡來啼聲絶本草拾遺曰煬帝將幸江都命麻胡濬汴河以木鵝試波深淺止皆死每兒啼言麻胡來自止人畏若是演義曰今俗以麻胡恐小兒俗傳麻胡祜為隋煬帝將軍開汴河甚毒虐人多懼之胡祜聲相近以此呼之耳誤矣會稽録云會稽有鬼號麻胡好食小兒腦遂以恐小兒若麻祜可以恐成人豈獨小兒也姬妾顏師古注漢書曰姬者周之姓貴於衆國之女所以婦人美號皆稱姬焉左氏傳曰雖有姬姜無棄憔悴姜亦大國女後因總謂衆妾為姬史記云高祖居山東時好美姬是也按魏信陵君賂如姬竊兵符奪晉鄙兵如姬魏王幸妾也當戰國時所云耳奴婢說文曰奴婢古罪人也論語曰箕子為之奴周禮有女奚宜三代之制摸棱世人以依違不正辨為摸棱按唐書蘇味道居相位不能有所發明依違取容而已嘗謂人曰處事不欲明白決斷若有差誤必貽咎譴但摸棱以持兩端時人號曰蘇摸棱或曰味道為相人所咨決無所可否依違嗤㗅以手摸所坐床故曰摸棱蓋此語之始自味道也墜子晉石崇有妓名緑珠趙王倫之亂孫秀使人求之王與秀收之珠墜樓而死後人因目姬侍為墜子由此始也占稻江淮之閒有稻粒稍細耐水旱而成實早作飯差硬土人謂之占城米真宗嘗植於苑中始自占城國傳其種遂植南方也宋朝會要曰大中祥符五年五月遣使福建取占城禾分給江淮兩浙漕并出種法令擇民田之高者分給種之僧文瑩湘山野録曰真宗聞占城稻耐旱遣使以珍貨求其種播之始植於後苑也胡麻筆談曰胡麻只今油麻也中國之麻謂之大麻張騫始自大宛得油麻種亦謂之麻故以胡麻別之謂漢麻為大麻則是油麻亦自漢始來中夏矣然本草已載胡麻未知孰是陶隱居注本草云本生大宛故名胡麻波棱劉公嘉話録曰波棱菜西國有僧將其子來韋絢云豈非頗陵國來語訛為波棱也唐會要曰尼婆羅國獻波棱類紅藍實似蒺藜也胡荽博物志曰張騫使大夏得胡荽鄴中記曰石勒改曰香荽大蒜切韻曰張騫使西域得大蒜而還則自漢始有之也諸葛菜今所在有菜野生類蔓菁葉厚多歧差小子如蘿蔔腹不光澤花四出而色紫人謂之諸葛亮菜劉禹錫嘉話曰諸葛所止令軍士種蔓菁何韋絢云莫不是取其才出可生啖一也葉舒可煮食二也久居隨以滋長三也棄去不惜四也回則易尋而採五也冬則有根可斸食六也此蔬其利不亦博乎禹錫曰信矣蜀人呼蔓菁為諸葛菜蘭香本名羅勒後趙石勒以羅勒犯己名改為蘭香至今以為名也苜蓿本自西域彼人以秣馬張騫使大夏得其種以歸與葡萄並種於離宮館傍極茂盛焉蓋漢始至中國也牛尾蒿右丞相傳曰漢祖為兒時牧牛中野與群童戲殺牛以烹之埋其尾僞報其家云牛忽陷地家人共引之其皮骨愈深入於地後其處生蒿作尾形也金錢花酉陽雜俎曰毗尸沙一名日中金錢花本出外國梁大同二年進來中土也牡丹隋煬帝世始傳牡丹唐人亦曰木芍藥開元時宮中及民閒競尚之今品極多也一說武后冬月遊後苑花俱開而牡丹獨遲遂貶於洛陽故今言牡丹者以西洛為冠首劉公嘉話云世謂牡丹花近有蓋以前朝文士集中無牡丹歌詩禹錫嘗言楊子華有書牡丹處極分明子華北齊人則知牡丹花亦久矣酉陽雜俎曰前史中元說牡丹唯謝康樂集中言竹閒水際多牡丹段成式檢隋種植法並不記說則知隋朝花中所無開元末裴士淹使幽冀至汾州衆香寺得白牡丹植於長興私第為都下奇賞至德中馬僕射又得紅紫二色者移於城中青瑣集有隋朝海山記中載牡丹品甚多而前賢所說如此一捻紅今牡丹中有一捻紅其花葉紅每一花葉端有深紅一點如半指明皇時民有以此花上進者值妃子正作妝偶以妝指捻之燕脂之痕染焉植之明年花開俱有其跡亦見明皇雜録也劉寄奴金瘡藥也昔宋武帝劉裕微時伐荻新洲射大蛇傷明日復往聞杵臼聲見數青衣童搗藥問之答曰我主為劉寄奴所射今合藥敷之帝曰王何神不殺之叱之皆散收得藥時人因此名其草曰劉寄奴也寄奴帝之小子何首烏本曰夜合藤昔有姓何人見其葉夜交異於餘草意其有靈採服其根老而不衰頭髮愈黑即因之名曰何首烏也一曰即其人姓名羊負來博物志曰洛中有人驅羊入蜀胡枲子著羊毛蜀人種之曰羊負來故今人亦以名枲耳也陶洪景本草注曰昔中國無此言從外國逐羊毛中來因以名也麇銜本草曰麇春日遊此既多即瘦瘠食此物乃復肥盛因即事名曰麇銜鹿活草酉陽雜俎曰天名精也昔青州劉𢣺宋元嘉中射鹿剖五藏以此草塞之踞然而起𢣺怪而拔草則復倒如此三度因密録種之主傷折俗呼劉𢣺草亦曰鹿活異苑所載正同但以為鹿草也丁公藤南史解叔兼鴈門人母有疾夜於庭中稽顙祈告聞空中云得丁公藤治即差訪醫及本草無之至宜都山中見一老翁伐木云是丁公藤治風乃拜泣求得之及漬酒法受畢失翁所在母疾遂愈蓋自是始傳丁公藤也本草謂之南藤蓋宋朝附之於經云威靈仙唐會要曰德宗正元二年九月鄧思齊獻威靈仙草能愈衆疾上於禁中試有驗今編附本草史君子唐潘州郭史君多以此療兒得其效時人因其刺史所用治小兒故曰史君子本草曰俗傳始因潘州郭史君療小兒多是獨用此物後來醫家因號史君子訶子本出南海諸番國胡人謂之訶梨勒後趙時避石勒名改曰訶子故今猶云然也山藥即本草所謂薯蕷者也唐避代宗嫌名故民閒呼薯藥至宋朝嘉祐八年四月英宗即位人避嫌諱遂改曰山藥自此全失其本稱矣牽牛本草補注曰始出田野人牽牛易藥故以名之安石榴其生自西域漢武時博望侯窮河源回得其種遂傳中國也陸機與弟書曰張騫為漢使外國十八年得塗林蓋安石榴也博物志曰張騫使西域回所得葡萄亦出於大夏蓋與石榴同來中土漢書西域傳曰漢使歸葡萄苜蓿種來是也酉陽雜俎曰庾信謂魏使尉瑾曰在鄴大得葡萄奇有滋味瑾曰此物實出於大宛張騫所致有黃白黑三種西域釀以為酒在漢似亦不久杜陵田五十畝中有葡萄百樹橘奴後漢李衡好貨殖將死其妻憂貧衡曰吾洲上木奴可了千匹絹妻素不聞其有也曰此當謂橘耳衡嘗於洲上植橘千株故也後代緣有橘奴之語六帖曰李衡種甘橘千樹號千頭木奴也金桃唐會要曰正觀九年十一月康國獻金桃詔令植於苑又云康國獻黃桃大如鵝卵其色如金亦曰金桃然則唐世始傳金桃也通典作康居云正觀二十一年胡桃補注本草曰胡桃古今多言張騫自西域將來與苜蓿等物同至中華也博物志曰張騫使外國回乃得胡桃也晉劉陶母書胡桃本生西羌也萍藻淮南子曰海閒生屈龍屈龍生容華容華生蔈蔈生萍藻萍藻生浮草凡根交者生於浮草許慎注云海門浮草之先也酉陽雜俎作海閒生屈龍屈龍生容華容華生蔈蔈生藻藻生浮草玄駒古今注曰蟻名玄駒何也曰河內人並河見人馬數十萬皆如黍米動遊人以火燒之人皆蚊蚋馬皆大蟻今人名蚊蚋曰黍蟻曰玄駒宜自漢始也揚雄法言曰吾見玄駒之步去一云元駒非也齊女又古今注牛享問蟬名齊女者何也齊王后怨王而死尸變為蟬登庭樹嘒唳而鳴王悔恨故世名蟬曰齊女膾殘越王句踐之保會稽也方斫魚為膾聞有吳兵棄其餘於江化而為魚猶作膾形故名膾殘亦曰王餘魚烏賊酉陽雜俎曰海人言昔秦王東遊棄筆袋於海化為此魚中猶有墨而作袋形古今注云一名河伯變事小史懶婦東海有之昔有婦惰女織姑責之恚恨自溺於海化為魚弱而多膏海人有得之者烹其膏以然燈照紡績則暗而無光或以照管絃嬉戲則爛然矣酉陽雜俎云名奔䱐一名瀱彭越似蟹而小世傳漢醢彭越以賜諸侯九江王英布獵得之不忍視盡以覆江中化而為此故名彭越啄木古今異傳曰啄木本雷公採藥吏為此鳥也逃河鵜鶘也本草曰身是水沫唯胸前兩塊肉如拳云昔為人竊肉入河化為此身今猶有肉因名逃河精衛山海經曰炎帝之女度海溺死其魄化為鳥為此常銜西山木石以填東海報其冤也杜宇蜀王本紀曰鱉靈死其尸逆江而流至蜀王杜宇以為相宇自以德不及靈傳位而去其魄化為鳥因名此亦曰杜鵑即望帝也亦見杜甫李商隱詩盧永城都記曰蜀王杜宇稱望帝好稼穡治郫城死化為鳥曰杜鵑婆餅昔人有遠戍其婦山頭望之化為石其母為餅將以為餉使其子偵之恐其焦不可食也往已無及矣因化此物但呼婆餅焦也今江淮所在有之野雞即雉也自漢呂后稱制避其諱故也漢高后紀注后諱雉之字野雞顏師古曰呂后名雉字娥姁故臣下諱雉至唐高宗諱治又帝小字雉奴故相承避至今也伯勞酉陽雜俎曰伯勞博勞也相傳伯奇所化右軍晉右將軍王羲之好鵝在會稽山陰道士養群鵝羲之每就玩之道士曰為寫黃庭經當以相贈羲之欣然寫畢籠鵝而去今人誤以鵝為右軍緣此故厄子世云衛靈公好乘驢車故世目驢為衛子或曰晉衛珍好乘跛驢為戲當時稱驢為衛子以譏珍故有蹇衛之稱蹇跛也馬齒事始曰唐正觀中有牝馬三千匹於隴西置群牧使開元初張萬歲緝其政恩信大行既沒衆以張氏諱因以馬歲為齒或言倍二向三也謝豹酉陽雜俎曰號郡有蟲名謝豹常在深土中司馬裴沈子掘坑獲之小類蝦蟆圓如毬見人以前腳交覆首如羞狀能穴地如蚡鼠頃刻深數尺或出地聽謝豹鳥聲則腦裂而死俗因名之或曰謝豹人也抱恥死其魄為蟲潛行地中羞見人故也或掘出之猶以足覆面作忍恥狀然不詳其何時人也幼歲聞故老言如此也今人有恥辱事或自以手掩其面或人以手排己面是也狡山海經曰玉山有獸其狀如犬而豹文其角如牛其音如吠犬見則其國大穰畢方義章山有鳥其形如鶴一足赤文白喙自呼其名曰畢方見之者主有壽也鹿蜀杻陽山有獸狀如馬而白首虎文赤尾其音如人歌謠名曰鹿蜀人佩其皮尾宜子孫𤡆𤡆拘扶山有獸狀如犬而六足尾長丈餘名曰𤡆𤡆其鳴自呼取其皮可禦瘴癘䖺䗤音條容蜀山塗水東南流於江中有䖺䗤狀如黃蛇魚鬣入水有光見則其邑旱犰㺄餘峨山有獸狀如兔鳥喙鴟目蛇尾遇人則佯服名曰犰㺄其鳴自呼見則蝗蝻為害鶡上黨諸山中多鶡似雉而大青色頂有毛角健鬭至死而止古之為將士者取其毛尾插於胄上今軍士插雉尾即此也
