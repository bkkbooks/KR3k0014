body:
  text: 農業陶漁部第四十五田畝詩疏曰易繫辭稱神農始作耒耜則田起神農矣通典曰黃帝始立步制畝是田以畝計起自軒轅也司馬法以六尺為步步百為畝顧野王云秦孝公以二百三十步為畝今又二百四十步也青齊諸部又以三百六十步為一大畝云田業三代之民皆受田於公其所受之田乃王田也一夫一婦受地百畝秦孝公任衛公孫鞅廢井田開阡陌民得賣買而天下之田為私業此民田業賣買之始也耕周書曰神農之時天雨粟帝耕而種之黃帝內傳曰帝升為天子地神獻草木述播種之利因廣耕則耕蓋始於炎帝種淮南子曰神農始教民播種五穀相土地之宜帝王世紀曰炎帝始教天下耕種五穀而食故黃帝述播種之利也呂氏春秋曰后稷作稼注云烈山氏子曰柱能植百穀蔬菜梁陶洪景本草序曰昔神農氏之王天下造耕種以省穀耒耜易繫辭曰包犧氏沒神農氏作斫木為耜揉木為耒耒耜之利以教天下蓋取諸益禮含文嘉亦曰神農作耒耜古史考亦云而世本則曰倕作又以為咎繇作非也白虎通曰古者人食禽獸肉神農時人多禽獸不足神農乃因天時地利制耒耜教人農作高氏小史亦云炎帝種五穀為耒耜以利百姓犂山海經曰稷降以百穀種之弟曰台璽生叔均叔均生是代其父及稷播百穀始作耕又曰后稷百穀之孫曰叔均是始作耕注云用牛犂也是則耕之用牛自叔均始矣後魏賈協齊民要術曰趙過始為牛耕實勝耒耜之利崔實正論曰漢武帝以趙過為搜粟都尉教民耕植其法三犂共一牛一人將之下種挽耬皆取備焉又牛耕之始自趙過也然崔賈之論為有所由爾樓犂魏略曰皇甫隆為燉煌太守民不曉耕隆乃教民作樓犂省力過半鉏周書曰神農天雨粟帝種之作鉏耨以墾草莽然後五穀興則鉏蓋神農造也詩臣工曰痔乃錢鎛注鎛耨也世本曰倕作耨釋名曰鋤類爾雅釋器斫斸謂之定李巡曰鋤也廣雅曰鋤謂之耨然則耨即鋤矣鎌說苑曰孔子聞吾丘子振鎌帶而哭然則三代之田器也碓桓談新論曰伏犧制杵臼之利後世加巧因借身踐碓而利十倍則碓蓋起於杵臼之遺法也磑世本曰公輸般作磑今以礲穀首自山而東謂之磑江浙之閒或曰礲編木附泥為之所以破穀出米矣磨方言曰磑謂之䃀錯碓切說文曰䃺石磑也方言磑以䃀為磨則磨以磑而作也蓋起於公輸作磑之後䃺古磨字碾後魏書云崔亮在雍州讀杜預傳見其為八磨嘉其有濟時用遂教民為碾此疑碾之起也杵臼桓談新論云伏犧制杵臼世本乃云雍父作舂杵臼呂氏春秋曰赤冀作杵臼皆非也黃帝內傳曰帝既斬蚩尤因創杵臼易繫辭曰神農氏沒黃帝堯舜氏作斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過此疑杵臼之始也唐韻作羅父作杵臼舂世本曰雍父作舂黃帝臣也水車魏略曰馬鈞居京都城內有地可為園無水以灌之乃作翻車令童兒轉之而灌水自覆今田家有水車天旱時引水溉田者即此器也詳此則其制起自魏馬鈞也而漢靈帝使畢嵐作翻車設機東以引水灑南北郊路又為自畢嵐所制矣未知孰是蠶絲搜神記曰上古時有人遠征家惟一女與馬女思父戲馬曰汝能迎得吾父吾將嫁汝馬乃絶韁去得父還後馬見女輒怒父怪之女具以答父大怒殺馬曝其皮女至皮所忽蹶然卷女而行後於大樹枝得女及皮盡化為蠶既死因名其樹曰桑桑喪也此蠶桑之始也皇圖要記曰伏犧化蠶為絲又黃帝四妃西陵氏始養蠶為絲機䇡淮南子曰伯余之初作衣也絲麻索縷手經指絓後世為之機䇡體服以便此機䇡之始也注伯余黃帝臣一曰伯余黃帝也織黃帝內傳曰帝既斬蚩尤蠶神獻綵絲稱織絍之功因之廣織於此言廣明其前有黃帝廣之爾一云淮南子言伯余之初作衣絲麻索縷手經指絓蓋織之始也陶周書曰神農作陶尸子曰夏桀臣昆吾作陶呂氏春秋亦曰昆吾作陶高誘云昆吾高陽後吳回黎陸終之子為夏伯制作陶冶埏埴為器也然黃帝時有寧封人為陶正則陶始於炎帝明矣冶古史考曰燧人鑄金作刀金即冶也而周書以謂神農作冶尸子以謂造冶者蚩尤也按禮曰昔先王未有火化後聖修火之利範金合土此冶之始也蓋始於鑽木造火之後漁尸子曰燧人之世天下多水教人以漁易繫辭曰包犧氏之王天下結繩而為網罟以佃以漁蓋取諸離然則自太昊始也釣易稱太昊以佃以漁然釣以漁事蓋易以結網而漁為包犧作則尸子所云燧人教人以漁其釣之為漁當為此乎獵尸子曰伏犧之世天下多獸教人以獵易繫辭亦言包犧氏以佃以漁則獵始於太昊也羅世本曰包犧臣句芒作羅羅鳥罟也網古史考曰伏犧氏觀蒙面而作網世本曰句芒作易繫辭曰包犧結繩為網罟抱朴子曰太昊師蜘蛛而結網網魚罟也孟詵錦帶前書伏犧始為網罟高氏小史曰太昊作罟網以取禽獸五穀周書曰神農之時天雨粟是則初有五穀之始也高氏小史云炎帝種五穀故謂之神農穀食賈誼雜說曰神農嘗百草之實教民食穀藝文類聚曰神農時民始食穀加於燒石之上而食醴酪古史考曰古有醴酪禮運曰昔先王未有火化後聖有作然後修火之利以為醴酪注云蒸釀之也酪酢胾蓋其物出自燧人作火之後爾酒酒經曰空桑穢飯醞以稷麥以成醇醪此酒之始也呂氏春秋曰狄儀作酒醪變五味戰國策曰狄儀帝女造酒進之於禹甘之遂疏狄儀古史考亦曰狄儀造酒博物志曰杜康造酒魏武帝詩曰何以解我憂惟有杜康酒玉篇曰酒杜康所作陶潛集述酒詩序曰狄儀造酒杜康潤色之而黃帝內傳王母會帝於嵩山飲帝以護神養氣金液流暉之酒又有延洪壽光之酒然黃帝時已有其物但不知杜康何世人而古今多言其始造酒也一曰少康作秫酒蠟茶楊文公談苑云蠟茶出建州陸羽茶經尚未知之但言福建等州未詳往往得之其味極佳江左日近方有蠟面之號丁謂北苑茶録曰創造之始莫有知者質之三館檢討杜鎬亦曰在江左日始記有研膏茶歐陽修歸田録亦云出福建不言所起按唐氏諸家說中往往有蠟面茶之語則是自唐有之也龍茶談苑曰龍鳳石乳茶宋朝太宗皇帝令造江左乃有研膏茶供御即龍茶之品也北苑茶録曰太宗太平興國二年遣使造之規取像類以別庶飲也小團歐陽修歸田録曰茶之品莫貴於龍鳳謂之團茶慶歷中蔡君謨為福建漕始造小片龍茶以進其品絶精謂之小團又龍茶録後序曰團茶為茶之至精而小團又團茶之精者蔡君謨始造歲貢云京鋋談苑曰江左李氏別令取茶之乳作片或號京鋋的乳及骨子等是則京鋋之品自南唐始也苑録曰的乳以降以下品雜鍊售之唯京師去者至真不雜為時所貴意其名由此得也又云或曰開寶末方有此茶當時識者云金陵僭國唯曰都下而以朝廷為京師今忽有此名其將歸京師乎石乳北苑茶録曰石乳太宗皇帝至道二年詔造也炙周書曰黃帝始燔肉為炙炮古史考曰燧人鑽火人始裹肉而燔之曰炮也華物晉陸士衡餉張華鮓華開器便曰此龍肉也試以苦酒灌之必有異試之有五色光起今人誤以鮓為華物由此故也六帖云煮鹽世本曰宿沙氏煮海水為鹽宋衷曰宿沙衛齊靈公臣齊近海故衛為魚鹽之利或曰宿沙氏炎帝時諸侯唐韻曰古者宿沙初作煮海為鹽食熟古史考曰古初之人未有火化飲血茹毛有聖人以火德王造作鑽燧出火教人熟食號曰燧人禮含文嘉曰燧人始鑽木以取火炮生為熟也拾遺記曰庖犧變茹腥之食高氏小史燧人氏時茹生人多病乃鑽燧改火化生為熟食卵瑞應圖曰有虞氏馴百禽夏后之世民始食卵鳳皇乃去此蓋食卵之始也飯周書黃帝始蒸穀為飯也粥又曰黃帝始烹穀為粥糕周禮籩人羞籩之實糗餌粉餈鄭康成云二物皆粉稻黍米所為合蒸曰餌餅之曰餈蓋餌即糕也玉燭寶典曰秋食餌者其時黍秫並收因以黏米佳味觸類嘗新遂成積習禮月令有嘗新之事疑周制也西京雜記曰戚夫人侍兒賈佩蘭說宮內時九月九日食餌令人長壽故今人以為俗方言曰餌糕或謂之餈續事始引干寶注曰糗餌者或屑而蒸之以棗豆之味同食麥糕鄴中記云并州之俗冬至一百五日為介子推冷食作乾粥食之故謂之寒食乾粥即今之麥糕是也世俗每至清明以麥成秫以杏酪煮為薑粥俟其凝冷裁作薄葉沃以餳若蜜而食之謂之麥糕此即其起也玉燭寶典曰今人研杏仁為酪以煮麥粥以餳沃之即此也粽一名角黍風土記曰仲夏端午端初也以菰葉裹黏米以栗棗灰汁煮之令熟節日啖取陰陽尚包裹之象一曰因屈原也齊諧記曰原以五月五日投汨羅楚人哀之每至此日以筒貯米祭今市俗置米於新竹筒中蒸食之謂之裝筒其遺事亦曰筒稯齊諧又記曰今世人五月五日作粽汨羅之遺風也異苑曰粽屈原姊所作饅頭稗官小說云諸葛武侯之征孟獲人曰蠻地多邪術須禱於神假陰兵一以助之然蠻俗必殺人以其首祭之神則嚮之為出兵也武侯不從因雜用羊豕之肉而包之以麵象人頭以祠神亦嚮焉而為出兵後人由此為饅頭至晉盧諶祭法春祠用饅頭始列於祭祀之品而束晳餅賦亦有其說則饅頭疑自武侯始也餅晉束晳餅賦曰禮仲春天子食糕而朝事之籩煮麥為麵內則諸饌不說餅然則餅之作其來遠矣按漢書百宮表少府屬有易官主餅餌又宣帝微時每買餅所從買者輒大售說苑敘戰國事則餅蓋起於七國之時也胡餅續漢書曰靈帝好胡餅京師皆食胡餅胡餅之起疑自此始也然則餅有胡漢之異矣胡餅蓋今俗所為者是而漢餅疑是今餅也後趙石勒諱胡改為麻餅蒸餅秦漢逮今世所食初有餅胡餅蒸餅湯餅之四品惟蒸餅至晉何曾所食非作十字折則不下箸方一見於此以是推之當出自漢魏以來也湯餅魏晉之代世尚食湯餅今索餅是也語林有魏文帝與何晏熱湯餅即是其物出於漢魏之閒也不托束晳餅賦曰朝事之籩煮麥為麵則麵之名蓋自此而出也魏世食湯餅晉以來有不托之號意不托之作緣湯餅而務簡矣今訛為餺飥亦直曰麵也黃兒唐五行志曰黃巢未入京時都人以黃米及黑豆屑蒸食之謂之黃賊打黑賊唐都長安今自陝而西以黃米為粉團棗蒸之曰黃兒其蕎麥麵者曰黑兒蓋出於此也鹽豉廣雅曰苦李作豉廣志曰苦秦豉則豉自一物爾謝承後漢書羊續為南陽太守鹽豉共器三輔決録曰南陽舊語曰前隊太守范仲公鹽豉蒜果共一筒史記貨殖傳曰糵麴鹽豉千答蓋四物也今京俗謂豉曰鹽豉或因此云然晉世已為此名世說武子云千里蓴羹未下鹽豉藏冰周公遭變陳后稷先公致王業之艱難其詩曰二之日鑿冰冲冲三之日納於凌陰周禮凌人掌冰正歲十二月令斬冰三其凌注云凌冰室也三之者為消釋度也春秋左氏傳昭公四年申豐曰日在北陸而藏冰西陸朝覿而出之其藏之也黑牡秬黍以享司寒注黑牡黑牲也嫁娶通典曰遂皇氏有婦注云人皇是也伏犧氏制嫁娶以儷皮為禮帝王世紀曰包犧氏都陳制嫁娶之禮王子年拾遺記曰包犧始嫁娶以修人道撒豆穀漢世京房之女適翼奉子奉擇日迎之房以其日不吉以三煞在門故也三煞者謂青羊烏雞青牛之神也凡是三者在門新人不得入犯之損尊長及無子奉以謂不然婦將至門但以穀豆與草禳之則三煞自避新人可入也自是以來凡嫁娶者皆置草於門閫內下車則撒穀豆既至蹙草於側而入今以為故事也跨馬鞍蘇氏演義曰唐歷云國初以婚姻之禮皆胡虜之法也謂坐女於馬鞍之側此胡人尚乘鞍馬之義也酉陽雜記曰今士大夫家婚禮新婦乘馬鞍悉北朝之餘風也今娶婦家新人入門跨馬鞍此蓋其始也東床晉書王羲之傳曰羲之與王承王悅為王氏三少郗鑒使門生求女壻於王導導令就東廂遍觀子弟門生歸謂鑒曰王氏諸少並佳然聞信至咸自矜持惟一人坦腹食獨若不聞鑒曰此正佳壻也訪之乃羲之也遂以女妻之由是呼女壻為東床五姓蘇氏演義曰五音之配五姓郭璞以收舌之音為宮姓以至齶上之音為徵姓以脣音為羽姓以舌著齒外之音為商姓以胸中之音為角姓又青囊經云城寨屋宅之地亦以五姓配五行然則五姓之起自郭璞始也前漢王莽傅卜者王況謂李焉曰漢當復興君姓李李者徵徵火也當為漢輔按此五姓之說自漢已有之云媒鄭康成曰媒之言謀也謀合異類使和成者凡嫁娶之道必由媒妁自太昊制昏禮則判合之義當有所由便應有媒矣至周始置媒氏之官掌萬民之判也婦人拜禮曰男拜則尚左手女拜則尚右手又居喪之禮男拜稽顙女子則俯是古者男女之拜一也古詩曰長跽故夫前五言之作自漢李陵推此則由漢而來其拜猶同耳孫甫唐書云唐武后欲尊婦人始易今拜是則女屈膝而拜始於唐武后也主改適唐書公主傳宣宗女萬壽公主下嫁之後遂詔公主有子而寡不得復嫁宋朝之公主薨其夫亦不得復娶也喪紀上古親死葬之中野而喪期無數至虞舜二十有八載放勳徂落百姓如喪考妣三載四海遏密八音則三年之喪自堯舜始也三代同之故孟子曰三年之喪齊衰之服三代共之淮南子齊倍訓曰武王伐紂載尸而行海內未定故不為三年之喪許慎注云三年之喪始於成王喪服通曲曰喪期無數謂黃帝時心喪終身也三載遏密八音唐虞雖行心喪更三年為限三王乃制喪服則衰絰之起自三代始也五服許慎注淮南子曰三月之服夏后氏之禮又云五縗之服謂三年朞九月五月三月服也然則五服之等蓋原於夏備於商周其事具在於三禮之所記云耳母服三代之制父在為母服齊衰朞唐武后始請同父三年按盧履冰言上元中父在為母三年后雖請未用也逮垂拱始行之則父在之服母三年自唐垂拱中始也慈母服淮南子曰魯昭公有慈母而愛之死為之練冠故有慈母之服注云父所命己者禮記曰練冠而喪慈母自魯公始也故今五服敕有慈母服易月五代會要曰後唐同光三年十一月禮儀使奏曰粵自漢文益尊神器徇至公絶私之義行以日易月之制宋朝會要曰漢文帝酌變禮之宜創易月之制按前漢書文帝紀後元七年六月遺詔曰其令天下吏民令到三日釋服殿中當臨者皆以旦夕各十五舉音服大紅十五日小紅十四日纖七日釋服應劭曰凡三十六日而釋服此以日易月也顏師古曰紅與功同此喪制者文帝自率己意創為之非有取於周禮也何以日易月乎三年之喪其實二十七月豈有三十六月之文禫又七月也應氏既失之於前而近代學者因循謬說未之思也含襚凡始死以珠玉實口中曰含以衣衾贈死者曰襚襚即今俗謂搭衣架是也穀梁曰貝玉曰含衣衾曰襚後漢趙咨遺書曰周室制兼二代重以殯葬之期衣衾稱襲衣之數然則禭周制也禮曰商王綴重三禮圖云以飯含餘粥盛之以鬲名曰重然則含商制也周人加以珠玉爾面帛今人死以方帛覆面者呂氏春秋曰夫差誅子胥數年越報吳踐其國夫差將死曰死者如其有知也吾何面目以見子胥於地下乃為冪以冒面而死此其始也風俗通曰吳王羞見子胥以帛幕面而死故後人因之制面衣說苑亦曰越襲吳吳王將死曰吾不用子胥之言至於此死者有知吾何面以見子胥也遂蒙絮覆面而死明衣三代以來襲有明衣唐改用生絹單衣今但新衣而已段成式酉陽雜俎曰明衣起於左伯桃也糧罌今喪家棺斂柩中必置糧罌者王肅喪服要記曰昔魯哀公祖載其父孔子問寧設五穀囊者公曰否也五穀囊者起自伯夷叔齊不食周粟而餓死恐其魂之饑也故設五穀囊吾父食味含哺而死何用此為又禮檀弓曰重生道也三禮圖曰重起於商代以飯含餘粥以鬲盛之名曰重設之於庭恐神依之以食今之糧罌即古重之遺意也棺槨禮檀弓曰有虞氏瓦棺鄭注云始不用薪也夏后氏堲周商之棺槨古史考曰舜作瓦棺禹作土堲作周棺湯作木槨以周土堲臣瓚曰商人作棺槨劉向曰棺槨之作自黃帝始後漢趙咨曰棺槨之造自黃帝始黃帝內傳曰帝斬蚩尤設棺槨易擊九事之八則曰古之葬者厚衣之以薪後世聖人易之以棺槨蓋取諸大過孔穎達疏云有虞瓦棺未必用木商以前槨無文按棺槨自商以後則夏已前未具也而易擊以為黃帝堯舜之事銘旌禮記曰銘明旌也以死者不可以別故以其旌識之後漢趙咨遺書曰古之葬者至商有加周室制兼二代表以旌名之儀則喪禮之有銘旌周制也喪服小記曰書銘自商始置非周禮也周官司常大喪共銘旌因商事爾士喪為銘各以其物書名於末曰某氏某之柩置於宇西階之上商以前皆書姓男名女字無書國者后亦不書氏至魏以為天下之號無所復別臣子故稱之以自別也桐人今喪葬家於壙中置桐人有仰視俯聽乃蒿里老人之類段成式酉陽雜俎云桐人起於虞鄉也明器禮檀弓曰孔子謂為明器者知喪道其曰明器神明之也塗車芻靈自古有之明器之道也謂為芻靈者善為俑者不仁不殆於用人乎哉為其像人而用之也鄭注云俑偶人有面目似生人孔子善古而非周周官冡人及葬言鸞車像人是像人之起始於周也今直以俑號明器云禮又曰夏后用明器謂竹不成用瓦不成味木不成斫琴瑟張而不平笙竽備而不和有鐘罄而無簨簴也以俑為明器誤矣寓錢今楮鏹也唐書王嶼傳曰玄宗時嶼為祠祭使專以祠解中帝意有所禳祓大抵類巫覡漢以來葬者昏有瘞錢後世里俗稍以紙寓錢為鬼事至是嶼乃用之則是喪祭之焚紙錢起於漢世之瘞錢也其禱神而用寓錢則自王嶼始耳今巫家有焚奏禳謝之事亦自此也注云漢葬者有昏寓錢謂昏晚埋錢於壙中為死者之用至唐王嶼乃於喪祭焚紙錢以代之也翣人之所持以蔽喪車前後以為飾者今挽郎所執是也禮記檀弓曰周人牆置翣世本曰武王作古史考曰周公作翣起於周也挽歌譙周法訓曰挽歌起自田橫通典曰漢高帝時齊王田橫自殺故吏不敢哭泣但隨柩敘哀後代相承以為挽歌按漢初橫死門人為薤露蒿里之歌蓋從者以寄哀耳武帝時李延年分為二薤露送王公貴人蒿里送大夫庶士蓋二歌之起始自橫也摯虞新禮議曰挽歌出於漢武帝役人勞苦歌聲哀切遂以送終非古制者誤矣左傳哀公十一年會吳伐齊將戰公孫夏命其徒歌虞殯杜預注云送葬歌曲哀死也孔穎達疏曰虞殯謂啓殯將虞之歌今謂之挽歌莊子曰紼謳於所生必於斥苦司馬彪注曰紼引柩索謳挽歌斥疏緩苦急促言引紼謳者為用人力以挽柩者所歌故曰挽歌馮鑑謂起於虞殯也然則其周人之制乎方相軒轅本紀曰帝周游時元妃嫘祖死於道令次妃姆嫫監護因置方相亦曰防喪此蓋其始也俗號險道神抑由此故爾周禮有方相氏狂夫四夫大喪先匶及墓入壙以戈擊四隅驅方良故葬家以方相先馳魌頭宋朝喪葬令有方相魌頭之別皆是其品所當用而世以四目為方相兩目為魌頭按漢世逐疫用魌頭亦周禮方相之比也方相氏蒙熊皮黃金四目以索室驅疫鄭注云如今魌頭是也疑自漢始云然荀子有仲尼之面如蒙倛則戰國已為是名碑碣管子曰無懷氏封泰山刻石紀功秦漢以來始謂刻石曰碑蓋因喪禮豐碑之制也刻石當以無懷為始而名為自秦漢也陸龜蒙叢目書曰碑悲也古者懸而窆用木書之以表其功德因留之不忍去碑之名由是而得自秦漢以降生有功德政事者亦碑之而又易之以石失其稱矣此又德政有碑之起也陸法言廣韻曰碑碣李斯造疑始於嶧山之刻爾釋名曰本葬時所設臣子追述君父之功以載其上也神道碑古之葬有豐碑以定秦漢以來死有功業生有德政者皆碑之稍改用石因總謂之碑晉宋之世始又有神道碑天子及諸侯皆有之其刻文止曰某帝或某官神道之碑今世尚有宋文帝神道碑墨本也其初由立之於葬兆之東南地理家言以東南為神道故以名碑爾按後漢中山簡王薨詔大為修冡塋開神道注云墓前開道建石柱以為標謂之神道是則神道之名在漢已有之也晉宋之後易以碑刻云葬埋孟子曰上世嘗有不葬其親者其親死則舉而委之於壑他日過之狐貍食之蠅蚋姑嘬之其顙有泚睨而不視蓋歸反虆梩而掩之則葬埋之禮疑自此起也炎帝之前始厚衣之以薪葬之中野不封不樹也果按虆士籠也梩土輿也封土為壟曰墳古人不為墳也不種樹也合葬禮記曰檀弓云季武子曰合葬非古也自周公以來未之有改又云舜葬蒼梧之野蓋三妃未之從也注謂古不合葬又季武子曰周公蓋祔注云祔謂合葬合葬自周公以來是則周公初制此禮也故周桓王之詩曰死則同穴冡墓黃帝內傳云帝斬蚩尤因置冡墓然諸小說家往往記伏犧女媧之冡疑後人增築云墓志炙轂子曰齊王儉云石志不出禮經起宋元嘉中顏延之為王球作墓志以其無名誄故以紀行自此遂相祖習然魏侍中繆襲改葬父母制墓下埋文將以陵谷遷變欲使人有所聞知但記姓名歷官祖父姻媾而已有德業則為銘文又隋代釀家於王戎墓得銘云晉司徒安豐元公王君之銘有數百字則魏晉已有其事不起於宋也馮鑑續事始云按西京雜記前漢杜子春臨終作文命刻石埋於墓前恐墓志因此始也承謂昔吳季札之喪孔子銘其墓曰鳴呼有吳延陵季子之墓莊子衛靈公葬沙丘掘得石槨銘曰不馮其子靈公奪而埋之唐開元時人有耕地得比干墓志刻其文以銅盤曰右林左泉後岡前道方世之寧茲焉是保漢滕公夏侯嬰得定葬石銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室則墓之有志其來遠矣石羊虎炙轂子曰秦漢以來帝王陵寢有石麟辟邪兕馬之屬人臣墓有石人羊虎柱之類皆表飾墳壠如生前儀衛風俗通曰方相氏葬日入壙驅罔像罔像好食死人肝腦人臣不敢備方相乃立其像於墓側又罔像畏虎與柏故頂上栽柏路前立虎也盧思道西征記曰新城西有漢桂陽太守趙越墓有石柱東南有亭因石柱為名漢霍去病墓像祁連三立石人馬然則墓前之立石人柱羊虎之類皆起於漢也諡禮檀弓曰幼名冠字五十以伯仲死諡周道也大戴諡法曰周公旦太公望相嗣王作諡法抱朴子曰諡始於周史記秦始皇初并天下制曰太古有號無諡中古有號死而以行為諡婦人諡穆天子傳曰天子為盛姬諡曰哀淑人此疑婦人諡之起也后諡諡所以易名也事雖起於周而王后亦無其禮漢初高祖之母始有昭靈之號諸后皆因帝諡以為稱雖呂氏專政上官臨制亦無殊號東京明帝始建光烈之名後漢皇后紀論云爾按漢高祖五年二月甲午漢王即皇帝位尊先媼曰昭靈夫人高后五年五月辛未尊曰昭靈后元紀元帝母曰恭哀許皇后張宴曰婦人從夫諡閔其見殺故兼二諡則后諡自漢祖始也主諡楊侃職林曰唐正元十五年故唐安公主賜諡曰莊穆諡自唐安始也唐會要曰正元十五年七月十五日追冊故唐安主為韓國正穆故義章公主為莊穆唐書公主傳亦云爾按唐平陽公主高祖之女起兵參佐命已諡為昭又南史沈攸之傳言齊高帝女義興憲公主妻攸之子文和憲亦諡爾不審侃何以言自唐安公主始也起復禮曾子問云子夏問曰三年之喪金革之事無避也者非與孔子曰吾聞老聃曰昔者魯公伯禽有為為之也注云魯徐戎作難喪卒哭而征之急王事也故春秋亦紀晉襄公墨縗之事漢唐以來遂有起復之禮蓋自伯禽始也忌日禮祭義曰君子有終身之喪忌日之謂也忌日不用非不祥也言夫日志有所至而不敢盡其私也注曰忌日親亡之日不用舉他事非不祥言非以死為不祥避之夫日猶此日志有所至者此心極於念親也不敢盡其私不敢盡心於己之私事也又曰文王忌日必哀稱諱如見親然則忌日始於周也圍碁博物志曰堯造圍碁以教丹朱或曰舜造也手談今人目圍碁為手談者語云王中郎以碁為手談也世說曰王中郎以圍碁是坐隱支公以圍碁以為手談王積薪碁勢譜圖曰王郎號為坐隱祖約稱為手談由是言之雖說有小同異然疑晉以來語也蹴踘劉向別録曰蹴踘者傳言黃帝造或曰起戰國時踏鞠兵勢也所以練武事知有材皆因嬉戲而講陳之博物志曰黃帝所作也投壺禮記投壺曰投壺之禮主人奉矢司射奉中使人執壺壺頸修七寸腹修五寸口徑二寸半容一斗五升壺中實小豆焉為其矢之躍而出也壺去席二矢半矢以柘若棘毋去其皮而鼓節有魯薛之異其禮蓋自周人始也春秋左氏傳有晉侯以齊侯宴中行穆子相投壺之禮是矣西京雜記云漢武時郭舍人善投壺以竹為矢不用棘也古之投壺取中不求還郭則激矢令還謂之驍言如博之立碁於北車中為驍傑也今投壺之用竹矢為激還為驍自郭舍人始也彈歐陽詢藝文類聚曰古者人死未有棺槨殯葬裹以白茅投之中野孝子不忍視其禽獸所食作彈以守之吳越春秋陳音對越王曰弩生於弓弓生於彈彈生於古之孝子如上所記則是彈起三皇之世也陸博說文曰古烏曹氏始作博蓋夏后之臣也事始曰烏曹始置博陸之戲聲譜曰博陸采名也孔子曰不有博奕者乎莊子博塞以游彈碁西京雜記曰漢成帝好蹴鞠群臣以為勞體非至尊所宜帝曰朕好之可擇似而不勞者奏之劉向作彈碁以獻傅玄彈碁賦序曰漢成帝好蹴鞠勞人體非至尊所御因其體而作彈碁之戲起自漢代矣宋臨川王義慶著世說以為彈碁始自魏宮裝奩戲文帝於此伎特妙用手巾角以拂碁帝客又能低頭以葛冠巾角拂碁妙逾於帝西陽雜俎曰彈碁起自魏室裝奩戲也典論曰豫於他戲弄少所喜唯彈碁略盡其巧京師有馬合鄉侯東方安世張公子恨不與數子對起於魏室明矣二說非也今世尚或有其法而為之者亦少投子續事始曰陳思王曹子建製雙陸置投子二唐末有葉子戲不知誰遂加至六按烏曹始置六博老子置摴蒱李氏資暇引蔡澤說范雎云博者欲大投裴駰注謂投投子乃投擲之義謂摴蒱五木然則蒱皆有投子耳故曹植所造從么至六謂之投子取投擲義云嘉話録曰太和已後博戲家謂重四為堂印言重四則投子猶二也六隻蓋起近代太和文宗時年號今按唐李賀州郃撰葉子格世有其書則六隻當自郃矣潘氏紀聞談自投子以飾四朱者因明皇與貴妃采戰將北唯重四可轉敗為勝上擲而連呼叱之宛轉良久而成重四上大悅命高力士賜四緋也摴蒱博物志曰摴蒱老子入西戎所造或云胡亦以此卜也買鬼世傳唐武后初諫議大夫明崇儼能役鬼物其微時人嘗與博凡擲投子必使鬼物持其彩應呼而成隨其所欲也後人因此為買鬼之戲就中彩名其通天火通之類云亦當時所役之物名也象戲太平御覽曰象戲周武帝所造而行碁有日月星辰之目與今人所為殊不同唐牛僧孺撰元怪録載唐寶應元年岑順於陝州呂氏凶宅夜聞鼙鼓之聲介胄人報曰金象將夜警也寤見鐵騎長數寸進曰天馬斜飛度三疆上將橫行擊四方輜車直入無回翔六甲次第不乖行乃有一馬斜去三尺止又一步卒橫出一尺後車進已而於見處掘之即古冡也前有金象局列馬滿枰其辭與勢正今世所為者是則此戲於此古冡初定時已與周武帝所造不同而同名象戲也說苑雍門周謂孟嘗君足下燕則鬭象碁亦戰國之事乎故今人亦曰象碁蓋戰國用兵爭強故時人用戰爭之象為碁勢也彩選彩選序曰唐之衰任官失序而廉恥路斷李賀州郃譏之恥當時職任用投子之數均班爵賞謂之彩選言其無實惟彩勝而已本朝劉蒙叟陳堯佐雖各有損益而大抵取法及趙明遠削唐雜任之門盡以今制專以進士為目時慶曆中也元豐末官制行朱昌國又以寄祿新格為名鬭雞列子有紀渻子為周宣王養鬭雞之事左傳述季郈之雞鬭季氏芥其羽郈氏為之金距推此則茲戲之始當出於周也鬭草宗懍荊楚歲時記曰競採百藥謂百草以蠲除毒氣故世有鬭草之戲鬭牛成都記曰李冰為蜀郡守有蛟暴入水戮之己為牛形約曰江神亦必牛形白帶者我也須臾有二牛鬭武士射其神斃蜀不復病水由是鬭牛之戲今世尚或有之蓋自秦世之始也戲場通典曰煬帝大業二年突厥染干來朝帝欲夸之追四方散樂大集東都自是每歲正月萬國來朝留至十五日於端門外列為戲場百官綵棚夾道從昏達旦以縱觀之宋朝至正歲上元闢端門起山樓露臺刺園列鈞容教坊樂及綵棚夾道令都人縱觀者此其始也角觗今相撲也漢武故事曰角觗昔六國時所造史記秦二世在甘泉宮作樂角觗注云戰國時增講武以為戲樂相誇角其材力以相觗鬭兩兩相當也漢武帝好之白居易六帖曰角觗之戲漢武始作相當角力也誤矣俳優列女傳曰夏桀既棄禮義求倡優侏儒而為奇偉之戲則優戲已見於夏后之末世晉獻公時有優施魯定公會齊侯於夾谷齊宮中之樂有俳優戲於前此蓋優戲之始也傀儡世傳傀儡起於漢高祖平城之圍用陳平計刻木為美人立之城上以詐冒頓閼氏後人因此為傀儡按前漢高紀七年注應劭曰平使畫工圖美女遣遺閼氏而無刻木事今按列子記周穆王時巧人有偃師者為木人能歌舞王與盛姬觀之舞既終木人瞬目以手招王左右王怒欲殺偃師偃師懼壞之皆丹墨膠漆之所為也此疑傀儡之始矣秦漢有魚龍曼衍之戲其事亦粗見唐李商隱宮辭曰不須看畫魚龍戲發遣君王怒偃師是以通典曰窟礧子亦曰魁礧作偶人以戲善歌舞審此知其偃師之遺事也一云本喪樂漢末始設之嘉會不知何以為喪樂風俗通曰漢靈帝時京師賓昏嘉會皆作魁礧梁散樂亦有之北齊後主高緯尤所好也顏氏家訓云古有禿人姓郭好諧謔今傀儡郭郎子是也百戲漢元帝纂要曰百戲起於秦漢曼衍之戲後乃有高絙吞刀履火尋橦等也一云都盧尋橦都盧山名其人善緣竿百戲舞輪通典曰梁有舞輪伎今之舞車輪者則是此戲自梁世始有之也高絙又曰梁有高絙伎云今戲繩者謂上索者是也亦踏索之事云非自梁始也又有弄碗諸伎後漢天子正旦受賀以大繩繫兩柱相去數丈兩倡女對舞行於繩上相逢比肩而不傾水戲典略曰魏明帝使博士馬鈞作水轉百戲巨獸魚龍曼延弄馬列騎備如漢西京故事今世皆傳其法蓋其始自馬鈞也影戲故老相承言影戲之原出於漢武帝李夫人之亡齊人少翁言能致其魂上念夫人無已乃使致之少翁夜為方帷張燈燭帝坐他帳自帷中望見之倣佛夫人像也蓋不得就視之由是世閒有影戲歷代舞所見宋朝仁宗時市人有能談三國事者或採其說加緣飾作影人始為魏吳蜀三分戰爭之像嗔拳江淮之俗每作諸戲必先設嗔拳笑面有諸行戲時嘗在故臘之末所作之人又多村夫初不知其所謂也按荊楚歲時記有諺語云臘鼓鳴春草生村人並細腰鼓戴胡公頭及作金剛力士以逐除今南方為此戲者必戴面如胡人狀作勇力之勢謂之嗔拳則知其為荊楚故俗舊矣合生唐書武平一傳曰中宗宴兩儀殿胡人襪子何懿倡合生歌言淺穢平一上書比來妖伎胡人於御座之前或言妃主情貌或列王公名質詠歌舞蹈號曰合生始自王公稍及閭巷即是合生之原起自唐中宗時也今人亦謂之唱題目吟叫嘉祐末仁宗上仙自帝即位至是殆五十年天下稔於豐樂不意邦國凶變之事而英宗諒陰不言能昭其功然四海方遏密故市井初有叫果子之戲其本蓋自至和嘉祐之閒叫紫蘇丸洎樂工杜人經十叫子始也京師凡賣一物必有聲韻其吟哦俱不同故市人採其聲調閒以詞章以為戲樂也今盛行於世又謂之吟叫也生花今京城有生花種植以戲者按前漢張騫傳漢遣趙破奴等破車師大宛以梨軒眩人獻於朝顏師古注云眩與幻同即今吞刀履火種瓜植樹屠人戮馬之術是也本自西域來由是言之種瓜植樹即生花之事也蓋自漢武時大宛所獻眩人始云打麥唐書武元衡之將遇害也京師童謠曰打麥三三三今俗兒戲有打麥鼓掌作打麥聲後必三拍之抑緣此也杵歌春秋左氏傳曰襄公十七年十一月宋皇國父為平公築臺妨農功子罕請俟農畢公弗許築者謳曰澤門之晳實興我役邑中之黔實慰我心杜預注曰周十一月今九月澤門宋城門宋國父白晳居近澤門子罕黑色而居邑中今版築役夫歌以應杵者此蓋其始也其歌往往敘苦樂之意者由此爾呂氏春秋云翟煎對魏惠王曰舉大木者前唱輿樗後亦應之此舉重勸力之歌也今人舉重出力者一人倡則為號頭衆皆和之曰打號此蓋其始也七國之時已云然矣輿樗淮南子道應訓作邪許五兵兵者戈戟矛劍之總名也太白陰經曰神農以石為兵黃帝以玉為兵蚩尤乃鑠金為兵割革為甲始制五兵呂氏春秋曰蚩尤作五兵戈殳戟酋矛夷矛也世本蚩尤以金作兵器然則兵蓋始於炎帝而鑄金為刃即自蚩尤始矣黃鉞輿服志曰黃鉞皇帝置內傳曰帝將伐蚩尤玄女授帝金鉞以主殺此其始也牙旗黃帝出軍決曰牙旗者將軍之精金鼓者將軍之氣一軍之形候也即知牙旗之製始自置軍之時疑有征伐則置之也吳孫權因之作黃龍大牙衣甲世本曰杼作甲杼或作與少康子也墨子亦云太白陰經曰蚩尤割革為甲管子亦云黃帝內傳曰玄女請帝制甲胄以備身也抹額二儀實録曰禹娶塗山之夕大風雷電中有甲卒千人其不被甲者以紅綃帕抹其頭額云海神來朝禹問之對曰此武士之首服也秦始皇至海上有神朝皆抹額緋衫大口袴侍衛自此抹額遂為軍容之服兜鍪胄也黃帝內傳所述蓋玄女請帝製之以備身也淮南子紀論訓曰有鍪頭而綣領以王天下者矣許慎注曰蓋三皇所以鍪頭者兜鍪帽也則是黃帝之制胄亦以古鍪頭之事耳故自古兜鍪為首鎡之名干戈王子年拾遺記曰庖義造干戈以飾武此干戈之始也則兵為起於大昊矣呂氏春秋云蚩尤造五兵蓋其一也劍管子曰昔葛天盧之山發而出金蚩尤受而制之以為劍鎧矛戟此劍甲之始也戟又管子黃帝問於伯高伯高曰雍狐之山發水出金蚩尤受而制之以為雍狐之戟此戟之始也實録謂自夏后氏始非也呂氏春秋云蚩尤造五兵戟其一也龍魚河圖曰蚩尤造戟也續事始曰魏武加蝦蟆頭幡刀龍魚河圖曰黃帝時蚩尤造立刀戟郭憲洞冥記曰黃帝採首山之銅始為鑄刀二儀實録曰刀之制自黃帝與蚩尤戰即有之槍實録曰黃帝與蚩尤戰時即有槍漢諸葛亮始以木作之長丈二以鐵為頭續事始曰亮置苦竹槍長二丈五尺也矛世本曰杼作矛管子曰蚩尤為劍鎧矛戟呂氏春秋蚩尤作五兵有酋矛夷矛則矛蓋蚩尤所作也馬槊梁𥳑文帝馬槊譜序馬槊為用雖非遠法近代相傳稍以成藝按曹操父子橫槊賦詩於鞍馬之閒則馬槊之事已見於此矣豈其事之所起乎匕首漢王莽傳曰莽避火坐宣室前殿持虞帝匕首則匕首之制堯舜已為其物矣然兵械之原多出於黃帝亦其時事耶按左氏魯曹沫執匕首劫齊桓公弓矢太白陰經曰庖犧氏弦木為弓剡木為矢易繫辭曰神農氏沒黃帝堯舜氏作弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽山海經曰少皞生般始為弓矢世本曰牟夷作矢揮作弓宋衷注云牟夷揮皆黃帝臣郭璞弓矢一器而作者兩人於理可疑以般為是墨子曰羿作弓荀子曰倕作矢呂氏春秋曰夷羿作弓張㪍吳録曰揮觀弧星始為弧司馬遷著史記曰黃帝之弓曰烏號然則當以繫辭為是員半千射決曰蚩尤作亂黃帝始制弧矢弩古史曰黃帝作弩吳越春秋陳音對越王曰弩生於弓弓生於彈彈生於古之孝子楚琴氏以弓矢之勢不足以威天下乃橫弓著臂施機設郭加之以力即是弩之始出於楚琴氏也而周官司弓矢掌六弓六弩其名物有唐大來庾之制則弩之起遠矣龍魚河圖則曰黃帝時蚩尤造五兵杖刀戟大弩也神臂弓筆談曰熙寧中李定獻偏架弩似弓而施幹鐙以鐙拒地而張之射三百步能洞札謂之神臂弓最為利器定黨項羌酋歸朝死於防團蓋神臂弓之為國用自定始也弓袋實録曰器仗皆自有虞氏始韣鹿施弓袋通謂之三仗蓋大將備儀也左傳曰左橐鞬右鞭弭是也禮樂記曰武王克商倒載干戈包之以虎皮名之曰建櫜注建讀為鍵兵甲之衣曰櫜箭筒又曰箭筒自有虞氏始也周禮有矢箙射的虞書曰侯以明之注云作射侯之禮以明善惡則射侯始見於堯舜矣至周有熊虎麋犴三五正侯後世就𥳑但為射的蓋侯之遺意也射以暈計之亦三正五正之遺事也俗亦曰射帖鳴鏑前漢胸奴傳曰冒頓作鳴鏑應劭曰驍箭也遂以射殺頭曼單于者斬馬刀漢成帝時朱雲請上方斬馬劍斷張禹頭以厲其餘則斬馬劍之名已見於漢代矣宋朝神宗熙寧中又製斬馬刀其犀利則莫比蓋亦取漢氏舊名為稱也六纛實録曰商有纛皂絲為之似蚩尤首黃帝內傳曰玄女為帝制玄纛十二以主兵是則纛自黃帝始旗幟列子曰黃帝與炎帝戰以鵰鶚鷹隼為旗幟故今旗物或綵錯為鵰鶚取諸此也太白陰經曰蚩尤建旗幟黃帝內傳曰玄女請帝制旗幟以象雲物此蓋旗幟之始也五方旗通典曰黃帝振兵設五旗黃帝內傳曰帝制五彩旗指顧向背黃帝出軍決曰攻伐作五彩牙旗青引東赤南白西黑北中黃是也亦自黃帝制之鉦黃帝內傳曰玄女請帝鑄鉦鐃以擬雹擊之聲今銅鑼其遺事也鐸鬻子曰禹治天下以五聲聽為銘書於簨簴曰告寡人以事者振鐸禹世已有此也角徐廣車服儀制曰角前書記所不載或云本出羌胡一云出於越黃帝內傳曰玄女請帝製角二十四以警衆像禮義纂曰蚩尤師魑魅與黃帝戰帝命始吹角作龍鳴以禦之蓋角肇於黃帝氏也谷儉角賦夫角蓋黃帝會群臣於泰山作清角之音號令之限度也軍中置之以司昏曉故角為軍容也鞞唐韻曰鼙騎上鼓鼙裨也裨助鼓節亦作鞞今軍行馬上所擊是也黃帝內傳曰玄女請帝制鼓鼙以當雷霆是則黃帝製之以伐蚩尤也呂氏春秋曰帝嚳令倕作鼙鼓之樂又云倕作鞞以節鼓鞀呂氏春秋曰倕作鞀鬻子曰禹為銘書於簨簴語寡人以獄訟者揮鞀音挑鞍轡桓寬鹽鐵論云古者繩鞚草鞮皮薦而已後代以革鞍而不飾六韜曰車騎之將軍馬不具鞍勒不備者誅推此當是三代之制蓋黃帝始服牛乘馬疑車騎也鞭說文所為驅遲者也古用革以為之左傳曰鞭之長不及馬腹是也後世代之以竹故或謂之策蓋策之以箠馬太王杖馬箠去邠是也虞書曰鞭作官刑則得名於堯舜之代始以為薄刑之用鐵蒺藜事始云鐵蒺藜菱角等起於隋焬帝征遼東置之要路水中以刺人馬非也按諸葛亮與司馬懿相持於武功五丈原亮卒懿追之亮長史楊儀多布鐵蒺藜則三國之際已有其物非自隋煬帝始也漢文帝時朝錯言守邊議云具藺石布渠答注云渠答鐵蒺藜也此又漢初事爾雖然非三代仁義之守也楯山海經曰羿與鑿齒戰於草疇之野羿持弓矢鑿齒持楯春秋元命包曰帝嚳戴干宋衷曰干楯也王嘉拾遺記曰庖犧造干此則楯之起也旁排實録曰旁排自牟夷始也或曰旁排近世兵杖中有鏢牌蓋出溪洞之蠻熙寧中王師征交址其法乃盛傳於中國至神宗設於行陳令諸軍習之也宋朝會要曰太宗聞南方以標槍旁排為兵令蕭延皓取廣德軍習之軍士之用標牌此其始也柝易繫辭曰重門擊柝以待暴客蓋取諸豫說文𣟄夜行所擊今擊木為聲以代更籌者是俗曰蝦蟆更𣟄即柝乃古今字耳兵法沈起吳子序曰兵法始於黃帝其後得其傳者周太公齊管仲吳孫武魏曹操蜀諸葛孔明其書皆行於世戰爭呂氏春秋曰蚩尤作兵也利其械未有蚩尤時民固削林木以戰黃帝與炎帝戰於版泉是矣為戰爭起於炎黃之際也陳列史記曰高陽有共工之陳以平水害於是始有陳陳圖吳子序曰諸葛孔明天地風雲龍虎蛇鳥本一陳也出黃帝兵井之法於魚復沙上纍石八行為陳世謂八陳列也晉桓溫見之曰此常山蛇勢也後人之為陳圖者從此傳令書大禹謨有苗弗率禹乃會群后誓於師曰咸聽朕命此軍中傳令之始也以夏后氏為之始先鋒孫子曰軍無選鋒曰北周宣王之北伐也六月之詩曰元戎十乘以先啓行則先鋒周人制也殿後桂苑曰殿軍後也語曰孟之反不伐奔而殿左傅曰黃夷前驅孔嬰齊殿宜與先鋒同起於周制也伏兵易曰伏戎于莽左氏北戎侵鄭公子突曰君為三覆以待之杜預注云覆伏兵也周公繇易言此疑亦三代之事爾火攻孫子之書有火攻故齊田單有火牛之事左傳桓公七年二月乙亥焚咸丘公羊曰樵之也樵之者以火攻也穀梁曰不言邾咸丘疾其以火攻也六帖云始火攻水攻國語智伯攻趙襄子決汾水灌晉陽城不沒者三版觀此二者非先王仁義之兵也蓋出於戰國吞并之世云京觀左傳楚子曰明王伐不敬取其鯨鯢而封之於是乎有京觀推此而言則是有征伐以來則有其事烽燧玄女戰經曰諸見舉烽火傳言虞虜且起黃帝出軍決亦有望見烽火之文周幽王為褒姒舉烽燧疑亦自初用兵即有之也營壘史記黃帝與炎帝戰於版泉以兵師為營衛此營壘之始也其後兵之所居因曰軍營樓櫓莊子曰魏武侯欲偃兵徐無鬼曰偃兵適兵之始也變固外戰必盛鶴列於麗譙之閒郭象注麗譙戰樓之名即敵樓也疑周襄戰國時始有之云雲梯墨子曰公輸般為雲梯之械左傳曰楚子使解揚登樓車文王之雅曰臨衝間間注云臨車即左氏所謂樓車也蓋雲梯矣當是三代之制而公輸加機巧爾續事始曰魯人公輸般造以攻宋城可以淩空立之太白陰經謂之飛梯炮石漢書甘延壽投石絶等倫張宴曰范蠡兵法飛石重十二斤為機法行三百步延壽有力能以手投之今邊城有炮蓋出於范蠡飛石之制因事增廣遂為今法此蓋其始也事始曰諸葛亮圍郝昭於陳倉亮起衝車昭以繩連石磨四角擊其衝車車折即炮事矣而唐書李密傳密使田戍造廣雲旝三百具以機發石為攻城械號將軍炮戎車古司馬法曰戎車夏曰鉤車商曰寅車周曰元戎則戎車出於夏后之前至夏始名也戰舟墨子曰公輸般自魯之楚為舟戰之具謂之鉤拒此戰舟之始也太白陰經曰水戰之具始於伍員製之以船為車以櫓為馬云戍邊紂之時西患昆夷北難玁狁文王以紂命遣戍役以守衛中國采薇所歌是也其事起於商辛失道之世出軍筆談曰宋朝太祖制禁軍更戍之法欲其習山川勞苦遠妻拏懷土之戀兼外戍之日多在營之日少人人少子而衣食易足以禁軍出軍之始也又京師衛兵請糧者營在城東即令就西倉在城西即就城東倉仍不許僦車腳皆須自負以使之盡力制其驕惰故士卒衣食無外慕安辛苦而見使也避僧蘇氏演義曰鄴洛記云北齊忌黑文宣帝殺第七弟上黨王渙以七者漆也屬黑又僧衣多黑而出師決勝之辰多所避忌北齊始也今行軍出師之日忌見僧尼者始自北齊之所忌黑也云爾
