body:
  text: 三省綱轄部第二十二侍中環濟要略曰古官也風后為黃帝侍中周有常伯見尚書立政秦漢為侍中徐堅初學記曰秦取古官制本丞相史也丞相使史五人來往殿中奏事故謂之侍中後魏始為樞密之任梁又以為宰相職事唐侍中與中書尚書二令並為真宰相矣門下門下侍郎秦官秦有黃門侍郎歷代不改與侍中俱管門下眾事凡禁門黃闥故號黃門其官給事於黃闥內故云唐天寶元年改曰門下唐百官志云二年也散騎秦置散騎置中常侍本二官魏文帝黃初初合散騎常侍為一官唐顯慶中分左右左隸門下右中書也給事秦置通典曰加官也初秦漢別有給事黃門之職後漢有給事黃門侍郎左右給事中以有事殿中故曰給事中獻帝時去給事黃門侍郎後周有給事中士別置給事中在六官外隋初開皇六年始於吏部置給事郎煬帝移為門下職唐武德三年改給事郎為給事中夕拜漢給事中故事每日暮時入對青瑣門拜故謂之夕拜亦為夕郎諫議秦置諫大夫後漢光武增為諫議大夫歷代不改唐龍朔中屬中書開元後歸門下正元四年五月分左右以右隸中書二起居周有左右史王言則左史書之動則右史書之蓋起居之本也漢武有禁中起居後漢馬后自撰明帝起居注則其事似在宮中古女史之職也此始有起居之名魏晉以降著作掌之後魏有置起居令史別置修起居注隋煬帝置起居舍人唐正觀二年於門下省置起居郎顯慶中復於中書置起居舍人以郎為左史以舍人為右史諫正唐武后垂拱中置拾遺補闕掌諷諫中宗以來有左右開元時左屬門下右中書會要云垂拱元年二月二十九日也宋朝會要曰雍熙五年二月詔改補闕為左右司諫拾遺為左右正言蓋太宗欲令諫官修其職業故改其官號也然周禮地官之屬有司諫則周已名官矣唐書朱滔傳建中三年滔僭稱王後二年聘張遂王道為司諫則滔又以此名立官也中書令舜納言周內史皆中書之任也漢武游宴後庭始宦者典事尚書謂之中書謁者置令不言謁者省文也通典云唐百官志則曰秦始置中書謁者漢元帝去謁者字漢魏品卑而任重隋文帝廢三公府寮令中書令與侍中知政事遂以為宰相職林以為漢成帝建始四年改中書謁者令曰中謁者令以士人為之魏文帝黃初初改祕書令為中書令也中書侍郎漢武帝置中書領尚書事有令丞郎魏黃初初置通事郎後改曰中書侍郎唐志曰晉加侍字中書舍人初學記曰魏世中書始置通事一人明帝時有通事劉泰是也高貴卿公改曰通事都尉尋為通事侍郎晉初置舍人通事各一人東晉合為一職梁始掌詔誥其後除通事直曰中書舍人舍人本周官掌平宮中之政尚書令三代冢宰之職也秦漢置尚書令于百官無所不主漢武元鼎二年始以張安世為之初學記曰秦官也漢因之僕射秦官史記始皇本紀有僕射周青臣是也古者重武以善射者掌事故曰僕射僕射者僕役於射也一云僕主也古有主射以督課漢因秦事自侍中謁者博士將軍屯永巷洎尚書皆有之成帝建始元年初置尚書五人一人為僕射此蓋其始也獻帝建安四年以邵榮為左僕射衛臻為右僕射置左右之始也左右丞秦置尚書丞一人漢成帝建始四年置四人光武始減其二分左右佐令僕之事唐以來在尚書之下宋朝官制改陞在上又為執政官六尚書尚書秦官秦時少府遣吏四人在殿中主發書故謂之尚書劉向新序曰齊宣王為太室香車諫王召尚書尚書之名則七國時已有其官矣晉志曰漢光武始分尚書為六曹通典曰漢初尚書雖有曹名不以為號及靈帝以梁鵠為選部尚書於是始見曹名漢百官表曰成帝建始四年始置尚書四人續事始云尚主也出納王命敷奏萬機政令所由宣選舉所由定罪賞所由正李固曰尚書猶天之北斗斟酌元氣運平四時分行唐會要曰武德令吏禮兵民刑工正觀即吏禮民兵刑工光宅元年九月五日改為六官準周禮通典曰周禮天官冢宰掌邦六典以佐王理邦國漢成置四尚書因事設員非擬於古光武分六曹稍以周禮唐武后遂以吏部為天官戶部為地官禮部為春官兵部為夏官刑部為秋官工部為冬官以承六官之制宋初以吏兵戶刑工禮為次神宗行官制復唐故事又以吏戶禮兵刑工為次也子司又曰故事以兵吏及左右司為前行刑戶為中行工禮為後行每行各管四司以本行為頭司餘為子司自唐制始也二十四司自秦始置尚書而歷郎曹多寡不等少或十二亦至三十六隋有天下尚書有六曹二十四司即今都省列曹是也其制自隋始也子司印唐會要曰故事凡尚書省除吏部兵部外共用都司印至聖歷一年二月九日初備文昌臺二十四司印本司郎官主之八座後漢以六曹尚書并令僕為八座梁齊亦有稱隋唐至宋令僕為宰相故六尚書及左右丞為八座蓋其事自漢東京始也六侍郎漢制尚書郎三歲稱侍郎隋煬帝即位於尚書六曹各置侍郎一人按漢百官表有侍郎秩比四百石也郎中漢制尚書郎初上稱守郎中晉武帝始置諸曹郎中唐以來號正郎武德三年尚書郎改為郎中按秦有郎中令臣瓚以為主郎內諸官則郎中秦官也員外隋開皇三年尚書二十四司各置員外郎一人以司其曹帳籍則郎置員外自隋文帝始也按漢書惠帝即位賜爵外郎滿六歲一級則隋置員外郎亦取漢事云爾韋述唐兩京記曰晉宋以來始置員外郎左右司隋煬帝即位尚書都司初置左右司郎一人副左右丞唐又置員外郎諸司號為都公唐書百官志云天后永昌元年置左右司員外郎各一人也吏部漢初曰常侍曹後漢為選部魏始曰吏部按周官司馬之屬有士司為下大夫通典則以為吏部之始疑出干此也司封左傳晉文公為執秩以正其官杜預云謂主爵秩之官蓋今司封職也漢尚書有封爵之任後漢馮勤是也北齊有主爵職林曰唐龍朔二年改為司封通典以為光宅元年司勳周禮夏官司馬之屬有司勳掌賞地之法後周始置其官於尚書省通典云後周吏部有司勳上士考功漢京房作考課之法而其職不在尚書光武改尚書三公曹主歲考課至此始為尚書職魏初置考功亦唐虞考績之事也而周禮亦有考功記云戶部周禮地官之掌也漢置尚書四人一主財帛委輸即今戶部任矣吳始有戶部名通典曰吳孫休即位戶部尚書讀奏是也周禮司民掌登萬民之數即戶部任也度支通典曰漢張蒼善算以列侯主計領郡國上計者殆今度支之任也魏文帝始置度支尚書唐以為子司金部周官職金掌錫石丹青之令則金部之職也魏世始置尚書金部郎倉部周官倉人主藏九穀廩人主其數賙賜稍食則倉部之與也魏時尚書始置倉部郎禮部唐虞秩宗周官宗伯皆今禮部之任也後周有禮部不言職事隋以典儀曹其名命自宇文周始也祠部魏代始於尚書置祠部曹蓋其官自魏始也歷代因之不改主客漢成帝初置尚書客曹光武分置南北客主於此遂以名曹膳部即周官膳夫也晉有左右士曹北齊曰膳部兵部周禮夏官司馬之職也魏有五兵尚書晉宋為七兵後周始曰兵部職方周官有職方氏掌天下九州之圖隋初有職方侍郎通典曰後周依周官有職方也駕部周官輿司馬校人牧師巾車之職皆駕部之事也魏晉之代尚書始置駕部郎庫部周官司甲掌戈盾弓矢則今庫部也魏尚書始有庫部郎也刑部唐虞之士師周禮司寇皆刑部之任也光武謂之賊曹為尚書職後周始有刑部大夫則刑部自宇文周始也都官漢司隸屬有都官從事掌中都官不法事此名官之初也光武改成帝二千石曹掌中都官水火盜賊魏青龍二年始置尚書都官郎佐督軍事比部魏尚書有比部曹通典曰北齊比部掌檢句事唐天寶十一載改掌諸司公廨公私欠負及句用度物也司門周禮有司門通典曰後周依周官有司門隋初為司門侍郎煬帝除侍字也工部唐虞共工在周禮為冬官之職漢置民曹光武改主繕修工作池苑魏為左民晉尚書為起部郎後周始曰工部也屯田漢昭帝始置屯田而成帝置尚書郎一人主戶口墾田此蓋尚書屯田之始也魏代為農部晉始有屯田尚書則屯田名曹在晉世也虞部舜命益作虞周禮有虞衡之官蓋虞部設官之本魏始置虞曹郎後周改曰虞部水部周禮夏官有司險掌溝塗蓋水部之職也魏尚書始有水部郎御史大夫周禮春官宗伯之屬有御史掌贊書戰國時秦趙會澠池各命御史書鼓瑟擊缶之事淳于髡謂齊王曰御史在前則上世皆為記事之官也秦漢以來始糾察風憲然則御史蓋周官也秦置御史大夫以為御史之率故曰大夫中丞漢初御史大夫有兩丞一曰御史丞一曰中丞初學記曰秦官漢因之謂之中丞以其別在殿中掌蘭臺祕書外督部刺史內領侍御史故云成哀閒更名御史長史光武復曰中丞獨坐後漢宣秉傳曰光武建武元年秉拜御史中丞特詔與司隸校尉尚書令並專席而坐故京師號曰三獨坐今中丞亦循其制始自漢東京迄今為故事也侍御周為柱下史秦時張蒼為御史主柱下方書是也亦為侍御史是則侍御之官始於柱下也漢始有侍御史又有繡衣侍御史蓋自武帝置也後漢亦有之隋直曰侍御史漢書朝議以范丹為侍御史是也韓朗以侍御史與三府掾治楚獄是也端公唐侍御史之職有四謂推彈公廨事臺內之事悉至之號為臺端他人稱之曰端公其語自唐始也南床唐制御史故事食坐之南設橫榻謂之南床殿中監察不得坐也唯侍御坐焉凡侍御例不出累月而遷南省者故號為南床今猶有是循唐故事也殿中魏蘭臺遣御史居殿中察非法即殿中侍御史之始也監察初秦以御史監理諸郡謂之監察御史蓋監察名官之始也隋文帝開皇三年始曰監察御史宋朝會要曰太平興國三年以張巽為監察御史先是三院多外任風憲之職用他官領之遂詔正名舉職自此始也宋朝之制凡職事官皆他官領之惟三院御史自是始正其名也裏行唐太宗初置此官自馬周始也初馬周以布衣任事詔令於監察御史裏行遂以名官舊唐書志云正觀初也龍朔元年八月以王本立為監察裏行唐會要以謂裏行之名始於此非也六典亦云始於馬周宋朝行官制始省之續事始曰太宗時疑未以名官自高宗始以命官云三院唐憲府故事侍御殿中監察呼三院故今亦斥殿中曰殿院監察曰察院自唐室始也六察唐百官志曰監察御史分察尚書省六司興元元年一人察吏禮部一人察兵工部一人察戶刑部歲終議殿最元和中以新人不出使無以觀能否乃命專察尚書省號六察唐會要云元和四年五月御史臺奏舊例監察御史從下第六人各察尚書省一司是也宋朝會要曰國家每八閤國忌臨時差六察吏察兵察戶察刑察禮察工察元豐中神宗始置六察司於御史臺知雜唐武后以來呼侍御曰端公侍御之職四自雜侍臺侍悉總判之故知雜事者曰雜端後又有以郎中員外兼侍御而知雜事者亦呼雜端官制行省之左右巡唐會要曰正元十年四月敕準六典殿中侍御史分知左右巡察其不法之事按六典自明皇時作則左右巡之置亦其時事也通典曰殿中侍御史自開元初知左右巡百僚班序有雜立失言頑而不肅者則以禮罰之是則此制自開元始也李肇國史補曰玄宗開元初至天寶末年置御史左右巡使也臺簿漢有此官張忠為御史大夫署孫寶為主簿是也疑漢官云宋朝會要曰淳化四年六月始置二人後止一員也檢法唐置御史臺推直官而無檢法宋朝元豐中神宗正官制除推直始置檢法之官六傅夏商雖世嗣而太子之名亦略矣其師傅之官亦無文至周始見文王世子故禮之所記班班僅可推考文王世子曰凡三王教世子立太傅少傅以養之太傅在後入則有保出則有師則太傅之原概舉于此矣武王又稱太子也漢止有太傅少傅至晉有天下愍懷建官乃置太子太師太傅太保洎三少為六傅也漢賈誼上疏云保保其身體傅傅其德義師道之教訓此三公之職也又於是為置三少皆選天下之端士故太子聞正言行正道習與正人居不能無正則六傳之說似漢有之然諸傅無其說亦可疑焉賓客漢高祖欲易太子呂后用留侯計迎四皓以定太子故賓客之名始起於此孝文為太子立思賢苑以招賓客孝武為太子立博望苑使通賓客洎晉愍懷建宮惠帝使衛庭司馬略等五人更往來備賓友雖非官而謂之東宮賓客唐顯慶元年正月以于志寧等為太子賓客遂以名官定置四人蓋取法於四皓詹事秦官掌太子家歷代因之通典曰東宮官序秦漢加置詹事庶子及諸府率官也應劭曰詹省也給也漢官儀曰秦官竇嬰景帝即位為詹事孔霸宣帝時為太子詹事庶子禮記燕義曰古者周天子之官有庶子周禮夏官司馬之屬謂之諸子秦置中庶子詹事員漢因之晉以為東宮官晉書鄭默為中庶子朝官以為太子官是也隋分左右通典曰品官命數篇漢有太子庶子魏有太子中庶子則非晉以為東宮官也少詹唐始於詹事府置少詹事一人以貳詹事諭德唐龍朔三年初置太子左右諭德蓋取文王世子教之以事而諭諸德之義太子侍讀漢宣帝詔王襃等皆皆之太子宮娛侍太子朝夕誦讀此蓋其始也宋有諸王侍讀唐正觀中許叔牙為王侍讀高宗升春宮仍兼侍讀職林云開成元年十一月宰相李石奏置太子諸王侍讀太子侍講後漢張酺以尚書講論授皇太子其事始見於此魏官品始有太子侍講此置官之始也中舍人晉咸寧中初置太子中舍人官宋朝神宗又置之唐以來有太子中舍而無中舍人舍人秦官唐龍朔二年改為太子右司議郎咸亨元年復為太子舍人宋朝初亦不置神宗正官制復置之翊善宋朝王府之官多省不置別置翊善曰某王府翊善蓋古王傅之任而輕其名位也宋朝會要曰太平興國中始置也又云八年三月以戴元為衛王府閻象為廣平王府楊可法等為皇太子翊善蓋自此始也王侍讀宋武帝初以徐受為晉安王子勳侍讀此王府侍讀之初也唐志曰開元初十王宅引辭學工書者入教亦為侍讀王侍講宋朝省王府餘官而別置侍講一員記室魏置太祖以陳琳阮瑀為記室掾其官始見於魏武之世矣宋用晉制自明帝後皇子弟雖非都督亦置記室參軍則記室而為參軍晉官也宋朝亦置於諸王府曰某王府記室也宮教宋朝會要曰至道元年以孫蠙充皇姪皇孫教授從新號也時中書言唐文宗朝李石奏太子有侍讀諸王亦有無隆殺今皇姪皇孫官是環衛請以教授為名此蓋王宮教授設官之初也九卿禮記曰夏后氏百官始置九卿漢九卿俱不以卿名官梁武天監七年始加卿字少卿後魏官氏志云太和十五年初置少卿以卿為大卿太常亦周禮春官職也秦有奉常漢初改曰太常蓋秦官也初學記曰高祖改漢百官表曰景帝中六年更太常丞秦置官漢為太常亦曰太常丞太常簿漢有之疑漢官太常博士魏官也魏文帝初置之顏師古注漢書曰太常王者旌旗畫日月大事則建以行禮官主奉持之故曰奉常後改曰太常尊大之義也協律郎漢武帝置律協都尉以李延年始為之晉改為校尉後魏曰協律郎蓋漢武以延年善新聲故特為置協律奉禮郎漢大鴻臚有治禮郎蓋設官之始也按通典歷代皆為治禮郎唐初亦有掌設板位執儀行事永徽二年以諱改為奉禮杜佑云奉禮本名治禮國家撰五代史志至永徽七年乃成於時此官已改故北齊及隋治禮皆為奉禮奉體之名雖見於史其改始自永徽太祝商官六太其一曰太祝在周禮為禮官宗伯之屬掌六祝之辭秦漢有丞隋除令丞止存太祝齋郎魏始有太常齋郎唐有太廟郊社之別唐洎國家其久次者太廟又補室長郊社即補掌坐掌次謂之黃衣選人祖宗以來又以為朝臣子弟起家之官郊社令梁始有太社令後周為司社上士隋於太常寺置郊社署故為郊社令宋朝避英宗嫌名改曰局藉田令周為甸師漢文帝初立藉田乃置令也太醫令周禮天官冢宰之屬有醫師上士下士掌醫之政令聚毒藥以供醫事秦為太醫令丞漢因之宗正周官也在周禮實小宗伯之職宋百官春秋曰周封兄弟之國十有五同姓之國三十有五選其宗中之長而董正之謂之宗正秦因其說置宗正兩漢皆授皇族不雜姓晉始兼庶姓也舊唐志曰星經有宗正在帝座東南漢高紀七年二月置宗正官以序九族宗正寺丞漢置官亦用公族宗正簿梁置官也宗正司林希兩朝寶訓曰景祐二年仁宗謂輔臣曰宗室子孫眾多聚居必以尊賢者糾合之詔置大宗正司擇祖宗後各一人命之首以濮安懿王與守節任其事後又有同姓庶官知丞事神宗時乃參用光祿漢書曰秦郎中令掌宮殿掖門武帝太初元年更名光祿勳通典云梁除勳字曰光祿卿續事始曰秦掌宮殿門戶郊祀主諸郎將在殿中侍衛北齊兼掌膳隋全掌諸殽膳不掌宮殿光祿丞簿皆漢所置應劭曰光明也祿爵也太官令周官膳夫庖人外饔皆其任也秦置太官令屬少府漢不改晉屬光祿後魏分太官為尚食知御膳太官掌百官之饌衛尉秦官也掌宮門衛屯兵之職尉罻也古兵獄之官皆以尉言所以罻羅姦邪也衛尉丞簿皆奏漢所置也太僕周禮夏官司馬之屬有太僕下大夫尚書冏命穆王命為周太僕正則太僕周官也應劭曰蓋大卿眾僕之長太僕寺丞秦漢有此官也太僕簿梁始於太僕置主簿大理齊職儀曰古官也管子曰黃帝得后土辨於四方使為李春秋元命包曰堯為天子得皋陶為大理舜時為七官韓詩外傳有晉文公使李離為大理春秋左氏傳衛侯與元咺訟士榮為大理劉向新書楚平王以伍奢為大理則大理自古有矣秦為廷尉漢初因之景帝中元中更名大理蓋復古號也舊唐書志曰取天官貴人之牢曰大理之義即周禮士師之職孟詵錦帶前書載三代法官之名則云虞曰士夏曰大理也大理寺丞晉武帝咸寧中曹志請廷尉置承北齊曰大理也大理簿通典所載自魏晉以來歷代皆有之是疑魏置官大理正秦置廷尉正禮記曰獄成告於職之正注云正周禮鄉師之屬則秦之置官亦法周也其名亦隋改云司值後魏永安二年御史中尉高穆奏置大理司直漢武初置司直之官屬丞相府謂之丞相司直疑大理之置司直亦取漢丞相司直為名爾淮南子曰湯有司直之人許慎注云司直官名詩鄭風曰邦之司直然則漢之令官亦法古爾評事漢宣帝地節三年初置廷尉左右評魏晉無左右直曰評隋煬帝始曰評事鴻臚周官大行人也干寶曰亦周禮象胥之職漢書曰秦為典客掌諸侯四方歸義蠻夷漢改曰大鴻臚徐堅云漢改之漢百官表曰太初元年更也梁除大字應劭曰鴻聲臚傳之也傳聲贊道也劉熙曰鴻大也臚陳也欲大以禮序陳賓客也馮鑑續事始曰楚云連敖漢為典屬國按漢世典屬國自為一職非鴻臚之任也鴻臚簿唐因陳隋之舊有鴻臚主簿一人鴻臚寺丞秦典丞也其名蓋隋所改司農少昊九農正也舜為后稷秦為治粟內史漢景更為大農令武帝太初元年改曰大司農魏文帝黃初中止曰司農司農寺丞秦治粟丞也漢置丞十三人為勸農官後改司農亦曰司農丞司農簿晉太康中始置司農主簿太府周禮天官冢宰之屬有太府下大夫梁武帝天監七年始置太府卿續事始則云梁天監中置少府卿後魏太和中改太府丞簿周禮太府上士即丞職也下士即簿職也梁置太府卿則丞簿二官亦梁置也續事始曰魏也祕書監漢桓帝延熙二年始置祕書監一人祕書少監隋煬帝始置祕書少監一人祕書丞齊職儀曰漢獻帝置祕書令丞二人魏文帝分祕書別掌文籍自置丞一人此蓋置官之始也或曰魏武帝置也祕書郎通典曰後漢馬融為祕書郎當是其官自漢置也職林曰魏官也初漢置祕書郎蓋中書之任魏分祕書掌文籍為祕書郎中宋除中字校書郎又曰西漢蘭臺後漢東觀皆藏書之室當時文士讎校於中故有校書之職而未為官後以郎居其任故謂之校書郎元魏始命以為官續事始曰續漢書云成帝置以傅毅馬融為校書郎掌審定讎校圖書正字漢桓初置祕書監掌圖書古今文字考合同異今正字之官蓋其遺意也齊集書省有正書官北齊始為正字著作郎漢東京使名儒碩學入直東觀譔述國史謂之著作以他官領之未以為官也魏明帝太和中始置著作郎晉元康二年又謂之大著著作佐郎魏世又置佐著作郎宋齊已來遷佐於下曰著作佐郎太史令少昊鳳鳥氏為歷正夏后曰太史周禮為春官宗伯之屬秦為太史令唐乾元元年改曰司天監宋朝神宗正官名復為太史令太史正唐長安二年置太史令二人開元以後以令為監改令一員為少監宋朝亦曰司天監少監官制改除少監置太史正太史丞司馬彪續漢書曰太史有丞一人歷代同之疑漢官也直長後漢有太史史隋城門御府殿內皆有直長而太史無之宋朝正官神宗始置太史直長五官正通典曰唐乾元元年改太史局為司天置五官正謂春夏秋冬中五官也靈臺郎唐改太史為司天監掌天文歷數風雲氣色其小史有靈臺郎時乾元元年也保章正周禮春官宗伯之屬有保章氏掌天文以志星辰日月之變動辨其吉兇此蓋其官之始也唐乾元元年改監其小吏有保章正則是唐改周官保章氏為正也挈壺正又夏官司馬之屬有挈壺氏掌挈壺以令軍井然則亦周置官也唐乾元元年始改太史為司天其小吏有靈臺郎保章正也殿中監魏始置殿中監蓋分門下太僕二局以為其職也殿中少監隋煬帝大業中初置殿內少監唐復殿中之名亦曰殿中少監殿中丞此官蓋與少監同隋大業三年所置也其名改易同少監云奉御北齊門下省初署典御之官隋改曰奉御以隸殿中省尚食如淳曰掌天子之物曰尚秦置六尚乃有尚食則尚食秦官也尚藥梁陳以來皆為太醫兼職亦秦所置六尚之一也尚醞唐已前有尚乘無尚醞宋朝元豐中官制行則置此官也尚衣周有司服為禮官之屬戰國始有尚衣尚冠之職北齊制主衣隋復曰尚衣也左氏曰昔虞閼父為周陶正注云陶復陶也陶正主君上之衣服此尚衣之始也尚舍周禮天官有掌舍凡舍事則掌之漢官有守宮舍於魏則殿中職也隋煬帝別置殿內監改舊殿中局曰尚舍尚輦周官有巾車秦漢為車府令隋煬帝初置殿內省置尚輦也國子祭酒孫卿在齊為三老稱祭酒漢吳王濞為劉氏祭酒又漢博士內聰明有威重者一人為博士祭酒胡廣曰凡官名祭酒皆一位之元長古者得主人饌則老者一人舉酒以祭地故以祭酒為稱晉咸寧中初立國子學始置國子祭酒六帖曰堯典克明俊德以親九族九族既睦平章百姓周封兄弟同姓成王時彤伯為祭酒主親屬秦漢因之又曰高祖七年自櫟陽從長安置祭酒官續漢書有祭酒一人掌錄敘王國嫡庶及宗親遠近郡國歲所上宗室名通典云國子司業隋煬帝大業三年始於國子監置司業官取禮記樂正司業之義國子監丞亦隋官置與司業之官同置也國子主簿北齊初置國子主簿國子博士班固云六國時往往有博士漢多至數十人晉武初立國子學始置國子博士之官漢百官表曰博士秦官通古今太學博士通典曰漢武建元五年初置五經博士按趙岐孟子題辭云漢興孝文欲廣游學之路論語孝經孟子爾雅皆置博士後罷傳記博士獨立五經而已此今太學博士之職也晉江左增置國子博士六人始謂之太學博士品服同國博神宗元豐中官制行改舊直講之官復置太學博士職如經博士也武學博士宋朝神宗熙寧中即武成王廟建武學置教授如國子監直講官制行亦改為武學博士律學博士晉初置律學博士屬廷尉衛尉親置請律學博士輔相教授唐移屬國子監唐志曰武德初也太學正錄宋朝仁宗時胡瑗掌太學其正錄第補諸生以為學校職掌然不以命有官者神宗熙寧末興三舍始敕授命官亦為學官之例少府監秦置少府漢以來為九卿後魏孝文太和中易官品改少府曰太府隋煬帝大業五年又分太府監蓋少府之名本起於秦而為監自隋始也秦掌山海池澤之稅其屬官有尚方典工作事今少府所職乃漢尚方之事云少府少監隋始以少府為監又置少監以貳監事少府監丞漢所置官少府主簿晉初置之將作監少昊五雉為五工正與唐虞之共工周官考工之所記皆將作之任也秦始置將作少府漢景帝更為大匠隋開皇中改將作寺曰監故大匠之名亦更為監將作少監隋開皇二十年改將作大匠為大監初加置副監煬帝大業五年改曰少監將作監丞漢置將作丞隋改監亦曰監丞將作主簿晉將作置主簿員軍器監後周武帝初置軍器監則其官自宇文周始也軍器少監唐開元三年始於軍器監置少監及丞簿都水使者舜命益作虞蓋掌山澤之官周禮地官司徒之屬川衡澤虞即都水之任也秦始有都水長丞漢武元鼎二年初置水衡都尉又以都水官多復置左右使者此蓋設官之始也晉武省水衡置都水使者自此官名乃定都水監丞秦有都水丞漢又有水衡丞蓋武帝置水衡即置之也晉除水衡有都水丞亦先秦之舊云都水主簿晉初於衡有其官後隨府改也上將軍大記曰義帝以宋義為上將軍漢以呂祿為上將軍魏黃初中有上大將軍唐正元二年九月諸衛上將軍也老子曰君子用兵則貴右是以偏將軍處左上將軍處右說苑田忌奔楚王問齊楚相并柰何對曰齊使申孺將則楚發五萬人使上將軍將之則是春秋逮戰國始有上將軍之官也大將軍戰國時始有大將軍之號隨事即置亦不主官劉劭爵制以謂秦十八爵大庶長即大將軍也左右庶長即左右偏裨將軍也楚懷王與秦戰秦虜其大將軍屈匄是也項羽時范增稱大將軍漢遂置大將軍開府如三公至煬帝於諸衛悉置將軍周禮天子六軍軍一萬二千五百人其將皆命卿蓋在國稱大夫在軍稱將軍自晉獻公作二軍而公將上軍故將軍之名特出於此左傳閻沒汝寬偕謂魏獻子為將軍後漢百官志云初漢武將軍始自秦晉以為卿號七國皆有其事漢以來其命官之名極多謂之雜號也諸衛左傳楚潘崇掌環列之尹謂宮衛之官列兵而環王宮漢京師有南北軍掌理禁衛武帝初置衛將軍此名衛之始也秦有衛尉掌門衛則衛亦先秦之舊制爾晉武重兵官選清重之士置中軍以統諸宿衛此諸衛之始也金吾衛秦有中尉漢武帝太初元年更名執金吾蓋取執金革以禦非常也周隋為武侯之職唐龍朔二年改左右金吾采古名也左右衛漢有衛將軍魏末晉文王又置中衛武帝受禪分中衛為左右衛會要云唐武德元年因隋舊制有左右翊衛五年去翊字但曰左右衛矣驍衛漢有驍衛將軍謂之雜號武帝始以李廣為之梁武帝天監六年分左右武衛後漢末曹公為丞相有分營魏武帝置武衛將軍隋始分左右續事始曰魏許褚從太祖破馬超遷武衛中郎將武衛之號自褚始也屯衛隋初為領軍府煬帝改為左右屯衛唐為威衛五代周太祖時避名復曰屯衛也六帖曰漢宣帝即位初置屯衛領軍衛魏武為漢丞相相府自置領軍非漢官也建安十二年改中領軍文帝受禪始置領軍將軍晉武初有左右監門衛舊唐志曰漢魏曰丞門校尉隋初有監門府將軍唐龍朔二年改府為衛千牛衛宋謝綽拾遺千牛刀人主防身刀也義取莊子庖丁解割千牛而刀刃若新發硎之義故後魏有千牛備身掌執御刀唐顯慶五年始置左右千牛府唐龍朔二年改府曰衛諸率自秦漢始有諸率以為東宮禁衛晉始置五率歷代因革不常遂分左右也府率秦官也晉武建東宮始置率此其始也副率隋制諸率府各置副率掌貳率事衛率秦置衛率府後漢主門衛晉武太始五年分左右司禦率隋文帝制左右宗衛其官如左右衛煬帝改曰率唐龍朔二年改為左右司禦衛後復曰率清道率隋文帝置左右虞侯各置開府一人唐龍朔二年改為清道衛開元初為率府監門率隋有左右監門率掌門禁唐志曰武德五年改左右宮門率也內率隋置左右率掌禁內侍衛唐為左右內率舊唐志曰隋初置左右內率府擬上臺千牛衛也南班筆談曰宗子授南班官世傳王曾為相日始開此議不然也故事宗子無遷官法唯遇稀曠大慶則遷一官景祐中初定祖宗並配南郊宗子緣大禮乞推恩自此遂有南班之授近屬自初除小將軍七遷為節度使遂為定制熙寧元豐閒袒免之外例授小使臣同庶官也內常侍秦置中常侍官參用士人給事殿省隋避諱改內常侍內給事周禮內小臣之職也後魏有中給事中後為中給事煬帝改曰內承直唐曰內給事神龍元年內侍省屬有內給事八人是也宋朝不置臨事或攝都知宋朝會要曰國初有內中高品都知押班今置都都知副都知並在景德三年五月云爾然則其官自宋始也押班宋初有內中高品班院有押班後隨省改易其名號宋朝會要曰初押班無他職或加檢校官淳化後始以崇班以上充此押班之始也內供奉宋朝會要曰雍熙三年置人內供奉官大中祥符二年二月宣入內內侍省供奉官改為入內內侍省內東西頭供奉官內侍省供奉官亦同此例殿頭又曰太平興國八年始有入內殿頭高品大中祥符三年三月宣入內內侍省殿頭高品為內侍殿頭高品宋朝太宗興國八年又置高品至真宗祥符二年始為內侍高品云高班又曰雍熙三年置入內高班內品大中祥符二年二月宣改高班內品曰高班黃門漢明帝永平中始置小黃門宋朝會要曰國初黃門初補止曰小黃門經恩遷即為黃門黃門蓋漢官也歷代有黃門侍郎今門下侍郎是也內品宋朝會要曰雍熙三年置入內高班內品祥符二年改定有祗候高班內品祗候內品小內品雲韶部內品小內品入內內品掌門內品後苑內品散內品等神宗正官止存內品之名餘皆省也
