body:
  text: 舟車帷幄部第四十舟淮南子曰見窾木浮而知為舟呂氏春秋曰虞姁音詡作物理論曰化狐作墨子曰工倕作山海經曰番禺作束晳發蒙記曰伯益作世本曰鼓貨狄作注云並黃帝臣釋名曰黃帝造拾遺記曰軒皇變乘桴以造舟楫黃帝內傳曰帝既斬蚩尤內創舟楫易繫辭曰黃帝氏作刳木為舟剡木為楫蓋以黃帝為是筏拾遺記曰軒皇變乘桴以造舟楫則是未為舟前第乘桴以濟矣筏即桴也蓋其事出自黃帝之前今竹木之排謂之筏是也車淮南子說山訓曰見飛蓬轉而知為車又汜論訓古者肩負儋之勤而作為之剡輪建輿駕馬服牛民以致遠而不勞通典曰上古聖人覩蓬轉而為輪輪行可載因物知生復為之輿輿輪相承流運罔極任重致遠以利天下此車之始也後世聖人觀於天視斗周旋魁方杓曲以攜龍角為帝車於是曲其輈也春秋命歷序曰人皇駕六提羽乘雲車蜀記曰三皇乘祇車出谷口呂氏春秋曰奚仲作車世本曰奚仲造車謂廣其制度爾山海經曰番禺生奚仲奚仲生吉光是始以木為車郭璞注云世本言奚仲作車此云吉光明其父子創意也荀子曰奚仲作車乘楊倞注云奚仲夏車正黃帝時已有車服故謂之軒轅此云奚仲者亦改制也古史考曰黃帝作車引重致遠其後少昊時駕牛禹時奚仲駕馬劉昭補注後漢志曰服牛乘馬以利天下其所起遠矣豈奚仲所為世本之誤史考所說是也釋名曰黃帝造舟車黃帝內傳曰帝既斬蚩尤因乘車輅又云帝令邑夷造車以便民因話録裴諫議問東津先生先生曰軒轅制車服按易繫九事言黃帝服牛乘馬引重致遠蓋取諸隨則車亦宜黃帝造也小車蜀相諸葛亮之出征始造木牛流馬以運餉蓋巴蜀道阻便於登陟故耳木牛即今小車之有前轅者流馬即今獨推者是而民閒謂之江州車子按後漢郡國志巴郡有江州縣是時劉備全有巴蜀之地疑亮之創始作之於江州縣當時云然故後人以為名也檐子舊唐書輿服志曰開成末定制宰相三公諸司官及致仕官疾病官許乘檐子如漢魏載輿之制按唐乾元以來始用兜籠代車輿疑自此又為檐子之制也亦漢魏載輿步輿之遺事云然則今大臣朝廷所崇敬而老疾則賜以肩輿蓋自開成之制也兜子又曰兜籠巴蜀婦人所用乾元以來蕃將多著勳於朝兜籠易於檐負京師先用車輿後亦以兜籠代之即今之兜子蓋其制起於巴蜀而用於中朝自唐乾元以來也簾莊子曰有張毅者高門懸箔無不走也而談藪有戶下懸簾明知是箔則懸箔即簾矣荀子有局室蘆簾之文由此推之疑三代物禮曰天子外屏諸侯內屏大夫以簾士以幃床孟子曰象往入舜宮舜在床琴黃帝內傳有七寶登員之床則床疑始於有熊氏也胡床搜神記曰胡床戎翟之器也風俗通曰漢靈帝好胡服景師作胡床此蓋其始也今交椅是也帳幄周官幕人掌帷幕幄帟綬之事注云四合象宮室曰幄王所居帳也則帳幄當周制也左傳有子我有幄又衛侯為虎幄皆周事云又所寢之幄謂之帳者黃帝內傳曰王母為帝設九真十絶妙帳此疑帳之起也漢武帝作甲乙武帳蓋因此耳帳幕幕人注云在旁曰帷在上曰幕皆以布為之說文亦云然則帷幕亦周制也歸藏曰女媧張雲幕而致占神明雖女媧之世有幕之名而其物之興豈自周始也幔六韜曰天將雨不張幔蓋拾遺録曰周穆王有鸞章錦幔蓋周有其物也屏風周禮掌次設皇邸鄭司農云邸後板也康成謂後板屏風禮記明堂位曰天子負斧扆而立陸法言云今屏風扆遺象也三禮圖曰屏風之名出於漢世故班固之書多言其物徐堅為初學記亦載漢劉安羊勝等賦然則漢制屏風蓋起於周皇邸斧扆之事也拂廬唐書吐蕃處於大氈帳名拂廬高宗永徽五年獻之高五丈廣袤各二十七步其後豪貴稍以青絹布為之其始以拂於穹廬為號也宋朝每大宴犒亦設於殿庭曰拂廬亭此蓋其始也虎枕西京雜記曰李廣與兄遊獵冥山北見猛虎一矢斃之斷其頭為枕示服也事始記為虎枕之始魏咸熙中得梁冀玉虎枕臆下有題曰帝辛九年帝辛即紂也是則商紂之時已有其制矣被召南小星之詩曰抱衾與裯注云衾被也裯單被也論語鄉黨篇孔子必有寢衣長一身有半此二者商周之事也疑三代之制西京雜記趙飛燕為皇后女弟昭儀上襚三十五條有鴛鴦被則漢始名被也氈周官掌皮供毳毛為氈則周制也或曰黃帝作旃旃古氈字也褥黃帝內傳曰王母為帝列七寶登員之床敷華茸淨光之褥疑二物此其起爾趙昭儀上皇后襚三十五條有鴛鴦褥席淮南子曰席光萑葦注云席之先所從生出於萑與簟葦也拾遺記曰軒皇使百辟群臣列圭玉於蘭蒲席上以蘭蒲為席而薦圭玉之重器不嫌其陋初有物故也韓子曰禹為蔣席赬緣此彌侈矣蓋至禹始增純緣之飾也至周司幾筵掌五席有莞藻次蒲熊之名其純有紛畫黼之別也簟詩斯干曰下莞上簟注云竹葦曰簟說文曰簟竹席也以竹為席謂之簟則是因席遂為簟也故周成王之顧命曰敷重篾席注謂篾桃竹其物雖已見於周初而猶以竹名號席則簟之名當出於周之中葉故宣王之雅始見簟名焉几漢李尤幾銘敘曰黃帝軒轅仁智恐事有闕作輿几之法則幾創始自黃帝也杖山海經曰夸父與日爭走道死棄其杖化為鄧林此已見杖矣蓋切於此乎大戴禮武王有杖銘莊子有神農曝然放杖之文案有虞三代有俎而無案戰國始有其稱燕太子丹與荊軻等案而食是也案蓋俎之遺也匱國語曰夏之衰也褒人之神化為二龍夏后布幣而策告之卜藏其漦及龍亡而漦在櫝韋昭曰櫝匱也書武王有疾周公作冊納之金縢之匱中蓋櫝匱一器也夏后謂之櫝周始謂之匱然則三代之制也懶架陸法言切韻曰曹公作欹架臥視書今懶架即其制也則是此器起自魏武帝也櫝食國語間談曰真宗問杜鎬櫝食原於何代鎬對曰漢景為太子時帝鍾愛既居東朝文帝念之曰太子之食必料差殊乃命所在每日具兩檐櫝以賜之此其始也博山黃帝內傳有博山爐蓋王母遺帝者蓋其名起於此爾漢晉以來盛用於此香毬西京雜記長安巧工丁緩者作臥褥香爐一名被中香爐本出防風其法後絶至緩更為之為機環轉運而爐體常平今香毬是也爐周禮天官冢宰之屬宮人凡寢中共爐炭則爐三代之制也尉斗帝王世紀曰紂欲作重刑乃先作大尉斗以火尉之使人舉手輒爛與妲己為戲笑今人以伸帛者其遺意也燈檠黃帝內傳曰王母授帝洞霄盤雲九華燈檠二此燈有檠之始也手巾禮浴用二巾上絺下綌雖上下異用而無異名此三代之制也漢王莽之斥逐王閎也閎伏泣元后親以手巾拭之於是始見手巾之目其事雖出於三代而制名當自漢世也布袋召康公美公劉之厚於民也其詩曰乃裹餱糧於橐於囊毛傳曰大曰橐小曰囊御覽云古行者之食以布囊貯糧則是布囊為裹糧之用自公劉之世已然矣蓋在夏后之世者也傘通典曰北齊庶姓王儀同已下翟尾扇傘皇宗三品已上青朱裹其青傘碧裹達於士人按晉代諸臣皆乘車有蓋無傘元魏自代北有中國然北俗故便於騎則傘蓋施於騎耳疑是後魏時始有其制也亦古張帛為繖之遺事也高齊始為之等差云今天子用紅黃二等而庶僚通用青其天子之以黃蓋自秦漢黃屋左纛之制也雨傘六韜曰天雨不張蓋幔周初事也通俗文曰張帛避雨謂之繖蓋即雨傘之用三代已有也繖傘字通薰籠晉東宮舊事曰太子納妃有衣薰籠當亦秦漢之制也什物史記曰舜作什器於壽丘蓋世所常用之器也漆器韓子曰舜作食器黑漆其上禹作祭器黑漆其外朱畫其內唐太宗曰舜作漆器而諫者十七人則器之布漆自舜始也蓋堯啜土鉶飯土簋故爾尊禮運曰禮之初始諸飲食汙尊而抔飲注云鑿地為尊此尊名始也後世或以瓦木為之取諸此也至有虞始又以泰名尊四尊禮明堂位曰泰有虞氏之尊也山罍夏后氏之尊著商尊也犧象周尊也此四代之制也三爵又曰爵夏后氏以盞商以斝周以爵此三器之始也然則今世所用盞亦始於夏后之盞歟三彝又曰灌尊夏后氏以雞彝商以斝周以黃目此三彝之始也三勺又曰勺夏后以龍勺商以疏勺周以蒲勺蓋龍疏蒲勺飾也後王加文耳然則勺之興當有虞始創之故無飾也至夏后加龍以飾之簠簋墨子曰堯飯土簋禮明堂位曰有虞氏之兩敦夏后氏之四璉商之六瑚周之八簋皆黍稷之器也始本於陶唐之土簋俎明堂位又曰有虞氏以䖾俎注云斷木為四足而已然則斷木而為足不致文飾創始為之故也唐太宗曰禹雕其俎至夏乃用雕文則俎自虞帝始也豆又曰夏后以揭豆注云揭無異物之飾也凡造物之初未始不本於朴素後王以為未足以致誠敬故因之加文焉則豆無異飾初為其器也豆疑始於夏后氏也籩登爾雅曰竹豆謂之籩瓦豆謂之登蓋二物取法於豆而製也疑出有夏之後鼎史記黃帝內傳鍾繇疏皆云黃帝採首山之銅鑄鼎於荊山此鼎之始也後至夏禹復鑄以象物白氏六帖黃帝作鼎三象天地人禹收九牧之金以鑄九鼎水罐盧綝匝四起事曰晉惠帝征成都軍敗帝渴帳下齎五升銅罐取水就飲之後人因有水罐之制張敞晉東宮舊事曰太子初拜有塗金澡罐一并青絲三合繩即此也在如意後甌許慎說文曰䀁音賄小甌揚雄方言曰甌翩音邊雄慎皆漢人凡所記非戰國即秦漢制度蓋三代飲燕之具俱俎豆之類故也盆爾雅曰盎謂之缶注云今盆也呂氏春秋曰堯使質絡缶而擊之則缶已為用於堯世矣周官牛人祭祀共其盆簝禮器孔子曰奧者老婦之祭也盛於盈尊於瓶此又二物之名出於周代也鉢本天竺國器也故語謂之鉢多羅漢云應量器省略彼土言故名鉢西國有佛鉢是也宋廬江王以銅鉢餉祖祈則是晉宋之閒始為中夏所用也銚唐雅曰鋗謂之銚說文云溫器也曹操上獻帝表曰臣祖騰有順帝賜純銀粉銚疑漢人始為之也杓禮明堂位曰勺夏后氏以龍勺推此以考蓋前有制矣有夏始加以龍飾杓即勺也祭祀曰勺民用曰杓其實一也或以勺之所容不過升勺命之而杓則加廣其所受皆取酌焉遂異其名制也杯禮玉藻曰母沒則杯圈不能飲十州記曰周穆王時西胡獻常滿杯蓋杯三代之制也紂為瓊杯是矣盤禮大學有湯之盤銘曰德日新日日新又日新是夏世已有盤制而湯始銘之也或曰盤盂黃帝臣孔甲造此蓋二物之所起也盤盞周官司尊彝之職曰六彝皆有舟鄭司農云舟尊下臺若今承盤蓋今世所用盤盞之象其事已略見於漢世則盤盞之起亦法周人舟彝之制而為漢世承盤之遺事也注子事始曰唐元和初酌酒用尊勺雖十數人一尊一杓挹酒了無遺滴無幾改用注子雖起自元和時而輒失其所造之人偏提又曰太和中仇士良惡注子之名同鄭注乃立柄安系若茶瓶而小異名曰偏提托子又曰建中初崔寧女以金盞無儲病其尉指取楪子承盛之既啜而傾乃以蠟環楪子中坐之杯遂定即遣匠以漆環易蠟寧奇子製名托子遂行於代後傳者更環其底唾壺西京雜記曰廣川王發魏襄王冢得玉唾壺蓋此物戰國時已有其制也鏡玄中記曰羽壽作鏡堯臣也黃帝內傳曰帝既與王母乃鑄大鏡十二面隨月用之則鏡蓋肇於軒轅也鏡臺鏡臺出魏宮中有參帶鏡臺王子貴人公主鏡臺也扇崔豹古今注曰舜廣開視聽求賢人以自輔作五明扇而黃帝內傳亦有五明扇之起以五明而制也陸機扇賦曰昔武王玄覽造扇於前然則今以招涼者周武王所作云故傳有武王扇暍之事一曰夏禹也羽扇傅元羽扇賦曰吳人取鳶鳥翼搖之滅吳之後翕然貴重似為羽扇之起而裴啓語林言諸葛亮持白羽扇指麾三軍又在晉武滅吳之前矣按王嘉拾遺記曰周昭王時修塗國獻丹鵲一雌一雄孟夏取鵲趐以為扇一名條融一名仄影此疑羽扇之始也輪扇西京雜記曰長安巧工丁緩作七輪扇以七輪相連一人運之滿堂寒顫今禁中洎宗戚貴室亦多為此物者蓋起自漢丁緩云如意吳時秣陵有掘得銅匣開之得白玉如意所執處皆刻螭彪蠅蟬等形胡綜謂秦始皇東遊埋寶以當王氣則此也蓋如意之始非周之舊當戰國事爾竈淮南子曰炎帝王於火死而為竈後漢李尤竈銘曰燧人造火竈續事始則曰竈黃帝所置釜甑古史考曰黃帝始造釜甑火食之道成矣詩疏引禮運注云中古未有釜甑而中古謂神農時也匙方言曰匕謂之匙說文曰匕所以取飯文王之贊易至霍曰不喪匕鬯大東之詩曰有救棘匕注云匕所以載鼎實則匕三王之制也箸禮記曰飯黍無以箸韓子曰紂為象箸以象箸觀之明箸前有商紂始以象為之耳箕帚世本曰少康作箕帚飯帚許慎云陳留以飯帚為筲今人亦呼飯箕為梢箕慎既漢人所記疑皆秦漢時事耳斧周書曰神農作斤斧皇圖要紀亦云鋸古史考曰孟莊子作鋸鑿古史考又曰鑿亦孟莊子作也稱斗尺呂氏春秋曰黃帝使伶倫取竹於崑崙之嶰谷為黃鍾之律而造權衡度量蓋因其所勝輕重之數而生權以為銖兩斤鈞石則稱之始也因其所積長短之數而生度以為分寸尺丈引則尺之始也因其所受多寡之數而生量以為合籥升斗斛則斗之始也紙後漢書蔡倫傳曰自古書契多編以竹簡其用縑帛者謂之紙縑貴而簡重並不便於人倫乃造意用樹膚麻頭及弊布魚網以為紙元興元年上之和帝善其能自是天下莫不從用咸稱蔡侯紙盛洪之荊州記曰漢順帝時蔡倫始以魚網造紙東觀記曰倫典上方作納用故麻造者謂之麻紙用木皮名穀紙用故魚網名網紙王隱晉書曰魏太和六年張楫云古之素帛依書長短隨事截翻枚數重沓名番紙故從系後漢蔡倫以故布搗銼作之故字從巾按蔡倫典上方作納用之說上方乃朝庭造作之所納用獻納府使之物也箋紙桓玄僞事曰玄令平淮作青赤縹桃花紙又石季龍寫詔用五色紙蓋箋紙之制也此疑其起耳筆說文曰楚謂之聿吳謂之不律燕謂之弗秦謂之筆張華博物志曰秦蒙恬造又曰舜造筆古今注曰牛亨問自古有書契以來便應有筆世稱蒙恬造筆何也恬始秦筆耳以枯木為管鹿毛為柱羊毫為被所謂蒼毫非兔毫竹管也由此觀之則以羊毫為筆斯蒙恬所製耳墨硯後漢李尤墨硯銘曰書契既造墨硯乃陳則是茲二物者與文字同興於黃帝之代也撲滿西京雜記曰公孫洪元光五年為國所推上為賢良國人鄒長倩贈以撲滿一枚云撲滿以土為器以畜錢背有入竅而無出滿則撲之土粗物錢重貨入而不出積而不散故撲之上有聚斂而不能散者將有撲滿之敗可不戒歟故贈君然則漢武帝時世已為此器疑出於畜聚之後也土牛禮記月令曰出土牛以示農耕之早晚注云若立春在十二月望則策牛人近前示農早也月晦及正月旦則在中示農平也近正月望則近後示農晚也其周制乎後漢禮儀制曰季冬立土牛於國都郡縣城外日地以送寒月令章句曰是月之辰建丑丑為牛寒將極故出其物為形象以示送達之且以升陽也春幡續漢書禮儀志曰立春之日京都立春幡後漢書曰立春皆青幡幘今世或剪綵錯緝為幡勝雖朝廷之制亦鏤金銀或繒絹為之戴於首亦因此相承設之或於歲旦刻青繒為小幡樣重纍凡十餘相連綴以簪之此亦漢之遺事也俗閒因又曰年幡此亦其誤也綵燕荊楚歲時記曰立春日悉翦綵為燕以戴之貼宜春字傅咸燕賦有其說桃版玉燭寶典曰元日施桃版著戶上謂之仙木以鬱壘山桃百鬼畏之故也山海經曰東海度朔山有大桃樹蟠屈三千里其卑枝門東北曰鬼門萬鬼出入也有二神一曰神荼一曰鬱壘主閲領衆鬼之害人者於是黃帝法而象之毆除畢因立桃版於門戶上畫鬱壘以禦凶鬼此則桃版之制也蓋其起自黃帝故今世畫神像於版上猶於其下書右鬱壘左神荼元日以置門戶閒也桃符淮南子詮言訓曰羿死於桃棓許慎注云棓大杖以桃為之以擊殺羿由是以來鬼畏桃今人以桃梗作杙歲旦植於門以辟鬼由此故也後漢禮儀志曰施門戶代以所尚周人木德以桃為梗言氣相更也梗更也或曰即黃帝立桃梗之事也鍾馗開元中明皇病痁居小殿夢一小鬼鞹一足懸一履於腰閒竊太真紫香囊及拈玉笛吹之頗喧擾上叱之曰臣虛耗也上怒欲呼武士見一大鬼頂破帽衣藍袍束角帶徑捉小鬼以指刳其目臂而啖之上問為誰對曰臣終南進士鍾馗也因應舉不捷觸殿階而死奉旨賜緑袍而葬誓除天下虛耗妖孽言訖覺而疾愈乃召吳道子圖之上賞其神妙賜以百金是以今人畫其像於門也沈括筆談曰歲首畫鍾馗不知起自何時皇祐中金陵發一冢有石志云乃宋宗愨母鄭夫人云有妹馗鍾馗之設遠矣捶糞録異傳曰歐明遇彭澤青洪君君有婢名如願君使隨明明意有所願如願輒得之成富人後不復愛如願正月歲朝雞初鳴呼之不即起欲捶之願走糞上乃故歲掃除所聚者由此逃去明謂在積壤中以杖捶糞使出知不可得因曰汝我富不復捶汝也今人元日雞鳴時輒往積壤閒捶之云使人富蓋起自歐明也今京東之俗猶然畫雞董勛問禮曰正月一日為雞二日狗三日牛四日豬五日牛六日馬七日人正旦畫雞於門七日貼人於帳為此也拾遺記曰堯在位七年祇及國獻重明鳥狀如雞或一歲數來或數歲一來國人莫不掃灑門戶以望其來或刻金寶為其狀置戶牖閒則鬼類自伏云今人每歲元日刻畫為雞於戶上蓋其遺像也畫聻酉陽雜俎曰俗好於門上畫虎頭書聻字謂陰府鬼神之名可息瘧癘也段成式讀漢舊儀說儺逐疫鬼立桃人葦索蒼耳虎頭等聻蓋蒼耳也然則其說漢事也張續宣室志曰裴漸隱居伊水時有道士李君善視鬼嘗見漸於伊上大歷中寄書博陵崔公曰當今制鬼無過漸耳是時朝士咸書漸耳字題其門自此始蓋聻謂裴漸耳本助辭後人因李君之書誤作一字也爆竹歲時記曰元日爆竹於庭以辟山臊山臊惡鬼也神異經曰犯人則病畏爆竹聲宗懍乃云爆竹然草起於庭燎風俗通謂起於庭燎不應濫王者也按周衰之末大夫而僭天子庶人而服侯服者皆是也奚獨燎明為不然乎懍之所記理或然矣綵花實録曰晉惠帝令宮人插五色通草花漢王符潛夫論已譏花采之費晉新野君傳家以翦花為業染絹為芙蓉捻蠟為菱藕翦梅若生之事按此則是花朵起於漢翦綵起於晉矣歲時記則云今新花謝靈運所制疑綵花也唐中宗景龍中立春日出翦綵花又四年正月八日立春令侍臣迎春內出綵花人賜一枝董勛問禮曰人日造花勝相遺不言立春則立春之賜花自唐中宗始也綵勝歲時記曰人日翦綵為勝起於晉代賈充夫人所作取黃母戴勝之義也觀燈唐書嚴挺之傳睿宗先天二年正月望夜胡人婆陀請然百千燈因弛門禁帝於延熹安福門縱觀此天子御樓觀燈之始也放燈史記樂書曰漢帝以正月上辛祀太一甘泉以昏時祀到明徐望謂今人正月望夜遊觀燈是其遺事僧史略云漢法本傳曰西域十二月三十日是此方正月望謂之大神變曰漢明帝令燒燈表佛法大明也一云因漢武祭五畤通夜設燎取周禮司爟燈燒燎照祭祀東漢以為佛事放夜唐睿宗先天二年正月望初弛門禁玄宗天寶六年正月十八日詔重門夜開以達陽氣朱梁開平中詔開坊門三夜國朝會要曰乾德五年詔朝廷無事區宇咸寧況年穀屢豐宜士民之縱樂上元可更增十七十八兩夜自後至十六日開封府以舊例奏請皆詔放雨夜也僧史略曰太平興國六年敕然燈放夜為著令紫姑異苑曰世有紫子女古來相傳是人妾為大婦所嫉每以穢事相役正月十五日感激而死故世人以其日作其形於廁閒或豬欄邊迎之曰子胥不在壻名也曹夫亦去大婦也小姑可出捉者覺動是神來矣占衆事卜絲蠶時鏡新書引洞覽記云帝嚳之女胥死生好音樂正月十五日可以衣見迎記為紫姑之事未知孰是祓禊韓詩曰三月桃花水下之時鄭國之俗以上巳於溱洧之上執蘭招魂續魄祓除不祥沈約宋書曰魏已後但用三日不復用巳也歲時記按周禮女巫有歲時祓除之事鄭注云今上巳水上之類又論語暮春者春服既成浴乎沂風乎舞雩謂水濱祓除由來遠矣蓋周典也今歲三月西池之遊其遺事爾教池辛氏秦記曰昆明池漢武帝立之習水戰則是教池之事略見於此矣亦競渡之遺意也宋朝太祖建隆閒即都城之南鑿講武池始習水戰將有事於江南也及太宗興國中得吳越錢氏龍舟七年疏國城西開金明池於是每歲二月教池遂為故事子推故俗每寒食前一日謂之炊熟則以麵為蒸餅樣團棗附之名為子推穿以柳條插戶牖閒相緣云介子推逃祿晉文公焚山求之子推焚死文公為之寒食斷火故民從此物祀之而名子推相傳之謬至於如此也寒食陵翽鄴中記曰并州之俗以冬至後一百三日為介子推斷火冷食三日作乾粥食之中國以為寒食歲時記曰去冬至一百五日即有疾風甚雨謂之寒食秋千古今藝術圖曰北方戎狄愛習輕趫之態每至寒食為之後中國女子李芝蘭乃以綵繩懸樹立架謂之秋千或曰本山戎之戲也自齊桓公北伐山戎此戲始傳中國一云正作千秋字為秋千非也本出自漢宮祝壽辭也後世語倒為秋千耳禁火鄴中記曰舊云寒食斷火起於介子推左氏史記不見子推被焚之事按周禮司烜仲春以木鐸修火禁於國中注謂季春將出火今寒食推節氣是中春末清明是三日初然則亦周人出火之事也後漢周舉遷并州太原舊俗以介子推焚骸一月斷火舉移書廟云寒食一月老小不堪今則三日而已自漢以來訛謬已若此也拜掃開元禮曰宗子去在他國庶子無廟孔子許望墓以時祭祀唐禮每新改命釋褐結綬皆往墓見開元二十二年敕寒食上墓禮經無文近代相傳浸以成俗士庶有不合廟享者何以表其孝思宜許上墓編入五禮按漢官儀曰古不墓祭秦始皇起寢墓側漢因不改四時上飯後漢光武紀云建武十年八月幸長安有事十一陵蓋躬祭於墓也即今上墳拜掃蓋起於此明帝紀永平元年正月帝率公卿朝原陵如元會儀劉昭補注後漢禮儀志亦有上陵儀謝承書曰建寧五年正月車駕上陵原蔡雍曰明帝至孝光武即世帝嗣位群臣朝正感先帝不復聞見此禮乃率百僚就原陵創焉然則上墳之禮疑自是以來民閒視上所行因習以為俗也破散五代會要曰奉先之道無寒食野祭之禮近代莊宗每年寒食出祭謂之破散則今人有破散之語自後唐莊宗始也蠶市仙傳拾遺曰蜀蠶叢氏王蜀教人蠶桑作金蠶數千每歲首出之以給民家每給一所養之蠶必繁孳罷即歸於王王巡境內所止之處民成市蜀人因其遺事每年春有蠶市也紙鳶俗謂之風箏古今相傳云是韓信所作高祖之征陳豨也信謀從中起故作紙鳶放之以量未央宮遠近欲以穿地隧入宮中也蓋昔傳如此理或然矣梁太清中侯景攻臺城內外斷絶羊侃教小兒作紙鳶藏詔於中簡文帝出太極殿前因西北風放之冀得達援軍賊謂是厭勝又射下之見馬總通歷云然其事初一見於此證知其審為韓信造矣競渡楚傳云起於越王句踐荊楚歲時記曰五月五日為屈原投汨羅人傷其死並將舟楫拯之因以為俗歲華紀歷日因句踐以為成風拯屈原而為俗也艾人荊楚歲時記曰端午日荊人皆踏百草採艾為人懸於門上以禳毒氣當是以師曠占有歲病則艾草先生故也五綵風俗通曰五月五日以五綵絲繫臂辟鬼及兵令人不病瘟又曰示婦人蠶功成也續齊諧記曰屈原五月五日投汨羅死楚人哀之每至此日以竹筒貯米投水祭之漢建武中長沙區回忽見一士稱三閭大夫曰見祭甚善但常年所遺為蛟龍所竊今若有惠以楝葉塞筒五綵線縛之此二物蛟龍所憚回依言故世人五月五日作粽并五綵線及楝葉皆汨羅遺風也百索續漢書曰夏至陰氣萌作恐物不成以朱索連以桃印文施門戶故漢五月五日以朱索五色即為門戶飾以難止惡氣今有百索即朱索之遺事也蓋始於漢本以飾門戶而今人以約臂相承之誤也又以綵絲結紐而成者為百索紐以作股者名五絲云線符漢五月五日以五色印為門戶飾續漢書所謂桃印者也劉昭曰桃印本漢制今世端午以五綵線篆符以相問遺亦以置戶牖帳屏之閒蓋本於漢桃印之制遺扇唐會要曰正觀十八年五月五日太宗謂長孫無忌楊師道曰五日舊俗必用服玩相賀今朕各遺卿飛白扇二枚庶動清風以增美得推舊俗之語則知端午之以扇相遺自唐太宗始也乞巧吳均續齊諧記曰桂陽成武丁有仙道忽謂其弟曰七月七日織女當渡河暫詣牽牛至今云織女嫁牽牛周處風土記曰七夕灑掃於庭施几筵設酒果於河鼓織女言二星神會乞富壽及子歲時記曰七夕婦人以綵縷穿七孔針陳瓜花以乞巧則七夕之乞巧自成武丁始也穿針西京雜記曰漢采女常以七月七日夜穿七孔針於開襟樓今七夕望月穿針以綵縷過者為得巧之候其事蓋始於漢盂蘭今世每七月十五日營僧尼供謂之盂蘭齊者按盂蘭經曰目連母亡生餓鬼中佛言須十方衆僧之力至七月十五日具百味五果以著盆中供養十方大德後代廣為華飾乃至割木割竹極工巧也今人弟以竹為圓架加其首以荷葉中貯雜饌陳目連救母書像致之祭祀之所失之遠甚矣水陸今釋氏教中有水陸齊儀按其事始出於梁武帝蕭衍初帝居法雲殿一夕夢僧教設水陸齊覺而求其儀而世無其說因自撰集銓次既成設之於金山實天監七年也大抵取救焰口經事云爾菊酒西京雜記曰戚夫人侍兒賈佩蘭後出為段儒妻說在宮內時九月九日佩茱萸食蓬餌飲菊花酒云令人長壽菊花舒時並採莖葉雜黍米釀之至來年九月九日始熟焉謂之菊花酒馮鑑謂自後漢桓景始也登高續齊諧記曰漢桓景隨費長房學謂曰九月九日汝家當有災厄急令家人作絹囊盛茱萸懸臂登高山飲菊花酒禍乃可消景率家人登山夕還雞犬皆死房曰此可以代人則九日登高始於桓景藥市唐王昌遇梓州人得道號易玄子大中十三年九月九日上升自是以來天下貨藥輩皆於九月初集梓州城八日夜於州院街易玄龍沖地貨其所齎藥川俗因謂之藥市遲明而散逮宋朝天聖中燕龍圖肅知郡事又展為三日至十一日而罷是則藥市之起自唐王昌遇始也有碑敘其本末甚詳賽神禮雜記曰子貢觀於蠟子曰百日之蠟一日之澤鄭康成謂歲十二月索鬼神而祭祀則黨正以禮屬民而飲酒勞農而休息之使之燕樂是君之澤也今賽社則其事爾今人以歲十月農功畢里社致酒食以報田神因相與飲樂世謂社禮始於周人之蠟云設浴俗緣記曰譬喻經云佛臘月八日降伏六師投佛請死言佛以法水洗我心垢今我請僧洗浴以除身穢仍為常緣則設浴之事西域舊俗也亦今臘月灌佛之始驅儺禮緯曰高陽有三子生而亡去為疫鬼二居江水中為瘧一居人宮室區隅中善驚小兒於是以正歲十二月命祀官持儺以索室中而驅疫鬼軒轅本紀曰東海渡山有神荼鬱壘之神以禦凶鬼為民除害因制驅儺之神子遊島問於雄黃曰今人逐疫出魁擊鼓呼噪何也雄黃曰黔首多疾黃帝氏立巫咸使黔首鳴鼓振鐸以動心勞形發陰陽之氣擊鼓呼噪遂以出魁黔首不知以為祟魅也或記以為驅儺之事按周禮有大儺漢儀有侲子要之雖原始於黃帝而大抵周之舊制也周官歲終命方相氏率百隸索室驅疫以逐之則驅儺之始也文身今世俗皆文身作魚龍飛仙鬼神等像或為花卉文字舊云起於周太王之子吳太伯避王季歷而之句吳斷髮文身以象龍子避蛟龍之患而史記越世家言夏后帝少康之庶子封於會稽文身斷髮披草萊而邑證此則是茲事為始於帝少康之子因知文身斷髮之為吳越俗也舊矣宮蘇氏演義宮中也言處都邑之中也又宮方也為宮必以雉堞方正也孟詵錦帶前書曰十紀四合雒紀始教人穴居有巢氏教人巢居易曰上古穴居而野處後世聖人易之以宮室上棟下宇以待風雨謂黃帝也內傳曰帝斬蚩尤因建宮室穆天子傳曰登崑崙觀黃帝宮室白虎通曰黃帝作宮室以避寒暑此宮室之始也世本曰堯使禹作宮室謂廣其制爾神異經有天淫之宮管子黃帝有合宮堯二宮湯有鑣宮周有蒿宮秦有萬宮漢有未央等名也室爾雅曰宮謂之室風俗通曰室其外也宮其內也蓋自黃帝始而周書亦黃帝作呂氏春秋則云高元作室也殿演義殿共也取衆屋擁從如軍之殿摯虞決疑要注曰殿則有階陛堂有階無陛春秋謂之路寢禮記與白虎通俱曰天子之堂史記秦始皇作朝宮渭南先作前殿阿房商君書有言天子之殿則是秦自孝公而來已云然矣蓋秦始曰殿也漢因之有函德明光諸名也堂演義曰堂當也當正向陽之屋又堂明也言明禮義之所管子曰軒轅有明堂之議春秋因事曰軒轅氏始有堂室棟宇則堂之名肇自黃帝也觀皇帝內傳曰帝置元始真容於高觀之上觀之言可以觀望於其上也周有兩觀春秋書雉門及兩觀災是也今俗謂之朵樓蓋周制也宅堯典曰宅嵎夷禹貢曰降丘宅土孟子曰五畝之宅戴延之西征記曰蒲坂城外有舜宅則宅之名始於堯帝之時矣邸宿也史記封禪書方士多言天子朝諸侯於甘泉作諸侯邸漢書曰代王馳入代邸是邸之義設起於漢也今謂諸王所居曰邸亦因代邸之說也第史記齊王自淳于髡以下皆命曰列大夫為開第康莊之衢于漢書高祖詔列侯二千石大小第室注云有甲乙次第故曰第又曰不出里門面臨大道曰第按左氏傳齊景公欲更晏子之第蓋丘明周人所記又周事當亦周制云爾樓史記方士言於漢武帝曰黃帝為五城十二樓以候神人帝乃立井幹樓然則樓蓋起於黃帝之時閣韓詩外傳曰黃帝時鳳巢於阿閣則閣亦肇於黃帝矣庭說文曰庭朝中也揚子法言曰鳳鳥蹌蹌匪堯之庭列子曰黃帝居大庭之館此庭名之起也廊周書作雒曰五宮明堂咸有重廊漢武策曰舜游巖廊晉灼曰堂邊曰巖文穎曰殿下外屋曰廊然則唐虞時事也屋釋名曰屋奧也淮南子曰舜築牆茨屋新語曰堯舜之人比屋可封以言民居也易上棟下宇蓋其始矣其謂之屋則自堯舜始矣房蘇鶚演義曰房方也室內之方正也又房防也防風雨燥濕也說文曰房室在旁者也尚書顧命有東房西房詩右招我由房蓋周制也序爾雅曰東西牆曰序所以序別內外書大訓在西序河圖在東序商學曰序則序自商人名之也廟軒轅本紀曰帝升天臣寮追慕取几杖立廟於是曾遊處皆祠云此廟之始也庫說文曰庫兵車所藏帑金帛所藏府文書所藏商鞅之書曰湯武破桀紂築五庫藏五兵有大庭之庫此庫之初也後世凡所藏積皆謂之庫矣廚帝王世紀曰帝太昊制嫁娶之禮取犧牲以供庖廚此廚之始也倉鄭康成注周廩人云藏米曰廩然則倉廩蓋一事也孟子曰瞽瞍使舜完廩召康公之美公劉曰乃積乃倉則其事始見於陶唐之世也廄馬舍也周禮校人掌頒良馬而養乘之乘馬三乘為皂三皂為繫六繫為廄六廄成校此蓋名廄之始也幽王失德故詩人刺之曰乘馬在廄穀梁書新延廄法廄注謂六間之舊制按校人天子十二間邦國六間然則間廄之制則是周為之也齊漢宣帝齊居決事此齊名之起也晉太和中陳郡殷府君引水入城穿池殷仲堪於此池北立小舍讀書百姓呼為讀書齊則齊之始疑自此廁禮儀曰隸人溫廁蓋已名於周初也巷姜嫄之生后稷也誕置之隘巷蓋已名於帝嚳之時也故尸子曰舜之方陶不能利其巷城呂氏春秋曰夏鯀作城注云築作城郭也淮南子曰鯀作九仞之城吳越春秋曰堯聽鯀治水鯀乃築城造郭以為國固博物志曰東里槐責禹亂天下事禹退而作三城又曰禹作城強者攻弱者守敵者戰城郭自禹始也軒轅本紀曰黃帝築城邑造五城黃帝內傳曰帝既殺蚩尤因之築城闕史記方士言於漢武帝曰黃帝為五城然則城蓋始於黃帝也漢書又云神農之教有石城十仞湯池百步又城池之設自炎帝始矣郭管子曰內謂之城外謂之郭孟子曰三里之城七里之郭吳越春秋曰鯀築城以衛君造郭以守民記以為城郭之始世本則云鯀作郭按軒轅本紀以謂黃帝築城邑則鯀不作城邑為郭而已坊蘇鶚演義曰坊方也言人所在里為方方正也又方類也方以類聚居者必求其類從隸文欲強別白不惜文繁耳漢宮闕名曰洛陽故北宮有九子坊則坊名漢有也市易曰庖犧氏沒神農氏作日中為市致天下之名聚天下之貨交易而退各得其所蓋取諸噬嗑古史考曰神農作市世本則曰祝融作市譙周云高陽氏市官不修祝融修之也風俗通曰言市井者按二十家為井今因井為市故云然也井淮南子曰伯益作井而龍登元雲注益佐舜初作井世本呂氏春秋俱謂伯益作井世本又云黃帝正名百物始穿井周書亦曰黃帝作井而盛洪之荊州記則云隨郡有村父老傳炎帝所生村中有九井云神農既育九井自穿於此皆見門易繫曰神農氏沒黃帝堯舜氏作重門擊柝以待暴客蓋取諸豫皇圖要紀曰軒轅造門戶然則門戶之制其在上棟下宇之後乎牆淮南子曰舜作屋築牆茨屋令人皆知去巖穴有室家則此蓋牆之起也至夏后世帝太康始峻宇雕牆矣階釋名云階梯也言有等差書稱舜舞干羽於兩階墨子稱堯土階三尺茅茨不翦韓詩外傳則云鳳蔽日而至黃帝降於東階則階陸之制自黃帝為棟宇則設之也折檻前漢書朱雲傳成帝時張禹為帝師雲上書願賜上方斬馬劍斷佞臣一人頭以勵其餘上問誰曰張禹也帝怒使御史將下殿雲攀檻折後理檻上曰勿易緝之以旌直臣今殿檻之闕其中自朱雲始也鴟尾唐會要曰漢柏梁殿災越巫言海中有魚虯尾似鴟激浪則降雨遂作其像於屋以厭水災王睿炙轂子曰柏梁災巫獻術取鴟魚尾置於殿屋以厭勝之今以瓦為之蘇鶚演義曰漢武作柏梁殿上疏者曰蚩尾水之精能辟火災可置之堂殿今人多作鴟字顏之推亦作鴟劉孝孫事始作蚩尾又俗閒呼為鴟吻如鴟鳶遂以此呼之後因有作此鴟者王子年拾遺記曰鯀治水無功目沈羽淵化為玄魚海人於羽山下修玄魚祠四時致祭嘗見瀺灂出水長百丈噴水激浪必雨降漢書越巫請以鴟魚尾厭水災今鴟尾即此魚尾也按王嘉晉人晉去漢未遠當時已作鴟字蘇鶚之說亦未為允也吳處厚青箱雜記曰海有魚虯尾似鴟用以噴浪則降雨漢柏梁臺災越巫上厭勝之法起建章宮設鴟魚之像於屋脊以厭火災即今世鴟吻是也墀禮曰天子赤墀禮之所記皆三代事則墀蓋三代制也而漢書則云王根作赤墀今州縣界石即天子之墀也石礎古謂之質礎尚書大傳曰大夫有石材庶人有石承注石材柱下質也石承當柱下而已不外出以為飾也三代之事如周之禮樂庶事之備則等降之文皆周制也鋪首後漢禮儀志曰施門戶代以所尚為飾商人水德以螺首慎其閉塞使如螺也百家書曰公輸般見水蠡謂之曰開汝頭見汝形蠡適出頭般以足畫之蠡引閉其戶終不可開因效之設於門戶欲使閉藏當如此固密也二說不同通俗文曰門扇飾謂之鋪首也瓦說文曰瓦土器也燒者之總名也禮記曰後聖修火之利範金合土此瓦之始也周書曰神農作瓦器博物志曰桀作瓦今以覆屋者也古史考曰夏后氏昆吾氏作瓦史記龜策傳載宋元君之臣衛平曰桀作瓦室注云昆吾氏作陶蓋為桀作也今屋之覆以瓦自夏桀始也甎古史考曰夏世鳥曹氏始作甎藩籬周公繇易至大壯之九三曰羝羊觸藩疏云藩籬也左傳哀公十二年吳人藩衛人之舍則藩籬之固室家三代之制也臺榭爾雅曰觀四方高曰臺有木曰榭山海經曰沃民之國有軒轅臺黃帝內傳曰帝既斬蚩尤因之立臺榭此蓋其始也亭西京苑內有望雲亭東京有金谷亭即是其制始於漢也按秦制十里一亭則兩漢之名亭亦因秦號池事始云風俗通曰孫子有湯池之說後人因此開地為池以養魚鱉記為池沼之始非也按孫子名武吳王闔閭之臣也春秋之末人著書十三篇言兵事而史記紂為酒池可以運舟文王以民力為沼謂其沼曰靈沼樂其有魚鱉則池沼見於孫子之前遠矣黃帝內傳曰帝既殺蚩尤升為天子因之濬池沼蓋池沼之起始於此也砌臺楊文公談苑曰今攃攃臺王公家作之以為林觀之景唐張仲素詩曰寫望臨春閣登高下砌臺即知唐來有之也園說文曰樹果曰園韓詩外傳曰黃帝時鳳止帝東園巢於阿閣此疑為園名之始也圃說文又曰樹蔬曰圃莊子曰黃帝之圃此疑為圃名之始也囿說文又曰養禽獸曰囿蘇氏演義曰囿有也言有麋鹿鳥獸也項峻治書曰人皇以九州為九囿此疑為囿名之始也莊子有稀韋氏之囿文王之詩曰王在靈囿圈畜羊豕曰圈間牛馬曰牢召康公美公劉言執豕於牢前漢有虎圈則圈之名出於漢代云
